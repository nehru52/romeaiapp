name: Release USB Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version tag (e.g. v1.0.0)
        required: false
  release:
    types: [created]

# Default to least privilege. Override per-job where needed.
permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            artifact: elizaos-usb-installer-macos
          - os: ubuntu-latest
            platform: linux
            artifact: elizaos-usb-installer-linux
          - os: windows-latest
            platform: win32
            artifact: elizaos-usb-installer-windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: "canary"
      - run: bun install
      - run: bun run --cwd packages/os/usb-installer build
      - run: bun run --cwd packages/os/usb-installer typecheck
      - run: bun run --cwd packages/os/usb-installer test
      - name: Validate USB installer browser and virtual block-device proof
        if: matrix.platform == 'linux'
        run: |
          bunx playwright install --with-deps chromium
          bun run --cwd packages/os/usb-installer test:e2e
          if modinfo scsi_debug >/dev/null 2>&1; then
            bun run --cwd packages/os/usb-installer test:linux-virtual-usb
          else
            echo "::notice::scsi_debug kernel module is unavailable on this runner; skipping virtual block-device USB proof."
          fi
      - name: Package desktop app
        run: bun run --cwd packages/os/usb-installer package:${{ matrix.platform }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ matrix.artifact }}
          path: packages/os/usb-installer/build/
          if-no-files-found: error
          retention-days: 30
