name: ci

# Cancel previous runs for the same PR/branch
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
# Default to least privilege. Override per-job where needed.
permissions:
  contents: read

jobs:
  # Test job
  test:
    # Skip duplicate runs: run on push to main, or on pull_request events only
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref_name == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      # Baseline CI is secret-free. Live/provider-key E2E runs in dedicated
      # opt-in or post-merge workflows, not in the PR test job.
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      TURBO_CACHE: remote:rw
      PGLITE_WASM_MODE: node
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24.15.0"

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: "canary"
          install-command: bun install
          install-native-deps: "false"
          skip-avatar-clone: "true"
          no-vision-deps: "true"

      - name: Create test env file
        run: |
          echo "TEST_DATABASE_CLIENT=pglite" > packages/core/.env.test
          echo "NODE_ENV=test" >> packages/core/.env.test

      - name: Build packages
        run: bun run build:core

      - name: Run typecheck
        run: bun run typecheck

      - name: Run tests
        timeout-minutes: 15
        env:
          NODE_OPTIONS: "--max-old-space-size=2048"
        run: bun run test:core

      - name: Run plugin tests
        timeout-minutes: 15
        env:
          NODE_OPTIONS: "--max-old-space-size=2048"
        run: bun run test:plugins

      - name: Run interop (TypeScript) tests
        timeout-minutes: 10
        run: |
          if [ -d packages/interop ]; then
            cd packages/interop && bun run test
          else
            echo "packages/interop is not present; skipping interop tests"
          fi

  zero-key-e2e:
    name: Zero-Key Deterministic E2E
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref_name == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: "true"
      NODE_OPTIONS: "--max-old-space-size=4096"
      TEST_LANE: "pr"
      ELIZA_LIVE_TEST: "0"
      SCENARIO_USE_LLM_PROXY: "1"
      CEREBRAS_API_KEY: ""
      OPENAI_API_KEY: ""
      ANTHROPIC_API_KEY: ""
      GROQ_API_KEY: ""
      OPENROUTER_API_KEY: ""
      GOOGLE_GENERATIVE_AI_API_KEY: ""
      XAI_API_KEY: ""
      NVIDIA_API_KEY: ""
      ELIZAOS_CLOUD_API_KEY: ""
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      TURBO_CACHE: remote:rw
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24.15.0"

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: "canary"
          install-command: bun install --ignore-scripts --no-frozen-lockfile
          install-native-deps: "false"
          install-protoc: "false"
          setup-python: "false"
          skip-avatar-clone: "true"
          no-vision-deps: "true"

      # The scenario CLI imports @elizaos/core from source, which imports the
      # gitignored ./generated/validation-keyword-data.ts. --ignore-scripts skips
      # postinstall, so generate it explicitly before any step resolves core.
      - name: Ensure generated shared i18n data
        run: node packages/app-core/scripts/ensure-shared-i18n-data.mjs

      - name: Scenario catalog coverage gate
        run: node packages/scripts/check-scenario-workflow-coverage.mjs --report-dir reports/scenarios/catalog-inventory

      - name: Scenario runner deterministic contract
        run: bun run --cwd packages/scenario-runner test -- src/executor.test.ts src/runtime-factory.test.ts src/scenario-pr-workflow.test.ts

      - name: Deterministic LLM proxy unit coverage
        working-directory: packages
        run: bunx vitest run --config test/mocks/vitest.config.ts test/mocks/__tests__/llm-proxy-plugin.test.ts

      - name: UI voice interaction coverage
        run: bun run --cwd packages/ui test -- src/hooks/useVoiceChat.bidirectional.test.tsx src/hooks/useContinuousChat.test.tsx

      - name: UI dynamic view interaction coverage
        run: bun run --cwd packages/ui test -- src/App.navigate-view-wiring.test.tsx src/app-navigate-view.test.ts src/components/pages/ViewManagerPage.test.tsx src/components/shell/__tests__/shell-assistant-flow.test.tsx src/components/views/DynamicViewLoader.test.tsx src/hooks/useAvailableViews.test.tsx src/hooks/useDesktopTabs.test.tsx src/state/startup-phase-hydrate.view-interact.test.ts

      - name: Agent plugin view route and interaction coverage
        run: bunx vitest run packages/agent/src/__tests__/plugin-tui-view-coverage.test.ts

      - name: App route + ui-smoke spec coverage gates
        run: bun run --cwd packages/app test -- test/route-coverage.test.ts test/ui-smoke-coverage.test.ts test/view-interaction-coverage.test.ts

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Actual app assistant pill browser coverage
        run: bun run --cwd packages/app test:e2e test/ui-smoke/assistant-home-flow.spec.ts --project=chromium -g "captures first-run, assistant home, chat suppression, and view pill states"

      - name: Actual app assistant voice browser coverage
        run: bun run --cwd packages/app test:e2e test/ui-smoke/assistant-home-flow.spec.ts --project=chromium -g "drives the assistant home voice path with a scripted browser STT turn"

      - name: Actual app TTS and STT browser coverage
        run: bun run --cwd packages/app test:e2e test/ui-smoke/tts-stt-e2e.spec.ts --project=chromium

      - name: Actual app view manager browser coverage
        run: bun run --cwd packages/app test:e2e test/ui-smoke/view-manager-actual-flow.spec.ts --project=chromium

      - name: Actual app plugin view browser coverage
        run: bun run --cwd packages/app test:e2e test/ui-smoke/plugin-views-visual.spec.ts test/ui-smoke/orchestrator-gui-workbench.spec.ts test/ui-smoke/screenshare-gui-interactions.spec.ts test/ui-smoke/task-coordinator-gui-interactions.spec.ts test/ui-smoke/terminal-plugin-view-command-contract.spec.ts --project=chromium

      - name: Electrobun window and dynamic-view coverage
        run: bun run --cwd packages/app-core/platforms/electrobun test src/native/desktop-window.test.ts src/rpc-handlers.test.ts src/dynamic-view-rpc-schema.test.ts src/surface-windows.test.ts src/dynamic-views/host.test.ts

      - name: View management action coverage
        run: bun run --cwd plugins/plugin-app-control test -- src/actions/views-management.test.ts

      - name: App verification diagnostics coverage
        run: bun run --cwd plugins/plugin-app-control test -- src/services/__tests__/app-verification.integration.test.ts src/services/__tests__/verification-room-bridge.test.ts

      - name: Computer-use screenshot quality diagnostics coverage
        run: bun run --cwd plugins/plugin-computeruse test -- test/helpers/screenshot-quality.test.ts src/__tests__/browser-auto-open.test.ts

      - name: App screenshot quality diagnostics coverage
        run: bun run --cwd packages/app test -- test/screenshot-quality.test.ts

      - name: App-core screenshot quality diagnostics coverage
        run: bun run --cwd packages/app-core test -- test/app/screenshot-quality.test.ts

      - name: Cloud screenshot quality diagnostics coverage
        run: bun run --cwd packages/cloud-frontend test -- tests/e2e/screenshot-quality.test.ts

      - name: Build workspace packages for scenario resolution
        run: bunx turbo run build --filter=@elizaos/scenario-runner...

      - name: Zero-cost scenario e2e
        run: bun run --cwd packages/scenario-runner test:pr:e2e

      - name: Upload deterministic E2E reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ci-zero-key-e2e-report
          path: |
            reports/scenarios/pr-deterministic/
            reports/scenarios/catalog-inventory/
          if-no-files-found: ignore
          retention-days: 3

      - name: Prune deterministic E2E scratch output
        if: always()
        run: rm -rf reports/scenarios/pr-deterministic reports/scenarios/catalog-inventory packages/app/playwright-report packages/app/test-results

  # Lint and format job
  lint-and-format:
    # Skip duplicate runs: run on push to main, or on pull_request events only
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref_name == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      TURBO_CACHE: remote:rw
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24.15.0"

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: "canary"
          install-command: bun install
          install-native-deps: "false"
          install-protoc: "false"
          setup-python: "false"
          skip-avatar-clone: "true"
          no-vision-deps: "true"

      - name: Prompt secret scan
        run: cd packages/prompts && bun run check:secrets

      - name: Check format
        run: bun run format:check

      - name: Run lint
        run: bun run lint

      # Per-plugin mock-LLM e2e coverage. Warn-first (--dry-run exits 0) while
      # the backlog is burned down; flip to enforcing (drop --dry-run, allowlist
      # justified N/A) once plugins carry a withMockLlmRuntime e2e. (#8801)
      - name: Per-plugin e2e coverage (warn-only)
        run: node packages/scripts/lint-lane-coverage.mjs --dry-run

  # Build job
  build:
    # Skip duplicate runs: run on push to main, or on pull_request events only
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref_name == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      TURBO_CACHE: remote:rw
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24.15.0"

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: "canary"
          install-command: bun install
          install-native-deps: "false"
          install-protoc: "false"
          setup-python: "false"
          skip-avatar-clone: "true"
          no-vision-deps: "true"

      - name: Build packages
        run: bun run build:core

  # Dev startup + HMR job: prove `bun run dev` boots to a usable state quickly
  # and that edits at every package dependency depth propagate to the running
  # client over HMR. Guards against startup-time regressions and broken
  # src/-resolution or workspace-source watching.
  dev-startup:
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref_name == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      TURBO_CACHE: remote:rw
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24.15.0"

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: "canary"
          install-command: bun install
          install-native-deps: "false"
          install-protoc: "false"
          setup-python: "false"
          skip-avatar-clone: "true"
          no-vision-deps: "true"

      - name: Build packages
        run: bun run build

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      # The product gate is 60s (the script default enforced on dev machines).
      # Shared CI runners are ~2-4 cores vs a dev workstation, so the CI ceiling
      # is relaxed to 90s — still catches a startup-time doubling, without
      # flaky false-failures. Lower this if runner class improves.
      - name: Dev startup budget (boots + ready under budget)
        env:
          ELIZA_DEV_STARTUP_BUDGET_MS: "90000"
        run: bun run test:dev-startup

      - name: HMR propagation across dependency levels
        run: bun run test:hmr
