      - name: Actual app feature interaction browser coverage
        run: bun run --cwd packages/app test:e2e test/ui-smoke/apps-utility-interactions.spec.ts test/ui-smoke/apps-model-training-interactions.spec.ts test/ui-smoke/apps-comms-device-interactions.spec.ts test/ui-smoke/apps-diagnostics-interactions.spec.ts test/ui-smoke/apps-builtin-pages-interactions.spec.ts test/ui-smoke/settings-sections-interactions.spec.ts test/ui-smoke/settings-mobile-load.spec.ts test/ui-smoke/apps-personal-assistant-decomposed-interactions.spec.ts test/ui-smoke/chat-viewmanager-companion-interactions.spec.ts test/ui-smoke/vault-modal-interactions.spec.ts test/ui-smoke/desktop-workspace-interactions.spec.ts test/ui-smoke/settings-audit-capture.spec.ts test/ui-smoke/settings-chat-control.spec.ts test/ui-smoke/chat-overlay-controls-interactions.spec.ts test/ui-smoke/chat-attachment.spec.ts test/ui-smoke/conversation-management.spec.ts test/ui-smoke/chat-cloud-routed.spec.ts test/ui-smoke/slash-commands.spec.ts test/ui-smoke/model-download-deferral.spec.ts --project=chromium

      - name: Upload app browser feature interaction artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: scenario-pr-app-browser-feature-interactions
          path: |
            packages/app/playwright-report/
            packages/app/test-results/
          if-no-files-found: ignore
          retention-days: 3

  app-browser-cloud-keyless:
    name: Zero-Key app browser cloud keyless
    needs: changes
    if: needs.changes.outputs.run_scenario_pr == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --ignore-scripts --no-frozen-lockfile
          install-native-deps: "false"
          skip-avatar-clone: "true"
          no-vision-deps: "true"

      - name: Ensure generated shared i18n data
        run: node packages/app-core/scripts/ensure-shared-i18n-data.mjs

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Actual app cloud keyless browser coverage
        run: bun run --cwd packages/app test:e2e test/ui-smoke/cloud-provisioning-startup.spec.ts test/ui-smoke/cloud-agent-lifecycle.spec.ts test/ui-smoke/cloud-wallet-import.spec.ts test/ui-smoke/live-agent-chat.spec.ts test/ui-smoke/remote-capability-view.spec.ts --project=chromium

      - name: Upload app browser cloud keyless artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: scenario-pr-app-browser-cloud-keyless
          path: |
            packages/app/playwright-report/
            packages/app/test-results/
          if-no-files-found: ignore
          retention-days: 3

  app-browser-ratcheted:
    name: Zero-Key app browser ratcheted
    needs: changes
    if: needs.changes.outputs.run_scenario_pr == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --ignore-scripts --no-frozen-lockfile
          install-native-deps: "false"
          skip-avatar-clone: "true"
          no-vision-deps: "true"

      - name: Ensure generated shared i18n data
        run: node packages/app-core/scripts/ensure-shared-i18n-data.mjs

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Actual app ratcheted keyless browser coverage
        run: bun run --cwd packages/app test:e2e test/ui-smoke/ai-qa-capture.spec.ts test/ui-smoke/android-system-apps.spec.ts test/ui-smoke/apps-session.spec.ts test/ui-smoke/apps-session-direct-a.spec.ts test/ui-smoke/apps-session-direct-b.spec.ts test/ui-smoke/auth-startup.spec.ts test/ui-smoke/automations.spec.ts test/ui-smoke/browser-workspace.spec.ts test/ui-smoke/computer-use.spec.ts test/ui-smoke/connectors.spec.ts test/ui-smoke/first-run-startup.spec.ts test/ui-smoke/model-download-deferral.spec.ts test/ui-smoke/game-apps.spec.ts test/ui-smoke/history-navigation.spec.ts test/ui-smoke/orchestrator-gui-workbench.spec.ts test/ui-smoke/reset-returns-to-onboarding.spec.ts test/ui-smoke/tutorial-help-views.spec.ts test/ui-smoke/tutorial-help-walkthrough.spec.ts test/ui-smoke/warming-shell-startup.spec.ts test/ui-smoke/runtime-configurability.spec.ts test/ui-smoke/perf-load-kpi.spec.ts test/ui-smoke/screenshare-gui-interactions.spec.ts test/ui-smoke/task-coordinator-gui-interactions.spec.ts test/ui-smoke/terminal-plugin-view-command-contract.spec.ts test/ui-smoke/titlebar-navigation.spec.ts test/ui-smoke/ui-smoke.spec.ts --project=chromium

      - name: Upload app browser ratcheted artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: scenario-pr-app-browser-ratcheted
          path: |
            packages/app/playwright-report/
            packages/app/test-results/
          if-no-files-found: ignore
          retention-days: 3

  app-diagnostics:
    name: Zero-Key app diagnostics
    needs: changes
    if: needs.changes.outputs.run_scenario_pr == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --ignore-scripts --no-frozen-lockfile
          install-native-deps: "false"
          skip-avatar-clone: "true"
          no-vision-deps: "true"

      - name: Ensure generated shared i18n data
        run: node packages/app-core/scripts/ensure-shared-i18n-data.mjs

      - name: Electrobun window and dynamic-view coverage
        run: bun run --cwd packages/app-core/platforms/electrobun test src/native/desktop-window.test.ts src/rpc-handlers.test.ts src/dynamic-view-rpc-schema.test.ts src/surface-windows.test.ts src/dynamic-views/host.test.ts

      - name: View management action coverage
        run: bun run --cwd plugins/plugin-app-control test -- src/actions/views-management.test.ts

      - name: App verification diagnostics coverage
        run: bun run --cwd plugins/plugin-app-control test -- src/services/__tests__/app-verification.integration.test.ts src/services/__tests__/verification-room-bridge.test.ts

      - name: Computer-use screenshot quality diagnostics coverage
        run: bun run --cwd plugins/plugin-computeruse test -- test/helpers/screenshot-quality.test.ts src/__tests__/browser-auto-open.test.ts

      - name: App screenshot quality diagnostics coverage
        run: bun run --cwd packages/app test -- test/screenshot-quality.test.ts

      - name: App-core screenshot quality diagnostics coverage
        run: bun run --cwd packages/app-core test -- test/app/screenshot-quality.test.ts

      - name: Cloud screenshot quality diagnostics coverage
        run: bun run --cwd packages/cloud-frontend test -- tests/e2e/screenshot-quality.test.ts

  scenario-runner-e2e:
    name: Zero-Key scenario runner E2E
    needs: changes
    if: needs.changes.outputs.run_scenario_pr == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --ignore-scripts --no-frozen-lockfile
          install-native-deps: "false"
          skip-avatar-clone: "true"
          no-vision-deps: "true"

      - name: Ensure generated shared i18n data
        run: node packages/app-core/scripts/ensure-shared-i18n-data.mjs

      - name: Scenario catalog coverage gate
        run: node packages/scripts/check-scenario-workflow-coverage.mjs --report-dir reports/scenarios/catalog-inventory

      # E2E coverage gate (issue #8802). Advisory for one cycle (mirrors
      # coverage-gate.yml): the develop-landscape-sensitive ratchets warn but do
      # not fail; the manifested-coverage check is hard. Flip the ratchets to
      # required by setting E2E_COVERAGE_GATE_ENFORCE=1.
      - name: E2E coverage ship-gate
        env:
          E2E_COVERAGE_GATE_ENFORCE: "0"
        run: bun test packages/scripts/__tests__/e2e-coverage.test.ts

      - name: E2E coverage matrix report
        if: always()
        run: bun packages/scripts/check-e2e-coverage.ts --report-dir reports/coverage

      - name: Build workspace packages for scenario resolution
        run: bun run build:core && bunx turbo run build --filter=@elizaos/plugin-github

      - name: Zero-cost scenario e2e
        run: bun run --cwd packages/scenario-runner test:pr:e2e

      - name: Upload scenario report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: scenario-pr-deterministic-report
          path: |
            reports/scenarios/pr-deterministic/
            reports/scenarios/catalog-inventory/
            reports/coverage/
          if-no-files-found: ignore
          retention-days: 3

  deterministic-scenario:
    name: Zero-Key Deterministic E2E
    needs:
      - changes
      - scenario-unit-coverage
      - app-browser-core
      - app-browser-view-lifecycle
      - app-browser-all-pages
      - app-browser-feature-interactions
      - app-browser-cloud-keyless
      - app-browser-ratcheted
      - app-diagnostics
      - scenario-runner-e2e
    if: always() && needs.changes.outputs.run_scenario_pr == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Check deterministic E2E slices
        shell: bash
        run: |
          set -u
          bad=0
          for pair in \
            "scenario-unit-coverage:${{ needs.scenario-unit-coverage.result }}" \
            "app-browser-core:${{ needs.app-browser-core.result }}" \
            "app-browser-view-lifecycle:${{ needs.app-browser-view-lifecycle.result }}" \
            "app-browser-all-pages:${{ needs.app-browser-all-pages.result }}" \
            "app-browser-feature-interactions:${{ needs.app-browser-feature-interactions.result }}" \
            "app-browser-cloud-keyless:${{ needs.app-browser-cloud-keyless.result }}" \
            "app-browser-ratcheted:${{ needs.app-browser-ratcheted.result }}" \
            "app-diagnostics:${{ needs.app-diagnostics.result }}" \
            "scenario-runner-e2e:${{ needs.scenario-runner-e2e.result }}"; do
            name="${pair%%:*}"
            result="${pair##*:}"
            echo "$name: $result"
            if [ "$result" != "success" ]; then
              echo "::error title=Scenario PR E2E::$name finished with $result"
              bad=1
            fi
          done
          if [ "$bad" -ne 0 ]; then
            exit 1
          fi
          echo "All deterministic E2E slices passed."
