name: Test AOSP flasher

on:
  pull_request:
    paths:
      - "packages/os/setup/**"
      - ".github/workflows/test-elizaos-setup.yml"

# Default to least privilege. Override per-job where needed.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: "canary"
      - run: bun install
      - run: bun run --cwd packages/os/setup typecheck
      - run: bun run --cwd packages/os/setup build
      - run: bun run --cwd packages/os/setup test
