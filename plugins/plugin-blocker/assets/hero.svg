<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="Focus">
  <defs>
    <linearGradient id="bg-focus" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#281519"/>
      <stop offset="1" stop-color="#190b0b"/>
    </linearGradient>
    <radialGradient id="blobA-focus" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#da2f51" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#da2f51" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobB-focus" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#c35128" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#c35128" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vig-focus" cx="0.5" cy="0.42" r="0.75">
      <stop offset="0" stop-color="#000000" stop-opacity="0"/>
      <stop offset="0.72" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.5"/>
    </radialGradient>
    <linearGradient id="label-focus" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.55"/>
    </linearGradient>
    <filter id="soft-focus" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="46"/>
    </filter>
    <filter id="iglow-focus" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#ed4567" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg-focus)"/>

  <g opacity="0.9">
    <circle cx="232" cy="220" r="300" fill="url(#blobA-focus)" filter="url(#soft-focus)"/>
    <circle cx="840" cy="800" r="340" fill="url(#blobB-focus)" filter="url(#soft-focus)"/>
  </g>

  <g stroke="#ead7db" stroke-width="1.4" opacity="0.06">
    <line x1="0" y1="256" x2="1024" y2="256"/>
    <line x1="0" y1="512" x2="1024" y2="512"/>
    <line x1="0" y1="768" x2="1024" y2="768"/>
    <line x1="256" y1="0" x2="256" y2="1024"/>
    <line x1="512" y1="0" x2="512" y2="1024"/>
    <line x1="768" y1="0" x2="768" y2="1024"/>
  </g>

  <g opacity="0.5">
    <path d="M120 470 A 400 400 0 0 1 904 470" fill="none" stroke="#ed4567" stroke-width="3" opacity="0.35"/>
  </g>

  <g transform="translate(512 432)" filter="url(#iglow-focus)"
     color="#ead7db" stroke="#ead7db" stroke-width="20"
     stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M0 -150 L130 -100 L130 24 C130 110 70 152 0 175 C-70 152 -130 110 -130 24 L-130 -100 Z"/>
    <circle cx="0" cy="-2" r="34"/>
    <line x1="-92" y1="-96" x2="96" y2="120"/>
  </g>

  <rect x="0" y="784" width="1024" height="240" fill="url(#label-focus)"/>
  <text x="512" y="892" text-anchor="middle"
        font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
        font-size="76" font-weight="600" letter-spacing="0.5"
        fill="#ead7db">Focus</text>
  <rect x="460" y="924" width="104" height="6" rx="3" fill="#ed4567"/>

  <rect width="1024" height="1024" fill="url(#vig-focus)"/>
</svg>