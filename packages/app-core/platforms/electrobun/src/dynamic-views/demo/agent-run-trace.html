<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agent Run Trace Demo</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #101318;
        color: #e6edf3;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        border-bottom: 1px solid #2b323d;
        background: #151a21;
      }

      h1 {
        margin: 0;
        font-size: 14px;
        font-weight: 650;
        flex: 1;
      }

      button {
        height: 30px;
        border: 1px solid #394251;
        background: #202733;
        color: #f1f5f9;
        border-radius: 6px;
        padding: 0 10px;
        font: inherit;
        font-size: 12px;
      }

      main {
        padding: 12px;
        overflow: auto;
      }

      pre {
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        margin: 0;
        font: 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Agent Run Trace Demo</h1>
      <button id="status" type="button">Runtime Status</button>
      <button id="tail" type="button">Tail Events</button>
      <button id="clear" type="button">Clear</button>
    </header>
    <main>
      <pre id="log"></pre>
    </main>
    <script>
      const log = document.getElementById("log");
      let lastRuntimeSequence = 0;

      function append(label, payload) {
        const line = `[${new Date().toISOString()}] ${label} ${JSON.stringify(payload, null, 2)}`;
        log.textContent = `${log.textContent}${line}\n`;
      }

      window.elizaDesktopUI = {
        push(payload) {
          append("view-event", payload);
        },
        reset() {
          log.textContent = "";
        },
      };

      async function request(method, params) {
        const rpc = window.__ELIZA_ELECTROBUN_RPC__;
        if (!rpc?.request?.[method]) {
          append("rpc-unavailable", { method });
          return null;
        }
        return rpc.request[method](params);
      }

      document.getElementById("status").addEventListener("click", async () => {
        try {
          append(
            "runtime.status",
            await request("remotePluginInvokeWorker", {
              id: "eliza.runtime",
              method: "runtime.status",
            }),
          );
        } catch (error) {
          append("runtime.status.error", { message: String(error) });
        }
      });

      document.getElementById("tail").addEventListener("click", async () => {
        try {
          const result = await request("remotePluginTailWorkerEvents", {
            id: "eliza.runtime",
            afterSequence: lastRuntimeSequence,
            limit: 100,
          });
          if (result?.nextSequence) lastRuntimeSequence = result.nextSequence;
          append("runtime.events", result);
        } catch (error) {
          append("runtime.events.error", { message: String(error) });
        }
      });

      document.getElementById("clear").addEventListener("click", () => {
        window.elizaDesktopUI.reset();
      });
    </script>
  </body>
</html>
