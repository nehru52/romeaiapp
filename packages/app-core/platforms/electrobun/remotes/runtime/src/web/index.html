<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Eliza Runtime Remote</title>
		<link rel="stylesheet" href="./index.css" />
	</head>
	<body>
		<main>
			<header>
				<p>ElizaLaunch</p>
				<h1>Runtime Remote</h1>
			</header>
			<section class="fields">
				<label>
					<span>Agent ID</span>
					<input id="agent-id" autocomplete="off" />
				</label>
				<label>
					<span>Conversation ID</span>
					<input id="conversation-id" autocomplete="off" />
				</label>
				<label>
					<span>Message</span>
					<input id="message-text" autocomplete="off" value="Phase 2 ElizaLaunch API bridge smoke test. Reply briefly." />
				</label>
				<label>
					<span>Memory Query</span>
					<input id="memory-query" autocomplete="off" value="test" />
				</label>
				<label>
					<span>Log Limit</span>
					<input id="log-limit" inputmode="numeric" value="80" />
				</label>
			</section>
			<section class="controls">
				<button data-method="runtime.start">Start</button>
				<button data-method="runtime.stop">Stop</button>
				<button data-method="runtime.restart">Restart</button>
				<button data-method="runtime.status">Status</button>
				<button data-method="runtime.health">Health</button>
				<button data-method="runtime.logs.tail">Logs</button>
				<button data-method="api.discover">Discover API</button>
				<button data-method="api.status">API Status</button>
				<button data-method="agent.list">List Agents</button>
				<button data-method="agent.get">Get Agent</button>
				<button data-method="agent.message">Send Test Message</button>
				<button data-method="conversation.list">List Conversations</button>
				<button data-method="conversation.get">Get Conversation</button>
				<button data-method="plugin.list">List Plugins</button>
				<button data-method="memory.search">Search Memory</button>
				<button data-method="config.get">Get Config</button>
				<button data-method="agent.message.stream">Stream Message</button>
				<button data-method="agent.message.stream.cancel">Cancel Stream</button>
				<button data-method="agent.message.stream.status">Stream Status</button>
			</section>
			<section class="stream-panel">
				<div>
					<span>Active Stream</span>
					<code id="active-stream-id">none</code>
				</div>
				<div>
					<span>Latest Snapshot / Action</span>
					<pre id="stream-snapshot">No stream events yet.</pre>
				</div>
				<div>
					<span>Stream Output</span>
					<pre id="stream-output"></pre>
				</div>
			</section>
			<pre id="output">Waiting for Runtime Remote worker...</pre>
		</main>
		<script type="module" src="./index.ts"></script>
	</body>
</html>
