[build-system]
requires = ["hatchling>=1.18"]
build-backend = "hatchling.build"

[project]
# Renamed from "elizaos-mmau" to disambiguate from Salesforce's MMAU agent
# benchmark (arXiv:2407.18961). This package implements the *audio* MMAU
# (Sakshi et al., ICLR 2025, gamma-lab-umd/MMAU-test-mini).
name = "elizaos-mmau-audio"
version = "0.1.0"
description = "Audio MMAU (Massive Multi-task Audio Understanding, Sakshi et al., ICLR 2025) benchmark for elizaOS"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.11"
authors = [
    { name = "ElizaOS Team" }
]
keywords = ["benchmark", "mmau", "audio", "speech", "music", "elizaos"]
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "mypy>=1.8",
    "ruff>=0.5",
]
hf = [
    "datasets>=2.0",
    "soundfile>=0.12",
]
all = [
    "elizaos-mmau-audio[dev,hf]",
]

[project.scripts]
mmau-audio = "elizaos_mmau_audio.cli:main"
elizaos-mmau-audio = "elizaos_mmau_audio.cli:main"
# Kept for backward compatibility with existing invocations; will be
# removed once downstream callers migrate to the disambiguated names.
mmau = "elizaos_mmau_audio.cli:main"
elizaos-mmau = "elizaos_mmau_audio.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["elizaos_mmau_audio"]

[tool.hatch.build.targets.wheel.force-include]
fixtures = "fixtures"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "C4", "SIM"]
ignore = ["E501"]
