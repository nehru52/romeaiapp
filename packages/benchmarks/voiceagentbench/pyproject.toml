[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "elizaos-voiceagentbench"
version = "0.1.0"
description = "VoiceAgentBench - voice-in + tool-call-out + multi-turn benchmark vendored into Eliza."
readme = "README.md"
requires-python = ">=3.11,<3.13"

dependencies = [
  "eliza-lifeops-bench",
]

[project.optional-dependencies]
hf = ["datasets>=2.20.0"]
groq = ["groq>=0.11.0"]
cerebras = ["openai>=1.40.0"]
test = ["pytest>=8.0.0", "pytest-asyncio>=0.23.0"]

[project.scripts]
voiceagentbench = "elizaos_voiceagentbench.__main__:main"

[tool.hatch.build.targets.wheel]
packages = ["elizaos_voiceagentbench"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "-q"
