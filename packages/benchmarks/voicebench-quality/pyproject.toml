[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "elizaos-voicebench"
version = "0.1.0"
description = "VoiceBench (Chen et al. 2024) quality benchmark vendored as native Python for elizaOS, OpenClaw, and Hermes adapters."
readme = "README.md"
requires-python = ">=3.11,<3.13"
license = { text = "Apache-2.0" }

dependencies = [
  "httpx>=0.27.0",
]

[project.optional-dependencies]
hf = [
  "datasets>=2.18.0",
]
test = [
  "pytest>=8.0.0",
]

[project.scripts]
elizaos-voicebench = "elizaos_voicebench.__main__:main"

[tool.hatch.build.targets.wheel]
packages = ["elizaos_voicebench"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
