# OpenClaw Plugin Registry
# Loaded by the gateway on startup

plugins:
  - id: device-pair
    enabled: true
    version: "1.2.0"
    config:
      publicUrl: "https://gw.example.com"
      maxDevices: 5

  - id: telegram
    enabled: true
    version: "1.1.3"
    config:
      botToken: "${TELEGRAM_BOT_TOKEN}"
      allowedUsers:
        - "user_8827341"

  - id: discord
    enabled: false
    version: "1.0.8"
    config:
      botToken: "${DISCORD_BOT_TOKEN}"
      guildIds: []

  - id: web-search
    enabled: true
    version: "0.9.2"
    config:
      provider: "brave"
      apiKey: "${BRAVE_API_KEY}"
