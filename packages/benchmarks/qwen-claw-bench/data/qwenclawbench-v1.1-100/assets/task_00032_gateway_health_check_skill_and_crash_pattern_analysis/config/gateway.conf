# OpenClaw Gateway Configuration
# Last updated: 2026-02-08

[gateway]
host = 127.0.0.1
port = 3578
pid_file = /var/run/openclaw-gateway.pid
log_file = /var/log/openclaw/gateway.log
log_level = info

[health]
endpoint = /healthz
timeout_seconds = 5
max_retries = 3
retry_interval = 2

[restart]
max_restart_attempts = 3
restart_cooldown_seconds = 60
notify_on_restart = true
notify_channel = system

[tls]
enabled = false
cert_path = /etc/openclaw/certs/gateway.crt
key_path = /etc/openclaw/certs/gateway.key
