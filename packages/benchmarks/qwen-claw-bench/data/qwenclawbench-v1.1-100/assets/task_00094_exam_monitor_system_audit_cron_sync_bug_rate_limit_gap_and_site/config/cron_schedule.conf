# PTA Exam Monitor - Cron Schedule Configuration
# Runs every 15 minutes during working hours (9:00 AM - 7:00 PM)
#
# Schedule: */15 9-19 * * *
# Meaning: At minutes 0, 15, 30, 45 of hours 9-19, every day
#
# To install: crontab -e, then add the line below
# Adjust the Python path and script path to your environment

# ── Production schedule ───────────────────────────────────────────
*/15 9-19 * * * cd /Users/Administrator/.openclaw/workspace && /usr/bin/python3 pta_monitor.py >> logs/cron_output.log 2>&1

# ── Optional: Daily summary at end of business ────────────────────
# 0 19 * * * cd /Users/Administrator/.openclaw/workspace && /usr/bin/python3 feishu_notifier.py --daily-summary >> logs/cron_output.log 2>&1

# ── Optional: Weekend maintenance check (once on Saturday morning) ─
# 0 10 * * 6 cd /Users/Administrator/.openclaw/workspace && /usr/bin/python3 pta_monitor.py --health-check >> logs/cron_output.log 2>&1
