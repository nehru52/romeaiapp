# Spark Liquidity Layer monitoring
liquidity_layer:
  subgraph_url: "https://api.thegraph.com/subgraphs/name/spark-protocol/spark-liquidity-layer"
  min_total_tvl_usd: 800000000      # Alert if total TVL drops below $800M
  tvl_drop_pct_threshold: 10         # Alert on >10% TVL drop in 1 hour

# Spark Savings (sUSDS / sUSDC)
savings:
  susds_vault: "0xa3931d71877C0E7a3148CB7Eb4463524FEc27fbD"
  susdc_vault: "0x0000000000000000000000000000000000000000"  # TBD - not yet deployed
  min_savings_tvl_usd: 1500000000
  apy_floor: 0.03                    # Alert if APY drops below 3%

# Alert thresholds
alerts:
  # Percentage change thresholds (1-hour window)
  liquidity_drop_pct: 15             # Alert on >15% drop in available liquidity
  borrow_rate_spike_bps: 200         # Alert on >200bps rate increase
  supply_rate_drop_bps: 150          # Alert on >150bps rate decrease

  # Absolute thresholds
  health_factor_warning: 1.15        # Monitor positions with HF < 1.15
  large_position_usd: 5000000        # Track positions > $5M

# Notification channels
notifications:
  telegram:
    enabled: true
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    chat_id: "${TELEGRAM_CHAT_ID}"
  discord:
    enabled: false
    webhook_url: "${DISCORD_WEBHOOK_URL}"
  email:
    enabled: false
    smtp_host: "smtp.gmail.com"
    smtp_port: 587
    from_addr: "alerts@example.com"
    to_addr: "defi-team@example.com"

# Monitoring schedule
schedule:
  poll_interval_seconds: 300          # Check every 5 minutes
  detailed_report_cron: "0 */6 * * *" # Full report every 6 hours
  daily_summary_cron: "0 9 * * *"     # Daily summary at 9 AM UTC

# Data storage
storage:
  snapshots_dir: "./data/snapshots"
  reports_dir: "./data/reports"
  max_snapshots: 2880                 # Keep 10 days of 5-min snapshots
  export_format: "json"

# Logging
logging:
  level: "INFO"
  file: "./logs/spark-monitor.log"
  max_size_mb: 50
  backup_count: 5
