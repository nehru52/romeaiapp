    primary: "https://eth-mainnet.g.alchemy.com/v2/${ALCHEMY_API_KEY}"
    fallback: "https://rpc.ankr.com/eth"
    chain_id: 1
  gnosis:
    primary: "https://rpc.gnosischain.com"
    fallback: "https://gnosis-mainnet.public.blastapi.io"
    chain_id: 100

