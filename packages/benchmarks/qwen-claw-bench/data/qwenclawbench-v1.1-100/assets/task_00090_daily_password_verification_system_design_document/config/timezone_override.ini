# Production override - standardized to UTC for consistency across regions
# Applied: 2024-10-28 by infrastructure team
# Ticket: OPS-4471 "Standardize timezone handling across all auth services"
# NOTE: This override takes precedence over application-level YAML configs

[auth]
timezone = UTC
password_type = dynamic_daily
max_attempts = 3
lockout_duration_minutes = 15
hash_algorithm = sha256

[logging]
level = DEBUG
include_password_hash = true
log_format = structured_json
output_path = /var/log/auth/override.log

[session]
timeout_minutes = 30
secure_cookie = true
