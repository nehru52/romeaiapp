# Weather Skill Configuration
# Last updated: 2025-01-15

provider: open-meteo
fallback_provider: wttr.in

# API settings
open_meteo:
  base_url: "https://api.open-meteo.com/v1/forecast"
  # Include all available parameters for comprehensive data
  hourly_params:
    - temperature_2m
    - relative_humidity_2m
    - dew_point_2m
    - apparent_temperature
    - pressure_msl
    - surface_pressure
    - cloud_cover
    - cloud_cover_low
    - cloud_cover_mid
    - cloud_cover_high
    - wind_speed_10m
    - wind_speed_80m
    - wind_speed_120m
    - wind_speed_180m
    - wind_direction_10m
    - wind_direction_80m
    - wind_direction_120m
    - wind_direction_180m
    - wind_gusts_10m
    - shortwave_radiation
    - direct_radiation
    - direct_normal_irradiance
    - diffuse_radiation
    - global_tilted_irradiance
    - vapour_pressure_deficit
    - cape
    - evapotranspiration
    - et0_fao_evapotranspiration
    - precipitation
    - snowfall
    - precipitation_probability
    - rain
    - showers
    - weather_code
    - snow_depth
    - freezing_level_height
    - visibility
    - soil_temperature_0cm
    - soil_temperature_6cm
    - soil_temperature_18cm
    - soil_temperature_54cm
    - soil_moisture_0_to_1cm
    - soil_moisture_1_to_3cm
    - soil_moisture_3_to_9cm
    - soil_moisture_9_to_27cm
    - soil_moisture_27_to_81cm
    - is_day
  daily_params:
    - weather_code
    - temperature_2m_max
    - temperature_2m_min
    - apparent_temperature_max
    - apparent_temperature_min
    - sunrise
    - sunset
    - daylight_duration
    - sunshine_duration
    - uv_index_max
    - uv_index_clear_sky_max
    - precipitation_sum
    - rain_sum
    - showers_sum
    - snowfall_sum
    - precipitation_hours
    - precipitation_probability_max
    - wind_speed_10m_max
    - wind_gusts_10m_max
    - wind_direction_10m_dominant
    - shortwave_radiation_sum
    - et0_fao_evapotranspiration
  forecast_days: 7
  timezone: auto

# Output formatting
output:
  # Return raw JSON from API - no filtering
  format: raw
  # Include all fields in response
  filter_fields: false
  # Include metadata (generation time, API version, etc.)
  include_metadata: true
  # Include hourly data for all 7 days (168 data points per param!)
  include_hourly: true
  # Include daily summary
  include_daily: true
  # Include current weather
  include_current: true
  # Truncate: off — send everything
  max_tokens: null

wttr_in:
  base_url: "https://wttr.in"
  format: "j1"
  # j1 format returns full JSON with all fields
