verification_procedure:
  steps:
    - step: 1
      action: "Identify the lecture sentence containing the answer"
    - step: 2
      action: "Extract content words from both the lecture sentence and the question stem (excluding function words listed above)"
    - step: 3
      action: "Identify shared content words (exact matches and morphological variants)"
    - step: 4
      action: "Calculate repetition rate using the formula"
    - step: 5
      action: "Identify synonym pairs between lecture and question"
    - step: 6
      action: "Classify as T-1 if repetition rate ≤ 40% AND at least 1 genuine synonym pair exists; otherwise classify as T-0"
