# Credential Rotation Policy
# Enforced by InfoSec team — see JIRA SEC-442
# All production credentials must be rotated per the schedule below.

policy:
  rotation_interval_days: 90
  grace_period_days: 7
  notification_channels: ["slack", "email"]
  compliance_standard: "SOC2-Type-II"
  enforcement: "advisory"
  escalation_after_days: 14

credentials:
  notification_bot_token:
    last_rotated: "2024-04-15"
    next_rotation: "2024-07-14"
    owner: "@sarah_ops"
    status: "active"
    notes: "Rotate via BotFather /revoke then /newbot"

  transaction_bot_token:
