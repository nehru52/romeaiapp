notes: |
  Historically slow to adopt AI capabilities. Their Q1 2024 product update
  made no mention of AI or ML features. Industry analysts have noted this
  as a growing gap in their offering. Their sales team has been observed
  positioning integrations as a substitute for native AI features.

  Watch for potential pricing moves — they raised Enterprise pricing in
  March 2024 which generated some customer pushback on social media.
