[general]
project_name = Alpha Release Schedule
time_unit = hours
working_hours_per_day = 8
start_date = 2024-01-20
calendar = standard_business

[optimization]
algorithm = greedy
max_iterations = 1000
convergence_threshold = 0.001
enable_parallel = true
priority_rule = longest_path_first
allow_preemption = false
resource_leveling = true

[display]
gantt_color_scheme = default
show_critical_path = true
show_slack = true
time_axis_granularity = 1
export_format = png
chart_width = 1200
chart_height = 600
font_size = 10

[logging]
log_level = INFO
log_file = scheduler.log
rotate_logs = true
max_log_size_mb = 50
