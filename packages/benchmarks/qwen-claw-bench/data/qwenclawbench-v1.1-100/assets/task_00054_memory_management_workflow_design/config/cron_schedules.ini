[memory_cleanup]
# Weekly cleanup of expired and low-priority memories
schedule = 0 2 * * 0
enabled = true
script_path = ./scripts/cleanup.py
timeout_minutes = 30
log_output = ./logs/cleanup_history.log
max_retries = 2
retry_delay_seconds = 300
description = Remove expired memories based on retention policy

[memory_summary]
# Weekly summarization of aging memories before deletion
schedule = 0 6 * * 1
enabled = false
script_path = ./scripts/summarize.py
timeout_minutes = 45
log_output = ./logs/summary_history.log
max_retries = 1
retry_delay_seconds = 600
description = Summarize old memories before they expire

[health_check]
# Periodic health check of memory subsystem
schedule = */30 * * * *
enabled = true
script_path = ./scripts/health_check.py
timeout_minutes = 5
log_output = ./logs/health_check.log
max_retries = 0
description = Check memory store integrity and storage usage

[backup]
# Daily backup of memory store
schedule = 0 3 * * *
enabled = true
script_path = ./scripts/backup.py
timeout_minutes = 15
log_output = ./logs/backup.log
max_retries = 3
retry_delay_seconds = 120
description = Backup memories.json to remote storage
