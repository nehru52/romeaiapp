[SecuritySettings]
auto_lock_timeout = 300
require_physical_presence = true
usb_new_device_policy = block_until_approved
hid_enumeration_interval_seconds = 5
max_simultaneous_hid_devices = 4
log_all_hid_events = true
log_path = /var/log/rpi_hid/hid_events.log

[NetworkInput]
; Network-based input devices
bluetooth_keyboard = allowed
bluetooth_pairing_mode = auto_accept_known
bluetooth_pin_required = false
wifi_keyboard_apps = blocked
remote_desktop_input = blocked

[DeviceApproval]
approval_method = manual
approval_log_path = /var/log/rpi_hid/device_approvals.log
notify_on_new_device = true
notification_channel = whatsapp
quarantine_unknown_devices = true
quarantine_timeout_hours = 24
