; =============================================================================
; Raspberry Pi Assistant - Local Access Control Configuration
; =============================================================================
; Last Modified: 2024-01-10
; Modified By: System Administrator
; =============================================================================

[physical_security]
; Physical location and environmental security settings
location = home_office
room_description = Second floor home office with standard door lock
cable_lock_installed = true
lock_timeout_seconds = 300
auto_lock_on_lid_close = false
tamper_detection = false
surveillance_camera = false

[input_devices]
; Whitelisted USB HID devices by Vendor ID and Product ID
usb_whitelist_enabled = true
keyboard_vid_pid = 046d:c534
keyboard_description = Logitech Unifying Receiver (K270 Wireless Keyboard)
mouse_vid_pid = 046d:c52b
mouse_description = Logitech Unifying Receiver (M185 Wireless Mouse)
allow_new_hid_devices = false
hid_enumeration_logging = true
block_unknown_usb_on_connect = true

[authentication]
; Local authentication settings for physical access sessions
local_pin_required = false
pin_length = 0
pin_lockout_attempts = 0
biometric_enabled = false
session_timeout_minutes = 60
idle_timeout_seconds = 300
require_reauth_for_sensitive_commands = false
sensitive_command_categories = network,security,export,credential

[network]
; Network access settings for the RPi
wifi_interface = wlan0
ethernet_interface = eth0
ssh_enabled = true
ssh_port = 22
ssh_key_auth_only = true
firewall_enabled = true
allowed_inbound_ports = 22,443,8080
vpn_required_for_remote = true

[logging]
; Audit logging configuration
log_all_inputs = true
log_keystrokes = false
log_command_output = true
log_destination = /var/log/rpi_assistant/
log_file_prefix = rpi_access
log_rotation_size_mb = 50
log_retention_days = 365
log_format = [%(asctime)s] [%(levelname)s] [%(source)s] %(message)s
syslog_forwarding = false
remote_log_server = 

[maintenance]
; System maintenance settings
auto_update_enabled = true
update_schedule = weekly
update_day = sunday
update_time = 03:00
backup_enabled = true
backup_schedule = daily
backup_destination = /mnt/backup/rpi_assistant/
backup_encryption = true
