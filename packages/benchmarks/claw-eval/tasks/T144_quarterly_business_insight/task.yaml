task_id: T144_quarterly_business_insight
task_name: Q1 Quarterly Business Insight and Trend Analysis
version: "1.0"
category: workflow
difficulty: medium
tags: [general, multi_service]

services:
  - name: finance
    command: python mock_services/finance/server.py
    port: 9104
    health_check: http://localhost:9104/finance/transactions
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9104/finance/reset
    env:
      FINANCE_FIXTURES: tasks/T144_quarterly_business_insight/fixtures/finance/transactions.json
  - name: crm
    command: python mock_services/crm/server.py
    port: 9110
    health_check: http://localhost:9110/crm/customers
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9110/crm/reset
    env:
      CRM_FIXTURES: tasks/T144_quarterly_business_insight/fixtures/crm/customers.json
  - name: rss
    command: python mock_services/rss/server.py
    port: 9109
    health_check: http://localhost:9109/rss/feeds
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9109/rss/reset
    env:
      RSS_FIXTURES: tasks/T144_quarterly_business_insight/fixtures/rss/feeds.json

prompt:
  text: |
    Q1 is about to end. Please help me create a quarterly business analysis report:
    1. Pull Q1 revenue data for each customer from the finance system and analyze revenue trends (growing/flat/declining)
    2. Review customer information in the CRM (tier, industry, contract status)
    3. Browse industry RSS feeds to understand market trends in each customer's industry
    4. Comprehensive analysis: which customers are growing (why), which are declining (what risks), reasons for churned customers
    5. Output Q2 forecast and recommendations
  language: en

tools:
  - name: finance_list_transactions
    description: View transaction records
    input_schema:
      type: object
      properties:
        start_date:
          type: string
          description: "Start date (YYYY-MM-DD)"
        end_date:
          type: string
          description: "End date (YYYY-MM-DD)"
      required: []

  - name: finance_get_transaction
    description: Get transaction details
    input_schema:
      type: object
      properties:
        transaction_id:
          type: string
          description: Transaction ID
      required: [transaction_id]

  - name: crm_list_customers
    description: List customers
    input_schema:
      type: object
      properties:
        status:
          type: string
          description: "Customer status filter"
        tier:
          type: string
          description: "Customer tier filter"
      required: []

  - name: crm_get_customer
    description: Get customer details
    input_schema:
      type: object
      properties:
        customer_id:
          type: string
          description: Customer ID
      required: [customer_id]

  - name: rss_list_feeds
    description: List RSS feed sources
    input_schema:
      type: object
      properties: {}
      required: []

  - name: rss_get_feed
    description: Get RSS feed article list
    input_schema:
      type: object
      properties:
        feed_id:
          type: string
          description: Feed source ID
      required: [feed_id]

  - name: rss_get_article
    description: Get article details
    input_schema:
      type: object
      properties:
        article_id:
          type: string
          description: Article ID
      required: [article_id]

tool_endpoints:
  - tool_name: finance_list_transactions
    url: http://localhost:9104/finance/transactions
    method: POST
  - tool_name: finance_get_transaction
    url: http://localhost:9104/finance/transactions/get
    method: POST
  - tool_name: crm_list_customers
    url: http://localhost:9110/crm/customers
    method: POST
  - tool_name: crm_get_customer
    url: http://localhost:9110/crm/customers/get
    method: POST
  - tool_name: rss_list_feeds
    url: http://localhost:9109/rss/feeds
    method: POST
  - tool_name: rss_get_feed
    url: http://localhost:9109/rss/feeds/get
    method: POST
  - tool_name: rss_get_article
    url: http://localhost:9109/rss/articles/get
    method: POST

environment:
  timeout_seconds: 600
  max_turns: 30

scoring_components:
  - name: data_analysis
    weight: 0.35
    check:
      type: llm_judge
      description: "Whether Q1 revenue trend analysis is accurate (classification and quantification of growth/flat/decline)"
  - name: industry_correlation
    weight: 0.35
    check:
      type: llm_judge
      description: "Depth of correlation analysis between customer revenue changes and industry RSS dynamics"
  - name: insight_quality
    weight: 0.30
    check:
      type: llm_judge
      description: "Reasonableness and actionability of Q2 forecast and recommendations"

safety_checks: []
expected_actions: []

judge_rubric: |
  Evaluate the quality of the assistant's Q1 quarterly business analysis report.

  ## Correct Revenue Analysis
  | Customer | Jan | Feb | Mar | Q1 Total | Trend |
  |----------|------|------|------|----------|-------|
  | CUS-901 Dingxin Software (VIP) | 85k | 90k | 95k | 270k | Growing (+11.8%) |
  | CUS-902 Hanhai E-Commerce | 45k | 45k | 45k | 135k | Flat |
  | CUS-903 Wantong Logistics (VIP) | 120k | 120k | 115k | 355k | Slight decline (-4.2%) |
  | CUS-904 Qianfeng Tech | 30k | 30k | 25k | 85k | Declining (-16.7%) |
  | CUS-905 Sunlight Media (VIP) | 60k | 65k | 70k | 195k | Growing (+16.7%) |
  | CUS-906 Public Institution | 0 | 0 | 0 | 0 | Churned |

  ## Industry Correlation Analysis
  - Dingxin (Software) <-> RSS-901: Software industry Q1 growth 12% -> explains Dingxin's growth
  - Hanhai (E-Commerce) <-> RSS-902: E-commerce traffic growth slowing -> explains flat revenue
  - Wantong (Logistics) <-> RSS-903: Logistics price competition intense -> explains price sensitivity and slight decline
  - Qianfeng (Manufacturing) <-> RSS-904: Manufacturing IT budgets tightening -> explains downgrade and decline
  - Sunlight (Media) <-> RSS-905: Media AI-driven growth -> explains rapid growth
  - Public (Government) <-> RSS-906: Government budget adjustments -> explains churn reason

  ## Risks and Opportunities
  - Risk: CUS-904 contract expiring in April + declining trend + industry headwinds -> likely to churn
  - Risk: CUS-903 VIP but price-sensitive, needs attention
  - Opportunity: CUS-905 strong growth momentum, can upsell value-added services
  - Opportunity: CUS-901 continuous expansion purchases, VIP value increasing

  Scoring:
  - 0.8-1.0: Revenue analysis accurate, industry correlations thorough (at least 4 pairs), reasonable forecast
  - 0.5-0.7: Revenue analysis roughly correct, some industry correlations made
  - 0.2-0.4: Only listed data without analysis
  - 0.0-0.1: Analysis incomplete or data errors

reference_solution: |
  1. finance_list_transactions() -> 15 Q1 transactions
  2. crm_list_customers() -> 6 customers (including 1 churned)
  3. Summarize monthly revenue by customer, calculate month-over-month trends
  4. rss_list_feeds() -> 2 RSS sources
  5. rss_get_feed(feed_01) + rss_get_feed(feed_02) -> 8 articles
  6. Per-customer + industry correlation analysis
  7. Output report: revenue trend table + industry correlation + risk alerts + Q2 recommendations

primary_dimensions: [completion, robustness, communication]
