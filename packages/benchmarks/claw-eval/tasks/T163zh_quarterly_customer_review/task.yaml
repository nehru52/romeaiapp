task_id: T163zh_quarterly_customer_review
task_name: Q1重点客户季度回顾报告
version: "1.0"
category: workflow
difficulty: hard
tags: [general, multi_service]

services:
  - name: gmail
    command: python mock_services/gmail/server.py
    port: 9100
    health_check: http://localhost:9100/gmail/messages
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9100/gmail/reset
    env:
      GMAIL_FIXTURES: tasks/T163zh_quarterly_customer_review/fixtures/gmail/inbox.json
  - name: contacts
    command: python mock_services/contacts/server.py
    port: 9103
    health_check: http://localhost:9103/contacts/search
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9103/contacts/reset
    env:
      CONTACTS_FIXTURES: tasks/T163zh_quarterly_customer_review/fixtures/contacts/contacts.json
  - name: finance
    command: python mock_services/finance/server.py
    port: 9104
    health_check: http://localhost:9104/finance/transactions
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9104/finance/reset
    env:
      FINANCE_FIXTURES: tasks/T163zh_quarterly_customer_review/fixtures/finance/transactions.json
  - name: rss
    command: python mock_services/rss/server.py
    port: 9109
    health_check: http://localhost:9109/rss/feeds
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9109/rss/reset
    env:
      RSS_FIXTURES: tasks/T163zh_quarterly_customer_review/fixtures/rss/feeds.json
  - name: crm
    command: python mock_services/crm/server.py
    port: 9110
    health_check: http://localhost:9110/crm/customers
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9110/crm/reset
    env:
      CRM_FIXTURES: tasks/T163zh_quarterly_customer_review/fixtures/crm/customers.json

prompt:
  text: |
    Q1结束了，请帮我为6个重点客户做季度回顾：
    1. 查看每个客户的Q1财务数据
    2. 查看CRM中的客户信息和满意度
    3. 检查邮件中的沟通记录
    4. 浏览行业动态了解客户所在行业趋势
    5. 查找对应客户经理联系方式
    6. 输出客户回顾报告，标注风险和增长机会
  language: zh

tools:
  - name: finance_list_transactions
    description: 查看交易记录
    input_schema:
      type: object
      properties:
        start_date:
          type: string
          description: "起始日期(YYYY-MM-DD)"
        end_date:
          type: string
          description: "截止日期(YYYY-MM-DD)"
      required: []

  - name: finance_get_transaction
    description: 获取交易详情
    input_schema:
      type: object
      properties:
        transaction_id:
          type: string
          description: 交易ID
      required: [transaction_id]

  - name: crm_list_customers
    description: 列出客户
    input_schema:
      type: object
      properties:
        status:
          type: string
          description: "客户状态筛选"
        tier:
          type: string
          description: "客户等级筛选(vip/standard)"
      required: []

  - name: crm_get_customer
    description: 获取客户详情
    input_schema:
      type: object
      properties:
        customer_id:
          type: string
          description: 客户ID
      required: [customer_id]

  - name: gmail_list_messages
    description: 获取收件箱邮件列表
    input_schema:
      type: object
      properties:
        days_back:
          type: integer
          description: 获取最近几天的邮件
          default: 30
        max_results:
          type: integer
          description: 最大返回数量
          default: 20
      required: []

  - name: gmail_get_message
    description: 根据邮件ID获取邮件详情
    input_schema:
      type: object
      properties:
        message_id:
          type: string
          description: 邮件ID
      required: [message_id]

  - name: rss_list_feeds
    description: 列出RSS订阅源
    input_schema:
      type: object
      properties: {}
      required: []

  - name: rss_get_feed
    description: 获取RSS源文章列表
    input_schema:
      type: object
      properties:
        feed_id:
          type: string
          description: 订阅源ID
      required: [feed_id]

  - name: rss_get_article
    description: 获取文章详情
    input_schema:
      type: object
      properties:
        article_id:
          type: string
          description: 文章ID
      required: [article_id]

  - name: contacts_search
    description: 搜索内部通讯录
    input_schema:
      type: object
      properties:
        query:
          type: string
          description: 搜索关键词
        department:
          type: string
          description: 按部门筛选
      required: [query]

  - name: contacts_get
    description: 获取联系人详情
    input_schema:
      type: object
      properties:
        contact_id:
          type: string
          description: 联系人ID
      required: [contact_id]

tool_endpoints:
  - tool_name: finance_list_transactions
    url: http://localhost:9104/finance/transactions
    method: POST
  - tool_name: finance_get_transaction
    url: http://localhost:9104/finance/transactions/get
    method: POST
  - tool_name: crm_list_customers
    url: http://localhost:9110/crm/customers
    method: POST
  - tool_name: crm_get_customer
    url: http://localhost:9110/crm/customers/get
    method: POST
  - tool_name: gmail_list_messages
    url: http://localhost:9100/gmail/messages
    method: POST
  - tool_name: gmail_get_message
    url: http://localhost:9100/gmail/messages/get
    method: POST
  - tool_name: rss_list_feeds
    url: http://localhost:9109/rss/feeds
    method: POST
  - tool_name: rss_get_feed
    url: http://localhost:9109/rss/feeds/get
    method: POST
  - tool_name: rss_get_article
    url: http://localhost:9109/rss/articles/get
    method: POST
  - tool_name: contacts_search
    url: http://localhost:9103/contacts/search
    method: POST
  - tool_name: contacts_get
    url: http://localhost:9103/contacts/get
    method: POST

environment:
  timeout_seconds: 600
  max_turns: 40

scoring_components:
  - name: customer_analysis
    weight: 0.35
    check:
      type: llm_judge
      description: "6个客户的Q1财务数据、CRM信息、邮件沟通的综合分析准确性"
  - name: risk_opportunity
    weight: 0.35
    check:
      type: llm_judge
      description: "风险客户(CUS-1604流失风险、CUS-1602投诉)和增长客户(CUS-1603、CUS-1601、CUS-1605)的识别准确度"
  - name: report_quality
    weight: 0.30
    check:
      type: llm_judge
      description: "客户回顾报告的完整性、结构化程度、行业关联分析和客户经理对应关系"

safety_checks: []

expected_actions: []

judge_rubric: |
  评估助手为6个重点客户完成的Q1季度回顾报告质量。

  ## 正确的Q1收入分析
  | 客户 | 1月 | 2月 | 3月 | Q1总计 | 趋势 |
  |------|------|------|------|--------|------|
  | CUS-1601 鼎新软件(VIP) | 80k | 85k | 90k | 255k | ↑持续增长(+12.5%) |
  | CUS-1602 瀚海电商 | 50k | 50k | 45k | 145k | ↓轻微下降(-10%) |
  | CUS-1603 万通物流(VIP) | 120k | 125k | 130k | 375k | ↑稳定增长(+8.3%) 最大客户 |
  | CUS-1604 前锋科技 | 35k | 30k | 0k | 65k | ↓↓3月零收入，严重下降 |
  | CUS-1605 阳光传媒(VIP) | 60k | 65k | 70k | 195k | ↑快速增长(+16.7%) |
  | CUS-1606 公共机构 | 40k | 40k | 40k | 120k | →持平 |

  ## CRM关键信息
  - CUS-1604: 满意度仅2.5/5，合同2026-04-15到期(不到1个月)
  - CUS-1602: 满意度3.2/5，合同2026-06-30到期，有投诉
  - CUS-1603: 满意度4.8/5最高，VIP最大客户
  - CUS-1601: 满意度4.5/5，VIP，续约积极

  ## 邮件沟通线索
  - 鼎新软件: 积极沟通(续约讨论+项目汇报)
  - 瀚海电商: 有投诉(响应慢)+功能咨询
  - 万通物流: 高度满意+讨论扩展
  - 前锋科技: 1月后无任何沟通(沟通中断)
  - 阳光传媒: 季度复盘+AI应用效果好
  - 公共机构: 2月询问预算方案

  ## 行业动态关联
  - 鼎新(软件) ↔ RSS-1601(软件行业高增长) → 行业红利
  - 瀚海(电商) ↔ RSS-1602(电商竞争加剧) → 行业承压
  - 万通(物流) ↔ RSS-1603(物流数字化增加) → 行业利好
  - 前锋(制造) ↔ RSS-1604(制造业IT预算缩减) → 行业逆风
  - 阳光(传媒) ↔ RSS-1605(传媒AI黄金期) → 行业红利
  - 公共(政府) ↔ RSS-1606(政府信息化稳步推进) → 行业持平

  ## 风险与增长机会
  - 高风险: CUS-1604 — 3月零收入+满意度2.5+合同4月15日到期+沟通中断+行业逆风=高流失风险
  - 中风险: CUS-1602 — 收入下降+满意度3.2+有投诉+行业承压
  - 高增长: CUS-1603 — 最大客户+稳定增长+满意度4.8+讨论扩展+行业利好
  - 增长: CUS-1601 — 持续增长+VIP+续约积极+行业红利
  - 增长: CUS-1605 — 快速增长+AI应用成效+行业红利
  - 稳定: CUS-1606 — 持平无风险无增长

  ## 客户经理对应
  - 赵蕾: CUS-1601, CUS-1603, CUS-1605 (VIP客户)
  - 张伟: CUS-1602, CUS-1604, CUS-1606 (标准客户)

  评分：
  - 0.8-1.0: 6客户收入分析准确+风险/增长识别完整+行业关联到位+客户经理对应正确
  - 0.5-0.7: 大部分分析正确，识别了主要风险和增长客户
  - 0.2-0.4: 仅列出数据但缺乏综合分析
  - 0.0-0.1: 分析不完整或数据错误严重

reference_solution: |
  1. finance_list_transactions() → 获取Q1全部17笔交易
  2. crm_list_customers() → 6个客户基本信息
  3. 逐客户crm_get_customer() → 满意度、合同到期日等详情
  4. gmail_list_messages() → 10封邮件
  5. 逐封gmail_get_message() → 获取邮件详情了解沟通情况
  6. rss_list_feeds() → 2个RSS源
  7. rss_get_feed(feed_01) + rss_get_feed(feed_02) → 8篇文章
  8. 逐客户行业匹配RSS文章
  9. contacts_search("赵蕾") + contacts_search("张伟") → 客户经理联系方式
  10. 综合分析输出报告：
      - 每客户：收入趋势 + 满意度 + 沟通记录 + 行业动态 + 客户经理
      - 风险标注：CUS-1604(高流失)、CUS-1602(中风险)
      - 增长标注：CUS-1603(最大+稳增)、CUS-1601(持续增长)、CUS-1605(快速增长)
      - 稳定：CUS-1606

primary_dimensions: [completion, robustness, communication]
