task_id: T131zh_order_profit_analysis
task_name: 订单利润分析
version: "1.0"
category: ops
difficulty: medium
tags: [general, multi_service]

services:
  - name: finance
    command: python mock_services/finance/server.py
    port: 9104
    health_check: http://localhost:9104/finance/transactions
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9104/finance/reset
    env:
      FINANCE_FIXTURES: tasks/T131zh_order_profit_analysis/fixtures/finance/transactions.json
  - name: inventory
    command: python mock_services/inventory/server.py
    port: 9108
    health_check: http://localhost:9108/inventory/products
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9108/inventory/reset
    env:
      INVENTORY_FIXTURES: tasks/T131zh_order_profit_analysis/fixtures/inventory/items.json
  - name: crm
    command: python mock_services/crm/server.py
    port: 9110
    health_check: http://localhost:9110/crm/customers
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9110/crm/reset
    env:
      CRM_FIXTURES: tasks/T131zh_order_profit_analysis/fixtures/crm/customers.json

prompt:
  text: |
    请帮我分析各客户订单的利润情况：
    1. 从CRM获取每个客户的最近订单和产品组合
    2. 从库存系统查每个产品的成本价
    3. 从财务系统核对收款状态
    4. 计算每个客户的订单利润率 = (售价-成本)/售价
    5. 标注收款异常（欠款、退款等）
    6. 输出客户利润分析报告
  language: zh

tools:
  - name: crm_list_customers
    description: 列出客户
    input_schema:
      type: object
      properties:
        status:
          type: string
          description: "客户状态(active/churned)"
        tier:
          type: string
          description: "客户等级(vip/standard)"
      required: []

  - name: crm_get_customer
    description: 获取客户详情
    input_schema:
      type: object
      properties:
        customer_id:
          type: string
          description: 客户ID
      required: [customer_id]

  - name: inventory_list_items
    description: 查看库存/产品列表
    input_schema:
      type: object
      properties:
        category:
          type: string
          description: 按分类筛选
      required: []

  - name: inventory_get_item
    description: 获取产品详情
    input_schema:
      type: object
      properties:
        product_id:
          type: string
          description: 产品ID
      required: [product_id]

  - name: finance_list_transactions
    description: 查看交易记录
    input_schema:
      type: object
      properties:
        start_date:
          type: string
          description: "起始日期(YYYY-MM-DD)"
        end_date:
          type: string
          description: "截止日期(YYYY-MM-DD)"
      required: []

  - name: finance_get_transaction
    description: 获取交易详情
    input_schema:
      type: object
      properties:
        transaction_id:
          type: string
          description: 交易ID
      required: [transaction_id]

tool_endpoints:
  - tool_name: crm_list_customers
    url: http://localhost:9110/crm/customers
    method: POST
  - tool_name: crm_get_customer
    url: http://localhost:9110/crm/customers/get
    method: POST
  - tool_name: inventory_list_items
    url: http://localhost:9108/inventory/products
    method: POST
  - tool_name: inventory_get_item
    url: http://localhost:9108/inventory/products/get
    method: POST
  - tool_name: finance_list_transactions
    url: http://localhost:9104/finance/transactions
    method: POST
  - tool_name: finance_get_transaction
    url: http://localhost:9104/finance/transactions/get
    method: POST

environment:
  timeout_seconds: 600
  max_turns: 30

scoring_components:
  - name: profit_calculation
    weight: 0.35
    check:
      type: llm_judge
      description: "每个客户的利润率计算是否准确"
  - name: payment_analysis
    weight: 0.35
    check:
      type: llm_judge
      description: "是否发现CUS-802欠款30000和CUS-803退款20000"
  - name: report_quality
    weight: 0.30
    check:
      type: llm_judge
      description: "利润分析报告的结构和洞察质量"

safety_checks: []

expected_actions: []

judge_rubric: |
  评估助手的订单利润分析质量。

  ## 正确的利润计算

  CUS-801 鼎新(VIP):
  - 产品: PROD-01(成本8k)+PROD-02(成本20k)+PROD-03(成本15k) = 成本43k
  - 售价: 180k
  - 利润: 180k-43k=137k, 利润率76.1%
  - 收款: TXN-811 180k completed → 全额到账 ✓

  CUS-802 瀚海:
  - 产品: PROD-01(成本8k)+PROD-04(成本12k) = 成本20k
  - 售价: 80k
  - 利润: 80k-20k=60k, 利润率75%
  - 收款: TXN-812 50k completed → 只到50k，欠款30k ✗

  CUS-803 万通(VIP):
  - 产品: PROD-02(20k)+PROD-03(15k)+PROD-05(5k)+PROD-06(10k) = 成本50k
  - 售价: 250k
  - 利润: 250k-50k=200k, 利润率80%
  - 收款: TXN-813 250k - TXN-814退款20k = 净收230k ✗ 有退款

  CUS-804 前锋:
  - 产品: PROD-01(成本8k)
  - 售价: 30k
  - 利润: 30k-8k=22k, 利润率73.3%
  - 收款: TXN-815 30k completed → 全额到账 ✓

  评分：
  - 0.8-1.0: 4个客户利润率正确，2个收款异常标注
  - 0.5-0.7: 大部分计算正确，发现至少1个异常
  - 0.2-0.4: 计算有误或遗漏异常
  - 0.0-0.1: 未完成分析

reference_solution: |
  1. crm_list_customers() → 4个客户
  2. 逐个查看客户订单详情
  3. inventory查产品成本: PROD-01~06
  4. finance查收款: TXN-811~815
  5. 计算利润率并标注收款异常
  6. 输出报告

primary_dimensions: [completion, robustness, communication]
