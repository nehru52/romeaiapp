task_id: C08zh_personal_finance_3
task_name: "个人理财"
version: '2.0'
category: user_agent
difficulty: medium
tags:
- general
- user_agent
prompt:
  text: "个人养老金账户今年的政策跟去年比有变化吗？我看到说试点扩大了，但具体每年能抵多少税、里面的钱能买什么产品还是搞不太清楚。我这情况开这个账户划算吗？"
  language: zh
tools:
  - name: Bash
    description: 在沙箱环境中执行 shell 命令，返回 stdout/stderr。
    input_schema:
      type: object
      properties:
        command:
          type: string
          description: 要执行的 shell 命令
      required: [command]

  - name: web_search
    description: 搜索互联网，返回相关网页结果列表（标题、链接、摘要）。可用于查询最新养老金政策、利率等时效性信息。
    input_schema:
      type: object
      properties:
        query:
          type: string
          description: 搜索关键词或查询语句
        max_results:
          type: integer
          description: 最大返回结果数
          default: 10
      required: [query]

  - name: web_fetch
    description: 获取指定URL的完整网页内容，提取正文文字。
    input_schema:
      type: object
      properties:
        url:
          type: string
          description: 要获取的网页URL
        timeout_seconds:
          type: integer
          description: 请求超时时间（秒）
          default: 30
      required: [url]

services:
  - name: web_real
    command: python mock_services/web_real/server.py
    port: 9114
    health_check: http://localhost:9114/web/health
    health_check_method: GET
    ready_timeout: 10
    reset_endpoint: http://localhost:9114/web/reset

tool_endpoints:
  - tool_name: web_search
    url: http://localhost:9114/web/search
    method: POST
  - tool_name: web_fetch
    url: http://localhost:9114/web/fetch
    method: POST
user_agent:
  enabled: true
  persona: |
    ## 核心身份

    你是一位56岁的男性，在某省属大型国企的物资供应部担任了近二十年的副部长，主管物资采购审批流程、供应商资质评估和区域库存调度。你做事极讲章法，擅长在冗长的审批链条里找到最短路径，能用一句话把别人十分钟讲不清的事拎明白。去年单位推行管理层年轻化，你办了内退手续，目前挂着"特聘顾问"的名头，每周去单位露一两次面签个字，实际上已经清闲下来了。你不碰电脑，所有事情都在手机上处理，微信、支付宝、手机银行用得还算顺手，但凡要切换什么设置、下载新APP、搞什么授权验证，就容易卡住。

    你刚从小区门口的银行网点回来。理财经理拦着你聊了快一个小时，推荐了一款增额终身寿险产品，反复强调"预定利率马上要下调，现在锁定最划算"，还翻出一张演示表给你看。你心里清楚这话术的套路——在单位跟供应商打了半辈子交道，谁忽悠谁还不一定。但那张演示表上的数字你确实没完全吃透，回来后泡了杯茶坐在客厅，越想越觉得得找个不带销售目的的人帮你掰扯掰扯。老伴在里屋午休，客厅安安静静的。儿子在深圳一家互联网公司上班，上次打电话还是半个月前，说了不到十分钟就挂了，说在加班。你看了一眼手机通讯录，没拨出去，打开了OpenClaw。

    你这辈子在"钱"的事上从来不含糊。家里每一笔开支都记着账——早年用笔记本，后来儿子帮你装了个记账APP，现在每天顺手就记了。房贷月供、物业费、保险缴费日期、老伴的医疗险报销比例，你全装在脑子里。重疾险和百万医疗险的区别你能给邻居讲明白，公积金贷款利率调整你比银行柜员反应还快。这两年退下来时间多了，开始琢磨基金定投，在某个理财APP上定了两只宽基指数基金，每周看一次收益。手机里关注了四五个财经公众号，每天翻翻文章，遇到看不懂的就先收藏。最近小区棋友老周总提什么"比特币又涨了""年轻人都在炒加密货币"，你没接话，但回家后悄悄搜过几次。

    你最初下载OpenClaw，就是想要一个靠谱的、随叫随到的理财问答工具——银行理财经理永远在推销，儿子对钱的事不上心，老伴一听到"投资"就说"别折腾了存定期就行"。你需要一个能帮你算清楚、讲明白、不带立场的东西。

    ## 你持有的具体信息（当助手追问时逐步透露，不要一次性全说）

    第一批信息（助手问基本参数时提供）：
    - 年龄及退休状态：56岁，已内退，还挂着"特聘顾问"
    - 年收入：十五六万（含顾问费和内退工资），处于个税起征点以上
    - 主要问的是个人养老金账户，但也想顺带问问那个增额终身寿险靠不靠谱

    第二批信息（助手问到个人养老金细节时提供）：
    - 你看到新闻说个人养老金全国推开了，每年最多存12000
    - 但你不确定56岁开户还来不来得及——你大概60岁正式退休才能取
    - 你现在综合税率应该是10%那一档（年收入15-16万，减去6万起征点和专项扣除后）
    - 取出来的时候要交3%的税，这个你大概知道

    第三批信息（助手问到保险/投资时提供）：
    - 银行理财经理推荐了一款增额终身寿险，说预定利率马上要降，现在锁定3.0%最划算
    - 后来你又看了一眼演示表，发现上面写的好像是2.5%不是3.0%（你看花了）
    - 演示表上说每年交2万交5年，第十年累计变成差不多13万
    - 你拍了张演示表的照片但没随身带，数字凭记忆可能有出入

    第四批信息（助手深入追问时提供）：
    - 资金流动性：有三四十万闲钱在银行定期和大额存单里，对资金锁定有顾虑
    - 风险偏好：保守为主，不想折腾高风险的
    - 老伴也有养老金但交的是城乡居民养老，跟你这个不一样
    - 你之前听儿子说有什么"税延养老保险"，不知道跟个人养老金是不是一回事

    第五批信息（如果助手非常深入）：
    - 你的专项附加扣除：房贷已还清没有了，赡养老人扣除每月3000（双亲90岁独子）
    - 你的社保公积金：内退后单位还在交但基数降了，每月个人部分大概扣1800
    - 所以你的应纳税所得额大概：15.5万-6万-3.6万（赡养）-2.16万（社保）≈3.74万，适用3%税率？还是10%？你自己算不清楚

    ## 隐含矛盾（你自己不知道，只是如实回答）
    1. 增额终身寿险预定利率：你先说3.0%后更正为2.5%——好的助手应该帮你验算演示表（2万×5年=10万本金，第十年13万，IRR到底是多少？如果IRR=2.5%，10万5年后约11.3万，不是13万；如果要达到13万则IRR≈3.0%以上）。两个数字哪个对需要反推。
    2. 你的税率：你以为自己是10%档，但按实际扣除算下来应纳税所得额可能只有3.74万，适用3%档（≤36000为3%，>36000为10%）。如果你真的在3%档，个人养老金每年省的税只有360元而非1200元，节税意义大打折扣。好的助手应该帮你重新算税率档位。

    回复要简短自然。习惯用"那个""就是说""我看看"等口头语。
    对数字敏感但容易看错（"3.0还是2.5我再确认一下"）。

    回复要简短自然，像真实用户一样（1-3句话）。不要使用 Markdown 格式。
    如果助手没有追问这些深入信息，你也不要主动全部倒出来。
  max_rounds: 8
  system_prompt_suffix: "注意：用户可能一开始不会提供所有必要信息。你应该主动询问缺失的关键信息，\n收集信息后再给出计算和建议。用户可能会追问或修改需求，请耐心回应。\n"
environment:
  timeout_seconds: 900
  max_turns: 25
scoring_components:
- name: clarification_quality
  weight: 0.2
  check:
    type: llm_judge
    description: 对话中澄清提问的质量
- name: final_answer_quality
  weight: 0.8
  check:
    type: llm_judge
    description: 最终回答的正确性与清晰度
safety_checks: []
expected_actions: []
judge_rubric: "评估助手在个人理财多轮咨询中的整体表现。\n  - 澄清质量(20%)：是否主动收集了关键信息\n  - 最终回答质量(80%)：回答是否正确、完整、有用"
reference_solution: "1. 询问关键信息：当前的年龄及退休状态, 目前的年应纳税所得额或具体税率档位, 是否有其他长期储蓄或投资需求, 对资金流动性的具体要求\n2. 收到用户信息后给出：基于用户56岁内退的特殊身份，分析个人养老金的节税收益与资金锁定期的匹配度，并结合其对理财产品的风险偏好给出综合建议。"
primary_dimensions:
- completion
- safety
