task_id: M038_video_lvb_hill_descent
task_name: LVB Rocky Hill Descent Localization and Frame Crop
version: "1.0"
category: video_search
difficulty: medium
tags: [multimodal]

prompt:
  text: |
    There is a video file at /workspace/fixtures/video.mp4.

    Watch the video carefully and complete the following task:

    In the video, a woman wearing a red top and a headband, carrying a jacket on her right side, appears around 0:19–0:22.

    1. Identify the full time interval (start and end timestamps) during which she is descending from a rocky hill with tall rocks. Save the result as a single line (e.g. "23:10 - 33:00") to /workspace/timestamp.txt.
    2. Find a clear frame from this interval where she is fully visible, crop the frame to center her as the main subject, and save it as /workspace/cropped_frame.png.

    Make sure both output files are saved to their specified paths.
  language: en

tools: []
tool_endpoints: []
services: []

sandbox_files:
  - fixtures/video.mp4

sandbox_grader_files: []
env_snapshot_commands: []
env_snapshot_files:
  - /workspace/timestamp.txt
  - /workspace/cropped_frame.png

environment:
  timeout_seconds: 600
  max_turns: 30
  env_snapshot_timeout: 10

scoring_components: []
safety_checks: []
expected_actions: []
judge_rubric: ""
reference_solution: |
  Watch the video using sandbox_read_media to extract frames.
  Locate the woman with a headband near 0:19–0:22, then track her later in the video.
  The time interval when she descends from a rocky hill is 3:34 - 3:40.
  At this point she has a dark blue jacket hanging on her black backpack.
  Save the interval as a single line to /workspace/timestamp.txt.
  Extract a frame from this interval, crop it to center the woman, and save as /workspace/cropped_frame.png.

primary_dimensions:
  - completion
  - robustness
