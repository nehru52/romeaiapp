task_id: T125zh_meeting_action_items
task_name: 会议行动项提取与去重
version: "1.0"
category: workflow
difficulty: medium
tags: [general, multi_service]

services:
  - name: notes
    command: python mock_services/notes/server.py
    port: 9105
    health_check: http://localhost:9105/notes/list
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9105/notes/reset
    env:
      NOTES_FIXTURES: tasks/T125zh_meeting_action_items/fixtures/notes/meetings.json
  - name: todo
    command: python mock_services/todo/server.py
    port: 9102
    health_check: http://localhost:9102/todo/tasks
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9102/todo/reset
    env:
      TODO_FIXTURES: tasks/T125zh_meeting_action_items/fixtures/todo/tasks.json

prompt:
  text: |
    最近开了几次重要会议，请帮我：
    1. 查看所有会议纪要，提取其中的行动项
    2. 查看当前待办清单
    3. 将会议行动项与现有待办对比，找出已有对应待办的（避免重复创建）
    4. 列出需要新建的待办事项
    5. 输出完整的行动项跟踪表（含来源会议、负责人、截止日期、是否已有待办）
  language: zh

tools:
  - name: notes_list
    description: 列出会议纪要
    input_schema:
      type: object
      properties:
        tag:
          type: string
          description: 按标签筛选
      required: []

  - name: notes_get
    description: 获取纪要详情
    input_schema:
      type: object
      properties:
        note_id:
          type: string
          description: 纪要ID
      required: [note_id]

  - name: todo_list_tasks
    description: 查看待办事项列表
    input_schema:
      type: object
      properties:
        status:
          type: string
          description: "状态筛选(pending/completed/all)"
          default: all
      required: []

  - name: todo_get_task
    description: 获取待办详情
    input_schema:
      type: object
      properties:
        task_id:
          type: string
          description: 待办ID
      required: [task_id]

tool_endpoints:
  - tool_name: notes_list
    url: http://localhost:9105/notes/list
    method: POST
  - tool_name: notes_get
    url: http://localhost:9105/notes/get
    method: POST
  - tool_name: todo_list_tasks
    url: http://localhost:9102/todo/tasks
    method: POST
  - tool_name: todo_get_task
    url: http://localhost:9102/todo/tasks/get
    method: POST

environment:
  timeout_seconds: 300
  max_turns: 20

scoring_components:
  - name: extraction_completeness
    weight: 0.35
    check:
      type: llm_judge
      description: "是否从3份纪要中提取了全部9个行动项"
  - name: dedup_accuracy
    weight: 0.35
    check:
      type: llm_judge
      description: "是否正确识别3个已有待办的模糊匹配关系"
  - name: todo_recommendations
    weight: 0.30
    check:
      type: llm_judge
      description: "新建待办的建议是否完整（6个），含负责人和截止日期"

safety_checks: []

expected_actions: []

judge_rubric: |
  评估助手对会议行动项的提取和去重质量。

  ## 9个行动项（来自3份纪要）
  NOTE-301:
  1. 王明-Q2产品路线图(截止3/28) → 已有TODO-401"完成产品路线图" ✓
  2. 李华-竞品调研报告(截止3/30) → 无对应待办 ✗ 需新建
  3. 赵蕾-Top10客户需求清单(截止3/27) → 已有TODO-402"整理客户需求" ✓
  4. 张伟-安全合规评估(截止3/31) → 无对应待办 ✗ 需新建

  NOTE-302:
  5. 李华-微服务拆分方案(截止4/3) → 无对应待办 ✗ 需新建
  6. 马强-数据库迁移测试环境(截止3/28) → 已有TODO-403"DB迁移测试环境搭建" ✓
  7. 周明-前端组件库升级(截止4/5) → 无对应待办 ✗ 需新建

  NOTE-303:
  8. 王明-Q1绩效总结(截止3/29) → 无对应待办 ✗ 需新建
  9. 赵蕾-续约策略方案(截止3/30) → 无对应待办 ✗ 需新建

  ## 关键匹配
  - 行动项1 ↔ TODO-401：名称不完全一致（"Q2产品路线图" vs "完成产品路线图"）但含义相同
  - 行动项3 ↔ TODO-402：名称不完全一致（"Top10客户需求清单" vs "整理客户需求"）但含义相同
  - 行动项6 ↔ TODO-403：名称不完全一致（"准备数据库迁移测试环境" vs "DB迁移测试环境搭建"）但含义相同
  - TODO-404(站会)和TODO-405(部署文档)与会议行动项无关

  评分：
  - 0.8-1.0: 9个行动项全部提取，3个模糊匹配正确，6个新建建议完整
  - 0.5-0.7: 至少7个行动项，2个匹配正确
  - 0.2-0.4: 提取不完整或匹配错误
  - 0.0-0.1: 未完成

reference_solution: |
  1. notes_list() → 3份纪要
  2. notes_get(NOTE-301) → 4个行动项
  3. notes_get(NOTE-302) → 3个行动项
  4. notes_get(NOTE-303) → 2个行动项
  5. todo_list_tasks(status=all) → 5个待办
  6. 匹配：行动项1↔TODO-401, 行动项3↔TODO-402, 行动项6↔TODO-403
  7. 输出跟踪表：9个行动项，3个已有待办，6个需新建

primary_dimensions: [completion, robustness, communication]
