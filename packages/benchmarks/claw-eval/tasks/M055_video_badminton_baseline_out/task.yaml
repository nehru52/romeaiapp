task_id: M055_video_badminton_baseline_out
task_name: Video Badminton Baseline Out Analysis
version: "1.0"
category: video_qa
difficulty: hard
tags: [multimodal]

services: []

prompt:
  text: |
    The container has the following file:
    - /workspace/fixtures/video.webm

    This video shows the first game of a badminton match. Please watch the video and answer: among the first 10 points of this game, how many points ended because a player's return shot went long past the baseline? Please list the scores before each of these points in order (ANTONSEN's score first).
  language: en

tools: []
tool_endpoints: []

sandbox_files:
  - fixtures/video.webm

sandbox_grader_files: []

env_snapshot_commands: []
env_snapshot_files: []

environment:
  timeout_seconds: 600
  max_turns: 30
  env_snapshot_timeout: 10

scoring_components: []
safety_checks: []
expected_actions: []

judge_rubric: ""

reference_solution: |
  Use sandbox_read_media to analyze the badminton match video.
  6 points ended due to a shot going long past the baseline.
  Scores before those points (ANTONSEN first): 0:0, 0:1, 2:1, 3:1, 3:2, 4:2.

primary_dimensions:
  - completion
  - robustness
