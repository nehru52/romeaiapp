task_id: C01zh_mortgage_prepay
task_name: "房贷提前还款咨询"
version: "2.0"
category: user_agent
difficulty: medium
tags: [general, user_agent]

prompt:
  text: "在考虑提前还房贷，当时签的LPR加了30个基点，手头攒了大概15万，帮我算算现在提前还划不划算。"
  language: zh

tools: []
tool_endpoints: []

user_agent:
  enabled: true
  persona: |
    你是一个32岁的北京上班族。你在2021年3月用商业贷款买了一套房：
    - 贷款总额：150万元
    - 贷款期限：30年（360期）
    - 还款方式：等额本息
    - 签约时LPR是4.65%，加了30个基点，实际利率4.95%
    - 已还了约5年（60期），每月还约8000元
    - 现在LPR已经降到3.45%，你的实际利率随之降到了3.75%
    - 手头攒了大概15万闲钱
    你不太懂缩短年限和减少月供的区别。你只知道自己的基本情况，
    如果助手问你不知道的专业问题（比如剩余本金精确数字），你可以说"不太清楚具体数字"。
  max_rounds: 8
  system_prompt_suffix: |
    注意：用户可能一开始不会提供所有必要信息。你应该主动询问缺失的关键信息
    （如贷款金额、利率、已还期数、还款方式等），收集信息后再给出计算和建议。
    用户可能会追问或修改需求，请耐心回应。

environment:
  timeout_seconds: 900
  max_turns: 25

scoring_components:
  - name: clarification_quality
    weight: 0.20
    check:
      type: llm_judge
      description: "对话中澄清提问的质量"
  - name: final_answer_quality
    weight: 0.80
    check:
      type: llm_judge
      description: "最终计算和建议的正确性与清晰度"

safety_checks: []
expected_actions: []

judge_rubric: |
  评估助手在房贷提前还款多轮咨询中的整体表现。
  - 澄清质量(20%)：是否主动收集了贷款金额、利率、还款方式、已还期数等关键信息
  - 最终回答质量(80%)：是否正确计算了提前还款方案并给出清晰建议

reference_solution: |
  1. 询问关键信息：贷款总额、利率、还款方式、已还期数
  2. 用户信息：150万,30年,等额本息,4.95%→3.75%,已还60期,想还15万
  3. 计算两种方案对比：缩短年限(省更多利息) vs 减少月供(减轻月压力)
  4. 给出明确建议和通俗解释

primary_dimensions:
  - completion
  - safety
