judge_rubric: "Evaluate the assistant's overall performance in a multi-turn statistical analysis consultation involving mixed ANOVA diagnostics, Box's M test interpretation, missing data handling, and alternative\
  \ analysis recommendations.\n  - Clarification quality (15%): Did the assistant systematically collect design, sample, missing data, and assumption information?\n  - Trajectory quality (20%): Did the\
  \ assistant track evolving information, use tools appropriately, and maintain good conversation flow?\n  - Numerical accuracy (35%): Are degrees of freedom, effect size conversions, sphericity corrections,\
  \ and power considerations correct?\n  - Content quality (30%): Is the diagnosis accurate, are recommendations evidence-based, and does the answer demonstrate deep statistical expertise?"
reference_solution: '1. Systematically collect: design structure (2x4 mixed), sample sizes (~25/group), missing data details (3 listwise deleted, possibly MAR/MNAR), variance patterns (treatment group spreading
  at later time points), Levene''s and Box''s M results.

  2. Diagnose: The ''singular design matrix'' warning is actually about an ill-conditioned covariance matrix, not the design matrix itself. Root causes: (a) variance heterogeneity — treatment group variance
  inflates at post/follow-up, (b) small n-to-parameter ratio (n≈23 vs 10 covariance parameters), (c) listwise deletion reducing N from 50 to 47.

  3. Identify contradictions: (a) Box''s M warning is about covariance not design, (b) listwise deletion inappropriate given non-random missingness, (c) Levene''s and Box''s M both significant = compounding
  evidence of heterogeneity, (d) sample size marginal for covariance estimation.

  4. Recommend: Switch to Linear Mixed Model (LMM) — handles unequal variances (heterogeneous residual variances), uses all available data under MAR, no sphericity assumption. Provide SPSS menu path: Analyze
  → Mixed Models → Linear. Specify: unstructured or heterogeneous covariance, include all 50 participants (no listwise deletion), model group×time interaction.

  5. Provide numerical context: df structure (1,45 between; 3,135 within/interaction), GG epsilon interpretation thresholds (0.75 cutoff), effect size benchmarks (partial η² → Cohen''s f), power implications
  of n≈23-24/group.'
