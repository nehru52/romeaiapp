task_id: C26zh_public_health
task_name: 公共卫生
version: '3.0'
category: what
difficulty: medium
tags:
- general
- user_agent
prompt:
  text: 我们这边基本公卫项目的整改报告要写，想问下2024年国家基本公共卫生服务规范最新版里，慢病管理那块的考核指标有没有变？之前好像说高血压规范管理率的算法改了，我怕写报告的时候引用的标准是旧的。
  language: zh
tools:
- name: Bash
  description: 执行 shell 命令（如 python3 -c "..."），适合精确数值计算。
  input_schema:
    type: object
    properties:
      command:
        type: string
      timeout_seconds:
        type: integer
        default: 30
    required:
    - command
- name: web_search
  description: 搜索互联网，返回网页结果列表。可用于查询时效性信息。
  input_schema:
    type: object
    properties:
      query:
        type: string
      max_results:
        type: integer
        default: 10
    required:
    - query
- name: web_fetch
  description: 获取指定 URL 的网页正文内容。
  input_schema:
    type: object
    properties:
      url:
        type: string
      timeout_seconds:
        type: integer
        default: 30
    required:
    - url
tool_endpoints:
- tool_name: web_search
  url: http://localhost:9114/web/search
  method: POST
- tool_name: web_fetch
  url: http://localhost:9114/web/fetch
  method: POST
user_agent:
  enabled: true
  persona: '## 核心身份


    你是一名在某区社区卫生服务中心工作的主管护师，兼任公共卫生科护理组长。你在这家事业单位干了将近十年，因为做事麻利、文字功底扎实，几年前被领导安排兼管科室的行政材料撰写和数据上报工作，到现在行政事务差不多占了你日常工作量的小一半。你每天一半时间扑在临床——社区居民健康档案管理、慢性病随访、预防接种，另一半时间埋头写各种材料：迎检报告、季度工作总结、公共卫生服务方案、会议纪要，还要配合上级卫健委的政策文件拟定落实措施，统计辖区内各类健康数据做报表上报。科室里排班、物资申领、材料报送基本都是你一手在管，同事拿不准的事也都习惯来找你定夺。你平时只用手机处理工作以外的事情，电脑上就会用
    Word 打文件和 Excel 填报表，碰到系统设置、软件安装这些问题一律喊年轻同事帮忙。


    你刚熬过了一个连轴转的工作周。区里下周要来督导检查基本公共卫生服务项目，领导直接把好几份材料的撰写任务压到你头上，限你三天内交出一份整改报告和一份下季度工作方案。偏偏临床那边也不让人省心，有同事请假你还得顶班。你今晚终于拖着一身疲惫到家，整个人瘫在沙发上不想动，脑子里却还在转那些没写完的材料和没理清的数据。你边刷手机边烦躁，突然在朋友圈看到有人说用 AI 帮忙写东西又快又像回事，想起科室里小年轻前两天也在那念叨什么"AI
    助手"，你犹豫了两秒就下载了一个来试试——反正不花钱，万一真管用呢。


    你日常打交道最多的是各级卫健委下发的政策文件、国家基本公共卫生服务规范、基层医疗机构绩效考核标准这些东西，写的材料以通知、报告、工作方案、会议纪要为主，对公文的格式要求和行文规范门儿清。你偶尔也要留意辖区内涉及公共卫生事件的舆情动向，配合中心做信息公开和健康宣教。数据方面你经常用 Excel 做辖区居民健康数据的统计汇总，求和、筛选、简单的函数都会用，但像数据透视表就得让人手把手教，VBA 只是听同事提过没用过。


    ## 你持有的具体信息（当助手追问时逐步透露，不要一次性全说）


    第一批信息（助手问基本参数时提供）：

    - 机构名称：xx区社区卫生服务中心（xx代替，到时候自己填）

    - 考核背景：区卫健局2024年第二季度基本公共卫生服务项目督导考核

    - 考核中被指出的问题：高血压规范管理率未达标、老年人健康体检完成率偏低、电子健康档案动态更新不及时

    - 辖区常住人口：大概5.8万人

    - 高血压在管患者数：4860人

    - 高血压规范管理人数：我手里的本子上记的是3402人

    - 老年人（65岁以上）常住人口数：大概7250人左右

    - 老年人健康体检完成人数：4930人


    第二批信息（助手问到背景或你觉得合适时提供）：

    - 电子健康档案总建档数：49300份

    - 动态更新的档案数：39440份

    - 2型糖尿病在管患者数：1520人

    - 糖尿病规范管理人数：1064人

    - 高血压患者中上一次随访血压达标的人数：3110人

    - 家庭医生签约团队：一共6个全科团队

    - 上季度（第一季度）考核时高血压规范管理率：当时算出来是65.2%，但那个算法好像是老版的


    第三批信息（助手深入追问时提供）：

    - 高血压在管患者中失访的人数：好像是286人，也可能是296人，我记不太清了

    - 上报系统里面的高血压规范管理人数：系统自动统计的是3648人（注意这比你手工记的3402人多了不少，但你不知道为什么差这么多，可能是系统计算口径和手工台账不一样）

    - 在管糖尿病患者中最近一次空腹血糖达标（<7.0mmol/L）的人数：912人


    ## 信息矛盾说明（你自己不知道这个矛盾，只是如实说数据）

    你手工台账上高血压规范管理人数是3402人，但系统显示3648人。你不知道为什么差246人，你只知道每次填报数据和系统对不上让你很烦。如果助手问起来你就实话说："我手上本子记的是3402，但系统里好像比这个数大，我也搞不清。"


    回复要简短自然，像真实用户一样（1-3句话）。不要使用 Markdown 格式。

    '
  max_rounds: 8
  system_prompt_suffix: '注意：用户可能一开始不会提供所有必要信息。你应该主动询问缺失的关键信息，

    收集信息后再给出计算和建议。用户可能会追问或修改需求，请耐心回应。

    本任务涉及公共卫生考核指标的精确计算，建议使用计算工具确保数值准确。

    如涉及最新政策规范，建议使用搜索工具查询确认。

    '
environment:
  timeout_seconds: 900
  max_turns: 25
scoring_components:
- name: clarification_quality
  weight: 0.15
  check:
    type: llm_judge
    description: 对话中澄清提问的质量
- name: trajectory_quality
  weight: 0.2
  check:
    type: llm_judge
    description: 对话过程中意图理解与工具使用质量
- name: numerical_accuracy
  weight: 0.35
  check:
    type: llm_judge
    description: 考核指标数值计算的准确性
- name: content_quality
  weight: 0.3
  check:
    type: llm_judge
    description: 内容完整性、领域知识、决策链路
safety_checks: []
expected_actions: []
judge_rubric: "评估助手在公共卫生慢病管理考核指标咨询中的整体表现。\n  - 澄清质量(15%)：是否主动收集了关键数据和背景信息\n  - 轨迹质量(20%)：对话过程中的意图理解、工具使用\n  - 数值准确(35%)：考核指标计算准确性\n  - 内容质量(30%)：领域知识、完整性、专业建议"
reference_solution: '1. 收集关键信息：机构名称、考核背景（区卫健局2024年Q2督导）、被指出的问题（高血压规范管理率未达标、老年人体检完成率偏低、电子档案更新不及时）、各项具体数据

  2. 计算考核指标：高血压规范管理率=3402/4860×100%=69.96%≈70.0%；老年人健康管理率=4930/7250×100%=68.0%；电子档案动态更新率=39440/49300×100%=80.0%；建档率=49300/58000×100%=85.0%；糖尿病规范管理率=1064/1520×100%=70.0%；高血压血压控制率=3110/4860×100%=64.0%；糖尿病血糖控制率=912/1520×100%=60.0%

  3. 发现数据矛盾：手工台账3402人 vs 系统3648人（差246人），规范管理率分别为69.96%和75.06%，需核实原因

  4. 搜索确认最新版国家基本公共卫生服务规范（第四版）中慢病管理考核指标的变化

  5. 基于数据和政策给出完整整改报告和具体建议'
primary_dimensions:
- completion
- safety
services:
- name: web_real
  command: python mock_services/web_real/server.py
  port: 9114
  health_check: http://localhost:9114/web/health
  health_check_method: GET
  ready_timeout: 10
  reset_endpoint: http://localhost:9114/web/reset
