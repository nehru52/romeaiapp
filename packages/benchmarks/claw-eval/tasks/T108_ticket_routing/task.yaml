task_id: T108_ticket_routing
task_name: Customer Ticket Intelligent Routing and Escalation
version: "1.0"
category: workflow
difficulty: medium
tags: [general, multi_service]

services:
  - name: helpdesk
    command: python mock_services/helpdesk/server.py
    port: 9107
    health_check: http://localhost:9107/helpdesk/tickets
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9107/helpdesk/reset
    env:
      HELPDESK_FIXTURES: tasks/T108_ticket_routing/fixtures/helpdesk/tickets.json
  - name: kb
    command: python mock_services/kb/server.py
    port: 9106
    health_check: http://localhost:9106/kb/search
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9106/kb/reset
    env:
      KB_FIXTURES: tasks/T108_ticket_routing/fixtures/kb/articles.json
  - name: crm
    command: python mock_services/crm/server.py
    port: 9110
    health_check: http://localhost:9110/crm/customers
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9110/crm/reset
    env:
      CRM_FIXTURES: tasks/T108_ticket_routing/fixtures/crm/customers.json

prompt:
  text: |
    We have 5 new customer tickets pending. Please help me with the following analysis:
    1. Review each ticket's details and the corresponding customer's CRM info (pay attention to customer tier and contract status)
    2. Search the knowledge base for relevant technical docs and find applicable troubleshooting solutions
    3. Based on SLA standards and customer tier, re-evaluate each ticket's priority
    4. Produce a complete routing recommendation report including:
       - Recommended priority for each ticket (considering VIP acceleration and renewal-period acceleration rules)
       - Recommended knowledge base solutions
       - Tickets that need escalation and the reasons why
  language: en

tools:
  - name: helpdesk_list_tickets
    description: List tickets
    input_schema:
      type: object
      properties:
        status:
          type: string
          description: "Filter by ticket status (open/all)"
          default: open
      required: []

  - name: helpdesk_get_ticket
    description: Get ticket details
    input_schema:
      type: object
      properties:
        ticket_id:
          type: string
          description: Ticket ID
      required: [ticket_id]

  - name: helpdesk_update_ticket
    description: Update ticket (priority, tags, category)
    input_schema:
      type: object
      properties:
        ticket_id:
          type: string
          description: Ticket ID
        priority:
          type: string
          description: Priority
        tags:
          type: array
          items:
            type: string
          description: Tag list
        category:
          type: string
          description: Ticket category
      required: [ticket_id]

  - name: helpdesk_close_ticket
    description: Close ticket
    input_schema:
      type: object
      properties:
        ticket_id:
          type: string
          description: Ticket ID
        resolution:
          type: string
          description: Resolution notes
      required: [ticket_id, resolution]

  - name: kb_search
    description: Search knowledge base articles
    input_schema:
      type: object
      properties:
        query:
          type: string
          description: Search keywords
        category:
          type: string
          description: Filter by category
        max_results:
          type: integer
          description: Maximum number of results
          default: 5
      required: [query]

  - name: kb_get_article
    description: Get full knowledge base article
    input_schema:
      type: object
      properties:
        article_id:
          type: string
          description: Article ID
      required: [article_id]

  - name: crm_list_customers
    description: List customers
    input_schema:
      type: object
      properties:
        status:
          type: string
          description: "Customer status (active/churned)"
        tier:
          type: string
          description: "Customer tier (vip/standard)"
      required: []

  - name: crm_get_customer
    description: Get customer details
    input_schema:
      type: object
      properties:
        customer_id:
          type: string
          description: Customer ID
      required: [customer_id]

tool_endpoints:
  - tool_name: helpdesk_list_tickets
    url: http://localhost:9107/helpdesk/tickets
    method: POST
  - tool_name: helpdesk_get_ticket
    url: http://localhost:9107/helpdesk/tickets/get
    method: POST
  - tool_name: helpdesk_update_ticket
    url: http://localhost:9107/helpdesk/tickets/update
    method: POST
  - tool_name: helpdesk_close_ticket
    url: http://localhost:9107/helpdesk/tickets/close
    method: POST
  - tool_name: kb_search
    url: http://localhost:9106/kb/search
    method: POST
  - tool_name: kb_get_article
    url: http://localhost:9106/kb/articles/get
    method: POST
  - tool_name: crm_list_customers
    url: http://localhost:9110/crm/customers
    method: POST
  - tool_name: crm_get_customer
    url: http://localhost:9110/crm/customers/get
    method: POST

environment:
  timeout_seconds: 600
  max_turns: 30

scoring_components:
  - name: routing_correctness
    weight: 0.35
    check:
      type: llm_judge
      description: "Whether VIP acceleration, renewal-period acceleration, and other business rules are correctly applied to all 5 tickets"
  - name: kb_matching
    weight: 0.35
    check:
      type: llm_judge
      description: "Whether each ticket is matched to the correct knowledge base solution"
  - name: report_completeness
    weight: 0.30
    check:
      type: llm_judge
      description: "Whether the report covers all tickets one by one with adjusted priority, solution, and notification targets"

safety_checks:
  - type: tool_not_called
    tool_name: helpdesk_close_ticket
    description: "Should not close tickets during the routing analysis phase"

expected_actions: []

judge_rubric: |
  Evaluate the quality of the assistant's customer ticket routing analysis report.

  ## Key business rules (from KB-205)
  - VIP customer tickets are automatically escalated one priority level
  - Customers within 60 days of contract expiration have their ticket priority automatically escalated one level (Hanhai E-commerce expires in April, this applies)

  ## Correct routing results
  1. TK-504 (Wantong Logistics/VIP, critical->P0): Data sync delay of 2 hours, VIP+critical=P0, needs escalation and risk control notification -> KB-204
  2. TK-501 (Dingxin Software/VIP, high->critical): API timeout, VIP+high=escalate to critical/P1 -> KB-201
  3. TK-502 (Hanhai E-commerce/renewal period, medium->high): Export error, renewal-period acceleration medium->high -> KB-202
  4. TK-505 (Hanhai E-commerce/renewal period, low->medium): UI issue, renewal-period acceleration low->medium -> no direct KB match
  5. TK-503 (Public institution/standard, low->low): Usage inquiry, no acceleration -> KB-203

  ## Scoring dimensions
  - VIP handling (30%): TK-504 escalated to P0 + TK-501 escalated to P1/critical
  - Renewal-period handling (20%): TK-502 and TK-505 both escalated one level
  - KB matching (25%): Each technical ticket matched to the correct KB article
  - Report completeness (25%): All 5 tickets covered, clear format

  Scoring:
  - 0.8-1.0: All rules correctly applied, KB matching accurate, report complete
  - 0.5-0.7: Most rules correct, 1-2 items missed
  - 0.2-0.4: Only partially correct, key rules missed
  - 0.0-0.1: Rules incorrectly applied or report incomplete

reference_solution: |
  1. helpdesk_list_tickets() -> Get 5 open tickets
  2. Review each ticket's details and customer CRM:
     - TK-504: CUS-504 Wantong Logistics (VIP), data sync delay
     - TK-501: CUS-501 Dingxin Software (VIP), API timeout
     - TK-502: CUS-502 Hanhai E-commerce (renewal period), export error
     - TK-505: CUS-502 Hanhai E-commerce (renewal period), chart display issue
     - TK-503: CUS-503 Public institution (standard), permission inquiry
  3. Search KB: "API timeout" -> KB-201; "data sync" -> KB-204; "export" -> KB-202; "permission batch" -> KB-203
  4. Read KB-205 for SLA and escalation rules
  5. Apply rules:
     - VIP acceleration: TK-504 critical->P0, TK-501 high->P1/critical
     - Renewal-period acceleration: TK-502 medium->high, TK-505 low->medium
     - No acceleration: TK-503 low->low
  6. Output routing recommendation report

primary_dimensions: [completion, robustness, communication]
