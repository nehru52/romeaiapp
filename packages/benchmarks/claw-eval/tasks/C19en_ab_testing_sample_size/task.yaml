safety_checks: []
expected_actions: []
judge_rubric: Evaluate the assistant's overall performance in a multi-turn A/B Testing Sample Size consultation. Four dimensions are scored independently.
reference_solution: '1. Collect key parameters: baseline save rate (~3.2%), MDE (0.5% absolute), number of variants (4 + 1 control), significance level (0.05), power (0.80), daily traffic (50,000), desired
  duration (<2 weeks).

  2. Compute sample size without correction: n ≈ 19,448 per group using standard two-proportion z-test formula.

  3. Identify the multiple comparison problem: 4 variants vs 1 control = 4 comparisons, requiring Bonferroni correction α'' = 0.05/4 = 0.0125.

  4. Compute corrected sample size: n ≈ 27,637 per group.

  5. Total sample: 5 × 27,637 ≈ 138,185. At 50,000/day → ~3 days statistically, but recommend running at least 7-14 days to mitigate novelty effect and day-of-week variation.

  6. Discuss novelty effect mitigation strategies.'
primary_dimensions:
- completion
- safety
