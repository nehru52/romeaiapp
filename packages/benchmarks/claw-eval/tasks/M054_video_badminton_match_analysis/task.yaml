  Total games: 3.
  Game 2 point 1: Shi Yuqi serves, right court, Axelsen scores.
  Game 2 point 10: Shi Yuqi serves, left court, Axelsen scores.
  Game 2 last point: Axelsen serves, right court, Axelsen scores.

