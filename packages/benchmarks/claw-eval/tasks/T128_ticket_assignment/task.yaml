task_id: T128_ticket_assignment
task_name: Ticket Assignment
version: "1.0"
category: ops
difficulty: medium
tags: [general, multi_service]

services:
  - name: contacts
    command: python mock_services/contacts/server.py
    port: 9103
    health_check: http://localhost:9103/contacts/search
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9103/contacts/reset
    env:
      CONTACTS_FIXTURES: tasks/T128_ticket_assignment/fixtures/contacts/contacts.json
  - name: helpdesk
    command: python mock_services/helpdesk/server.py
    port: 9107
    health_check: http://localhost:9107/helpdesk/tickets
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9107/helpdesk/reset
    env:
      HELPDESK_FIXTURES: tasks/T128_ticket_assignment/fixtures/helpdesk/tickets.json

prompt:
  text: |
    There are currently 6 unassigned tickets. Please help me with assignment suggestions:
    1. Review each ticket's details to understand the issue type and submitting department
    2. Look up the person in charge for each department in the contacts directory
    3. Match the most suitable handler based on issue type
    4. Be sure to distinguish between IT issues and non-IT issues
    5. Output an assignment suggestion table (ticket -> suggested handler -> assignment reason)
  language: en

tools:
  - name: helpdesk_list_tickets
    description: List tickets
    input_schema:
      type: object
      properties:
        status:
          type: string
          description: "Ticket status filter (open/all)"
          default: open
      required: []

  - name: helpdesk_get_ticket
    description: Get ticket details
    input_schema:
      type: object
      properties:
        ticket_id:
          type: string
          description: Ticket ID
      required: [ticket_id]

  - name: contacts_search
    description: Search internal contacts directory
    input_schema:
      type: object
      properties:
        query:
          type: string
          description: Search keyword
        department:
          type: string
          description: Filter by department
      required: [query]

  - name: contacts_get
    description: Get contact details
    input_schema:
      type: object
      properties:
        contact_id:
          type: string
          description: Contact ID
      required: [contact_id]

tool_endpoints:
  - tool_name: helpdesk_list_tickets
    url: http://localhost:9107/helpdesk/tickets
    method: POST
  - tool_name: helpdesk_get_ticket
    url: http://localhost:9107/helpdesk/tickets/get
    method: POST
  - tool_name: contacts_search
    url: http://localhost:9103/contacts/search
    method: POST
  - tool_name: contacts_get
    url: http://localhost:9103/contacts/get
    method: POST

environment:
  timeout_seconds: 300
  max_turns: 20

scoring_components:
  - name: routing_accuracy
    weight: 0.35
    check:
      type: llm_judge
      description: "Whether all 6 tickets are assigned to the correct handler"
  - name: reasoning_quality
    weight: 0.35
    check:
      type: llm_judge
      description: "Whether the assignment reasoning is sound and distinguishes IT from non-IT issues"
  - name: report_format
    weight: 0.30
    check:
      type: llm_judge
      description: "Whether the assignment suggestion table is clearly formatted and complete"

safety_checks: []

expected_actions: []

judge_rubric: |
  Evaluate the quality of the assistant's ticket assignment suggestions.

  ## Correct Assignments
  1. TK-901 (System login failure) -> Ma Qiang (IT Ops Team) — system failure is an ops matter
  2. TK-902 (Inaccurate report data) -> Li Hua (Data Team) — data issue is a data engineering matter
  3. TK-903 (VPN connection failure) -> Ma Qiang (IT Ops Team) — network/VPN is an ops matter
  4. TK-904 (Permission request) -> Zhang Wei (Security Team) — permission management is a security team responsibility
  5. TK-905 (Broken office chair) -> Chen Ting (Admin Dept) — office equipment is an admin matter, NOT an IT ticket
  6. TK-906 (Email storage full) -> Ma Qiang (IT Ops Team) — email system is an ops matter

  ## Key Judgments
  - TK-905 must be identified as a non-IT issue, assigned to Admin Dept rather than IT
  - TK-901, TK-903, TK-906 are all IT ops, can be assigned to Ma Qiang
  - TK-904 is permission-related, should go to Security Team's Zhang Wei, not ops

  Scoring:
  - 0.8-1.0: All 6 tickets correctly assigned, TK-905 identified as non-IT
  - 0.5-0.7: 5 correct
  - 0.2-0.4: 3-4 correct
  - 0.0-0.1: Incorrect assignments or not completed

reference_solution: |
  1. helpdesk_list_tickets() -> 6 tickets
  2. Review each ticket's details
  3. contacts_search by department: IT Ops, Data Team, Security Team, Admin Dept
  4. Map issue type -> department -> handler
  5. Output assignment suggestion table

primary_dimensions: [completion, robustness, communication]
