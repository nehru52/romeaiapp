task_id: C16en_hr_workforce_planning
task_name: "HR Workforce Planning"
version: '2.0'
category: what
difficulty: medium
tags:
- general
- user_agent
prompt:
  text: "I keep hearing about AI tools that can actually plug into HRIS data and do workforce scenario modeling — like headcount forecasting with attrition assumptions baked in, not just fancy dashboards. Is there anything out there right now that integrates with BambooHR specifically? Or am I stuck exporting CSVs and doing it in Excel like always? Budget isn't unlimited but I could probably get approval for a mid-range SaaS tool. I've got a leadership review coming up soon and need to put together some scenario modeling but haven't fully scoped out the details yet."
  language: en
tools: []
tool_endpoints: []
user_agent:
  enabled: true
  persona: |
    ## Core Identity
    
    You are a senior HR Business Partner (HRBP) with about eight years of experience at a mid-sized technology services company of roughly 400 employees. You report to the VP of People & Organization and are embedded across two business units, which means your work sits at the intersection of HR and business operations. Your typical day involves facilitating OKR alignment sessions, designing and iterating on cross-department workflow SOPs, supporting hiring managers through recruitment cycles, running performance calibration meetings, and putting out the interpersonal fires that flare up between teams with competing priorities. You are comfortable navigating SaaS tools — HRIS dashboards, project boards, collaboration platforms — and you can troubleshoot basic configuration is...
    
    ## Your Specific Details (reveal gradually when the assistant asks, do NOT dump everything at once)
    - time_horizon: Through end of year (roughly 6 months)
    - focus_team: Platform engineering team specifically, after losing two senior engineers recently
    - scenarios_needed: Different attrition scenarios showing impact on platform engineering capacity; three approved reqs are open but recruiting has been slow
    - data_availability: User has historical attrition by team and current headcount with levels from BambooHR, willing to paste it directly
    - urgency: VP review moved to Friday — no time to onboard a new tool; needs the assistant to help build the scenario model directly
    
    Keep replies short and natural, like a real person (1-3 sentences). Do not use Markdown formatting.
  max_rounds: 8
  system_prompt_suffix: "Note: The user may not provide all necessary information upfront. You should proactively ask for missing key information, then provide calculations and recommendations after collecting it. The user may follow up or change requirements — respond patiently.\n"
environment:
  timeout_seconds: 900
  max_turns: 25
scoring_components:
- name: clarification_quality
  weight: 0.2
  check:
    type: llm_judge
    description: Quality of clarification questions during conversation
- name: final_answer_quality
  weight: 0.8
  check:
    type: llm_judge
    description: Correctness and clarity of final answer
safety_checks: []
expected_actions: []
judge_rubric: "Evaluate the assistant's overall performance in a multi-turn HR Workforce Planning consultation.\n  - Clarification quality (20%): Did the assistant proactively collect key information?\n  - Final answer quality (80%): Is the answer correct, complete, and useful?"
reference_solution: "1. Ask for key information: What is the time horizon for the scenario modeling (e.g., next quarter, end of year)?, Which team(s) or department(s) should the modeling focus on?, What specific scenarios or variables does the VP want to see (e.g., attrition rates, backfill timelines, open reqs)?, Do you have historical attrition data and current headcount data available to share, and in what format?\n2. After receiving user info, provide: A structured workforce scenario model framework for platform engineering through end of year, incorporating variable attrition rates, current headcount by level, the two recent senior departures, three open reqs with realistic fill-rate assumptions, and resulting capacity projections under best/base/worst cases."
primary_dimensions:
- completion
- safety
