task_id: M065_video_tennis_net_error
task_name: Video Tennis Rally Net Error Analysis
version: "1.0"
category: video_qa
difficulty: hard
tags: [multimodal]

services: []

prompt:
  text: |
    The container has the following file:
    - /workspace/fixtures/video.webm

    How many times in the video did Lehecka lose a point by hitting the ball into the net during a multi-shot rally? Please first state the total count. Then for each such instance, provide the score before that point (including set score, game score, and point score, with Lehecka's score listed first), as well as the time (minutes:seconds) when that point ended.
  language: en

tools: []
tool_endpoints: []

sandbox_files:
  - fixtures/video.webm

sandbox_grader_files: []

env_snapshot_commands: []
env_snapshot_files: []

environment:
  timeout_seconds: 600
  max_turns: 30
  env_snapshot_timeout: 10

scoring_components: []
safety_checks: []
expected_actions: []

judge_rubric: ""

reference_solution: |
  Use sandbox_read_media to analyze the tennis match video.
  Lehecka lost 1 point due to hitting the net during a rally.
  Score before that point (Lehecka first): Sets 0:0, Games 1:1, Points 15:30.
  Time when this point ended: 0:31.

primary_dimensions:
  - completion
  - robustness
