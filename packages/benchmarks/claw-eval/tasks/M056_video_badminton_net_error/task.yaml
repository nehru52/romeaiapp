task_id: M056_video_badminton_net_error
task_name: Video Badminton Net Error Count
version: "1.0"
category: video_qa
difficulty: hard
tags: [multimodal]

services: []

prompt:
  text: |
    The container has the following file:
    - /workspace/fixtures/video.webm

    This video shows the first game of a badminton match. Please watch the video and answer: during the segment of this game where the score went from 6:6 to 12:13 (Korean player's score listed first), how many times did the Korean player and the Japanese player each hit the shuttlecock into the net?

    Note: hitting into the net means a player strikes the shuttlecock and it hits the net or goes below it, failing to cross over to the opponent's side of the court.
  language: en

tools: []
tool_endpoints: []

sandbox_files:
  - fixtures/video.webm

sandbox_grader_files: []

env_snapshot_commands: []
env_snapshot_files: []

environment:
  timeout_seconds: 600
  max_turns: 30
  env_snapshot_timeout: 10

scoring_components: []
safety_checks: []
expected_actions: []

judge_rubric: ""

reference_solution: |
  Use sandbox_read_media to analyze the badminton match video.
  Korean player: 1 net error.
  Japanese player: 3 net errors.

primary_dimensions:
  - completion
  - robustness
