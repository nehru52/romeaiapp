<!DOCTYPE html>
<html><head><title>Complex Table</title></head>
<body>
<table>
  <caption>Quarterly Revenue</caption>
  <thead>
    <tr><th>Quarter</th><th>Revenue</th><th>Growth</th></tr>
  </thead>
  <tbody>
    <tr><td>Q1</td><td>$1.2M</td><td>+5%</td></tr>
    <tr><td>Q2</td><td>$1.5M</td><td>+25%</td></tr>
    <tr><td>Q3</td><td>$1.3M</td><td>-13%</td></tr>
    <tr><td>Q4</td><td>$1.8M</td><td>+38%</td></tr>
  </tbody>
  <tfoot>
    <tr><td>Total</td><td colspan="2">$5.8M</td></tr>
  </tfoot>
</table>
</body></html>
