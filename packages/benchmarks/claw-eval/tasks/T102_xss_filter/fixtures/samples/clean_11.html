<!DOCTYPE html>
<html><head><title>Styled Content</title></head>
<body>
<div style="max-width: 800px; margin: 0 auto; padding: 20px;">
  <h1 style="color: #333; font-family: Arial, sans-serif;">Styled Heading</h1>
  <p style="font-size: 16px; line-height: 1.5; color: #666;">
    This paragraph has safe inline styles applied.
  </p>
  <div style="background-color: #f0f0f0; border: 1px solid #ddd; padding: 10px; border-radius: 4px;">
    A styled box with safe CSS properties.
  </div>
</div>
</body></html>
