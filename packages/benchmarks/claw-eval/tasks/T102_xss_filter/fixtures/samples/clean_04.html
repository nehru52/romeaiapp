<!DOCTYPE html>
<html><head><title>Ordered Lists</title></head>
<body>
<h2>Steps</h2>
<ol>
  <li>First step
    <ol type="a">
      <li>Sub-step a</li>
      <li>Sub-step b</li>
    </ol>
  </li>
  <li>Second step</li>
  <li>Third step</li>
</ol>
<dl>
  <dt>Term 1</dt>
  <dd>Definition of term 1</dd>
  <dt>Term 2</dt>
  <dd>Definition of term 2</dd>
</dl>
</body></html>
