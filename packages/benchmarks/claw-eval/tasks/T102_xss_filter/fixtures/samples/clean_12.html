<!DOCTYPE html>
<html><head>
<title>CSS Styled</title>
<style>
  body { font-family: Georgia, serif; margin: 20px; }
  .highlight { background-color: yellow; padding: 2px 5px; }
  .container { display: flex; gap: 10px; }
  .card { border: 1px solid #ccc; padding: 15px; border-radius: 8px; }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <h3>Card 1</h3>
    <p>This card has <span class="highlight">highlighted</span> text.</p>
  </div>
  <div class="card">
    <h3>Card 2</h3>
    <p>Another card with normal content.</p>
  </div>
</div>
</body></html>
