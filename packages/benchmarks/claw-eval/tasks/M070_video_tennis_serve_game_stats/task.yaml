task_id: M070_video_tennis_serve_game_stats
task_name: Video Tennis Serve Game Statistics
version: "1.0"
category: video_qa
difficulty: hard
tags: [multimodal]

services: []

prompt:
  text: |
    The container has the following file:
    - /workspace/fixtures/video.webm

    Watch the video and answer: in the first set of this highlights video, how many service points are shown for Zverev and how many for Sinner respectively? Of those service points, how many did Zverev win on his own serve, and how many did Sinner win on his own serve?
