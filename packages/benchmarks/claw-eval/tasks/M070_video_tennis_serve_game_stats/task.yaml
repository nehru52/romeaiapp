scoring_components: []
safety_checks: []
expected_actions: []

judge_rubric: ""

reference_solution: |
  Use sandbox_read_media to analyze the tennis highlights video.
  First set: Zverev had 4 serve points shown, Sinner had 5 serve points shown.
  Zverev won 2 of his serve points, Sinner won 2 of his serve points.

primary_dimensions:
  - completion
