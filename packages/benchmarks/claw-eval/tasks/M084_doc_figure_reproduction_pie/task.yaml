task_id: M084_doc_figure_reproduction_pie
task_name: Document Figure Reproduction - Pie Chart
version: "1.0"
category: doc_extraction
difficulty: hard
tags: [multimodal]
services: []
prompt:
  text: |
    The container has the following file:
    - /workspace/fixtures/2512.17495v2.pdf

    I am preparing a presentation on the GroundingME benchmark and I need to
    accurately recreate its subtask distribution chart.

    Please locate Figure 3 in the paper. Write a Python script named
    /workspace/reproduce_fig3.py that fully reconstructs this pie chart. You must
    ensure all details are completely consistent with the original figure.

    Execute your script to generate the chart and save the final image as
    /workspace/subtask_distribution_reproduce.png.
  language: en
tools: []
tool_endpoints: []
sandbox_files:
  - fixtures/2512.17495v2.pdf
sandbox_grader_files: []
local_grader_files:
  - fixtures/gt.png
env_snapshot_commands: []
env_snapshot_files:
  - /workspace/reproduce_fig3.py
  - /workspace/subtask_distribution_reproduce.png
environment:
  timeout_seconds: 600
  max_turns: 30
  env_snapshot_timeout: 10
scoring_components: []
safety_checks: []
expected_actions: []
judge_rubric: ""
reference_solution: |
  Read PDF Figure 3, write Python script using matplotlib/plotly to
  procedurally reconstruct the pie/sunburst chart with correct data,
  colors, and text positioning. Execute to generate PNG.
primary_dimensions:
  - completion
  - robustness
