task_id: T126_meeting_action_items
task_name: Meeting Action Item Extraction and Deduplication
version: "1.0"
category: workflow
difficulty: medium
tags: [general, multi_service]

services:
  - name: notes
    command: python mock_services/notes/server.py
    port: 9105
    health_check: http://localhost:9105/notes/list
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9105/notes/reset
    env:
      NOTES_FIXTURES: tasks/T126_meeting_action_items/fixtures/notes/meetings.json
  - name: todo
    command: python mock_services/todo/server.py
    port: 9102
    health_check: http://localhost:9102/todo/tasks
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9102/todo/reset
    env:
      TODO_FIXTURES: tasks/T126_meeting_action_items/fixtures/todo/tasks.json

prompt:
  text: |
    We've had several important meetings recently. Please help me:
    1. Review all meeting notes and extract the action items from them
    2. Check the current to-do list
    3. Compare the meeting action items with existing to-dos to identify ones that already have a corresponding to-do (to avoid creating duplicates)
    4. List the action items that need new to-dos created
    5. Output a complete action item tracking table (including source meeting, assignee, due date, and whether a to-do already exists)
  language: en

tools:
  - name: notes_list
    description: List meeting notes
    input_schema:
      type: object
      properties:
        tag:
          type: string
          description: Filter by tag
      required: []

  - name: notes_get
    description: Get note details
    input_schema:
      type: object
      properties:
        note_id:
          type: string
          description: Note ID
      required: [note_id]

  - name: todo_list_tasks
    description: List to-do items
    input_schema:
      type: object
      properties:
        status:
          type: string
          description: "Status filter (pending/completed/all)"
          default: all
      required: []

  - name: todo_get_task
    description: Get to-do item details
    input_schema:
      type: object
      properties:
        task_id:
          type: string
          description: To-do ID
      required: [task_id]

tool_endpoints:
  - tool_name: notes_list
    url: http://localhost:9105/notes/list
    method: POST
  - tool_name: notes_get
    url: http://localhost:9105/notes/get
    method: POST
  - tool_name: todo_list_tasks
    url: http://localhost:9102/todo/tasks
    method: POST
  - tool_name: todo_get_task
    url: http://localhost:9102/todo/tasks/get
    method: POST

environment:
  timeout_seconds: 300
  max_turns: 20

scoring_components:
  - name: extraction_completeness
    weight: 0.35
    check:
      type: llm_judge
      description: "Whether all 9 action items were extracted from the 3 meeting notes"
  - name: dedup_accuracy
    weight: 0.35
    check:
      type: llm_judge
      description: "Whether the 3 fuzzy matches with existing to-dos were correctly identified"
  - name: todo_recommendations
    weight: 0.30
    check:
      type: llm_judge
      description: "Whether the new to-do suggestions are complete (6 items), including assignee and due date"

safety_checks: []

expected_actions: []

judge_rubric: |
  Evaluate the assistant's quality of meeting action item extraction and deduplication.

  ## 9 Action Items (from 3 meeting notes)
  NOTE-301:
  1. Wang Ming - Q2 Product Roadmap (due 3/28) -> Already has TODO-401 "Complete product roadmap" [match]
  2. Li Hua - Competitor Research Report (due 3/30) -> No corresponding to-do [needs new]
  3. Zhao Lei - Top 10 Customer Requirements List (due 3/27) -> Already has TODO-402 "Compile customer requirements" [match]
  4. Zhang Wei - Security Compliance Assessment (due 3/31) -> No corresponding to-do [needs new]

  NOTE-302:
  5. Li Hua - Microservice Decomposition Plan (due 4/3) -> No corresponding to-do [needs new]
  6. Ma Qiang - Database Migration Test Environment (due 3/28) -> Already has TODO-403 "DB migration test environment setup" [match]
  7. Zhou Ming - Frontend Component Library Upgrade (due 4/5) -> No corresponding to-do [needs new]

  NOTE-303:
  8. Wang Ming - Q1 Performance Summary (due 3/29) -> No corresponding to-do [needs new]
  9. Zhao Lei - Renewal Strategy Proposal (due 3/30) -> No corresponding to-do [needs new]

  ## Key Matches
  - Action item 1 <-> TODO-401: Names don't exactly match ("Q2 Product Roadmap" vs "Complete product roadmap") but same meaning
  - Action item 3 <-> TODO-402: Names don't exactly match ("Top 10 Customer Requirements List" vs "Compile customer requirements") but same meaning
  - Action item 6 <-> TODO-403: Names don't exactly match ("Database Migration Test Environment" vs "DB migration test environment setup") but same meaning
  - TODO-404 (standup) and TODO-405 (deployment docs) are unrelated to meeting action items

  Scoring:
  - 0.8-1.0: All 9 action items extracted, 3 fuzzy matches correct, 6 new to-do suggestions complete
  - 0.5-0.7: At least 7 action items, 2 matches correct
  - 0.2-0.4: Incomplete extraction or incorrect matches
  - 0.0-0.1: Not completed

reference_solution: |
  1. notes_list() -> 3 meeting notes
  2. notes_get(NOTE-301) -> 4 action items
  3. notes_get(NOTE-302) -> 3 action items
  4. notes_get(NOTE-303) -> 2 action items
  5. todo_list_tasks(status=all) -> 5 to-do items
  6. Matching: action item 1 <-> TODO-401, action item 3 <-> TODO-402, action item 6 <-> TODO-403
  7. Output tracking table: 9 action items, 3 with existing to-dos, 6 need new ones

primary_dimensions: [completion, robustness, communication]
