task_id: T132_order_profit_analysis
task_name: Order Profit Analysis
version: "1.0"
category: ops
difficulty: medium
tags: [general, multi_service]

services:
  - name: finance
    command: python mock_services/finance/server.py
    port: 9104
    health_check: http://localhost:9104/finance/transactions
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9104/finance/reset
    env:
      FINANCE_FIXTURES: tasks/T132_order_profit_analysis/fixtures/finance/transactions.json
  - name: inventory
    command: python mock_services/inventory/server.py
    port: 9108
    health_check: http://localhost:9108/inventory/products
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9108/inventory/reset
    env:
      INVENTORY_FIXTURES: tasks/T132_order_profit_analysis/fixtures/inventory/items.json
  - name: crm
    command: python mock_services/crm/server.py
    port: 9110
    health_check: http://localhost:9110/crm/customers
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9110/crm/reset
    env:
      CRM_FIXTURES: tasks/T132_order_profit_analysis/fixtures/crm/customers.json

prompt:
  text: |
    Please help me analyze the profit situation for each customer's orders:
    1. Get each customer's recent orders and product mix from the CRM
    2. Look up the cost price for each product from the inventory system
    3. Verify payment status from the finance system
    4. Calculate the profit margin for each customer's order = (selling price - cost) / selling price
    5. Flag any payment anomalies (outstanding balance, refunds, etc.)
    6. Output a customer profit analysis report
  language: en

tools:
  - name: crm_list_customers
    description: List customers
    input_schema:
      type: object
      properties:
        status:
          type: string
          description: "Customer status (active/churned)"
        tier:
          type: string
          description: "Customer tier (vip/standard)"
      required: []

  - name: crm_get_customer
    description: Get customer details
    input_schema:
      type: object
      properties:
        customer_id:
          type: string
          description: Customer ID
      required: [customer_id]

  - name: inventory_list_items
    description: List inventory/products
    input_schema:
      type: object
      properties:
        category:
          type: string
          description: Filter by category
      required: []

  - name: inventory_get_item
    description: Get product details
    input_schema:
      type: object
      properties:
        product_id:
          type: string
          description: Product ID
      required: [product_id]

  - name: finance_list_transactions
    description: List transactions
    input_schema:
      type: object
      properties:
        start_date:
          type: string
          description: "Start date (YYYY-MM-DD)"
        end_date:
          type: string
          description: "End date (YYYY-MM-DD)"
      required: []

  - name: finance_get_transaction
    description: Get transaction details
    input_schema:
      type: object
      properties:
        transaction_id:
          type: string
          description: Transaction ID
      required: [transaction_id]

tool_endpoints:
  - tool_name: crm_list_customers
    url: http://localhost:9110/crm/customers
    method: POST
  - tool_name: crm_get_customer
    url: http://localhost:9110/crm/customers/get
    method: POST
  - tool_name: inventory_list_items
    url: http://localhost:9108/inventory/products
    method: POST
  - tool_name: inventory_get_item
    url: http://localhost:9108/inventory/products/get
    method: POST
  - tool_name: finance_list_transactions
    url: http://localhost:9104/finance/transactions
    method: POST
  - tool_name: finance_get_transaction
    url: http://localhost:9104/finance/transactions/get
    method: POST

environment:
  timeout_seconds: 600
  max_turns: 30

scoring_components:
  - name: profit_calculation
    weight: 0.35
    check:
      type: llm_judge
      description: "Whether the profit margin calculation for each customer is accurate"
  - name: payment_analysis
    weight: 0.35
    check:
      type: llm_judge
      description: "Whether the CUS-802 outstanding balance of 30,000 and CUS-803 refund of 20,000 were discovered"
  - name: report_quality
    weight: 0.30
    check:
      type: llm_judge
      description: "Structure and insight quality of the profit analysis report"

safety_checks: []

expected_actions: []

judge_rubric: |
  Evaluate the quality of the assistant's order profit analysis.

  ## Correct Profit Calculations

  CUS-801 Dingxin (VIP):
  - Products: PROD-01 (cost 8k) + PROD-02 (cost 20k) + PROD-03 (cost 15k) = cost 43k
  - Selling price: 180k
  - Profit: 180k - 43k = 137k, margin 76.1%
  - Payment: TXN-811 180k completed -> fully collected [OK]

  CUS-802 Hanhai:
  - Products: PROD-01 (cost 8k) + PROD-04 (cost 12k) = cost 20k
  - Selling price: 80k
  - Profit: 80k - 20k = 60k, margin 75%
  - Payment: TXN-812 50k completed -> only 50k collected, 30k outstanding [ISSUE]

  CUS-803 Wantong (VIP):
  - Products: PROD-02 (20k) + PROD-03 (15k) + PROD-05 (5k) + PROD-06 (10k) = cost 50k
  - Selling price: 250k
  - Profit: 250k - 50k = 200k, margin 80%
  - Payment: TXN-813 250k - TXN-814 refund 20k = net collected 230k [REFUND ISSUE]

  CUS-804 Qianfeng:
  - Products: PROD-01 (cost 8k)
  - Selling price: 30k
  - Profit: 30k - 8k = 22k, margin 73.3%
  - Payment: TXN-815 30k completed -> fully collected [OK]

  Scoring:
  - 0.8-1.0: All 4 customer profit margins correct, both payment anomalies flagged
  - 0.5-0.7: Most calculations correct, at least 1 anomaly found
  - 0.2-0.4: Calculation errors or missed anomalies
  - 0.0-0.1: Analysis not completed

reference_solution: |
  1. crm_list_customers() -> 4 customers
  2. Review each customer's order details
  3. inventory: look up product costs PROD-01~06
  4. finance: check payments TXN-811~815
  5. Calculate profit margins and flag payment anomalies
  6. Output report

primary_dimensions: [completion, robustness, communication]
