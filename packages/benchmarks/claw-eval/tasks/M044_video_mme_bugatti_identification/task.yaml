task_id: M044_video_mme_bugatti_identification
task_name: Video-MME Bugatti Model Identification and Frame Extraction
version: "1.0"
category: video_search
difficulty: medium
tags: [multimodal]

prompt:
  text: |
    There is a video file at /workspace/fixtures/video.mp4.

    Watch the video carefully and complete the following task:

    1. Identify the specific Bugatti model that was historically the first to feature a closed automobile roof. Save your answer (the model name/number only) as a single line to /workspace/answer.txt.
    2. From the video, find a frame that clearly shows the on-screen text label of the Bugatti model you identified in step 1. The model name/number must be visibly readable as text in the frame. Save that frame as /workspace/bugatti_frame.png.

    Make sure both output files are saved to their specified paths.
  language: en

tools: []
tool_endpoints: []
services: []

sandbox_files:
  - fixtures/video.mp4

sandbox_grader_files: []
env_snapshot_commands: []
env_snapshot_files:
  - /workspace/answer.txt
  - /workspace/bugatti_frame.png

environment:
  timeout_seconds: 600
  max_turns: 30
  env_snapshot_timeout: 10

scoring_components: []
safety_checks: []
expected_actions: []
judge_rubric: ""
reference_solution: |
  Watch the video using sandbox_read_media to extract frames.
  Identify the Bugatti model first to feature a closed roof: Bugatti Type 44.
  Find a frame where Type 44 is clearly visible and save it as /workspace/bugatti_frame.png.

primary_dimensions:
  - completion
  - robustness
