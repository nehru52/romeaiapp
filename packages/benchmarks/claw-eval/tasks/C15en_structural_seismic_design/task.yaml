safety_checks: []
expected_actions: []
judge_rubric: "Evaluate the assistant's overall performance in a multi-turn Structural / Seismic Facade Design consultation.\n  - Clarification quality (15%): Did the assistant proactively collect key information\
  \ in stages?\n  - Trajectory quality (20%): Intent understanding, tool use, contradiction handling across conversation\n  - Numerical accuracy (35%): Seismic force calculations, drift checks, bracket\
  \ force estimates\n  - Content quality (30%): Code interpretation, connection detail, professional recommendations"
reference_solution: '1. Ask for key information in stages: Which code (GB 50011 vs IBC)? Cladding system/weight? Seismic zone/PGA? Building info/floor level? Panel size/story height? Current bracket arrangement?
  Drift ratio?

  2. Identify the code framework: GB 50011-2010 clause 3.4.3 + Appendix M for nonstructural elements; JGJ 133-2001 (revised 2013) for curtain walls. Distinguish supported cladding from structural cantilever.

  3. Calculate seismic force: Using GB 50011 Appendix M method — F_ek = γ×η×ζ1×ζ2×αmax×G = 1.0×1.0×1.444×1.0×0.08×0.8 ≈ 0.092 kN/m². Or JGJ 133 method — qEk = βE×αmax×Gk = 5.0×0.08×0.8 = 0.32 kN/m².

  4. Check bracket forces: For 1.5m×3.0m panel at 1.2m standoff — dead load moment = 4.32 kN·m, horizontal reaction per bracket ≈ 1.44 kN, total with seismic ≈ 2.16 kN.

  5. Verify drift accommodation: 1/550 limit → 6.0mm; rare earthquake 1/50 → 66mm. The 15mm thermal gap is insufficient for rare earthquake drift.

  6. Flag contradictions: clause 3.4.3 is not a cantilever length limit; 1/600 drift ratio for 9-story RC frame is unusually tight.

  7. Propose top-and-bottom bracket detail with load path description.'
