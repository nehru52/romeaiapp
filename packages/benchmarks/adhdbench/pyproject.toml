[project]
name = "elizaos-adhdbench"
version = "0.1.0"
description = "Attention & context scaling benchmark for ElizaOS agents"
requires-python = ">=3.11"
dependencies = [
    "eliza-adapter",
    "rich>=15,<16",
    "pyyaml>=6.0,<7",
]

[tool.uv.sources]
eliza-adapter = { path = "../eliza-adapter", editable = true }

[project.optional-dependencies]
dev = ["pytest>=9,<10", "pytest-asyncio>=1.3,<2"]
openai = []
anthropic = []

[project.scripts]
adhdbench = "scripts.run_benchmark:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["elizaos_adhdbench"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
