[build-system]
requires = ["setuptools>=70.0"]
build-backend = "setuptools.build_meta"

[project]
name = "smithers-adapter"
version = "0.1.0"
description = "Benchmark adapter for the Smithers (smithers-orchestrator) agent harness"
requires-python = ">=3.11"
dependencies = [
    "pyyaml>=6.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["smithers_adapter*"]

[tool.setuptools.package-data]
smithers_adapter = ["*.mjs"]

[tool.pytest.ini_options]
addopts = "--import-mode=importlib"
