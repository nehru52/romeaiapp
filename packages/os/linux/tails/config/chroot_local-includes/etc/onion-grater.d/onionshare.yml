---
- apparmor-profiles:
    - '/usr/bin/onionshare'
    - '/usr/bin/onionshare-cli'
  users:
    - 'amnesia'
  commands:
    GETINFO:
      - 'version'
      # stem uses this for listing all hidden services, which
      # OnionShare does when shutting down and cleaning up its own
      # hidden services
      - 'onions/current'
    ADD_ONION:
      # On start OnionShare tries this to check if the version of Tor
      # used supports v3 stealth onions
      - 'NEW:ED25519-V3 Flags=V3Auth Port=1,1 ClientAuthV3=[0-9A-Z]+$'
      # This regex matches the arguments generated by stem the way
      # OnionShare requests hidden services to be created
      - (?:NEW\:ED25519-V3|ED25519-V3\:(?:[A-Za-z0-9+\/]{4})*(?:[A-Za-z0-9+\/]{2}==|[A-Za-z0-9+\/]{3}=)?)(?:| Flags\=V3Auth) Port\=80,176([0-4][0-9]|50)(?:| ClientAuthV3=[0-9A-Z]+)$
    # Tear down hidden services
    DEL_ONION:
      - '.+'
    GETCONF:
      # stem checks this conf when creating hidden services
      - 'hiddenservicesinglehopmode'
  confs:
    # stem
    __owningcontrollerprocess:
  events:
    # stem
    SIGNAL:
      suppress: true
    # stem
    CONF_CHANGED:
      suppress: true
    # stem waits for a "HS_DESC CREATED" when creating a hidden
    # service when requested by OnionShare. These events contain
    # sensitive information like the private key and any key for v3
    # client authorization, so OnionShare will have access to this for
    # all hidden services created, not only its own.
    HS_DESC:
    # stem
    STATUS_SERVER:
      suppress: true
