# -*- mode: conf[space] -*-
#
# elizaOS default networking profile.
#
# Privacy Mode keeps the stock Tails firewall and Tor-only routing. The
# default demo profile lets the bundled elizaOS desktop use normal outbound
# networking while keeping unsolicited inbound traffic closed.

domain ip {
    table filter {
        chain INPUT {
            policy DROP;
            mod state state (ESTABLISHED RELATED) ACCEPT;
            interface lo ACCEPT;
        }

        chain OUTPUT {
            policy ACCEPT;
        }

        chain FORWARD {
            policy DROP;
        }
    }
}

domain ip6 {
    table filter {
        chain INPUT {
            policy DROP;
            mod state state (ESTABLISHED RELATED) ACCEPT;
            interface lo ACCEPT;
        }

        chain OUTPUT {
            policy ACCEPT;
        }

        chain FORWARD {
            policy DROP;
        }
    }
}
