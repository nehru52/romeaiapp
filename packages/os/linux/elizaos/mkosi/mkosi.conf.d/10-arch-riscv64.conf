# elizaOS Linux — mkosi riscv64 overlay.
# Mirrors ../config/package-lists/elizaos-riscv64.list.chroot.
#
# riscv64 has no shim-signed / microcode (those are amd64/arm64-specific
# firmware artifacts). UEFI GRUB chain is grub-efi-riscv64; the loader path
# is EFI/boot/bootriscv64.efi (Debian riscv64 port contract). The mkosi
# grub bootloader emits that path natively, so the live-build patch to
# binary_grub-efi (see ../scripts/patch-live-build-grub-efi-riscv64.sh, if
# present) is NOT required on the mkosi path.

[Match]
Architecture=riscv64

[Content]
Packages=
    linux-image-riscv64
    grub-efi-riscv64
    grub-efi-riscv64-bin
    # Native Postgres: riscv64 C_LOOP bun has no WebAssembly, so the wasm
    # PGlite build cannot run; the agent uses Postgres (POSTGRES_URL).
    postgresql
    postgresql-17-pgvector
    # Node fallback for the bare agent-bundle.js path while the native riscv64
    # Bun port is still gated. See ../README.md "Real agent images" section.
    nodejs
    node-undici
    node-ws
    node-fetch
