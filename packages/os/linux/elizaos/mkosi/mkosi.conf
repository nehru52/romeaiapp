# elizaOS Linux — mkosi build configuration (base).
#
# This is the additive mkosi build path. It produces the same elizaOS image
# (Debian trixie + kiosk + cage + Electrobun app on graphical.target) as the
# live-build path under packages/os/linux/elizaos/, but via systemd/mkosi
# instead of live-build. The live-build tree remains the source of truth for
# release artifacts until mkosi has equivalent boot evidence on all three
# arches (amd64, arm64, riscv64). See ../README.mkosi.md.
#
# Source-of-truth reuse:
#   mkosi.skeleton/      → symlinks ../config/includes.chroot (skeleton, pre-pkg)
#   mkosi.postinst       → runs ../config/hooks/normal/*.hook.chroot in order
#   mkosi.conf.d/        → arch overlays via mkosi [Match]
#   mkosi.profiles/      → profile overlays selected by mkosi --profile
#
# Invocation (typically via ../Makefile mkosi-* targets):
#   mkosi --directory mkosi/ --architecture x86-64 build
#   mkosi --directory mkosi/ --architecture arm64  build
#   mkosi --directory mkosi/ --architecture riscv64 --profile=gui build
#
# Format/output layering:
#   - Format=disk (default here) → GPT disk image with ESP + root, bootable raw
#     (matches the "Raw disk image" + "systemd-repart partitioned image"
#     deliverables). The finalize script wraps it into a hybrid ISO via
#     xorriso for the existing release/flasher/QEMU evidence contract.

[Distribution]
Distribution=debian
Release=trixie
Repositories=main,contrib,non-free-firmware

[Output]
# Base ImageId fallback; the arch overlay in mkosi.conf.d/ sets the
# canonical name (live-build uses `amd64`, not mkosi's `x86-64`), and
# profile overlays append the profile suffix on top via the same key.
ImageId=elizaos-linux-%a
OutputDirectory=../out/mkosi
Format=disk
ManifestFormat=json
CompressOutput=zstd

[Content]
Bootable=yes
Bootloader=grub
BiosBootloader=grub
ShimBootloader=signed
Locale=C.UTF-8
Timezone=UTC
WithDocs=no
WithNetwork=yes
# mkosi auto-discovers mkosi.skeleton/ and mkosi.extra/ — no explicit
# SkeletonTrees= line; listing it again duplicates the entry (visible as
# the path appearing twice in `mkosi summary`).
#
# BuildSources mounts the variant tree (..) at /work/src inside scripts so
# mkosi.postinst can `bash $/work/src/config/hooks/normal/*.hook.chroot`
# unmodified. Without this, mkosi defaults BuildSources to the config
# directory itself, hiding config/hooks/ from the postinst.
BuildSources=..:src

# Base package set shared across all arches (mirrors
# ../config/package-lists/elizaos-common.list.chroot, minus the live-only
# live-boot/live-config-systemd packages — mkosi produces an installable disk
# image, not a live-build squashfs).
Packages=
    systemd
    systemd-sysv
    dbus
    udev
    kbd
    locales
    ca-certificates
    curl
    sudo
    git
    python3
    sqlite3
    xdg-utils
    fontconfig
    fonts-noto-core
    fonts-noto-mono
    fonts-dejavu-core
    pciutils
    usbutils
    htop
    strace

[Validation]
# No secure-boot signing in the base path; arch overlays may enable it where
# Debian provides a signed shim.
SecureBoot=no
