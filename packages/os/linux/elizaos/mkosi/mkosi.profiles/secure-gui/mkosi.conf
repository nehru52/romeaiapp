# elizaOS Linux — mkosi composite secure+gui profile.
#
# mkosi v24's `--profile=` takes a single value (last-wins), so the
# secure-gui combination ships as its own profile that flat-lists both
# package sets. Keep this file's [Content] Packages= synced with
# ../gui/mkosi.conf and ../secure/mkosi.conf — `make mkosi-lint` enforces
# that all three lists stay equivalent.

[Output]
ImageId=elizaos-linux-%a-secure-gui

[Content]
Packages=
    # ----- from gui -----
    cage
    seatd
    libwebkit2gtk-4.1-0
    libgtk-3-0t64
    libdbusmenu-gtk3-4
    libgl1-mesa-dri
    libegl1
    xorg
    gdm3
    gnome-session
    gnome-shell
    gnome-terminal
    gnome-control-center
    nautilus
    network-manager
    network-manager-gnome
    pulseaudio
    pipewire
    pipewire-pulse
    epiphany-browser
    xinit
    xauth
    xserver-xorg-legacy
    xserver-xorg-video-modesetting
    grim
    scrot
    plymouth
    plymouth-themes
    plymouth-label
    # ----- from secure -----
    tor
    torsocks
    apparmor
    apparmor-utils
    apparmor-profiles
    apparmor-profiles-extra
    macchanger
    secure-delete
    nftables
    unattended-upgrades
    usbguard
    libpam-tmpdir
