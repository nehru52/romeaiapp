# elizaOS Linux — mkosi secure hardening profile overlay.
# Mirrors ../../../config/profiles/secure/package-lists/elizaos-secure.list.chroot.
# Use `--profile=secure-gui` for the secure+GUI equivalent. Residing in
# mkosi.profiles/secure/ is the activation gate.

[Output]
ImageId=elizaos-linux-%a-secure

[Content]
Packages=
    tor
    torsocks
    apparmor
    apparmor-utils
    apparmor-profiles
    apparmor-profiles-extra
    macchanger
    secure-delete
    nftables
    unattended-upgrades
    usbguard
    libpam-tmpdir
