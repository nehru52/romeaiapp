# elizaOS Linux — mkosi GUI/kiosk profile overlay.
# Mirrors ../../../config/profiles/gui/package-lists/elizaos-gui.list.chroot.
#
# Activated by `mkosi --profile=gui ...`. Applies to ALL arches including
# riscv64 — Debian trixie ships cage + WebKitGTK + Epiphany + GNOME fallback
# on riscv64, so the same kiosk boot chain (graphical.target -> seatd ->
# elizaos-kiosk -> cage -> elizaOS app) runs unchanged on riscv64. The
# existing 0025-enable-graphical-session.hook.chroot wires the units and is
# invoked from ../../mkosi.postinst.
#
# No [Match] block needed: residing in mkosi.profiles/gui/ IS the gate.

[Output]
ImageId=elizaos-linux-%a-gui

[Content]
Packages=
    cage
    seatd
    libwebkit2gtk-4.1-0
    libgtk-3-0t64
    libdbusmenu-gtk3-4
    libgl1-mesa-dri
    libegl1
    xorg
    gdm3
    gnome-session
    gnome-shell
    gnome-terminal
    gnome-control-center
    nautilus
    network-manager
    network-manager-gnome
    pulseaudio
    pipewire
    pipewire-pulse
    epiphany-browser
    xinit
    xauth
    xserver-xorg-legacy
    xserver-xorg-video-modesetting
    grim
    scrot
    plymouth
    plymouth-themes
    plymouth-label
