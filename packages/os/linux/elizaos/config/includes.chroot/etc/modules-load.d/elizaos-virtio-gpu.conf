# Bind the virtio-gpu DRM driver early so the kernel framebuffer (/dev/fb0)
# and fbcon attach to the VT console (/dev/console = tty0) at boot.
#
# Why this exists: the QEMU `virt` machine used for riscv64 (and the virtio
# GPU path used by some amd64/arm64 VMs) has no legacy VGA/efifb handoff.
# Until the virtio-gpu DRM driver probes, tty0 has no backing framebuffer and
# the QEMU window shows "Display output is not active". The Debian kernels
# build drm/virtio_gpu as modules, so nothing loads them until userspace asks.
#
# systemd-modules-load.service reads this file very early (well before gdm),
# loads the modules, DRM creates the scanout, and fbcon lights the console —
# so the boot console (and later the graphical session) become visible.
#
# modprobe resolves the dependency chain (drm, drm_kms_helper, virtio,
# virtio_pci) automatically; virtio_pci is listed first to make the PCI
# transport explicit on the `virt` machine. On hardware lacking these
# devices the load is a no-op and boot continues normally.
virtio_pci
virtio_gpu
