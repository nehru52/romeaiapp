# elizaOS Linux — gdm3 is NOT the default session. The default GUI is the
# locked single-app kiosk (elizaos-kiosk.service: cage -> elizaOS app), and
# gdm3 is masked by hook 0025-enable-graphical-session so it never grabs the
# seat. This config only takes effect if gdm3 is manually unmasked + started
# for debugging; in that case it autologins `user` (matching the kiosk owner
# and the getty@tty1 autologin override) with no greeter password gate.
[daemon]
AutomaticLoginEnable=true
AutomaticLogin=user
