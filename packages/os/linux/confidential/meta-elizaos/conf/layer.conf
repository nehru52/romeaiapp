# meta-elizaos — elizaOS confidential-profile Yocto layer.
#
# Real, parseable layer configuration for the ELIZAOS_PROFILE=confidential guest
# (plan packages/os/docs/tee-os-implementation-plan.md §1.3 / OS-1). The full
# bitbake image build is BLOCKED on a Yocto/meta-dstack build host (gate
# confidential-image-reproducibility); see ../README.md. This file and the
# recipes it points at are nonetheless syntactically valid and reference only
# install sources that exist in-tree.

# We have a conf and classes directory.
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES.
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-elizaos"
BBFILE_PATTERN_meta-elizaos = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-elizaos = "10"

# Depends on the OpenEmbedded core; meta-dstack supplies the CVM/TDX guest base
# and is composed alongside this layer in the repro-build context.
LAYERDEPENDS_meta-elizaos = "core"
LAYERSERIES_COMPAT_meta-elizaos = "scarthgap"

LAYERVERSION_meta-elizaos = "1"
