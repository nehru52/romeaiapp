[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "alberta-framework"
version = "0.26.0"
description = "Implementation of the Alberta Plan for AI Research - continual learning with meta-learned step-sizes"
readme = "README.md"
license = "Apache-2.0"
# Vendored into elizaOS at packages/alberta (see VENDORING.md). Relaxed from
# upstream ">=3.13" to ">=3.12": the continual-RL subset only uses PEP 695
# syntax (3.12+), and eliza-robot imports it in-process on Python 3.12 where
# brax/mujoco pin numpy<2. numpy floor relaxed to match that constraint.
requires-python = ">=3.12"
authors = [
    { name = "J. Klawson", email = "j-klawson@users.noreply.github.com" }
]
keywords = ["machine-learning", "continual-learning", "meta-learning", "jax", "reinforcement-learning"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "jax>=0.4",
    "jaxlib>=0.4",
    "numpy>=1.26",
    "pandas>=2.2",
    "matplotlib>=3.8",
    "scipy>=1.11",
    "scikit-learn>=1.5",
    "joblib>=1.3",
    "tqdm>=4.66",
    "chex>=0.1.86",
    "jaxtyping>=0.2.28",
    "orbax-checkpoint>=0.11",
    "flax>=0.10",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov",
    "ruff",
    "mypy",
    "beartype>=0.18.0",
]
docs = [
    "mkdocs>=1.6",
    "mkdocs-material>=9.5",
    "mkdocstrings[python]>=0.24",
    "mkdocs-gen-files>=0.5",
    "mkdocs-literate-nav>=0.6",
    "mkdocs-section-index>=0.3",
]
gymnasium = [
    "gymnasium>=0.29.0",
]
bsuite = [
    "dm-env>=1.6",
    "optax>=0.1.7",
    "dm-haiku>=0.0.10",
    "plotnine>=0.12",
]
gpu = [
    "jax[cuda12]>=0.4",
]

[project.urls]
Homepage = "https://github.com/j-klawson/alberta-framework"
Repository = "https://github.com/j-klawson/alberta-framework"
Documentation = "https://j-klawson.github.io/alberta-framework"
Issues = "https://github.com/j-klawson/alberta-framework/issues"

[project.scripts]
alberta-step1-smoke = "alberta_framework.cli:step1_smoke_main"
alberta-step2-smoke = "alberta_framework.cli:step2_smoke_main"
alberta-evidence-gate = "alberta_framework.cli:evidence_gate_main"

[tool.hatch.build.targets.wheel]
packages = ["alberta_framework"]

[tool.hatch.build.targets.sdist]
include = [
    "/CHANGELOG.md",
    "/CITATION.cff",
    "/LICENSE",
    "/README.md",
    "/pyproject.toml",
    "/alberta_framework",
]
exclude = [
    "**/__pycache__",
    "/.claude",
    "/.mypy_cache",
    "/.pytest_cache",
    "/.ruff_cache",
    "/.venv",
    "/benchmarks",
    "/dist",
    "/docs/_build",
    "/examples",
    "/output",
    "/outputs",
    "/site",
    "/tests",
]

[tool.ruff]
line-length = 100
target-version = "py313"
extend-exclude = [
    ".claude",
    "benchmarks",
    "examples",
    "scripts",
    "dist",
    "output",
    "outputs",
    "site",
]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
# F722: Syntax error in forward annotation - ruff doesn't understand jaxtyping shape annotations
ignore = ["F722"]

[tool.mypy]
python_version = "3.13"
warn_return_any = true
warn_unused_ignores = true
strict = true
files = ["alberta_framework"]

[[tool.mypy.overrides]]
module = "gymnasium.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "matplotlib.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "scipy.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "joblib.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "tqdm.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "pandas.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "chex.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "jaxtyping.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "dm_env.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "bsuite.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "haiku.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "optax.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "plotnine.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "orbax.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "tensorstore.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "termcolor.*"
ignore_missing_imports = true

# Benchmarks use dynamic dm_env/bsuite/haiku types that mypy can't fully resolve
[[tool.mypy.overrides]]
module = "benchmarks.*"
disable_error_code = ["call-arg", "arg-type", "union-attr", "attr-defined", "operator"]

# chex dataclasses don't have full mypy support - disable strict checks for core modules
[[tool.mypy.overrides]]
module = "alberta_framework.core.types"
disable_error_code = ["call-arg"]

[[tool.mypy.overrides]]
module = "alberta_framework.core.normalizers"
disable_error_code = ["call-arg"]

[[tool.mypy.overrides]]
module = "alberta_framework.core.optimizers"
disable_error_code = ["call-arg"]

[[tool.mypy.overrides]]
module = "alberta_framework.core.learners"
disable_error_code = ["call-arg", "arg-type", "union-attr"]

[[tool.mypy.overrides]]
module = "alberta_framework.core.multi_head_learner"
disable_error_code = ["call-arg", "arg-type", "union-attr"]

[[tool.mypy.overrides]]
module = "alberta_framework.core.horde"
disable_error_code = ["call-arg", "return-value", "unused-ignore"]

[[tool.mypy.overrides]]
module = "alberta_framework.core.independent_demon_horde"
disable_error_code = ["call-arg", "unused-ignore"]

[[tool.mypy.overrides]]
module = "alberta_framework.core.feature_discovery"
disable_error_code = ["call-arg", "no-any-return"]

[[tool.mypy.overrides]]
module = "alberta_framework.core.interaction_features"
disable_error_code = ["call-arg", "misc", "no-any-return", "return-value"]

[[tool.mypy.overrides]]
module = "alberta_framework.core.compositional_features"
disable_error_code = ["call-arg", "no-any-return", "return-value"]

[[tool.mypy.overrides]]
module = "alberta_framework.core.deep_feature_lifecycle"
disable_error_code = ["arg-type", "attr-defined", "call-arg", "unused-ignore"]

[[tool.mypy.overrides]]
module = "alberta_framework.core.continual_backprop"
disable_error_code = ["arg-type", "call-arg", "no-any-return", "unused-ignore"]

[[tool.mypy.overrides]]
module = "alberta_framework.core.options"
disable_error_code = ["call-arg", "no-any-return"]

[[tool.mypy.overrides]]
module = "alberta_framework.core.associative_memory"
disable_error_code = ["call-arg", "unused-ignore"]

[[tool.mypy.overrides]]
module = "alberta_framework.core.diffeml_image"
disable_error_code = ["import-untyped"]

[[tool.mypy.overrides]]
module = "alberta_framework.pipeline"
disable_error_code = ["arg-type", "union-attr"]

[[tool.mypy.overrides]]
module = "alberta_framework.streams.synthetic"
disable_error_code = ["call-arg"]

[[tool.mypy.overrides]]
module = "alberta_framework.streams.alberta_plan_step1"
disable_error_code = ["call-arg"]

[[tool.mypy.overrides]]
module = "alberta_framework.streams.feature_discovery"
disable_error_code = ["call-arg"]

[[tool.mypy.overrides]]
module = "alberta_framework.streams.out_of_class"
disable_error_code = ["call-arg"]

[[tool.mypy.overrides]]
module = "alberta_framework.streams.pavlovian"
disable_error_code = ["call-arg"]

[[tool.mypy.overrides]]
module = "alberta_framework.streams.partial_observation"
disable_error_code = ["call-arg", "unused-ignore"]

[[tool.mypy.overrides]]
module = "alberta_framework.streams.gymnasium"
disable_error_code = ["call-arg"]

[[tool.mypy.overrides]]
module = "alberta_framework.core.prototype_agent"
disable_error_code = ["attr-defined", "call-arg", "no-any-return", "union-attr", "arg-type"]

[[tool.mypy.overrides]]
module = "alberta_framework.core.diagnostics"
disable_error_code = ["call-arg"]

[[tool.mypy.overrides]]
module = "alberta_framework.core.oak"
disable_error_code = ["call-arg", "no-any-return"]

[[tool.mypy.overrides]]
module = "alberta_framework.core.intelligence_amplification"
disable_error_code = ["call-arg", "no-any-return"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v"
