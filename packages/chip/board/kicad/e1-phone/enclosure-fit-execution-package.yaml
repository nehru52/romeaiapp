      - U_PMIC_CHARGER
    active_regions_mm:
      J_BATTERY:
        x: 31.0
        y: 27.0
        width: 12.0
        height: 2.0
      U_PMIC_CHARGER:
        x: 18.0
        y: 18.0
        width: 13.0
        height: 8.0
