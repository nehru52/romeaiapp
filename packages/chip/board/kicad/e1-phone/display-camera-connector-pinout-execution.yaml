claim_boundary: Execution package for converting the selected display and camera OEM choices into real KiCad connector
  symbols, footprints, and routed-board STEP bindings. It is not a supplier pinout, not supplier approval, not a
  footprint freeze, not routed MIPI evidence, not ERC/DRC evidence, and not enclosure readiness.
