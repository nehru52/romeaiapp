pinout_gap_matrix:
  - interface_id: display_touch_fpc
    missing_before_symbol_capture:
      - exact display/touch FPC pin count
      - MIPI DSI lane order, polarity, ground interleave, and NC pins
      - touch-controller I2C, IRQ, reset, and power pin map
      - mating connector MPN, pin-1 datum, stiffener, and bend keepout
  - interface_id: rear_camera_fpc
    missing_before_symbol_capture:
      - exact 24-pin FPC pin order and connector MPN
      - CSI lane order, MCLK, I2C/VCM, reset, PWDN, and rail pins
      - lens-axis datum, z-height, FPC exit, STEP model, and sample inspection
  - interface_id: front_camera_fpc
    missing_before_symbol_capture:
      - exact 30-pin FPC pin order and connector MPN
      - CSI lane order, MCLK, reset, rail pins, and unused/NC pins
      - lens height, black-mask datum, FPC exit, STEP model, and sample inspection
cross_checks:
  display_matches_selected_fit_anchor: true
  display_still_fits_current_envelope: true
  rear_camera_public_pin_count_matches_candidate: true
  front_camera_public_pin_count_matches_candidate: true
  display_route_pair_count_is_five: true
  rear_camera_route_constraints_track_clock_pair: true
  front_camera_route_constraints_track_clock_pair: true
  camera_data_lane_pinout_still_waits_for_supplier_mapping: true
  all_execution_records_fail_closed: true
  source_revalidation_still_not_supplier_approved: true
  schematic_netclass_still_blocks_real_capture: true
  alternate_display_connector_branches_fail_closed: true
  parseable_display_alternates_bound_to_integration_context: true
release_blockers:
  - display/touch FPC exact pin count, lane order, mating connector, and STEP model are missing
  - rear and front camera FPC exact pin orders, mating connectors, and STEP models are missing
  - KiCad connector symbols and supplier land patterns are not captured
  - MIPI DSI/CSI escape, length/skew, impedance, return-path, and DRC/SI reports are missing
  - sample inspection, display bring-up, camera capture, and routed-board enclosure clearance evidence are missing
  - parseable 055WU01 and E549/RM67191 display connector branches require signed FPC pinout, mating connector, land pattern, STEP, power/touch data, and samples before symbol or footprint capture
forbidden_claims:
  - display_pinout_frozen
  - camera_pinout_frozen
  - display_connector_ready
  - camera_connector_ready
  - supplier_footprints_ready
  - mipi_routed
  - erc_clean
  - drc_clean
  - enclosure_ready
  - fabrication_ready
  - end_to_end_phone_ready
