alternate_display_connector_branches:
  - branch_id: meta_055wu01_40pin
    source_id: display_alternate_alibaba_meta_055wu01
    source_context: display_oem_context.alternate_display_options.meta_055wu01_40pin
    candidate: 055WU01
    source_marketplace: Alibaba
    observed_signal_interface: MIPI_40_pins
    observed_active_area_mm:
      width: 68.04
      height: 120.96
    connector_branch_status: blocked_shortlist_only_until_signed_40pin_fpc_pinout_mating_connector_land_pattern_step_and_sample
    connector_decision: keep_as_possible_40pin_display_fpc_variant_not_promoted
    required_before_symbol_or_footprint:
      - signed 2D drawing with FPC exit, pin-1 datum, and cover-lens datum
      - exact 40-pin FPC pinout with DSI lane order, touch pins, reset, TE, backlight, bias, and grounds
      - mating connector MPN, recommended land pattern, height, insertion direction, and STEP model
      - sample inspection and panel initialization/touch configuration data
    release_allowed: false
  - branch_id: e549_rm67191_amoled
    source_id: display_alternate_made_in_china_e549_amoled
    source_context: display_oem_context.alternate_display_options.e549_rm67191_amoled
    candidate: E549-HC01_RM67191_AMOLED_class
    source_marketplace: Made-in-China
    observed_outline_mm:
      width: 70.66
      height: 128.36
      thickness: 0.82
    observed_active_area_mm:
      width: 68.299
      height: 121.421
    connector_branch_status: blocked_shortlist_only_until_signed_amoled_touch_stack_power_sequence_fpc_pinout_connector_step_and_sample
    connector_decision: keep_as_possible_thinner_amoled_branch_not_promoted
    required_before_symbol_or_footprint:
      - signed 2D drawing with FPC exit, pin-1 datum, active area, and cover-lens/touch-stack datum
      - exact AMOLED FPC pinout with MIPI lane order, touch-controller pins, power rails, reset, TE, grounds, and NC pins
      - mating connector MPN, recommended land pattern, height, insertion direction, and STEP model
      - AMOLED power-sequence limits, touch-controller configuration, burn-in/luminance data, and sample inspection
    release_allowed: false
connector_pinout_execution:
  - interface_id: display_touch_fpc
    refdes: J_DISPLAY_TOUCH
    schematic_sheet: display_camera.kicad_sch
    source_candidate: CH550FH01A-CT
    status: blocked_waiting_supplier_pinout_connector_land_pattern_step_and_samples
    public_pin_count: null
    required_contract_nets:
      - DISP_AVDD_5V5
      - DISP_AVEE_N5V5
      - DISP_BL_EN
      - DISP_BL_PWM
      - DISP_RESET_N
      - DISP_TE
      - DSI_CLK_N
      - DSI_CLK_P
      - DSI_D0_N
      - DSI_D0_P
      - DSI_D1_N
      - DSI_D1_P
      - DSI_D2_N
      - DSI_D2_P
      - DSI_D3_N
      - DSI_D3_P
      - GND
      - IO_1V8
      - TOUCH_I2C_SCL
      - TOUCH_I2C_SDA
      - TOUCH_IRQ_N
      - TOUCH_RESET_N
    route_constraint_groups:
      - name: DSI_CLK
        nets:
          - DSI_CLK_P
          - DSI_CLK_N
        class: mipi_dphy_diff
        max_length_mm: 45
        intra_pair_skew_mm_max: 0.25
      - name: DSI_D0
