          - DSI_D3_P
          - DSI_D3_N
        class: mipi_dphy_diff
        max_length_mm: 45
        intra_pair_skew_mm_max: 0.25
    pin_assignment_state: not_assigned_until_supplier_pinout_received
    symbol_capture_tasks:
      - replace schematic text scaffold with real connector symbol
      - assign supplier pin numbers, electrical types, NC pins, shields, and grounds
      - cross-probe every contract net against block-netlist.yaml and routing-constraints.yaml
      - record ERC result or signed waivers before routed-release
    footprint_capture_tasks:
      - capture supplier recommended land pattern, paste, mask, courtyard, and keepout
      - bind mating connector MPN, height, insertion direction, and STEP model
      - verify pad numbering against supplier pin-1 datum and FPC orientation
      - run escape/trial-route proof before route acceptance
    mechanical_capture_tasks:
      - bind FPC exit, stiffener, bend radius, and z-height datums into routed-board STEP
      - rerun display/camera enclosure clearance with final connector and module models
      - record incoming sample dimensional inspection before footprint freeze
    status_note: public listing gives module geometry, but exact display/touch FPC pin count and lane order are
      missing
