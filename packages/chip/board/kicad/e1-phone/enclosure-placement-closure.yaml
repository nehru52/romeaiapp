  manufacturing_release_ready: false
  why_not_release_ready:
    - Local routed KiCad PCB and routed STEP candidates exist for visual review only; supplier-approved
      production routing, fabrication outputs, and first-article evidence are not released.
    - Supplier mechanical drawings and samples for display, cameras, USB-C, buttons, battery, and speakers
      are not locked.
    - No mold-flow, thermal, acoustic, RF, drop, ingress, or tolerance-stack validation with physical
      samples.
    - No GD&T-controlled release drawing package or toolmaker DFM signoff.
  all_cad_checks_pass: true
  visual_review_pass: true
placement_interfaces_closed_for_concept:
  - 5.5 inch display CTP outline against 78.0 x 153.6 mm envelope
  - 64.0 x 132.0 mm KiCad Edge.Cuts against CAD main_pcb envelope
  - bottom-center USB-C aperture and receptacle envelope
  - side power and volume cap/actuator keepout
  - battery pouch window and PCB island clearance
  - front and rear camera module envelopes
  - speaker, microphones, earpiece, haptic, SIM/service, and antenna keepouts
release_blockers:
  - routed KiCad board STEP with final component 3D models
  - supplier display, camera, USB-C, button, battery, speaker, and radio STEP/B-rep models
  - 'formal tolerance stack with battery swelling worst case is OVER BUDGET by 0.142 mm on the back swell void: UPSTREAM
    FIX REQUIRED in mechanical/e1-phone/cad/e1_phone_params.yaml battery.battery_swell_gap_mm: raise from
    0.6 mm to >= 0.742 mm (and grow device envelope_mm[2] by the same delta), or tighten the tolerance
    class, or specify a back-void compressible foam pad with a documented compression set that absorbs
    the over-budget without preloading the cell'
  - full CAD boolean interference check using supplier geometry
  - USB-C insertion/removal load test into enclosure saddle
  - side-button load-path and cycle test
  - drop, torsion, thermal expansion, water/dust ingress, and acoustic leak review
  - RF antenna/SAR validation in final enclosure plastics and metal stack
forbidden_claims:
  - enclosure_ready
  - mechanical_release_ready
  - routed_board_step_ready
  - tolerance_stack_closed
  - drop_tested
  - waterproof_ready
  - rf_in_enclosure_ready
  - fabrication_ready
