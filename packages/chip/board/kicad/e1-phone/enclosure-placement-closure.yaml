schema: eliza.e1_phone_enclosure_placement_closure.v1
status: enclosure_placement_cross_checked_not_release_ready
date: '2026-05-20'
claim_boundary: Concept PCB-to-enclosure placement closure only. This uses generated EVT0 CAD, STEP envelope
  parts, display fit, KiCad outline handoff, and parameterized clearance checks. It is not final enclosure
  readiness, routed-board STEP, supplier B-rep validation, tolerance-stack signoff, drop/insertion-load
  test, RF-in-enclosure validation, or water/dust ingress evidence.
