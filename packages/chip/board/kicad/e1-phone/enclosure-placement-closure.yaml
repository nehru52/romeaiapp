  - board/kicad/e1-phone/mechanical-overlay.yaml
  - mechanical/e1-phone/review/fit-check-report.json
  - mechanical/e1-phone/review/assembly-clearance.json
  - mechanical/e1-phone/review/kicad-mechanical-handoff.json
  - mechanical/e1-phone/review/solid-cad-handoff.json
  - mechanical/e1-phone/review/manufacturing-readiness.json
  - mechanical/e1-phone/out/assembly-manifest.json
envelope_cross_check:
  metrics_device_envelope_mm:
    width: 78.0
    height: 153.6
    max_thickness: 11.8
  enclosure_device_envelope_mm:
    width: 78.0
    height: 153.6
    max_thickness: 11.8
  cad_device_envelope_mm:
    width: 78.0
    height: 153.6
    max_thickness: 11.8
  display_primary_fits_current_envelope: true
  display_clearance_mm:
    width_clearance_mm: 0.9
    height_clearance_mm: 1.83
component_height_stack_vs_interior_depth:
  claim_boundary: Component height stack vs flush-back interior depth from EVT0 CAD fit-check z-coordinates,
    carried to an end-of-life worst case with explicit LiPo swell and the molded/placement tolerance stack-up.
    This is a CAD-estimate proof using datasheet-typical tolerances, not a measured tolerance stack with
    gasket compression, foam compression set, or supplier z-height signoff.
  device_thickness_mm: 11.8
  wall_thickness_mm: 1.15
  interior_depth_between_walls_mm: 9.5
  front_to_back_z_coordinates_mm:
    display_lcm_back_z: 1.63
    battery_front_z: 1.45
    battery_back_z: -4.15
    back_inner_wall_z: -4.75
  derived_stack_mm:
    battery_thickness: 5.6
    display_to_battery_gap: 0.18
    battery_to_back_wall_gap: 0.6
    occupied_display_back_to_back_wall: 6.38
    display_back_to_back_wall_span: 6.38
    nominal_interior_residual_margin: 0.0
    front_static_gap_required: 0.15
    back_swell_gap_required: 0.6
  battery_swell_allowance_mm:
    basis: LiPo pouch swells 8-10 percent in thickness over service life
    swell_pct_range:
      - 8.0
      - 10.0
    swell_low_mm: 0.448
    swell_high_mm: 0.56
    declared_back_swell_void_mm: 0.6
    swell_vented_to: back_shell_side_void (display-side static gap unaffected)
  stack_tolerance_budget_mm:
    evidence_class: cad_estimate_for_evt_planning, not_measured_hardware
    process_class: hard_tool_class_101_with_alignment_fixtures
    contributors:
      plastic_shrink_on_interior_depth: 0.007
      mold_dimension_tolerance: 0.025
      adhesive_cure_variance: 0.02
      assembly_placement: 0.05
      component_datasheet_typical: 0.05
      solder_reflow_connector_float: 0.03
    back_void_tolerance_arithmetic_mm: 0.182
    back_void_tolerance_rss_mm: 0.083
    front_gap_tolerance_arithmetic_mm: 0.12
    front_gap_tolerance_rss_mm: 0.073
  worst_case_residual_mm:
    back_swell_void_arithmetic: -0.142
    back_swell_void_rss: -0.043
    display_static_gap_arithmetic: 0.06
    display_static_gap_rss: 0.107
    gate_basis: arithmetic worst case (fail-closed); RSS shown for reference only
  interface_z_stack_battery_target_mm: 5.6
  fits_flush_back_budget: true
  fits_worst_case_swell_and_tolerance: false
  panel_protected_at_worst_case: true
  back_void_holds_at_worst_case: false
  worst_case_over_budget_mm: 0.142
  mitigation:
    - back_swell_void over budget by 0.142 mm at worst case (10 percent swell 0.56 mm + arithmetic tolerance
      0.182 mm vs declared void 0.6 mm)
    - 'UPSTREAM FIX REQUIRED in mechanical/e1-phone/cad/e1_phone_params.yaml battery.battery_swell_gap_mm:
      raise from 0.6 mm to >= 0.742 mm (and grow device envelope_mm[2] by the same delta), or tighten
      the tolerance class, or specify a back-void compressible foam pad with a documented compression
      set that absorbs the over-budget without preloading the cell'
  gaps_meet_minimum: true
  discrepancies: []
pcb_to_cad_handoff:
  pcb_source: board/kicad/e1-phone/pcb/e1-phone-mainboard-concept.kicad_pcb
  kicad_outline_check:
    pass: true
    kicad_edge_cuts_mm:
      - 64.0
      - 132.0
    cad_pcb_outline_mm:
      - 64.0
      - 132.0
    source: board/kicad/e1-phone/pcb/e1-phone-mainboard-concept.kicad_pcb
  constraint_count: 8
  constraint_ids:
    - battery_window
    - board_outline
    - display_fpc_zone
    - mechanical_overlay
    - redcap_module_zone
    - side_key_stack
    - speaker_mic_ports
    - usb_c_mechanical_capture
  next_kicad_edits:
    - Replace concept rectangles with real footprints for USB4105, display FPC, camera FPCs, side tactile
      switches, speaker spring pads, MEMS microphones, and RG255C/alternate modem.
    - Promote mechanical-overlay.yaml keepouts into real KiCad keepout/courtyard objects once footprints
      replace concept rectangles.
    - Generate a board STEP with component 3D models and feed it back into mechanical/e1-phone instead
      of the current concept PCB mesh.
    - Add courtyard/height metadata for all edge-facing connectors so enclosure collision checks can consume
      them automatically.
