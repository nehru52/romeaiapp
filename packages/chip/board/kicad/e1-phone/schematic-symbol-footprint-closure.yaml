major_symbol_footprint_closures:
  - domain: usb_c_charge_data_debug
    refdes_groups:
      - J_USB_C
      - U_USB_PD
      - U_CHARGER
    required_supplier_inputs:
      - Type-C receptacle datasheet, recommended footprint, shell stake drawing, and STEP
      - USB-PD controller symbol and pin map reviewed against selected charging policy
      - charger/power-path symbol, package, thermal pad, and sense-pin Kelvin routing requirements
      - ESD/TVS selected MPNs with package, pad geometry, and VBUS surge/current rating
    required_kicad_outputs:
      - reviewed KiCad symbols with electrical types and hidden power pins resolved
      - USB-C receptacle footprint with shell pads, keepouts, courtyard, paste, and 3D model
      - charger and USB-PD footprints with thermal-pad paste aperture and height model
      - ERC report with no unwaived power, CC, VBUS, or shield grounding errors
    current_status: blocked_text_scaffold_and_placeholder_footprints_only
  - domain: display_touch
    refdes_groups:
      - J_DISPLAY_TOUCH
    required_supplier_inputs:
      - selected 5.5 inch display FPC pinout, mating connector MPN, stack drawing, and STEP
      - touch controller I2C address, interrupt/reset pins, panel initialization, and backlight/bias power spec
      - FPC exit, stiffener, bend radius, cover-glass datum, and display active-area drawing
    required_kicad_outputs:
      - display/touch connector symbol matching supplier pin order exactly
      - connector footprint with pad numbering, courtyard, keepout, and mated-height model
      - DSI/touch/backlight/bias nets tied to routing constraints and power sequencing
      - ERC report plus pinout review signoff
    current_status: blocked_waiting_supplier_pinout_and_connector_land_pattern
  - domain: front_rear_cameras
    refdes_groups:
      - J_CAM0
      - J_CAM1
      - J_CAM0_CAM1
    required_supplier_inputs:
      - front and rear module FPC pinouts, lane order, clock, reset, power sequence, and mating connector MPNs
      - lens axis, z-height, module outline, shield height, optical window, and STEP models
      - driver/OTP calibration and bring-up interface requirements
    required_kicad_outputs:
      - separate front and rear camera symbols or explicit dual-camera connector symbol
      - supplier land patterns with pad order verified against CSI lane assignment
      - camera power sequencing and reset/clock nets captured in schematic
      - ERC report plus camera pinout signoff
    current_status: blocked_waiting_supplier_camera_drawings_and_pinouts
  - domain: radios_cellular_wifi_bt_gnss
    refdes_groups:
      - U_CELL
      - U_WIFI_BT
      - U_SIM_ESIM
    required_supplier_inputs:
      - cellular module hardware design guide, region SKU band matrix, LGA/socket footprint, and antenna reference
        layout
      - Wi-Fi/Bluetooth module datasheet, reference land pattern, RF feed rules, firmware/regulatory scope, and
        STEP
      - SIM/eSIM reference design, ESD, level shifting, and carrier/regulatory certification scope
    required_kicad_outputs:
      - cellular, Wi-Fi/Bluetooth, SIM/eSIM symbols and exact host-interface pin mapping
      - module footprints with keepouts, ground pads, stencil, courtyard, and 3D models
      - RF feed, conducted access, matching footprints, and antenna keepouts tied to net classes
      - ERC report covering host wake/reset/enable, USIM/eSIM, PCIe/USB2, and RF control pins
    current_status: blocked_waiting_module_reference_layout_and_certification_scope
  - domain: power_battery_pmic_thermal
    refdes_groups:
      - J_BATTERY
      - U_PMIC
      - U_CHARGER
      - U_PMIC_CHARGER
    required_supplier_inputs:
      - battery pack drawing, connector pinout, NTC curve, PCM limits, swelling envelope, UN38.3, and MSDS
      - PMIC and charger package drawings, thermal pad rules, power-sequence requirements, and layout guides
      - regulator inductor/capacitor MPNs, derating, DCR/ESR, current ratings, and height models
    required_kicad_outputs:
      - rail-by-rail schematic with power flags, sequencing, load switches, and measurement points
      - footprints for PMIC, charger, passives, inductors, current sense, and battery connector
      - ERC plus reviewed power-tree, current-limit, and thermal-pad signoff
    current_status: blocked_waiting_power_tree_symbol_capture_and_supplier_land_patterns
  - domain: side_buttons_audio_haptics_split_interconnect
    refdes_groups:
      - SW_POWER_VOL
      - U_AUDIO_SPK_MIC
      - U_AUDIO_HAPTIC
      - J_TOP_BOTTOM_FLEX_TOP
      - J_TOP_BOTTOM_FLEX_BOTTOM
    required_supplier_inputs:
      - power/volume switch or side-key flex drawing, force/travel stack, land pattern, and lifecycle rating
      - codec, amplifier, microphones, speaker box, haptic driver/LRA, acoustic gasket, and port drawings
      - top/bottom flex connector pin count, mating height, pinout, stiffener, bend, and strain relief drawing
    required_kicad_outputs:
      - side-key, audio, haptic, and interconnect symbols with exact pin order
      - footprints with mechanical actuation, acoustic, and mated-height datums
      - split-board continuity/test coverage and ERC for wake/audio/haptic crossing nets
    current_status: blocked_waiting_supplier_mechanical_and_connector_data
