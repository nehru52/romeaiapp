cross_checks:
  schematic_is_non_release_symbol_scaffold: true
  supplier_reviewed_schematic_symbols_missing: true
  placeholder_footprints_present: true
  production_concept_placeholder_footprints_present: true
  local_development_footprints_present: true
  local_development_footprints_have_zero_placeholder_markers: true
  local_development_step_visuals_present: true
  local_development_footprints_do_not_grant_release_credit: true
  tracks_and_zones_missing: true
  erc_missing: true
  every_major_interface_has_symbol_footprint_closure_record: true
  production_outputs_are_blocked_until_supplier_symbols_footprints_and_erc_exist: true
release_blockers:
  - KiCad schematic sheets contain non-release scaffold symbols that have not been supplier-reviewed or ERC-cleaned
  - exact supplier pinouts and mating connector drawings are not frozen
  - reviewed symbol library and footprint library are not present
  - production concept placeholders have local development-footprint replacements, but supplier-approved land patterns, courtyards, paste, and STEP models are still missing
  - footprint pad numbering has not been checked against supplier pinouts
  - ERC report and symbol electrical-type waivers are missing
  - production concept source has no release-approved routed tracks or filled zones
forbidden_claims:
  - schematic_ready
  - symbols_ready
  - footprints_ready
  - erc_clean
  - routed_pcb_ready
  - fabrication_ready
  - enclosure_ready
  - end_to_end_phone_ready
