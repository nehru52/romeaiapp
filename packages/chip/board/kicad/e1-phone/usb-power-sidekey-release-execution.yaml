schema: eliza.e1_phone_usb_power_sidekey_release_execution.v1
status: blocked_usb_power_sidekey_release_requires_supplier_drawings_routed_pcb_enclosure_load_path_and_bringup_logs
date: 2026-05-21
claim_boundary: >
  Release execution matrix for the selected USB-C receptacle, USB-PD
  controller, charger/power path, power button, and volume buttons. This file
  records the evidence required to release that user-facing hardware stack. It
  is not a supplier drawing pack, not a schematic/PCB release, not PD or charger
  bring-up evidence, not button force/travel evidence, and not enclosure-ready
  proof.

source_artifacts:
  - board/kicad/e1-phone/usb-sidekey-selection-wiring-decision.yaml
  - board/kicad/e1-phone/usb-sidekey-integration.yaml
  - board/kicad/e1-phone/usb-sidekey-schematic-net-binding.yaml
  - board/kicad/e1-phone/usb-sidekey-acceptance-checklist.yaml
  - board/kicad/e1-phone/usb-sidekey-source-revalidation.yaml
  - board/kicad/e1-phone/usb-sidekey-mechanical-decision.yaml
  - board/kicad/e1-phone/power-sequence-bringup-closure.yaml
  - board/kicad/e1-phone/power-bringup-acceptance-checklist.yaml
  - board/kicad/e1-phone/core-power-compute-schematic-net-binding.yaml
  - board/kicad/e1-phone/routed-clearance-release-execution.yaml
  - board/kicad/e1-phone/enclosure-physical-fit-first-article-execution.yaml
  - board/kicad/e1-phone/selected-hardware-first-article-execution.yaml
  - board/kicad/e1-phone/supplier-rfq-response-normalization.yaml
  - board/kicad/e1-phone/factory-probe-map.yaml
  - package/usb-c/e1-phone-usb-c-port.yaml
  - package/usb-pd/tps65987.yaml
  - package/charger/max77860.yaml
  - package/human-interface/side-buttons.yaml

release_policy:
  release_revision: EVT1-routed-first-article
  selected_stack_id: GCT_USB4105_TPS65987DDH_MAX77860_Panasonic_EVQ-P7_EVQ-P3_EVQ-9P7
  required_usb_c_ports: 1
  required_side_buttons: [power, volume_up, volume_down]
  required_supplier_response_pack_count: 2
  present_supplier_response_pack_count: 0
  release_allowed: false
  layout_release_allowed_without_supplier_drawings: false
  enclosure_release_allowed_without_load_path_and_plug_sweep: false
  factory_release_allowed_without_pd_charger_button_logs: false
  waterproof_or_superspeed_promotion_allowed: false

selected_public_source_snapshot:
  usb_c_evt0_connector:
    source_id: usb_evt0_gct_usb4105
    vendor: GCT
    family: USB4105
    source_type: direct_vendor_pdf_opened_2026_05_21
    public_fields: {connector_type: USB_Type_C_USB2_receptacle, active_contacts: 16, current_rating: VBUS_5A_collective}
    release_use: EVT0_USB2_PD_charge_debug_only
  usb_c_conditional_alternate:
    source_id: usb_production_molex_port_on_waterproof
    vendor: Molex
    family: 221632_or_217804_Port_On
    public_fields: {connector_type: USB_Type_C_24_pin_waterproof_receptacle, current_rating: up_to_5A_or_6A_family_dependent}
    release_use: alternate_only_hold_for_waterproof_or_superspeed_revision
  usb_pd_controller:
    vendor: Texas Instruments
    part: TPS65987DDH
    role: USB_PD_sink_policy_CC_controller_and_Type_C_state_machine
    release_use: keep_pending_firmware_configuration_cc_attach_dead_battery_and_typec_class_logs
  charger_power_path:
    vendor: Analog Devices
    part: MAX77860
    role: one_cell_li_ion_charger_and_system_power_path
    charge_current_max_a: 3.0
    release_use: keep_pending_i2c_ntc_pack_id_cc_cv_jeita_current_limit_and_thermal_logs
  side_key_primary:
    source_id: side_switch_primary_panasonic_evq_p7
    vendor: Panasonic Industry
    family: EVQ-P7_EVQ-P3_EVQ-9P7
    public_fields: {switch_type: SMD_side_push_tactile, dimensions_mm: {length: 3.5, width: 2.9, height: 1.35}, travel_mm: 0.2}
    release_use: keep_as_phone_edge_side_push_family_pending_exact_mpn_force_travel_step_and_sample_lot

release_records:
  - id: usb_c_connector_release
    owner: mechanical_layout
    selected_hardware: GCT_USB4105
    required_acceptance_items:
      - usb_c_connector_shell_load_path
      - usb_c_cutout_and_plug_keepout
      - usb2_cc_vbus_route_and_esd
    required_supplier_artifacts:
      - signed USB4105 drawing with shell stake, pin-1, board-edge, and aperture datums
      - recommended land pattern, paste, keepout, reflow, and shell-ground policy
      - STEP/B-rep model, insertion/extraction force, lifecycle, and sample lot
    required_release_outputs:
      - board/kicad/e1-phone/production/sourcing/usb-c-signed-drawing.pdf
      - board/kicad/e1-phone/production/step/e1-phone-mainboard-routed.step
      - board/kicad/e1-phone/production/reports/usb2-adb-fastboot-attach-log.json
      - board/kicad/e1-phone/production/reports/routed-board-clearance-release.yaml
      - mechanical/e1-phone/review/enclosure-fit-first-article.yaml
    status: blocked_missing_usb_c_supplier_route_enclosure_and_attach_evidence
    release_allowed: false
  - id: usb_pd_release
    owner: power_firmware_validation
    selected_hardware: TPS65987DDH
    required_acceptance_items:
      - pd_attach_and_charger_safety
      - usb2_cc_vbus_route_and_esd
    required_supplier_artifacts:
      - exact TPS65987DDH package, symbol, footprint, and pinout review
      - PD configuration image, provisioning path, CC/role policy, interrupt/reset wiring, and Linux/Android Type-C integration plan
    required_release_outputs:
      - board/kicad/e1-phone/production/reports/usb-c-pd-attach-log.json
      - board/kicad/e1-phone/production/test/first-article-test-transcript.json
      - board/kicad/e1-phone/production/reports/erc.json
      - board/kicad/e1-phone/production/reports/drc.json
    status: blocked_missing_pd_config_attach_dead_battery_typec_and_first_article_logs
    release_allowed: false
  - id: charger_power_path_release
    owner: power_validation
    selected_hardware: MAX77860
    required_acceptance_items:
      - pd_attach_and_charger_safety
    required_supplier_artifacts:
      - exact MAX77860 package, symbol, footprint, bump map, thermal pad/copper recommendation, and charger reference design review
      - battery pack ID/NTC/PCM interface confirmation and charger safety limits
    required_release_outputs:
      - board/kicad/e1-phone/production/reports/charger-cc-cv-cycle.json
      - board/kicad/e1-phone/production/reports/power-thermal/rail-efficiency-and-soak.json
      - board/kicad/e1-phone/production/test/first-article-test-transcript.json
      - board/kicad/e1-phone/production/reports/erc.json
      - board/kicad/e1-phone/production/reports/drc.json
    status: blocked_missing_charger_i2c_ntc_id_cc_cv_jeita_current_limit_and_thermal_logs
    release_allowed: false
  - id: side_key_release
    owner: mechanical_firmware_validation
    selected_hardware: Panasonic_EVQ-P7_EVQ-P3_EVQ-9P7
    required_acceptance_items:
      - side_key_force_travel_and_solder_load
      - side_key_recovery_and_wake
    required_supplier_artifacts:
      - exact side-push switch or side-key flex drawing, land pattern, STEP/B-rep, force curve, sample lot, and lifecycle status
      - enclosure rib, elastomer, plunger, or stiffener datum proving actuator load bypasses solder joints
    required_release_outputs:
      - board/kicad/e1-phone/production/sourcing/side-key-signed-drawing.pdf
      - board/kicad/e1-phone/production/reports/side-button-force-travel.csv
      - board/kicad/e1-phone/production/reports/side-key-force-travel-wake-log.json
      - board/kicad/e1-phone/production/reports/button-wake-recovery-log.json
      - board/kicad/e1-phone/production/reports/routed-board-clearance-release.yaml
      - mechanical/e1-phone/review/enclosure-fit-first-article.yaml
    status: blocked_missing_side_key_supplier_force_travel_load_path_wake_and_recovery_logs
    release_allowed: false

required_common_release_outputs:
  - board/kicad/e1-phone/pcb/e1-phone-mainboard-routed.kicad_pcb
  - board/kicad/e1-phone/production/reports/erc.json
  - board/kicad/e1-phone/production/reports/drc.json
  - board/kicad/e1-phone/production/step/e1-phone-mainboard-routed.step
  - board/kicad/e1-phone/production/reports/routed-board-clearance-release.yaml
  - mechanical/e1-phone/review/enclosure-fit-first-article.yaml
present_common_release_output_count: 0
missing_common_release_output_count: 6

factory_probe_and_route_binding:
  required_probe_nets:
    - USB_CC1
    - USB_CC2
    - USB_DP
    - USB_DN
    - VBUS
    - SHIELD_GND
    - PWR_KEY_N
    - VOL_UP_N
    - VOL_DOWN_N
    - AON_1V8
    - VBAT
    - SYS
  required_route_constraints:
    - USB_DP_DN
    - SIDE_KEYS
  routed_release_allowed: false

cross_checks:
  selected_stack_matches_usb_sidekey_decision: true
  selected_stack_matches_package_bindings: true
  selected_public_sources_match_usb_sidekey_revalidation: true
  release_records_map_to_acceptance_items: true
  release_records_require_supplier_artifacts_and_release_outputs: true
  common_release_outputs_absent: true
  factory_probe_covers_usb_power_and_side_key_nets: true
  routed_clearance_and_physical_fit_required_before_enclosure_release: true
  waterproof_or_superspeed_alternate_remains_unpromoted: true
  all_release_records_fail_closed: true

release_blockers:
  - selected USB-C and side-key supplier response packs have not been returned or normalized
  - USB-C signed drawing, land pattern, shell load path, insertion force, STEP/B-rep, and plug sweep evidence are missing
  - TPS65987DDH firmware/configuration, CC attach, dead-battery boot, and Type-C class logs are missing
  - MAX77860 charger I2C, NTC/ID, CC/CV, JEITA, current-limit, and thermal logs are missing
  - side-key exact MPN or flex drawing, force/travel, solder-load bypass, wake, recovery, and debounce logs are missing
  - routed PCB, ERC, DRC, USB2 SI, routed STEP, routed clearance release, and physical enclosure first article are missing

forbidden_claims:
  - usb_power_sidekey_release_ready
  - usb_c_ready
  - pd_ready
  - charging_ready
  - side_buttons_ready
  - power_key_wake_ready
  - recovery_key_combo_ready
  - waterproof_ready
  - superspeed_ready
  - routed_pcb_ready
  - enclosure_ready
  - fabrication_ready
  - end_to_end_phone_ready
