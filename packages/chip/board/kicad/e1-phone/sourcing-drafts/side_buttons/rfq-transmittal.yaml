schema: eliza.e1_phone_supplier_rfq_transmittal_draft.v1
status: draft_not_sent_not_supplier_evidence
date: '2026-05-21'
claim_boundary: Draft RFQ transmittal package only. These drafts are not sent RFQs, supplier responses, approved
  quotes, samples, signed drawings, pinouts, footprints, STEP evidence, or authorization to route or fabricate the
  PCB.
draft:
  draft_id: e1_phone_side_buttons_rfq_2026-05-21
  function: side_buttons
  status: draft_not_sent_not_supplier_evidence
  primary_candidate: side_key_flex_or_enclosure_mounted_switch_subassembly
  package_binding: package/human-interface/side-buttons.yaml
  source_basis:
    - preliminary side-button binding and enclosure interface plan
  verified_public_source_ids: []
  selected_hardware_trace:
    selection_source: board/kicad/e1-phone/usb-sidekey-selection-wiring-decision.yaml
    selected_side_key_family: Panasonic_EVQ-P7_EVQ-P3_EVQ-9P7
    conditional_alternate: Littelfuse_CK_KMR2
    external_buttons:
      - power
      - volume_up
      - volume_down
    side_key_bus_constraint: SIDE_KEYS
    release_allowed_without_supplier_response_packs: false
    route_release_dependency: side_key_route_release_remain_blocked_until_switch_or_flex_drawing_force_travel_stack_wake_recovery_and_routed_step_clearance
  recipient_candidates:
    - supplier: Panasonic Industry
      candidate: EVQ-P7/EVQ-P3/EVQ-9P7 side-push tactile family
      url: https://na.industrial.panasonic.com/products/switches-encoders-interface-devices/switches/light-touch-tactile-switches/series/79247
      public_page_status: public_package_binding_observed_2026_05_20
    - supplier: Littelfuse C&K
      candidate: KMR2 micro-miniature SMT tactile alternate
      url: https://www.ckswitches.com/products/switches/product-details/Tactile/KMR2
      public_page_status: public_package_binding_observed_2026_05_20
  request:
    quote_quantities:
      - 10
      - 100
      - 1000
    minimum_sample_lot: 5
    response_due_date: '2026-06-04'
    required_response_format: supplier_signed_pdf_or_native_cad_plus_machine_readable_summary
    accepted_document_languages:
      - english
      - bilingual_supplier_original_plus_english
    required_supplier_artifacts:
      - switch or side-key flex 2D drawing with plunger datum and force-travel curve
      - flex pinout, stiffener stack, bend radius, and adhesive/fixture notes
      - mating connector MPN, footprint, and insertion cycle rating
      - ESD/debounce recommendation and environmental rating
      - STEP model for buttons, flex, and connector stack
      - sample force and life-cycle test report
    board_dependency:
      - PWR_KEY_N, VOL_UP_N, VOL_DOWN_N, AON_1V8, and GND on side-key flex
      - actuator force path into enclosure rib instead of solder joints
  acceptance_gate_before_kicad_use:
    orderable_mpn_received: false
    signed_2d_drawing_received: false
    pinout_or_pad_map_received: false
    recommended_land_pattern_received: false
    step_or_brep_model_received: false
    sample_received_and_inspected: false
    compliance_pack_received: false
    pinout_symbol_footprint_reviews_complete: false
  planned_archive_paths_after_send:
    draft: board/kicad/e1-phone/sourcing-drafts/side_buttons/rfq-transmittal.yaml
    release_archive: board/kicad/e1-phone/production/sourcing/side_buttons/rfq-transmittal.yaml
    supplier_response_pack: board/kicad/e1-phone/production/sourcing/side_buttons/rfq-response-pack.yaml
forbidden_claims:
  - rfq_sent
  - supplier_response_received
  - supplier_approved
  - pinouts_frozen
  - footprints_frozen
  - step_models_bound
  - production_archive_complete
  - routed_pcb_ready
  - enclosure_ready
