schema: eliza.e1_phone_board_optimization_scorecard.v1
status: blocked_concept_optimized_but_not_routed_or_enclosure_ready
date: '2026-05-21'
claim_boundary: Board-size and performance optimization scorecard for the selected 5.5 inch display phone architecture. This
  consolidates the current floorplan metrics, display fit, route-density pressure, RF, power/thermal, factory-test, and enclosure
  constraints. It is not a routed PCB, DRC report, SI/PI report, thermal measurement, RF measurement, or enclosure release.
source_artifacts:
  - docs/board/e1-phone-mainboard-metrics.yaml
  - board/kicad/e1-phone/layout-utilization.yaml
  - board/kicad/e1-phone/display-fit.yaml
  - board/kicad/e1-phone/display-envelope-downselect.yaml
  - board/kicad/e1-phone/routed-layout-readiness-binding.yaml
  - board/kicad/e1-phone/route-feasibility-density.yaml
  - board/kicad/e1-phone/routing-constraints.yaml
  - board/kicad/e1-phone/rf-connectivity-closure.yaml
  - board/kicad/e1-phone/power-thermal-budget.yaml
  - board/kicad/e1-phone/enclosure-placement-closure.yaml
  - board/kicad/e1-phone/external-interface-design-review.yaml
  - board/kicad/e1-phone/factory-probe-map.yaml
optimization_target:
  display_anchor: Chenghao_CH550FH01A_CT_5p5_1080x1920_MIPI_CTP
  device_envelope_mm:
    width: 78.0
    height: 153.6
    max_thickness: 11.8
  board_bbox_mm:
    width: 64.0
    height: 132.0
    area_mm2: 8448.0
  physical_pcb_island_area_mm2: 2816.0
  battery_window_mm:
    x: 0.0
    y: 29.5
    width: 64.0
    height: 87.0
    area_mm2: 5568.0
  selected_battery_reference_mm:
    width: 64.0
    height: 87.0
    thickness: 5.6
  target_stackup: 10_layer_0p8_mm_hdi
scorecard:
  display_fit:
    status: pass_for_concept
    selected_display_outline_mm:
      width: 77.1
      height: 151.77
      thickness: 3.39
    active_area_mm:
      width: 68.04
      height: 120.96
    clearance_in_device_envelope_mm:
      width_clearance_mm: 0.9
      height_clearance_mm: 1.83
    blocker_to_release: supplier_signed_display_drawing_fpc_exit_and_step_model_missing
  alternate_display_optimization_branches:
    status: blocked_alternates_are_candidate_only_until_supplier_route_step_and_enclosure_evidence_exist
    branch_count: 2
    branches:
      - source_id: display_alternate_alibaba_meta_055wu01
        candidate: 055WU01
        fit_class: parseable_5p5_1080x1920_mipi_40pin_brightness_candidate
        optimization_use: possible_display_connector_and_brightness_branch_not_size_release
        required_before_size_or_layout_rebaseline:
          - signed 2D drawing, 40-pin pinout, mating connector, land pattern, and STEP/B-rep models
          - routed DSI/touch/backlight/bias branch with DRC, SI/PI, courtyard utilization, and bring-up evidence
          - approved routed board STEP clearance report and physical fit report against selected enclosure
          - promotion review proving better size/supply/performance tradeoff than CH550FH01A-CT
        optimization_rebaseline_allowed: false
      - source_id: display_alternate_made_in_china_e549_amoled
        candidate: E549-HC01_RM67191_AMOLED_class
        fit_class: parseable_5p49_amoled_thin_display_candidate
        optimization_use: possible_thinner_display_stack_branch_not_size_release
        required_before_size_or_layout_rebaseline:
          - signed AMOLED drawing, FPC pinout, mating connector, land pattern, and STEP/B-rep models
          - routed MIPI/touch/power branch with DRC, SI/PI, power/thermal, courtyard utilization, and RM67191/GT1151 bring-up evidence
          - approved routed board STEP clearance report and physical fit report against selected enclosure
          - promotion review proving better size/thickness/supply/power tradeoff than CH550FH01A-CT
        optimization_rebaseline_allowed: false
  board_size:
    status: pass_for_concept
    pcb_area_of_bbox_pct: 33.3
    board_width_margin_from_display_outline_mm: 13.1
    board_height_margin_from_display_outline_mm: 19.77
    topology: top_bottom_rigid_islands_with_full_width_battery_cavity
    blocker_to_release: routed_rigid_or_rigid_flex_outline_and_supplier_component_heights_missing
  wasted_space:
    status: pass_for_concept_pressure_band
    concept_route_shield_test_reserve_area_mm2: 209.0
    concept_route_shield_test_reserve_pct: 10.6
    target_unallocated_pct_after_layout:
      min_pct: 10.0
      max_pct: 18.0
    post_footprint_reserve_target_pct_range:
      min: 35.0
      max: 50.0
    blocker_to_release: real_courtyard_utilization_and_no_route_area_report_missing
  route_density:
    status: blocked_high_pressure_trial_route_required
    differential_pair_count_required: 24
    high_speed_domains:
      usb2_pairs: 2
      mipi_dsi_pairs: 5
      mipi_csi_clock_pairs: 2
      mipi_csi_data_pairs: 6
      pcie_pairs: 4
      lpddr_clock_or_strobe_pairs: 2
      ufs_pairs: 3
    single_ended_bus_count_required: 11
    rf_feed_count_required: 5
    factory_power_test_points_required: 8
    split_interconnect_min_contacts: 49
    declared_concept_net_count: 180
    assigned_concept_pad_net_count: 519
    blocker_to_release: supplier_footprints_escape_density_via_count_and_trial_route_missing
  power_efficiency:
    status: blocked_requires_schematic_pi_and_measurements
    battery_energy_wh: 22.05
    pd_power_margin_w: 13.3
    charge_path_peak_efficiency_pct_min: 92
    buck_peak_efficiency_pct_min: 88
    video_call_hours_at_target: 6.89
    sustained_ai_hours_at_skin_limited_budget: 5.51
    blocker_to_release: rail_load_step_charge_cycle_and_regulator_efficiency_logs_missing
  thermal:
    status: blocked_requires_routed_board_and_thermal_soak
    skin_limit_c: 43
    sustained_ai_workload_skin_limited_w: 4.0
    hotspot_risks:
      - soc_lpddr_ufs_cluster
      - pmic_charger_power_path
      - redcap_modem_tx_bursts
      - display_bias_and_backlight
    blocker_to_release: routed_copper_graphite_gap_pad_and_30_min_soak_evidence_missing
  rf_connectivity:
    status: blocked_requires_vendor_layout_and_measurements
    cellular_module: Quectel_RG255C_or_RM255C_5G_RedCap
    wifi_bt_module: Murata_LBEE5XV2EA_802_Type_2EA
    rf_feed_count_required: 5
    required_measurements:
      - VNA S11/S21 on every antenna feed with EVT0 conducted access
      - conducted cellular and Wi-Fi output power and sensitivity
      - radiated pre-scan for FCC/CE/RED and module grant conditions
      - coexistence test for Wi-Fi/Bluetooth/cellular/GNSS
      - SAR and RF exposure pre-scan in final enclosure plastics
      - carrier/PTCRB/GCF plan for selected region SKU
    blocker_to_release: antenna_vendor_review_matching_measurements_and_certification_scope_missing
  enclosure_fit:
    status: pass_for_concept_blocked_for_release
    cad_fit_status: pass
    assembly_clearance_status: pass
    checked_clearance_cases: 18
    step_artifact_count: 25
    blocker_to_release: routed_board_step_with_supplier_models_and_tolerance_stack_missing
  factory_test_access:
    status: blocked_requires_routed_probe_coordinates
    probe_domains: 9
    power_test_points_required:
      - VBUS
      - VBAT
      - SYS
      - AON_1V8
      - IO_1V8
      - RF_VBAT
      - CAM_AVDD_2V8
      - DISP_AVDD_5V5
    blocker_to_release: probe_coordinates_limits_fixture_and_first_article_transcript_missing
optimization_decision:
  current_conclusion: keep_78p0_x_153p6_device_and_64p0_x_132p0_split_board_for_evt1_trial_route
  rationale:
    - selected_5p5_display_fits_current_envelope_with_0p9mm_width_and_1p83mm_height_clearance
    - 64x87mm_battery_window_matches_selected_22p05Wh_pack_class
    - top_bottom_islands_preserve_full_width_battery_capacity_and_bottom_usb_audio_region
    - route_density_is_high_but_explicitly_gated_by_trial_route_and_supplier_footprints
  do_not_reduce_below_current_envelope_until:
    - signed_display_touch_stack_and_cover_glass_tolerance_says_smaller_is_safe
    - routed_board_step_passes_with_supplier_connector_camera_usb_button_and_radio_models
    - antenna_and_usb_c_insertion_load_reviews_pass_in_final_plastics
required_release_outputs:
  - board/kicad/e1-phone/production/reports/board-optimization-scorecard.yaml
  - board/kicad/e1-phone/production/reports/routed-courtyard-utilization.yaml
  - board/kicad/e1-phone/production/reports/escape-density-via-count.yaml
  - board/kicad/e1-phone/production/reports/power-thermal/rail-efficiency-and-soak.json
  - board/kicad/e1-phone/production/reports/rf/antenna-coexistence-sar-prescan
  - mechanical/e1-phone/review/routed-board-clearance.json
cross_checks:
  display_fit_matches_primary_display: true
  alternate_display_optimization_branches_fail_closed: true
  board_bbox_matches_metrics_layout_and_route_density: true
  wasted_space_matches_metrics_and_layout_utilization: true
  route_density_counts_match_route_feasibility: true
  power_efficiency_targets_match_power_thermal_budget: true
  rf_feed_count_matches_rf_closure_and_routing_constraints: true
  enclosure_fit_matches_enclosure_placement_closure: true
  release_outputs_fail_closed: true
release_blockers:
  - local routed KiCad PCB candidate has tracks and filled zones for review only; release DRC and post-route reports are missing
  - real supplier footprints, courtyards, and STEP models are missing
  - routed-courtyard utilization and escape-density reports are missing
  - SI/PI, power efficiency, thermal soak, RF, coexistence, and SAR evidence are missing
  - local routed board STEP candidate exists for review only; supplier-approved routed STEP and formal enclosure tolerance stack are missing
  - parseable 055WU01 and E549/RM67191 display alternates cannot rebaseline size or layout optimization until supplier, routed validation, STEP, enclosure, and promotion evidence exist
  - factory probe coordinates, limits, and first-article transcript are missing
forbidden_claims:
  - board_size_optimized_final
  - wasted_space_final
  - route_feasible
  - power_efficient
  - thermal_closed
  - rf_ready
  - enclosure_ready
  - fabrication_ready
  - end_to_end_phone_ready
