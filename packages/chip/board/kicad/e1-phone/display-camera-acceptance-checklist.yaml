schema: eliza.e1_phone_display_camera_acceptance_checklist.v1
status: blocked_display_camera_acceptance_requires_supplier_route_bringup_capture_and_clearance
date: '2026-05-21'
claim_boundary: Acceptance checklist for the selected display/touch stack and front/rear MIPI camera modules. It
  is not a supplier-approved drawing pack, not a pinout or footprint freeze, not routed MIPI signoff, not display/touch
  bring-up, not camera capture evidence, and not enclosure release.
