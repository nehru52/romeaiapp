rfq_delta_actions:
  - function: display_touch
    public_source_id: display_primary_chenghao_ch550fh01a_ct_vendor_page
    action: keep CH550FH01A-CT as the primary 5.5 inch screen anchor and refresh RFQ wording with HX8399C, GT911, 77.1 x 151.77 x 3.39 mm module outline, and current public MOQ/delivery signals.
    release_allowed: false
  - function: display_touch_alternate
    public_source_id: display_alternate_alibaba_meta_055wu01
    action: keep 055WU01 as a high-brightness 40-pin MIPI alternate; require outline, FPC exit, pinout, connector, STEP, and samples before connector or envelope changes.
    release_allowed: false
  - function: rear_camera
    public_source_id: rear_camera_primary_sincere_first_ov13855
    action: keep SF-XR3855A-A0 OV13855/OV13850 class as rear primary; require exact module drawing, 24-pin FPC pinout, lens-axis datum, STEP, register pack, OTP/calibration flow, and capture samples.
    release_allowed: false
  - function: front_camera
    public_source_id: front_camera_gc5035_public_sibling_variant
    action: keep GC5035 family as the front-camera class but preserve the variant mismatch gate until Sincere First confirms SF-G5035S60FY or approves SF-G5035S60AY substitution with drawing, pinout, STEP, and sample evidence.
    release_allowed: false

cross_checks:
  refreshed_primary_display_preserves_selected_screen_anchor: true
  refreshed_alibaba_display_remains_alternate_only: true
  refreshed_rear_camera_preserves_ov13855_13mp_mipi_class: true
  refreshed_front_camera_preserves_gc5035_variant_mismatch_gate: true
  refreshed_sources_do_not_unlock_supplier_pack_gate: true
  refreshed_sources_do_not_unlock_routing_or_enclosure_release: true
  refreshed_sources_do_not_unlock_fabrication_release: true

release_blockers:
  - public web pages and snippets are not signed supplier response packs
  - exact display FPC pinout, connector MPN, signed drawing, STEP/B-rep, init sequence, and samples are missing
  - exact camera module drawing, FPC pinout, connector MPN, lens-axis datum, STEP/B-rep, calibration data, and samples are missing
  - GC5035 public source still exposes a sibling S60AY model and does not prove the selected S60FY variant
  - routed PCB, DRC, MIPI SI, routed board STEP, enclosure clearance, and first-article logs are missing

forbidden_claims:
  - supplier_selected
  - supplier_response_received
  - display_connector_ready
  - camera_connector_ready
  - pinouts_frozen
  - footprints_frozen
  - routed_pcb_ready
  - fabrication_ready
  - enclosure_ready
  - end_to_end_phone_ready
