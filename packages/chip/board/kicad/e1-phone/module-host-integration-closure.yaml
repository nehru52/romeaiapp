schema: eliza.e1_phone_module_host_integration_closure.v1
status: blocked_host_contracts_cross_checked_not_schematic_or_routed
date: 2026-05-20
claim_boundary: >
  Cross-checks that selected off-the-shelf phone modules expose explicit host
  contracts and that those contracts are represented in the logical block
  netlist and placement plan. This is not a KiCad schematic, supplier-approved
  pinout, routed board, SI/PI report, firmware bring-up, RF certification, or
  enclosure release.

source_artifacts:
  - board/kicad/e1-phone/preliminary-bom.yaml
  - board/kicad/e1-phone/placement-interface-matrix.yaml
  - board/kicad/e1-phone/block-netlist.yaml
  - board/kicad/e1-phone/routing-constraints.yaml
  - board/kicad/e1-phone/pinout-footprint-freeze.yaml
  - board/kicad/e1-phone/procurement-readiness.yaml
  - board/kicad/e1-phone/evt1-routing-work-package.yaml
  - board/kicad/e1-phone/routed-release-plan.yaml
  - package/display/v0-dsi-720x1280.yaml
  - package/camera/oem-mipi-csi-modules.yaml
  - package/cellular/quectel-5g-redcap.yaml
  - package/wifi/murata-type-2ea-wifi6e.yaml
  - package/usb-c/e1-phone-usb-c-port.yaml
  - package/human-interface/side-buttons.yaml

integration_records:
  - id: display_touch_module
    bom_functions: [display_touch]
    placement_groups: [J_DISPLAY_TOUCH]
    package_bindings: [package/display/v0-dsi-720x1280.yaml]
    required_block_ids: [J_DISPLAY_TOUCH, U_SOC]
    host_contract_count: 18
    required_contracts:
      - DSI_CLK_P
      - DSI_CLK_N
      - DSI_D0_P
      - DSI_D0_N
      - DSI_D1_P
      - DSI_D1_N
      - DSI_D2_P
      - DSI_D2_N
      - DSI_D3_P
      - DSI_D3_N
      - DISP_RESET_N
      - DISP_TE
      - DISP_BL_EN
      - DISP_BL_PWM
      - TOUCH_I2C_SCL
      - TOUCH_I2C_SDA
      - TOUCH_IRQ_N
      - TOUCH_RESET_N
    release_blocker: supplier display FPC drawing, touch controller ID, panel init sequence, and routed DSI/touch bring-up are missing

  - id: rear_front_camera_modules
    bom_functions: [rear_camera, front_camera]
    placement_groups: [J_CAM0_CAM1]
    package_bindings: [package/camera/oem-mipi-csi-modules.yaml]
    required_block_ids: [J_CAM0, J_CAM1, U_SOC]
    host_contract_count: 31
    required_contracts:
      - CAM0_CSI_CLK_P
      - CAM0_CSI_CLK_N
      - CAM0_CSI_D0_P
      - CAM0_CSI_D0_N
      - CAM0_CSI_D1_P
      - CAM0_CSI_D1_N
      - CAM0_CSI_D2_P
      - CAM0_CSI_D2_N
      - CAM0_CSI_D3_P
      - CAM0_CSI_D3_N
      - CAM0_MCLK
      - CAM0_RESET_N
      - CAM0_PWDN
      - CAM0_I2C_SCL
      - CAM0_I2C_SDA
      - CAM0_AF_I2C_SCL
      - CAM0_AF_I2C_SDA
      - CAM1_CSI_CLK_P
      - CAM1_CSI_CLK_N
      - CAM1_CSI_D0_P
      - CAM1_CSI_D0_N
      - CAM1_CSI_D1_P
      - CAM1_CSI_D1_N
      - CAM1_MCLK
      - CAM1_RESET_N
      - CAM1_I2C_SCL
      - CAM1_I2C_SDA
      - CAM_AVDD_2V8
      - CAM_DVDD_1V2
      - IO_1V8
      - CAM_AFVDD_2V8
    release_blocker: supplier camera FPC pinouts, power timing, lens datum, calibration flow, and routed CSI bring-up are missing

  - id: cellular_5g_redcap_module
    bom_functions: [cellular]
    placement_groups: [U_CELL]
    package_bindings: [package/cellular/quectel-5g-redcap.yaml]
    required_block_ids: [U_CELL, U_SIM_ESIM, U_SOC]
    host_contract_count: 18
    required_contracts:
      - CELL_USB2_DP
      - CELL_USB2_DN
      - CELL_PCIE_TX_P
      - CELL_PCIE_TX_N
      - CELL_PCIE_RX_P
      - CELL_PCIE_RX_N
      - CELL_RESET_N
      - CELL_WAKE_AP
      - AP_WAKE_CELL
      - CELL_W_DISABLE_N
      - USIM_CLK
      - USIM_RST
      - USIM_IO
      - CELL_RF_MAIN
      - CELL_RF_DIV
      - CELL_GNSS_RF
      - RF_VBAT
      - IO_1V8
    release_blocker: region SKU, band matrix, SIM/eSIM path, reference layout, RF measurements, SAR, and carrier plan are missing

  - id: wifi_bluetooth_module
    bom_functions: [wifi_bluetooth]
    placement_groups: [U_WIFI_BT]
    package_bindings: [package/wifi/murata-type-2ea-wifi6e.yaml]
    required_block_ids: [U_WIFI_BT, U_SOC]
    host_contract_count: 20
    required_contracts:
      - WIFI_PCIE_TX_P
      - WIFI_PCIE_TX_N
      - WIFI_PCIE_RX_P
      - WIFI_PCIE_RX_N
      - WIFI_SDIO_CLK
      - WIFI_SDIO_CMD
      - WIFI_SDIO_D0
      - WIFI_SDIO_D1
      - WIFI_SDIO_D2
      - WIFI_SDIO_D3
      - BT_UART_TX
      - BT_UART_RX
      - BT_UART_CTS_N
      - BT_UART_RTS_N
      - WIFI_EN
      - BT_EN
      - WIFI_HOST_WAKE
      - WIFI_IRQ
      - WIFI_BT_RF0
      - WIFI_BT_RF1
    release_blocker: Murata reference layout, firmware/NVRAM/CLM licensing, antenna matching, coexistence, and regulatory evidence are missing

  - id: usb_c_charge_data_debug_port
    bom_functions: [usb_c_receptacle_evt0, usb_pd_controller, charger_power_path]
    placement_groups: [J_USB_C, U_PMIC_CHARGER]
    package_bindings:
      - package/usb-c/e1-phone-usb-c-port.yaml
      - package/usb-pd/tps65987.yaml
      - package/charger/max77860.yaml
    required_block_ids: [J_USB_C, U_USB_PD, U_CHARGER, U_SOC]
    host_contract_count: 9
    required_contracts:
      - VBUS
      - USB_DP
      - USB_DN
      - USB_CC1
      - USB_CC2
      - SHIELD_GND
      - USBPD_I2C_SCL
      - USBPD_I2C_SDA
      - CHG_I2C_SCL
    release_blocker: USB-C supplier footprint, shell capture, PD policy, ESD/TVS selection, charger thermal review, and routed USB2 SI are missing

  - id: side_power_volume_buttons
    bom_functions: [side_buttons]
    placement_groups: [SW_POWER_VOL]
    package_bindings: [package/human-interface/side-buttons.yaml]
    required_block_ids: [SW_SIDE_KEYS, U_PMIC, U_SOC]
    host_contract_count: 5
    required_contracts:
      - PWR_KEY_N
      - VOL_UP_N
      - VOL_DOWN_N
      - AON_1V8
      - GND
    release_blocker: side-key flex or switch footprint, actuator stack, wake/recovery firmware logs, and force/travel measurements are missing

cross_checks:
  every_record_has_bom_function: true
  every_record_has_placement_group: true
  every_record_has_required_block: true
  every_required_contract_present_in_block_netlist: true
  selected_display_touch_contract_includes_touch_i2c_irq_and_reset: true
  camera_contract_includes_sensor_i2c_for_front_and_rear: true
  radios_use_module_boundaries_not_raw_rf_silicon: true
  release_outputs_fail_closed: true

required_release_outputs:
  - board/kicad/e1-phone/production/reports/module-host-integration-closure.yaml
  - board/kicad/e1-phone/production/reports/erc.json
  - board/kicad/e1-phone/production/reports/drc.json
  - board/kicad/e1-phone/production/reports/si-pi
  - board/kicad/e1-phone/production/reports/rf
  - board/kicad/e1-phone/production/reports/external-interface-design-review.yaml

release_blockers:
  - package host contracts are planning bindings, not supplier-approved pinouts
  - KiCad schematic has not replaced scaffold symbols with supplier connectors and modules
  - routed board, ERC, DRC, SI/PI, RF, and measured bring-up logs are missing
  - firmware, driver, regulatory, and factory-test evidence are missing
  - enclosure clearance still depends on routed board STEP with supplier component models

forbidden_claims:
  - modules_wired_in_final
  - display_touch_ready
  - camera_ready
  - cellular_ready
  - wifi_ready
  - bluetooth_ready
  - usb_c_ready
  - side_buttons_ready
  - fabrication_ready
  - enclosure_ready
  - end_to_end_phone_ready
