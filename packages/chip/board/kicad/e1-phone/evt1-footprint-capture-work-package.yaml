    criticality: hard_blocker_for_evt1_route_and_enclosure
    refdes_group: J_DISPLAY_TOUCH
    placement_region_mm:
      x: 45.0
      y: 3.0
      width: 17.0
      height: 8.0
    primary_candidate: CH550FH01A-CT
    package_binding: package/display/v0-dsi-720x1280.yaml
    planned_contract_nets:
      - DISP_BL_EN
      - DISP_BL_PWM
      - DISP_RESET_N
      - DISP_TE
      - DSI_CLK_N
      - DSI_CLK_P
      - DSI_D0_N
      - DSI_D0_P
      - DSI_D1_N
      - DSI_D1_P
      - DSI_D2_N
      - DSI_D2_P
      - DSI_D3_N
      - DSI_D3_P
