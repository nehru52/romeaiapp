      - cover_glass_outline
      - tft_outline
      - fpc_exit_side
      - stiffener_thickness
      - minimum_bend_radius
    supplier_gate_inputs_required:
      rfq_response_pack: false
      signed_2d_drawing: false
      pinout_or_pad_map: false
      recommended_land_pattern: false
      step_or_brep_model: false
      sample_inspection: false
      compliance_pack: false
      pinout_review_signoff: false
      symbol_review: false
      footprint_review: false
      footprint_3d_binding: false
    symbol_tasks:
      - create_or_update_kicad_symbol_from_supplier_pinout
      - set_pin_numbers_names_electrical_types_and_hidden_power_policy
      - cross_probe_symbol_pins_against_pinout_review_signoff
      - wire_symbol_into_hierarchical_schematic_and_run_erc
    footprint_tasks:
      - create_supplier_land_pattern_with_pad_numbers_courtyard_fab_silk_and_paste
      - apply_height_keepout_and_mechanical_datums_from_supplier_drawing
      - bind_step_or_brep_model_and_verify_origin_orientation_scale
      - replace_concept_placeholder_footprint_in_mainboard_pcb
    layout_rule_tasks:
      - assign_required_net_classes_and_diff_pair_constraints
      - preserve_placement_region_and_battery_window_clearance
      - add_required_test_or_conducted_access_points_before_routing
      - rerun_drc_erc_and_mechanical_overlay_checks
    domain_required_kicad_outputs:
      - display/touch connector symbol matching supplier pin order exactly
      - connector footprint with pad numbering, courtyard, keepout, and mated-height model
      - DSI/touch/backlight/bias nets tied to routing constraints and power sequencing
      - ERC report plus pinout review signoff
    alternate_display_capture_branches:
      - source_id: display_alternate_alibaba_meta_055wu01
        candidate: 055WU01
        status: blocked_until_supplier_pack_and_promotion_review
        capture_scope: possible_40pin_fpc_connector_variant_not_production_symbol_or_footprint
        required_before_capture:
          - signed 2D drawing with FPC exit, pin-1 datum, cover-lens datum, and STEP model
          - exact 40-pin FPC pinout, mating connector MPN, and recommended land pattern
          - panel init, touch configuration, backlight/bias limits, and sample inspection
          - promotion review before KiCad symbol, footprint, or enclosure branch replacement
        kicad_capture_allowed: false
      - source_id: display_alternate_made_in_china_e549_amoled
        candidate: E549-HC01_RM67191_AMOLED_class
        status: blocked_until_supplier_pack_and_promotion_review
        capture_scope: possible_thin_amoled_branch_not_production_symbol_or_footprint
        required_before_capture:
          - signed 2D drawing with AMOLED outline, FPC exit, active-area datum, touch-stack datum, and STEP model
