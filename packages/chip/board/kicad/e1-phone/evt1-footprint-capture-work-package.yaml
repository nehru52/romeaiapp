schema: eliza.e1_phone_evt1_footprint_capture_work_package.v1
status: blocked_evt1_footprint_capture_requires_supplier_intake_reviews_and_real_kicad_libraries
date: '2026-05-21'
claim_boundary: EVT1 footprint capture work package only. This turns supplier intake records into executable KiCad
  symbol, footprint, STEP-binding, and review tasks. It is not evidence that supplier drawings have arrived, symbols
  are complete, footprints are reviewed, the board is routed, or the enclosure is ready.
source_artifacts:
  - board/kicad/e1-phone/supplier-drawing-intake-checklist.yaml
  - board/kicad/e1-phone/supplier-to-kicad-evidence-map.yaml
  - board/kicad/e1-phone/footprint-3d-model-library-map.yaml
  - board/kicad/e1-phone/pinout-footprint-freeze.yaml
  - board/kicad/e1-phone/schematic-symbol-footprint-closure.yaml
  - board/kicad/e1-phone/placement-interface-matrix.yaml
  - board/kicad/e1-phone/routing-constraints.yaml
upstream_status:
  supplier_intake_status: blocked_supplier_drawing_intake_required_before_real_footprints_or_route
  pinout_freeze_status: blocked_pinout_footprint_freeze_missing_supplier_evidence
  symbol_footprint_status: blocked_requires_real_kicad_symbols_supplier_footprints_and_erc
capture_policy:
  work_item_count: 10
  requires_supplier_gate_closed_before_editing_production_footprints: true
  requires_pinout_symbol_footprint_3d_reviews: true
  requires_erc_and_drc_after_placeholder_replacement: true
  routing_constraint_sources:
    - routing-constraints.yaml differential_pairs
    - routing-constraints.yaml mechanical_keepouts
    - placement-interface-matrix.yaml placement regions
  diff_pair_count_to_preserve: 24
work_items:
