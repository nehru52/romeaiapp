power_layout_closure:
  high_current_paths:
    - name: VBUS_to_charger
      nets:
        - VBUS
        - GND
        - SHIELD_GND
      source_constraint:
        name: VBUS_to_charger
        max_loop_area: minimize
        copper: wide_short_top_or_inner_plane
      layout_rule: route as a short wide copper path from USB-C/PD protection into
        charger input with minimized loop area
      verification_required: post-route copper width/via count review plus first-power
        current-limit log
    - name: charger_to_battery_and_sys
      nets:
        - VBAT
        - SYS
        - GND
        - BAT_NTC
        - BAT_ID
      source_constraint:
        name: charger_to_battery
        max_loop_area: minimize
        current_limit_from_battery_vendor: true
      layout_rule: keep charger, battery connector, current sense, NTC, and SYS bulk
        capacitance on the shortest practical top/bottom island path
      verification_required: pack-current scope capture and battery connector temperature
        check during 3 A charge
    - name: RF_VBAT_to_cellular
      nets:
        - RF_VBAT
        - GND
        - CELL_RESET_N
        - CELL_WAKE_AP
      source_constraint:
        name: RF_VBAT_to_cellular
        burst_current_from_module_datasheet_required: true
      layout_rule: feed cellular burst current with local bulk/MLCC capacitance and
        return stitching isolated from MIPI/USB aggressors
      verification_required: Quectel SKU burst-current profile and conducted TX load-step
        capture
  decoupling_rules:
    - each_module_power_pin_requires_local_decoupling_per_datasheet
    - PMIC_and_SoC_decaps_must_have_via_in_pad_or_adjacent_microvias_if_package_requires
  rail_test_points_required:
    - VBUS
    - VBAT
    - SYS
    - AON_1V8
    - IO_1V8
    - RF_VBAT
    - CAM_AVDD_2V8
    - DISP_AVDD_5V5
  minimum_bulk_capacitance_targets:
    VBUS: 22uF bulk plus 4x10uF MLCC near PD/charger input
    VBAT: 100uF bulk near charger/battery connector
    SYS: 22uF bulk plus 4x10uF MLCC at PMIC input island
    RF_VBAT: module-vendor bulk plus high-frequency MLCC at cellular module pins
  blocked_until:
    - post-route PI simulation for VBUS, VBAT, SYS, RF_VBAT, AP rails, and IO_1V8
    - fabricator stackup and copper/via current-rating confirmation
    - supplier PMIC/charger layout review with real footprints
thermal_management:
  device_envelope_mm:
    width: 78.0
    height: 153.6
    max_thickness: 11.8
  skin_limit_c: 43
  sustained_skin_limited_budget_w: 4.0
  z_stack_risk: 'The stack can exceed 11.8 mm unless shield can heights, battery thickness,
    camera z-height, and rear cover design are locked together. A STEP tolerance stack
    is mandatory before claiming enclosure fit.

    '
  required_sensors:
    - ntc_near_soc_ap_cluster
    - ntc_near_pmic_or_modem_hot_zone
    - skin_or_back_cover_ntc
    - battery_pack_ntc
  required_spreading_stack: &id001
    - soc_tim
    - graphite_pgs_spreader
    - thin_vapor_chamber_modeled_pending_soak
    - gap_pad_to_rear_cover
  steady_state_model:
    method: lumped_single_node_skin_plus_series_junction_path
    ambient_c: 25.0
    radiating_front_back_area_m2: 0.02396
    r_skin_to_ambient_c_per_w: 9.0
    r_junction_to_skin_c_per_w: 4.5
    skin_limit_c: 43
    allowed_skin_rise_c: 18.0
    max_sustained_power_for_skin_limit_w: 2.0
    skin_rise_at_product_budget_c: 36.0
    skin_temp_at_product_budget_c: 61.0
    junction_temp_at_product_budget_c: 79.0
    junction_limit_c: 105.0
    junction_headroom_at_product_budget_c: 26.0
    skin_budget_margin_w: -2.0
    evidence_class: cad_estimate_lumped_model_not_chamber_measured
    interpretation: 'BARE-BODY BASELINE (no engineered spreader): at the 4.0 W sustained
      product budget the modeled skin reaches ~61 C, which EXCEEDS the 43 C skin limit,
      and the bare body only sinks ~2.0 W to a 43 C skin at 25 C ambient. The 9.0
      C/W lumped resistance is dominated by hotspot spreading from the small SoC/NPU
      footprint, not by the body-to-air term. The mitigation_model below resolves
      this with a graphite + thin-vapor-chamber spreader stack plus a DVFS sustained-power
      cap; a measured 30-minute soak must still validate the mitigated model before
      any thermal claim.'
  transient_model:
    method: lumped_rc_first_order
    estimated_body_mass_kg: 0.18
    effective_specific_heat_j_per_kg_k: 900.0
    thermal_capacitance_j_per_k: 162.0
    time_constant_seconds: 1458.0
    burst_power_w: 6.0
    estimated_seconds_to_skin_limit_under_burst: 486.0
    evidence_class: cad_estimate_lumped_rc_not_chamber_measured
    interpretation: A 6 W burst from a cold start has roughly 486 s before the modeled
      skin reaches 43 C, after which DVFS must drop to the steady-state passive limit.
      The RC time constant and capacitance are planning estimates; the real curve
      needs an instrumented soak with skin and junction logging.
  mitigation_model:
    method: spreading_plus_surface_decomposition_with_graphite_and_thin_vapor_chamber
    ambient_c: 25.0
    skin_limit_c: 43
    allowed_skin_rise_c: 18.0
    resistance_decomposition_c_per_w:
      bare_body_lumped_baseline: 9.0
      surface_to_ambient_fixed_by_geometry: 3.21
      hotspot_spread_bare_copper_plane: 26.11
      tim_and_gap_pad_series: 0.4
      h_surface_to_ambient_w_per_m2k: 13.0
      note: Combined natural-convection plus radiation over the front+back area sets
        ~3.2 C/W; the rest of the 9.0 C/W baseline is hotspot spreading through the
        bare copper plane (~30 C/W lateral).
    spreader_stack:
      soc_npu_footprint_mm_square: 12.0
      graphite_pgs:
        part_class: pyrolytic_graphite_sheet_panasonic_eyg_s_class
        in_plane_k_w_per_mk: 1950.0
        thickness_um: 100.0
        spreading_resistance_c_per_w: 1.8
        fits_z_budget_note: 100 um PGS fits the 0.2-0.6 mm graphite+gap-pad layer
          in the enclosure z-stack.
      thin_vapor_chamber:
        form_factor: sintered_wick_thin_chamber_0p4mm
        effective_in_plane_k_w_per_mk: 8000.0
        thickness_mm: 0.4
        spreading_resistance_c_per_w: 0.11
        feasibility_note: 0.4 mm chamber fits the 11.8 mm slab alongside the 5.6 mm
          battery; effective k is held conservative (thin chambers are often cited
          at 5000-20000 W/mK).
    effective_skin_resistance_c_per_w:
      graphite_only: 5.41
      graphite_plus_vapor_chamber: 3.72
    mitigated_passive_sustained_w:
      graphite_only: 3.33
      graphite_plus_vapor_chamber: 4.84
    dvfs_policy:
      sustained_power_cap_w: 4.0
      skin_temp_at_cap_c: 39.88
      junction_temp_at_cap_c: 57.88
      junction_limit_c: 105.0
      skin_margin_to_limit_c: 3.12
      burst_power_w: 6.0
      burst_seconds_before_throttle_from_cold: 486.0
      throttle_behavior: From a cold start the scheduler allows the 6 W burst for
        the modeled cold-start window, then clamps sustained silicon to the 4.0 W
        cap so the modeled skin holds at 39.88 C, at or below the 43 C limit. The
        graphite + vapor-chamber passive ceiling sits above the 4.0 W budget, so the
        cap is set by the product budget, not by the spreader.
    sustained_throughput_tradeoff:
      sustained_ai_compute_power_w: 2.6
      fixed_non_compute_overhead_w: 1.31
      capped_compute_power_w: 2.6
      compute_power_derate_factor: 1.0
      spec_target_reference: 'docs/spec-db/npu-2028-target.yaml: 3B INT4 100 tok/s
        sustained, 7B INT4 30 tok/s sustained (TARGETS, not measured).'
      implied_sustained_ai_throughput_note: At the 4.0 W cap the full 2.6 W AI compute
        budget survives (derate 1.0x), so the modeled sustained AI workload runs at
        the 100% duty point against the spec tok/s targets. If a measured soak forces
        a lower cap, multiply the spec tok/s targets by the realized compute_power_derate_factor
        to get the honest sustained rate.
    evidence_class: cad_estimate_model_not_measured
    residual_measurement_required: This mitigation is a CAD/material-property model.
      A 30-minute instrumented CPU/NPU/modem/camera thermal soak with skin, junction,
      and spreader-interface logging at 25 C ambient must validate the graphite +
      vapor-chamber resistances, the DVFS cap, and the burst window before any skin-temperature
      claim. The release gate stays open.
  sensor_placement_plan:
    ntc_near_soc_ap_cluster: top island under graphite spreader near SoC/NPU shield
    ntc_near_pmic_or_modem_hot_zone: top island between PMIC/charger and cellular
      shield
    skin_or_back_cover_ntc: back-cover contact point under graphite/gap-pad stack
    battery_pack_ntc: supplier pack thermistor on battery connector BAT_NTC
  spreading_layout_plan:
    top_island_heat_sources:
      - SoC/NPU
      - PMIC
      - charger
      - cellular RedCap PA bursts
    mechanical_stack: *id001
    board_layout_actions:
      - keep SoC/PMIC shield cans under continuous graphite path
      - reserve ground via stitching under hot shields without cutting RF antenna
        keepouts
      - keep battery pouch out of direct hot-spot pressure path
      - add charger and modem temperature test points for EVT thermal soak
    vapor_chamber_trigger: thin vapor chamber is modeled into the mitigation stack
      to bring the passive sustained ceiling above the 4 W budget at 43 C skin; a
      measured soak must confirm the modeled effective conductivity before the chamber
      is treated as validated rather than required
hotspot_sources:
  - SoC/NPU top-center graphite path
  - PMIC/charger top-mid and USB-C bottom edge
  - Quectel RedCap transmit bursts near top-left RF edge
  - display backlight/bias near top-right FPC
  - Wi-Fi/Bluetooth coexistence region
release_blockers:
  - selected battery pack drawing, protection board, NTC curve, and pack ID resistor
  - fuel gauge selection and schematic/layout integration
  - real PMIC rail assignment, current budget, decoupling, and load-step simulation
  - display bias converter selection and panel inrush/sequence validation
  - modem transmit-current burst budget from selected Quectel SKU datasheet
  - thermal simulation and 30-minute CPU/NPU/camera/modem/charger soak evidence
  - measured USB-C PD/PPS negotiation and charge-cycle logs
missing_required_nets_by_rail: {}
package_power_sequence_status:
  pmic: required_not_implemented
  charger: required_not_implemented
  usb_pd: required_not_implemented
  display: required_not_implemented
  camera: required_not_implemented
  cellular: required_not_implemented
  audio: required_not_implemented
regulatory_and_measurement_evidence_required:
  - per_rail_boot_idle_suspend_and_worst_case_scope_captures
  - calibrated_usb_c_input_power_and_battery_current_logs
  - pmic_regulator_efficiency_vs_load_curves_on_board
  - 30_min_cpu_npu_modem_camera_thermal_soak
  - thermal_hal_throttle_transcript
must_not_claim:
  - power_efficient
  - thermal_closed
  - charging_ready
  - battery_safe
  - skin_temperature_safe
