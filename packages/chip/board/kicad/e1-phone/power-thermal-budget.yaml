  rail_count: 15
rail_budget:
  - rail: VBUS
    source: USB-C PD source through TPS65987
    nominal_v: 5_to_12_evt0
    load_or_role: charger input and dead-battery boot
    required_nets:
      - VBUS
      - USB_CC1
      - USB_CC2
    nets_present:
      - USB_CC1
      - USB_CC2
      - VBUS
    missing_nets: []
  - rail: VBAT
    source: 1S Li-ion/Li-polymer pack
    nominal_v: 3.85
    load_or_role: charger, PMIC system path, modem bursts
    required_nets:
      - VBAT
      - BAT_NTC
      - BAT_ID
    nets_present:
      - BAT_ID
      - BAT_NTC
      - VBAT
    missing_nets: []
  - rail: SYS
    source: MAX77860 charger power path
    nominal_v: 3.6_to_4.4
    load_or_role: PMIC input and system rail
    required_nets:
      - SYS
      - VBAT
      - VBUS
    nets_present:
      - SYS
      - VBAT
      - VBUS
    missing_nets: []
  - rail: AON_1V8
    source: PMIC always-on LDO
    nominal_v: 1.8
    load_or_role: power key, volume keys, always-on logic
    required_nets:
      - AON_1V8
      - PWR_KEY_N
      - VOL_UP_N
      - VOL_DOWN_N
    nets_present:
      - AON_1V8
      - PWR_KEY_N
      - VOL_DOWN_N
      - VOL_UP_N
    missing_nets: []
  - rail: IO_1V8
    source: PMIC peripheral buck/LDO
    nominal_v: 1.8
    load_or_role: display touch, cameras, radios, audio control
    required_nets:
      - IO_1V8
      - TOUCH_I2C_SCL
      - CAM1_RESET_N
      - WIFI_EN
      - BT_EN
    nets_present:
      - BT_EN
      - CAM1_RESET_N
      - IO_1V8
      - TOUCH_I2C_SCL
      - WIFI_EN
    missing_nets: []
  - rail: RF_VBAT
    source: battery path or dedicated RF buck
    nominal_v: 3.3_to_4.4
    load_or_role: cellular RedCap module and Wi-Fi/BT module
    required_nets:
      - RF_VBAT
      - CELL_RESET_N
      - WIFI_EN
    nets_present:
      - CELL_RESET_N
      - RF_VBAT
      - WIFI_EN
    missing_nets: []
  - rail: CAM_AVDD_2V8
    source: PMIC camera LDO
    nominal_v: 2.8
    load_or_role: rear/front camera analog rails
    required_nets:
      - CAM_AVDD_2V8
      - CAM0_RESET_N
      - CAM1_RESET_N
    nets_present:
      - CAM0_RESET_N
      - CAM1_RESET_N
      - CAM_AVDD_2V8
    missing_nets: []
  - rail: CAM_DVDD_1V2
    source: PMIC LDO or module regulator
    nominal_v: 1.2
    load_or_role: camera digital core
    required_nets:
      - CAM_DVDD_1V2
    nets_present:
      - CAM_DVDD_1V2
    missing_nets: []
  - rail: DISP_AVDD_5V5
    source: display bias boost
    nominal_v: 5.5
    load_or_role: LCD positive bias
    required_nets:
      - DISP_AVDD_5V5
      - DISP_RESET_N
      - DISP_BL_EN
    nets_present:
      - DISP_AVDD_5V5
      - DISP_BL_EN
      - DISP_RESET_N
    missing_nets: []
  - rail: DISP_AVEE_N5V5
    source: display bias inverter
    nominal_v: -5.5
    load_or_role: LCD negative bias
    required_nets:
      - DISP_AVEE_N5V5
    nets_present:
      - DISP_AVEE_N5V5
    missing_nets: []
