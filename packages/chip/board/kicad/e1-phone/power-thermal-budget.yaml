usb_c_power_path:
  pd_controller: TPS65987DDH
  charger: MAX77860
  pd_sink_profiles:
    - 5v_3a
    - 9v_3a
    - 12v_2p25a
  max_pd_sink_power_w: 27.0
  max_charge_current_a: 3.0
  max_charge_power_at_cell_w: 12.6
  estimated_input_power_for_max_charge_w: 13.7
  charge_path_peak_efficiency_pct_min: 92
  pd_power_margin_w: 13.3
  passes_evt0_pd_power_margin: true
  charge_model:
    topology: cc_cv_1s_single_cell
    charge_current_a: 3.0
    float_voltage_v: 4.2
    termination_current_ma: 100
    max_charge_power_at_cell_w: 12.6
    estimated_cc_phase_hours_to_cv_entry: 1.34
    estimated_cv_phase_hours_to_termination: 1.15
    estimated_full_charge_hours: 2.49
    estimated_0_to_80_pct_hours: 1.53
    thermal_derate_note: JEITA thermistor profile must reduce charge_current under
      hot/cold cell temperature; sustained 3 A into a 5727 mAh pack is ~0.52C and
      needs a measured pack-temperature rise before the rate is claimed.
    evidence_class: cad_estimate_charge_profile_not_measured
