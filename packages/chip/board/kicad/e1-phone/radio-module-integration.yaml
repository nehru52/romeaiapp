      - WIFI_SDIO_CMD
      - WIFI_SDIO_D0
      - WIFI_SDIO_D1
      - WIFI_SDIO_D2
      - WIFI_SDIO_D3
    wifi_evidence_gate_status: blocked_no_host_controller_or_module
    wifi_release_blockers:
      wifi_sdio_host:
        artifact_class: SDIO host
        status: blocked
        evidence_required:
          - SDIO host RTL or integrated platform IP with 4-bit SDR25 timing.
          - Enabled DTS node with real clocks, pinctrl, regulator, GPIO, and IRQ phandles.
          - SDIO function enumeration transcript from real hardware or a bound platform model.
      wifi_bt_uart:
        artifact_class: BT UART
        status: blocked
        evidence_required:
          - UART controller implementation with RTS/CTS flow control.
          - Bluetooth HCI UART pin assignment and pinctrl state.
          - hci_uart_bcm attach transcript with selected module firmware.
      wifi_firmware_provenance:
        artifact_class: firmware provenance
        status: blocked
        evidence_required:
          - brcmfmac SDIO firmware binary source, license, and sha256.
          - Board-specific NVRAM source, license, and sha256.
          - clm_blob or equivalent regulatory data source and sha256.
          - Bluetooth patchram source, license, and sha256.
          - Kernel log showing firmware load results.
      wifi_android_framework_logs:
        artifact_class: Android framework logs
        status: blocked
        evidence_required:
          - Android WiFi/Bluetooth feature XML and package list from a successful vendorimage.
          - supplicant or hostapd startup log.
          - dumpsys wifi output.
          - Bluetooth HCI service log.
          - CTS/VTS subset results for declared WiFi/Bluetooth features.
      wifi_regulatory_evidence:
        artifact_class: regulatory evidence
        status: blocked
        evidence_required:
          - Selected module certification scope for exact antenna and enclosure.
          - Antenna gain and country-code handling record.
          - SAR exposure assessment.
          - FCC, CE, IC, or target-market filing plan.
      wifi_board_power_sequencing:
        artifact_class: board/power sequencing
        status: blocked
        evidence_required:
          - Selected board rail map for module VBAT and VDDIO.
          - 1.8 V IO bank proof or level-shifter design for SDIO, UART, GPIO, IRQ, and wake signals.
          - WIFI_EN and WIFI_RST_N default-low measurement before firmware handoff.
          - Scope capture for rail ramp, reset release, SDIO clock start, and UART RTS/CTS behavior.
          - Wake/IRQ polarity and suspend/resume measurement on the selected module.
    release_forbidden_claims:
      - wifi_ready
      - bluetooth_ready
      - regulatory_ready
rf_feed_and_antenna_integration:
  required_rf_nets:
    - CELL_GNSS_RF
    - CELL_RF_DIV
    - CELL_RF_MAIN
    - WIFI_BT_RF0
    - WIFI_BT_RF1
  antenna_feed_count: 5
  antenna_feed_plan:
    - net: CELL_RF_MAIN
      owner_module: cellular_5g_redcap
      role: cellular_main
      candidate_zone: top_antenna
      keepout_ref: top_antenna_keepout
      matching_network_required: true
      conducted_access_required: true
      factory_calibration_required: true
      status: blocked_no_vendor_antenna_review_or_vna_data
    - net: CELL_RF_DIV
      owner_module: cellular_5g_redcap
      role: cellular_diversity
      candidate_zone: bottom_antenna
      keepout_ref: bottom_antenna_keepout
      matching_network_required: true
      conducted_access_required: true
      factory_calibration_required: true
      status: blocked_no_vendor_antenna_review_or_vna_data
    - net: CELL_GNSS_RF
      owner_module: cellular_5g_redcap
      role: gnss_optional
      candidate_zone: top_antenna_or_dedicated_lna
      keepout_ref: top_antenna_keepout
      matching_network_required: true
      conducted_access_required: true
      factory_calibration_required: true
      status: blocked_no_gnss_desense_or_lna_review
    - net: WIFI_BT_RF0
      owner_module: wifi6e_bluetooth_5p3
      role: wifi_bt_chain0
      candidate_zone: wifi_bt_side_antenna
      keepout_ref: wifi_bt_side_antenna_keepout
      matching_network_required: true
      conducted_access_required: true
      factory_calibration_required: true
      status: blocked_no_murata_reference_layout_or_vna_data
    - net: WIFI_BT_RF1
      owner_module: wifi6e_bluetooth_5p3
      role: wifi_bt_chain1
      candidate_zone: bottom_antenna
      keepout_ref: bottom_antenna_keepout
      matching_network_required: true
      conducted_access_required: true
      factory_calibration_required: true
      status: blocked_no_murata_reference_layout_or_vna_data
  matching_networks_required:
    - net: CELL_RF_MAIN
      near: U_CELL
    - net: CELL_RF_DIV
      near: U_CELL
    - net: CELL_GNSS_RF
      near: U_CELL_or_GNSS_LNA
    - net: WIFI_BT_RF0
      near: U_WIFI_BT
    - net: WIFI_BT_RF1
