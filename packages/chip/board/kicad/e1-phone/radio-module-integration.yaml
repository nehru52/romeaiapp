      name: cellular_5g_redcap
      module:
        vendor: Quectel
        family: RG255C_or_RM255C
        class: 5G_RedCap_Sub_6
        rationale: 'RedCap is the pragmatic first-phone cellular target: lower throughput than full eMBB 5G, but
          smaller power/RF burden and enough bandwidth for voice, messaging, maps, telemetry, and moderate data.

          '
        public_features:
          release: 3GPP_Rel_17_RedCap
          peak_downlink_mbps: 223
          peak_uplink_mbps: 123
          fallback: LTE_Cat_4
          gnss: optional_multi_constellation
          host_interfaces:
            - USB_2_0
            - PCIe_2_0
            - PCM
            - UART
            - SGMII
            - SPI
          driver_os:
            - Linux
            - Android
            - Windows
        sourcing_url: https://www.quectel.com/product/5g-redcap-rg255c-series/
      placement:
        refdes_group: U_CELL
        function: cellular_5g_redcap_module
        package_binding: package/cellular/quectel-5g-redcap.yaml
        region_mm:
          x: 3.0
          y: 3.0
          width: 14.0
          height: 14.0
        side: top_left_rf
        required_nets:
          - CELL_VBAT
          - CELL_VDDIO_1V8
          - CELL_USB2
          - CELL_PCIE
          - USIM
          - CELL_RESET_N
          - CELL_WAKE_AP
          - AP_WAKE_CELL
          - CELL_W_DISABLE_N
        constraints:
          - rf_keepout
          - cellular_main_div_feeds
          - sim_or_esim
          - conducted_rf_test_points
      block: U_CELL
      minimum_rf_ports:
        - cellular_main
        - cellular_diversity
        - gnss_optional
      production_rf_ports:
        - cellular_main
        - cellular_diversity
        - cellular_mimo_0
        - cellular_mimo_1
        - gnss
      required_nets:
        - AP_WAKE_CELL
        - CELL_GNSS_RF
        - CELL_PCIE_RX_N
        - CELL_PCIE_RX_P
        - CELL_PCIE_TX_N
        - CELL_PCIE_TX_P
        - CELL_RESET_N
        - CELL_RF_DIV
        - CELL_RF_MAIN
        - CELL_USB2_DN
        - CELL_USB2_DP
        - CELL_WAKE_AP
        - CELL_W_DISABLE_N
        - IO_1V8
        - RF_VBAT
        - USIM_CLK
        - USIM_IO
        - USIM_RST
      matching_networks_present:
        - CELL_GNSS_RF
        - CELL_RF_DIV
        - CELL_RF_MAIN
      layout_requirements:
        module_placement:
          - Keep the RedCap module on the top RF island near cellular matching networks and away from the USB-C
            bottom-edge shell current path.
          - Preserve a grounded shield perimeter around the module while leaving top-edge antenna plastic clear
            of midframe metal.
          - Route USB2 and PCIe to the SoC with continuous ground reference and no crossing through display/camera
            FPC bend keepouts.
        antenna_plan:
          cellular_main: top_or_bottom_plastic_edge_after_vendor_review
          cellular_diversity: opposite_plastic_edge_or_side_slot_after_vendor_review
          gnss_optional: top_edge_or_dedicated_LNA_path_if_desense_allows
          matching_required:
            - CELL_RF_MAIN
            - CELL_RF_DIV
            - CELL_GNSS_RF
          conducted_access_required_before_matching_network: true
        sim_esim_layout:
          - USIM/ESIM lines require ESD and short routing away from cellular RF feeds.
          - Region SKU, band matrix, and SIM/eSIM certification path must be locked before EVT1 routing release.
        coexistence_requirements:
          - Reserve modem W_DISABLE_N and AP/module wake lines for airplane mode, suspend, and regulatory testing.
          - Capture cellular transmit-current burst profile before RF_VBAT copper/via signoff.
          - Run conducted coexistence checks against Wi-Fi 2.4/5/6 GHz, Bluetooth, GNSS, display bias, and USB-C
            charging states.
      release_blockers:
        - selected_region_sku_and_band_matrix
        - module_datasheet_and_reference_layout_under_NDA_if_required
        - sim_or_esim_certification_path
        - antenna_vendor_review
        - carrier_certification_plan
        - sar_and_rf_exposure_pre_scan
