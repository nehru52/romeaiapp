schema: eliza.e1_phone_radio_module_integration.v1
status: blocked_requires_module_pinout_firmware_rf_measurement_and_regulatory_evidence
date: '2026-05-21'
claim_boundary: Board-level radio module integration closure. This confirms the selected off-the-shelf cellular
  and Wi-Fi/Bluetooth module classes are represented in logical nets, placement, RF feeds, firmware gates, and release
  outputs. It is not a routed RF layout, not firmware bring-up, not antenna tuning, not modular approval, not carrier
  approval, and not SAR evidence.
