        region_mm:
          x: 3.0
          y: 18.0
          width: 14.0
          height: 10.0
        side: upper_mid_rf
        required_nets:
          - WIFI_PCIE_OR_SDIO
          - BT_UART
          - WIFI_EN
          - BT_EN
          - WIFI_IRQ
          - WIFI_HOST_WAKE
          - VDDIO_1V8
        constraints:
          - rf_keepout
          - pi_matching_network
          - coexistence_with_cellular
      block: U_WIFI_BT
      required_nets:
        - BT_EN
        - BT_UART_CTS_N
        - BT_UART_RTS_N
        - BT_UART_RX
        - BT_UART_TX
        - IO_1V8
        - RF_VBAT
        - WIFI_BT_RF0
        - WIFI_BT_RF1
        - WIFI_EN
        - WIFI_HOST_WAKE
        - WIFI_IRQ
        - WIFI_PCIE_RX_N
        - WIFI_PCIE_RX_P
        - WIFI_PCIE_TX_N
        - WIFI_PCIE_TX_P
        - WIFI_SDIO_CLK
        - WIFI_SDIO_CMD
        - WIFI_SDIO_D0
        - WIFI_SDIO_D1
        - WIFI_SDIO_D2
        - WIFI_SDIO_D3
      matching_networks_present:
