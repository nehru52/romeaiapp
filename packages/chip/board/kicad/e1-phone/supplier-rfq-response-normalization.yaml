schema: eliza.e1_phone_supplier_rfq_response_normalization.v1
status: blocked_response_normalization_ready_no_supplier_responses_received
date: '2026-05-21'
claim_boundary: >
  Machine-readable normalization gate for supplier RFQ responses. It converts the
  current Alibaba, Made-in-China, and vendor shortlist into the exact fields that
  must be returned before schematic capture, footprint assignment, routed layout,
  factory release, or enclosure fit can advance. This is not a sent RFQ, not a
  supplier response, not an AVL, not a signed drawing pack, not a sample receipt,
  and not approval to route or fabricate.

source_artifacts:
  - board/kicad/e1-phone/supplier-rfq-intake.yaml
  - board/kicad/e1-phone/supplier-source-verification.yaml
  - board/kicad/e1-phone/display-camera-oem-source-revalidation.yaml
  - board/kicad/e1-phone/supplier-rfq-transmittal-drafts.yaml
  - board/kicad/e1-phone/supplier-to-kicad-evidence-map.yaml
  - board/kicad/e1-phone/supplier-sample-release-gate.yaml
  - board/kicad/e1-phone/usb-sidekey-source-revalidation.yaml
  - board/kicad/e1-phone/usb-sidekey-selection-wiring-decision.yaml
  - board/kicad/e1-phone/radio-module-source-revalidation.yaml
  - board/kicad/e1-phone/radio-module-selection-wiring-decision.yaml
  - board/kicad/e1-phone/footprint-3d-model-library-map.yaml
  - board/kicad/e1-phone/routed-pcb-implementation-execution.yaml
  - board/kicad/e1-phone/enclosure-fit-execution-package.yaml

upstream_status:
  rfq_intake: blocked_waiting_supplier_quote_drawing_sample_and_approval_packs
  source_verification: public_sources_verified_not_supplier_approved_or_procurement_ready
  display_camera_source_revalidation: public_sources_revalidated_screen_camera_not_supplier_approved
  rfq_transmittal_drafts: drafts_prepared_not_sent_not_supplier_evidence
  supplier_to_kicad_evidence_map: blocked_supplier_evidence_not_ready_for_kicad_capture
  supplier_sample_release_gate: blocked_supplier_samples_response_packs_and_reviews_required_before_layout_release
  footprint_3d_model_library_map: library_match_preparation_with_local_routed_candidate_not_release
  routed_pcb_implementation: blocked_requires_supplier_footprints_schematic_erc_trial_route_drc_outputs_and_routed_step
  enclosure_fit_execution: blocked_requires_routed_board_step_supplier_geometry_and_physical_fit_results

response_schema:
  quote_quantities: [10, 100, 1000]
  minimum_sample_lot_per_candidate: 5
  required_response_fields:
    - function
    - candidate
    - supplier_legal_name
    - supplier_contact
    - marketplace_or_vendor_url
    - orderable_manufacturer_part_number
    - supplier_sku
    - lifecycle_status
    - MOQ
    - unit_price_10
    - unit_price_100
    - unit_price_1000
    - lead_time_days_10
    - lead_time_days_100
    - lead_time_days_1000
    - signed_2d_drawing_path
    - pinout_or_pad_map_path
    - mating_connector_mpn
    - recommended_land_pattern_path
    - step_or_brep_model_path
    - electrical_specs_path
    - reference_schematic_or_layout_path
    - compliance_pack_index_path
    - sample_lot_tracking
    - incoming_inspection_path
    - firmware_or_driver_pack_path
    - regulatory_or_modular_grant_scope
    - enclosure_datums_and_keepouts_path
    - approved_by_ee
    - approved_by_me
    - approved_by_ops
  required_boolean_gates:
    - orderable_mpn_received
    - signed_2d_drawing_received
    - pinout_or_pad_map_received
    - recommended_land_pattern_received
    - step_or_brep_model_received
    - sample_received_and_inspected
    - compliance_pack_received
    - pinout_symbol_footprint_reviews_complete
    - enclosure_datums_reviewed
    - quote_approved_for_evt1_buy
  all_boolean_gates_default_false: true
  production_response_archive_root: board/kicad/e1-phone/production/sourcing

current_browser_refresh:
  checked_date: '2026-05-21'
  sources:
    - id: display_primary_chenghao_ch550fh01a_ct
      observed_result: Made-in-China listing still exposes CH550FH01A-CT, 5.5 inch 1080x1920, MIPI, 77.1 x 151.77 x 3.39 mm outline, and 68.04 x 120.96 mm active area.
    - id: display_alternate_alibaba_meta_055wu01
      observed_result: Alibaba listing exposes 055WU01, 5.5 inch 1080x1920, MIPI 4-lane, 40-pin signal interface, 1000 nit brightness, and 68.04 x 120.96 mm active area.
    - id: display_alternate_made_in_china_e549_amoled
      observed_result: Made-in-China listing exposes E549/RM67191 AMOLED class, 5.49 inch 1080x1920, 70.66 x 128.36 x 0.82 mm outline, and 68.299 x 121.421 mm active area.
    - id: rear_camera_primary_sincere_first_ov13855
      observed_result: Made-in-China Sincere First listing exposes OV13855/OV13850 class, 13MP, autofocus, MIPI CSI, and 24/30-pin camera module class.
    - id: front_camera_primary_sincere_first_gc5035
      observed_result: Made-in-China Sincere First listing remains the primary GC5035 5MP MIPI fixed-focus class in the package sources; exact variant pack still required.
    - id: usb_evt0_gct_usb4105
      observed_result: GCT public PDF source still exposes USB4105 USB2 Type-C receptacle class, 16 active contacts, 24-position shell/mechanical footprint class, VBUS 5 A collective rating, and -40 C to 85 C operating class.
    - id: side_switch_primary_panasonic_evq_p7
      observed_result: Panasonic public source still exposes EVQ-P7/EVQ-P3/EVQ-9P7 side-push tactile family, 3.5 x 2.9 x 1.35 mm envelope class, 0.2 mm travel, and mobile phone application class.
    - id: cellular_primary_quectel_rg255c_vendor_page
      observed_result: Quectel public source still exposes RG255C 5G RedCap LGA class with USB 2.0, PCIe 2.0, UART, optional GNSS, Linux/Android support, and regional SKU families requiring supplier design-pack confirmation.
    - id: wifi_bluetooth_primary_murata_type_2ea_vendor_page
      observed_result: Murata public source still exposes LBEE5XV2EA-802 Type 2EA, Infineon CYW55573, Wi-Fi 6E 2x2, Bluetooth 5.3, 12.5 x 9.4 x 1.2 mm package, and Linux/Android support signals.
  use_limit: browser-visible marketplace fields seed response normalization only; they do not replace supplier-returned packs.

