schema: eliza.e1_phone_off_the_shelf_sourcing_cost_model.v1
status: public_listing_cost_model_not_avl_or_po_ready
date: '2026-05-22'
claim_boundary: >
  Public marketplace and distributor cost model for feasibility only. Prices,
  MOQs, lifecycle, compliance, exact drawings, STEP models, pinouts, samples,
  incoming inspection, tariffs, freight, taxes, scrap, warranty reserve, and
  commercial terms are not supplier-approved. Do not treat this as an AVL,
  production BOM, quote, purchase order, or authorization to freeze footprints.

source_policy:
  preferred_sources:
    - official manufacturer pages for dimensions, status, package, and interfaces
    - authorized distributors for orderability and price breaks
    - Alibaba/Made-in-China listings only as public sourcing signals
  missing_before_buy:
    - signed supplier quote at 100/1000/10000/100000/1000000 units
    - dimensioned 2D drawing and native/STEP model
    - exact FPC pinout, mating connector, land pattern, and keepout
    - sample lot receipt and incoming inspection record
    - RoHS/REACH, battery UN38.3/MSDS, and radio regulatory/certification scope
    - lifecycle statement and approved alternate strategy

successor_public_refresh:
  path: board/kicad/e1-phone/supplier-bom-public-evidence-refresh-2026-05-31.yaml
  status: public_supplier_bom_refresh_not_avl_or_release_evidence
  note: >
    2026-05-31 refresh adds current public source URLs, MOQ/price-break
    observations, STEP/3D availability notes, and 100/1000/10000/100000/1000000
    unit cost ranges for purchasable off-the-shelf phone component classes.

