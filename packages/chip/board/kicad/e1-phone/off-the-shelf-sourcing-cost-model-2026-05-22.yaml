line_items:
  - function: display_touch
    current_primary: Chenghao_CH550FH01A_CT_or_pin_compatible_5p5_FHD_MIPI_CTP
    off_the_shelf_assessment: usable_publicly_listed_family_but_not_orderable_production_line_without_signed_drawing
    quality_assessment: LCD is acceptable EVT anchor; AMOLED alternate improves thickness/power but increases bringup and burn-in risk.
    estimated_unit_cost_usd: {single: 20.00, qty_100: 17.40, qty_1000: 15.40, qty_10000: 13.00, qty_100000: 11.00, qty_1000000: 9.50}
    confidence: medium
    cad_action: keep 77.1 x 151.77 x 3.39 mm primary envelope until supplier STEP/drawing is received
  - function: rear_camera
    current_primary: Sincere_First_SF_XR3855A_A0_OV13855_13MP_AF_MIPI
    off_the_shelf_assessment: buyable_camera_module_class_but_exact_fpc_lens_stack_is_supplier_specific
    quality_assessment: OV13855/OV13850 13MP AF is reasonable; image quality depends heavily on lens, AF, OTP, tuning, and ISP support.
    estimated_unit_cost_usd: {single: 18.00, qty_100: 12.00, qty_1000: 8.50, qty_10000: 6.50, qty_100000: 5.20, qty_1000000: 4.40}
    confidence: low_medium
    cad_action: keep buried module and optical tunnel; replace with supplier STEP and optical-center datum when received
  - function: front_camera
    current_primary: Sincere_First_SF_G5035S60FY_GC5035_5MP_FF_MIPI
    off_the_shelf_assessment: buyable_camera_module_class_but_current_public_quote_is_weak
    quality_assessment: GC5035 5MP is adequate for front camera; IMX219 alternate is easier for lab bringup but physically larger.
    estimated_unit_cost_usd: {single: 8.00, qty_100: 5.00, qty_1000: 3.60, qty_10000: 2.50, qty_100000: 2.00, qty_1000000: 1.65}
    confidence: low_medium
    cad_action: keep under-glass camera, mask, and adhesive ring; require supplier module STEP before freeze
  - function: cellular
    current_primary: Quectel_RG255C_LGA_or_RM255C_M2_5G_RedCap
    off_the_shelf_assessment: buyable_module_family_but_redcap_cost_and_certification_are_main_bom_risks
    quality_assessment: RedCap is technically strong but expensive; EG915Q/EG916Q Cat 1 bis branch is a serious cost-down alternate if product requirements allow lower throughput.
    estimated_unit_cost_usd: {single: 120.00, qty_100: 90.00, qty_1000: 65.00, qty_10000: 48.00, qty_100000: 38.00, qty_1000000: 30.00}
    confidence: low
    cad_action: added visible cellular_lga_module_keepout plus RF feed stub; supplier reference layout and STEP still required
  - function: wifi_bluetooth
    current_primary: Murata_LBEE5XV2EA_802_Type_2EA_WiFi6E_BT5p3
    off_the_shelf_assessment: orderable_authorized_distribution_signal_exists
    quality_assessment: strong module choice for Wi-Fi 6E/Bluetooth 5.3, but firmware/regulatory package and antenna design are blocking.
    estimated_unit_cost_usd: {single: 33.44, qty_100: 28.15, qty_1000: 24.53, qty_10000: 17.00, qty_100000: 14.00, qty_1000000: 12.00}
    confidence: medium
    cad_action: added visible wifi_bt_module_keepout and side-antenna RF feed stub
  - function: usb_c_receptacle_evt0
    current_primary: GCT_USB4105_USB2_Type_C
    off_the_shelf_assessment: orderable_connector_with_authorized_distribution_and_public_datasheet
    quality_assessment: good EVT USB2 Type-C receptacle; waterproof USB3 alternate should only be used if product requirements demand it.
    estimated_unit_cost_usd: {single: 0.78, qty_100: 0.52, qty_1000: 0.39, qty_10000: 0.36, qty_100000: 0.32, qty_1000000: 0.29}
    confidence: high
    cad_action: keep current connector envelope; replace with official STEP if distributor/manufacturer model is accepted
  - function: side_buttons
    current_primary: Panasonic_EVQ_P7_or_EVQ_P3_side_push_tactile
    off_the_shelf_assessment: orderable_family_with_official_drawings_but_exact_terminal_variant_not_frozen
    quality_assessment: high-quality mobile side-push family; cheaper XKB/C&K alternatives need lifecycle and force-travel validation.
    estimated_unit_cost_usd: {single: 0.90, qty_100: 0.54, qty_1000: 0.42, qty_10000: 0.30, qty_100000: 0.24, qty_1000000: 0.21}
    confidence: medium
    cad_action: keep button caps, gaskets, and labyrinth rails; select exact tactile MPN before actuator stack freeze
  - function: usb_pd_controller
    current_primary: TI_TPS65987DDH
    off_the_shelf_assessment: buyable_ic_but_firmware_policy_flow_is_blocking
    quality_assessment: capable PD controller; may be overkill if phone remains USB2 charging-only.
    estimated_unit_cost_usd: {single: 7.00, qty_100: 5.50, qty_1000: 4.20, qty_10000: 3.60, qty_100000: 2.90, qty_1000000: 2.50}
    confidence: low_medium
    cad_action: mark in PCB detail as part of power/PMIC region until routed KiCad step exists
  - function: charger_power_path
    current_primary: MAX77860_class
    off_the_shelf_assessment: production_charger_with_public_1ku_price_signal
    quality_assessment: strong USB-C charger/power-path choice; final charge current must match selected battery PCM/thermal budget.
    estimated_unit_cost_usd: {single: 5.50, qty_100: 4.57, qty_1000: 4.10, qty_10000: 3.50, qty_100000: 2.90, qty_1000000: 2.50}
    confidence: medium
    cad_action: mark in PCB detail as power package region
  - function: battery_pack
    current_primary: LiPol_LP566487_3p85V_5727mAh_22p05Wh_PCM_NTC_JST_SHR_03V_class
    off_the_shelf_assessment: public_5000mah_pack_classes_exist_but_exact_5727mah_pack_is_custom
    quality_assessment: safety-critical; price-only marketplace sourcing is unacceptable without UN38.3/MSDS/IEC62133/sample capacity and abuse tests.
    estimated_unit_cost_usd: {single: 15.00, qty_100: 11.00, qty_1000: 8.00, qty_10000: 6.50, qty_100000: 5.20, qty_1000000: 4.60}
    confidence: low
    cad_action: keep 64 x 87 x 5.6 mm pouch envelope; require exact supplier drawing before cavity freeze
  - function: pmic
    current_primary: DA9063_class
    off_the_shelf_assessment: buyable_but_cost_and_programming_variant_need_review
    quality_assessment: capable but likely expensive/stale for high-volume phone; should be challenged against newer PMIC/charger integration.
    estimated_unit_cost_usd: {single: 32.00, qty_100: 14.00, qty_1000: 10.00, qty_10000: 7.00, qty_100000: 5.50, qty_1000000: 4.80}
    confidence: low
    cad_action: added PMIC package marker; revisit electrical architecture before production BOM
  - function: audio_codec_amp_mics_haptic
    current_primary: v0_audio_codec_binding_plus_speaker_receiver_mems_mics_lra
    off_the_shelf_assessment: commodity_parts_buyable_but_exact_acoustic_modules_not_frozen
    quality_assessment: moderate cost and risk; acoustic chamber, mesh, gasket, and supplier speaker box dominate quality.
    estimated_unit_cost_usd: {single: 8.00, qty_100: 5.00, qty_1000: 3.50, qty_10000: 2.80, qty_100000: 2.25, qty_1000000: 1.90}
    confidence: low_medium
    cad_action: existing CAD covers speaker, receiver, mics, acoustic slots/mesh, haptic; supplier modules still required
  - function: top_bottom_interconnect_flex_cables
    current_primary: Hirose_BM28_hybrid_power_signal_fpc_bridge_class
    off_the_shelf_assessment: connector_family_buyable_but_exact_circuit_count_and_flex_stack_are_not_selected
    quality_assessment: good high-density connector family; SI/current/assembly risk remains high until exact part pair and flex are drawn.
    estimated_unit_cost_usd: {single: 8.00, qty_100: 4.00, qty_1000: 2.80, qty_10000: 2.00, qty_100000: 1.50, qty_1000000: 1.25}
    confidence: low_medium
    cad_action: existing CAD covers split interconnect connectors, flex, and tails
  - function: pcb_pcba
    current_primary: 8L_HDI_split_island_phone_board
    off_the_shelf_assessment: custom_fab_not_off_the_shelf
    quality_assessment: dominated by layer count, HDI via stack, assembly yield, and whether RedCap/Wi-Fi/RF placement passes SI/PI.
    estimated_unit_cost_usd: {single: 80.00, qty_100: 30.00, qty_1000: 18.00, qty_10000: 11.00, qty_100000: 7.00, qty_1000000: 5.50}
    confidence: low
    cad_action: concept PCB now includes visible module/package markers; routed KiCad STEP still required
  - function: mechanical_enclosure_glass_seals
    current_primary: orange_pc_abs_shell_frame_cover_glass_gaskets_psa_meshes
    off_the_shelf_assessment: custom_tooled_not_off_the_shelf
    quality_assessment: cost drops sharply with tooling volume; current CAD is concept DFM only, not toolmaker steel.
    estimated_unit_cost_usd: {single: 90.00, qty_100: 22.00, qty_1000: 14.00, qty_10000: 9.00, qty_100000: 6.00, qty_1000000: 4.80}
    confidence: low
    cad_action: current CAD covers shell, frame, holes, seals, bosses, snaps, ribs, USB/speaker/mic cutouts, and camera/flash windows
  - function: antennas_sim_coax_rf_misc
    current_primary: cellular_wifi_bt_gnss_flex_antennas_feeds_sim_service_parts
    off_the_shelf_assessment: antenna_elements_are_buyable_but_phone_tuning_is_custom
    quality_assessment: must be treated as RF design work, not commodity BOM only.
    estimated_unit_cost_usd: {single: 6.00, qty_100: 3.00, qty_1000: 2.00, qty_10000: 1.40, qty_100000: 1.00, qty_1000000: 0.75}
    confidence: low
    cad_action: CAD includes cellular top/bottom keepouts, Wi-Fi/BT keepout, RF feed stubs, and tuner placeholder
  - function: passives_shields_thermal_misc
    current_primary: emi_shields_passives_esd_crystals_thermal_pads_foam
    off_the_shelf_assessment: commodity_buyable_but_routed_bom_missing
    quality_assessment: cost cannot be trusted until schematic/BOM export exists.
    estimated_unit_cost_usd: {single: 22.00, qty_100: 14.00, qty_1000: 9.00, qty_10000: 6.00, qty_100000: 4.50, qty_1000000: 3.80}
    confidence: low
    cad_action: CAD includes major shield cans, foam pad, cushions, and thermal stack placeholders
  - function: compute_soc_or_compute_module
    current_primary: project_specific_eliza_ai_soc_or_lab_compute_module
    off_the_shelf_assessment: not_off_the_shelf_for_final_phone
    quality_assessment: highest architectural uncertainty after cellular; production cost depends on whether this is ASIC, SiP, or module.
    estimated_unit_cost_usd: {single: 45.00, qty_100: 30.00, qty_1000: 22.00, qty_10000: 16.00, qty_100000: 11.00, qty_1000000: 8.00}
    confidence: very_low
    cad_action: added SoC/DRAM/storage package markers; replace with actual package stack when silicon/package is known
  - function: test_packaging_yield_consumables
    current_primary: factory_test_packaging_labels_process_loss
    off_the_shelf_assessment: not_a_component
    quality_assessment: necessary COGS reserve; depends on yield, fixture maturity, and returned-material policy.
    estimated_unit_cost_usd: {single: 25.00, qty_100: 12.00, qty_1000: 8.00, qty_10000: 5.50, qty_100000: 3.50, qty_1000000: 2.60}
    confidence: very_low
    cad_action: no geometry impact

rollup:
  scope: estimated_material_pcba_mechanical_factory_test_excluding_nre_tooling_freight_tariffs_tax_warranty_and_margin
  quantities:
    - units: 1
      estimated_per_device_usd: 544.62
      discount_from_single_unit_pct: 0.0
    - units: 100
      estimated_per_device_usd: 308.68
      discount_from_single_unit_pct: 43.3
    - units: 1000
      estimated_per_device_usd: 223.44
      discount_from_single_unit_pct: 59.0
    - units: 10000
      estimated_per_device_usd: 161.96
      discount_from_single_unit_pct: 70.3
    - units: 100000
      estimated_per_device_usd: 124.01
      discount_from_single_unit_pct: 77.2
    - units: 1000000
      estimated_per_device_usd: 101.05
      discount_from_single_unit_pct: 81.4
  biggest_cost_drivers:
    - cellular_redcap_module
    - compute_soc_or_compute_module
    - display_touch_stack
    - pcb_pcba
    - mechanical_enclosure_glass_seals
  cost_down_actions:
    - evaluate EG915Q/EG916Q Cat 1 bis branch if 5G RedCap throughput is not required
    - challenge DA9063-class PMIC and TPS65987-class PD architecture for lower-cost integrated phone PMIC/charger path
    - require exact display/camera drawing packs before any enclosure or connector freeze
    - push supplier quotes at 10k/100k/1m for display, camera, battery, radio, Wi-Fi, USB-C, side keys, and flex/connectors
    - generate routed KiCad BOM from real footprints before trusting passive, shield, ESD, and PCBA cost

release_blockers:
  - public_listing_prices_are_not_quotes
  - no_supplier_response_packs_returned
  - no_supplier_step_models_or_signed_2d_drawings
  - no_sample_lot_or_incoming_inspection
  - no_routed_kicad_bom_or_routed_board_step
  - cellular_certification_and_antenna_tuning_not_closed
  - compute_soc_or_module_not_production_defined

forbidden_claims:
  - production_cost_locked
  - supplier_selected
  - AVL_ready
  - purchase_order_ready
  - fabrication_ready
  - all_parts_orderable
