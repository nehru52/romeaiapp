release_blockers:
  - PD controller lifecycle branch is not closed and TPS65987DDH remains blocked for production use
  - PD policy image, provisioning transcript, Type-C class log, CC attach logs, and dead-battery boot logs are missing
  - MAX77860 I2C, CC/CV, JEITA, input-current-limit, charger thermal, and fault logs are missing
  - battery pack signed drawing, connector pinout, NTC curve, ID policy, PCM spec, UN38.3 summary, MSDS, and bench validation logs are missing
  - AON power-key wake, volume recovery combos, debounce, stuck-key, and side-key load-path logs are missing
  - USB2 ADB, fastboot, reconnect, suspend/resume, and debug access policy logs are missing
  - routed PCB, ERC, DRC, USB2 SI, power PI, routed STEP, enclosure load path, fixtures, and first-article transcript are missing

