      - SYS
      - USB_CC1
      - USB_CC2
      - USB_DN
      - USB_DP
      - VBAT
      - VBUS
      - VDD_AMP_3V3
      - VDD_AUDIO_3V3
    required_local_parts:
      - real supplier connector symbol with electrical pin types and no text-only nets
