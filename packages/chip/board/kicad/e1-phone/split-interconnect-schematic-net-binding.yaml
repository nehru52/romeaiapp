  selected_topology: top_bottom_rigid_islands_with_flex_or_board_to_board
  preferred_interconnect_family: Hirose_BM28
  exact_part_number_status: not_selected
  contact_count: 49
  active_unique_crossing_net_count: 25
  ground_or_return_pin_count: 18
  spare_pin_count: 6
  schematic_sheet: board/kicad/e1-phone/schematic/split_interconnect.kicad_sch
