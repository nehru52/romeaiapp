factory_probe_bindings:
  split_board_interconnect:
    - USB_DP
    - USB_DN
    - VBUS
    - SYS
    - I2S_BCLK
    - PDM_CLK
    - HAPTIC_OUT
    - AON_1V8
    - IO_1V8
    - VDD_AUDIO_3V3
    - VDD_AMP_3V3
  bottom_fixture_visible_rails:
    - VBUS
    - VBAT
    - SYS
    - AON_1V8
    - IO_1V8
    - RF_VBAT
    - GND
  required_fixture_notes:
    - continuity fixture must prove top and bottom connectors share the same logical pin order before USB attach testing
    - USB2 path must record connector/flex/PCB channel impedance and return spacing through the split
    - audio and haptic tests must run through the split interconnect after enclosure strain-relief installation

evt1_capture_exit_criteria:
  - KiCad schematic contains non-placeholder 49-contact or greater top and bottom connector symbols with reviewed electrical pin types
  - supplier connector pinout land patterns STEP models flex stackup stiffener drawing bend radius and strain relief are archived
  - split-interconnect-pin-allocation.yaml is converted into symbol pins footprint pads and flex pinout with mirrored-contact review
  - USB_DP and USB_DN remain flanked by return contacts and pass stackup coupon TDR eye attach ADB and fastboot evidence
  - AUDIO_I2S_PDM and AUDIO_I2C_IRQ nets meet route length skew crosstalk and loopback requirements through the split
  - power contact current rise bottom-island decoupling haptic return and fixture rail access are measured
  - routed board STEP includes top connector bottom connector flex stiffeners strain relief and approved enclosure release clearance

cross_checks:
  manifest_cites_binding: true
  allocation_contact_count_matches_binding: true
  connector_binding_still_blocks_real_symbols_and_footprints: true
  top_and_bottom_required_nets_match_allocation: true
  bus_contacts_match_pin_allocation: true
  usb2_impedance_matches_routing_constraints: true
  factory_probe_nets_match_probe_map: true
  all_active_nets_exist_in_block_netlist: true
  fail_closed_until_supplier_connector_flex_stackup_real_symbols_route_si_and_enclosure_evidence_exist: true

release_blockers:
  - schematic split-interconnect sheet is still a text scaffold, not real 49-pin connector symbols
  - exact connector mating pair and circuit count are not orderable part numbers
  - flex stackup, bend radius, stiffener, strain relief, and assembly drawing are missing
  - mated top/bottom connector orientation and mirrored flex pin numbering are not supplier-reviewed
  - USB2 impedance, length, skew, eye, attach, ADB, and fastboot evidence are missing
  - power contact current rise and return allocation have not been reviewed against datasheets
  - bottom island ESD, decoupling, haptic drive return, and fixture pads are pending KiCad capture
  - routed copper, DRC/ERC, and enclosure clearance evidence are missing

forbidden_claims:
  - schematic_connector_symbols_ready
  - interconnect_pinout_frozen
  - connector_selected
  - flex_stackup_ready
  - split_interconnect_routed
  - split_board_routed
  - usb_si_closed
  - audio_si_closed
  - erc_clean
  - drc_clean
  - enclosure_ready
  - fabrication_ready
  - end_to_end_phone_ready
