schema: eliza.e1_phone_split_interconnect_schematic_net_binding.v1
status: blocked_split_interconnect_net_binding_requires_supplier_connector_flex_stackup_real_symbols_route_si_and_enclosure_evidence
date: 2026-05-21
claim_boundary: >
  Schematic-net binding target for the top/bottom split-board interconnect
  that enables the full-width battery layout. This maps the 49-contact
  allocation to top and bottom schematic connector intent, physical route
  groups, USB/audio/power/contact constraints, factory continuity probes, and
  EVT1 exit criteria. It is not a supplier connector pinout, not a real KiCad
  connector symbol, not a routed flex or rigid-flex, not ERC/DRC evidence, not
  USB/audio SI signoff, and not enclosure-ready proof.

source_artifacts:
  - board/kicad/e1-phone/artifact-manifest.yaml
  - board/kicad/e1-phone/top-bottom-interconnect-plan.yaml
  - board/kicad/e1-phone/split-interconnect-pin-allocation.yaml
  - board/kicad/e1-phone/split-interconnect-connector-binding.yaml
  - board/kicad/e1-phone/usb-route-topology-resolution.yaml
  - board/kicad/e1-phone/block-netlist.yaml
  - board/kicad/e1-phone/routing-constraints.yaml
  - board/kicad/e1-phone/factory-probe-map.yaml
  - board/kicad/e1-phone/schematic/split_interconnect.kicad_sch
  - package/interconnect/e1-phone-top-bottom-flex.yaml

