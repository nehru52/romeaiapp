    routing_constraint_refs: [USB_DP_DN]
    controlled_impedance_group: USB_DP_DN
    target_differential_impedance_ohm: 90
    required_validation: usb2_flex_stackup_coupon_tdr_eye_attach_adb_fastboot_log
