expected_return_archive: board/kicad/e1-phone/production/sourcing/display_touch/rfq-response-pack.yaml
required_supplier_returns:
  - signed LCM plus CTP 2D drawing with active area, viewing area, outline, FPC, cover-lens, and pin-1 datums
  - FPC pinout or pad map with MIPI DSI lane order and polarity, touch I2C, reset, TE, backlight, bias rails, and grounds
  - mating connector MPN, height, recommended land pattern, paste mask, and bend keepout
  - display and touch power sequence, panel init sequence, backlight current, bias current, and inrush limits
  - STEP or B-rep model for display stack, FPC tail, stiffener, adhesive, and cover-lens datum envelope
  - sample lot report covering outline, FPC exit, touch stack thickness, cosmetic yield, and electrical test
