    release_required: true
    blocker: first-article traveler, current limits, stop-on-fail rules, and signoff missing
  fab_assembler_quote:
    owner: sourcing
    source: selected fabricator and assembler quote
    expected_path: board/kicad/e1-phone/production/fab-quote
    present: false
    release_required: true
    blocker: quote tied to layer count, HDI, impedance, finish, tolerances, assembly, and test missing
route_completion_requirements:
  usb_c_power:
    required_nets:
      - VBUS
      - USB_CC1
      - USB_CC2
      - USB_DP
      - USB_DN
      - SHIELD_GND
    required_evidence:
      - Type-C receptacle land pattern and shell capture from supplier drawing
      - VBUS input protection, charger path, USB-PD controller, and current-limit validation
      - USB2 differential routing, ESD placement, and bring-up test access
  display_touch:
    required_nets:
      - DSI_CLK_P
      - DSI_D0_P
      - DISP_AVDD_5V5
      - DISP_AVEE_N5V5
      - TOUCH_I2C_SCL
    required_evidence:
      - selected display/touch FPC pinout converted into real KiCad connector symbol and footprint
      - MIPI D-PHY post-route length/impedance review
      - display FPC bend and enclosure clearance with supplier model
  cameras:
    required_nets:
      - CAM0_CSI_CLK_P
      - CAM1_CSI_CLK_P
      - CAM_AVDD_2V8
      - CAM_DVDD_1V2
    required_evidence:
      - front and rear camera FPC pinouts and land patterns
      - CSI route and power-sequence review
      - module z-height, lens window, and alignment clearance in enclosure
  radios:
    required_nets:
      - CELL_RF_MAIN
      - CELL_RF_DIV
      - CELL_GNSS_RF
      - WIFI_BT_RF0
      - WIFI_BT_RF1
    required_evidence:
      - cellular and Wi-Fi/Bluetooth module reference layout adherence
      - 50 ohm feed, matching, conducted access, and antenna keepout closure
      - coexistence, GNSS desense, regulatory, carrier, and SAR pre-scan evidence
  side_buttons:
    required_nets:
      - PWR_KEY_N
      - VOL_UP_N
      - VOL_DOWN_N
      - AON_1V8
      - GND
    required_evidence:
      - side-key flex pinout and ESD/debounce land patterns
      - actuator stack tolerance, force, ingress, and test access review
  audio_haptics:
    required_nets:
      - I2S_BCLK
      - PDM_CLK
      - SPK_P
      - SPK_N
      - HAPTIC_OUT
    required_evidence:
      - codec, amplifier, microphones, speaker, and haptic supplier footprints
      - acoustic chamber, port, mesh, gasket, and enclosure leakage validation
  split_interconnect:
    required_nets:
      - USB_DP
      - USB_DN
      - VBUS
      - SYS
      - I2S_BCLK
      - PDM_CLK
      - HAPTIC_OUT
    required_evidence:
      - top and bottom connector supplier land patterns and mating-height stack
      - flex cable pinout, stiffener, bend, strain relief, and continuity test
  battery:
    required_nets:
      - VBAT
      - BAT_NTC
      - BAT_ID
      - GND
    required_evidence:
      - supplier pack drawing including swelling, PCM, tab, NTC, connector, and tolerance stack
      - cavity insertion/removal and thermal expansion clearance in enclosure
  compute_storage:
    required_nets:
      - LPDDR_CK_P
      - LPDDR_DQS_P
      - UFS_REFCLK_P
      - UFS_TX_P
      - UFS_RX_P
      - JTAG_TCK
    required_evidence:
      - SoC, LPDDR, UFS, boot strap, and debug exact footprints
      - post-route memory/storage SI and boot-mode bring-up coverage
  manufacturing:
    required_nets:
      - VBUS
      - VBAT
      - SYS
      - AON_1V8
      - IO_1V8
      - RF_VBAT
      - CAM_AVDD_2V8
      - DISP_AVDD_5V5
    required_evidence:
      - Gerber X2 or IPC-2581 with stackup notes
      - NC drill and slot files
      - ODB++ or IPC-2581 if requested by selected assembler
      - pick-and-place with side, rotation, and centroid convention documented
      - production BOM/AVL with MPN, lifecycle, MOQ, lead time, and substitutes
      - assembly drawing with polarity, shield, keepout, do-not-populate, and inspection notes
      - split-board interconnect assembly drawing with mating order, stiffener, strain relief, and inspection notes
      - board STEP exported from routed KiCad with supplier 3D models
      - stencil design and paste aperture exceptions
      - DFM/DFA report from selected fab and assembler
      - first-article traveler, current-limit table, and stop-on-fail instructions
enclosure_release_dependency:
  current_status: enclosure_placement_cross_checked_not_release_ready
  requires_routed_board_step: true
  routed_step_blocker: enclosure fit requires approved routed PCB STEP release clearance with final component models
power_thermal_release_dependency:
  current_status: blocked_power_thermal_requires_real_schematic_and_measurement
  requires_measurements: true
  required_test_points:
    - VBUS
    - VBAT
    - SYS
    - AON_1V8
    - IO_1V8
    - RF_VBAT
    - CAM_AVDD_2V8
    - DISP_AVDD_5V5
rf_release_dependency:
  current_status: planning_rf_connectivity_cross_checked_not_measured
  required_rf_nets:
    - CELL_GNSS_RF
    - CELL_RF_DIV
    - CELL_RF_MAIN
    - WIFI_BT_RF0
    - WIFI_BT_RF1
  requires_measurements:
    - VNA S11/S21 on every antenna feed with EVT0 conducted access
    - conducted cellular and Wi-Fi output power and sensitivity
    - radiated pre-scan for FCC/CE/RED and module grant conditions
    - coexistence test for Wi-Fi/Bluetooth/cellular/GNSS
    - SAR and RF exposure pre-scan in final enclosure plastics
    - carrier/PTCRB/GCF plan for selected region SKU
module_rf_pinout_execution_release_dependency:
  execution_status: blocked_requires_cellular_wifi_module_pinouts_reference_layouts_rf_feeds_firmware_and_factory_evidence
  selected_cellular: RG255C_or_RM255C
  selected_wifi_bluetooth: LBEE5XV2EA-802
  rf_feed_count: 5
  module_execution_record_ids:
    - cellular_5g_redcap_module
    - wifi6e_bluetooth_5p3_module
  required_rf_nets:
    - CELL_RF_MAIN
    - CELL_RF_DIV
    - CELL_GNSS_RF
    - WIFI_BT_RF0
    - WIFI_BT_RF1
  release_blockers:
    - cellular regional SKU, supplier pinout, land pattern, STEP, firmware, and carrier plan missing
    - Wi-Fi/Bluetooth module pinout, land pattern, STEP, firmware, NVRAM/CLM, and regulatory scope missing
    - RF matching networks and conducted access are requirements only; no 50 ohm routed geometry or VNA data exists
    - factory RF calibration, identity provisioning, and first-article radio limits are missing
    - routed PCB, DRC, SI/PI, RF, SAR, enclosure, and fabrication outputs are missing
ready_to_fabricate: false
ready_for_enclosure: false
ready_for_factory_test: false
forbidden_claims:
  - fabrication_ready
  - enclosure_ready
  - routed_release_ready
  - factory_test_ready
  - production_ready
  - carrier_ready
  - power_thermal_ready
  - end_to_end_phone_ready
