schema: eliza.e1_phone_kicad_cad_end_to_end_stub_audit.v1
date: 2026-05-22
status: blocked_external_evidence_required_after_local_cad_geometry_fix
claim_boundary: 'This file records concept-envelope CAD checks and fail-closed blockers for the KiCad-to-CAD handoff. It does not claim supplier drawings, production footprints, routed-board release output, or factory release artifacts exist.

  '
concept_geometry_evidence:
  - id: concept_pcb_split_island_geometry
    status: fixed
    evidence:
      - mechanical/e1-phone/cad/e1_phone_params.yaml
      - mechanical/e1-phone/review/board-step-readiness.json
      - mechanical/e1-phone/review/board-step-readiness.md
    result: 'CAD projected PCB islands match KiCad Edge.Cuts/layout-utilization: top 64.0 x 29.0 mm at board y=0.0 and bottom 64.0 x 15.0 mm at board y=117.0.

      '
  - id: full_cad_boolean_interference
    status: pass_concept_geometry_only
    evidence:
      - mechanical/e1-phone/review/full-cad-boolean-interference.json
      - mechanical/e1-phone/review/assembly-clearance.json
    result: 'Regenerated concept AABB and assembly-clearance reviews include the visible cable/terminal solids and report zero scoped concept-envelope interferences. The full-CAD boolean artifact remains blocked for release because supplier B-rep, routed-board STEP, and physical review evidence are still missing, but the screen stack, rear camera/back window, and cable terminal marker collisions are locally clear.

      '
  - id: molded_retention_and_assembly_sequence
    status: pass
    evidence:
      - mechanical/e1-phone/review/assembly-verification.json
      - mechanical/e1-phone/review/assembly-verification.md
      - mechanical/e1-phone/review/assembly-gotcha-audit.json
      - mechanical/e1-phone/review/compactness-optimization.json
    result: 'The assembly checker covers all ten screw bosses plus eight snap hooks, places the battery back-void foam pad before the pouch, and reports 20 ordered assembly steps with zero trapped parts. The outboard screw bosses are outside the battery and foam envelopes, and the corner ribs extend inward from the boss centers instead of widening the molded body. The compactness audit passes with a 78.0 mm molded-body width and only local side-control protrusion.

      '
  - id: camera_back_visibility
    status: pass_concept_geometry_only
    evidence:
      - mechanical/e1-phone/review/full-cad-boolean-interference.json
      - mechanical/e1-phone/out/rear_camera_lens_window.step
      - mechanical/e1-phone/out/rear_camera_optical_sight_tunnel.step
    result: 'Rear camera burial and window checks pass for the concept board island geometry; camera/flash are modeled with explicit back-window apertures and no unintentional back-cover clash.

      '
  - id: cad_visible_modules_and_markers
    status: pass_concept_envelopes_only
    evidence:
      - mechanical/e1-phone/out/cellular_lga_module_keepout.step
      - mechanical/e1-phone/out/wifi_bt_module_keepout.step
      - mechanical/e1-phone/out/compute_som_sodimm_connector.step
      - mechanical/e1-phone/out/compute_som_daughterboard_keepout.step
