      - mechanical/e1-phone/out/cellular_gnss_rf_feed_development_envelope.step
      - mechanical/e1-phone/out/wifi_bt_rf1_feed_development_envelope.step
    result: 'Display/touch FPC, front/rear camera FPC tails, side-key flex, battery lead flex, USB-C escape, speaker/microphone/haptic leads, SIM/eSIM marker, the top microphone tail, earpiece receiver lead flex, compute SoM SODIMM connector/keepout, antenna aperture tuner marker, USB-PD/charger/battery board-route markers, and the remaining RF feed markers are now explicit STEP solids in the CAD. The CAD connection coverage gate maps 32 required cables, flexes, board-route groups, RF feeds, and compute carrier interfaces to visible STEP solids and routed-development nets, with 64 endpoint terminal STEP markers and 32 passing terminal pairs proving each represented connection has explicit local from/to contact evidence. The routed-output candidate metadata now carries the full connection record for each marker: CAD part, from/to endpoints, terminal STEP paths and byte counts, connection type, STEP path and byte count, net list, pass flag, and release-credit=false state. Concept AABB/clearance scans report zero unintentional local-review clashes with 258 parts, including 64 explicit connection terminal markers in the assembly manifest; the full supplier B-rep boolean gate remains fail-closed until routed-board STEP and supplier models are accepted.

      '
  - id: routed_development_board_snapshot
    status: generated_non_release
    evidence:
      - board/kicad/e1-phone/pcb/e1-phone-mainboard-routed-development.kicad_pcb
      - board/kicad/e1-phone/pcb/fab-demo/e1-phone-mainboard-routed-development.step
      - board/kicad/e1-phone/routed-development-board-intake-2026-05-22.yaml
      - mechanical/e1-phone/review/board-step-readiness.json
    result: 'A separate routed-development board snapshot contains 153 route records and 306 KiCad copper segments. Its intake coverage audit reports zero missing required shared nets and zero missing route-domain nets after explicit alias normalization for stale contract names. Board-step readiness keeps this separate from the concept PCB source, so production routed_tracks_present and the concept-board local-review booleans remain blocked. It is deliberately not counted as production routed-board release evidence.

      '
