      - mechanical/e1-phone/out/wifi_bt_rf_feed_development_envelope.step
      - mechanical/e1-phone/out/cellular_rf_feed_development_envelope.step
    result: 'Major off-board/OEM module envelopes and PCB package markers are present in concept CAD. They are not release 3D package models until supplier STEP or verified package drawings are linked.

      '
  - id: cad_visible_wires_cables_and_rf_feeds
    status: pass_concept_envelopes_only
    evidence:
      - mechanical/e1-phone/review/cad-connection-coverage.json
      - mechanical/e1-phone/review/cad-connection-coverage.md
      - mechanical/e1-phone/out/display_fpc_tail.step
      - mechanical/e1-phone/out/rear_camera_fpc_tail.step
      - mechanical/e1-phone/out/front_camera_fpc_tail.step
