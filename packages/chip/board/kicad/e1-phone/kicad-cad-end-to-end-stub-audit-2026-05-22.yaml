      - mechanical/e1-phone/out/haptic_flex_tail.step
      - mechanical/e1-phone/out/sim_esim_signal_flex_marker.step
      - mechanical/e1-phone/out/usb_pd_controller_escape_trace_marker.step
      - mechanical/e1-phone/out/pd_charger_control_trace_marker.step
      - mechanical/e1-phone/out/charger_battery_power_sense_trace_marker.step
