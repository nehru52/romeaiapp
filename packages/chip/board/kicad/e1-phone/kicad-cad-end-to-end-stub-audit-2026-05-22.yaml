      - board/kicad/e1-phone/e1-phone-dev.pretty/SODIMM_260P_0P5_COMPUTE_SOM_DEV.kicad_mod
    result: 'Thirty-two concrete KiCad development footprint patterns exist and are registered through the project fp-lib-table. The library covers the 13 major component/module patterns plus reusable support footprints for ESD/TVS, test pads, fiducials, mounting holes, 0402 R/C/L networks, RF pi-matches, shunts, USIM/eSIM/NFC/sensor, haptic, fuel-gauge, and backlight/bias support. Public-data-complete footprints are separated from geometry-only footprints that still require supplier pad maps before production release.

      '
  - id: real_footprint_development_board_binding
    status: generated_non_release
    evidence:
      - board/kicad/e1-phone/pcb/e1-phone-mainboard-real-footprint-development.kicad_pcb
      - board/kicad/e1-phone/real-footprint-development-board-binding-2026-05-22.yaml
    result: 'The routed-development board has a separate library-bound variant with all concept placements rebuilt from the e1-phone-dev concrete development footprint library bodies, with the combined PMIC/charger placeholder split into separate MAX77860 charger and TPS65987 USB-PD package bodies. The 306 route segments are retained, the output board has 1452 concrete pads, 847 assigned pad-net clauses including 195 contract-sequence assignments, 78 public compute-SoM connector assignments, and 218 support-pattern assignments for test points, ESD/TVS, RF pi-matches, decoupling, pullup/damping, side-key, SIM/eSIM, NFC/sensor, audio/haptic, fuel-gauge, and rail-access development patterns. Of those contract assignments, 86 cover the top/bottom split-interconnect allocation; the six explicit NC spare contacts remain intentionally unnetted. The board has 89 development-bound markers, zero E1Phone footprint references, and zero placeholder_not_fabrication_footprint markers. Board-step readiness records this as development_footprints_replaced_for_local_review while placeholder_footprints_replaced remains blocked against the production concept source. This remains non-release because several footprint geometries are development envelopes pending supplier land-pattern, FPC pin-order, and DFM signoff.

      '
  - id: development_pad_pin_coverage_audit
    status: pass_non_release
    evidence:
      - board/kicad/e1-phone/development-pad-pin-coverage-audit-2026-05-22.yaml
      - board/kicad/e1-phone/e1-phone-dev.pretty/
    result: 'The e1-phone-dev footprint library has 32 footprints, all electrical pad counts match the development-footprint manifest, 17 records have exact public pin/pad or aligned public SoM coverage, and the compute SoM row-count is aligned. All 21 pinout-bound footprints carry explicit local terminal contracts derived from captured public pinout evidence. Eleven reusable local support patterns have explicit land-pattern basis records and local terminal contracts rather than silent generic pads. Thirteen records remain explicitly blocked on supplier pad-map, selected-IC pinout, module-house FPC order, regional SKU, or antenna-tuning evidence rather than local placeholder work.

      '
  - id: real_footprint_development_step
    status: generated_non_release
    evidence:
      - board/kicad/e1-phone/pcb/fab-demo/e1-phone-mainboard-real-footprint-development.step
      - board/kicad/e1-phone/real-footprint-development-step-intake-2026-05-22.yaml
    result: 'A separate CadQuery STEP assembly exists for the real-footprint development board. It contains two board islands, 89 placed footprint envelopes, 1452 visible pad/contact solids, and 306 visible routed-copper segment solids plus 24 visible via/barrel solids derived from the KiCad board coordinates and e1-phone-dev footprint geometry. This is better routed-board STEP evidence for local CAD review, but remains non-release because it is generated from development envelopes rather than native KiCad production STEP export with supplier-approved component models.

      '
  - id: detailed_routed_step_candidate_intake
    status: generated_non_release
    evidence:
      - board/kicad/e1-phone/production/step/routed-board-with-components.step
      - board/kicad/e1-phone/production/step/routed-board-with-components.step.metadata.yaml
      - board/kicad/e1-phone/production/step/component-3d-model-manifest.yaml
      - board/kicad/e1-phone/production/routed-output-candidate-manifest-2026-05-22.yaml
      - mechanical/e1-phone/review/routed-board-step-intake-template.csv
      - mechanical/e1-phone/review/board-step-readiness.json
      - mechanical/e1-phone/review/routed-board-clearance.json
    result: 'The routed-board STEP intake now distinguishes the 33,644,081 byte detailed routed-output candidate from approved production STEP evidence. The candidate hash matches the non-release routed-development STEP source, carries blocked metadata, records 153 route records, 306 copper segments, and 24 non-release vias, and has a blocked component-3D-model manifest listing 89 local development component envelopes, 1452 pad/contact visuals, 306 route-segment visuals, 306 route segments bound back to the routed intake, 96 controlled-impedance visual route segments, 151 net-named routed segment nets, and 16 net-named via nets. The component-model manifest binds every local development model back to its KiCad reference, footprint name, board side, XY rotation, envelope, pad-name list, and pinout/support terminal-contract provenance from the detailed STEP intake and development pad/pin audit. The routed-board intake row is populated with the candidate STEP hash and existing local artifact paths, but it is explicitly evidence_class=blocked_local_candidate_outputs_not_release with DRC/ERC, supplier-model approval, physical clearance, and release approval still blocked. The routed-output candidate manifest and component-model manifest also bind the KiCad/CAD traceability matrix summary, covering 32 development footprint patterns, 89 board-bound instances, 89 STEP footprint instances, 21 captured public pinout files, and 32 visible CAD connection records with zero local traceability gaps and release_credit=false. It still grants no release credit and does not satisfy production_board_step_present or routed_board_release_intake_complete.

      '
