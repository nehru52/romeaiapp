      - board/kicad/e1-phone/e1-phone-dev.pretty/CAMERA_24P_0P50_DEV.kicad_mod
      - board/kicad/e1-phone/e1-phone-dev.pretty/CAMERA_30P_0P50_DEV.kicad_mod
      - board/kicad/e1-phone/e1-phone-dev.pretty/HIROSE_DF40_80P_0P4_DEV.kicad_mod
