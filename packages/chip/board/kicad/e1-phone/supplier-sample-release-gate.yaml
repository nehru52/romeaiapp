schema: eliza.e1_phone_supplier_sample_release_gate.v1
status: blocked_supplier_samples_response_packs_and_reviews_required_before_layout_release
date: 2026-05-21
claim_boundary: >
  Supplier sample/release gate for the E1 phone board. This binds public
  supplier research, draft RFQs, supplier drawing intake, KiCad footprint
  capture, routed layout release, factory release, and enclosure clearance into
  one fail-closed handoff. It is not a sent RFQ, supplier response, approved
  AVL, received sample, accepted drawing pack, KiCad footprint approval, routed
  PCB, factory release, or enclosure-ready evidence.

source_artifacts:
  - board/kicad/e1-phone/supplier-rfq-intake.yaml
  - board/kicad/e1-phone/supplier-rfq-response-normalization.yaml
  - board/kicad/e1-phone/supplier-rfq-transmittal-drafts.yaml
  - board/kicad/e1-phone/supplier-to-kicad-evidence-map.yaml
  - board/kicad/e1-phone/supplier-drawing-intake-checklist.yaml
  - board/kicad/e1-phone/procurement-readiness.yaml
  - board/kicad/e1-phone/pinout-footprint-freeze.yaml
  - board/kicad/e1-phone/evt1-footprint-capture-work-package.yaml
  - board/kicad/e1-phone/schematic-capture-readiness-binding.yaml
  - board/kicad/e1-phone/routed-layout-readiness-binding.yaml
  - board/kicad/e1-phone/production-factory-release-execution.yaml
  - board/kicad/e1-phone/enclosure-fit-execution-package.yaml

upstream_status:
  rfq_intake: blocked_waiting_supplier_quote_drawing_sample_and_approval_packs
  rfq_transmittal_drafts: drafts_prepared_not_sent_not_supplier_evidence
  supplier_to_kicad_evidence_map: blocked_supplier_evidence_not_ready_for_kicad_capture
  supplier_drawing_intake: blocked_supplier_drawing_intake_required_before_real_footprints_or_route
  procurement_readiness: blocked_preliminary_bom_not_avl_or_purchase_order
  pinout_footprint_freeze: blocked_pinout_footprint_freeze_missing_supplier_evidence
  evt1_footprint_capture: blocked_evt1_footprint_capture_requires_supplier_intake_reviews_and_real_kicad_libraries
  schematic_capture_readiness: blocked_schematic_capture_requires_real_symbols_supplier_pinouts_footprints_erc_and_trial_route
  routed_layout_readiness: blocked_layout_readiness_requires_routed_pcb_drc_si_pi_rf_factory_outputs_and_enclosure_clearance
  production_factory_release: blocked_requires_routed_release_supplier_packs_fab_assembly_fixture_and_first_article
  enclosure_fit_execution: blocked_requires_routed_board_step_supplier_geometry_and_physical_fit_results

gate_policy:
  minimum_sample_lot_per_candidate: 5
  sample_receipt_required_before_pinout_freeze: true
  supplier_response_pack_required_before_symbol_or_footprint_capture: true
  supplier_step_model_required_before_routed_board_step_export: true
  incoming_sample_inspection_required_before_release: true
  production_archive_required_before_factory_or_enclosure_release: true
  required_evidence_keys:
    - rfq_transmittal
    - rfq_response_pack
    - signed_2d_drawing
    - pinout_or_pad_map
    - recommended_land_pattern
    - step_or_brep_model
    - sample_inspection
    - compliance_pack
    - pinout_review_signoff
    - symbol_review
    - footprint_review
    - footprint_3d_binding

evidence_inventory:
  function_count: 10
  evidence_keys_per_function: 12
  required_evidence_path_count: 120
  present_evidence_path_count: 0
  blocked_or_local_candidate_evidence_path_count: 70
  local_surrogate_step_path_count: 10
  missing_evidence_path_count: 120
  every_required_production_path_absent: false
  every_required_production_path_absent_or_blocked: true

handoff_records:
  - function: display_touch
    status: blocked_waiting_supplier_response_pack_sample_and_reviews
    primary_candidate: CH550FH01A-CT
    freeze_record: display_touch_fpc
    draft_path: board/kicad/e1-phone/sourcing-drafts/display_touch/rfq-transmittal.yaml
    required_evidence_key_count: 12
    present_evidence_key_count: 0
    missing_evidence_key_count: 12
    sample_required_before_layout: true
    blocks_layout_domains: [display_touch, enclosure, routed_step]
  - function: rear_camera
    status: blocked_waiting_supplier_response_pack_sample_and_reviews
    primary_candidate: SF-XR3855A-A0_OV13855_or_OV13850_13MP_AF
    freeze_record: rear_camera_fpc
    draft_path: board/kicad/e1-phone/sourcing-drafts/rear_camera/rfq-transmittal.yaml
    required_evidence_key_count: 12
    present_evidence_key_count: 0
    missing_evidence_key_count: 12
    sample_required_before_layout: true
    blocks_layout_domains: [cameras, enclosure, routed_step]
  - function: front_camera
    status: blocked_waiting_supplier_response_pack_sample_and_reviews
    primary_candidate: SF-G5035S60FY_GC5035_5MP_FF_MIPI
    freeze_record: front_camera_fpc
    draft_path: board/kicad/e1-phone/sourcing-drafts/front_camera/rfq-transmittal.yaml
    required_evidence_key_count: 12
