  - function: battery_pack
    status: blocked_waiting_supplier_response_pack_sample_and_reviews
    primary_candidate: 5727mAh_22p05Wh_64x87x5p6mm_pouch_class
    freeze_record: battery_pack_connector
    draft_path: board/kicad/e1-phone/sourcing-drafts/battery_pack/rfq-transmittal.yaml
    required_evidence_key_count: 12
    present_evidence_key_count: 0
    missing_evidence_key_count: 12
    sample_required_before_layout: true
