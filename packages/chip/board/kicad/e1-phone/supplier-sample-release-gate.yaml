    missing_evidence_key_count: 12
    sample_required_before_layout: true
    blocks_layout_domains: [cameras, enclosure, routed_step]
  - function: cellular
    status: blocked_waiting_supplier_response_pack_sample_and_reviews
    primary_candidate: Quectel_RG255C_or_RM255C_5G_RedCap
    freeze_record: cellular_module
    draft_path: board/kicad/e1-phone/sourcing-drafts/cellular/rfq-transmittal.yaml
