    blocks_layout_domains: [split_interconnect, routed_step, factory_test]

release_coupling:
  blocks_real_symbols_and_footprints: true
  blocks_evt1_route_start: true
  blocks_routed_board_step_export: true
  blocks_factory_release: true
  blocks_enclosure_clearance_release: true
  blocks_end_to_end_phone_readiness: true

alternate_display_sample_release_gate:
  source_artifacts:
    - board/kicad/e1-phone/procurement-readiness.yaml
    - board/kicad/e1-phone/routed-layout-readiness-binding.yaml
    - board/kicad/e1-phone/production-factory-release-execution.yaml
  status: blocked_until_alternate_display_response_pack_samples_inspection_and_reviews_exist
  branch_count: 2
  branches:
    - source_id: display_alternate_alibaba_meta_055wu01
      candidate: 055WU01
      minimum_sample_lot: 5
      required_before_layout_release:
        - RFQ response pack with quote, lifecycle, MOQ, lead time, compliance, and supplier SKU
        - signed drawing, 40-pin pinout, mating connector, recommended land pattern, and STEP/B-rep models
        - sample receipt, incoming inspection, display/touch bring-up, and promotion review against CH550FH01A-CT
        - pinout, symbol, footprint, 3D binding, routed layout, factory, and enclosure gates updated for selected branch
      sample_release_allowed: false
    - source_id: display_alternate_made_in_china_e549_amoled
      candidate: E549-HC01_RM67191_AMOLED_class
      minimum_sample_lot: 5
      required_before_layout_release:
        - RFQ response pack with quote, lifecycle, MOQ, lead time, compliance, and supplier SKU
        - signed AMOLED drawing, FPC pinout, mating connector, recommended land pattern, STEP/B-rep models, and RM67191/GT1151 data
        - sample receipt, incoming inspection, burn-in/luminance data, display/touch bring-up, and promotion review against CH550FH01A-CT
        - pinout, symbol, footprint, 3D binding, routed layout, factory, and enclosure gates updated for selected branch
      sample_release_allowed: false

cross_checks:
  manifest_cites_gate: true
  source_artifacts_exist: true
  upstream_statuses_match_current_sources: true
  handoff_records_match_supplier_to_kicad_map: true
  handoff_records_match_supplier_drawing_intake: true
  every_required_evidence_path_is_absent: false
  every_required_evidence_path_is_absent_or_blocked: true
  no_record_allows_layout_without_samples: true
  release_coupling_remains_fail_closed: true
  alternate_display_sample_release_gate_fail_closed: true

release_blockers:
  - RFQ transmittals are drafts and have not been sent or archived as production evidence
  - supplier response packs, signed drawings, exact pinouts, land patterns, supplier-approved STEP models, and samples are missing
  - incoming sample inspection and compliance packs are missing
  - parseable 055WU01 and E549/RM67191 display alternates cannot enter layout release until RFQ response packs, samples, inspection, reviews, and promotion evidence exist
  - pinout, symbol, footprint, and 3D binding reviews are missing
  - routed layout, factory release, and enclosure clearance cannot close without supplier evidence

forbidden_claims:
  - supplier_samples_received
  - supplier_response_pack_complete
  - supplier_drawings_approved
  - supplier_pinouts_ready
  - supplier_footprints_ready
  - supplier_step_models_bound
  - kicad_capture_ready
  - layout_ready
  - factory_release_ready
  - enclosure_ready
  - fabrication_ready
  - end_to_end_phone_ready
