  - function: top_bottom_interconnect
    status: blocked_waiting_supplier_response_pack_sample_and_reviews
    primary_candidate: Hirose_BM28_class_board_to_board_or_flex_stack
    freeze_record: top_bottom_interconnect_pair
    draft_path: board/kicad/e1-phone/sourcing-drafts/top_bottom_interconnect/rfq-transmittal.yaml
    required_evidence_key_count: 12
    present_evidence_key_count: 0
    missing_evidence_key_count: 12
