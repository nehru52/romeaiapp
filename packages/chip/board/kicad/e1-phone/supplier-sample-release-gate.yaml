  - function: side_buttons
    status: blocked_waiting_supplier_response_pack_sample_and_reviews
    primary_candidate: side_key_flex_or_enclosure_mounted_switch_subassembly
    freeze_record: side_power_volume_controls
    draft_path: board/kicad/e1-phone/sourcing-drafts/side_buttons/rfq-transmittal.yaml
    required_evidence_key_count: 12
    present_evidence_key_count: 0
    missing_evidence_key_count: 12
    sample_required_before_layout: true
