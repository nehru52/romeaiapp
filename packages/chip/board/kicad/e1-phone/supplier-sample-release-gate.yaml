  - function: usb_c_receptacle_evt0
    status: blocked_waiting_supplier_response_pack_sample_and_reviews
    primary_candidate: GCT_USB4105_class_USB2_Type_C
    freeze_record: usb_c_receptacle
    draft_path: board/kicad/e1-phone/sourcing-drafts/usb_c_receptacle_evt0/rfq-transmittal.yaml
    required_evidence_key_count: 12
