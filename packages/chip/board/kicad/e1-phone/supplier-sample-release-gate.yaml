  - function: audio_speaker_microphone_flexes
    status: blocked_waiting_supplier_response_pack_sample_and_reviews
    primary_candidate: codec_amp_mics_speaker_receiver_haptic_stack
    freeze_record: audio_speaker_microphone_flexes
    draft_path: board/kicad/e1-phone/sourcing-drafts/audio_speaker_microphone_flexes/rfq-transmittal.yaml
    required_evidence_key_count: 12
    present_evidence_key_count: 0
    missing_evidence_key_count: 12
