schema: eliza.e1_phone_board_topology_decision.v1
status: blocked_split_island_concept_requires_routing_interconnect_and_assembly_validation
date: 2026-05-20
claim_boundary: >
  Board topology decision record only. This determines which PCB architecture
  can plausibly preserve the selected 5.5 inch display envelope and the 22.05 Wh
  battery reference. It is not a routed rigid-flex design, fabrication drawing,
  impedance stackup, enclosure release, or assembly process approval.

source_artifacts:
  - board/kicad/e1-phone/battery-layout-options.yaml
  - board/kicad/e1-phone/top-bottom-interconnect-plan.yaml
  - board/kicad/e1-phone/placement-interface-matrix.yaml
  - board/kicad/e1-phone/mechanical-overlay.yaml
  - docs/board/e1-phone-enclosure-interface.yaml
  - docs/board/e1-phone-mainboard-metrics.yaml
  - package/battery/e1-phone-17p3wh-pack.yaml

fixed_product_anchors:
  display_anchor: 5.5_in_1080x1920_MIPI_LCM_CTP
  device_envelope_mm: {width: 78.0, height: 153.6, max_thickness: 11.8}
  board_bbox_mm: {width: 64.0, height: 132.0}
  selected_battery_mm: {width: 64.0, height: 87.0, thickness: 5.6}
  required_runtime_target: preserve_22p05wh_class

topology_constraints:
  selected_battery_width_equals_board_width: true
  current_side_key_spine_intrudes_into_full_width_battery_zone: true
  current_sim_service_pocket_intrudes_into_full_width_battery_zone: true
  concept_battery_keepout_matches_selected_64x87_pack: true
  cad_haptic_repacked_outside_full_width_battery_zone: true
  single_rigid_center_window_can_preserve_45x72_only: true
  full_width_battery_requires_top_bottom_board_islands_or_rigid_flex: true
  usb_c_bottom_edge_must_remain_centered: true
  display_fpc_and_camera_region_must_remain_top_right: true
  top_rf_antennas_must_keep_metal_free_edge: true
  bottom_audio_usb_antennas_must_keep_metal_free_edge: true

evaluated_topologies:
  - id: current_single_rigid_with_45x72_window
    summary: Current concept board with top, side, and bottom islands around a 45 x 72 mm window.
    battery_fit: fails_22p05wh_reference_pack
    routing_risk: lowest_from_current_state
    mechanical_risk: lowest_from_current_state
    runtime_impact: unacceptable_capacity_reduction_or_custom_pack_dependency
    decision: reject_for_22p05wh_target
  - id: single_rigid_c_shape_full_width_64x87_window
    summary: Attempt to carve a 64 x 87 mm cavity into the 64 mm wide board.
    battery_fit: theoretical_only
    routing_risk: unacceptable_no_side_bridge_for_buttons_sim_haptic_or_service
    mechanical_risk: unacceptable_zero_lateral_board_material_around_pack
    runtime_impact: preserves_capacity_if_it_could_be_built
    decision: reject_geometry_conflict
  - id: top_bottom_rigid_islands_with_flex_or_board_to_board
    summary: Top logic/RF island and bottom USB/audio island with battery occupying the center width.
    battery_fit: supports_64x87_reference_pack
    routing_risk: medium_high_requires_flex_or_board_to_board_high_speed_policy
    mechanical_risk: medium_requires_pack_ribs_button_flex_and_service_strategy
    runtime_impact: preserves_22p05wh_target
    decision: preferred_evt0_repack_candidate
  - id: two_board_stack_with_battery_rear_pocket
    summary: Keep main logic board compact and place an auxiliary bottom/side board with a rear battery pocket.
    battery_fit: supports_64x87_reference_pack_if_z_stack_allows
    routing_risk: high_requires_interposer_and_z_stack_validation
    mechanical_risk: high_for_11p8mm_flush_back_thickness
    runtime_impact: preserves_22p05wh_target
    decision: fallback_if_top_bottom_islands_fail
  - id: custom_narrow_pack_single_rigid
    summary: Retain current single-rigid architecture and quote custom narrow pack variants.
    battery_fit: supplier_quote_dependent
    routing_risk: medium
    mechanical_risk: medium
    runtime_impact: unknown_until_supplier_capacity_confirmed
    decision: parallel_procurement_fallback

selected_topology_for_next_repack:
  id: top_bottom_rigid_islands_with_flex_or_board_to_board
  required_pcb_changes:
    - replace current center-window board with top and bottom rigid islands
    - move side buttons to a side-key flex or enclosure-mounted switch subassembly
    - relocate SIM/service away from the full-width battery zone
    - define board-to-board or rigid-flex interconnect for USB/audio/power/control
    - keep cellular, Wi-Fi/BT, cameras, display FPC, PMIC, SoC, LPDDR, and UFS on the top island unless SI/thermal review forces split
    - keep USB-C, speaker, microphones, haptic driver, and factory test access on the bottom island
  required_cad_changes:
    - CAD regenerated with 64 x 87 x 5.6 mm battery envelope
    - CAD replaced the prior 55 x 92 mm placeholder with top and bottom PCB islands
    - add battery swelling and compression-pad allowance to the 11.8 mm flush-back z-stack
    - recheck side-button load path after side-key flex/subassembly move
  required_verification:
    - KiCad mechanical overlay regenerated for selected topology
    - display, USB-C, button, camera, speaker, antenna, and battery clearances rerun
    - DRC/ERC only after real supplier footprints and routed copper exist
    - RF/SI review for any flex or board-to-board high-speed crossing

release_blockers:
  - split-island Edge.Cuts are concept rectangles, not routed rigid-flex fabrication data
  - no routed copper, zones, vias, or DRC evidence for split-island topology
  - side-key and SIM/service strategy needs supplier flex and enclosure validation
  - exact rigid-flex or board-to-board connector stackup not selected
  - no updated factory assembly process for split board and battery insertion

forbidden_claims:
  - board_topology_closed
  - rigid_flex_ready
  - selected_battery_fits_current_pcb
  - enclosure_ready
  - fabrication_ready
