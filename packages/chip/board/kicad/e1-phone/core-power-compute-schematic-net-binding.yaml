schema: eliza.e1_phone_core_power_compute_schematic_net_binding.v1
status: blocked_core_power_compute_binding_requires_real_schematic_erc_route_pi_first_power_and_factory_evidence
date: 2026-05-21
claim_boundary: >
  Schematic, rail, compute, memory, storage, and first-power binding target for
  the E1 phone core board. This maps the PMIC, charger, battery, application
  processor, LPDDR/UFS, debug boot, and first-power rails to block-netlist
  nets, routing constraints, factory probes, and acceptance evidence. It is
  not a KiCad schematic implementation, not ERC/DRC evidence, not PI signoff,
  not first-power evidence, not a routed PCB, and not enclosure-ready proof.

source_artifacts:
  - board/kicad/e1-phone/artifact-manifest.yaml
  - board/kicad/e1-phone/block-netlist.yaml
  - board/kicad/e1-phone/routing-constraints.yaml
  - board/kicad/e1-phone/factory-probe-map.yaml
  - board/kicad/e1-phone/power-sequence-bringup-closure.yaml
  - board/kicad/e1-phone/power-bringup-acceptance-checklist.yaml
  - board/kicad/e1-phone/power-thermal-budget.yaml
  - package/usb-pd/tps65987.yaml
  - package/charger/max77860.yaml
  - package/pmic/da9063.yaml
  - package/battery/e1-phone-17p3wh-pack.yaml

core_context:
  pmic: DA9063L
  charger: MAX77860
  usb_pd_controller: TPS65987DDH
  battery_pack_class: LiPol_LP566487_3p85V_5727mAh_22p05Wh_PCM_NTC_JST_SHR_03V_class
  battery_energy_wh: 22.05
  battery_reference_mm: {width: 64.0, height: 87.0, thickness: 5.6}
  application_processor_block: U_SOC
  memory_storage_block: U_LPDDR_UFS
  first_power_current_limit_ma_initial: 100

schematic_blocks:
  usb_pd_controller:
    block_id: U_USB_PD
    package_binding: package/usb-pd/tps65987.yaml
    required_nets: [VIN_3V3, GND, USB_CC1, USB_CC2, USBPD_I2C_SCL, USBPD_I2C_SDA, USBPD_IRQ_N, USBPD_RESET, VBUS]
    required_local_parts:
      - PD firmware or OTP programming access
      - CC protection and orientation attach validation points
      - VBUS sense and dead-battery path review
    status: blocked_no_symbol_pinout_policy_or_attach_log
  charger_power_path:
    block_id: U_CHARGER
    package_binding: package/charger/max77860.yaml
    required_nets: [VBUS, VBAT, SYS, GND, CHG_I2C_SCL, CHG_I2C_SDA, CHG_IRQ_N, CHG_CE_N, CHG_OTG_EN, BAT_NTC, BAT_ID, CHG_TS]
    required_local_parts:
      - VBUS TVS surge clamp and current limit path
      - battery NTC ID and connector polarity protection
      - thermal vias and current-density review for charge path
    status: blocked_no_symbol_pinout_charge_cycle_or_safety_log
  battery_pack_connector:
    block_id: J_BATTERY
    package_binding: package/battery/e1-phone-17p3wh-pack.yaml
    required_nets: [VBAT, GND, BAT_NTC, BAT_ID]
    required_local_parts:
      - pack connector polarity and retention review
      - pack PCM NTC and ID validation path
      - swelling and compression stack clearance requirements
    status: blocked_no_supplier_pack_connector_safety_or_tolerance_stack
  pmic:
    block_id: U_PMIC
    package_binding: package/pmic/da9063.yaml
    required_nets: [SYS, VBAT, GND, AON_1V8, AP_0V8, AP_1V1, IO_1V8, RF_VBAT, CAM_AVDD_2V8, CAM_DVDD_1V2, VDD_AUDIO_3V3, VDD_AMP_3V3, PMIC_I2C_SCL, PMIC_I2C_SDA, PMIC_IRQ_N, PMIC_RESET_N, PWR_KEY_N]
    required_local_parts:
      - regulator sequencing straps or firmware configuration archive
      - rail bulk capacitance and load-step targets
      - PMIC IRQ reset watchdog and on-key wake path
    status: blocked_no_symbol_pinout_regulator_summary_or_scope_log
  application_processor:
    block_id: U_SOC
    package_binding: package/e1-demo-pinout.yaml
    required_nets: [AP_0V8, AP_1V1, IO_1V8, GND, USB_DP, USB_DN, JTAG_TCK, JTAG_TMS, JTAG_TDI, JTAG_TDO, JTAG_TRST_N, BOOT_MODE0, BOOT_MODE1, BOOT_MODE2, SOC_RESET_N]
    required_local_parts:
      - power-on reset and boot strap pull policy
      - JTAG/debug access policy and secure lock procedure
      - local decoupling and via-in-pad review for AP rails
    status: blocked_no_real_soc_symbol_pin_escape_or_boot_log
  memory_storage:
    block_id: U_LPDDR_UFS
    package_binding: package/e1-demo-pinout.yaml
    required_nets: [AP_0V8, AP_1V1, IO_1V8, GND, LPDDR_CK_P, LPDDR_CK_N, LPDDR_DQS_P, LPDDR_DQS_N, LPDDR_CA0, LPDDR_CA1, LPDDR_CA2, LPDDR_CA3, LPDDR_RESET_N, LPDDR_ZQ, UFS_REFCLK_P, UFS_REFCLK_N, UFS_TX_P, UFS_TX_N, UFS_RX_P, UFS_RX_N, UFS_RESET_N]
    required_local_parts:
      - LPDDR and UFS decoupling placement tied to package escape
      - memory vendor timing and length-matching constraints
      - training log and UFS link bring-up evidence
    status: blocked_no_memory_vendor_pin_escape_training_or_ufs_log

rail_bindings:
  always_or_input: [VBUS, VBAT, SYS]
  pmic_outputs: [AON_1V8, AP_0V8, AP_1V1, IO_1V8, RF_VBAT, CAM_AVDD_2V8, CAM_DVDD_1V2, VDD_AUDIO_3V3, VDD_AMP_3V3]
  display_bias: [DISP_AVDD_5V5, DISP_AVEE_N5V5]
  factory_power_probe_required: [VBUS, VBAT, SYS, AON_1V8, IO_1V8, RF_VBAT, CAM_AVDD_2V8, DISP_AVDD_5V5]
  high_current_paths:
    - VBUS_to_charger
    - charger_to_battery
    - RF_VBAT_to_cellular

compute_route_bindings:
  memory_diff_pairs:
    route_groups: [LPDDR_CK, LPDDR_DQS]
    max_length_mm: 18
    required_validation: lpddr_length_skew_escape_training_and_vendor_signoff
  ufs_diff_pairs:
    route_groups: [UFS_REFCLK, UFS_TX, UFS_RX]
    max_length_mm: 28
    required_validation: ufs_length_skew_impedance_link_training_and_error_log
  lpddr_ca_bus:
    single_ended_bus: LPDDR_CA
    max_length_mm: 18
    required_validation: lpddr_ca_group_skew_and_training_log
  debug_boot_bus:
    single_ended_bus: DEBUG_BOOT
    max_length_mm: 45
    required_validation: boot_strap_jtag_reset_and_secure_debug_lock_log

first_power_bindings:
  first_power_policy:
    bench_supply_current_limit_ma_initial: 100
    stop_on_overcurrent_or_unsequenced_rail: true
    oscilloscope_required: true
    thermal_camera_required_for_charge_and_modem_burst: true
  required_sequence_steps:
    - pre_power_shorts
    - usb_pd_dead_battery_attach
    - charger_sys_precharge
    - pmic_aon_and_ap_rails
  required_measurements:
    - rail_boot_idle_suspend_scope_captures_for_each_power_domain
    - usb_c_pd_attach_pps_and_current_limit_log
    - charger_cc_cv_cycle_battery_ntc_and_pack_id_log
    - pmic_regulator_summary_fault_irq_and_probe_transcript
    - regulator_efficiency_and_load_step_report

evt1_capture_exit_criteria:
  - KiCad schematic contains non-placeholder symbols for USB-PD charger battery PMIC SoC LPDDR UFS reset boot and debug
  - every required net in schematic_blocks is present in block-netlist.yaml and assigned to reviewed pins
  - LPDDR UFS boot debug and power nets are assigned to routing constraints and EVT1 stackup/coupon targets
  - PMIC charger battery and USB-PD supplier pinouts footprints thermal pads and STEP models are bound
  - factory-probe-map.yaml covers all required pre-power rails and debug or fixture alternatives are recorded
  - ERC DRC PI load-step first-power charge-cycle and regulator-summary evidence are archived before release

cross_checks:
  package_parts_match_power_acceptance_summary: true
  battery_target_matches_selected_pack: true
  schematic_blocks_match_block_netlist: true
  rail_probe_list_matches_factory_probe_map: true
  compute_route_groups_match_routing_constraints: true
  first_power_steps_match_power_sequence: true
  fail_closed_until_real_schematic_route_pi_first_power_and_factory_evidence_exist: true

release_blockers:
  - routed power schematic, ERC, supplier pinouts, and PMIC/charger/fuel-gauge footprints missing
  - PD attach, charger, battery pack, PMIC, rail sequence, and first-power logs missing
  - post-route PI, load-step, current density, thermal soak, and skin-temperature evidence missing
  - factory power limits, probe coordinates, and first-article transcript missing
  - routed PCB, DRC, SI/PI, STEP, and enclosure clearance evidence are missing

forbidden_claims:
  - core_schematic_ready
  - first_power_ready
  - rail_sequence_validated
  - charging_ready
  - battery_safe
  - pmic_ready
  - memory_training_ready
  - ufs_ready
  - power_thermal_ready
  - routed_pcb_ready
  - fabrication_ready
  - enclosure_ready
