schema: eliza.e1_phone_evt1_stackup_impedance_coupon_plan.v1
status: blocked_evt1_stackup_coupon_plan_requires_fabricator_field_solver_quote_and_trial_route
date: 2026-05-21
claim_boundary: >
  EVT1 routing execution target only. This binds the compact E1 phone board to
  a candidate 10-layer 0.8 mm HDI stackup, impedance classes, and coupon
  request IDs so the next routed KiCad board, SI/PI review, and fab quote use a
  single target. It is not a fabricator-approved stackup, not field-solver
  output, not a coupon drawing, not DRC evidence, and not enclosure-ready proof.

source_artifacts:
  - board/kicad/e1-phone/artifact-manifest.yaml
  - board/kicad/e1-phone/routing-constraints.yaml
  - board/kicad/e1-phone/route-feasibility-density.yaml
  - board/kicad/e1-phone/production-readiness.yaml
  - board/kicad/e1-phone/routed-pcb-implementation-execution.yaml

stackup_target:
  name: 10_layer_0p8_mm_hdi
  board_thickness_mm: 0.8
  release_role: EVT1_routed_phone_mainboard_quote_and_trial_route_target
  finish: ENIG_or_equivalent_mobile_fab_finish
  layer_count: 10
  layer_roles:
    F_Cu: components_short_escape_rf_matching
    In1_GND: continuous_reference_plane
    In2_Sig: high_speed_horizontal
    In3_PWR: power_plane
    In4_Sig: low_speed_control
    In5_Sig: high_speed_vertical
    In6_PWR: power_plane
    In7_Sig: low_speed_debug_audio
    In8_GND: continuous_reference_plane
    B_Cu: secondary_components_test_points
  hdi_assumptions:
    microvias_or_via_in_pad_allowed_for_soc_memory_escape: true
    continuous_ground_reference_required_for_usb_mipi_pcie_rf: true
    final_trace_width_gap_source: fabricator_field_solver
    final_dielectric_source: fabricator_stackup_quote

impedance_coupon_requests:
  usb2_90_ohm:
    coupon_id: E1_EVT1_CPN_USB2_90D
    target_impedance_ohm: 90
    tolerance_pct: 10
    routing_class: usb2_diff
    required_nets: [USB_DP, USB_DN, CELL_USB2_DP, CELL_USB2_DN]
    reference_layers: [F_Cu, In1_GND, B_Cu, In8_GND]
    required_report: usb2_length_skew_impedance_and_eye_or_attach_log
    fabricator_field_solver_required: true
  mipi_dphy_100_ohm:
    coupon_id: E1_EVT1_CPN_MIPI_100D
    target_impedance_ohm: 100
    tolerance_pct: 10
    routing_class: mipi_dphy_diff
    required_nets: [DSI_CLK_P, DSI_D0_P, CAM0_CSI_CLK_P, CAM1_CSI_CLK_P]
    reference_layers: [In2_Sig, In1_GND, In5_Sig, In6_PWR]
    required_report: dsi_csi_length_skew_impedance_and_return_path_review
    fabricator_field_solver_required: true
  pcie_85_ohm:
    coupon_id: E1_EVT1_CPN_PCIE_85D
    target_impedance_ohm: 85
    tolerance_pct: 10
    routing_class: pcie_diff
    required_nets: [WIFI_PCIE_TX_P, WIFI_PCIE_RX_P, CELL_PCIE_TX_P, CELL_PCIE_RX_P]
    reference_layers: [In2_Sig, In1_GND, In5_Sig, In6_PWR]
    required_report: pcie_length_skew_impedance_and_return_path_review
    fabricator_field_solver_required: true
  rf_50_ohm:
    coupon_id: E1_EVT1_CPN_RF_50S
    target_impedance_ohm: 50
    tolerance_pct: 10
    routing_class: rf_single
    required_nets: [CELL_RF_MAIN, CELL_RF_DIV, CELL_GNSS_RF, WIFI_BT_RF0, WIFI_BT_RF1]
    reference_layers: [F_Cu, In1_GND]
    required_report: rf_feed_impedance_vna_conducted_and_matching_review
    fabricator_field_solver_required: true
  memory_storage:
    coupon_id: E1_EVT1_CPN_MEM_UFS
    target_impedance_ohm: vendor_specific
    tolerance_pct: vendor_specific
    routing_class: memory_or_ufs_vendor_signoff
    required_nets: [LPDDR_CK_P, LPDDR_DQS_P, UFS_REFCLK_P, UFS_TX_P, UFS_RX_P]
    reference_layers: [In2_Sig, In1_GND, In5_Sig, In6_PWR]
    required_report: ap_memory_ufs_escape_length_skew_and_vendor_signoff
    fabricator_field_solver_required: true
  split_board_flex_usb2_audio:
    coupon_id: E1_EVT1_CPN_SPLIT_FLEX
    target_impedance_ohm: flex_or_pcb_vendor_specific
    tolerance_pct: vendor_specific
    routing_class: split_interconnect_controlled_impedance
    required_nets: [USB_DP, USB_DN, I2S_BCLK, PDM_CLK, AUDIO_I2C_SCL, HAPTIC_OUT]
    reference_layers: [controlled_impedance_side_flex_or_rigid_interposer]
    required_report: split_interconnect_usb2_audio_haptic_si_and_continuity_review
    fabricator_field_solver_required: true

quote_package_requirements:
  - fabricator stackup drawing with dielectric constants and loss tangent
  - field-solved trace width and gap table for every coupon ID
  - impedance coupon geometry and panel placement
  - minimum mechanical drill, laser drill, annular ring, trace, space, solder mask web, and via-in-pad capability
  - HDI build-up, via fill, copper balance, warpage, and flatness limits for 0.8 mm phone board
  - material availability, lead time, MOQ, DFM exceptions, and re-spin cost

route_release_bindings:
  required_before_trial_route_ready:
    - quote_package_requirements satisfied by selected fabricator
    - KiCad net classes updated with field-solved trace widths and spacing
    - USB2, MIPI, PCIe, RF, memory, UFS, and split-interconnect length/skew reports generated from routed board
    - DRC report references the selected stackup and coupon IDs
    - routed board STEP exported after supplier component 3D models are bound
  blocks_fabrication_claims_until_fabricator_response: true
  blocks_enclosure_claims_until_approved_routed_step_release_clearance: true

cross_checks:
  stackup_target_matches_routing_constraints: true
  board_thickness_matches_production_readiness: true
  coupon_groups_match_production_readiness: true
  controlled_impedance_domains_cover_route_feasibility: true
  all_coupon_requests_require_field_solver: true
  fail_closed_until_quote_trial_route_and_reports_exist: true

release_blockers:
  - fabricator field-solver stackup and impedance table are missing
  - coupon drawings and panel placement are missing
  - KiCad netclass trace widths and gaps are not updated from a fabricator quote
  - routed copper, DRC, and length/skew reports are missing
  - routed board STEP and approved enclosure release clearance are missing

forbidden_claims:
  - stackup_approved
  - impedance_closed
  - coupon_ready
  - trial_route_ready
  - routed_pcb_ready
  - fabrication_ready
  - enclosure_ready
