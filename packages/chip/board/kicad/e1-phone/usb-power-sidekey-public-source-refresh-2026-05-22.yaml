schema: eliza.e1_phone_usb_power_sidekey_public_source_refresh.v1
status: public_usb_power_sidekey_refresh_not_supplier_drawing_or_release_evidence
date: 2026-05-22
claim_boundary: >
  Live public-source refresh for the selected USB-C receptacle, USB-PD
  controller, charger/power path, power button, and volume buttons. Public
  vendor/catalog fields can seed RFQs, risk review, and acceptance requests,
  but they are not signed supplier drawings, land patterns, STEP/B-rep models,
  routed-board evidence, enclosure load-path evidence, firmware configuration,
  bring-up logs, or production release evidence.

source_artifacts:
  - board/kicad/e1-phone/usb-sidekey-selection-wiring-decision.yaml
  - board/kicad/e1-phone/usb-sidekey-source-revalidation.yaml
  - board/kicad/e1-phone/usb-power-sidekey-release-execution.yaml
  - board/kicad/e1-phone/usb-sidekey-acceptance-checklist.yaml
  - board/kicad/e1-phone/power-bringup-acceptance-checklist.yaml
  - board/kicad/e1-phone/supplier-rfq-response-normalization.yaml
  - package/usb-c/e1-phone-usb-c-port.yaml
  - package/usb-pd/tps65987.yaml
  - package/charger/max77860.yaml
  - package/human-interface/side-buttons.yaml

refresh_policy:
  checked_date: 2026-05-22
  method: live_public_vendor_page_pdf_refresh
  source_use_limit: rfq_seed_shortlist_fit_and_validation_request_only
  supplier_drawings_land_pattern_step_and_samples_required: true
  public_refresh_can_unlock_routing: false
  public_refresh_can_unlock_enclosure_release: false
  public_refresh_can_unlock_fabrication: false
  require_lifecycle_replacement_decision_for_not_recommended_pd_controller: true

refreshed_public_sources:
  - id: usb_evt0_gct_usb4105
    group: usb_c
    supplier: GCT
    url: https://gct.co/files/specs/usb4105-spec.pdf
    source_type: direct_vendor_pdf_opened_2026_05_22
    candidate: USB4105
    observed_public_fields:
      connector_type: USB_Type_C_USB2_receptacle
      mounting: SMT_top_mount
      active_contacts: 16
      mechanical_contacts: 24_position_with_dummy_pins
      current_rating: VBUS_5A_collective
      voltage_rating_vdc: 48
      temperature_c: {min: -40, max: 85}
      mating_force_n: {min: 5, max: 20}
      durability_cycles: 20000
    board_delta: keep_as_evt0_usb2_pd_charge_debug_receptacle_only
    release_blocker: signed_drawing_recommended_land_pattern_step_shell_load_path_plug_sweep_and_sample_lot_missing
  - id: usb_pd_controller_ti_tps65987d
    group: usb_pd
    supplier: Texas Instruments
    url: https://www.ti.com/product/TPS65987D
    source_type: direct_vendor_product_page_opened_2026_05_22
    candidate: TPS65987DDH
    observed_public_fields:
      function: USB_Type_C_and_USB_PD_controller_with_integrated_power_switches
      lifecycle_status: not_recommended_for_new_designs
      recommended_alternate_observed: TPS25751
      power_role: DRP_sink_source
      data_role: DFP_DRD_UFP
      internal_power_path: 20V_5A
      dead_battery_support: true
      alternate_mode_support: true
      package: VQFN_56_7x7mm
    board_delta: keep_current_binding_for_continuity_but_block_production_until_lifecycle_or_replacement_decision
    release_blocker: pd_controller_replacement_lifecycle_firmware_configuration_cc_attach_dead_battery_and_typec_logs_missing
  - id: charger_power_path_adi_max77860
    group: charger_power_path
    supplier: Analog Devices
    url: https://www.analog.com/en/products/max77860.html
    source_type: direct_vendor_product_page_opened_2026_05_22
    candidate: MAX77860
    observed_public_fields:
      product_status: production
      function: USB_Type_C_3A_switch_mode_buck_charger
      battery_type: single_cell_li_ion
      input_operating_range_v: {min: 4.0, max: 13.5}
      input_current_limit_max_a: 4.0
      battery_charge_current_limit_max_a: 3.15
      reverse_boost_current_limit_a: 1.5
      interface: I2C_compatible
      package: WLP_81_bump_3p9x4p0mm_0p4mm_pitch
    board_delta: keep_as_one_cell_usb_c_charger_power_path_pending_exact_package_thermal_and_charger_logs
    release_blocker: exact_package_symbol_footprint_bump_map_thermal_review_i2c_ntc_id_cc_cv_jeita_and_soak_logs_missing
  - id: side_switch_primary_panasonic_evq_p7
    group: side_buttons
    supplier: Panasonic Industry
    url: https://na.industrial.panasonic.com/products/switches-encoders-interface-devices/switches/light-touch-tactile-switches/series/79247
    source_type: direct_vendor_product_page_opened_2026_05_22
    candidate: EVQ-P7_EVQ-P3_EVQ-9P7
    observed_public_fields:
      switch_type: SMD_side_push_tactile
      catalog_headline_dimensions_mm: {length: 3.5, width: 2.9, height: 1.35}
      package_binding_dimensions_mm: {length: 3.5, width: 2.9, height: 1.35}
      table_variant_body_dimensions_seen_mm: {length: 3.5, width: 3.55, height: 1.35}
      travel_mm: 0.2
      terminal_options: [L_shape, J_bent, straight]
      applications: [mobile_phones, digital_still_cameras, camcorders, portable_audio_players]
    board_delta: keep_as_primary_phone_edge_side_push_family_pending_exact_mpn_and_load_path
    release_blocker: exact_mpn_force_curve_land_pattern_step_sample_lot_lifecycle_and_enclosure_load_path_missing
  - id: usb_production_molex_port_on_waterproof
    group: usb_c
    supplier: Molex
    url: https://www.molex.com/content/dam/molex/molex-dot-com/en_us/pdf/datasheets/987651-4081.pdf
    source_type: prior_direct_vendor_datasheet_retained_as_conditional_alternate
    candidate: 221632_or_217804_Port_On_Type_C_family
    observed_public_fields:
      connector_type: USB_Type_C_24_pin_waterproof_receptacle
      features: [USB_3_2_Gen_2, mid_mount_or_top_mount_options, IPX5_IPX8_options]
      current_rating: up_to_5A_or_6A_family_dependent
    board_delta: hold_as_unpromoted_waterproof_or_superspeed_alternate
    release_blocker: superspeed_lane_bonding_si_escape_cutout_gasket_drain_and_enclosure_revision_missing
  - id: side_switch_alternate_ck_kmr2
    group: side_buttons
    supplier: Littelfuse_CK
    url: https://www.littelfuse.com/products/switches/tactile-switches/kmr2
    source_type: direct_vendor_product_page_opened_2026_05_22
    candidate: KMR2
    observed_public_fields:
      switch_type: micro_miniature_SMT_tactile_top_actuated
      dimensions_mm: {length: 4.2, width: 2.2, height: 1.9}
      product_status: active
    board_delta: hold_as_unpromoted_top_actuated_alternate_only
    release_blocker: side_motion_to_top_actuation_plunger_load_path_force_curve_land_pattern_step_and_sample_data_missing

decision_delta:
  usb_c_evt0: keep_GCT_USB4105_for_EVT0_USB2_PD_charge_debug_only
  usb_pd_controller: keep_TPS65987DDH_binding_but_block_new_design_release_until_lifecycle_or_replacement_decision
  charger_power_path: keep_MAX77860_as_selected_one_cell_charger_power_path
  side_key_primary: keep_Panasonic_EVQ_side_push_family_as_primary
  usb_waterproof_superspeed_alternate: keep_Molex_Port_On_unpromoted
  side_key_alternate: keep_CK_KMR2_unpromoted
  supplier_response_pack_count_present: 0
  supplier_response_pack_count_required: 2
  routed_layout_release_allowed: false
  enclosure_release_allowed: false
  fabrication_release_allowed: false

cross_checks:
  selected_usb_c_matches_package_binding: true
  selected_usb_c_matches_usb_sidekey_decision: true
  selected_usb_c_matches_prior_source_revalidation: true
  pd_controller_matches_package_binding_and_release_execution: true
  pd_controller_lifecycle_risk_is_blocking_not_silent: true
  charger_matches_package_binding_and_release_execution: true
  side_key_primary_matches_package_binding_and_prior_source_revalidation: true
  side_key_catalog_dimension_variance_kept_blocking_until_exact_mpn: true
  alternates_remain_unpromoted: true
  all_selected_usb_sidekey_response_packs_absent: true
  public_sources_do_not_unlock_routing_enclosure_or_fabrication: true
  all_release_decisions_fail_closed: true

release_blockers:
  - selected USB-C, PD controller, charger, and side-key supplier response packs have not been returned or normalized
  - GCT USB4105 signed drawing, exact land pattern, STEP/B-rep, shell load path, plug sweep, insertion-force, and sample-lot evidence are missing
  - TPS65987DDH is publicly marked not recommended for new designs; lifecycle or replacement decision, firmware/configuration, CC attach, dead-battery, and Type-C logs are missing
  - MAX77860 exact package, symbol, footprint, bump map, thermal recommendation, I2C, NTC/ID, CC/CV, JEITA, current-limit, and thermal logs are missing
  - Panasonic EVQ exact MPN, force/travel curve, land pattern, STEP/B-rep, sample lot, lifecycle status, and actuator load-path measurements are missing
  - routed PCB, ERC, DRC, USB2 SI, routed STEP, routed clearance release, enclosure physical fit first article, and factory first-article logs are missing

forbidden_claims:
  - usb_power_sidekey_release_ready
  - usb_c_supplier_approved
  - usb_c_ready
  - pd_controller_production_ready
  - charging_ready
  - side_button_supplier_approved
  - side_buttons_ready
  - power_key_wake_ready
  - waterproof_ready
  - superspeed_ready
  - routed_pcb_ready
  - enclosure_ready
  - fabrication_ready
  - end_to_end_phone_ready
