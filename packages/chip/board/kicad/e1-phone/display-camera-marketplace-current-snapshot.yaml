rfq_delta_actions:
  - function: display_touch
    action: send RFQ for CH550FH01A-CT and require signed drawing, exact FPC pinout, mating connector MPN, STEP/B-rep, HX8399C init, GT911 config, samples, and 10/100/1000 pricing.
    public_snapshot_id: display_primary_chenghao_ch550fh01a_ct
    release_allowed: false
  - function: display_touch_alternate
    action: keep META 055WU01 as 40-pin/high-brightness alternate and require signed outline, FPC exit, pinout, connector, STEP, and samples before altering connector or envelope.
    public_snapshot_id: display_alternate_alibaba_meta_055wu01
    release_allowed: false
  - function: display_touch_amoled_alternate
    action: keep E549/RM67191 AMOLED as thin-Z alternate only; require exact touch stack, power sequence, FPC pinout, connector, STEP, luminance/burn-in, and sample evidence before promotion.
    public_snapshot_id: display_alternate_made_in_china_e549_amoled
    release_allowed: false
  - function: rear_camera
    action: send RFQ for OV13855/OV13850 class rear module and require exact module drawing, lens-axis datum, 24-pin FPC pinout, connector MPN, STEP, register pack, OTP/calibration flow, and capture samples.
    public_snapshot_id: rear_camera_primary_sincere_first_ov13855
    release_allowed: false
  - function: front_camera
    action: require Sincere First to confirm whether SF-G5035S60FY remains orderable or whether public SF-G5035S60AY is the substitution; do not freeze front-camera connector, footprint, or enclosure datums until resolved.
    public_snapshot_id: front_camera_gc5035_sincere_first_public_variant_risk
    release_allowed: false

cross_checks:
  primary_display_snapshot_matches_current_display_anchor: true
  alibaba_display_snapshot_remains_shortlist_only: true
  amoled_snapshot_remains_alternate_only: true
  rear_camera_snapshot_preserves_ov13855_13mp_mipi_class: true
  front_camera_snapshot_flags_public_variant_risk: true
  no_snapshot_source_unlocks_supplier_pack_gate: true
  no_snapshot_source_unlocks_routing_or_enclosure_release: true

release_blockers:
  - public marketplace pages are not signed supplier responses
  - exact display FPC pinout, connector MPN, drawing, STEP/B-rep, init sequence, and samples are missing
  - exact camera module drawing, FPC pinout, connector MPN, lens-axis datum, STEP/B-rep, calibration data, and samples are missing
  - front GC5035 public page exposes a sibling model and requires supplier confirmation before freeze
  - routed PCB, DRC, MIPI SI, routed board STEP, enclosure clearance, and first-article logs are missing

forbidden_claims:
  - supplier_selected
  - supplier_response_received
  - display_connector_ready
  - camera_connector_ready
  - pinouts_frozen
  - footprints_frozen
  - routed_pcb_ready
  - enclosure_ready
  - end_to_end_phone_ready
