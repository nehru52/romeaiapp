  intrusion_count: 0
  total_intrusion_area_mm2: 0
  intrusions: []
  required_before_release:
    - rerun the live utilization audit after supplier footprints replace placeholders
    - rerun routed-board STEP clearance with the selected battery pack swelling envelope
route_reserve_pressure:
  concept_route_shield_test_reserve_area_mm2: 209.0
  concept_route_shield_test_reserve_pct: 10.6
  target_reserve_pct_range_after_real_footprints:
    min: 35.0
    max: 50.0
  live_placeholder_courtyard_area_exceeds_placement_area: false
