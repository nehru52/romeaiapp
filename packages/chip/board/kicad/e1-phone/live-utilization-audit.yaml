schema: eliza.e1_phone_live_utilization_audit.v1
status: blocked_live_courtyard_utilization_not_routed_or_supplier_ready
date: '2026-05-21'
claim_boundary: Live utilization audit from current KiCad E1Phone placeholder footprints.
  This quantifies concept courtyards, battery-window overlap, and remaining route
  reserve pressure from the actual PCB text. It is not routed-board utilization, not
  a DRC result, and not supplier-footprint evidence.
