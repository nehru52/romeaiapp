    width: 64.0
    height: 132.0
    area_mm2: 8448.0
  physical_pcb_island_area_mm2: 2816.0
  battery_window_mm:
    x: 0.0
    y: 29.5
    width: 64.0
    height: 87.0
    area_mm2: 5568.0
  placement_area_after_battery_and_antenna_keepouts_mm2: 1972.0
  concept_reserve_pct: 10.6
live_footprint_courtyard_metrics:
  courtyard_footprint_count: 62
  total_courtyard_area_mm2: 1943.1
  courtyard_area_over_physical_pcb_area_pct: 69.0
  courtyard_area_inside_physical_islands_mm2: 1920.85
  courtyard_area_inside_physical_islands_pct: 68.21
  area_by_class_mm2:
    placement_placeholder: 1721.0
    interface_support: 91.35
    support: 104.4
    rf_matching: 26.35
