release_blockers:
  - all E1Phone:* footprints are non-release placeholders excluded from BOM and position
    files
  - production concept source has no release-approved routed copper segments or filled zones
  - supplier connector/module land patterns and STEP models have not replaced placeholders
  - DRC, ERC, SI/PI, RF, fabrication, assembly, and routed enclosure clearance evidence
    are missing
forbidden_claims:
  - routed_pcb_ready
  - supplier_footprints_loaded
  - drc_clean
  - erc_clean
  - production_outputs_ready
  - enclosure_ready
  - end_to_end_phone_ready
