  first-article, and final release evidence. This file maps required outputs
  and blockers only. It is not a fab quote, not a fabrication package, not an
  assembly package, not a factory fixture release, not a first-article result,
  not production release evidence, and not an end-to-end phone or enclosure
  readiness claim.

