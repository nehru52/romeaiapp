cross_checks:
  pin_count_matches_recommended_min: true
  contacts_are_contiguous_1_to_49: true
  usb2_pair_flanked_by_returns: true
  required_cross_island_nets_allocated: true
  no_unknown_active_nets_allocated: true
  ground_return_pin_count_meets_minimum: true
  spares_meet_minimum: true
  usb_route_topology_remains_blocked_until_si: true
  pcb_split_connectors_have_min_pad_budget: true
  routing_constraints_reference_usb2_pair: true
release_blockers:
  - exact connector mating pair and circuit count are not orderable part numbers
  - flex stackup, bend radius, stiffener, strain relief, and assembly drawing are missing
  - USB2 impedance, length, skew, eye, attach, ADB, and fastboot evidence are missing
  - power contact current rise and return allocation have not been reviewed against datasheets
  - bottom island ESD, decoupling, haptic drive return, and fixture pads are pending KiCad capture
  - routed copper, DRC/ERC, and enclosure clearance evidence are missing
forbidden_claims:
  - interconnect_pinout_frozen
  - connector_selected
  - flex_stackup_ready
  - usb_si_closed
  - split_board_routed
  - routing_ready
  - enclosure_ready
  - fabrication_ready
  - end_to_end_phone_ready
