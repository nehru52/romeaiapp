release_handoff_sequence:
  - step: routed_outputs_and_fab_quote
    required_before_next_step:
      - routed KiCad PCB, ERC/DRC, fabrication package, board STEP, and fab/assembler quote exist
    status: blocked_missing_routed_outputs_and_quote
    release_allowed: false
  - step: factory_fixture_limits_and_probe_coordinates
    required_before_next_step:
      - factory fixture coordinates, ICT/programming plan, RF calibration plan, and measured first-article limits exist
    status: blocked_missing_fixture_limits_and_probe_coordinates
    release_allowed: false
  - step: selected_hardware_functional_first_article
    required_before_next_step:
      - display, camera, USB-C, side-key, power, cellular, Wi-Fi, Bluetooth, firmware identity, and traceability transcripts exist
    status: blocked_missing_selected_hardware_functional_transcripts
    release_allowed: false
  - step: routed_clearance_and_enclosure_physical_fit
    required_before_next_step:
      - routed board STEP with supplier models, boolean interference, clearance release, and enclosure physical-fit traveler exist
    status: blocked_missing_routed_clearance_and_physical_fit
    release_allowed: false
  - step: signed_traveler_and_end_to_end_release
    required_before_next_step:
      - signed first-article traveler, assembly signoff, release notes, and end-to-end readiness decision exist
    status: blocked_missing_signed_traveler_and_end_to_end_release
    release_allowed: false

