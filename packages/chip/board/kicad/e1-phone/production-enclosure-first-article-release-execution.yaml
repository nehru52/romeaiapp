  - board/kicad/e1-phone/production/fab-quote

cross_checks:
  selected_hardware_records_match_production_factory_coupling: true
  selected_hardware_records_match_factory_acceptance: true
  selected_hardware_records_match_first_article_execution: true
  selected_hardware_records_match_enclosure_physical_fit: true
  production_release_outputs_remain_absent: true
  first_article_common_outputs_remain_absent: true
  physical_fit_common_outputs_remain_absent: true
  routed_release_flags_remain_fail_closed: true
  manifest_production_gate_must_cite_this_bridge: true
  concept_cad_outputs_do_not_count_as_production_or_enclosure_release: true
  all_handoff_steps_fail_closed: true

release_blockers:
  - local routed KiCad PCB and routed STEP candidates exist for review only; release ERC/DRC, fabrication package, supplier-approved routed STEP, and fab/assembler quote are missing
  - production BOM/AVL, placement files, assembly drawing, stencil, factory limits, and probe coordinates are missing
  - selected display, camera, USB-C, charger, side-key, cellular, Wi-Fi, and Bluetooth first-article transcripts are missing
  - routed clearance release, supplier-model boolean interference, and enclosure physical-fit first article are missing
  - wireless RF, firmware identity, regulatory traceability, and factory calibration evidence are missing
  - signed first-article traveler and end-to-end readiness decision are missing

forbidden_claims:
  - production_ready
  - fabrication_ready
  - assembly_ready
  - factory_test_ready
  - selected_hardware_first_article_ready
  - enclosure_physical_fit_verified
  - enclosure_ready
  - end_to_end_phone_ready
