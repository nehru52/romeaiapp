schema: eliza.e1_phone_camera_module_fit_downselect.v1
status: blocked_camera_module_xy_z_downselect_requires_supplier_drawings_and_samples
date: '2026-05-21'
claim_boundary: Camera module fit and downselect planning only. This does not approve a camera module,
  camera FPC connector, lens-window datum, KiCad footprint, routed MIPI CSI escape, capture log, or
  enclosure clearance result.
source_artifacts:
  - package/camera/oem-mipi-csi-modules.yaml
  - board/kicad/e1-phone/display-camera-oem-source-revalidation.yaml
  - board/kicad/e1-phone/display-camera-oem-integration.yaml
  - board/kicad/e1-phone/display-camera-connector-pinout-execution.yaml
  - board/kicad/e1-phone/component-envelope-fit-audit.yaml
  - board/kicad/e1-phone/placement-repack-candidate.yaml
  - board/kicad/e1-phone/supplier-rfq-response-normalization.yaml
upstream_status:
  camera_package: sourcing_shortlist_no_bonded_pins_no_fabricated_board
  display_camera_source_revalidation: public_sources_revalidated_screen_camera_not_supplier_approved
  display_camera_oem_integration: blocked_requires_display_camera_supplier_pack_routed_mipi_and_capture_evidence
  display_camera_connector_pinout_execution: blocked_requires_supplier_display_camera_pinouts_connector_mpn_footprints_and_step
  component_envelope_fit_audit: blocked_component_envelopes_require_supplier_drawings_or_region_updates_before_routing
  placement_repack_candidate: active_matrix_matches_overlap_free_repack_candidate_not_routed
  supplier_rfq_response_normalization: blocked_response_normalization_ready_no_supplier_responses_received
fit_context:
  active_camera_region_refdes: J_CAM0_CAM1
  active_camera_region_role: shared_front_rear_camera_fpc_connector_escape_and_lens_datum_planning_region
  active_camera_region_mm:
    x: 45.0
    y: 12.0
    width: 17.0
    height: 13.0
    area_mm2: 221.0
  top_right_cluster_neighbors:
    - J_DISPLAY_TOUCH
    - J_TOP_BOTTOM_FLEX_TOP
    - front_camera_earpiece_keepout
  current_layout_policy: the region can carry camera FPC connectors, escape, and lens-axis datum planning, but cannot
    be treated as a full module-body courtyard until supplier drawings and STEP are received
candidate_fit:
  rear_primary_sincere_first_sf_xr3855a_a0:
    role: rear_camera_primary
    supplier: Sincere First
    module: SF-XR3855A-A0
    source_url: https://sincerefirst.en.made-in-china.com/product/WACpUrRYOVkc/China-Ov13855-Ov13850-CMOS-Sensor-Autofocus-13MP-Mipi-Camera-Module.html
    public_fields_available:
      module: SF-XR3855A-A0
      sensor: OV13855_or_OV13850
      resolution_mp: 13
      interface: MIPI_CSI
      pin_count: 24
      focus: autofocus
    public_xy_envelope_mm: unknown_supplier_drawing_required
    fit_status: blocked_until_signed_xy_z_fpc_tail_and_lens_axis_drawing
    board_policy: keep_as_rear_camera_primary_class_pending_supplier_pack
  front_primary_sincere_first_sf_g5035s60fy:
    role: front_camera_primary
    supplier: Sincere First
    module: SF-G5035S60FY
    source_url: https://www.sincerefirst.com/sincerefirst-solution/6053.html
    public_fields_available:
      module: SF-G5035S60FY
      sensor: GC5035
      resolution_px: 2592x1944
      interface: MIPI_CSI_2_lane
      pin_count: 30
      focus: fixed_focus
    public_xy_envelope_mm: unknown_supplier_drawing_required
    fit_status: blocked_until_signed_xy_z_fpc_tail_and_lens_axis_drawing
    board_policy: keep_as_front_camera_primary_class_pending_supplier_pack
  front_alternate_alibaba_junde_imx219:
    role: front_camera_alternate_or_lab_bringup
    supplier: Shenzhen Junde Electronics
    source_url: https://www.alibaba.com/product-detail/IMX219-8MP-120-Degree-Wide-Angle_1601568412012.html
    public_envelope_mm:
      width: 25.0
      height: 24.0
    public_source_status: alibaba_public_page_observed_2026_05_21_size_25x24mm
    area_mm2: 600.0
    active_region_area_mm2: 221.0
    fit:
      fits_width: false
      fits_height: false
      width_shortfall_mm: 8.0
      height_shortfall_mm: 11.0
      fits_xy: false
      fits_rotated: false
      rotated_width_shortfall_mm: 7.0
      rotated_height_shortfall_mm: 12.0
    board_policy: reject_for_current_top_right_camera_region_unless_camera_bump_or_connector_stack_changes
downselect_policy:
  selected_routing_branch: sincere_first_phone_style_front_and_rear_modules_pending_supplier_xy_z_drawings
  rejected_for_current_region:
    - front_alternate_alibaba_junde_imx219
  required_supplier_artifacts_before_camera_region_release:
    - signed front and rear camera 2D drawings with module body, lens center, FPC tail, stiffener, and connector datums
    - mating connector MPNs, recommended land patterns, and height/keepout drawings
    - front and rear camera STEP or B-rep models including lens barrel, stiffener, adhesive, and maximum z-height
    - exact FPC pinouts, lane order, power rails, reset, MCLK, PWDN, autofocus, and reserved-pin rules
    - Android/Linux driver notes, OTP/calibration flow, and sample inspection reports
  not_allowed:
    - claim J_CAM0_CAM1 is a final camera module courtyard
    - promote 25 x 24 mm Junde alternate without widening the top-right camera/display/flex stack
    - route MIPI CSI before exact supplier pinouts and connector land patterns are frozen
    - claim camera enclosure clearance before supplier STEP and routed-board STEP boolean rerun
layout_release_consequence:
  camera_region_requires_supplier_xy_z_before_evt1_route: true
  junde_25x24mm_alternate_rejected_by_current_region: true
  primary_sincere_first_modules_remain_supplier_drawing_gated: true
  top_right_cluster_may_need_repack_if_primary_body_exceeds_17x13mm: true
  routed_step_and_enclosure_rerun_required_after_camera_module_selection: true
cross_checks:
  junde_width_shortfall_detected: true
  junde_height_shortfall_detected: true
  junde_rotated_still_rejected: true
  active_camera_region_not_promoted_to_module_body: true
  primary_camera_modules_have_unknown_xy_z: true
  supplier_response_count_zero: true
release_blockers:
  - primary front and rear camera module XY, z-height, FPC tail, connector, and lens-axis drawings are missing
  - 25 x 24 mm Alibaba/Junde IMX219 alternate exceeds the current 17 x 13 mm camera/FPC region in both orientations
  - camera mating connector MPNs, land patterns, STEP models, driver notes, calibration flow, and samples are missing
  - routed MIPI CSI length/skew, impedance, return-path, and DRC evidence is missing
  - routed board STEP and camera lens/FPC/enclosure clearance rerun are missing
forbidden_claims:
  - camera_module_selected
  - camera_region_ready
  - camera_footprints_ready
  - camera_capture_ready
  - enclosure_ready
  - routed_pcb_ready
  - fabrication_ready
  - end_to_end_phone_ready
