cross_checks:
  all_diff_pairs_have_corridors: true
  all_rf_feeds_have_corridors: true
  all_high_current_paths_have_corridors: true
  pcb_has_no_routed_segments_yet: true
  pcb_has_no_copper_zones_yet: true
  pcb_keepout_zones_available_for_corridor_review: true
  all_declared_nets_have_explicit_netclasses: true
  route_corridors_do_not_unblock_route_acceptance: true
  concept_length_violations_block_route_acceptance: true
release_blockers:
  - corridors are not routed copper and do not prove DRC clearance
  - concept corridor length violations require topology or placement resolution before route acceptance
  - supplier footprints and pad escapes are still placeholders
  - post-route length, skew, impedance, via-count, and return-path reports are missing
  - routed board STEP and enclosure clearance rerun are missing
forbidden_claims:
  - trial_route_ready
  - routed_pcb_ready
  - drc_clean
  - si_pi_ready
  - rf_ready
  - enclosure_ready
  - fabrication_ready
  - end_to_end_phone_ready
