schema: eliza.e1_phone_usb_pd_controller_lifecycle_replacement_gate.v1
status: blocked_pd_controller_lifecycle_replacement_decision_required
date: 2026-05-22
claim_boundary: >
  Lifecycle and replacement gate for the selected TPS65987DDH USB-PD
  controller. This is not a replacement selection, schematic release, firmware
  configuration, PD compliance result, or production approval. It prevents the
  current PD binding from being treated as production-ready after the public TI
  source refresh marked the family not recommended for new designs.

source_artifacts:
  - board/kicad/e1-phone/usb-power-sidekey-public-source-refresh-2026-05-22.yaml
  - board/kicad/e1-phone/usb-power-sidekey-release-execution.yaml
  - board/kicad/e1-phone/usb-sidekey-selection-wiring-decision.yaml
  - board/kicad/e1-phone/usb-sidekey-acceptance-checklist.yaml
  - package/usb-pd/tps65987.yaml
  - package/usb-c/e1-phone-usb-c-port.yaml
  - package/charger/max77860.yaml

lifecycle_inputs:
  selected_controller:
    vendor: Texas Instruments
    part: TPS65987DDH
    public_source_url: https://www.ti.com/product/TPS65987D
    observed_lifecycle_status: not_recommended_for_new_designs
    current_binding_use: continuity_only_until_lifecycle_or_replacement_decision
    blocks_new_design_release: true
  observed_ti_replacement_path:
    vendor: Texas Instruments
    candidate: TPS25751
    public_source_url: https://www.ti.com/product/TPS25751
    public_position: active_usb_c_power_delivery_controller_for_power_applications
    observed_gap_vs_current_binding:
      - no_public_drop_in_confirmation_for_TPS65987DDH_RSH_56_pin_footprint
      - no_alt_mode_replacement_claim_for_current_optional_DisplayPort_scope
      - firmware_configuration_and_linux_android_integration_not_mapped
      - charger_power_path_and_dead_battery_boot_sequence_not_revalidated

decision_branches:
  - id: keep_tps65987ddh_with_lifecycle_waiver
    selected_controller_after_branch: TPS65987DDH
    allowed_use: EVT_debug_or_existing_inventory_only_until_signed_lifecycle_waiver
    required_evidence:
      - TI or distributor lifecycle/last-time-buy guidance for the exact orderable part
      - engineering waiver accepting NRND risk for EVT only
      - PD configuration image, provisioning transcript, CC attach logs, dead-battery boot logs, and Type-C class logs
      - exact symbol, footprint, package, thermal, and manufacturing review for the RSH 56-pin package
    routed_release_allowed: false
    production_release_allowed: false
    status: blocked_missing_signed_lifecycle_waiver_and_pd_bringup_logs
  - id: replace_with_tps25751_power_only
    selected_controller_after_branch: TPS25751
    allowed_use: candidate_only_if_E1_remains_USB2_PD_charge_debug_without_alt_mode_dependency
    required_evidence:
      - TPS25751 exact orderable-part, package, symbol, footprint, land pattern, and STEP/B-rep review
      - feature-gap review proving no required DisplayPort or superspeed orientation behavior is lost
      - rewritten PD firmware/provisioning path and Linux/Android Type-C integration plan
      - charger and dead-battery sequence rerun against MAX77860 and the selected USB-C receptacle
    routed_release_allowed: false
    production_release_allowed: false
    status: blocked_missing_replacement_schematic_firmware_and_sequence_review
  - id: replace_with_non_ti_alt_mode_capable_controller
    selected_controller_after_branch: pending_alt_mode_capable_controller
    allowed_use: candidate_only_if_USB3_or_DisplayPort_alt_mode_becomes_required
    required_evidence:
      - alternate controller shortlist with lifecycle, stock, package, Linux/Android support, and firmware-tool availability
      - USB2, CC, VBUS, optional USB3/DP mux, ESD, and charger power-path schematic remap
      - controlled-impedance route and SI rework package for any promoted superspeed lanes
      - supplier drawings, land pattern, STEP/B-rep, samples, PD compliance plan, and first-article logs
    routed_release_allowed: false
    production_release_allowed: false
    status: blocked_missing_alt_mode_controller_shortlist_and_integration_review

release_policy:
  selected_stack_still_records_tps65987ddh: true
  pd_controller_replacement_decision_closed: false
  may_release_current_pd_binding_for_evt0_without_signed_waiver: false
  may_release_current_pd_binding_for_production: false
  may_promote_tps25751_without_feature_gap_review: false
  may_promote_waterproof_or_superspeed_usb_without_pd_redecision: false

cross_checks:
  selected_controller_matches_package_binding: true
  selected_controller_matches_usb_sidekey_decision: true
  lifecycle_risk_matches_2026_05_22_public_source_refresh: true
  replacement_candidate_recorded_as_candidate_not_selected: true
  every_branch_requires_firmware_or_integration_evidence: true
  every_branch_blocks_routed_and_production_release: true
  usb_c_and_charger_sequence_must_be_rerun_after_pd_change: true

release_blockers:
  - TPS65987DDH is publicly marked not recommended for new designs and lacks a signed lifecycle or EVT-only waiver
  - TPS25751 is only a candidate until package, feature-gap, firmware, Linux/Android, charger, and dead-battery impacts are reviewed
  - no alternate-mode-capable replacement controller has been selected if USB3 or DisplayPort alt mode becomes required
  - PD configuration image, CC attach logs, dead-battery boot logs, Type-C class logs, routed PCB, ERC, DRC, and first-article evidence are missing

forbidden_claims:
  - pd_controller_lifecycle_closed
  - tps65987ddh_production_ready
  - tps25751_selected
  - pd_ready
  - charging_ready
  - usb_c_ready
  - routed_pcb_ready
  - fabrication_ready
  - end_to_end_phone_ready
