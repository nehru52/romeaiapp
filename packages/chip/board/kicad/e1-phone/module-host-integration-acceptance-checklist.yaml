schema: eliza.e1_phone_module_host_integration_acceptance_checklist.v1
status: blocked_module_host_integration_requires_supplier_pinouts_routed_host_buses_firmware_identity_and_factory_evidence
date: '2026-05-21'
claim_boundary: Acceptance checklist for wiring the application processor, memory/storage, cellular module, Wi-Fi/Bluetooth
  module, SIM/eSIM, host buses, firmware artifacts, regulatory identity, and factory provisioning into the E1 phone
  PCB. It is not a selected production SoC package, not a routed AP board, not firmware release evidence, not carrier/regulatory
  approval, and not factory provisioning release.
source_artifacts:
  - board/kicad/e1-phone/block-netlist.yaml
  - board/kicad/e1-phone/placement-interface-matrix.yaml
  - board/kicad/e1-phone/preliminary-bom.yaml
  - board/kicad/e1-phone/procurement-readiness.yaml
  - board/kicad/e1-phone/routing-constraints.yaml
  - board/kicad/e1-phone/radio-module-integration.yaml
  - board/kicad/e1-phone/radio-antenna-acceptance-checklist.yaml
  - board/kicad/e1-phone/factory-probe-map.yaml
  - package/cellular/quectel-5g-redcap.yaml
  - package/wifi/murata-type-2ea-wifi6e.yaml
module_host_summary:
  application_processor_binding: package/e1-demo-pinout.yaml
  memory_storage_binding: package/e1-demo-pinout.yaml
  cellular_primary: Quectel_RG255C_LGA_or_RM255C_M2_5G_RedCap
  wifi_bluetooth_primary: Murata_LBEE5XV2EA_802_Type_2EA_WiFi6E_BT5p3
  cellular_package_status: sourcing_shortlist_no_bonded_pins_no_fabricated_board
  wifi_bluetooth_package_status: phone_class_sourcing_target_no_bonded_pins_no_fabricated_board
  radio_module_status: blocked_requires_module_pinout_firmware_rf_measurement_and_regulatory_evidence
  radio_antenna_acceptance_status: blocked_radio_antenna_acceptance_requires_supplier_route_firmware_regulatory_and_measurements
  procurement_status: blocked_preliminary_bom_not_avl_or_purchase_order
  cellular_procurement_status: blocked_region_sku_certification_scope_and_space_saving_module_decision_required
  wifi_bluetooth_procurement_status: blocked_reference_layout_and_firmware_license_required
  soc_region_mm:
    x: 18.0
    y: 3.0
    width: 25.0
    height: 14.0
  cellular_region_mm:
    x: 3.0
    y: 3.0
    width: 14.0
    height: 14.0
  wifi_bluetooth_region_mm:
    x: 3.0
    y: 18.0
    width: 14.0
    height: 10.0
  host_wireless_shared_nets:
    - BT_EN
    - BT_UART_CTS_N
    - BT_UART_RTS_N
    - BT_UART_RX
    - BT_UART_TX
    - CELL_PCIE_RX_N
    - CELL_PCIE_RX_P
    - CELL_PCIE_TX_N
    - CELL_PCIE_TX_P
    - CELL_RESET_N
    - CELL_USB2_DN
    - CELL_USB2_DP
    - CELL_W_DISABLE_N
    - GND
    - IO_1V8
    - USIM_DET
    - WIFI_EN
    - WIFI_PCIE_RX_N
    - WIFI_PCIE_RX_P
    - WIFI_PCIE_TX_N
    - WIFI_PCIE_TX_P
  cellular_host_interfaces:
    - contract: CELL_USB2_DP
      module_role: usb2_dp
      direction_at_soc: bidirectional
    - contract: CELL_USB2_DN
      module_role: usb2_dn
      direction_at_soc: bidirectional
    - contract: CELL_PCIE_TX_P
      module_role: pcie_rx_p
      direction_at_soc: output
    - contract: CELL_PCIE_TX_N
      module_role: pcie_rx_n
      direction_at_soc: output
    - contract: CELL_PCIE_RX_P
      module_role: pcie_tx_p
      direction_at_soc: input
    - contract: CELL_PCIE_RX_N
      module_role: pcie_tx_n
      direction_at_soc: input
    - contract: CELL_RESET_N
      module_role: reset_n
      direction_at_soc: output
      default: low
    - contract: CELL_WAKE_AP
      module_role: wake_host
      direction_at_soc: input
    - contract: AP_WAKE_CELL
      module_role: wake_module
      direction_at_soc: output
    - contract: CELL_W_DISABLE_N
      module_role: radio_disable_n
      direction_at_soc: output
    - contract: USIM_CLK
      module_role: sim_clk
      direction_at_soc: output
    - contract: USIM_RST
      module_role: sim_rst
      direction_at_soc: output
    - contract: USIM_IO
      module_role: sim_io
      direction_at_soc: bidirectional
  wifi_host_preferred_bus: PCIe
  wifi_host_fallback_bus: SDIO
  bluetooth_preferred_bus: UART
  routing_pair_names_required:
    - CELL_PCIE_RX
    - CELL_PCIE_TX
    - CELL_USB2_DP_DN
    - WIFI_PCIE_RX
    - WIFI_PCIE_TX
  factory_probe_domains_covering_modules:
    - radios
    - compute_storage_debug
  factory_traceability_fields:
    - board_serial
    - imei_or_modem_identifier
    - wifi_mac
    - bluetooth_mac
    - secure_key_provisioning_result
    - fixture_id
    - test_software_revision
acceptance_items:
  - id: application_processor_package_memory_storage_freeze
    owner: compute_architecture
    status: blocked_missing_host_module_pinout_route_firmware_identity_or_factory_evidence
    required_evidence:
      - production AP package choice with exact pinout, escape constraints, power map, thermal model, and lifecycle
        evidence
      - LPDDR and UFS exact parts, reference layout, length-matching limits, training logs, and production BOM binding
      - KiCad symbols/footprints and 3D models replacing the package/e1-demo-pinout.yaml scaffold
    blocker: The current AP/memory/storage binding is a scaffold pinout, not a production phone compute package.
  - id: cellular_module_host_bus_sim_esim_and_identity
    owner: cellular_integration
    status: blocked_missing_host_module_pinout_route_firmware_identity_or_factory_evidence
    required_evidence:
      - selected Quectel RedCap region SKU, signed hardware design guide, land pattern, and STEP model
      - USB2, PCIe, reset, wake, W_DISABLE_N, USIM, and eSIM routes validated against the module pinout
      - IMEI/modem identifier, SIM/eSIM provisioning, carrier test mode, and factory traceability procedure
    blocker: Cellular host buses and identity/provisioning flow are not frozen or measured.
  - id: wifi_bluetooth_host_bus_firmware_and_mac_identity
    owner: wifi_bluetooth_integration
    status: blocked_missing_host_module_pinout_route_firmware_identity_or_factory_evidence
    required_evidence:
      - Murata Type 2EA land pattern, reference layout, module pinout, antenna feed rules, and STEP model
      - PCIe or SDIO, Bluetooth UART, enable, IRQ, host-wake, and coexistence pins routed and tested
      - firmware, NVRAM, CLM, license archive, country-code plan, Wi-Fi MAC, Bluetooth MAC, and factory provisioning
        log
    blocker: Wi-Fi/Bluetooth host integration and firmware/identity evidence are missing.
  - id: host_bus_routing_si_and_power_states
    owner: layout_signal_power_integrity
    status: blocked_missing_host_module_pinout_route_firmware_identity_or_factory_evidence
    required_evidence:
      - routed USB2, PCIe, SDIO, UART, SIM/eSIM, JTAG, LPDDR, and UFS reports with length, skew, impedance, and
        return path
      - power-state sequencing for AP, memory, cellular, Wi-Fi/Bluetooth, suspend/resume, airplane mode, and wake
        sources
      - post-route SI/PI reports for module host buses and high-current RF_VBAT behavior
    blocker: Host buses are logical nets only; routed copper and SI/PI evidence are absent.
  - id: module_firmware_driver_linux_android_bringup
    owner: firmware_bsp
    status: blocked_missing_host_module_pinout_route_firmware_identity_or_factory_evidence
    required_evidence:
      - Linux and Android boot logs proving AP, LPDDR, UFS, display, cameras, cellular, Wi-Fi, Bluetooth, SIM/eSIM,
        and sensors enumerate
      - driver, device-tree, firmware blob, NVRAM/CLM, modem firmware, regulatory-domain, and license archive
      - suspend/resume, wake, crash-recovery, RF-kill, and recovery-button logs tied to the selected modules
    blocker: No end-to-end OS bring-up logs exist for the selected module set.
  - id: factory_provisioning_secure_identity_and_test_modes
    owner: manufacturing_test
    status: blocked_missing_host_module_pinout_route_firmware_identity_or_factory_evidence
    required_evidence:
      - factory test software that records board serial, IMEI/modem identifier, Wi-Fi MAC, Bluetooth MAC, secure-key
        result, fixture ID, and software revision
      - cellular, Wi-Fi, Bluetooth, GNSS, SIM/eSIM, AP boot, LPDDR training, UFS training, and debug-lock test limits
      - first-article transcript proving provisioning, RF calibration, debug-lock policy, and stop-on-fail behavior
    blocker: Factory provisioning, module identity, RF calibration, and first-article test modes are not released.
cross_checks:
  soc_cellular_wifi_blocks_exist: true
  placement_regions_exist_for_host_modules: true
  cellular_and_wifi_bom_items_exist: true
  cellular_and_wifi_procurement_blocked: true
  host_wireless_shared_nets_present: true
  routing_constraints_cover_cellular_and_wifi_host_pairs: true
  factory_probe_covers_radios_and_compute: true
  radio_acceptance_remains_blocked: true
  all_acceptance_items_blocked: true
release_blockers:
  - production AP, LPDDR, and UFS package data has not replaced the scaffold binding
  - cellular and Wi-Fi/Bluetooth supplier pinouts, land patterns, reference layouts, STEP models, firmware packs,
    and licenses are missing
  - host buses, RF feeds, SIM/eSIM, power states, and factory identity paths are not routed or measured
  - Linux/Android module bring-up logs, regulatory provisioning, RF calibration, and first-article provisioning
    evidence are missing
forbidden_claims:
  - module_host_ready
  - application_processor_ready
  - cellular_ready
  - wifi_ready
  - bluetooth_ready
  - firmware_ready
  - identity_provisioning_ready
  - factory_test_ready
  - routed_pcb_ready
  - end_to_end_phone_ready
