board_layout_implications:
  - Keep 78.0 x 153.6 mm device envelope until a better 5.5 inch supplier outline is received.
  - Keep 64.0 x 132.0 mm rigid board target behind the display and reserve side rails for buttons and
    antenna plastic.
  - Route 4-lane DSI and 2-to-4-lane CSI as controlled-impedance MIPI D-PHY before layout closure.
  - Reserve either LGA cellular module land pattern or M.2 lab interposer area before committing final
    RF shield dimensions.
  - Keep Wi-Fi/BT as a shielded SMT module with 1.8 V IO, PCIe/SDIO, UART flow control, and antenna matching/test
    access.
must_request_from_suppliers_before_freeze:
  - display 2D drawing, FPC exit, full pinout, touch controller, init sequence, and backlight curve
  - rear and front camera drawings, FPC pinouts, lens z-height, lane order, power sequence, and calibration
    flow
  - cellular region SKU, hardware design guide, antenna reference, SIM/eSIM reference, carrier certification
    statement
  - Murata Type 2EA datasheet package, footprint DXF, hardware app note, radio-law note, and antenna reference
    layout
  - sample quote, lead time, lifecycle statement, and second source or pin-compatible alternate for each
    critical module
cross_checks:
  display_primary_fits_current_envelope: true
  display_clearance_mm:
    width_clearance_mm: 0.9
    height_clearance_mm: 1.83
  has_alibaba_display_evidence: true
  has_made_in_china_display_evidence: true
  has_high_brightness_display_alternate: true
  has_thin_amoled_display_alternate: true
  has_parseable_alibaba_meta_055wu01_display_alternate: true
  has_parseable_made_in_china_e549_amoled_display_alternate: true
  display_sourcing_audit_matches_source_verification_2026_05_21: true
  has_camera_marketplace_evidence: true
  has_front_camera_candidate_evidence: true
  has_alibaba_camera_evidence: true
  has_cellular_primary_vendor_evidence: true
  has_wifi_bt_primary_vendor_evidence: true
release_blockers:
  - supplier_contact_and_quote_not_captured
  - samples_not_ordered_or_received
  - exact_pinouts_not_received
  - supplier_2d_drawings_not_received
  - supplier_step_models_not_received
  - connector_mating_parts_not_frozen
  - lifecycle_and_avl_not_approved
  - regulatory_certification_scope_not_confirmed
forbidden_claims:
  - supplier_selected
  - samples_ordered
  - avl_ready
  - pinouts_frozen
  - footprints_frozen
  - enclosure_ready
  - fabrication_ready
