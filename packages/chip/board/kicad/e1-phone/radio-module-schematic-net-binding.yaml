schema: eliza.e1_phone_radio_module_schematic_net_binding.v1
status: blocked_radio_module_net_binding_requires_supplier_pinouts_real_schematic_rf_route_firmware_and_factory_evidence
date: 2026-05-21
claim_boundary: >
  Schematic, RF, firmware, and factory binding target for the selected
  off-the-shelf cellular and Wi-Fi/Bluetooth modules. This maps the Quectel
  RedCap and Murata Type 2EA choices to host buses, SIM/eSIM, RF feed nets,
  power/control nets, factory identity fields, and EVT1 capture exit criteria.
  It is not a supplier pinout, not a reference layout, not a KiCad schematic
  implementation, not routed RF evidence, not firmware release evidence, not
  regulatory approval, and not enclosure-ready proof.

source_artifacts:
  - board/kicad/e1-phone/artifact-manifest.yaml
  - board/kicad/e1-phone/radio-module-integration.yaml
  - board/kicad/e1-phone/radio-module-selection-wiring-decision.yaml
  - board/kicad/e1-phone/module-rf-pinout-execution.yaml
  - board/kicad/e1-phone/module-host-integration-closure.yaml
  - board/kicad/e1-phone/rf-connectivity-closure.yaml
  - board/kicad/e1-phone/routing-constraints.yaml
  - board/kicad/e1-phone/factory-probe-map.yaml
  - board/kicad/e1-phone/block-netlist.yaml
  - package/cellular/quectel-5g-redcap.yaml
  - package/wifi/murata-type-2ea-wifi6e.yaml

interface_context:
  cellular:
    vendor: Quectel
    family: RG255C_or_RM255C
    placement_refdes_group: U_CELL
    placement_region_mm: {x: 3.0, y: 3.0, width: 14.0, height: 14.0}
    minimum_rf_ports: [cellular_main, cellular_diversity, gnss_optional]
    required_rf_nets: [CELL_RF_MAIN, CELL_RF_DIV, CELL_GNSS_RF]
  wifi_bluetooth:
    vendor: Murata
    order_number: LBEE5XV2EA-802
    chipset: Infineon_CYW55573
    placement_refdes_group: U_WIFI_BT
    placement_region_mm: {x: 3.0, y: 18.0, width: 14.0, height: 10.0}
    required_rf_nets: [WIFI_BT_RF0, WIFI_BT_RF1]

schematic_blocks:
  cellular_5g_redcap_module:
    refdes_group: U_CELL
    package_binding: package/cellular/quectel-5g-redcap.yaml
    selected_family: RG255C_or_RM255C
    required_host_contracts:
      - CELL_USB2_DP
      - CELL_USB2_DN
      - CELL_PCIE_TX_P
      - CELL_PCIE_TX_N
      - CELL_PCIE_RX_P
      - CELL_PCIE_RX_N
      - CELL_RESET_N
      - CELL_WAKE_AP
      - AP_WAKE_CELL
      - CELL_W_DISABLE_N
      - USIM_CLK
      - USIM_RST
      - USIM_IO
    required_power_control_nets:
      - RF_VBAT
      - IO_1V8
      - GND
      - CELL_RESET_N
      - CELL_W_DISABLE_N
      - AP_WAKE_CELL
      - CELL_WAKE_AP
    sim_esim_nets:
      - USIM_VCC
      - USIM_CLK
      - USIM_RST
      - USIM_IO
      - USIM_DET
      - ESIM_VCC
      - ESIM_CLK
      - ESIM_RST
      - ESIM_IO
    required_rf_nets: [CELL_RF_MAIN, CELL_RF_DIV, CELL_GNSS_RF]
    required_local_parts:
      - cellular RF matching networks and conducted access before each antenna feed
      - USIM/eSIM ESD and short guarded routing away from cellular RF feeds
      - RF_VBAT bulk and high-frequency decoupling sized from selected region SKU
      - reset wake W_DISABLE_N and RF-kill pull policy for regulatory testing
    status: blocked_waiting_region_sku_supplier_pinout_reference_layout_step_firmware_and_cert_plan
  wifi6e_bluetooth_5p3_module:
    refdes_group: U_WIFI_BT
    package_binding: package/wifi/murata-type-2ea-wifi6e.yaml
    selected_order_number: LBEE5XV2EA-802
    required_host_contracts:
      - WIFI_PCIE_TX_P
      - WIFI_PCIE_TX_N
      - WIFI_PCIE_RX_P
      - WIFI_PCIE_RX_N
      - WIFI_SDIO_CLK
      - WIFI_SDIO_CMD
      - WIFI_SDIO_D0
      - WIFI_SDIO_D1
      - WIFI_SDIO_D2
      - WIFI_SDIO_D3
      - BT_UART_TX
      - BT_UART_RX
      - BT_UART_CTS_N
      - BT_UART_RTS_N
      - WIFI_EN
      - BT_EN
      - WIFI_HOST_WAKE
      - WIFI_IRQ
    required_power_control_nets:
      - RF_VBAT
      - IO_1V8
      - GND
      - WIFI_EN
      - BT_EN
      - WIFI_IRQ
      - WIFI_HOST_WAKE
    required_rf_nets: [WIFI_BT_RF0, WIFI_BT_RF1]
    required_local_parts:
      - Murata reference-layout land pattern ground and keepout replication
      - two Wi-Fi/Bluetooth RF matching networks with conducted access
      - PCIe primary bus plus SDIO fallback strapping and bring-up options
      - Bluetooth UART flow-control and wake/interrupt policy
    status: blocked_waiting_supplier_pinout_reference_layout_firmware_nvram_clm_and_regulatory_review

host_route_bindings:
  cellular_usb2:
    route_groups: [CELL_USB2_DP_DN]
    impedance_class: usb2_diff
    target_impedance_ohm_diff: 90
    required_validation: modem_usb2_length_skew_impedance_and_enumeration_log
  cellular_pcie:
    route_groups: [CELL_PCIE_TX, CELL_PCIE_RX]
    impedance_class: pcie_diff
    target_impedance_ohm_diff: 85
    required_validation: modem_pcie_length_skew_impedance_and_link_training_log
  wifi_pcie:
    route_groups: [WIFI_PCIE_TX, WIFI_PCIE_RX]
    impedance_class: pcie_diff
    target_impedance_ohm_diff: 85
    required_validation: wifi_pcie_length_skew_impedance_and_link_training_log
  wifi_sdio_fallback:
    single_ended_bus: WIFI_SDIO
    required_validation: wifi_sdio_group_skew_and_firmware_bringup_log
  sim_esim:
    single_ended_bus: USIM_ESIM
    required_validation: sim_esim_readback_provisioning_and_esd_review

rf_feed_bindings:
  CELL_RF_MAIN:
    role: cellular_main
    near: U_CELL
    impedance_ohm: 50
    requires_matching_network: true
    requires_conducted_access_before_matching: true
    required_validation: vna_s11_s21_cellular_main_conducted_rf_and_sar_prescan
  CELL_RF_DIV:
    role: cellular_diversity
    near: U_CELL
    impedance_ohm: 50
    requires_matching_network: true
    requires_conducted_access_before_matching: true
    required_validation: vna_s11_s21_cellular_diversity_conducted_rf_and_sar_prescan
  CELL_GNSS_RF:
    role: gnss_optional
    near: U_CELL_or_GNSS_LNA
    impedance_ohm: 50
    requires_matching_network: true
    requires_conducted_access_before_matching: true
    required_validation: gnss_conducted_or_reradiated_acquisition_and_desense_log
  WIFI_BT_RF0:
    role: wifi_bt_chain0
    near: U_WIFI_BT
    impedance_ohm: 50
    requires_matching_network: true
    requires_conducted_access_before_matching: true
    required_validation: wifi_bt_chain0_vna_conducted_rf_and_coexistence_log
  WIFI_BT_RF1:
    role: wifi_bt_chain1
    near: U_WIFI_BT
    impedance_ohm: 50
    requires_matching_network: true
    requires_conducted_access_before_matching: true
    required_validation: wifi_bt_chain1_vna_conducted_rf_and_coexistence_log

factory_probe_bindings:
  radios: [CELL_GNSS_RF, CELL_RF_DIV, CELL_RF_MAIN, WIFI_BT_RF0, WIFI_BT_RF1, USIM_IO, ESIM_IO]
  identity_traceability:
    - board_serial
    - imei_or_modem_identifier
    - wifi_mac
    - bluetooth_mac
    - secure_key_provisioning_result
    - fixture_id
    - test_software_revision
  required_test_modes:
    - cellular boot and IMEI/modem identifier readback
    - USIM/eSIM readback and provisioning result
    - Wi-Fi conducted or shield-box TX/RX
    - Bluetooth LE advertise/scan and RF-level test
    - GNSS conducted or reradiated acquisition check

evt1_capture_exit_criteria:
  - KiCad schematic contains non-placeholder cellular Wi-Fi Bluetooth SIM/eSIM RF matching and conducted-access symbols
  - supplier pinouts reference layouts land patterns STEP models reserved-pin rules and keepouts are archived
  - cellular USB2 PCIe SIM/eSIM and Wi-Fi PCIe SDIO Bluetooth UART nets are assigned to reviewed pins
  - all RF feeds have 50 ohm geometry matching networks conducted access via fence and ground-reference review
  - Quectel modem firmware carrier test mode Murata CYW55573 firmware NVRAM CLM regulatory database and licenses are archived
  - factory test can read modem identity Wi-Fi MAC Bluetooth MAC SIM/eSIM status and RF calibration results
  - routed board STEP includes cellular Wi-Fi Bluetooth modules shields RF matching networks and antenna keepouts

cross_checks:
  selected_modules_match_integration: true
  schematic_blocks_match_module_pinout_execution: true
  host_route_groups_match_routing_constraints: true
  rf_feed_bindings_match_execution_records: true
  factory_probe_nets_match_probe_map: true
  identity_traceability_matches_factory_execution: true
  all_required_nets_exist_in_block_netlist: true
  fail_closed_until_supplier_pinouts_rf_route_firmware_and_factory_evidence_exist: true

release_blockers:
  - cellular regional SKU, supplier pinout, land pattern, STEP, firmware, and carrier plan missing
  - Wi-Fi/Bluetooth module pinout, land pattern, STEP, firmware, NVRAM/CLM, and regulatory scope missing
  - RF matching networks and conducted access are requirements only; no 50 ohm routed geometry or VNA data exists
  - factory RF calibration, identity provisioning, and first-article radio limits are missing
  - routed PCB, DRC, SI/PI, RF, SAR, enclosure, and fabrication outputs are missing

forbidden_claims:
  - cellular_schematic_ready
  - wifi_bluetooth_schematic_ready
  - cellular_ready
  - wifi_ready
  - bluetooth_ready
  - rf_ready
  - regulatory_ready
  - carrier_ready
  - sar_ready
  - module_host_ready
  - factory_rf_ready
  - routed_pcb_ready
  - enclosure_ready
  - fabrication_ready
