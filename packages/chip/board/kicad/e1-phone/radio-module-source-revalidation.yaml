layout_decisions:
  cellular_primary: Quectel_RG255C_LGA_remains_primary_phone_module
  cellular_lab_fallback: Quectel_RM255C_GL_M2_remains_dev_bringup_fallback_not_phone_layout_primary
  wifi_bluetooth_primary: Murata_LBEE5XV2EA_802_Type_2EA_remains_primary_phone_wifi_bt_module
  wifi_bluetooth_lab_adapter: Embedded_Artists_EAR00413_M2_signal_is_lab_evaluation_only

cross_checks:
  cellular_vendor_page_matches_package_binding: true
  cellular_brochure_dimensions_bound_to_phone_vs_lab_decision: true
  wifi_vendor_page_matches_package_binding: true
  wifi_product_brief_matches_package_binding: true
  cellular_lga_selected_over_m2_for_phone_size: true
  wifi_module_fits_current_top_rf_region: true
  rf_feed_count_remains_five: true
  requires_supplier_pack_firmware_rf_and_regulatory_before_release: true

required_next_supplier_artifacts:
  - Quectel exact region SKU/orderable MPN, band matrix, hardware design guide, LGA pad map, reference layout,
    STEP model, firmware/driver package, test-mode procedure, and carrier/PTCRB/GCF plan
  - Murata Type 2EA application note, land pattern, reference layout, STEP model, firmware/NVRAM/CLM/license archive,
    regulatory database, final antenna gain review, and modular approval scope
  - antenna vendor review for cellular main/diversity/GNSS and Wi-Fi/Bluetooth 2x2 feed locations
  - factory RF calibration procedure, conducted test access, VNA/coexistence/SAR pre-scan plan, and first-article RF limits

release_blockers:
  - public vendor pages and brochures are not supplier design packs
  - cellular region SKU, LGA pad map, reference layout, firmware, carrier, and SAR scope are missing
  - Wi-Fi/Bluetooth land pattern, reference layout, firmware/NVRAM/CLM, license, and regulatory review are missing
  - routed 50 ohm RF feeds, matching networks, conducted access, antenna tuning, VNA, coexistence, and factory RF limits are missing

forbidden_claims:
  - cellular_ready
  - wifi_ready
  - bluetooth_ready
  - carrier_ready
  - regulatory_ready
  - rf_ready
  - sar_ready
  - enclosure_ready
