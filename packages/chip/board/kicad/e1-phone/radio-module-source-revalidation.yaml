schema: eliza.e1_phone_radio_module_source_revalidation.v1
status: public_sources_revalidated_radio_modules_not_supplier_approved
date: '2026-05-21'
claim_boundary: >
  Public-source revalidation for off-the-shelf cellular and Wi-Fi/Bluetooth
  module choices. These fields can drive RFQ, footprint-envelope planning,
  host-interface contracts, and routing constraints, but they are not supplier
  approval, final pinouts, reference layouts, firmware release packs, regulatory
  evidence, tuned antennas, SAR, or carrier approval.
source_artifacts:
  - package/cellular/quectel-5g-redcap.yaml
  - package/wifi/murata-type-2ea-wifi6e.yaml
  - board/kicad/e1-phone/radio-module-integration.yaml
  - board/kicad/e1-phone/module-rf-pinout-execution.yaml
  - board/kicad/e1-phone/rf-connectivity-closure.yaml

