      height: 8.0
    J_USB_C:
      x: 26.0
      y: 126.0
      width: 16.0
      height: 6.0
  battery_window_audit:
    battery_window_mm:
      x: 0.0
      y: 29.5
      width: 64.0
      height: 87.0
    candidate_intrusion_count: 0
    candidate_intruding_regions: []
  region_semantics_changes_required:
    - refdes_group: U_CELL
      change: current 14 x 14 mm cellular region cannot represent the selected RG255C
        LGA module body
      reason: the selected public RG255C LGA envelope is 29 x 32 mm before RF keepout,
        shield, matching, and conducted-access clearance
    - refdes_group: J_CAM0_CAM1
      change: treat active PCB region as camera FPC connector/escape area, not full
        module body
      reason: the current shared top-right area cannot fit the 25 x 24 mm Junde alternate
        plus display connector and top flex
    - refdes_group: U_AUDIO_SPK_MIC
      change: split the current broad audio/acoustic strip into explicit bottom-left
        audio and separate USB/flex zones
      reason: a single 57 x 8 mm strip overlaps USB-C and bottom split-interconnect
        regions
    - refdes_group: SW_POWER_VOL
      change: route side keys through a short side-key flex tail from the top island
        instead of consuming the left RF edge
      reason: the known Wi-Fi/Bluetooth module needs the lower-left top-island area
        without overlapping cellular or buttons
  required_before_routed_release:
    - repack U_CELL for the selected 29 x 32 mm RG255C LGA plus RF keepouts or choose
      a smaller orderable cellular module before EVT1 routing
    - obtain primary front/rear camera XY and z-height drawings
    - keep 25 x 24 mm Junde/IMX219 camera alternate out of the current 17 x 13 mm
      camera/FPC region unless the top-right camera/display/flex stack is widened
    - rerun RF antenna keepout and cellular/Wi-Fi coexistence placement with supplier
      reference layouts
    - rerun routed STEP/enclosure clearance once supplier 3D models are available
routed_release_output_dependencies:
  - id: pcb_drc_report
    expected_path: board/kicad/e1-phone/production/reports/drc.json
    present: false
    release_required: true
    blocker: no release-approved routed copper, filled zones, or DRC evidence
  - id: routed_kicad_pcb
    expected_path: board/kicad/e1-phone/pcb/e1-phone-mainboard-routed.kicad_pcb
    present: false
    release_required: true
    blocker: routed KiCad PCB exists only as a blocked local candidate; production
      source remains a concept placeholder scaffold
  - id: filled_zones
    expected_path: board/kicad/e1-phone/production/reports/zone-fill.json
    present: false
    release_required: true
    blocker: no copper zones are present in the current board state
  - id: enclosure_clearance_report_using_routed_step
    expected_path: mechanical/e1-phone/review/routed-board-clearance.json
    present: false
    release_required: true
    blocker: current enclosure fit uses concept CAD, not routed-board STEP with final
      component heights
  - id: si_pi_reports
    expected_path: board/kicad/e1-phone/production/reports/si-pi
    present: false
    release_required: true
    blocker: USB, MIPI, PCIe, LPDDR, UFS, power-rail, and return-path reports missing
  - id: rf_reports
    expected_path: board/kicad/e1-phone/production/reports/rf
    present: false
    release_required: true
    blocker: antenna matching, conducted, coexistence, GNSS, and SAR evidence missing
  - id: power_thermal_measurements
    expected_path: board/kicad/e1-phone/production/reports/power-thermal
    present: false
    release_required: true
    blocker: rail sequencing, load-step, charge, discharge, and thermal measurements
      missing
  - id: factory_test_limits
    expected_path: board/kicad/e1-phone/production/test/factory-test-limits.yaml
    present: false
    release_required: true
    blocker: factory limits for rails, USB-C, radios, display, cameras, audio, buttons,
      and split interconnect missing
cross_checks:
  scorecard_geometry_matches_display_fit: true
  live_utilization_matches_scorecard_pressure: true
  route_density_matches_feasibility: true
  repack_candidate_overlap_free_and_matches_active_matrix: true
  battery_window_has_no_live_or_candidate_intrusions: true
  junde_camera_alternate_remains_rejected: true
  wifi_and_side_button_known_outlines_fit_regions: true
  release_outputs_all_blocked: true
release_blockers:
  - supplier footprints, courtyards, component heights, and STEP models are missing
  - routed courtyard utilization, escape-density, via-count, and DRC reports are missing
  - screen/camera connector and primary camera XY/Z supplier drawings are missing
  - power efficiency, thermal soak, RF, coexistence, SAR, and factory measurements
    are missing
  - routed board STEP and routed STEP release-clearance result are missing
forbidden_claims:
  - board_size_optimized_final
  - layout_release_ready
  - route_feasible
  - wasted_space_final
  - power_efficient
  - thermal_closed
  - rf_ready
  - enclosure_ready
  - fabrication_ready
  - end_to_end_phone_ready
