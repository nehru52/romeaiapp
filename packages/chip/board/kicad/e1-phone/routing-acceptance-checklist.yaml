schema: eliza.e1_phone_routing_acceptance_checklist.v1
status: blocked_routing_acceptance_requires_supplier_footprints_trial_route_drc_and_outputs
date: '2026-05-21'
claim_boundary: Routing acceptance checklist for the compact 64 x 132 mm split-island E1 phone PCB. It links route
  feasibility, EVT1 routing phases, the live KiCad PCB audit, route constraints, manufacturing closure, and routed-release
  outputs. It is not routed copper, not DRC/ERC evidence, not SI/PI/RF signoff, not production export evidence,
  and not enclosure release.
source_artifacts:
  - board/kicad/e1-phone/route-feasibility-density.yaml
  - board/kicad/e1-phone/evt1-routing-work-package.yaml
  - board/kicad/e1-phone/pcb-implementation-audit.yaml
  - board/kicad/e1-phone/manufacturing-closure.yaml
  - board/kicad/e1-phone/routed-release-plan.yaml
  - board/kicad/e1-phone/routing-constraints.yaml
  - board/kicad/e1-phone/supplier-to-kicad-evidence-map.yaml
  - board/kicad/e1-phone/enclosure-tolerance-stack-closure.yaml
  - board/kicad/e1-phone/schematic-netclass-execution-package.yaml
  - board/kicad/e1-phone/route-corridor-execution-package.yaml
  - board/kicad/e1-phone/usb-route-topology-resolution.yaml
  - board/kicad/e1-phone/split-interconnect-pin-allocation.yaml
  - board/kicad/e1-phone/split-interconnect-connector-binding.yaml
routing_summary:
  board_bbox_mm:
    width: 64.0
    height: 132.0
    area_mm2: 8448.0
  physical_pcb_island_area_mm2: 2816.0
  battery_window_mm:
    x: 0.0
    y: 29.5
    width: 64.0
    height: 87.0
    area_mm2: 5568.0
  placement_area_after_battery_and_antenna_keepouts_mm2: 1972.0
  differential_pair_count_required: 24
  declared_concept_net_count: 180
  assigned_concept_pad_net_count: 519
  split_interconnect_min_contacts: 49
  live_pcb_segment_count: 0
  live_pcb_zone_count: 0
  live_pcb_keepout_zone_count: 11
  live_pcb_footprint_count: 87
  live_pcb_net_class_count: 16
  manufacturing_state:
    has_kicad_footprints: true
    has_tracks: false
    has_filled_zones: false
    has_keepout_zones: true
    has_test_point_footprints: true
    has_fiducials: true
    has_mounting_holes: true
    has_production_outputs: false
    kibot_outputs_are_skeleton_commented: true
  route_phase_statuses:
    0_supplier_freeze: blocked_no_signed_supplier_packs
    1_schematic_and_netclass_capture: blocked_schematic_is_scaffold
    2_placement_and_escape: blocked_placeholder_footprints
    3_high_speed_rf_power_route: blocked_no_tracks_or_zones
    4_manufacturing_outputs: blocked_no_production_outputs
    5_routed_step_release_clearance: blocked_waiting_for_physical_routed_board_clearance_result
  route_feasibility_status: blocked_requires_supplier_footprints_escape_analysis_and_trial_route
  evt1_routing_status: blocked_requires_supplier_pinouts_routed_pcb_and_post_route_evidence
  supplier_to_kicad_status: blocked_supplier_evidence_not_ready_for_kicad_capture
  enclosure_tolerance_status: blocked_requires_supplier_geometry_routed_step_and_physical_tolerance_evidence
  schematic_netclass_execution_status: blocked_requires_supplier_symbols_netclass_capture_erc_and_trial_route
  schematic_netclass_domain_count: 10
  route_corridor_execution_status: blocked_requires_supplier_footprints_escape_route_and_drc
  route_corridor_total_count: 32
  usb_route_topology_status: blocked_usb2_route_topology_requires_controlled_impedance_flex_or_topology_change
  usb_route_topology_selected_resolution: controlled_impedance_side_flex_with_signed_usb_si
  usb_route_topology_over_by_mm: 32.5
  split_interconnect_pin_allocation_status: blocked_requires_connector_part_numbers_flex_stackup_si_and_drc
  split_interconnect_allocated_contact_count: 49
  split_interconnect_ground_return_pin_count: 18
  split_interconnect_spare_pin_count: 6
  split_interconnect_connector_binding_status: blocked_placeholder_connectors_bound_to_pin_allocation_not_supplier_release
  split_interconnect_connector_pad_order_bound: true
  present_release_outputs: []
acceptance_items:
  - id: schematic_netclass_execution_package
    owner: ee_layout
    status: blocked_missing_supplier_footprint_route_drc_si_or_production_evidence
    required_evidence:
      - domain-by-domain schematic capture package with real symbols and wires
      - KiCad netclass and differential-pair assignments matching routing-constraints.yaml
      - ERC reports plus supplier-footprint trial-route proof for every domain
    blocker: Schematic/netclass execution package is blocked for all domains.
  - id: supplier_footprints_courtyards_and_3d_models
    owner: ee_layout
    status: blocked_missing_supplier_footprint_route_drc_si_or_production_evidence
    required_evidence:
      - supplier-approved land patterns for every display, camera, USB-C, side-key, battery, radio, audio, and interconnect
        part
      - courtyard, height, keepout, and 3D model binding review
      - KiCad symbol-to-footprint association report
    blocker: Production concept PCB still uses non-release placeholder footprints; local real-footprint development replacements are not supplier release evidence.
  - id: schematic_erc_and_netclass_capture
    owner: ee
    status: blocked_missing_supplier_footprint_route_drc_si_or_production_evidence
    required_evidence:
      - hierarchical KiCad schematic replacing scaffold text symbols
      - ERC clean report or signed waivers under production/reports
      - routing-constraints.yaml impedance and length groups assigned to KiCad net classes
    blocker: Schematic capture and net-class implementation are not release evidence.
  - id: placement_escape_and_trial_route
    owner: layout
    status: blocked_missing_supplier_footprint_route_drc_si_or_production_evidence
    required_evidence:
      - route-corridor-execution-package.yaml reviewed against KiCad placement, netclasses, and keepout zones
      - top and bottom island placement review using exact courtyards
      - SoC/LPDDR/UFS, PMIC, display/camera, RF, USB-C, and split-interconnect escape trial route
      - routed-courtyard utilization, via-count, and escape-density reports
    blocker: Route feasibility is still a density model with no supplier-footprint trial route.
  - id: high_speed_mipi_usb_pcie_memory_route
    owner: signal_integrity
    status: blocked_missing_supplier_footprint_route_drc_si_or_production_evidence
    required_evidence:
      - usb-route-topology-resolution.yaml selected path implemented or topology changed
      - split-interconnect-pin-allocation.yaml USB2 pins, return pins, and spares reviewed against selected connector
      - split-interconnect-connector-binding.yaml placeholder pad order replaced with supplier symbol/footprint
        pin-map evidence
      - routed USB2, MIPI DSI/CSI, PCIe, LPDDR, UFS, and split-interconnect constraints
      - post-route length, skew, impedance, via-count, and return-path report
      - stackup and impedance coupon quote from selected fabricator
    blocker: No routed tracks, post-route measurements, or fabricator stackup evidence exist.
  - id: rf_power_thermal_and_factory_test_route
    owner: layout_validation
    status: blocked_missing_supplier_footprint_route_drc_si_or_production_evidence
    required_evidence:
      - RF feeds, matching networks, and conducted access placed and routed
      - VBUS/SYS/VBAT/RF_VBAT high-current copper and thermal spreading review
      - factory probe coordinates and first-article test limit outputs
    blocker: RF, power, thermal, and factory-test routing are only scaffolded.
  - id: drc_erc_zone_fill_and_copper_release
    owner: layout
    status: blocked_missing_supplier_footprint_route_drc_si_or_production_evidence
    required_evidence:
      - filled copper zones and stitching strategy
      - KiCad DRC clean report or signed waivers
      - ERC/DRC release archive tied to routed board revision
    blocker: Live KiCad audit shows zero segments and zero zones.
  - id: production_fab_assembly_exports
    owner: manufacturing
    status: blocked_missing_supplier_footprint_route_drc_si_or_production_evidence
    required_evidence:
      - Gerber X2 or IPC-2581, NC drill, pick-and-place, BOM/AVL, and assembly drawing
      - stencil notes, DFM/DFA quote, stackup, and impedance table
      - fabricator and assembler quote tied to the routed revision
    blocker: Production manufacturing outputs are absent.
  - id: routed_board_step_and_enclosure_rerun
    owner: mechanical
    status: blocked_missing_supplier_footprint_route_drc_si_or_production_evidence
    required_evidence:
      - routed KiCad STEP with supplier component models
      - mechanical routed-board clearance rerun for display, battery, USB-C, side keys, cameras, antennas, acoustics,
        and interconnect
      - full CAD boolean interference report and enclosure tolerance release pack
    blocker: Enclosure clearance still uses concept CAD, not a routed board STEP.
cross_checks:
  live_pcb_has_no_tracks_or_zones: true
  route_feasibility_blocks_trial_route: true
  evt1_route_phases_all_blocked: true
  required_output_manifest_all_blocked: true
  routing_constraints_complexity_matches_feasibility: true
  supplier_to_kicad_blocks_footprint_freeze: true
  enclosure_rerun_waits_for_routed_step: true
  schematic_netclass_execution_blocks_route_acceptance: true
  route_corridor_execution_blocks_route_acceptance: true
  usb_route_topology_blocks_route_acceptance: true
  split_interconnect_pin_allocation_blocks_route_acceptance: true
  split_interconnect_connector_binding_blocks_route_acceptance: true
  all_acceptance_items_blocked: true
release_blockers:
  - supplier pinouts, land patterns, courtyards, and 3D models are missing
  - KiCad schematic remains scaffold-level and ERC evidence is missing
  - route corridors are planned but not routed copper or DRC evidence
  - USB2 bottom-port to top-SoC topology exceeds concept length target until controlled-impedance flex or topology
    change is proven
  - split-interconnect pin allocation is concrete but still lacks orderable connector, flex stackup, SI, and DRC
    evidence
  - split-interconnect placeholder pad order now follows the allocation but still lacks real connector symbols,
    supplier footprints, ERC, and DRC
  - production concept PCB has placeholder footprints, zero routed segments, and zero filled zones; local routed real-footprint development board is non-release
  - current PCB keepout zones are present but do not replace routed copper, DRC, or enclosure clearance evidence
  - route feasibility has no supplier-footprint trial-route evidence
  - post-route SI/PI/RF/power reports, DRC, production outputs, and supplier-approved routed STEP are missing
  - enclosure clearance has not been rerun from a routed board STEP
forbidden_claims:
  - route_feasible
  - evt1_route_ready
  - routed_pcb_ready
  - drc_clean
  - erc_clean
  - production_outputs_ready
  - enclosure_ready
  - fabrication_ready
  - end_to_end_phone_ready
