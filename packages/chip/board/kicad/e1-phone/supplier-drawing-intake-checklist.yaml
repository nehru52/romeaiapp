schema: eliza.e1_phone_supplier_drawing_intake_checklist.v1
status: blocked_supplier_drawing_intake_required_before_real_footprints_or_route
date: '2026-05-21'
claim_boundary: Supplier drawing intake checklist only. This is a fail-closed gate for incoming supplier response
  packs before real KiCad symbols, footprints, 3D STEP bindings, routing, or enclosure clearance may be treated
  as release evidence.
source_artifacts:
  - board/kicad/e1-phone/supplier-rfq-intake.yaml
  - board/kicad/e1-phone/supplier-rfq-transmittal-drafts.yaml
  - board/kicad/e1-phone/supplier-to-kicad-evidence-map.yaml
  - board/kicad/e1-phone/pinout-footprint-freeze.yaml
  - board/kicad/e1-phone/display-camera-acceptance-checklist.yaml
  - board/kicad/e1-phone/usb-sidekey-acceptance-checklist.yaml
  - board/kicad/e1-phone/module-host-integration-acceptance-checklist.yaml
  - board/kicad/e1-phone/radio-antenna-acceptance-checklist.yaml
  - board/kicad/e1-phone/power-bringup-acceptance-checklist.yaml
upstream_status:
  rfq_status: blocked_waiting_supplier_quote_drawing_sample_and_approval_packs
  rfq_drafts_status: drafts_prepared_not_sent_not_supplier_evidence
  supplier_to_kicad_status: blocked_supplier_evidence_not_ready_for_kicad_capture
  pinout_freeze_status: blocked_pinout_footprint_freeze_missing_supplier_evidence
  display_camera_acceptance_status: blocked_display_camera_acceptance_requires_supplier_route_bringup_capture_and_clearance
  usb_sidekey_acceptance_status: blocked_usb_c_sidekey_acceptance_requires_supplier_route_enclosure_and_measurements
  module_host_acceptance_status: blocked_module_host_integration_requires_supplier_pinouts_routed_host_buses_firmware_identity_and_factory_evidence
  radio_antenna_acceptance_status: blocked_radio_antenna_acceptance_requires_supplier_route_firmware_regulatory_and_measurements
  power_bringup_acceptance_status: blocked_power_bringup_acceptance_requires_routed_schematic_first_power_charge_thermal_and_factory_evidence
intake_policy:
  sample_receipt_required_before_pinout_freeze: true
  minimum_sample_lot_per_candidate: 5
  accepted_response_format: supplier signed PDF or native CAD plus machine-readable summary
  all_core_paths_required_before_real_footprint:
    - rfq_response_pack
    - signed_2d_drawing
    - pinout_or_pad_map
    - recommended_land_pattern
    - step_or_brep_model
    - sample_inspection
    - compliance_pack
    - pinout_review_signoff
    - symbol_review
    - footprint_review
    - footprint_3d_binding
