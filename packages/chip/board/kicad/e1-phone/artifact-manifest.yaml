  - board_fabrication_ready
  - enclosure_ready
  - production_bom_ready
  - rf_ready
  - power_thermal_ready
  - end_to_end_phone_ready

release_blockers:
  - top-level manifest cannot release parseable 055WU01 or E549/RM67191 display alternates until supplier, sample, route, validation, factory, first-article, and enclosure evidence all exist
  - top-level manifest cannot release selected screen, USB-C, power-key, or volume-key interfaces until supplier drawings, routed evidence, enclosure clearance, measurements, and first-article evidence exist
  - top-level manifest cannot release selected cellular, Wi-Fi, or Bluetooth modules until supplier design packs, routed RF, firmware, regulatory, factory, first-article, and enclosure evidence exist
  - top-level manifest cannot release the optimized board size/layout until routed utilization, escape density, DRC/ERC, SI/PI, power/thermal, RF, factory, routed STEP, and enclosure clearance evidence all exist
  - top-level manifest cannot release KiCad capture or routing until supplier response packs, pinout reviews, symbol reviews, footprint reviews, and 3D bindings are complete
  - top-level manifest cannot release routed PCB, fabrication, enclosure, or end-to-end readiness until real schematic, routed copper, ERC/DRC, fabrication outputs, routed STEP, post-route validation, and first-article evidence exist
  - top-level manifest cannot release enclosure placement until routed board STEP, supplier geometry, routed clearance cases, boolean interference, physical fit, functional logs, and first-article enclosure evidence exist
  - top-level manifest cannot release production, factory test, first article, or end-to-end readiness until routed fabrication outputs, BOM/AVL, assembly package, fixture limits, RF identity traceability, quotes, and first-article signoff exist
  - top-level manifest cannot release the end-to-end phone package until every objective requirement is satisfied and fabrication, enclosure, factory, supplier, validation, and first-article gates all close
