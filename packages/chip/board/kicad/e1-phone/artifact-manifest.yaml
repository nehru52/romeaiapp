release_gates:
  schematic:
    status: missing
    required_evidence:
      - KiCad hierarchical schematic with every major block in placement-interface-matrix.yaml.
      - Block netlist in board/kicad/e1-phone/block-netlist.yaml converted
        into real KiCad schematic nets.
      - Exact supplier connector pinouts for display, cameras, side-key flex,
        USB-C, battery, speakers, microphones, antennas, SIM/eSIM, and test.
      - ERC clean or justified waivers.
  routed_pcb:
    status: blocked_local_routed_candidate_not_release
    source_artifacts:
      - board/kicad/e1-phone/pcb/e1-phone-mainboard-routed.kicad_pcb
      - board/kicad/e1-phone/pcb/e1-phone-mainboard-routed.kicad_pcb.metadata.yaml
      - board/kicad/e1-phone/routed-pcb-implementation-execution.yaml
      - board/kicad/e1-phone/routed-layout-readiness-binding.yaml
      - board/kicad/e1-phone/routed-board-step-export-contract.yaml
      - board/kicad/e1-phone/production/routed-output-candidate-manifest-2026-05-22.yaml
    local_candidate_evidence:
      routed_kicad_candidate_present: true
      placeholder_marker_count: 0
      segment_count: 306
      via_count: 24
      filled_zone_count: 6
      routed_step_candidate: board/kicad/e1-phone/production/step/routed-board-with-components.step
      evidence_class: blocked_local_candidate_outputs_not_release
      release_credit: false
    required_evidence:
      - Routed release output manifest in board/kicad/e1-phone/routed-release-plan.yaml
        closed with every release-required output present.
      - Routed KiCad PCB with footprints, nets, differential-pair constraints,
        keepouts, copper pours, test points, fiducials, and mounting features.
      - Routing constraints in board/kicad/e1-phone/routing-constraints.yaml
        assigned to KiCad net classes and verified after route.
      - DRC clean or justified waivers.
      - Computed board utilization from real component courtyards and no-route
        zones, replacing the concept-only gr_rect report in
        board/kicad/e1-phone/layout-utilization.yaml.
    release_allowed: false
  enclosure:
    status: blocked_local_cad_incomplete_and_release_requires_supplier_models_routed_clearance_and_first_article
    source_artifacts:
      - board/kicad/e1-phone/enclosure-mechanical-release-burndown-2026-05-22.yaml
      - board/kicad/e1-phone/enclosure-physical-fit-first-article-execution.yaml
      - mechanical/e1-phone/review/board-step-readiness.json
      - mechanical/e1-phone/review/routed-board-clearance.json
      - mechanical/e1-phone/review/full-cad-boolean-interference.json
      - mechanical/e1-phone/review/mechanical-cad-evidence-inventory-2026-05-22.yaml
    local_candidate_evidence:
      routed_board_step_candidate_present: true
      full_cad_boolean_status: blocked_boolean_interference_incomplete
      full_cad_boolean_evidence_class: concept_envelope_brep_boolean_interference_result
      full_cad_boolean_release_credit: false
      routed_clearance_status: blocked_waiting_for_physical_routed_board_clearance_result
      supplier_approved_component_model_count: 0
      release_credit: false
    required_evidence:
      - STEP assembly with board, display, battery, camera modules, USB-C,
        side buttons, speaker chambers, antennas, and midframe/rear cover.
      - Tolerance stack proving the 11.8 mm flush-back thickness target.
      - USB-C insertion load and side-button load path review.
    release_allowed: false
  power_thermal:
    status: missing
    required_evidence:
      - Rail-by-rail schematic review, PI simulation, regulator load steps,
        thermal simulation, and measured first-article power logs.
  rf_si:
    status: missing
    required_evidence:
      - MIPI/USB/PCIe/SDIO SI review.
      - Cellular/Wi-Fi/GNSS/NFC antenna and matching review.
      - VNA, conducted, coexistence, and SAR pre-scan evidence.
  manufacturing:
    status: missing
    required_evidence:
      - Production BOM/AVL, Gerber X2 or IPC-2581, drill files, pick-and-place,
        assembly drawing, STEP, test plan, DFM/DFA review, and fab quote.

