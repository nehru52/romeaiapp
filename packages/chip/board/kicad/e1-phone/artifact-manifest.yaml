schema: eliza.e1_phone_board_artifact_manifest.v1
status: blocked_not_fabrication_ready
date: 2026-05-20
claim_boundary: >
  This manifest records the current phone mainboard artifact package and the
  evidence required before claiming the PCB is finished end-to-end and ready
  for enclosure placement. Current artifacts are concept and planning evidence
  only.

design_target:
  display_anchor: 5.5_in_1080x1920_MIPI_LCM_CTP
  board_bbox_mm: {width: 64.0, height: 132.0}
  device_envelope_mm: {width: 78.0, height: 153.6, max_thickness: 11.8}
  battery_window_mm: {width: 64.0, height: 87.0}
  usb_c_ports: 1
  side_buttons: [power, volume_up, volume_down]
  radios: [5g_redcap_cellular, wifi_6e, bluetooth_5_3, gnss_optional, nfc_optional]

