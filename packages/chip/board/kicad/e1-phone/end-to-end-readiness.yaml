  component_height_and_enclosure_step:
    requirement: Prove the routed PCB with final component heights can be placed inside the enclosure.
    evidence_artifact: board/kicad/e1-phone/enclosure-fit-execution-package.yaml
    current_status: blocked_requires_routed_board_step_supplier_geometry_and_physical_fit_results
    objective_satisfied: false
