schema: eliza.e1_phone_end_to_end_readiness.v1
status: blocked_not_end_to_end_ready_or_enclosure_ready
date: '2026-05-21'
claim_boundary: Objective-level readiness matrix for the E1 phone PCB. This maps the requested screen fit, user-facing hardware,
  OEM sourcing, wireless modules, board optimization, routed PCB, manufacturing, and enclosure requirements to current evidence.
  It is not a release approval and does not make the PCB fabrication-ready or enclosure-ready.
