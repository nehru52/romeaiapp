design_target:
  display_anchor: 5.5_in_1080x1920_MIPI_LCM_CTP
  board_bbox_mm:
    width: 64.0
    height: 132.0
  device_envelope_mm:
    width: 78.0
    height: 153.6
    max_thickness: 11.8
  battery_window_mm:
    width: 64.0
    height: 87.0
  usb_c_ports: 1
  side_buttons:
    - power
    - volume_up
    - volume_down
  radios:
    - 5g_redcap_cellular
    - wifi_6e
    - bluetooth_5_3
    - gnss_optional
    - nfc_optional
current_board_state:
  artifact_manifest_status: blocked_not_fabrication_ready
  schematic_symbol_footprint_status: blocked_requires_real_kicad_symbols_supplier_footprints_and_erc
  route_feasibility_status: blocked_requires_supplier_footprints_escape_analysis_and_trial_route
  evt1_routing_status: blocked_requires_supplier_pinouts_routed_pcb_and_post_route_evidence
  routed_release_plan_status: blocked_routed_release_requires_real_route_and_supplier_outputs
  routed_pcb_implementation_execution_status: blocked_requires_supplier_footprints_schematic_erc_trial_route_drc_outputs_and_routed_step
  routed_layout_readiness_status: blocked_layout_readiness_requires_routed_pcb_drc_si_pi_rf_factory_outputs_and_enclosure_clearance
  first_article_route_execution_order_status: blocked_first_article_route_requires_ordered_supplier_schematic_layout_factory_and_enclosure_evidence
  post_route_validation_binding_status: blocked_post_route_validation_requires_routed_drc_si_pi_rf_power_factory_and_enclosure_evidence
  pcb_implementation_audit_status: blocked_live_kicad_pcb_scaffold_audited_not_routed
  live_utilization_audit_status: blocked_live_courtyard_utilization_not_routed_or_supplier_ready
  layout_optimization_execution_status: blocked_concept_layout_optimized_requires_supplier_footprints_trial_route_measurements_and_routed_step
  display_camera_source_revalidation_status: public_sources_revalidated_screen_camera_not_supplier_approved
  display_camera_connector_pinout_execution_status: blocked_requires_supplier_display_camera_pinouts_connector_mpn_footprints_and_step
  usb_sidekey_selection_wiring_decision_status: blocked_usb_sidekey_selection_requires_supplier_drawings_real_schematic_route_measurements_and_enclosure_load_path
  usb_sidekey_acceptance_status: blocked_usb_c_sidekey_acceptance_requires_supplier_route_enclosure_and_measurements
  radio_module_selection_wiring_decision_status: blocked_radio_module_selection_requires_supplier_design_packs_region_decision_routed_rf_and_firmware_evidence
  wireless_module_release_execution_status: blocked_wireless_module_release_requires_cellular_branch_decision_supplier_design_packs_routed_rf_firmware_regulatory_and_factory_logs
  module_rf_pinout_execution_status: blocked_requires_cellular_wifi_module_pinouts_reference_layouts_rf_feeds_firmware_and_factory_evidence
  board_optimization_scorecard_status: blocked_concept_optimized_but_not_routed_or_enclosure_ready
  production_status: blocked_requires_routed_board_supplier_data_and_factory_quotes
  manufacturing_status: blocked_manufacturing_requires_routed_pcb_and_fab_outputs
  supplier_rfq_response_normalization_status: blocked_response_normalization_ready_no_supplier_responses_received
  supplier_sample_release_gate_status: blocked_supplier_samples_response_packs_and_reviews_required_before_layout_release
  production_factory_release_execution_status: blocked_requires_routed_release_supplier_packs_fab_assembly_fixture_and_first_article
  enclosure_status: enclosure_placement_cross_checked_not_release_ready
  enclosure_fit_execution_status: blocked_requires_routed_board_step_supplier_geometry_and_physical_fit_results
  factory_probe_status: blocked_requires_routed_board_fixture_and_first_article_limits
objective_requirements:
  popular_screen_size_fit:
    requirement: Optimize device and board size around a popular/easy 5.5 inch 1080x1920 MIPI CTP display.
    evidence_artifact: board/kicad/e1-phone/display-envelope-downselect.yaml
    current_status: blocked_display_envelope_downselect_requires_signed_display_stack_connector_and_routed_clearance
    objective_satisfied: false
    release_required: true
    blockers: &id001
      - display supplier signed 2D drawing, FPC pinout, connector MPN, panel init sequence, touch-controller data, and STEP
        model missing
      - rear and front camera drawings, exact FPC pinouts, mating connector MPNs, STEP models, driver notes, and calibration
        data missing
      - routed MIPI DSI/CSI length-skew, impedance, return-path, and DRC evidence missing
      - display bring-up, touch probe, V4L2 or Android Camera HAL capture, and image-quality logs missing
      - routed-board STEP clearance for display FPC bend, camera lens stack, earpiece, cover glass, and enclosure datums missing
    required_release_outputs: &id002
      - board/kicad/e1-phone/production/reports/display-camera-oem-integration.yaml
      - board/kicad/e1-phone/production/sourcing/display-touch-signed-drawing.pdf
      - board/kicad/e1-phone/production/sourcing/display-touch-fpc-pinout.yaml
      - board/kicad/e1-phone/production/step/display-touch-stack.step
      - board/kicad/e1-phone/production/reports/display-touch-bringup-log.json
      - board/kicad/e1-phone/production/reports/mipi-dsi-length-skew-impedance.json
      - board/kicad/e1-phone/production/sourcing/rear-camera-signed-drawing.pdf
      - board/kicad/e1-phone/production/sourcing/front-camera-signed-drawing.pdf
      - board/kicad/e1-phone/production/sourcing/camera-fpc-pinouts.yaml
      - board/kicad/e1-phone/production/step/rear-camera-module.step
      - board/kicad/e1-phone/production/step/front-camera-module.step
      - board/kicad/e1-phone/production/reports/camera-capture-log.json
      - board/kicad/e1-phone/production/reports/mipi-csi-length-skew-impedance.json
      - board/kicad/e1-phone/production/reports/camera-iq-calibration-plan.yaml
  screen_camera_oem_sourcing:
    requirement: Use Alibaba/Made-in-China display and camera OEM sourcing evidence and require supplier packs before freeze.
    evidence_artifact: board/kicad/e1-phone/display-camera-oem-source-revalidation.yaml
    current_status: public_sources_revalidated_screen_camera_not_supplier_approved
    objective_satisfied: false
    release_required: true
    blockers: *id001
    required_release_outputs: *id002
  usb_c_power_volume_hardware:
    requirement: Review and wire one USB-C port, USB-PD, charger, power button, and volume buttons.
    evidence_artifact: board/kicad/e1-phone/usb-sidekey-selection-wiring-decision.yaml
    current_status: blocked_usb_sidekey_selection_requires_supplier_drawings_real_schematic_route_measurements_and_enclosure_load_path
    selected_stack:
      usb_c_connector: GCT_USB4105
      usb_pd_controller: TPS65987DDH
      charger_power_path: MAX77860
      side_key_primary: Panasonic_EVQ-P7_EVQ-P3_EVQ-9P7
    objective_satisfied: false
    release_required: true
    blockers:
      - USB-C receptacle drawing, land pattern, shell load path, ESD, and STEP evidence missing
      - USB-PD controller firmware, CC attach, dead-battery boot, PPS, and Type-C class logs missing
      - charger CC/CV cycle, NTC/pack-ID readback, JEITA, current-limit, and surge validation missing
      - side-key flex or switch drawing, force/travel, ESD, wake, and recovery-combo evidence missing
      - routed schematic, ERC, routed PCB, DRC, SI/PI, and enclosure clearance rerun missing
    required_release_outputs:
      - board/kicad/e1-phone/production/reports/usb-sidekey-integration.yaml
      - board/kicad/e1-phone/production/sourcing/usb-c-signed-drawing.pdf
      - board/kicad/e1-phone/production/sourcing/side-key-signed-drawing.pdf
      - board/kicad/e1-phone/production/reports/usb-c-pd-attach-log.json
      - board/kicad/e1-phone/production/reports/usb2-adb-fastboot-attach-log.json
      - board/kicad/e1-phone/production/reports/charger-cc-cv-cycle.json
      - board/kicad/e1-phone/production/reports/side-button-force-travel.csv
      - board/kicad/e1-phone/production/reports/button-wake-recovery-log.json
      - mechanical/e1-phone/review/routed-board-clearance.json
  off_the_shelf_wireless_modules:
    requirement: Use easy-to-acquire off-the-shelf cellular, Wi-Fi, and Bluetooth modules and wire host/RF contracts.
    evidence_artifact: board/kicad/e1-phone/wireless-module-release-execution.yaml
    current_status: blocked_wireless_module_release_requires_cellular_branch_decision_supplier_design_packs_routed_rf_firmware_regulatory_and_factory_logs
    selected_stack:
      cellular_performance_reference: Quectel_RG255C_or_RM255C_5G_RedCap_Sub_6
      active_space_saving_rfq_branch: quectel_eg915q_na_or_eg915u_class
      wifi_bluetooth_primary: Murata_LBEE5XV2EA-802_Infineon_CYW55573
      rf_feed_count_required: 5
    objective_satisfied: false
    release_required: true
    blockers:
      - cellular module region SKU, band matrix, hardware design guide, STEP, RF feed rules, and SIM/eSIM path are missing
      - Wi-Fi/Bluetooth footprint, firmware/NVRAM/CLM, license, country-code, and modular approval scope are missing
      - routed RF feed geometry, matching networks, via fences, shields, and conducted access are missing
      - VNA, conducted RF, coexistence, GNSS desense, SAR pre-scan, and carrier/PTCRB/GCF evidence are missing
      - factory RF calibration procedure, test limits, and first-article transcript are missing
      - Android/Linux cellular, Wi-Fi, and Bluetooth bring-up logs are missing
    required_release_outputs:
      - board/kicad/e1-phone/production/reports/radio-module-integration.yaml
      - board/kicad/e1-phone/production/reports/rf/vna-s11-s21.json
      - board/kicad/e1-phone/production/reports/rf/conducted-cellular-wifi-bt.json
      - board/kicad/e1-phone/production/reports/rf/coexistence-matrix.json
      - board/kicad/e1-phone/production/reports/rf/sar-prescan-summary.pdf
      - board/kicad/e1-phone/production/test/rf-calibration-procedure.pdf
      - board/kicad/e1-phone/production/test/first-article-test-transcript.json
      - package/wifi/evidence/firmware
      - package/wifi/evidence/regulatory
      - package/cellular/evidence/carrier-certification
  board_size_power_rf_thermal_optimization:
    requirement: Optimize board size, wasted space, route density, power efficiency, thermal, RF, and factory-test access.
    evidence_artifact: board/kicad/e1-phone/layout-optimization-execution.yaml
    current_status: blocked_concept_layout_optimized_requires_supplier_footprints_trial_route_measurements_and_routed_step
    objective_satisfied: false
    release_required: true
    blockers:
      - supplier footprints and final courtyards are not loaded
      - routed courtyard utilization and escape-density reports are missing
      - routed board STEP and selected battery swelling envelope clearance are missing
      - local routed KiCad PCB candidate has tracks and filled zones for review only; release DRC and post-route reports are missing
      - real supplier footprints, courtyards, and STEP models are missing
      - routed-courtyard utilization and escape-density reports are missing
      - SI/PI, power efficiency, thermal soak, RF, coexistence, and SAR evidence are missing
      - local routed board STEP candidate exists for review only; supplier-approved routed STEP and formal enclosure tolerance stack are missing
      - factory probe coordinates, limits, and first-article transcript are missing
    required_release_outputs:
      - board/kicad/e1-phone/production/reports/live-utilization-audit.yaml
      - board/kicad/e1-phone/production/reports/routed-courtyard-utilization.yaml
      - board/kicad/e1-phone/production/reports/escape-density-via-count.yaml
      - board/kicad/e1-phone/production/step/routed-board-with-components.step
      - mechanical/e1-phone/review/routed-board-clearance.json
      - board/kicad/e1-phone/production/reports/board-optimization-scorecard.yaml
      - board/kicad/e1-phone/production/reports/routed-courtyard-utilization.yaml
      - board/kicad/e1-phone/production/reports/escape-density-via-count.yaml
      - board/kicad/e1-phone/production/reports/power-thermal/rail-efficiency-and-soak.json
      - board/kicad/e1-phone/production/reports/rf/antenna-coexistence-sar-prescan
      - mechanical/e1-phone/review/routed-board-clearance.json
  supplier_footprints_pinouts_and_3d_models:
    requirement: Convert supplier evidence into frozen KiCad symbols, footprints, pinouts, and 3D model bindings.
    evidence_artifact: board/kicad/e1-phone/supplier-to-kicad-evidence-map.yaml
    current_status: blocked_supplier_evidence_not_ready_for_kicad_capture
    objective_satisfied: false
    release_required: true
    blockers:
      - RFQ transmittal packages have not been sent and archived
      - supplier RFQ response packs are missing
      - pinout review signoffs are missing
      - symbol review signoffs are missing
      - footprint review signoffs are missing
      - footprint-to-3D-model bindings are missing
      - sample inspection and compliance packs are missing
    required_release_outputs:
      - board/kicad/e1-phone/production/reports/supplier-to-kicad-evidence-map.yaml
      - board/kicad/e1-phone/production/sourcing/*/rfq-transmittal.yaml
      - board/kicad/e1-phone/production/reports/pinout-review
      - board/kicad/e1-phone/production/reports/symbol-review
      - board/kicad/e1-phone/production/reports/footprint-review
      - board/kicad/e1-phone/production/reports/footprint-3d-binding
      - board/kicad/e1-phone/production/sourcing
  schematic_and_pcb_routed_release:
    requirement: Finish the PCB end-to-end with real schematic, routed KiCad board, ERC, DRC, SI/PI, and post-route reports.
    evidence_artifact: board/kicad/e1-phone/routed-pcb-implementation-execution.yaml
    current_status: blocked_requires_supplier_footprints_schematic_erc_trial_route_drc_outputs_and_routed_step
    objective_satisfied: false
    release_required: true
    blockers:
      - all E1Phone:* footprints are non-release placeholders excluded from BOM and position files
      - production concept source has no release-approved routed copper segments or filled zones
      - supplier connector/module land patterns and STEP models have not replaced placeholders
      - DRC, ERC, SI/PI, RF, fabrication, assembly, and routed enclosure clearance evidence are missing
      - supplier pinouts, footprints, mating connector data, and STEP models are not frozen
      - KiCad schematic remains scaffold text and has no ERC release report
      - production concept PCB has placeholder footprints, no release-approved routed tracks, and no filled zones; local routed real-footprint development board is non-release
      - route feasibility and escape density are not proven with supplier footprints and a trial route
      - module host integration closure is blocked on supplier pinouts, real schematic capture, routed host interfaces, firmware,
        RF, and bring-up evidence
      - external interface design review is blocked on supplier drawings, routed STEP clearance, and measured USB-C, display,
        camera, and side-key validation
      - enclosure tolerance stack closure is blocked until routed board STEP, supplier geometry, GD&T, lifecycle, environmental,
        and interference evidence exist
      - schematic-symbol-footprint closure is blocked until real KiCad symbols, supplier footprints, pinout signoff, 3D model
        binding, and ERC evidence exist
      - board optimization scorecard remains blocked until routed utilization, power/thermal, RF, factory-test, and enclosure
        evidence exist
      - power sequence bring-up closure is blocked until first-power, rail scope, charger, regulator, firmware, and thermal
        evidence exist
      - RF antenna coexistence closure is blocked until tuned feeds, VNA, conducted RF, coexistence, firmware/regulatory,
        carrier, and SAR evidence exist
      - fabricator stackup and impedance coupon geometry are not selected
      - production Gerber or IPC-2581, drill, position, BOM/AVL, assembly drawing, and STEP outputs are missing
      - local routed real-footprint STEP exists for visual review only; supplier-approved routed board STEP has not been imported into mechanical CAD for enclosure clearance rerun
      - post-route SI/PI/RF/power/thermal and factory first-article evidence is missing
    required_release_outputs:
      - board/kicad/e1-phone/production/reports/pcb-implementation-audit.yaml
      - board/kicad/e1-phone/pcb/e1-phone-mainboard-routed.kicad_pcb
