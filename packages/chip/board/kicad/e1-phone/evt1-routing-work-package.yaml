fixed_geometry_inputs:
  board_bbox_mm: {width: 64.0, height: 132.0}
  top_island_mm: {x: 0.0, y: 0.0, width: 64.0, height: 29.0}
  battery_window_mm: {x: 0.0, y: 29.5, width: 64.0, height: 87.0}
  bottom_island_mm: {x: 0.0, y: 117.0, width: 64.0, height: 15.0}
  device_envelope_mm: {width: 78.0, height: 153.6, max_thickness: 11.8}
  display_anchor: 5.5_in_1080x1920_MIPI_LCM_CTP
  route_shield_test_reserve_pct_target: 10.6

placement_locks_before_route:
  - refdes_group: J_USB_C
    lock_reason: bottom aperture, shell saddle, ESD/current path, and user-visible port location
    required_before_unlock: signed USB-C connector drawing and enclosure aperture review
  - refdes_group: SW_POWER_VOL
    lock_reason: side-key flex exits top-left island and must not intrude into full-width battery cavity
    required_before_unlock: side-key flex drawing, force-travel stack, and enclosure rib review
  - refdes_group: J_DISPLAY_TOUCH
    lock_reason: display FPC bend, 5.5 inch screen datum, touch stack, and top-right connector reach
    required_before_unlock: selected display FPC drawing, mating connector footprint, and STEP model
  - refdes_group: J_CAM0_CAM1
    lock_reason: rear/front camera optical centers, z-height, lens window, and MIPI CSI length control
    required_before_unlock: camera module drawings, pinouts, lens axis datums, and STEP models
  - refdes_group: U_CELL
    lock_reason: top-left RF feed, antenna keepout, conducted test access, SIM/eSIM reach, and module shielding
    required_before_unlock: selected region SKU, reference layout, LGA/M.2 footprint, and RF feed rules
  - refdes_group: U_WIFI_BT
    lock_reason: Wi-Fi/Bluetooth RF feed length, coexistence separation, and antenna keepout
    required_before_unlock: Murata reference layout, antenna rules, firmware/regulatory scope, and STEP model
  - refdes_group: U_PMIC_CHARGER
    lock_reason: short VBUS/SYS/VBAT loops, thermal spreader path, and rail test-point fanout
    required_before_unlock: rail current budget, PMIC/charger layout guide, and thermal review
  - refdes_group: J_BATTERY
    lock_reason: battery tail, VBAT/NTC/ID polarity, pack service clearance, and full-width cavity edge
    required_before_unlock: pack drawing, connector pinout, NTC curve, swelling envelope, and safety document pack
  - refdes_group: U_SOC_LPDDR_UFS
    lock_reason: LPDDR/UFS length matching, decoupling escape, graphite heat path, and debug access
    required_before_unlock: package pin map, memory layout guide, decap strategy, and boot/debug strap policy
  - refdes_group: U_AUDIO_SPK_MIC
    lock_reason: bottom acoustic gasket, speaker/microphone port keepouts, haptic routing, and USB noise separation
    required_before_unlock: speaker, microphone, receiver, codec/amp, haptic, gasket, and acoustic fixture data
  - refdes_group: J_TOP_BOTTOM_FLEX_TOP
    lock_reason: full-width battery cavity requires top/bottom interconnect at top island edge
    required_before_unlock: exact mating connector pair, pin count, mated height, and flex stackup
  - refdes_group: J_TOP_BOTTOM_FLEX_BOTTOM
    lock_reason: bottom island USB/audio/haptic/service routing and fixture access
    required_before_unlock: exact mating connector pair, pin count, mated height, and flex stackup

route_phases:
  - phase: 0_supplier_freeze
    exit_criteria:
      - supplier-rfq-intake.yaml has received signed RFQ response packs
      - external-interface-design-review.yaml supplier drawing requirements are assigned to RFQ owners
      - pinout-footprint-freeze.yaml has every high-risk connector/module footprint frozen
      - production-readiness.yaml has fabricator stackup and coupon geometry selected
    current_status: blocked_no_signed_supplier_packs
  - phase: 1_schematic_and_netclass_capture
    exit_criteria:
      - hierarchical KiCad schematic replaces text scaffolds with reviewed symbols
      - block-netlist.yaml nets are converted into KiCad nets
      - routing-constraints.yaml impedance classes are assigned to KiCad net classes
      - ERC clean or signed waivers captured under production/reports
    current_status: blocked_schematic_is_scaffold
  - phase: 2_placement_and_escape
    exit_criteria:
      - placeholder footprints replaced with supplier land patterns and component heights
      - SoC/LPDDR/UFS escape routes and decoupling fanout reviewed
      - route-feasibility-density.yaml trial-route exit criteria satisfied or topology fallback selected
      - external-interface-design-review.yaml interface locks are satisfied by supplier models and routed STEP keepouts
      - board-optimization-scorecard.yaml routed utilization, RF, power, thermal, and enclosure gates are assigned
      - USB-C, display, camera, radio, battery, side-key, audio, and split-interconnect footprints locked
      - factory-probe-map.yaml nets have accessible test pads or fixture alternatives
    current_status: blocked_placeholder_footprints
  - phase: 3_high_speed_rf_power_route
    exit_criteria:
      - USB2, MIPI DSI/CSI, PCIe, LPDDR, UFS, RF, and split-interconnect constraints routed
      - high-current VBUS/SYS/VBAT/RF_VBAT loops minimized with return stitching
      - antenna feed matching networks and conducted RF access placed
      - DRC clean or signed waivers captured under production/reports
    current_status: blocked_no_tracks_or_zones
  - phase: 4_manufacturing_outputs
    exit_criteria:
      - Gerber X2 or IPC-2581, drill, position, BOM/AVL, assembly drawing, stencil notes, and DFM/DFA quote generated
      - factory probe coordinates and limits generated from routed board and fixture CAD
      - routed board STEP exported with supplier 3D models
    current_status: blocked_no_production_outputs
  - phase: 5_routed_step_release_clearance
    exit_criteria:
      - mechanical/e1-phone/review/board-step-readiness.json passes with production STEP
      - mechanical/e1-phone/review/routed-board-clearance.json completed with measured routed-board release clearances
      - no routed component intersects display, battery, USB-C aperture, side buttons, acoustic paths, antennas, or interconnect
    current_status: blocked_waiting_for_physical_routed_board_clearance_result

netclass_to_release_mapping:
  usb2:
    constraints: [USB_DP_DN, CELL_USB2_DP_DN]
    release_evidence: [post_route_length_report, impedance_coupon, USB2_attach_and_eye_or_functional_log]
  mipi_dphy:
    constraints: [DSI_CLK, DSI_D0, DSI_D1, DSI_D2, DSI_D3, CAM0_CSI_CLK, CAM1_CSI_CLK]
    release_evidence: [post_route_length_report, DPHY_length_skew_review, display_camera_bringup_logs]
  pcie:
    constraints: [WIFI_PCIE_TX, WIFI_PCIE_RX, CELL_PCIE_TX, CELL_PCIE_RX]
    release_evidence: [post_route_length_report, impedance_coupon, module_link_training_log]
  memory_storage:
    constraints: [LPDDR_CK, LPDDR_DQS, LPDDR_CA, UFS_REFCLK, UFS_TX, UFS_RX]
    release_evidence: [memory_length_report, LPDDR_training_log, UFS_link_training_log]
  rf:
    constraints: [CELL_RF_MAIN, CELL_RF_DIV, CELL_GNSS_RF, WIFI_BT_RF0, WIFI_BT_RF1]
    release_evidence: [VNA_report, conducted_RF_report, coexistence_report, SAR_prescan]
  power_integrity:
    constraints: [VBUS_to_charger, charger_to_battery, RF_VBAT_to_cellular]
    release_evidence: [rail_current_budget, load_step_report, thermal_soak_report, charge_cycle_log]
  factory_test:
    constraints: [VBUS, VBAT, SYS, AON_1V8, IO_1V8, RF_VBAT, CAM_AVDD_2V8, DISP_AVDD_5V5]
    release_evidence: [probe_coordinates_csv, factory_test_limits_yaml, first_article_transcript]

selected_hardware_route_sequence:
  status: blocked_selected_hardware_route_sequence_requires_supplier_footprints_pinouts_stackup_trial_route_and_drc
  source_decisions:
    display: board/kicad/e1-phone/display-envelope-downselect.yaml
    camera: board/kicad/e1-phone/camera-module-fit-downselect.yaml
    usb_sidekey: board/kicad/e1-phone/usb-sidekey-selection-wiring-decision.yaml
    radio: board/kicad/e1-phone/radio-module-selection-wiring-decision.yaml
  sequence_is_ordered: true
  route_sequence:
    - order: 0
      id: display_touch_mipi_anchor
      selected_hardware: CH550FH01A-CT
      placement_lock: J_DISPLAY_TOUCH
      corridor_constraints: [DSI_CLK, DSI_D0, DSI_D1, DSI_D2, DSI_D3]
      required_supplier_function: display_touch
      required_before_route:
        - display supplier pinout, connector MPN, land pattern, and STEP model
        - DSI lane order, polarity, TE/reset/touch I2C pins, and display FPC bend datum
        - routed DSI length/skew/impedance and return-path report
      required_release_evidence:
        - board/kicad/e1-phone/production/reports/mipi-dsi-length-skew-impedance.json
        - board/kicad/e1-phone/production/reports/display-touch-bringup-log.json
      blocked: true
    - order: 1
      id: camera_csi_pair
      selected_hardware: Sincere_First_OV13855_rear_and_GC5035_front
      placement_lock: J_CAM0_CAM1
      corridor_constraints: [CAM0_CSI_CLK, CAM1_CSI_CLK]
      required_supplier_function: rear_camera_and_front_camera
      required_before_route:
        - rear and front camera FPC pinouts, connector MPNs, land patterns, and STEP models
        - camera lens-axis, z-height, FPC exit, and cover-glass datums
        - routed CSI length/skew/impedance and return-path report
      required_release_evidence:
        - board/kicad/e1-phone/production/reports/mipi-csi-length-skew-impedance.json
        - board/kicad/e1-phone/production/reports/camera-capture-log.json
      blocked: true
    - order: 2
      id: usb_c_power_sidekey_spine
      selected_hardware: GCT_USB4105_TPS65987DDH_MAX77860_Panasonic_EVQ-P7_EVQ-P3_EVQ-9P7
      placement_lock: J_USB_C_and_SW_POWER_VOL
      corridor_constraints: [USB_DP_DN, VBUS_to_charger, charger_to_battery]
      required_supplier_function: usb_c_receptacle_evt0_and_side_buttons
      required_before_route:
        - USB-C shell/load-path drawing, land pattern, STEP, ESD/CC/VBUS placement plan
        - TPS65987DDH and MAX77860 pinout/configuration and thermal copper review
        - side-key switch or flex drawing, force/travel stack, and enclosure load-path datum
      required_release_evidence:
        - board/kicad/e1-phone/production/reports/usb-c-pd-attach-log.json
        - board/kicad/e1-phone/production/reports/charger-cc-cv-cycle.json
        - board/kicad/e1-phone/production/reports/button-wake-recovery-log.json
      blocked: true
    - order: 3
      id: radio_rf_and_host_escape
      selected_hardware: Quectel_RG255C_or_RM255C_RedCap_reference_plus_Murata_LBEE5XV2EA-802
      placement_lock: U_CELL_and_U_WIFI_BT
      corridor_constraints:
        - CELL_USB2_DP_DN
        - CELL_PCIE_TX
        - CELL_PCIE_RX
        - WIFI_PCIE_TX
        - WIFI_PCIE_RX
        - CELL_RF_MAIN
        - CELL_RF_DIV
        - CELL_GNSS_RF
        - WIFI_BT_RF0
        - WIFI_BT_RF1
      required_supplier_function: cellular_and_wifi_bluetooth
      required_before_route:
        - selected cellular branch, exact region SKU, pad map, reference layout, RF rules, and STEP model
        - Murata Type 2EA land pattern, RF keepout, reference layout, firmware/regulatory scope, and STEP model
        - RF matching/conducted access geometry plus antenna vendor review
      required_release_evidence:
        - board/kicad/e1-phone/production/reports/rf/vna-s11-s21.json
        - board/kicad/e1-phone/production/reports/rf/conducted-cellular-wifi-bt.json
        - board/kicad/e1-phone/production/reports/rf/coexistence-matrix.json
      blocked: true
    - order: 4
      id: factory_probe_and_enclosure_step_route
      selected_hardware: selected_user_facing_and_radio_stack
      placement_lock: factory_probe_and_routed_step
      corridor_constraints: [test_access, enclosure_clearance, manufacturing_outputs]
      required_supplier_function: all_supplier_response_packs
      required_before_route:
        - fixture-access review for rails, USB-C, display, cameras, radios, buttons, audio, and split interconnect
        - routed STEP export with supplier models and no placeholder footprints
        - routed-board release-clearance result and full CAD boolean release
      required_release_evidence:
        - board/kicad/e1-phone/production/test/probe-coordinates.csv
        - board/kicad/e1-phone/production/step/routed-board-with-components.step
        - board/kicad/e1-phone/production/reports/routed-board-clearance-release.yaml
      blocked: true

