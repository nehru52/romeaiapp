schema: eliza.e1_phone_evt1_routing_work_package.v1
status: blocked_requires_supplier_pinouts_routed_pcb_and_post_route_evidence
date: 2026-05-20
claim_boundary: >
  EVT1 routing execution contract for the E1 phone mainboard. This file turns
  the concept placement, package bindings, route constraints, supplier RFQ
  intake, factory probe map, and mechanical routed-board STEP gates into a
  route-owner checklist. It is not a routed PCB, ERC/DRC report, Gerber,
  pick-and-place file, STEP export, or enclosure release.

