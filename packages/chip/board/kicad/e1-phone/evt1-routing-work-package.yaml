cross_checks:
  every_placement_group_has_route_lock: true
  route_phases_fail_closed_until_real_outputs_exist: true
  netclass_mapping_covers_usb_mipi_pcie_memory_rf_power_and_factory_test: true
  route_density_gate_blocks_evt1_until_trial_route_evidence_exists: true
  module_host_integration_blocks_evt1_until_supplier_pinouts_schematic_and_bringup_exist: true
  external_interface_review_blocks_evt1_until_supplier_and_measured_evidence_exists: true
  enclosure_tolerance_stack_blocks_evt1_until_routed_step_supplier_geometry_and_physical_results_exist: true
  schematic_symbol_footprint_blocks_evt1_until_real_symbols_supplier_footprints_and_erc_exist: true
  board_optimization_scorecard_blocks_evt1_until_routed_metrics_and_measurements_exist: true
  power_sequence_bringup_blocks_evt1_until_first_power_scope_and_firmware_logs_exist: true
  rf_antenna_coexistence_blocks_evt1_until_tuned_feeds_firmware_and_regulatory_evidence_exist: true
  selected_hardware_route_sequence_is_ordered_and_fail_closed: true
  required_outputs_match_routed_release_plan: true
  enclosure_rerun_depends_on_routed_board_step: true
  route_geometry_matches_64x132_board_and_64x87_battery_window: true

release_blockers:
  - supplier pinouts, footprints, mating connector data, and STEP models are not frozen
  - KiCad schematic remains scaffold text and has no ERC release report
  - production concept PCB has placeholder footprints, no release-approved routed tracks, and no filled zones; local routed real-footprint development board is non-release
  - route feasibility and escape density are not proven with supplier footprints and a trial route
  - module host integration closure is blocked on supplier pinouts, real schematic capture, routed host interfaces, firmware, RF, and bring-up evidence
  - external interface design review is blocked on supplier drawings, routed STEP clearance, and measured USB-C, display, camera, and side-key validation
  - enclosure tolerance stack closure is blocked until routed board STEP, supplier geometry, GD&T, lifecycle, environmental, and interference evidence exist
  - schematic-symbol-footprint closure is blocked until real KiCad symbols, supplier footprints, pinout signoff, 3D model binding, and ERC evidence exist
  - board optimization scorecard remains blocked until routed utilization, power/thermal, RF, factory-test, and enclosure evidence exist
  - power sequence bring-up closure is blocked until first-power, rail scope, charger, regulator, firmware, and thermal evidence exist
  - RF antenna coexistence closure is blocked until tuned feeds, VNA, conducted RF, coexistence, firmware/regulatory, carrier, and SAR evidence exist
  - fabricator stackup and impedance coupon geometry are not selected
  - production Gerber or IPC-2581, drill, position, BOM/AVL, assembly drawing, and STEP outputs are missing
  - routed board STEP has not been imported into mechanical CAD for routed-board release clearance
  - post-route SI/PI/RF/power/thermal and factory first-article evidence is missing

forbidden_claims:
  - evt1_route_ready
  - routed_pcb_ready
  - fabrication_ready
  - enclosure_ready
  - factory_test_ready
  - power_thermal_ready
  - rf_ready
  - end_to_end_phone_ready
