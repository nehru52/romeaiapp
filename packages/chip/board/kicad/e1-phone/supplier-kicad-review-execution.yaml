    primary_candidate: CH550FH01A-CT
    status: blocked_waiting_supplier_response_pack_and_review
    required_response_pack: board/kicad/e1-phone/production/sourcing/display_touch/rfq-response-pack.yaml
    review_outputs:
      pinout_review: board/kicad/e1-phone/production/reports/pinout-review/display_touch.yaml
      symbol_review: board/kicad/e1-phone/production/reports/symbol-review/display_touch.yaml
      footprint_review: board/kicad/e1-phone/production/reports/footprint-review/display_touch.yaml
      footprint_3d_binding: board/kicad/e1-phone/production/reports/footprint-3d-binding/display_touch.yaml
    approval_gates: &approval_gates
      supplier_response_pack_present: false
      signed_2d_drawing_present: false
      pinout_or_pad_map_present: false
      recommended_land_pattern_present: false
      step_or_brep_model_present: false
      sample_inspection_present: false
      pinout_review_approved: false
      symbol_review_approved: false
      footprint_review_approved: false
      footprint_3d_binding_approved: false
      erc_rerun_after_symbol_capture: false
      drc_rerun_after_footprint_replacement: false
    downstream_unlocks: &downstream_unlocks
      production_symbol_capture: false
      production_footprint_capture: false
      routed_layout: false
      routed_step_export: false
      enclosure_clearance: false
      production_bom_avl: false
      first_article_release: false
