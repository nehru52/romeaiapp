cross_checks:
  functions_match_supplier_to_kicad_evidence_map: true
  review_outputs_match_evt1_footprint_capture_work_package: true
  response_packs_remain_absent: true
  review_outputs_remain_absent: true
  all_approval_gates_fail_closed: true
  all_downstream_unlocks_fail_closed: true
  routing_enclosure_and_production_unlocks_blocked_until_reviews_complete: true

release_blockers:
  - supplier RFQ response packs have not been returned or archived
  - signed drawings, pinouts, land patterns, STEP/B-rep models, samples, and compliance packs are missing
  - pinout, symbol, footprint, and 3D-binding review outputs are absent for every supplier function
  - ERC and DRC reruns after supplier symbol and footprint replacement are missing
  - routing, enclosure clearance, production BOM/AVL, and first article remain locked until every review output is approved

forbidden_claims:
  - supplier_kicad_reviews_complete
  - production_symbols_ready
  - production_footprints_ready
  - step_models_bound
  - routed_layout_ready
  - enclosure_ready
  - fabrication_ready
  - end_to_end_phone_ready
