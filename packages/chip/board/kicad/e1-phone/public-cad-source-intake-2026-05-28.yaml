schema: eliza.e1_phone_public_cad_source_intake.v1
date: '2026-05-28'
status: public_cad_sources_observed_not_release_evidence
claim_boundary: >
  Public manufacturer, distributor, and EDA-library CAD/source links are recorded
  for off-the-shelf component intake triage only. These records do not replace
  supplier-return drawings, approved pad maps, lifecycle/quote evidence, sample
  inspection, or signed release approval.
release_credit: false
release_allowed: false
source_policy:
  preferred_source_order:
    - manufacturer_product_page
    - manufacturer_document_or_download
    - authorized_distributor_product_page
    - authorized_eda_library_link
  release_grade_requires:
    - exact orderable MPN selected in AVL
    - supplier-return or manufacturer-approved drawing package captured locally
    - STEP or native CAD file downloaded, hashed, reviewed, and license-cleared
    - land pattern and pinout reconciled to KiCad symbol/footprint
    - sample lot and lifecycle/stock/quote evidence accepted
