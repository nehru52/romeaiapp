s11_and_efficiency_plan:
  evidence_class: planning_estimate_not_vna_measured
  method: pre-layout antenna budget keyed to module public band plan and board ground
    clearance
  per_feed:
    - net: CELL_RF_MAIN
      role: cellular_main_tx_rx
      bands: LTE/NR Sub-6 low+mid band; exact matrix follows region SKU
      freq_range_mhz:
        - 617
        - 3800
      target_s11_db_max: -6.0
      target_total_efficiency_pct_min: 35.0
      rationale: Compact 64 mm-wide board with a 58 mm clear edge slot; low-band efficiency
        is limited by the small ground clearance, so a -6 dB worst-case S11 and 35%
        total-efficiency floor are realistic pre-tune planning targets.
    - net: CELL_RF_DIV
      role: cellular_diversity_rx
      bands: LTE/NR Sub-6 diversity, mirror of main band matrix
      freq_range_mhz:
        - 617
        - 3800
      target_s11_db_max: -6.0
      target_total_efficiency_pct_min: 30.0
      rationale: Diversity feed on the opposite plastic edge accepts lower efficiency
        than main; primary requirement is envelope-correlation and isolation from
        main, proven by VNA S21.
    - net: CELL_GNSS_RF
      role: gnss_l1_rx
      bands: GNSS L1 (GPS L1 / GLONASS L1 / Galileo E1)
      freq_range_mhz:
        - 1559
        - 1610
      target_s11_db_max: -10.0
      target_total_efficiency_pct_min: 40.0
      rationale: Narrow passive L1 band tunes tighter than the wideband cellular feeds;
        receive-only LNA path tolerates a -10 dB match, but desense from Wi-Fi 2.4
        GHz 2nd harmonic and cellular harmonics is the dominant risk.
    - net: WIFI_BT_RF0
      role: wifi6e_bt_chain0
      bands: Wi-Fi 2.4/5/6 GHz + Bluetooth 5.3 (2.4 GHz)
      freq_range_mhz:
        - 2400
        - 7125
      target_s11_db_max: -8.0
      target_total_efficiency_pct_min: 45.0
      rationale: Tri-band 2x2 chain shares one feed across 2.4/5/6 GHz; a -8 dB band-worst-case
        S11 and 45% efficiency floor are achievable with a side-edge PIFA and pi matching
        network.
    - net: WIFI_BT_RF1
      role: wifi6e_bt_chain1
      bands: Wi-Fi 2.4/5/6 GHz 2x2 MIMO second chain
      freq_range_mhz:
        - 2400
        - 7125
      target_s11_db_max: -8.0
      target_total_efficiency_pct_min: 45.0
      rationale: Second MIMO chain must be spatially separated from chain0; envelope-correlation-coefficient
        and chain-to-chain isolation are supplier_defined and require measurement.
  residual_measurement: VNA S11 per feed and chamber total-efficiency/realized-gain
    sweep on a routed EVT0 board with conducted access; planning targets are not pass
    criteria.
em_simulation:
  evidence_class: em_simulation_blocked_missing_solver
  status: blocked
  rung_above: planning_estimate_not_vna_measured
  rung_below: vna_and_anechoic_chamber_measured
  reason: No full-wave EM solver (FDTD or MoM) is installed in this toolchain. The
    S11/total-efficiency planning targets in s11_and_efficiency_plan cannot be promoted
    to em_simulated_not_chamber_measured without one. No S-parameters are fabricated.
  solver_probe:
    checked_binaries:
      - openEMS
      - AppCSXCAD
      - nec2c
      - necpp
      - meep
    checked_python_modules:
      - openEMS
      - CSXCAD
      - PyNEC
      - meep
      - skrf
      - pyems
    found_binaries: []
    found_python_modules: []
  tooling_required_to_unblock:
    - openEMS (FDTD) + CSXCAD/python-openEMS bindings, or
    - an MoM solver (PyNEC/necpp) for the wire/PIFA approximation, or
    - MEEP (FDTD) with the python bindings
    - scikit-rf (skrf) to post-process the resulting Touchstone S-parameters
  unblock_command: add openEMS + python-openEMS to external/ and tools/env.sh, then
    re-run make e1-phone-rf-connectivity
  intended_model_when_solver_present:
    structure: side-fed planar inverted-F (PIFA) / monopole on a finite ground plane
    ground_plane_width_mm: 64.0
    substrate_thickness_mm: 12.7
    enclosure_wall_thickness_mm: 1.15
    feeds_to_model:
      - net: CELL_RF_MAIN
        bands_ghz:
          - 0.617
          - 3.8
        geometry: edge-slot PIFA in the cellular keepout
      - net: WIFI_BT_RF0
        bands_ghz:
          - 2.4
          - 7.125
        geometry: side-edge PIFA in the wifi_bt keepout
      - net: CELL_GNSS_RF
        bands_ghz:
          - 1.559
          - 1.61
        geometry: narrow L1 monopole/PIFA
    outputs: simulated S11 (return loss) and total efficiency vs the module band plans,
      tagged em_simulated_not_chamber_measured with solver name+version and mesh/boundary
      assumptions
  residual_measurement: An EM simulation, when added, is still below a physical measurement.
    VNA S11/S21 and anechoic-chamber total-efficiency on a fabricated EVT0 board remain
    the binding evidence and are unchanged by this tier.
feed_isolation_plan:
  evidence_class: planning_estimate_not_vna_measured
  module_center_separation_mm: 13.0
  device_width_mm: 78.0
  targets:
    - pair: cellular_main_to_cellular_diversity
      target_isolation_db_min: 10.0
      basis: opposite-edge feeds in a 78 mm-wide enclosure
    - pair: wifi_chain0_to_wifi_chain1
      target_isolation_db_min: 10.0
      basis: 2x2 MIMO chains, supplier-defined ECC requirement
    - pair: wifi_to_cellular_main
      target_isolation_db_min: 12.0
      basis: cross-radio coexistence in compact midframe
  residual_measurement: VNA S21 isolation matrix across all feed pairs on a routed
    board.
sar_prescan_plan:
  evidence_class: planning_estimate_not_sar_lab_measured
  device_thickness_mm: 12.7
  back_wall_thickness_mm: 0.75
  body_separation_basis: flush-back 11.8 mm slab held against torso; no metal midframe
    over antenna keepouts keeps the radiating edges closest to the plastic wall
  exposure_states:
    - state: cellular_tx_max_against_body
      limit_standard: FCC 1.6 W/kg 1g / CE 2.0 W/kg 10g
      status: planning_estimate_requires_sar_lab
    - state: cellular_tx_plus_wifi_tx
      limit_standard: simultaneous-transmission SAR aggregation
      status: planning_estimate_requires_sar_lab
    - state: cellular_tx_plus_usb_c_charging
      limit_standard: SAR with charging/thermal interaction
      status: planning_estimate_requires_sar_lab
  skin_temperature_coupling_c_max: 43
  residual_measurement: Near-field SAR scan in the final orange PC/ABS enclosure plastics
    with production antenna gains and modem transmit power; no SAR claim is permitted
    until measured.
antenna_feed_assignments:
  - net: CELL_RF_MAIN
    role: cellular_main
    candidate_zone: top_or_bottom_plastic_edge_after_vendor_review
    requires_conducted_access: true
  - net: CELL_RF_DIV
    role: cellular_diversity
    candidate_zone: opposite_plastic_edge_or_side_slot_after_vendor_review
    requires_conducted_access: true
