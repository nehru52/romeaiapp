        - assembly_outputs_bom_pnp_drawings_stencil
        - fixture_probe_coordinates_and_accessibility
        - factory_test_limits_and_stop_on_fail
        - first_article_traveler_measurements_and_signoff
      required_fixture_domains: [display_touch]
      status: blocked_missing_display_fixture_limits_identity_and_first_article_signoff
    - function: rear_front_cameras
      selected_hardware: Sincere_First_OV13855_rear_and_GC5035_front
      source_artifact: board/kicad/e1-phone/camera-module-fit-downselect.yaml
      required_acceptance_items:
