cross_checks:
  stackup_target_matches_production_readiness: true
  all_manufacturing_production_outputs_blocked: true
  factory_probe_domains_match_production_coverage: true
  probe_outputs_required_before_release: true
  routed_release_ready_flags_false: true
  supplier_evidence_blocks_kicad_capture: true
  routing_acceptance_blocks_production_outputs: true
  power_bringup_blocks_factory_limits: true
  all_factory_probe_domains_blocked: true
  all_acceptance_items_blocked: true
  selected_hardware_factory_acceptance_fail_closed: true
  alternate_display_factory_acceptance_gate_fail_closed: true
release_blockers:
  - routed DRC-clean PCB and production fabrication outputs are missing
  - fabricator stackup, impedance coupon quote, DFM/DFA, and fab/assembly quote are missing
  - production BOM/AVL, pick-and-place, assembly drawings, stencil, and supplier approval packs are missing
  - factory fixture coordinates, factory limits, RF calibration, traceability, and first-article transcript are
    missing
  - selected display, camera, USB-C/power/side-key, cellular, and Wi-Fi/Bluetooth factory acceptance evidence is missing
  - parseable 055WU01 and E549/RM67191 display alternates cannot enter factory acceptance until AVL, assembly, fixture limits, routed STEP, first-article, and promotion evidence exist
  - routed board STEP, approved enclosure release clearance, and final mechanical production signoff are missing
forbidden_claims:
  - production_ready
  - fabrication_ready
  - assembly_ready
  - factory_test_ready
  - fixture_ready
  - first_article_ready
  - impedance_closed
  - bom_avl_ready
  - enclosure_ready
  - end_to_end_phone_ready
