selected_supplier_response_route_gate:
  source_artifact: board/kicad/e1-phone/supplier-rfq-response-normalization.yaml
  status: blocked_until_selected_supplier_response_packs_unlock_route_release_inputs
  required_response_gate_count: 3
  blocked_response_gate_count: 3
  required_response_gates:
    - selected_display_camera_oem_response_gate
    - selected_usb_sidekey_oem_response_gate
    - selected_wireless_module_oem_response_gate
  selected_route_functions:
    - display_touch
    - rear_camera
    - front_camera
    - usb_c_receptacle_evt0
    - side_buttons
    - cellular
    - wifi_bluetooth
  release_required_response_pack_count: 7
  route_inputs_blocked_until_response_packs:
    - supplier connector and module land patterns
    - final courtyards and component keepouts
    - pinout and pad-numbering reviews
    - STEP/B-rep models for routed-board export
    - reference layouts for RF and high-speed interfaces
    - enclosure datums and load-path constraints
  all_selected_supplier_response_packs_absent: true
  blocks_routed_layout_release: true
alternate_display_layout_release_gate:
  source_artifacts:
    - board/kicad/e1-phone/component-height-step-integration.yaml
    - board/kicad/e1-phone/routed-board-step-export-contract.yaml
    - board/kicad/e1-phone/enclosure-fit-execution-package.yaml
  status: blocked_until_alternate_display_supplier_pack_route_step_and_enclosure_clearance_exist
  branch_count: 2
  branches:
    - source_id: display_alternate_alibaba_meta_055wu01
      candidate: 055WU01
      required_route_release_inputs:
        - signed display drawing, 40-pin pinout, mating connector MPN, land pattern, and STEP/B-rep models
        - display/touch/backlight/bias bring-up data, sample inspection, and promotion review against CH550FH01A-CT
        - routed DSI/touch/backlight/bias nets, connector courtyard utilization, SI/PI report, and DRC evidence
        - approved routed board STEP clearance report and physical fit report against the selected enclosure
      blocks_routed_layout_release: true
    - source_id: display_alternate_made_in_china_e549_amoled
      candidate: E549-HC01_RM67191_AMOLED_class
      required_route_release_inputs:
        - signed AMOLED drawing, exact FPC pinout, mating connector MPN, land pattern, and STEP/B-rep models
        - RM67191 power sequence, GT1151 touch data, burn-in/luminance/sample evidence, and promotion review
        - routed MIPI/touch/power nets, connector courtyard utilization, SI/PI report, thermal review, and DRC evidence
        - approved routed board STEP clearance report and physical fit report against the selected enclosure
      blocks_routed_layout_release: true

enclosure_gate:
  requires_routed_board_step: true
  requires_supplier_3d_models: true
  requires_approved_routed_physical_clearance: true
  requires_full_cad_boolean_interference_pass: true
  production_step_present: false
  routed_clearance_passed: false

factory_gate:
  requires_routed_probe_coordinates: true
  requires_factory_test_limits: true
  requires_first_article_traveler: true
  requires_fab_assembler_quote: true
  ready_for_factory_test: false

cross_checks:
  manifest_cites_binding: true
  live_layout_counts_match_pcb_audit: true
  routed_release_outputs_all_blocked: true
  routed_domains_all_fail_closed: true
  routed_step_contract_blocks_enclosure: true
  manufacturing_and_factory_gates_remain_blocked: true
  layout_optimization_remains_concept_only: true
  selected_supplier_response_gate_blocks_routed_layout_release: true
  alternate_display_layout_release_gate_blocks_release: true
  fail_closed_until_routed_pcb_drc_si_pi_rf_factory_outputs_and_enclosure_clearance_exist: true

release_blockers:
  - production routed KiCad PCB source is present only as non-release local candidate evidence
  - routed KiCad PCB exists only as a blocked local candidate; production source remains a concept placeholder scaffold
  - local routed KiCad candidate has copper segments but no release-approved zones, DRC, or signoff
  - no release-approved routed copper, filled zones, or DRC evidence
  - candidate routed board STEP exists for review only; supplier-approved production STEP export is missing
  - supplier component STEP/B-rep models are missing
  - selected supplier response packs for display, camera, USB-C/side-key, cellular, and Wi-Fi/Bluetooth are missing
  - parseable 055WU01 and E549/RM67191 display alternates cannot enter routed layout release until supplier packs, route evidence, STEP/B-rep, promotion review, and enclosure clearance exist
  - approved routed-board physical clearance report is blocked
  - factory limits for rails, USB-C, radios, display, cameras, audio, buttons, and split interconnect missing
  - first-article traveler, current limits, stop-on-fail rules, and signoff missing

forbidden_claims:
  - routed_pcb_ready
  - layout_ready
  - drc_clean
  - si_pi_ready
  - rf_ready
  - production_outputs_ready
  - routed_board_step_ready
  - factory_test_ready
  - fabrication_ready
  - enclosure_ready
  - end_to_end_phone_ready
