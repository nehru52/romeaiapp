schema: eliza.e1_phone_routed_layout_readiness_binding.v1
status: blocked_layout_readiness_requires_routed_pcb_drc_si_pi_rf_factory_outputs_and_enclosure_clearance
date: 2026-05-21
claim_boundary: >
  Aggregate routed-layout readiness binding for the E1 phone PCB. This rolls up
  routed PCB implementation, release outputs, live PCB audit, routed STEP export,
  enclosure fit, manufacturing, and factory-test gates into one fail-closed
  layout release contract. It is not a routed PCB, not DRC evidence, not SI/PI/RF
  signoff, not a fabrication output package, not factory release, and not
  enclosure-ready proof.

