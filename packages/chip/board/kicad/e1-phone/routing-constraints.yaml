schema: eliza.e1_phone_routing_constraints.v1
status: constraint_baseline_not_post_route_signoff
date: 2026-05-20
claim_boundary: >
  Routing constraints for future KiCad layout. These are not field-solver
  results, SI/PI signoff, stackup vendor approval, or routed PCB evidence.

stackup:
  target: 10_layer_0p8_mm_hdi
  evt0_minimum: 8_layer_0p8_mm_hdi
  dielectric_note: >
    Values in the concept KiCad file are placeholders. Final trace widths and
    spacing require a board-house impedance stackup and field-solver coupons.
  layer_roles:
    F_Cu: components_short_escape_rf_matching
    In1_GND: continuous_reference_plane
    In2_Sig: high_speed_horizontal
    In3_PWR: power_plane
    In4_Sig: low_speed_control
    In5_Sig: high_speed_vertical
    In6_PWR: power_plane
    In7_Sig: low_speed_debug_audio
    In8_GND: continuous_reference_plane
    B_Cu: secondary_components_test_points

impedance_classes:
  usb2_diff:
    impedance_ohm: 90
    tolerance_pct: 10
    applies_to: [USB_DP_USB_DN, CELL_USB2_DP_DN]
    reference_plane: continuous_ground
  mipi_dphy_diff:
    impedance_ohm: 100
    tolerance_pct: 10
    applies_to: [DSI, CAM0_CSI, CAM1_CSI]
    reference_plane: continuous_ground
  pcie_diff:
    impedance_ohm: 85
    tolerance_pct: 10
    applies_to: [WIFI_PCIE, CELL_PCIE]
    reference_plane: continuous_ground
  rf_single:
    impedance_ohm: 50
    tolerance_pct: 10
    applies_to: [CELL_RF_MAIN, CELL_RF_DIV, CELL_GNSS_RF, WIFI_BT_RF0, WIFI_BT_RF1]
    reference_plane: continuous_ground_with_via_fence
  sdio_single:
    impedance_ohm: 50
    tolerance_pct: 15
    applies_to: [WIFI_SDIO]
  nfc_loop:
    impedance_ohm: supplier_tuned_loop
    tolerance_pct: supplier_tuned
    applies_to: [NFC_RF_P, NFC_RF_N]
    reference_plane: enclosure_dependent_keepout

differential_pairs:
  - {name: USB_DP_DN, nets: [USB_DP, USB_DN], class: usb2_diff, max_length_mm: 90, intra_pair_skew_mm_max: 0.5, region: bottom_usb_to_soc}
  - {name: CELL_USB2_DP_DN, nets: [CELL_USB2_DP, CELL_USB2_DN], class: usb2_diff, max_length_mm: 55, intra_pair_skew_mm_max: 0.5, region: top_left_cell_to_soc}
  - {name: DSI_CLK, nets: [DSI_CLK_P, DSI_CLK_N], class: mipi_dphy_diff, max_length_mm: 45, intra_pair_skew_mm_max: 0.25, region: soc_to_display_ffi}
  - {name: DSI_D0, nets: [DSI_D0_P, DSI_D0_N], class: mipi_dphy_diff, max_length_mm: 45, intra_pair_skew_mm_max: 0.25, region: soc_to_display_ffi}
  - {name: DSI_D1, nets: [DSI_D1_P, DSI_D1_N], class: mipi_dphy_diff, max_length_mm: 45, intra_pair_skew_mm_max: 0.25, region: soc_to_display_ffi}
  - {name: DSI_D2, nets: [DSI_D2_P, DSI_D2_N], class: mipi_dphy_diff, max_length_mm: 45, intra_pair_skew_mm_max: 0.25, region: soc_to_display_ffi}
  - {name: DSI_D3, nets: [DSI_D3_P, DSI_D3_N], class: mipi_dphy_diff, max_length_mm: 45, intra_pair_skew_mm_max: 0.25, region: soc_to_display_ffi}
  - {name: CAM0_CSI_CLK, nets: [CAM0_CSI_CLK_P, CAM0_CSI_CLK_N], class: mipi_dphy_diff, max_length_mm: 55, intra_pair_skew_mm_max: 0.25, region: rear_camera_to_soc}
  - {name: CAM0_CSI_D0, nets: [CAM0_CSI_D0_P, CAM0_CSI_D0_N], class: mipi_dphy_diff, max_length_mm: 55, intra_pair_skew_mm_max: 0.25, region: rear_camera_to_soc}
  - {name: CAM0_CSI_D1, nets: [CAM0_CSI_D1_P, CAM0_CSI_D1_N], class: mipi_dphy_diff, max_length_mm: 55, intra_pair_skew_mm_max: 0.25, region: rear_camera_to_soc}
  - {name: CAM0_CSI_D2, nets: [CAM0_CSI_D2_P, CAM0_CSI_D2_N], class: mipi_dphy_diff, max_length_mm: 55, intra_pair_skew_mm_max: 0.25, region: rear_camera_to_soc}
  - {name: CAM0_CSI_D3, nets: [CAM0_CSI_D3_P, CAM0_CSI_D3_N], class: mipi_dphy_diff, max_length_mm: 55, intra_pair_skew_mm_max: 0.25, region: rear_camera_to_soc}
  - {name: CAM1_CSI_CLK, nets: [CAM1_CSI_CLK_P, CAM1_CSI_CLK_N], class: mipi_dphy_diff, max_length_mm: 65, intra_pair_skew_mm_max: 0.25, region: front_camera_to_soc}
  - {name: CAM1_CSI_D0, nets: [CAM1_CSI_D0_P, CAM1_CSI_D0_N], class: mipi_dphy_diff, max_length_mm: 65, intra_pair_skew_mm_max: 0.25, region: front_camera_to_soc}
  - {name: CAM1_CSI_D1, nets: [CAM1_CSI_D1_P, CAM1_CSI_D1_N], class: mipi_dphy_diff, max_length_mm: 65, intra_pair_skew_mm_max: 0.25, region: front_camera_to_soc}
  - {name: WIFI_PCIE_TX, nets: [WIFI_PCIE_TX_P, WIFI_PCIE_TX_N], class: pcie_diff, max_length_mm: 35, intra_pair_skew_mm_max: 0.15, region: wifi_to_soc}
  - {name: WIFI_PCIE_RX, nets: [WIFI_PCIE_RX_P, WIFI_PCIE_RX_N], class: pcie_diff, max_length_mm: 35, intra_pair_skew_mm_max: 0.15, region: wifi_to_soc}
  - {name: CELL_PCIE_TX, nets: [CELL_PCIE_TX_P, CELL_PCIE_TX_N], class: pcie_diff, max_length_mm: 55, intra_pair_skew_mm_max: 0.15, region: cellular_to_soc}
  - {name: CELL_PCIE_RX, nets: [CELL_PCIE_RX_P, CELL_PCIE_RX_N], class: pcie_diff, max_length_mm: 55, intra_pair_skew_mm_max: 0.15, region: cellular_to_soc}
  - {name: LPDDR_CK, nets: [LPDDR_CK_P, LPDDR_CK_N], class: memory_diff, max_length_mm: 18, intra_pair_skew_mm_max: 0.05, region: soc_to_lpddr}
  - {name: LPDDR_DQS, nets: [LPDDR_DQS_P, LPDDR_DQS_N], class: memory_diff, max_length_mm: 18, intra_pair_skew_mm_max: 0.05, region: soc_to_lpddr}
  - {name: UFS_REFCLK, nets: [UFS_REFCLK_P, UFS_REFCLK_N], class: ufs_diff, max_length_mm: 28, intra_pair_skew_mm_max: 0.10, region: soc_to_ufs}
  - {name: UFS_TX, nets: [UFS_TX_P, UFS_TX_N], class: ufs_diff, max_length_mm: 28, intra_pair_skew_mm_max: 0.10, region: soc_to_ufs}
  - {name: UFS_RX, nets: [UFS_RX_P, UFS_RX_N], class: ufs_diff, max_length_mm: 28, intra_pair_skew_mm_max: 0.10, region: soc_to_ufs}

single_ended_buses:
  - {name: WIFI_SDIO, nets: [WIFI_SDIO_CLK, WIFI_SDIO_CMD, WIFI_SDIO_D0, WIFI_SDIO_D1, WIFI_SDIO_D2, WIFI_SDIO_D3], max_length_mm: 35, group_skew_mm_max: 1.0}
  - {name: SIDE_KEYS, nets: [PWR_KEY_N, VOL_UP_N, VOL_DOWN_N], max_length_mm: 80, debounce_required: true, aon_domain: true}
  - {name: TOUCH_I2C, nets: [TOUCH_I2C_SCL, TOUCH_I2C_SDA], max_length_mm: 70, pullups_to: IO_1V8}
  - {name: CAMERA_I2C, nets: [CAM0_I2C_SCL, CAM0_I2C_SDA, CAM1_I2C_SCL, CAM1_I2C_SDA], max_length_mm: 70, pullups_to: IO_1V8}
  - {name: AUDIO_I2S_PDM, nets: [I2S_BCLK, I2S_LRCLK, I2S_DOUT, I2S_DIN, PDM_CLK, PDM_DAT], max_length_mm: 85, group_skew_mm_max: 2.0, keepaway: usb_c_and_rf_feeds}
  - {name: AUDIO_I2C_IRQ, nets: [AUDIO_I2C_SCL, AUDIO_I2C_SDA, CODEC_INT, AMP_INT], max_length_mm: 85, pullups_to: IO_1V8}
  - {name: LPDDR_CA, nets: [LPDDR_CA0, LPDDR_CA1, LPDDR_CA2, LPDDR_CA3, LPDDR_RESET_N, LPDDR_ZQ], max_length_mm: 18, group_skew_mm_max: 0.10, keepaway: rf_and_usb_c}
  - {name: DEBUG_BOOT, nets: [JTAG_TCK, JTAG_TMS, JTAG_TDI, JTAG_TDO, JTAG_TRST_N, BOOT_MODE0, BOOT_MODE1, BOOT_MODE2, SOC_RESET_N], max_length_mm: 45, pullups_to: IO_1V8}
  - {name: USIM_ESIM, nets: [USIM_VCC, USIM_CLK, USIM_RST, USIM_IO, USIM_DET, ESIM_VCC, ESIM_CLK, ESIM_RST, ESIM_IO], max_length_mm: 35, esd_required: true, keepaway: cellular_rf_feeds}
  - {name: NFC_CONTROL, nets: [NFC_I2C_SCL, NFC_I2C_SDA, NFC_IRQ_N, NFC_EN], max_length_mm: 70, pullups_to: IO_1V8}
  - {name: SENSOR_I2C_IRQ, nets: [SENSOR_I2C_SCL, SENSOR_I2C_SDA, IMU_INT, ALS_PROX_INT, BARO_INT, MAG_INT], max_length_mm: 70, pullups_to: IO_1V8}

rf_layout:
  antenna_keepouts:
    - {name: top_antenna, rect_mm: {x: 3.0, y: 3.0, width: 58.0, height: 5.0}, metal_restriction: no_midframe_metal_without_rf_review}
    - {name: bottom_antenna, rect_mm: {x: 3.0, y: 124.0, width: 58.0, height: 5.0}, metal_restriction: no_midframe_metal_without_rf_review}
  matching_networks_required:
    - {net: CELL_RF_MAIN, near: U_CELL}
    - {net: CELL_RF_DIV, near: U_CELL}
    - {net: CELL_GNSS_RF, near: U_CELL_or_GNSS_LNA}
    - {net: WIFI_BT_RF0, near: U_WIFI_BT}
    - {net: WIFI_BT_RF1, near: U_WIFI_BT}
  test_access: add_u_fl_or_conducted_pad_before_matching_network_for_evt0

power_integrity:
  high_current_paths:
    - {name: VBUS_to_charger, max_loop_area: minimize, copper: wide_short_top_or_inner_plane}
    - {name: charger_to_battery, max_loop_area: minimize, current_limit_from_battery_vendor: true}
    - {name: RF_VBAT_to_cellular, burst_current_from_module_datasheet_required: true}
  decoupling:
    - each_module_power_pin_requires_local_decoupling_per_datasheet
    - PMIC_and_SoC_decaps_must_have_via_in_pad_or_adjacent_microvias_if_package_requires
  test_points_required: [VBUS, VBAT, SYS, AON_1V8, IO_1V8, RF_VBAT, CAM_AVDD_2V8, DISP_AVDD_5V5]

mechanical_keepouts:
  battery_window: {x: 0.0, y: 29.5, width: 64.0, height: 87.0, rule: no_components_or_copper_intrusions_without_me_review_top_bottom_islands_required}
  usb_c_shell: {x: 26.0, y: 126.0, width: 16.0, height: 6.0, rule: enclosure_captured_connector}
  side_buttons: {x: 4.0, y: 50.0, width: 7.0, height: 46.0, rule: switch_load_path_to_enclosure_rib}
  rear_camera: {x: 47.0, y: 8.0, width: 15.0, height: 24.0, rule: lens_axis_and_z_height_datums_required}
  display_fpc_bend: {x: 42.0, y: 33.0, width: 20.0, height: 11.0, rule: preserve_bend_radius_to_cover_glass_display_stack}
  front_camera_earpiece: {x: 2.0, y: 3.0, width: 22.0, height: 12.0, rule: camera_and_receiver_under_glass_acoustic_keepout}
  haptic_lra: {x: 55.0, y: 88.0, width: 8.0, height: 20.0, rule: no_tall_parts_or_screw_bosses_under_haptic_mass}
  loudspeaker_mic_ports: {x: 5.0, y: 104.0, width: 57.0, height: 10.0, rule: preserve speaker chamber, microphone acoustic ports, and gasket compression}
  sim_tray: {x: 56.0, y: 48.0, width: 8.0, height: 24.0, rule: keep_side_service_tray_clear_or_convert_to_esim_blocker}
