release_output_inventory:
  required_common_outputs:
    - board/kicad/e1-phone/production/test/first-article-test-transcript.json
    - board/kicad/e1-phone/production/first-article
    - board/kicad/e1-phone/production/test/factory-test-limits.yaml
    - board/kicad/e1-phone/production/test/probe-coordinates.csv
    - board/kicad/e1-phone/production/reports/routed-board-clearance-release.yaml
  present_common_output_count: 0
  missing_common_output_count: 5
  all_selected_hardware_outputs_absent: true

cross_checks:
  selected_hardware_matches_factory_acceptance: true
  selected_hardware_matches_production_release_coupling: true
  transcript_sections_cover_display_camera_usb_power_buttons_cellular_wifi_bt: true
  first_article_outputs_remain_absent: true
  routed_clearance_release_required_before_first_article_release: true
  all_selected_hardware_first_article_records_fail_closed: true

release_blockers:
  - first-article transcript and traveler are missing
  - factory limits and probe coordinates derived from routed first article are missing
  - routed clearance release and enclosure physical fit evidence are missing
  - selected display, cameras, USB-C, charger, side keys, cellular, and Wi-Fi/Bluetooth functional logs are missing
  - wireless identity, RF calibration, firmware, and regulatory traceability evidence are missing
  - board serial, fixture ID, test software revision, and supplier lot traceability are missing

forbidden_claims:
  - selected_hardware_first_article_ready
  - first_article_ready
  - factory_test_ready
  - enclosure_ready
  - fabrication_ready
  - end_to_end_phone_ready
