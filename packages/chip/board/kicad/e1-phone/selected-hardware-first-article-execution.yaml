schema: eliza.e1_phone_selected_hardware_first_article_execution.v1
status: blocked_selected_hardware_first_article_requires_routed_board_factory_limits_identity_enclosure_and_functional_transcripts
date: 2026-05-21
claim_boundary: >
  Selected-hardware first-article execution contract. This defines the
  board-serial-tied physical, electrical, RF, factory, and enclosure evidence
  required for the selected display, cameras, USB-C/power/side keys, cellular,
  and Wi-Fi/Bluetooth stack. It is not a first-article transcript, not factory
  release evidence, not enclosure signoff, and not approval to fabricate.

source_artifacts:
  - board/kicad/e1-phone/first-article-route-execution-order.yaml
  - board/kicad/e1-phone/production-factory-release-execution.yaml
  - board/kicad/e1-phone/factory-production-acceptance-checklist.yaml
  - board/kicad/e1-phone/post-route-validation-binding.yaml
  - board/kicad/e1-phone/routed-clearance-release-execution.yaml
  - board/kicad/e1-phone/power-bringup-acceptance-checklist.yaml
  - board/kicad/e1-phone/radio-antenna-acceptance-checklist.yaml
  - board/kicad/e1-phone/display-camera-acceptance-checklist.yaml
  - board/kicad/e1-phone/usb-sidekey-acceptance-checklist.yaml

first_article_policy:
  release_revision: EVT1-routed-first-article
  selected_function_count: 5
  required_transcript: board/kicad/e1-phone/production/test/first-article-test-transcript.json
  required_traveler: board/kicad/e1-phone/production/first-article
  required_factory_limits: board/kicad/e1-phone/production/test/factory-test-limits.yaml
  required_probe_coordinates: board/kicad/e1-phone/production/test/probe-coordinates.csv
  required_routed_clearance_release: board/kicad/e1-phone/production/reports/routed-board-clearance-release.yaml
  board_serial_traceability_required: true
  fixture_id_traceability_required: true
  test_software_revision_required: true
  supplier_lot_traceability_required: true
  enclosure_physical_fit_required: true
  first_article_release_allowed: false

