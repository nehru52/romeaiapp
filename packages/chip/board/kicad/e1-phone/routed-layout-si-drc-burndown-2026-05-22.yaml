  - id: factory_test_fiducials_and_manufacturing_coupons
    owner: layout_manufacturing
    route_regions: [top_island, bottom_island, fixture_access_edges]
    route_classes: [test_access, manufacturing_outputs, impedance_coupon, fiducials]
    exact_nets:
