order_of_operations:
  - order: 0
    id: freeze_supplier_and_stackup_inputs
    actions:
      - ingest selected supplier response packs for display, cameras, USB-C, side keys, cellular, Wi-Fi/Bluetooth, battery, audio, and split interconnect
      - replace placeholder footprints with exact land patterns, courtyards, heights, and STEP/B-rep models
      - obtain fabricator HDI stackup, impedance table, via policy, and coupon geometry
    exit_outputs:
      - board/kicad/e1-phone/production/stackup/fabricator-stackup.yaml
      - board/kicad/e1-phone/production/stackup/impedance-coupon-drawing.pdf
    current_status: blocked_no_signed_supplier_packs_or_stackup
  - order: 1
    id: capture_schematic_and_netclasses
    actions:
      - convert block-netlist nets into reviewed hierarchical KiCad schematic sheets
      - bind routing-constraints impedance classes into KiCad net classes
      - run ERC and resolve or waive every violation
    exit_outputs:
      - board/kicad/e1-phone/production/reports/erc.json
    current_status: blocked_schematic_is_scaffold_and_erc_missing
  - order: 2
    id: route_escape_and_high_risk_corridors
    actions:
      - escape SoC/LPDDR/UFS, PMIC, display, camera, USB-C, radios, and split interconnect first
      - resolve USB_DP_DN overlength through controlled-impedance flex or signed topology change
      - preserve battery window, antenna keepouts, acoustic ports, side-button load path, and FPC bend datums
    exit_outputs:
      - board/kicad/e1-phone/pcb/e1-phone-mainboard-routed.kicad_pcb
      - board/kicad/e1-phone/production/reports/length-skew.csv
      - board/kicad/e1-phone/production/reports/escape-density-via-count.yaml
    current_status: blocked_local_candidate_has_tracks_and_zones_but_is_not_drc_erc_clean_or_supplier_approved
  - order: 3
    id: close_drc_si_pi_rf
    actions:
      - fill required planes and zones
      - run KiCad DRC and capture clean result or signed waivers
      - generate USB2, MIPI, PCIe, LPDDR, UFS, split-interconnect, PDN, and RF reports
      - verify every RF feed has matching network and conducted access
    exit_outputs:
      - board/kicad/e1-phone/production/reports/drc.json
      - board/kicad/e1-phone/production/reports/zone-fill.json
      - board/kicad/e1-phone/production/reports/si-pi
      - board/kicad/e1-phone/production/reports/rf
    current_status: blocked_local_kicad_reports_show_2201_drc_rows_366_erc_rows_no_si_pi_or_rf_evidence
  - order: 4
    id: add_test_access_fiducials_and_manufacturing_coupons
    actions:
      - verify probe access for power rails, USB-C, side keys, display, cameras, radios, audio, and split interconnect
      - add global and local fiducials, panel/tooling constraints, and impedance coupons
      - generate fixture coordinates, factory limits, and coupon drawings from routed board
    exit_outputs:
      - board/kicad/e1-phone/production/test/probe-coordinates.csv
      - board/kicad/e1-phone/production/test/factory-test-limits.yaml
      - board/kicad/e1-phone/production/stackup/impedance-coupon-drawing.pdf
    current_status: blocked_no_routed_probe_coordinates_or_coupon_outputs
  - order: 5
    id: export_manufacturing_and_routed_step
    actions:
      - export Gerber X2 or IPC-2581/ODB++, NC drill, position files, BOM/AVL, assembly drawings, and stencil notes
      - export routed board STEP with supplier component models
      - rerun enclosure CAD clearance and full interference checks
    exit_outputs:
      - board/kicad/e1-phone/production/gerbers
      - board/kicad/e1-phone/production/ipc-2581
      - board/kicad/e1-phone/production/pos
      - board/kicad/e1-phone/production/bom
      - board/kicad/e1-phone/production/pdf/assembly.pdf
      - board/kicad/e1-phone/production/step/routed-board-with-components.step
      - board/kicad/e1-phone/production/reports/routed-board-clearance-release.yaml
    current_status: blocked_no_production_outputs_or_routed_step
  - order: 6
    id: first_article_route_validation
    actions:
      - build EVT1 first articles only after routed package, quote, fixture, and stop-on-fail traveler are complete
      - collect USB attach, charger cycle, display/camera bring-up, RF conducted/VNA, power thermal, audio/haptic, side-key, and factory-test transcripts
      - update post-route validation binding with measured evidence
    exit_outputs:
      - board/kicad/e1-phone/production/first-article
      - board/kicad/e1-phone/production/test/first-article-test-transcript.json
    current_status: blocked_no_fabrication_package_or_first_article_units

blocker_burndown:
  total_blocker_groups: 10
  open_blocker_groups: 10
  blockers:
    - id: supplier_footprints_and_step
      blocks: [all_route_domains, routed_step_with_supplier_models, enclosure_validation]
