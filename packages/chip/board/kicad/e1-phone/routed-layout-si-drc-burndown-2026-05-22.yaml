cross_checks:
  source_artifacts_match_requested_route_release_inputs: true
  live_counts_match_pcb_implementation_audit_and_routed_layout_readiness: true
  route_domains_cover_trial_route_input_matrix_domains: true
  usb2_overlength_blocker_matches_route_corridor_and_usb_topology_resolution: true
  mipi_constraints_match_routing_constraints: true
  rf_feed_count_matches_routing_constraints_and_scorecard: true
  split_interconnect_contact_budget_matches_trial_route_and_pcb_audit: true
  test_point_count_matches_pcb_audit_and_factory_probe_scope: true
  required_outputs_match_routed_release_and_post_route_validation_bindings: true
  manufacturing_coupons_remain_blocked_until_fabricator_stackup_and_routed_board_exist: true
  fail_closed_until_real_routed_evidence_exists: true

release_blockers:
  - supplier footprints, pinouts, courtyards, heights, STEP/B-rep models, and reference layouts are missing
  - local routed KiCad candidate has tracks and zones, but KiCad CLI reports 2201 DRC rows and 366 ERC rows with no release waivers
  - USB_DP_DN topology exceeds the current concept length target and needs controlled-impedance flex or topology change
  - DRC, ERC, zone fill, length/skew, SI/PI, RF, PDN, power thermal, and first-article evidence are missing
  - routed test-point coordinates, fiducials, panel/tooling decisions, and impedance coupon outputs are missing
  - routed board STEP and enclosure clearance rerun are missing
  - Gerber, drill, IPC-2581/ODB++, position, BOM/AVL, assembly drawing, stencil notes, and DFM/DFA quote are missing

forbidden_claims:
  - route_execution_ready
  - trial_route_ready
  - route_feasible
  - routed_pcb_ready
  - drc_clean
  - erc_clean
  - si_pi_closed
  - rf_ready
  - power_integrity_closed
  - test_access_ready
  - manufacturing_coupons_ready
  - manufacturing_outputs_ready
  - routed_step_ready
  - enclosure_ready
  - fabrication_ready
  - factory_ready
  - end_to_end_phone_ready
