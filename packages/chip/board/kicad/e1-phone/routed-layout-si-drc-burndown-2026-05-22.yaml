route_domains:
  - id: usb_c_power_sidekey_spine
    owner: layout
    route_regions: [J_USB_C, SW_POWER_VOL, U_PMIC_CHARGER, J_TOP_BOTTOM_FLEX_BOTTOM, J_TOP_BOTTOM_FLEX_TOP]
    route_classes: [usb2_diff, cc_sbu_control, high_current_power, side_key_gpio]
    exact_nets:
      usb2: [USB_DP, USB_DN]
      type_c_pd: [USB_CC1, USB_CC2, USBPD_I2C_SCL, USBPD_I2C_SDA, USBPD_IRQ_N, USBPD_RESET_N]
      power: [VBUS, SYS, VBAT, CHG_INT_N, CHG_SCL, CHG_SDA, BAT_NTC, BAT_ID]
      side_keys: [PWR_KEY_N, VOL_UP_N, VOL_DOWN_N, AON_1V8, GND]
      shield: [SHIELD_GND]
    constraints:
      usb2_diff_impedance_ohm: 90
      usb2_intra_pair_skew_mm_max: 0.5
      usb2_total_length_mm_max: 90
      cc_vbus_stub_policy: place_esd_tvs_pd_and_current_path_at_connector_no_long_stubs
      vbus_loop_policy: shortest_wide_copper_to_protection_pd_charger_return_stitching
      shield_policy: chassis_or_shield_ground_strategy_must_match_enclosure_and_emi_review
      side_key_policy: route_aon_wake_lines_away_from_vbus_rf_and_haptic_switching
    current_blockers:
      - USB_DP_DN concept Manhattan path is 122.5 mm, 32.5 mm over the current 90 mm target
      - controlled-impedance flex or topology change is not signed
      - USB-C connector footprint, shell load path, STEP, and insertion-force path are not supplier approved
      - no KiCad routed USB2/CC/VBUS copper, DRC, length/skew, or USB attach evidence exists
    required_route_outputs:
      - board/kicad/e1-phone/production/reports/usb2-length-skew.csv
      - board/kicad/e1-phone/production/reports/si-pi/usb2-channel.json
      - board/kicad/e1-phone/production/reports/usb-c-pd-attach-log.json
      - board/kicad/e1-phone/production/reports/charger-cc-cv-cycle.json
      - board/kicad/e1-phone/production/reports/side-key-force-travel-wake-log.json
    status: blocked_missing_supplier_drawings_controlled_impedance_path_route_and_measurements
  - id: display_touch_mipi_dsi
    owner: layout_si
    route_regions: [U_SOC_LPDDR_UFS, J_DISPLAY_TOUCH, display_fpc_bend]
    route_classes: [mipi_dphy_diff, display_camera_control, display_bias_power]
    exact_nets:
      dsi_pairs: [DSI_CLK_P, DSI_CLK_N, DSI_D0_P, DSI_D0_N, DSI_D1_P, DSI_D1_N, DSI_D2_P, DSI_D2_N, DSI_D3_P, DSI_D3_N]
      control: [TOUCH_I2C_SCL, TOUCH_I2C_SDA, DSI_TE, DISPLAY_RESET_N]
      power: [DISP_AVDD_5V5, DISP_AVEE_N5V5, IO_1V8]
    constraints:
      mipi_dphy_diff_impedance_ohm: 100
      mipi_dphy_intra_pair_skew_mm_max: 0.25
      dsi_pair_length_mm_max: 45
      lane_order_policy: route_only_after_supplier_pinout_lane_order_and_polarity_are_signed
      bend_policy: keep_connector_and_escapes_inside_display_fpc_bend_datum_and_cover_stack
    current_blockers:
      - selected display connector land pattern, pinout, STEP, FPC bend, and stiffener data are not supplier signed
      - no DSI route, length/skew report, impedance coupon, or display bring-up log exists
      - routed board STEP has not been reimported against the display stack
    required_route_outputs:
      - board/kicad/e1-phone/production/reports/si-pi/display-touch-mipi-dsi.json
      - board/kicad/e1-phone/production/reports/display-touch-bringup-log.json
      - board/kicad/e1-phone/production/reports/routed-courtyard-utilization.yaml
    status: blocked_missing_display_pinout_connector_route_si_and_routed_step
  - id: front_rear_camera_mipi_csi
    owner: layout_si
    route_regions: [U_SOC_LPDDR_UFS, J_CAM0_CAM1, rear_camera, front_camera_earpiece]
    route_classes: [mipi_dphy_diff, display_camera_control, camera_power]
    exact_nets:
      rear_csi_pairs: [CAM0_CSI_CLK_P, CAM0_CSI_CLK_N, CAM0_CSI_D0_P, CAM0_CSI_D0_N, CAM0_CSI_D1_P, CAM0_CSI_D1_N, CAM0_CSI_D2_P, CAM0_CSI_D2_N, CAM0_CSI_D3_P, CAM0_CSI_D3_N]
      front_csi_pairs: [CAM1_CSI_CLK_P, CAM1_CSI_CLK_N, CAM1_CSI_D0_P, CAM1_CSI_D0_N, CAM1_CSI_D1_P, CAM1_CSI_D1_N]
      control: [CAM0_I2C_SCL, CAM0_I2C_SDA, CAM1_I2C_SCL, CAM1_I2C_SDA, CAM0_MCLK, CAM1_MCLK, CAM0_RESET_N, CAM1_RESET_N]
      power: [CAM_AVDD_2V8, CAM_DVDD_1V2, CAM_IOVDD_1V8]
    constraints:
      mipi_dphy_diff_impedance_ohm: 100
      mipi_dphy_intra_pair_skew_mm_max: 0.25
      rear_csi_pair_length_mm_max: 55
      front_csi_pair_length_mm_max: 65
      optical_policy: route_only_after_lens_axis_z_height_fpc_exit_and_cover_glass_datums_are_signed
    current_blockers:
      - camera module FPC pinouts, connector footprints, lens-axis datums, and STEP models are missing
      - no CSI route, length/skew/impedance report, capture log, or routed clearance result exists
    required_route_outputs:
      - board/kicad/e1-phone/production/reports/si-pi/camera-csi.json
      - board/kicad/e1-phone/production/reports/camera-capture-log.json
      - board/kicad/e1-phone/production/reports/routed-board-clearance-release.yaml
    status: blocked_missing_camera_supplier_geometry_route_si_and_capture_evidence
  - id: cellular_wifi_bt_rf_host
    owner: layout_rf
    route_regions: [U_CELL, U_WIFI_BT, top_antenna, bottom_antenna, sim_tray]
    route_classes: [rf_single, pcie_diff, usb2_diff, sdio_single, wireless_control_bt_uart, sim_nfc_sensor]
    exact_nets:
      rf_feeds: [CELL_RF_MAIN, CELL_RF_DIV, CELL_GNSS_RF, WIFI_BT_RF0, WIFI_BT_RF1]
      cellular_host: [CELL_USB2_DP, CELL_USB2_DN, CELL_PCIE_TX_P, CELL_PCIE_TX_N, CELL_PCIE_RX_P, CELL_PCIE_RX_N]
      wifi_host: [WIFI_PCIE_TX_P, WIFI_PCIE_TX_N, WIFI_PCIE_RX_P, WIFI_PCIE_RX_N, WIFI_SDIO_CLK, WIFI_SDIO_CMD, WIFI_SDIO_D0, WIFI_SDIO_D1, WIFI_SDIO_D2, WIFI_SDIO_D3]
      control: [BT_UART_TX, BT_UART_RX, BT_UART_CTS, BT_UART_RTS, WLAN_EN, BT_EN, HOST_WAKE_WLAN, HOST_WAKE_BT, CELL_RESET_N, CELL_W_DISABLE_N]
      identity: [USIM_VCC, USIM_CLK, USIM_RST, USIM_IO, USIM_DET, ESIM_VCC, ESIM_CLK, ESIM_RST, ESIM_IO]
      nfc: [NFC_I2C_SCL, NFC_I2C_SDA, NFC_IRQ_N, NFC_EN, NFC_RF_P, NFC_RF_N]
      sensors: [SENSOR_I2C_SCL, SENSOR_I2C_SDA]
    constraints:
      rf_single_impedance_ohm: 50
      pcie_diff_impedance_ohm: 85
      pcie_intra_pair_skew_mm_max: 0.15
      cellular_usb2_length_mm_max: 55
      wifi_pcie_length_mm_max: 35
      cellular_pcie_length_mm_max: 55
      rf_feed_policy: place_matching_network_and_conducted_access_before_antenna_feed_release
      via_fence_policy: continuous_ground_reference_and_rf_via_fence_required
    current_blockers:
      - cellular and Wi-Fi module pad maps, reference layouts, exact SKU constraints, RF keepouts, and STEP models are missing
      - no RF feed route, matching network release, VNA report, conducted RF log, coexistence matrix, or SAR prescan exists
      - antenna keepouts remain concept geometry only
    required_route_outputs:
      - board/kicad/e1-phone/production/reports/rf/vna-s11-s21.json
      - board/kicad/e1-phone/production/reports/rf/conducted-cellular-wifi-bt.json
      - board/kicad/e1-phone/production/reports/rf/coexistence-matrix.json
      - board/kicad/e1-phone/production/reports/rf/sar-prescan-plan.json
    status: blocked_missing_module_reference_layouts_rf_route_matching_and_measurements
  - id: compute_memory_storage_escape
    owner: layout_si_pi
    route_regions: [U_SOC_LPDDR_UFS, U_PMIC_CHARGER]
    route_classes: [lpddr, ufs_mphy, pcie_diff, power, debug_boot]
    exact_nets:
      lpddr: [LPDDR_CK_P, LPDDR_CK_N, LPDDR_DQS_P, LPDDR_DQS_N, LPDDR_CA0, LPDDR_CA1, LPDDR_CA2, LPDDR_CA3, LPDDR_RESET_N, LPDDR_ZQ]
      ufs: [UFS_REFCLK_P, UFS_REFCLK_N, UFS_TX_P, UFS_TX_N, UFS_RX_P, UFS_RX_N]
      debug_boot: [JTAG_TCK, JTAG_TMS, JTAG_TDI, JTAG_TDO, JTAG_TRST_N, BOOT_MODE0, BOOT_MODE1, BOOT_MODE2, SOC_RESET_N]
    constraints:
      lpddr_max_length_mm: 18
      lpddr_ca_group_skew_mm_max: 0.10
      lpddr_clock_strobe_skew_mm_max: 0.05
      ufs_max_length_mm: 28
      ufs_intra_pair_skew_mm_max: 0.10
      escape_policy: route_only_after_soc_memory_storage_pin_maps_decap_strategy_and_hdi_via_policy_are_frozen
    current_blockers:
      - SoC, LPDDR, UFS, PMIC pin maps and layout guides are not captured as release footprints
      - no HDI escape, memory training, UFS link, decap placement, or PDN report exists
    required_route_outputs:
      - board/kicad/e1-phone/production/reports/si-pi/memory-storage-length-skew.json
      - board/kicad/e1-phone/production/reports/si-pi/pdn-return-path.json
      - board/kicad/e1-phone/production/reports/memory-training-log.json
      - board/kicad/e1-phone/production/reports/ufs-link-training-log.json
    status: blocked_missing_package_pin_maps_hdi_escape_pi_and_training_evidence
  - id: split_interconnect_and_audio_haptics
    owner: layout_mechanical
    route_regions: [J_TOP_BOTTOM_FLEX_TOP, J_TOP_BOTTOM_FLEX_BOTTOM, U_AUDIO_SPK_MIC, haptic_lra, loudspeaker_mic_ports]
    route_classes: [usb2_diff, mipi_dphy_diff, high_current_power, audio_control_aon, audio_analog_haptic, test_access]
    exact_nets:
      split_critical: [USB_DP, USB_DN, VBUS, SYS, I2S_BCLK, I2S_LRCLK, I2S_DOUT, I2S_DIN, PDM_CLK, PDM_DAT, HAPTIC_OUT]
      audio: [AUDIO_I2C_SCL, AUDIO_I2C_SDA, CODEC_INT, AMP_INT, MIC_BIAS, SPK_OUT_P, SPK_OUT_N]
      haptic: [HAPTIC_OUT]
    constraints:
      minimum_split_contacts: 49
      usb2_return_policy: USB_DP_USB_DN_flanked_by_ground_or_return_contacts
      flex_policy: controlled_impedance_flex_stackup_bend_radius_and_mated_height_required
      acoustic_policy: route_clear_of_speaker_chamber_microphone_ports_gaskets_and_haptic_mass
    current_blockers:
      - exact flex or board-to-board connector family, pinout, stack height, and STEP are missing
      - split interconnect has no signed impedance, bend-life, DRC, or assembly drawing evidence
      - audio, microphone, haptic, gasket, and acoustic flex drawings are missing
    required_route_outputs:
      - board/kicad/e1-phone/production/pdf/split-interconnect-assembly.pdf
      - board/kicad/e1-phone/production/reports/si-pi/split-interconnect-usb-audio.json
      - board/kicad/e1-phone/production/reports/audio-haptic-functional-log.json
