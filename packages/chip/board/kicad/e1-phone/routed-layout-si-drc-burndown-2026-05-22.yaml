      usb_test_points: [USB_CC1, USB_CC2, USB_DP, USB_DN]
      side_key_test_points: [PWR_KEY_N, VOL_UP_N, VOL_DOWN_N]
      rf_conducted_access: [CELL_RF_MAIN, CELL_RF_DIV, CELL_GNSS_RF, WIFI_BT_RF0, WIFI_BT_RF1]
    constraints:
      test_point_policy: probe_coordinates_must_clear_enclosure_acoustic_paths_usb_shell_and_battery_window
      fiducial_policy: global_and_local_fiducials_required_for_top_bottom_side_assembly_and_flex_connectors
