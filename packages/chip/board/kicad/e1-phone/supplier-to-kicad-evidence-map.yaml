      status: blocked_until_selected_or_alternate_display_supplier_pack_is_reviewed
      branch_count: 2
      branches:
        - source_id: display_alternate_alibaba_meta_055wu01
          candidate: 055WU01
          required_before_kicad_use:
            - signed 2D drawing, FPC exit, pin-1 datum, cover-lens datum, and STEP model
            - exact 40-pin FPC pinout, mating connector MPN, and recommended land pattern
            - panel initialization, touch configuration, backlight/bias limits, and sample inspection
            - promotion review comparing connector, enclosure, supply, and bring-up risk against CH550FH01A-CT
          kicad_release_allowed: false
        - source_id: display_alternate_made_in_china_e549_amoled
          candidate: E549-HC01_RM67191_AMOLED_class
          required_before_kicad_use:
            - signed 2D drawing, FPC exit, active-area datum, touch-stack datum, and STEP model
            - exact AMOLED FPC pinout, mating connector MPN, and recommended land pattern
            - RM67191 power sequence, GT1151 touch configuration, burn-in/luminance data, and sample inspection
            - promotion review comparing z-height, touch stack, power sequencing, enclosure, and bring-up risk against CH550FH01A-CT
          kicad_release_allowed: false
