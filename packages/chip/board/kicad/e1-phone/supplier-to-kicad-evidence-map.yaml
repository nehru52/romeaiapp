      - FPC pinout including MIPI DSI lanes, touch I2C, reset, TE, backlight, bias, and grounds
      - mating connector MPN, height, keepout, and recommended land pattern
      - display/touch power sequence and inrush/backlight current data
      - STEP model for display stack, FPC tail, stiffener, and adhesive stack
      - sample inspection report for outline, FPC exit, and touch stack thickness
    required_production_evidence:
      rfq_transmittal: board/kicad/e1-phone/production/sourcing/display_touch/rfq-transmittal.yaml
      rfq_response_pack: board/kicad/e1-phone/production/sourcing/display_touch/rfq-response-pack.yaml
