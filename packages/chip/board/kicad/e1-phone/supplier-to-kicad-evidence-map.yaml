schema: eliza.e1_phone_supplier_to_kicad_evidence_map.v1
status: blocked_supplier_evidence_not_ready_for_kicad_capture
date: '2026-05-21'
claim_boundary: Supplier-to-KiCad evidence map only. It defines the exact production files required to turn RFQ
  responses into KiCad symbols, footprints, pinout reviews, and 3D model bindings. It does not approve any supplier,
  symbol, footprint, routed PCB, or enclosure fit.
source_artifacts:
  - board/kicad/e1-phone/supplier-rfq-intake.yaml
  - board/kicad/e1-phone/supplier-source-verification.yaml
  - board/kicad/e1-phone/display-camera-oem-source-revalidation.yaml
  - board/kicad/e1-phone/supplier-rfq-response-normalization.yaml
  - board/kicad/e1-phone/supplier-rfq-transmittal-drafts.yaml
  - board/kicad/e1-phone/pinout-footprint-freeze.yaml
  - board/kicad/e1-phone/schematic-symbol-footprint-closure.yaml
rfq_status: blocked_waiting_supplier_quote_drawing_sample_and_approval_packs
source_verification_status: public_sources_verified_not_supplier_approved_or_procurement_ready
rfq_transmittal_drafts_status: drafts_prepared_not_sent_not_supplier_evidence
pinout_freeze_status: blocked_pinout_footprint_freeze_missing_supplier_evidence
schematic_symbol_footprint_status: blocked_requires_real_kicad_symbols_supplier_footprints_and_erc
evidence_records:
