        board_use: primary_display_mechanical_anchor_for_78p0_x_153p6_mm_enclosure
        still_missing_before_use:
          - signed_display_drawing_with_fpc_exit_pin1_and_cover_lens_datums
          - exact_display_touch_fpc_pinout_and_mating_connector_mpn
          - panel_init_sequence_touch_controller_data_and_bias_current
