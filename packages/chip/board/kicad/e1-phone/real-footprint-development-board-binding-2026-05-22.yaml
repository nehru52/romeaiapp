schema: eliza.e1_phone_real_footprint_development_board_binding.v1
date: '2026-05-22'
status: development_board_bound_to_concrete_footprint_ids_not_release
claim_boundary: This board binds the routed-development snapshot to concrete development
  footprint library IDs and STEP-bound footprint files. Public USB-C pins and development
  contract-sequence display/camera/battery connector nets plus split-interconnect
  allocation nets are assigned for local continuity review only. Development support
  patterns are also assigned where local block-netlist evidence identifies their nets,
  and public compute SoM connector pins are mapped to e1-phone nets where the local
  SoM pinout capture has explicit pin numbers. Pads without assigned nets are explicitly
  classified by disposition so that NC, mechanical, unused, geometry-only, and supplier-pending
  contacts are explicitly classified rather than left as silent open work. It is still
  not a fabrication release because several patterns remain geometry-only or need
  supplier drawing/DFM signoff before pin order can be frozen.
