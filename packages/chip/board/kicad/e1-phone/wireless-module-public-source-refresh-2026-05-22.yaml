wireless_decision_delta:
  cellular_performance_reference:
    source_id: cellular_primary_quectel_rg255c_vendor_page_2026_05_22
    decision: keep RG255C/RM255C as performance reference, but do not route release because the current U_CELL region is too small.
    release_allowed: false
  cellular_compact_branch:
    source_ids:
      - cellular_compact_quectel_eg915q_vendor_page_2026_05_22
      - cellular_compact_quectel_eg915u_vendor_page_2026_05_22
    decision: keep EG915Q/EG915U class as the active compact LTE Cat 1 bis RFQ branch; it still needs a larger/repacked cellular region, supplier pad map, reference layout, carrier scope, and explicit throughput tradeoff signoff.
    release_allowed: false
  wifi_bluetooth_primary:
    source_id: wifi_bluetooth_murata_type_2ea_vendor_page_2026_05_22
    decision: keep Murata LBEE5XV2EA-802 as primary Wi-Fi 6E/Bluetooth module because public outline fits the reserved region and current vendor page shows in-production status plus design-file signals.
    release_allowed: false

cross_checks:
  refreshed_rg255c_envelope_preserves_current_fit_blocker: true
  refreshed_eg915q_eg915u_compact_branch_preserves_size_reduction_and_tradeoff_gate: true
  refreshed_murata_type_2ea_preserves_wifi_bluetooth_primary_selection: true
  refreshed_murata_type_2ea_preserves_in_production_and_design_asset_signal: true
  refreshed_sources_do_not_unlock_supplier_design_pack_gate: true
  refreshed_sources_do_not_unlock_rf_routing_or_factory_release: true
  refreshed_sources_do_not_unlock_fabrication_or_enclosure_release: true

release_blockers:
  - public module pages are not supplier design packs, signed pad maps, reference-layout approvals, STEP/B-rep packs, or firmware/regulatory release evidence
  - selected RedCap cellular reference does not fit the current U_CELL region and requires top-island repack or a smaller supplier-approved branch
  - EG915Q/EG915U compact LTE Cat 1 bis branch reduces area but loses RedCap performance and still needs region SKU, band matrix, carrier scope, pad map, reference layout, STEP/B-rep, firmware, and SAR review
  - Murata Type 2EA public page exposes useful design-file signals but the actual project still lacks reviewed land pattern, STEP/B-rep, antenna gain review, firmware/NVRAM/CLM/license archive, and regulatory database
  - routed RF geometry, matching networks, conducted access, VNA/coexistence/SAR evidence, factory RF limits, and first-article logs are missing

forbidden_claims:
  - cellular_region_ready
  - cellular_branch_selected
  - cellular_ready
  - wifi_ready
  - bluetooth_ready
  - rf_ready
  - firmware_ready
  - regulatory_ready
  - carrier_ready
  - sar_ready
