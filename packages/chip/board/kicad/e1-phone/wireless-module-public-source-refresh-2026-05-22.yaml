schema: eliza.e1_phone_wireless_module_public_source_refresh.v1
status: public_wireless_module_refresh_not_supplier_design_pack_or_release_evidence
date: 2026-05-22
claim_boundary: >
  Public web refresh for the E1 phone off-the-shelf cellular and
  Wi-Fi/Bluetooth module candidates. This records browser/search-visible module
  size, lifecycle, interface, and document-availability signals for RFQ and
  layout-risk decisions only. It is not a supplier design pack, not a signed
  pad map, not a reference-layout approval, not firmware/regulatory release,
  not routed RF evidence, and not authorization to route, fabricate, or release
  the PCB for enclosure placement.

source_artifacts:
  - board/kicad/e1-phone/radio-module-selection-wiring-decision.yaml
  - board/kicad/e1-phone/radio-module-envelope-orderability-gate.yaml
  - board/kicad/e1-phone/wireless-module-release-execution.yaml
  - board/kicad/e1-phone/cellular-space-saving-downselect.yaml
  - board/kicad/e1-phone/supplier-rfq-response-normalization.yaml
  - package/cellular/quectel-5g-redcap.yaml
  - package/wifi/murata-type-2ea-wifi6e.yaml

refresh_policy:
  checked_date: 2026-05-22
  method: live_public_web_search_result_and_vendor_page_refresh
  source_use_limit: rfq_seed_shortlist_fit_and_design_pack_request_only
  supplier_design_pack_required_before_layout_release: true
  signed_pad_map_land_pattern_required_before_footprint_freeze: true
  firmware_regulatory_and_carrier_scope_required_before_factory_release: true
  public_web_refresh_can_unlock_rf_routing: false
  public_web_refresh_can_unlock_enclosure_ready: false
  public_web_refresh_can_unlock_fabrication_ready: false

