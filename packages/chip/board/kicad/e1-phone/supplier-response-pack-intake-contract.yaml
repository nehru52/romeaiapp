intake_review_gates:
  - id: schema_completeness
    pass_required: true
    release_allowed: false
    required_before_unlock:
      - every required response field is populated with a supplier-originated value or archived supplier document path
      - every required boolean gate is true with reviewer initials and date
  - id: document_authenticity
    pass_required: true
    release_allowed: false
    required_before_unlock:
      - signed 2D drawings, pinouts, land patterns, STEP/B-rep, compliance, and sample reports are supplier-originated
      - public listing screenshots or draft RFQs are not accepted as release evidence
  - id: engineering_review
    pass_required: true
    release_allowed: false
    required_before_unlock:
      - EE signs pinout and symbol review
      - layout signs footprint, courtyard, paste, and assembly orientation review
      - ME signs STEP/B-rep, enclosure datums, height, clearance, and load-path review
  - id: ops_release
    pass_required: true
    release_allowed: false
    required_before_unlock:
      - orderable MPN, MOQ, price breaks, lead time, lifecycle, sample lot, compliance, and AVL/substitution policy are approved for EVT1
      - quote approval is tied to supplier legal name, payment terms, delivery risk, and production archive path before any buy or release claim

downstream_unlock_policy:
  schematic_symbol_capture_allowed_without_packs: false
  footprint_assignment_allowed_without_packs: false
  routed_layout_allowed_without_packs: false
  routed_step_export_allowed_without_packs: false
  production_bom_avl_allowed_without_packs: false
  enclosure_clearance_allowed_without_packs: false
  first_article_release_allowed_without_packs: false

cross_checks:
  response_fields_match_normalization_schema: true
  boolean_gates_match_normalization_schema: true
  planned_response_packs_match_normalization_records: true
  planned_response_packs_match_supplier_evidence_map: true
  selected_release_pack_count_matches_final_readiness_gate: true
  every_planned_response_pack_absent: true
  all_intake_review_gates_fail_closed: true
  downstream_unlock_policy_fail_closed: true
  blank_response_pack_template_is_not_release_evidence: true

release_blockers:
  - supplier response packs have not been returned or archived
  - selected display, camera, USB-C, side-key, cellular, and Wi-Fi/Bluetooth packs are absent
  - battery, audio/haptic, and split-interconnect packs remain required before full routed release
  - no response pack has passed schema, authenticity, EE, layout, ME, ops, sample, and compliance review
  - placeholder or partial response packs cannot unlock schematic capture, footprint assignment, routing, STEP export, enclosure clearance, BOM/AVL, or first article

forbidden_claims:
  - supplier_pack_complete
  - pinout_freeze_ready
  - footprint_ready
  - routed_layout_ready
  - routed_board_step_ready
  - production_bom_ready
  - enclosure_ready
  - fabrication_ready
  - end_to_end_phone_ready
