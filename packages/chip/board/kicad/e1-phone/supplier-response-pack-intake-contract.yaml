schema: eliza.e1_phone_supplier_response_pack_intake_contract.v1
status: blocked_response_pack_intake_contract_ready_no_supplier_packs_received
date: 2026-05-21
claim_boundary: >
  Acceptance contract for supplier RFQ response packs. This defines the exact
  machine-readable package shape, evidence classes, review gates, and archive
  paths required before supplier data can unlock KiCad symbols, footprints,
  routing, enclosure clearance, production BOM/AVL, or first-article release.
  This is not a supplier response, not a quote, not an AVL, not a signed drawing,
  not a STEP/B-rep pack, and not approval to route or fabricate.

source_artifacts:
  - board/kicad/e1-phone/supplier-rfq-intake.yaml
  - board/kicad/e1-phone/supplier-rfq-transmittal-drafts.yaml
  - board/kicad/e1-phone/supplier-rfq-response-normalization.yaml
  - board/kicad/e1-phone/supplier-to-kicad-evidence-map.yaml
  - board/kicad/e1-phone/supplier-sample-release-gate.yaml
  - board/kicad/e1-phone/end-to-end-readiness.yaml
  - board/kicad/e1-phone/sourcing-drafts/rfq-response-pack-template.yaml

intake_contract:
  archive_root: board/kicad/e1-phone/production/sourcing
  response_pack_template: board/kicad/e1-phone/sourcing-drafts/rfq-response-pack-template.yaml
  planned_response_pack_count: 10
  selected_release_response_pack_count: 7
  present_response_pack_count: 0
  missing_response_pack_count: 10
  every_planned_response_pack_absent: true
  placeholder_or_partial_pack_unlocks_release: false
  public_marketplace_listing_counts_as_supplier_pack: false
  draft_transmittal_counts_as_supplier_pack: false
  sample_lot_minimum: 5
  quote_quantities: [10, 100, 1000]
  required_response_format: supplier_signed_pdf_or_native_cad_plus_machine_readable_summary
  accepted_document_languages: [english, bilingual_supplier_original_plus_english]

required_response_fields:
  - function
  - candidate
  - supplier_legal_name
  - supplier_contact
  - marketplace_or_vendor_url
  - orderable_manufacturer_part_number
  - supplier_sku
  - lifecycle_status
  - MOQ
  - unit_price_10
  - unit_price_100
  - unit_price_1000
  - lead_time_days_10
  - lead_time_days_100
  - lead_time_days_1000
  - signed_2d_drawing_path
  - pinout_or_pad_map_path
  - mating_connector_mpn
  - recommended_land_pattern_path
  - step_or_brep_model_path
  - electrical_specs_path
  - reference_schematic_or_layout_path
  - compliance_pack_index_path
  - sample_lot_tracking
  - incoming_inspection_path
  - firmware_or_driver_pack_path
  - regulatory_or_modular_grant_scope
  - enclosure_datums_and_keepouts_path
  - approved_by_ee
  - approved_by_me
  - approved_by_ops

required_boolean_gates:
  - orderable_mpn_received
  - signed_2d_drawing_received
  - pinout_or_pad_map_received
  - recommended_land_pattern_received
  - step_or_brep_model_received
  - sample_received_and_inspected
  - compliance_pack_received
  - pinout_symbol_footprint_reviews_complete
  - enclosure_datums_reviewed
  - quote_approved_for_evt1_buy

