schema: eliza.e1_phone_usb_sidekey_source_revalidation.v1
status: public_sources_revalidated_usb_sidekey_not_supplier_approved
date: '2026-05-21'
claim_boundary: >
  Public-source revalidation only. Browser-visible vendor fields can seed RFQs,
  footprint risk review, and enclosure load-path planning, but they are not
  signed drawings, final land patterns, STEP models, samples, DRC evidence, or
  measured validation.
source_artifacts:
  - package/usb-c/e1-phone-usb-c-port.yaml
  - package/human-interface/side-buttons.yaml
  - board/kicad/e1-phone/usb-sidekey-integration.yaml
  - board/kicad/e1-phone/usb-sidekey-acceptance-checklist.yaml

browser_revalidation_context:
  method: manual_browser_open_and_search_on_2026_05_21
  current_browser_result:
    checked_date: '2026-05-21'
    usb_evt0_connector_source_still_exposes:
      - GCT USB4105 family
      - USB Type-C receptacle
      - USB2-only active contact strategy for easier EVT routing
      - 24-position shell/mechanical footprint class with dummy pins
      - VBUS 5 A collective rating
      - -40 C to 85 C operating temperature class
    usb_production_alternate_source_still_exposes:
      - Molex 221632 or 217804 Port-On waterproof Type-C family
      - USB 3.2 Gen 2 capable 24-pin receptacle class
      - mid-mount or top-mount mechanical options
      - IPX5 to IPX8 family options
      - 5 A or 6 A current-rating family signal
    primary_side_switch_source_still_exposes:
      - Panasonic EVQ-P7 or related EVQ-P3/EVQ-9P7 side-push tactile family
      - side-push SMD tactile switch class
      - 3.5 x 2.9 x 1.35 mm envelope class
      - 0.2 mm travel class
      - L, J-bent, or straight terminal options
      - mobile phone, digital camera, and portable audio application class
    alternate_side_switch_source_still_exposes:
      - Littelfuse or C&K KMR2 tactile switch family
      - micro-miniature SMT tactile class
      - 4.2 x 2.2 x 1.9 mm envelope class
      - top-actuated force-path alternate only

revalidated_sources:
  - id: usb_evt0_gct_usb4105
    group: usb_c
    source_type: direct_vendor_pdf_opened_2026_05_21
    supplier: GCT
    url: https://gct.co/files/specs/usb4105-spec.pdf
    candidate: USB4105
    observed_public_fields:
      family: USB4105
      connector_type: USB_Type_C_USB2_receptacle
      active_contacts: 16
      mechanical_contacts: 24_position_with_dummy_pins
      current_rating: VBUS_5A_collective
      temperature_c:
        min: -40
        max: 85
    board_decision: keep_as_evt0_usb2_pd_charge_debug_receptacle_pending_signed_drawing_land_pattern_step_and_samples
    blocking_gap: signed_drawing_land_pattern_shell_stake_step_reflow_and_insertion_force_data_missing
  - id: usb_production_molex_port_on_waterproof
    group: usb_c
    source_type: direct_vendor_datasheet_opened_2026_05_21
    supplier: Molex
    url: https://www.molex.com/content/dam/molex/molex-dot-com/en_us/pdf/datasheets/987651-4081.pdf
    candidate: 221632_or_217804_Port_On_Type_C_family
    observed_public_fields:
      connector_type: USB_Type_C_24_pin_waterproof_receptacle
      features:
        - USB_3_2_Gen_2
        - mid_mount_or_top_mount_options
        - IPX5_IPX8_options
      current_rating: up_to_5A_or_6A_family_dependent
    board_decision: keep_as_production_alternate_only_if_usb3_dp_lanes_and_waterproof_enclosure_are_selected
    blocking_gap: superspeed_lane_bonding_si_escape_cutout_gasket_and_drain_review_missing
  - id: side_switch_primary_panasonic_evq_p7
    group: side_buttons
    source_type: direct_vendor_page_opened_2026_05_21
    supplier: Panasonic Industry
    url: https://na.industrial.panasonic.com/products/switches-encoders-interface-devices/switches/light-touch-tactile-switches/series/79247
    candidate: EVQ-P7_EVQ-P3_EVQ-9P7_side_push_family
    observed_public_fields:
      switch_type: SMD_side_push_tactile
      dimensions_mm:
        length: 3.5
        width: 2.9
        height: 1.35
      travel_mm: 0.2
      terminal_options:
        - L_shape
        - J_bent
        - straight
      applications:
        - mobile_phones
        - digital_cameras
        - portable_audio
    board_decision: keep_as_primary_side_push_family_for_phone_edge_power_and_volume
    blocking_gap: exact_mpn_force_curve_lifecycle_stock_land_pattern_step_and_sample_force_travel_data_missing
  - id: side_switch_alternate_ck_kmr2
    group: side_buttons
    source_type: direct_vendor_page_opened_2026_05_21
    supplier: Littelfuse_CK
    url: https://www.ckswitches.com/products/switches/product-details/Tactile/KMR2
    candidate: KMR2
    observed_public_fields:
      switch_type: micro_miniature_SMT_tactile_top_actuated
      dimensions_mm:
        length: 4.2
        width: 2.2
        height: 1.9
    board_decision: keep_as_alternate_only_if_enclosure_plunger_converts_side_motion_to_top_actuation
    blocking_gap: side_plunger_load_path_force_curve_land_pattern_step_and_sample_data_missing

layout_decisions:
  usb_evt0: GCT_USB4105_remains_evt0_usb2_pd_charge_debug_receptacle
  usb_production: Molex_Port_On_waterproof_family_remains_conditional_superspeed_or_waterproof_alternate
  side_buttons_primary: Panasonic_EVQ_side_push_family_remains_primary_phone_edge_switch_class
  side_buttons_alternate: C_and_K_KMR2_remains_top_actuated_alternate_only

cross_checks:
  evt0_usb_matches_package_binding: true
  production_usb_alternate_matches_package_binding: true
  side_switch_primary_matches_package_binding: true
  side_switch_alternate_matches_package_binding: true
  usb_evt0_remains_usb2_to_reduce_route_density: true
  production_superspeed_remains_conditional_not_promoted: true
  side_key_requires_flex_or_enclosure_load_path: true
  requires_quote_drawing_samples_before_release: true

required_next_supplier_artifacts:
  - GCT USB4105 signed drawing, recommended land pattern, STEP, reflow profile, shell stake dimensions, insertion-force data,
    and lifecycle/stock confirmation
  - Molex waterproof Type-C exact MPN decision, gasket/cutout datum, STEP, recommended land pattern, and SI escape rules if
    USB3/DP is promoted
  - Panasonic exact EVQ side-push MPN, force-travel curve, land pattern, STEP, lifecycle/stock status, and sample lot
  - side-key flex or enclosure switch subassembly drawing with plunger datum, stiffener stack, bend radius, and adhesive notes

release_blockers:
  - public pages are not signed connector or switch drawings
  - USB-C and side-key land patterns, STEP models, samples, force data, and lifecycle checks are missing
  - routed USB2/CC/VBUS and side-key flex implementation are missing
  - enclosure shell capture, plug overmold sweep, and button load-path measurements are missing

forbidden_claims:
  - usb_c_supplier_approved
  - usb_c_ready
  - side_button_supplier_approved
  - side_buttons_ready
  - charging_ready
  - enclosure_ready
  - fabrication_ready
