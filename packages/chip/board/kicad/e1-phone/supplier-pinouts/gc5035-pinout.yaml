  - https://newmoshine.en.made-in-china.com/product/BJYUCxwcAoWv/China-Factory-Customized-Gc5035-Auto-Focus-Full-HD-5MP-30fps-Mipi-Camera-Module.html
  - https://www.sinoseen.com/high-resolution-gc5035-5mp-dual-lens-camera-module-mipi-interface
