captured_by: agent
evidence_class: public_supplier_datasheet
procurement_status: per_pin_fpc_pinout_requires_module_house_signed_drawing
procurement_url: https://sincerefirst.en.made-in-china.com/contactus.html
notes: |
  GC5035 is a 5MP 1/5" CMOS image sensor (2592x1944). Fixed-focus and
  auto-focus module variants wrap the sensor on module-house-specific FPC
  tails. The selected public SF-G5035S60FY listing and Sincere First catalog
  identify a 30-pin OK-06M030-04 connector class, not the older placeholder
  22-pin assumption. The module still carries 2-lane MIPI CSI-2, 3-rail power,
  I2C, MCLK, reset, and power-down. Per-pin FPC ordering is captured only by
  the signed 2D drawing in the supplier RFQ response.
mechanical:
  sensor: GC5035
  resolution_mp: 5
  resolution_px: [2592, 1944]
  pixel_size_um: 1.12
  optical_format_in: 0.2
  fpc_pin_count: 30
  fpc_pitch_mm: 0.5
  csi2_lanes: 2
  af: optional_per_variant
electrical:
  AVDD_v: 2.8
  DVDD_v: 1.2
  IOVDD_v: 1.8
  MCLK_mhz: 24
pin_signal_set:
  power:
    - AVDD (2.8 V, sensor analog)
    - DVDD (1.2 V, sensor digital core)
    - IOVDD (1.8 V, IO domain)
    - AFVDD (2.8 V, only on AF variant)
    - GND (multiple)
  mipi_csi2:
    - MIPI_CLK_P
    - MIPI_CLK_N
    - MIPI_D0_P
    - MIPI_D0_N
    - MIPI_D1_P
    - MIPI_D1_N
  control:
    - MCLK (24 MHz from host)
    - I2C_SCL
    - I2C_SDA
    - RESET_N
    - PWDN
pins:
  - pin: ALL
    name: fetch_required
    function: full_30pin_fpc_order
    direction: unknown
    voltage_v: null
    notes: |
      Per-pin FPC ordering is published only on the module house signed 2D
      drawing. Pull through the RFQ procurement path in
      board/kicad/e1-phone/supplier-rfq-intake.yaml (front_camera record).
