package: 5MP CMOS sensor module on 30-pin 0.5 mm-pitch FPC connector class
source_doc: https://sincerefirst.en.made-in-china.com/product/stzRqCgufMVy/China-5MP-Gc5035-CMOS-Image-Sensor-Small-Size-Fixed-Focus-Mipi-Camera-Module.html
