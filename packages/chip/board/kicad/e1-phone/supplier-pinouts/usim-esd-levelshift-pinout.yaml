schema: eliza.e1_phone_supplier_pinout.v1
part: TXS4555-class SIM interface supply/level-shift development contract
manufacturer: Texas Instruments development function class
package: 10-pad development carrier pattern
source_doc: https://www.ti.com/product/TXS4555
source_doc_alt:
  - https://www.ti.com/document-viewer/TXS4555/datasheet
source_doc_revision: public product page and datasheet observed 2026-05-22; development footprint is 10-pad board-side contract
captured_date: 2026-05-22
captured_by: agent
evidence_class: public_supplier_datasheet
procurement_status: public_usim_signal_contract_pending_selected_levelshift_pinout
procurement_url: https://www.ti.com/product/TXS4555/part-details/TXS4555RGTR
notes: |
  Board-side development contract for USIM_ESD_LEVELSHIFT_DEV. It captures the
  SIM/eSIM card-domain signals used on the current KiCad board. Exact package
  pins and ESD array topology still require selected MPN review.
mechanical:
  package_family: usim_levelshift_development_carrier
  pin_count: 10
pin_signal_set:
  card_side:
    - USIM_VCC
    - USIM_CLK
    - USIM_RST
    - USIM_IO
    - USIM_DET
  host_side:
    - IO_1V8
    - GND
pins:
  - {pin: '1', name: USIM_VCC, function: sim_card_supply, direction: power_output}
  - {pin: '2', name: USIM_CLK, function: sim_clock, direction: output}
  - {pin: '3', name: USIM_RST, function: sim_reset, direction: output}
  - {pin: '4', name: USIM_IO, function: sim_data, direction: bidirectional}
  - {pin: '5', name: USIM_DET, function: sim_detect, direction: input}
  - {pin: '6', name: GND, function: return, direction: power_return}
  - {pin: '7', name: IO_1V8, function: host_logic_power, direction: power_input, voltage_v: 1.8}
  - {pin: '8', name: RESERVED_8, function: development_spare, direction: passive}
  - {pin: '9', name: RESERVED_9, function: development_spare, direction: passive}
  - {pin: '10', name: RESERVED_10, function: development_spare, direction: passive}
release_blockers:
  - selected SIM level-shifter/ESD exact pin table
  - SIM hot-plug and ESD qualification evidence
  - production schematic symbol, land pattern, and STEP review
