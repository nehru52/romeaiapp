schema: eliza.e1_phone_supplier_pinout.v1
part: PN7160-class NFC controller development contract
manufacturer: NXP development function class
package: 32-pin 0.5 mm pitch QFN development carrier pattern
source_doc: https://www.nxp.com/products/PN7160
source_doc_alt:
  - https://www.nxp.com/docs/en/data-sheet/PN7160_PN7161.pdf
