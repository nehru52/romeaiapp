notes: |
  Board-side development contract for NFC_CONTROLLER_QFN_DEV. It captures the
  I2C control bus, IRQ/enable, power rails, and differential NFC antenna feed
  used by the current KiCad development board. Exact PN7160 package is HVQFN40,
  so this 32-pin carrier remains non-release until the selected controller is
  locked and the production footprint is replaced or reconciled.
mechanical:
  package_family: qfn_development_carrier
  pin_count: 32
  pitch_mm: 0.5
pin_signal_set:
  power:
    - AON_1V8
    - IO_1V8
    - GND
  host_control:
    - NFC_I2C_SCL
    - NFC_I2C_SDA
    - NFC_IRQ_N
    - NFC_EN
  antenna:
    - NFC_RF_P
    - NFC_RF_N
pins:
  - {pin: '1', name: AON_1V8, function: always_on_power, direction: power_input, voltage_v: 1.8}
  - {pin: '2', name: IO_1V8, function: io_power, direction: power_input, voltage_v: 1.8}
  - {pin: '3', name: GND, function: return, direction: power_return}
  - {pin: '4', name: NFC_I2C_SCL, function: i2c_clock, direction: input}
  - {pin: '5', name: NFC_I2C_SDA, function: i2c_data, direction: bidirectional}
  - {pin: '6', name: NFC_IRQ_N, function: interrupt, direction: output}
  - {pin: '7', name: NFC_EN, function: enable, direction: input}
  - {pin: '8', name: NFC_RF_P, function: antenna_positive, direction: rf}
