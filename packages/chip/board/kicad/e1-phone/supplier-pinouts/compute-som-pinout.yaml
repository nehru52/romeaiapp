schema: eliza.e1_phone_supplier_pinout.v1
evidence_class: public_som_connector_pinout
date: '2026-05-21'
claim_boundary: >
  Public board-to-board (gold-finger SODIMM) connector pinout for the chosen
  off-the-shelf compute System-on-Module. This retires the e1-phone's only
  NDA-gated procurement blocker (bare Unisoc T606 BGA ball-map): the phone is
  now buildable from public data via a turnkey SoM whose carrier-side connector
  map is published without NDA. This is NOT a production-release evidence file;
  the production gate (pinout-review/<function>.yaml + FAI signoff) is separate.

part:
  mpn: Core-3566JD4
  vendor: Firefly (T-chip Intelligent Technology, Shenzhen)
  function: application_processor_compute_som
  description: >
    RK3566 quad-core Cortex-A55 @ up to 1.8 GHz + Mali-G52 2EE GPU + 1 TOPS NPU
    System-on-Module. Integrates SoC + LPDDR4 (1/2/4/8 GB) + eMMC (8-128 GB) on
    a 69.6 x 48 x 4.3 mm module. Carrier interface is a single 260-pin gold-finger
    SODIMM edge connector at 0.5 mm pitch (the public datasheet publishes the full
    per-pin signal table reproduced below).
  recommended_config: 2GB_LPDDR4_32GB_eMMC
  connector:
    type: gold_finger_edge_sodimm
    pin_count: 260
    pitch_mm: 0.5
    carrier_mating_socket: standard SODIMM 260P 0.5 mm socket (e.g. JAE / Foxconn DDR4-SODIMM-class)
  operating:
    input_voltage_v: 5.0
    input_voltage_tol_pct: 5
    recommended_supply: 5.0V @ 1.5A
    operating_temp_c: [-20, 60]
  os_bsp:
    public_bsp: [Android 11, Ubuntu, Debian, Buildroot+Qt, OpenWRT]
    bsp_source: Rockchip RK356x SDK (publicly mirrored; Firefly wiki distributes board BSP)

source_doc:
  - name: Core-3566JD4 Specification (EN) — full 260-pin SODIMM pin-definition table
    url: https://download.t-firefly.com/Spec/CoreBorads/Core-3566JD4_Specification_EN.pdf
  - name: Core-3566JD4 product page (specs, interfaces, datasheet link)
    url: https://en.t-firefly.com/product/core/core3566jd4.html
  - name: Core-3566JD4 Wiki (interface definition, schematics, BSP, backplane reference)
    url: https://wiki.t-firefly.com/en/Core-3566JD4/
  - name: RK3566 Datasheet (Rockchip public)
    url: https://www.rock-chips.com/uploads/pdf/2022.8.26/192/RK3566%20Brief%20Datasheet.pdf
  - name: RK3566 Hardware Design Guide (public reference design data)
    url: https://www.scribd.com/document/900576470/Rockchip-RK3566-Hardware-Design-Guide-V1-1-En

capture_note: >
  Pin numbers below are the SODIMM gold-finger pad numbers from the public
  Core-3566JD4 specification PDF. Odd pins are Part A (one edge face), even pins
  are Part B (the opposite face), per the datasheet's two-column layout. Signal
  names are the module's net names (carrier side); the datasheet also lists the
  underlying RK3566 ball and the SoC mux function per pad. Only the e1-phone-
  relevant nets are captured here; the full 260-pad table is in source_doc[0].

# --- Power / ground ---------------------------------------------------------
power:
  rails:
    - {pin: 251, name: VCC5V0_SYS, type: power_in, note: main 5V input}
    - {pin: 253, name: VCC5V0_SYS, type: power_in, note: 5.0V +/-5%}
    - {pin: 255, name: VCC5V0_SYS, type: power_in}
    - {pin: 257, name: VCC5V0_SYS, type: power_in, note: 'recommend 5.0V @ 1.5A'}
    - {pin: 259, name: VCC5V0_SYS, type: power_in}
    - {pin: 254, name: VCC5V0_SYS, type: power_in}
    - {pin: 256, name: VCC5V0_SYS, type: power_in}
    - {pin: 258, name: VCC5V0_SYS, type: power_in}
    - {pin: 260, name: VCC5V0_SYS, type: power_in}
    - {pin: 234, name: VCC3V3_SYS, type: power_out, note: 3.3V system rail from module PMIC}
    - {pin: 235, name: VCC3V3_SYS, type: power_out}
    - {pin: 226, name: VCC3V3_SD, type: power_out, note: 3.3V SD/SDMMC0 rail}
    - {pin: 227, name: VCC3V3_SD, type: power_out}
    - {pin: 228, name: VCC_1V8, type: power_out, note: 1.8V rail}
    - {pin: 224, name: VCCIO_WL, type: power_out, note: 1.8V output for Wi-Fi VCCIO}
    - {pin: 230, name: VCCIO_ACODEC, type: power_out, note: 3.3V audio-codec IO rail}
    - {pin: 221, name: PMIC_PWRON, type: input, active: low, note: PMIC power-on}
    - {pin: 232, name: PMIC_32KOUT_WIFI, type: output, note: 32.768 kHz clock for Wi-Fi}
  ground_pins: [7, 13, 19, 43, 61, 79, 97, 115, 158, 172, 190, 222, 244, 246, 248, 250]

# --- Boot / reset / control -------------------------------------------------
boot_reset:
  - {pin: 152, name: RECOVERY, type: input, mux: SARADC_VIN0, note: recovery / boot-mode select (SARADC level)}
  - {pin: 218, name: SYS_RESET, type: input, active: low, mux: RESET_KEY, note: system reset key}
  - {pin: 216, name: PHY_RST, type: output, active: low, note: ethernet PHY reset}

# --- MIPI-DSI (display) -- two DSI links; e1-phone uses DSI0 -----------------
mipi_dsi:
  dsi0:
    - {pin: 90, name: MIPI_DSI_TX0_CLKN, alt: LVDS_TX0_CLKN}
    - {pin: 92, name: MIPI_DSI_TX0_CLKP, alt: LVDS_TX0_CLKP}
    - {pin: 81, name: MIPI_DSI_TX0_D3N, alt: LVDS_TX0_D3N}
    - {pin: 83, name: MIPI_DSI_TX0_D3P, alt: LVDS_TX0_D3P}
    - {pin: 85, name: MIPI_DSI_TX0_D2N, alt: LVDS_TX0_D2N}
    - {pin: 87, name: MIPI_DSI_TX0_D2P, alt: LVDS_TX0_D2P}
    - {pin: 89, name: MIPI_DSI_TX0_D1N, alt: LVDS_TX0_D1N}
    - {pin: 91, name: MIPI_DSI_TX0_D1P, alt: LVDS_TX0_D1P}
    - {pin: 93, name: MIPI_DSI_TX0_D0N, alt: LVDS_TX0_D0N}
    - {pin: 95, name: MIPI_DSI_TX0_D0P, alt: LVDS_TX0_D0P}
  dsi1:
    - {pin: 72, name: MIPI_DSI_TX1_CLKN}
    - {pin: 74, name: MIPI_DSI_TX1_CLKP}
    - {pin: 63, name: MIPI_DSI_TX1_D3N}
    - {pin: 65, name: MIPI_DSI_TX1_D3P}
    - {pin: 67, name: MIPI_DSI_TX1_D2N}
    - {pin: 69, name: MIPI_DSI_TX1_D2P}
    - {pin: 71, name: MIPI_DSI_TX1_D1N}
    - {pin: 73, name: MIPI_DSI_TX1_D1P}
    - {pin: 75, name: MIPI_DSI_TX1_D0N}
    - {pin: 77, name: MIPI_DSI_TX1_D0P}
  display_control:
    - {pin: 28, name: LCD0_RST_L, active: low, note: MIPI-DSI0 panel reset}
    - {pin: 26, name: TP0_RST_L, active: low, note: DSI0 touch-panel reset}
    - {pin: 125, name: LCD_PWR_EN, active: low, note: DSI0 panel power enable}
    - {pin: 127, name: TP_INT, active: low, note: DSI0 touch interrupt}
    - {pin: 120, name: BL_EN, active: high, note: backlight enable}

# --- MIPI-CSI (camera) -- 4-lane RX; supports 2 cameras ---------------------
mipi_csi:
  csi_rx:
    - {pin: 66, name: MIPI_CSI_RX_CLK0N}
    - {pin: 68, name: MIPI_CSI_RX_CLK0P}
    - {pin: 60, name: MIPI_CSI_RX_CLK1N}
    - {pin: 62, name: MIPI_CSI_RX_CLK1P}
    - {pin: 57, name: MIPI_CSI_RX_D0N}
    - {pin: 59, name: MIPI_CSI_RX_D0P}
    - {pin: 53, name: MIPI_CSI_RX_D1N}
    - {pin: 55, name: MIPI_CSI_RX_D1P}
    - {pin: 49, name: MIPI_CSI_RX_D2N}
    - {pin: 51, name: MIPI_CSI_RX_D2P}
    - {pin: 45, name: MIPI_CSI_RX_D3N}
    - {pin: 47, name: MIPI_CSI_RX_D3P}
  camera_control:
    - {pin: 1, name: MIPI_MCLK0, type: output, note: rear-camera reference clock}
    - {pin: 21, name: MIPI_MCLK1, type: output, note: front-camera reference clock}
    - {pin: 20, name: MIPI_RESET0_CAM, note: CSI0 camera reset}
    - {pin: 31, name: MIPI_RESET1_CAM, note: CSI1 camera reset}
    - {pin: 29, name: MIPI_PDN1_CAM, note: CSI1 camera power-down}

# --- USB (modem over USB, plus host/OTG) ------------------------------------
usb:
  usb2_host2:
    - {pin: 9, name: USB_HOST2_DM}
    - {pin: 11, name: USB_HOST2_DP}
  usb2_host3:
    - {pin: 15, name: USB_HOST3_DM}
    - {pin: 17, name: USB_HOST3_DP}
  usb3_super_speed:
    - {pin: 155, name: USB3_HOST1_SSTXP, alt: SATA1_TXP}
    - {pin: 157, name: USB3_HOST1_SSTXN, alt: SATA1_TXN}
    - {pin: 159, name: USB3_HOST1_SSRXP, alt: SATA1_RXP}
    - {pin: 161, name: USB3_HOST1_SSRXN, alt: SATA1_RXN}
  usb_control:
    - {pin: 145, name: USB_OTG0_VBUSDET, type: input, active: high}
    - {pin: 33, name: VCC5V0_USB30_EN, active: high, note: USB3.0 power enable}
    - {pin: 34, name: VCC5V0_HOST_EN, note: USB host power enable}
    - {pin: 36, name: VCC5V0_OTG_EN, note: USB OTG power enable}
  modem_attach_note: >
    The Quectel RG255C 5G RedCap modem (separate module, public pinout already
    captured) attaches to the SoM over a USB2.0 HOST or OTG link (pins 9/11 or
    15/17) per the RG255C USB host interface. USB3.0 SS pair (155-161) is
    multiplexed with SATA1 and is available if a higher-rate modem link is used.

# --- PCIe 2.1 (1-lane; multiplexed with SATA) -------------------------------
pcie:
  - {pin: 126, name: PCIE20_REFCLKP}
  - {pin: 128, name: PCIE20_REFCLKN}
  - {pin: 151, name: PCIE20_TXP, alt: SATA2_TXP}
  - {pin: 149, name: PCIE20_TXN, alt: SATA2_TXN}
  - {pin: 139, name: PCIE20_RXP, alt: SATA2_RXP}
  - {pin: 141, name: PCIE20_RXN, alt: SATA2_RXN}
  - {pin: 209, name: PCIE_RST, note: PCIe PERST#}
  - {pin: 211, name: PCIE_CLKREQ, note: PCIe CLKREQ#}
  - {pin: 207, name: PCIE_WAKE, note: PCIe WAKE#}

# --- SDIO / SD --------------------------------------------------------------
sdio_sd:
  sdmmc1_wifi_sdio:
    - {pin: 166, name: SDMMC1_CLK}
    - {pin: 164, name: SDMMC1_CMD}
    - {pin: 168, name: SDMMC1_D0}
    - {pin: 170, name: SDMMC1_D1}
    - {pin: 160, name: SDMMC1_D2}
    - {pin: 162, name: SDMMC1_D3}
  sdmmc0_sd_card:
    - {pin: 148, name: SDMMC0_CLK}
    - {pin: 144, name: SDMMC0_CMD}
    - {pin: 142, name: SDMMC0_D0}
    - {pin: 138, name: SDMMC0_D1}
    - {pin: 146, name: SDMMC0_D2}
    - {pin: 140, name: SDMMC0_D3}
    - {pin: 129, name: SDMMC0_DET, active: low}
  wifi_bt_control:
    - {pin: 203, name: WIFI_REG_ON, active: high}
    - {pin: 205, name: WIFI_WAKE_HOST, active: high}
    - {pin: 195, name: BT_REG_ON, active: high}
    - {pin: 199, name: BT_WAKE_HOST, active: high}
    - {pin: 201, name: HOST_WAKE_BT, active: high}
    - {pin: 197, name: CLK32K_OUT1_WIFI, note: 32 kHz clock for Wi-Fi}
  sdio_note: >
    The e1-phone uses an external Murata Type-2EA Wi-Fi 6E + BT module. The SoM
    exposes SDMMC1 (SDIO) plus the Wi-Fi/BT control nets above; the Murata module
    can attach to SDMMC1 (SDIO Wi-Fi) + a UART (BT) per the existing Wi-Fi/BT
    pinout. Alternatively a PCIe/USB Wi-Fi module can use the PCIe lane above.

# --- I2C / UART / SPI / audio / ADC -----------------------------------------
control_buses:
  i2c:
    - {pin: 25, name: I2C4_SCL_M0, note: 'core-board 2.2k pull-up'}
    - {pin: 27, name: I2C4_SDA_M0}
    - {pin: 108, name: I2C2_SCL_M0}
    - {pin: 110, name: I2C2_SDA_M0}
    - {pin: 121, name: I2C1_SDA}
    - {pin: 37, name: HDMITX_SDA, mux: I2C5_SDA}
    - {pin: 39, name: HDMITX_SCL, mux: I2C5_SCL}
  spi:
    - {pin: 44, name: SPI1_MOSI_M1}
    - {pin: 46, name: SPI1_CS0_M1}
  adc:
    - {pin: 150, name: SARADC_VIN1}
    - {pin: 154, name: SARADC_VIN2}
  gpio_interrupts:
    - {pin: 23, name: GSENSOR_INT_L, note: G-sensor interrupt input}
    - {pin: 143, name: RTCIC_INT_L, note: RTC IC interrupt input}
  uart_note: >
    RK3566 exposes 10 UARTs; UART functions are muxed onto the GPIO pads above
    (e.g. UART6/7/8/9 share the SDMMC1 / Wi-Fi-BT pads, UART5 shares SDMMC0).
    The full UART/I2C/SPI/I2S/PWM/GPIO mux is in source_doc[0] (per-pad "Function"
    column) and source_doc[4] (RK3566 Hardware Design Guide).

# --- Ethernet (not used by phone; documented for completeness) --------------
ethernet_gmac:
  note: >
    1x GMAC (RGMII/RMII, 10/100/1000 Mbps) is exposed on pins 186/188/196/200/
    206/208 etc. Not populated on the e1-phone; documented because the pads are
    multiplexed with camera/SDIO functions and must be left unrouted.

e1_phone_integration_check:
  display_mipi_dsi: ok_dsi0_10_pin_diff_set_plus_reset_pwr_bl_tp
  camera_mipi_csi: ok_4_lane_csi_supports_rear_13mp_plus_front_5mp
  modem_usb: ok_usb2_host_or_otg_for_quectel_rg255c
  wifi_bt: ok_sdio_sdmmc1_plus_uart_for_murata_type_2ea_or_pcie_alt
  power_in: ok_single_5v_rail_module_pmic_generates_internal_rails
  boot_recovery: ok_recovery_pin_152_plus_sys_reset_pin_218
  verdict: all_e1_phone_ap_role_interfaces_present_on_public_connector_map
