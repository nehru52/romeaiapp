notes: |
  Hirose DF40C-80DP-0.4V(51) is the 80-position plug half of the DF40 0.4 mm
  pitch board-to-board pair (mates with DF40HC(2.0)-80DS-0.4V or matching
  receptacle in the height profile chosen for the e1-phone split interconnect).
  This connector carries no signal assignment of its own - the pin function is
  defined by the top/bottom interconnect flex on the e1-phone. The mechanical
  pinout (A1..A40, B1..B40) is recorded here so the KiCad symbol/footprint can
  reference a canonical numbering scheme. Hirose BM28 family is the
  drop-in compatible competitor (used as second-source alternate).
