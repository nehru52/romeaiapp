  pitch_mm: 0.4
  positions: 80
  rows: 2
  contacts_per_row: 40
  height_options_mm: [1.5, 2.0, 2.5, 3.0, 3.5, 4.0]
  mated_height_selected_mm: 1.5
  current_rating_per_contact_a: 0.3
  mating_cycles: 30
  contact_resistance_mohm_max: 90
  insulation_resistance_mohm_min: 1000
  dielectric_strength_v_ac_1min: 150
  operating_temperature_c: [-55, 85]
  signal_data_rate_gbps_max: 20
