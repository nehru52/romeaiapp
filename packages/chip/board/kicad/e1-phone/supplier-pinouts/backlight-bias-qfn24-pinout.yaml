schema: eliza.e1_phone_supplier_pinout.v1
part: LP8556-class display backlight/bias power development contract
manufacturer: Texas Instruments development function class
package: 24-pin 0.5 mm pitch QFN/WQFN development carrier pattern
source_doc: https://www.ti.com/product/LP8556
source_doc_alt:
  - https://www.ti.com/lit/ds/symlink/lp8556.pdf
source_doc_revision: public product page and datasheet observed 2026-05-22; exact selected display-bias driver pinout still requires selected MPN datasheet
captured_date: 2026-05-22
captured_by: agent
evidence_class: public_supplier_datasheet
procurement_status: public_backlight_bias_signal_contract_pending_selected_driver_pinout
procurement_url: https://www.ti.com/product/LP8556/part-details/LP8556SQE/NOPB
notes: |
  Board-side development contract for the non-release BACKLIGHT_BIAS_POWER_DEV
  footprint. It captures the display bias/backlight control rails already used
  by the KiCad development board. It is not a released LP8556 package pin table
  and does not unlock production release.
mechanical:
  package_family: qfn_development_carrier
  pin_count: 24
  pitch_mm: 0.5
  body_mm: [4.0, 4.0]
pin_signal_set:
  power:
    - DISP_AVDD_5V5
    - DISP_AVEE_N5V5
    - IO_1V8
    - GND
  control:
    - DISP_BL_EN
    - DISP_BL_PWM
pins:
  - {pin: '1', name: DISP_AVDD_5V5, function: positive_display_bias, direction: output}
  - {pin: '2', name: DISP_AVEE_N5V5, function: negative_display_bias, direction: output}
  - {pin: '3', name: DISP_BL_EN, function: backlight_enable, direction: input}
  - {pin: '4', name: DISP_BL_PWM, function: backlight_pwm, direction: input}
  - {pin: '5', name: IO_1V8, function: logic_power, direction: power_input, voltage_v: 1.8}
  - {pin: '6', name: GND, function: return, direction: power_return}
  - {pin: '7', name: GND, function: return, direction: power_return}
  - {pin: '8', name: GND, function: return, direction: power_return}
  - {pin: '9', name: RESERVED_9, function: development_spare, direction: passive}
