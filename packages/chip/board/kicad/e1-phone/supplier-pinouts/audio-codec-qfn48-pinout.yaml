schema: eliza.e1_phone_supplier_pinout.v1
part: ALC5688-class audio codec and companion smart-amp development contract
manufacturer: Realtek / Cirrus Logic development audio function class
package: 48-pin 0.5 mm pitch QFN development carrier pattern
source_doc: https://www.realtek.com/en/products/communications-network-ics/item/alc5688
source_doc_alt:
  - https://www.cirrus.com/products/cs35l41/
  - https://www.knowles.com/products/microphones/sph0641lm4h-1
source_doc_revision: public product pages observed 2026-05-19; exact selected codec package pinout still requires selected MPN datasheet
captured_date: 2026-05-22
captured_by: agent
evidence_class: public_supplier_datasheet
procurement_status: public_audio_interface_contract_pending_selected_codec_package_pinout
procurement_url: https://www.realtek.com/en/contact-us
notes: |
  This is the board-side audio function contract used by the non-release
  AUDIO_CODEC_QFN48_DEV footprint. It captures the public audio interfaces
  already selected in package/audio/v0-codec.yaml: I2S, I2C control, PDM
  microphones, codec/amp interrupts, speaker outputs, haptic output, and audio
  power rails. It is not a Realtek package pin table and does not unlock
  production release. Before release, the selected codec, smart amp, microphone,
  and haptic driver MPNs need exact supplier pin tables, symbols, land patterns,
  STEP models, and bring-up evidence.
mechanical:
  package_family: qfn_development_carrier
  pin_count: 48
  pitch_mm: 0.5
  body_mm: [7.0, 7.0]
electrical:
  codec_candidate: ALC5688
  smart_amp_candidate: CS35L41
  mic_candidate: SPH0641LM4H
  interfaces:
    - I2S
    - I2C
    - PDM
    - speaker_output
    - haptic_output
pin_signal_set:
  power:
    - VDD_AUDIO_3V3
    - VDD_AMP_3V3
    - IO_1V8
    - SYS
    - GND
  i2c_control:
    - AUDIO_I2C_SCL
    - AUDIO_I2C_SDA
    - CODEC_INT
    - AMP_INT
  i2s:
    - I2S_BCLK
    - I2S_LRCLK
    - I2S_DOUT
    - I2S_DIN
  pdm:
    - PDM_CLK
    - PDM_DAT
  output:
    - SPK_P
    - SPK_N
    - HAPTIC_OUT
pins:
  - {pin: '1', name: VDD_AUDIO_3V3, function: codec_analog_power, direction: power_input, voltage_v: 3.3}
  - {pin: '2', name: IO_1V8, function: digital_io_power, direction: power_input, voltage_v: 1.8}
  - {pin: '3', name: GND, function: return, direction: power_return, voltage_v: 0}
  - {pin: '4', name: AUDIO_I2C_SCL, function: i2c_clock, direction: input}
  - {pin: '5', name: AUDIO_I2C_SDA, function: i2c_data, direction: bidirectional}
  - {pin: '6', name: CODEC_INT, function: codec_interrupt, direction: output}
  - {pin: '7', name: I2S_BCLK, function: i2s_bit_clock, direction: input}
  - {pin: '8', name: I2S_LRCLK, function: i2s_word_clock, direction: input}
  - {pin: '9', name: I2S_DOUT, function: i2s_data_to_codec, direction: input}
  - {pin: '10', name: I2S_DIN, function: i2s_data_from_codec, direction: output}
  - {pin: '11', name: PDM_CLK, function: microphone_pdm_clock, direction: output}
  - {pin: '12', name: PDM_DAT, function: microphone_pdm_data, direction: input}
  - {pin: '13', name: VDD_AMP_3V3, function: smart_amp_power, direction: power_input, voltage_v: 3.3}
  - {pin: '14', name: SPK_P, function: speaker_positive, direction: output}
  - {pin: '15', name: SPK_N, function: speaker_negative, direction: output}
  - {pin: '16', name: AMP_INT, function: smart_amp_interrupt, direction: output}
  - {pin: '17', name: HAPTIC_OUT, function: haptic_drive, direction: output}
  - {pin: '18', name: SYS, function: system_power_feed, direction: power_input}
  - {pin: '19', name: RESERVED_19, function: development_spare, direction: passive}
