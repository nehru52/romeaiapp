schema: eliza.e1_phone_supplier_pinout.v1
part: MFF2 eSIM / eUICC standard 8-pad package
manufacturer: Multiple eUICC suppliers (Velocity IoT / KORE / emnify class)
package: MFF2 / QFN8 embedded SIM, nominal 6.0 x 5.0 mm, 1.27 mm pad pitch
source_doc: https://velocityiot.io/wp-content/uploads/2023/04/VIoT-Flex-VIOT-1SIM-MFF2_2023_04-1.pdf
source_doc_alt:
- https://www.emnify.com/hubfs/emnify-advanced-eSIM-tech-datasheet.pdf
- https://docs.korewireless.com/omni-sim/omnisim-esim/product-datasheet
- https://www.alldatasheet.com/html-pdf/1643273/STMICROELECTRONICS/ST4SIM-200M/31885/14/ST4SIM-200M.html
source_doc_revision: Velocity IoT VIoT-Flex MFF2 data sheet 2023-04; MFF2 pinout cross-checked
  against public KORE/emnify/ST MFF2 references
captured_date: '2026-05-22'
captured_by: agent
evidence_class: public_supplier_datasheet
notes: MFF2 eSIM/eUICC packages use the ETSI UICC contact set. Public vendor datasheets
  list pins 1-8 as GND, VPP, I/O, AUX2/NC, AUX1/NC, CLK, RST, and VCC. Production
  release still requires the selected eUICC supplier ordering code, EID/personalization
  flow, and CM paste/reflow approval.
