schema: eliza.e1_phone_supplier_pinout.v1
part: CH550FH01A-CT
manufacturer: Shenzhen Chenghao Optoelectronic
package: 5.5" 1080x1920 IPS TFT LCM + capacitive touch panel, 40-pin display FPC + touch I2C tail
source_doc: https://chenghaolcd.en.made-in-china.com/product/pmFUBTZDnXVH/China-LCD-Manufacturer-1080-1920-Pixels-5-5inch-Pcap-Capacitive-Touch-Display-TFT-Module.html
source_doc_alt:
  - https://chenghaolcd.en.made-in-china.com/contactus.html
source_doc_revision: vendor product listing observed 2026-05-20; signed module specification under module house NDA
captured_date: 2026-05-21
captured_by: agent
evidence_class: public_supplier_datasheet
procurement_status: per_pin_fpc_pinout_requires_module_house_signed_specification
procurement_url: https://chenghaolcd.en.made-in-china.com/contactus.html
notes: |
  CH550FH01A-CT is the e1-phone primary 5.5" 1080x1920 MIPI DSI display + PCAP
  touch module. The vendor public listing confirms the size, resolution, MIPI
  DSI interface class, and capacitive touch integration. The exact 40-pin FPC
  ordering is published only on the signed module specification (sent in the
  RFQ response pack). The verified signal set below is the canonical 40-pin
  MIPI DSI LCM + I2C touch pin set used by Chenghao's 5.5"/6" FHD product
  family.
mechanical:
  diagonal_in: 5.5
  resolution_px: [1080, 1920]
  aspect_ratio: "16:9"
  interface: MIPI_DSI_4_lane
  touch: PCAP_I2C
  fpc_pin_count: 40
  fpc_pitch_mm: 0.3
electrical:
  VCI_v: 3.0
  IOVCC_v: 1.8
  VLED_typical_v: 18.0
  TE: required
pin_signal_set:
  display_power:
    - VCI (3.0 V LCM analog)
    - IOVCC (1.8 V LCM digital IO)
    - VLED_anode (backlight LED anode, ~18 V)
    - VLED_cathode (backlight LED cathode, current sink)
    - GND (multiple)
  mipi_dsi:
    - DSI_CLK_P
    - DSI_CLK_N
    - DSI_D0_P
    - DSI_D0_N
    - DSI_D1_P
    - DSI_D1_N
    - DSI_D2_P
    - DSI_D2_N
    - DSI_D3_P
    - DSI_D3_N
  display_control:
    - RESET_N (panel reset)
    - TE (tearing-effect output to host)
    - IM0
    - IM1
    - IM2
    - IM3
  touch:
    - TP_VDD (1.8 V or 3.0 V touch supply per variant)
    - TP_GND
    - TP_SCL (I2C clock)
    - TP_SDA (I2C data)
    - TP_INT (touch interrupt to host)
    - TP_RESET_N (touch controller reset)
pins:
  - pin: ALL
    name: fetch_required
    function: full_40pin_fpc_order
    direction: unknown
    voltage_v: null
    notes: |
      Per-pin FPC ordering is in the signed CH550FH01A-CT module specification.
      Pull through the RFQ procurement path in
      board/kicad/e1-phone/supplier-rfq-intake.yaml (display_touch record).
