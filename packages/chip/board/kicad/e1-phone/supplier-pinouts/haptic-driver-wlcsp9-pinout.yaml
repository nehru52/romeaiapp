source_doc_alt:
  - https://www.ti.com/lit/ds/symlink/drv2605l.pdf
source_doc_revision: public product page and datasheet observed 2026-05-22; exact selected haptic-driver package pinout still requires selected MPN lock
captured_date: 2026-05-22
captured_by: agent
evidence_class: public_supplier_datasheet
procurement_status: public_haptic_signal_contract_pending_selected_driver_pinout
