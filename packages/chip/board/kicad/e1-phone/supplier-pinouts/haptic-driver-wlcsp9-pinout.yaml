notes: |
  Board-side development contract for HAPTIC_DRIVER_WLCSP_DEV. It captures the
  system rail, 1.8 V control rail, return pins, and actuator output used by the
  current KiCad development board. Exact package pin order remains blocked.
mechanical:
  package_family: wlcsp_development_carrier
  pin_count: 9
  pitch_mm: 0.4
pin_signal_set:
  power:
    - SYS
    - IO_1V8
    - GND
  output:
    - HAPTIC_OUT
pins:
  - {pin: A1, name: SYS, function: actuator_supply, direction: power_input}
  - {pin: A2, name: IO_1V8, function: logic_power, direction: power_input, voltage_v: 1.8}
  - {pin: A3, name: GND, function: return, direction: power_return}
  - {pin: B1, name: HAPTIC_OUT, function: actuator_drive, direction: output}
  - {pin: B2, name: GND, function: return, direction: power_return}
  - {pin: B3, name: RESERVED_B3, function: development_spare, direction: passive}
  - {pin: C1, name: RESERVED_C1, function: development_spare, direction: passive}
  - {pin: C2, name: RESERVED_C2, function: development_spare, direction: passive}
  - {pin: C3, name: RESERVED_C3, function: development_spare, direction: passive}
release_blockers:
  - selected haptic driver exact ball map
  - actuator impedance/resonance supplier data
  - production land pattern and STEP review
  - haptic bring-up waveform evidence
