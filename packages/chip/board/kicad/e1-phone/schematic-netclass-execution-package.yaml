        - name: CAM0_CSI_D2
          nets:
            - CAM0_CSI_D2_P
            - CAM0_CSI_D2_N
          class: mipi_dphy_diff
          max_length_mm: 55
          intra_pair_skew_mm_max: 0.25
        - name: CAM0_CSI_D3
          nets:
            - CAM0_CSI_D3_P
            - CAM0_CSI_D3_N
          class: mipi_dphy_diff
          max_length_mm: 55
          intra_pair_skew_mm_max: 0.25
        - name: CAM1_CSI_CLK
          nets:
            - CAM1_CSI_CLK_P
            - CAM1_CSI_CLK_N
          class: mipi_dphy_diff
