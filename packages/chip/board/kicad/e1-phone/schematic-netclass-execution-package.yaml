schema: eliza.e1_phone_schematic_netclass_execution_package.v1
status: blocked_requires_supplier_symbols_netclass_capture_erc_and_trial_route
date: '2026-05-21'
claim_boundary: Executable schematic and netclass capture package for the selected E1 phone screen, camera, USB-C,
  side-key, power, radio, audio, split-interconnect, compute, and factory-test domains. It is not a KiCad schematic
  release, not ERC evidence, not routed copper, not DRC evidence, and not enclosure or fabrication readiness.
source_artifacts:
  - board/kicad/e1-phone/block-netlist.yaml
  - board/kicad/e1-phone/routing-constraints.yaml
  - board/kicad/e1-phone/placement-interface-matrix.yaml
  - board/kicad/e1-phone/schematic-symbol-footprint-closure.yaml
  - board/kicad/e1-phone/supplier-to-kicad-evidence-map.yaml
  - board/kicad/e1-phone/supplier-drawing-intake-checklist.yaml
  - board/kicad/e1-phone/evt1-footprint-capture-work-package.yaml
  - board/kicad/e1-phone/schematic-capture-readiness-binding.yaml
upstream_status:
  symbol_footprint_status: blocked_requires_real_kicad_symbols_supplier_footprints_and_erc
  supplier_to_kicad_status: blocked_supplier_evidence_not_ready_for_kicad_capture
  supplier_intake_status: blocked_supplier_drawing_intake_required_before_real_footprints_or_route
  evt1_footprint_capture_status: blocked_evt1_footprint_capture_requires_supplier_intake_reviews_and_real_kicad_libraries
  block_netlist_status: logical_block_netlist_not_kicad_schematic
  routing_constraints_status: constraint_baseline_not_post_route_signoff
execution_policy:
  domain_count: 10
  requires_real_hierarchical_symbols_before_route: true
  requires_kicad_netclass_assignment_before_trial_route: true
  requires_erc_report_before_routed_release: true
  requires_supplier_footprint_escape_proof_before_route_acceptance: true
  diff_pair_names_to_capture:
    - CAM0_CSI_CLK
    - CAM0_CSI_D0
    - CAM0_CSI_D1
    - CAM0_CSI_D2
    - CAM0_CSI_D3
    - CAM1_CSI_CLK
    - CAM1_CSI_D0
    - CAM1_CSI_D1
    - CELL_PCIE_RX
    - CELL_PCIE_TX
    - CELL_USB2_DP_DN
    - DSI_CLK
    - DSI_D0
    - DSI_D1
    - DSI_D2
    - DSI_D3
    - LPDDR_CK
    - LPDDR_DQS
    - UFS_REFCLK
    - UFS_RX
    - UFS_TX
    - USB_DP_DN
    - WIFI_PCIE_RX
    - WIFI_PCIE_TX
domain_execution:
  - domain: display_touch
    status: blocked_waiting_symbol_netclass_erc_and_trial_route_evidence
    schematic_sheets:
      - display_camera.kicad_sch
    refdes_groups:
      - J_DISPLAY_TOUCH
    placement_records:
      - refdes_group: J_DISPLAY_TOUCH
        region_mm:
          x: 45.0
          y: 3.0
          width: 17.0
          height: 8.0
        side: top_right
        constraints:
          - 100ohm_mipi_dphy
          - fpc_bend_radius
          - panel_bias_rails
    required_nets:
      - DISP_AVDD_5V5
      - DISP_AVEE_N5V5
      - DISP_BL_EN
      - DISP_BL_PWM
      - DISP_RESET_N
      - DISP_TE
      - DSI_CLK_N
      - DSI_CLK_P
      - DSI_D0_N
      - DSI_D0_P
      - DSI_D1_N
      - DSI_D1_P
      - DSI_D2_N
      - DSI_D2_P
      - DSI_D3_N
      - DSI_D3_P
      - TOUCH_I2C_SCL
      - TOUCH_I2C_SDA
      - TOUCH_IRQ_N
      - TOUCH_RESET_N
    netclass_assignments_required:
      differential_pairs:
        - name: DSI_CLK
          nets:
            - DSI_CLK_P
            - DSI_CLK_N
          class: mipi_dphy_diff
          max_length_mm: 45
          intra_pair_skew_mm_max: 0.25
        - name: DSI_D0
          nets:
            - DSI_D0_P
            - DSI_D0_N
          class: mipi_dphy_diff
          max_length_mm: 45
          intra_pair_skew_mm_max: 0.25
        - name: DSI_D1
          nets:
            - DSI_D1_P
            - DSI_D1_N
          class: mipi_dphy_diff
          max_length_mm: 45
          intra_pair_skew_mm_max: 0.25
        - name: DSI_D2
          nets:
            - DSI_D2_P
            - DSI_D2_N
          class: mipi_dphy_diff
          max_length_mm: 45
          intra_pair_skew_mm_max: 0.25
        - name: DSI_D3
          nets:
            - DSI_D3_P
            - DSI_D3_N
          class: mipi_dphy_diff
          max_length_mm: 45
          intra_pair_skew_mm_max: 0.25
      single_ended_buses:
        - name: TOUCH_I2C
          nets:
            - TOUCH_I2C_SCL
            - TOUCH_I2C_SDA
          max_length_mm: 70
          pullups_to: IO_1V8
      power_test_points: []
    upstream_footprint_work_items:
      - evt1_footprint_capture_01_display_touch
    execution_tasks:
      - replace text scaffold with real hierarchical symbols and wires
      - assign exact supplier pin numbers and electrical types
      - bind nets to KiCad net classes and differential-pair rules from routing-constraints.yaml
      - cross-probe schematic nets against placement-interface-matrix.yaml and block-netlist.yaml
      - run ERC and record signed waivers or clean report
      - run supplier-footprint escape/trial-route proof before accepting routing
    release_outputs_required:
      schematic_review: board/kicad/e1-phone/production/reports/schematic-review/display_touch.yaml
      netclass_assignment: board/kicad/e1-phone/production/reports/netclass-assignment/display_touch.yaml
      erc_result: board/kicad/e1-phone/production/reports/erc/display_touch.json
      trial_route_proof: board/kicad/e1-phone/production/reports/trial-route/display_touch.yaml
    current_blocker: current KiCad schematic remains scaffold-level and no supplier-reviewed netclass, ERC, or trial-route
      evidence exists for this domain
