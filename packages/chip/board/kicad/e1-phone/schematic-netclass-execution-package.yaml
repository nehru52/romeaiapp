  all_domains_have_schematic_sheets: true
  all_domains_have_required_nets: true
  all_domains_fail_closed: true
  referenced_diff_pairs_exist_in_routing_constraints: true
  supplier_intake_blocks_real_capture: true
  symbol_footprint_closure_blocks_erc: true
  evt1_footprint_capture_blocks_trial_route: true
  route_acceptance_must_wait_for_this_package: true
release_blockers:
  - real KiCad symbols and wires have not replaced the schematic text scaffold
  - supplier pinouts and land patterns are not accepted for production capture
  - KiCad net classes and differential-pair assignments have not been implemented
  - ERC reports and signed waivers are missing
  - supplier-footprint escape and trial-route evidence is missing for all domains
