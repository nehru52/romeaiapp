schema: eliza.e1_phone_wireless_module_release_execution.v1
status: blocked_wireless_module_release_requires_cellular_branch_decision_supplier_design_packs_routed_rf_firmware_regulatory_and_factory_logs
date: '2026-05-21'
claim_boundary: >
  Release-execution gate for the off-the-shelf cellular and Wi-Fi/Bluetooth modules in the E1 phone
  package. This records the current public-source module choices, RF feed and host wiring obligations,
  supplier response gaps, factory probe coverage, and evidence required before EVT1 routed release.
  It is not a supplier-approved pinout, land pattern, routed RF layout, firmware release, regulatory
  approval, carrier approval, SAR evidence, first-article result, enclosure clearance release, or
  fabrication-ready PCB.
source_artifacts:
  - board/kicad/e1-phone/radio-module-selection-wiring-decision.yaml
  - board/kicad/e1-phone/radio-module-integration.yaml
  - board/kicad/e1-phone/radio-antenna-acceptance-checklist.yaml
  - board/kicad/e1-phone/radio-module-source-revalidation.yaml
  - board/kicad/e1-phone/radio-module-envelope-orderability-gate.yaml
