  cellular_branch_decision_required: true
  selected_function_count: 2
  selected_functions:
    - cellular
    - wifi_bluetooth
  required_rf_feed_count: 5
  supplier_response_packs_received: 0
  supplier_response_packs_required_before_release: true
  release_allowed_without_supplier_response_packs: false
  routed_pcb_required: true
  clean_erc_drc_required: true
  supplier_step_or_brep_required: true
  firmware_and_regulatory_packs_required: true
  first_article_rf_and_fit_logs_required: true
  release_allowed: false
selected_public_source_snapshot:
  cellular_performance_reference:
    source_ids:
      - cellular_primary_quectel_rg255c_vendor_page
      - cellular_quectel_2026_product_brochure
    vendor: Quectel
    family: RG255C_or_RM255C
    selected_phone_form_factor: RG255C_LGA
    class: 5G_RedCap_Sub_6
    public_envelope_mm: {width: 29.0, height: 32.0, thickness: 2.4}
    current_region_fit: false
    width_shortfall_mm: 15.0
    height_shortfall_mm: 18.0
    release_use: performance_reference_not_layout_ready
  cellular_space_saving_branch:
    source_artifact: board/kicad/e1-phone/cellular-space-saving-downselect.yaml
    preferred_candidate_id: quectel_eg915q_na_or_eg915u_class
    class: LTE_Cat_1_bis
    public_envelope_mm: {width: 23.6, height: 19.9, thickness: 2.4}
    release_use: active_rfq_branch_not_production_substitute
  wifi_bluetooth_primary:
    source_ids:
      - wifi_bluetooth_primary_murata_type_2ea_vendor_page
      - wifi_bluetooth_murata_type_2ea_product_brief
    vendor: Murata
    order_number: LBEE5XV2EA-802
    chipset: Infineon_CYW55573
    wireless: Wi-Fi_6E_2x2_MIMO_Bluetooth_5p3
    public_envelope_mm: {width: 12.5, height: 9.4, thickness: 1.2}
    current_region_fit: true
    width_clearance_mm: 1.5
    height_clearance_mm: 0.6
    release_use: primary_wifi_bluetooth_module_pending_design_pack_firmware_and_regulatory_review
rf_feed_release_contract:
  required_rf_nets:
    - CELL_RF_MAIN
    - CELL_RF_DIV
    - CELL_GNSS_RF
    - WIFI_BT_RF0
    - WIFI_BT_RF1
  required_rf_feed_count: 5
  required_route_outputs:
    - routed 50 ohm geometry with continuous ground reference
    - pi or T matching network before each antenna feed
    - conducted access before matching for every RF feed
    - antenna vendor review against final plastics and metal stack
    - VNA S11/S21, conducted RF, coexistence, GNSS desense, SAR pre-scan, and factory RF calibration logs
release_records:
  - id: cellular_branch_release
    selected_context: Quectel_RG255C_LGA_performance_reference_with_EG915Q_EG915U_space_saving_branch
    acceptance_items:
      - cellular_region_sku_band_matrix
    required_supplier_artifacts:
      - exact cellular region SKU and orderable MPN
      - band matrix tied to target launch countries
      - hardware design guide, pad map, reference layout, land pattern, STEP or B-rep
      - firmware, driver, RIL, modem test-mode, carrier, PTCRB, GCF, and SAR scope
      - sample modules and supplier response pack
    required_release_outputs:
      - cellular branch decision signed between RG255C repack and smaller supplier-approved module
      - cellular schematic symbol and footprint captured from supplier pinout
      - routed cellular host, SIM/eSIM, power-control, and RF nets with DRC/ERC and SI/RF evidence
    status: blocked_missing_cellular_branch_decision_and_supplier_design_pack
    release_allowed: false
  - id: cellular_rf_release
    selected_context: CELL_RF_MAIN_CELL_RF_DIV_CELL_GNSS_RF
    acceptance_items:
      - cellular_antenna_main_div_gnss_feeds
      - rf_matching_conducted_access_and_vna
    required_supplier_artifacts:
      - cellular antenna application note and reference layout
      - module RF port pad map and keepout rules
      - antenna vendor placement and tuning review
    required_release_outputs:
      - CELL_RF_MAIN, CELL_RF_DIV, and CELL_GNSS_RF routed and matched
      - conducted-access pads or fixtures before matching
      - VNA S11/S21 and cellular conducted TX/RX report
    status: blocked_missing_routed_cellular_rf_and_measurements
    release_allowed: false
  - id: wifi_bluetooth_release
    selected_context: Murata_LBEE5XV2EA-802_Type_2EA
    acceptance_items:
      - wifi6e_bt_2x2_antenna_feeds
      - firmware_driver_nvram_clm_and_country_code
    required_supplier_artifacts:
      - Type 2EA pinout, application note, land pattern, reference layout, STEP or B-rep
      - Infineon/Murata firmware, NVRAM, CLM, license archive, and regulatory database
      - modular approval scope and antenna gain review
    required_release_outputs:
      - routed PCIe, SDIO fallback, UART Bluetooth, enable, IRQ, wake, RF_VBAT, WIFI_BT_RF0, and WIFI_BT_RF1 evidence
      - Wi-Fi 2.4/5/6 GHz and Bluetooth conducted attach and sensitivity logs
      - country-code provisioning, suspend/resume, and coexistence configuration logs
    status: blocked_missing_murata_design_pack_firmware_regulatory_and_rf_measurements
    release_allowed: false
  - id: coexistence_regulatory_factory_release
    selected_context: cellular_wifi_bluetooth_gnss_factory_and_compliance
    acceptance_items:
      - coexistence_gnss_desense_and_usb_charging_states
      - regulatory_carrier_ptcrb_gcf_sar_prescan
      - factory_rf_calibration_and_first_article_limits
    required_supplier_artifacts:
      - module test-mode procedures and regulatory grant applicability review
      - carrier, PTCRB, GCF, FCC, CE, RED, and SAR pre-scan plans
      - factory RF calibration procedure and conducted/shield-box fixture requirements
    required_release_outputs:
      - coexistence matrix for cellular TX, Wi-Fi/Bluetooth, GNSS, display, USB-C, charger, and thermal states
      - SAR and RF exposure pre-scan tied to final enclosure stack
      - factory RF limits, calibration logs, and first-article radio transcript tied to serial numbers
    status: blocked_missing_coexistence_regulatory_factory_rf_and_first_article_logs
    release_allowed: false
