schema: eliza.e1_phone_supplier_rfq_intake.v1
status: blocked_waiting_supplier_quote_drawing_sample_and_approval_packs
date: 2026-05-20
claim_boundary: >
  Supplier RFQ intake contract for the phone board only. Public listings and
  preliminary package bindings may seed RFQs, but no display, camera, USB-C,
  button, battery, radio, audio, or interconnect pinout/footprint may be frozen
  until the required supplier documents are received, reviewed, and tied to an
  orderable MPN.

source_artifacts:
  - board/kicad/e1-phone/supplier-sourcing-audit.yaml
  - board/kicad/e1-phone/supplier-source-verification.yaml
  - board/kicad/e1-phone/procurement-readiness.yaml
  - board/kicad/e1-phone/pinout-footprint-freeze.yaml
  - board/kicad/e1-phone/preliminary-bom.yaml
  - board/kicad/e1-phone/display-fit.yaml
  - board/kicad/e1-phone/enclosure-placement-closure.yaml
  - package/display/v0-dsi-720x1280.yaml
  - package/camera/oem-mipi-csi-modules.yaml
  - package/cellular/quectel-5g-redcap.yaml
  - package/wifi/murata-type-2ea-wifi6e.yaml
  - package/usb-c/e1-phone-usb-c-port.yaml
  - package/human-interface/side-buttons.yaml
  - package/battery/e1-phone-17p3wh-pack.yaml
  - package/interconnect/e1-phone-top-bottom-flex.yaml

intake_policy:
  quote_quantities: [10, 100, 1000]
  required_response_format: supplier_signed_pdf_or_native_cad_plus_machine_readable_summary
  minimum_sample_lot_per_candidate: 5
  sample_receipt_required_before_pinout_freeze: true
  accepted_document_languages: [english, bilingual_supplier_original_plus_english]
  required_artifacts_for_every_orderable_part:
    - orderable_manufacturer_part_number
    - supplier_part_number_or_sku
    - lifecycle_status_and_last_time_buy_statement
    - MOQ_price_breaks_and_lead_time
    - 2d_mechanical_drawing_with_datums_tolerances_and_fpc_exit
    - connector_pinout_or_land_pattern
    - mating_connector_or_counterpart_mpn
    - recommended_footprint_source_and_revision
    - 3d_step_or_brep_model
    - electrical_absolute_max_and_operating_specs
    - reference_schematic_or_reference_layout
    - compliance_regulatory_and_material_documents
    - packaging_handling_and_reflow_limits
    - incoming_inspection_critical_dimensions

rfq_lines:
  - function: display_touch
    primary_candidate: CH550FH01A-CT
    sourcing_audit_group: display
    package_binding: package/display/v0-dsi-720x1280.yaml
    marketplace_or_vendor_basis:
      - Made-in-China Chenghao 5.5 inch 1080x1920 MIPI CTP listing
      - Alibaba 5.5 inch 1080x1920 MIPI alternates
      - Made-in-China E549/RM67191 5.49 inch AMOLED thin-display alternate
    board_dependency:
      - J_DISPLAY_TOUCH exact FPC pinout
      - 77.1 x 151.77 x 3.39 mm display stack clearance
      - display FPC bend keepout and cover glass datum
    required_supplier_artifacts:
      - signed LCM plus CTP 2D drawing with active, viewing, outline, FPC, and cover-lens datums
      - FPC pinout including MIPI DSI lanes, touch I2C, reset, TE, backlight, bias, and grounds
      - mating connector MPN, height, keepout, and recommended land pattern
      - display/touch power sequence and inrush/backlight current data
      - STEP model for display stack, FPC tail, stiffener, and adhesive stack
      - sample inspection report for outline, FPC exit, and touch stack thickness
    intake_status: blocked_no_signed_drawing_pinout_or_sample
  - function: rear_camera
    primary_candidate: SF-XR3855A-A0_OV13855_or_OV13850_13MP_AF
    sourcing_audit_group: camera
    package_binding: package/camera/oem-mipi-csi-modules.yaml
    marketplace_or_vendor_basis:
      - Made-in-China Sincere First OV13855/OV13850 13MP AF MIPI listing
      - Alibaba Sincere camera module supplier family
    board_dependency:
      - J_CAM0 FPC pinout and CSI lane count
      - rear lens window datum and camera bump z-height
      - AF/VCM current and camera rail sequence
    required_supplier_artifacts:
      - sensor module 2D drawing with lens center, barrel height, FPC tail, and keepout
      - 24 or 30 pin FPC pinout with CSI lanes, MCLK, I2C, reset, PWDN, AF, AVDD, DVDD, and grounds
      - mating connector MPN and land pattern
      - module STEP model including lens barrel and stiffener
      - sensor bring-up register pack or Linux/Android driver notes
      - image quality sample report and inspection dimensions
    intake_status: blocked_no_exact_module_drawing_pinout_or_sample
  - function: front_camera
    primary_candidate: SF-G5035S60FY_GC5035_5MP_FF_MIPI
    sourcing_audit_group: camera
    package_binding: package/camera/oem-mipi-csi-modules.yaml
    marketplace_or_vendor_basis:
      - Made-in-China Sincere First GC5035 5MP fixed-focus MIPI listing
      - Alibaba IMX219 and phone-camera alternates
    board_dependency:
      - J_CAM1 FPC pinout and front camera/earpiece keepout
      - front lens window datum and display-side clearance
    required_supplier_artifacts:
      - module 2D drawing with optical center, FPC exit, stiffener, and keepout
      - CSI pinout and power sequence
      - mating connector MPN and footprint
      - STEP model with lens height
      - driver or V4L2/Android integration notes
      - sample inspection report
    intake_status: blocked_no_exact_front_camera_mpn_drawing_or_sample
  - function: cellular
    primary_candidate: Quectel_RG255C_or_RM255C_5G_RedCap
    sourcing_audit_group: cellular
    package_binding: package/cellular/quectel-5g-redcap.yaml
    marketplace_or_vendor_basis:
      - Quectel RG255C/RM255C vendor product pages
      - Quectel EG915Q/EG915U and EG916Q-GL compact LTE Cat 1 bis public module pages
      - Fibocom MC665 compact LTE Cat 1 bis public module page
    board_dependency:
      - U_CELL LGA or M.2 footprint selection
      - compact LTE Cat 1 bis alternate fit against a repacked cellular region, not the stale 14 x 14 mm placeholder
      - CELL_RF_MAIN, CELL_RF_DIV, CELL_GNSS_RF matching and conducted access
      - USIM/eSIM and USB2/PCIe interface choice
    required_supplier_artifacts:
      - selected region SKU band matrix and orderable MPN
      - smaller LTE Cat 1 bis alternate orderable MPN, lifecycle, band matrix, and quote if RedCap cannot fit
      - hardware design guide and reference layout revision
      - module 2D drawing with package dimensions, shield height, datum, and keepouts
      - module pinout, LGA pad map, signal-voltage table, and reserved-pin rules
      - land pattern, paste mask, keepout, and shield height data
      - STEP model with package body, shield, and maximum component height
      - antenna feed and matching recommendations
      - carrier/PTCRB/GCF/module grant documentation
      - Linux/Android driver, firmware, and certification-use restrictions
      - explicit throughput, power, firmware, and certification delta for any LTE Cat 1 bis alternate versus RG255C
    intake_status: blocked_no_region_sku_hardware_design_pack_or_cert_scope
  - function: wifi_bluetooth
    primary_candidate: Murata_LBEE5XV2EA-802_Type_2EA
    sourcing_audit_group: wifi_bluetooth
    package_binding: package/wifi/murata-type-2ea-wifi6e.yaml
    marketplace_or_vendor_basis:
      - Murata Type 2EA vendor product page
    board_dependency:
      - U_WIFI_BT SMT footprint and RF feed geometry
      - WIFI_BT_RF0 and WIFI_BT_RF1 antenna matching
      - PCIe/SDIO and UART Bluetooth coexistence wiring
    required_supplier_artifacts:
      - module datasheet, hardware design guide, and reference layout package
      - module 2D drawing with shield height, package datum, and RF keepout
      - module pinout, SMT pad map, signal-voltage table, and reserved-pin rules
      - paste mask, land pattern, keepout, and reflow restrictions
      - certified antenna rules and modular grant limitations
      - firmware, regulatory database, and driver license package
      - conducted RF test procedure and coexistence guidance
      - STEP model with shield height
    intake_status: blocked_no_reference_layout_driver_license_or_cert_scope
  - function: usb_c_receptacle_evt0
    primary_candidate: GCT_USB4105_class_USB2_Type_C
    sourcing_audit_group: usb_c
    package_binding: package/usb-c/e1-phone-usb-c-port.yaml
    marketplace_or_vendor_basis:
      - preliminary USB-C binding and waterproof Molex production alternate
    board_dependency:
      - J_USB_C centered bottom aperture
      - shell capture, ESD placement, CC/VBUS protection, and insertion-load path
    required_supplier_artifacts:
      - 2D drawing with shell tabs, board edge datum, tongue height, and keepouts
      - connector pinout with A/B side USB2, CC, VBUS, GND, shield, and SBU disposition
      - recommended footprint, stencil guidance, and shell grounding requirements
      - mating-cycle rating, insertion/extraction force, and waterproof option data
      - STEP model and enclosure aperture/tolerance recommendation
      - reflow and coplanarity limits
      - equivalent production alternate drawing pack
    intake_status: blocked_no_signed_connector_drawing_or_mechanical_load_review
  - function: side_buttons
    primary_candidate: side_key_flex_or_enclosure_mounted_switch_subassembly
    sourcing_audit_group: human_interface
    package_binding: package/human-interface/side-buttons.yaml
    marketplace_or_vendor_basis:
      - preliminary side-button binding and enclosure interface plan
    board_dependency:
      - PWR_KEY_N, VOL_UP_N, VOL_DOWN_N, AON_1V8, and GND on side-key flex
      - actuator force path into enclosure rib instead of solder joints
    required_supplier_artifacts:
      - switch or side-key flex 2D drawing with plunger datum and force-travel curve
      - flex pinout, stiffener stack, bend radius, and adhesive/fixture notes
      - mating connector MPN, footprint, and insertion cycle rating
      - ESD/debounce recommendation and environmental rating
      - STEP model for buttons, flex, and connector stack
      - sample force and life-cycle test report
    intake_status: blocked_no_side_key_flex_or_switch_subassembly_pack
  - function: battery_pack
    primary_candidate: 5727mAh_22p05Wh_64x87x5p6mm_pouch_class
    sourcing_audit_group: battery
    package_binding: package/battery/e1-phone-17p3wh-pack.yaml
    marketplace_or_vendor_basis:
      - Alibaba and Made-in-China custom 5727 mAh thick pouch quote pools with LP446487 baseline outline evidence
    board_dependency:
      - 64 x 87 mm battery cavity and 11.8 mm flush-back device thickness target
      - VBAT, BAT_NTC, BAT_ID, GND connector and pack swelling clearance
    required_supplier_artifacts:
      - signed pack drawing with cell, PCM, tab, connector, and adhesive datums
      - NTC beta curve, pack ID resistor, protection limits, and cell datasheet
      - swelling, drop, puncture, UN38.3, IEC/UL, and shipping documentation
      - mating connector MPN, connector pinout, harness polarity drawing, and cable exit datum
      - STEP model for pouch, PCM, connector, cable tail, adhesive, and swelling envelope
      - charge profile limits and fuel-gauge characterization data
      - sample lot capacity, IR, and dimensional inspection report
    intake_status: blocked_no_custom_pack_quote_drawing_or_cert_pack
  - function: audio_speaker_microphone_flexes
    primary_candidate: codec_amp_mics_speaker_receiver_haptic_stack
    sourcing_audit_group: audio_haptics
    package_binding: package/audio/v0-codec.yaml
    marketplace_or_vendor_basis:
      - preliminary audio package binding and acoustic closure plan
    board_dependency:
      - bottom speaker, earpiece receiver, microphone ports, mesh, gasket, and haptic placement
    required_supplier_artifacts:
      - speaker, receiver, microphone, and haptic actuator 2D drawings
      - flex pinouts, connector MPNs, gasket datums, and acoustic port dimensions
      - impedance, sensitivity, SPL, distortion, and vibration test data
      - STEP models for acoustic and haptic parts
      - mesh, adhesive, and water/dust ingress material specs
      - sample acoustic and haptic inspection reports
    intake_status: blocked_no_acoustic_component_drawing_pack_or_test_data
  - function: top_bottom_interconnect
    primary_candidate: Hirose_BM28_class_board_to_board_or_flex_stack
    sourcing_audit_group: interconnect
    package_binding: package/interconnect/e1-phone-top-bottom-flex.yaml
    marketplace_or_vendor_basis:
      - preliminary top/bottom interconnect binding
    board_dependency:
      - USB2, power, audio, haptic, control, and factory-test crossing nets
      - full-width 64 x 87 mm battery cavity split-board topology
    required_supplier_artifacts:
      - exact mating connector pair MPNs and circuit count
      - top and bottom connector pinout plus flex pinout with ground-return allocation
      - connector land patterns, keepouts, mated height, retention, and cycle rating
      - STEP model for both mating connectors, stiffeners, and flex/board stack height
      - flex stackup drawing with impedance, stiffeners, bend radius, and strain relief
      - power contact current rating and ground/return allocation recommendation
      - assembly drawing for mating sequence and inspection
      - continuity and USB2/audio SI test recommendations
    intake_status: blocked_no_exact_connector_pair_flex_stackup_or_si_rules

cross_checks:
  every_preliminary_bom_high_risk_function_has_rfq_line: true
  display_primary_matches_display_fit_anchor: true
  rear_and_front_cameras_have_separate_intake_lines: true
  cellular_and_wifi_bt_require_vendor_reference_layouts: true
  usb_c_and_side_buttons_require_mechanical_load_path_artifacts: true
  battery_requires_custom_pack_drawing_and_safety_documents: true
  top_bottom_interconnect_requires_exact_mating_pair_and_flex_stackup: true
  all_rfq_lines_blocked: true

release_blockers:
  - supplier quote packs not received
  - exact orderable MPNs not frozen for every high-risk function
  - signed 2D drawings, FPC pinouts, mating connector MPNs, footprints, and STEP models missing
  - samples not received or inspected
  - regulatory, safety, and carrier documentation not tied to selected SKUs
  - production AVL and approved alternates not created from received RFQ responses

forbidden_claims:
  - supplier_intake_complete
  - quote_ready
  - samples_received
  - pinouts_frozen
  - footprints_frozen
  - AVL_ready
  - fabrication_ready
  - enclosure_ready
