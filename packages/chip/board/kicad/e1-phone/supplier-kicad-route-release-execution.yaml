release_sequence:
  - id: response_pack_intake
    source_status_key: supplier_response_pack_intake_contract
    required_before_next:
      - supplier-signed response pack archived under production/sourcing
      - signed 2D drawing, pinout or pad map, land pattern, STEP/B-rep, sample inspection, and compliance index present
    status: blocked_no_supplier_response_packs
  - id: supplier_drawing_and_review
    source_status_key: supplier_kicad_review_execution
    required_before_next:
      - schema, authenticity, EE pinout, layout footprint, ME STEP, ops, sample, and compliance reviews passed
      - pinout, symbol, footprint, and footprint-to-3D binding reviews approved for every selected release function
    status: blocked_no_supplier_reviews_or_approvals
  - id: kicad_symbol_footprint_capture
    source_status_key: evt1_footprint_capture_work_package
    required_before_next:
      - reviewed symbols and supplier footprints replace placeholder libraries
      - STEP/B-rep origins, orientations, courtyard, height, paste, and keepouts are bound to the PCB
    status: blocked_no_real_kicad_libraries
  - id: schematic_erc_and_netclass_capture
    source_status_key: schematic_capture_readiness_binding
    required_before_next:
      - production hierarchical schematic replaces scaffold symbols and text notes
      - production ERC and signed waivers exist after symbol capture
      - net classes match high-speed, RF, power, and factory-test constraints
    status: blocked_no_production_schematic_or_erc
  - id: trial_route_and_routed_pcb
    source_status_key: routed_pcb_implementation_execution
    required_before_next:
      - supplier-footprint escape and trial-route evidence proves density and route feasibility
      - routed KiCad PCB, filled zones, clean DRC or signed waivers, SI/PI/RF/power reports exist
    status: blocked_no_trial_route_or_routed_pcb
  - id: routed_step_enclosure_factory_first_article
    source_status_key: first_article_route_execution_order
    required_before_next:
      - routed STEP with supplier models, enclosure clearance release, factory limits, and first-article traveler exist
      - display, camera, USB-C, side-key, cellular, Wi-Fi/Bluetooth, and factory probe evidence close
    status: blocked_no_routed_step_factory_or_first_article
