  selected_release_handoff_records_match_final_readiness_supplier_gate: true
  review_output_count_matches_review_policy: true
  response_packs_absent_and_required_before_capture: true
  route_inputs_blocked_until_all_supplier_gates_close: true
  schematic_capture_blocks_production_erc_until_real_symbols_exist: true
  routed_layout_blocks_fabrication_enclosure_and_factory_until_route_outputs_exist: true
  first_article_sequence_blocks_release_until_route_step_factory_and_fit_evidence_exist: true
release_blockers:
  - supplier response packs for selected display, cameras, USB-C, side keys, cellular, and Wi-Fi/Bluetooth are absent
  - pinout, symbol, footprint, and footprint-to-3D binding reviews have not run
  - real KiCad production symbols and supplier footprints have not replaced placeholders
  - local routed PCB candidate has tracks and filled zones, but production ERC, clean or waived DRC, SI/PI/RF/power evidence, and release signoff are missing
  - local routed STEP candidate exists for review only; supplier-approved STEP, enclosure clearance, factory limits, and first-article transcript are missing
