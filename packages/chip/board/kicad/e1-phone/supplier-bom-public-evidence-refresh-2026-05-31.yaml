schema: eliza.e1_phone_supplier_bom_public_evidence_refresh.v1
date: '2026-05-31'
status: public_supplier_bom_refresh_not_avl_or_release_evidence
evidence_class: public_market_research
claim_boundary: >
  Public manufacturer, authorized-distributor, and marketplace sourcing refresh
  for off-the-shelf E1 phone components. This artifact is not an AVL, not a
  signed supplier quote, not supplier-return evidence, not sample receipt, not
  incoming inspection, not CAD geometry approval, and not permission to freeze
  KiCad symbols, footprints, pinouts, RF layout, battery safety, enclosure
  datums, or production cost.
release_credit: false
release_allowed: false
currency: USD
volume_columns: [100, 1000, 10000, 100000, 1000000]
source_observation_policy:
  observed_at: '2026-05-31'
  current_revalidation_date: '2026-06-02'
  revalidation_note: >
    Public source spot-check tightened lifecycle and CAD-model status fields.
    Public pages are availability signals only; release still requires supplier
    response packs, downloaded-and-hashed CAD, samples, and approval.
  preferred_sources:
    - manufacturer page or datasheet for lifecycle, dimensions, interfaces, drawings, and CAD availability
    - authorized distributor page for orderability, stock, MOQ, standard package, and price breaks
    - marketplace listing only when the part is a custom display, camera, antenna, or battery-pack class
  public_listing_counts_as_supplier_return: false
  price_range_method: >
    Use visible public price breaks where present. Extrapolate 10000, 100000,
    and 1000000 unit bands conservatively from distributor reel pricing,
    marketplace ladders, expected OEM direct-channel reductions, and the
    existing 2026-05-28 public market cost-band artifact. Ranges exclude freight,
    tariffs, taxes, certification, tuning, NRE, tooling, yield loss, payment
    terms, and warranty reserves.
source_artifacts_inspected:
  - board/kicad/e1-phone/off-the-shelf-sourcing-cost-model-2026-05-22.yaml
  - board/kicad/e1-phone/supplier-to-kicad-evidence-map.yaml
