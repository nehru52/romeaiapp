    planning_target_s11_db_max: -10.0
    planning_target_total_efficiency_pct_min: 40.0
    planning_target_evidence_class: planning_estimate_not_vna_measured
    requires_pi_or_t_matching_network: true
    requires_conducted_access_before_matching: true
    requires_via_fence_and_continuous_ground_reference: true
    status: blocked_waiting_reference_layout_antenna_vendor_review_vna_and_sar_evidence
    blocker: RF feed is a logical net with a required matching-network placeholder; the S11/efficiency targets are
      pre-layout planning estimates. No routed 50 ohm geometry, antenna tune, VNA data, or SAR evidence exists.
  - net: WIFI_BT_RF0
    role: wifi_bt_chain0
    candidate_zone: side_plastic_or_top_edge_after_vendor_review
    near: U_WIFI_BT
    band_plan: Wi-Fi 2.4/5/6 GHz + Bluetooth 5.3 (2.4 GHz)
    freq_range_mhz:
      - 2400
      - 7125
    planning_target_s11_db_max: -8.0
    planning_target_total_efficiency_pct_min: 45.0
    planning_target_evidence_class: planning_estimate_not_vna_measured
    requires_pi_or_t_matching_network: true
    requires_conducted_access_before_matching: true
    requires_via_fence_and_continuous_ground_reference: true
    status: blocked_waiting_reference_layout_antenna_vendor_review_vna_and_sar_evidence
    blocker: RF feed is a logical net with a required matching-network placeholder; the S11/efficiency targets are
