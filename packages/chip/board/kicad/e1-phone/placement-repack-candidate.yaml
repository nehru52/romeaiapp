region_semantics_changes_required:
  - refdes_group: U_CELL
    change: current 14 x 14 mm cellular region cannot represent the selected RG255C LGA module body
    reason: the selected public RG255C LGA envelope is 29 x 32 mm before RF keepout, shield, matching, and
      conducted-access clearance
  - refdes_group: J_CAM0_CAM1
    change: treat active PCB region as camera FPC connector/escape area, not full module body
    reason: the current shared top-right area cannot fit the 25 x 24 mm Junde alternate plus display connector and
      top flex
  - refdes_group: U_AUDIO_SPK_MIC
    change: split the current broad audio/acoustic strip into explicit bottom-left audio and separate USB/flex zones
    reason: a single 57 x 8 mm strip overlaps USB-C and bottom split-interconnect regions
  - refdes_group: SW_POWER_VOL
    change: route side keys through a short side-key flex tail from the top island instead of consuming the left
      RF edge
    reason: the known Wi-Fi/Bluetooth module needs the lower-left top-island area without overlapping cellular or
      buttons
cross_checks:
  candidate_removes_all_region_overlaps: true
  candidate_reduces_overlap_count: true
  candidate_cellular_region_rejected_for_selected_lga: true
  candidate_wifi_region_fits_known_module: true
  candidate_preserves_battery_window: true
  candidate_rejects_oversized_junde_camera_alternate: true
  active_matrix_matches_candidate: true
required_before_routed_release:
  - repack U_CELL for the selected 29 x 32 mm RG255C LGA plus RF keepouts or choose a smaller orderable cellular
    module before EVT1 routing
  - obtain primary front/rear camera XY and z-height drawings
  - keep 25 x 24 mm Junde/IMX219 camera alternate out of the current 17 x 13 mm camera/FPC region unless the
    top-right camera/display/flex stack is widened
  - rerun RF antenna keepout and cellular/Wi-Fi coexistence placement with supplier reference layouts
  - rerun routed STEP/enclosure clearance once supplier 3D models are available
