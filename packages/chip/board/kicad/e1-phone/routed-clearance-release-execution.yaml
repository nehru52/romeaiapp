  release_report_matches_post_route_validation_output: true
  current_mechanical_clearance_json_is_not_release_evidence: true
  all_clearance_cases_blocked_until_release_evidence: true
  selected_hardware_clearance_domains_fail_closed: true
  routed_step_supplier_models_boolean_physical_fit_and_functional_logs_required: true

release_blockers:
  - routed KiCad STEP exists only as a blocked local candidate, not approved production release evidence
  - production routed-board clearance release report is missing
  - current routed-board-clearance JSON is only a fail-closed intake/template
  - all 12 clearance cases require approved routed STEP, supplier component models, physical fit, and reviewer signoff
  - concept CAD boolean interference result cannot release enclosure placement
  - physical fit, functional logs, assembly drawing, ERC, DRC, and supplier 3D binding evidence are missing

forbidden_claims:
  - routed_clearance_passed
  - routed_board_step_ready
  - enclosure_ready
  - physical_fit_verified
  - fabrication_ready
  - end_to_end_phone_ready
