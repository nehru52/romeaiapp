schema: eliza.e1_phone_supplier_source_verification.v1
status: public_sources_verified_not_supplier_approved_or_procurement_ready
date: 2026-05-20
claim_boundary: >
  Current public-source verification for the phone-board sourcing shortlist.
  This records that the selected display, camera, cellular, and Wi-Fi/Bluetooth
  candidates still have public marketplace or vendor evidence as of the date
  above. It is not a supplier approval, AVL, quote, purchase order, signed
  drawing pack, NDA datasheet pack, sample receipt, incoming inspection record,
  or permission to freeze KiCad symbols, footprints, FPC pinouts, antennas, or
  enclosure datums.

source_artifacts:
  - board/kicad/e1-phone/supplier-sourcing-audit.yaml
  - board/kicad/e1-phone/supplier-rfq-intake.yaml
  - board/kicad/e1-phone/procurement-readiness.yaml
  - board/kicad/e1-phone/display-camera-oem-source-revalidation.yaml
  - board/kicad/e1-phone/display-fit.yaml
  - package/display/v0-dsi-720x1280.yaml
  - package/camera/oem-mipi-csi-modules.yaml
  - package/cellular/quectel-5g-redcap.yaml
  - package/wifi/murata-type-2ea-wifi6e.yaml

verification_policy:
  evidence_type: public_listing_or_vendor_product_page
  source_use_limit: sourcing_shortlist_and_rfq_seed_only
  quote_quantities_required_next: [10, 100, 1000]
  samples_required_before_pinout_or_footprint_freeze: true
  signed_supplier_pack_required_before_evt1_route: true
  required_next_artifacts:
    - supplier_quote_with_orderable_mpn_moq_lead_time_and_lifecycle_status
    - signed_2d_drawing_with_datums_tolerances_fpc_or_package_orientation
    - connector_pinout_or_module_pad_map_and_mating_connector_mpn
    - recommended_land_pattern_or_footprint_source_revision
    - 3d_step_or_brep_model_with_max_height_keepouts
    - reference_schematic_or_reference_layout
    - compliance_regulatory_safety_and_material_documents
    - sample_receipt_and_incoming_inspection_record

