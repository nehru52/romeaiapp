supplier_contact_plan:
  owner: sourcing
  sequence:
    - send_display_camera_rfq_to_chenghao_and_sincere_first_with_10_100_1000_qty_breaks
    - request_murata_sales_and_quectel_fae_access_for_design_guides_and_reference_layouts
    - require_all_candidates_to_return_signed_drawings_pinouts_footprints_step_and_sample_commit
    - reject_any_candidate_that_cannot_provide_orderable_mpn_and_incoming_inspection_dimensions

cross_checks:
  has_primary_display_public_dimensions: true
  has_display_alibaba_and_made_in_china_alternates: true
  has_parseable_alibaba_meta_055wu01_display_alternate: true
  has_parseable_made_in_china_e549_amoled_display_alternate: true
  display_alternates_match_2026_05_21_revalidation: true
  has_rear_camera_public_pin_count_and_sensor_class: true
  has_front_camera_public_pin_count_and_sensor_class: true
  has_camera_alibaba_and_made_in_china_alternates: true
  has_cellular_vendor_page_with_lga_region_variants_and_host_interfaces: true
  has_wifi_bt_vendor_page_with_in_production_status_dimensions_and_interfaces: true
  all_records_have_https_urls: true
  all_records_remain_blocked_for_supplier_pack_before_use: true
  source_count: 11

release_blockers:
  - public pages are not supplier quote packs or approved AVL records
  - signed 2D drawings, FPC pinouts, land patterns, and STEP models are missing
  - physical samples and incoming inspection records are missing
  - module design guides, reference layouts, firmware or driver licenses, and regulatory scope are missing
  - no orderable MPN has been approved for production BOM or KiCad footprint freeze

forbidden_claims:
  - supplier_approved
  - public_sources_are_avl
  - quote_ready
  - samples_received
  - pinouts_frozen
  - footprints_frozen
  - production_bom_ready
  - fabrication_ready
  - enclosure_ready
