schema: eliza.e1_phone_display_camera_schematic_net_binding.v1
status: blocked_display_camera_net_binding_requires_supplier_pinouts_real_schematic_route_bringup_and_capture
date: 2026-05-21
claim_boundary: >
  Schematic and routing binding target for the selected 5.5 inch MIPI-DSI
  display/touch module and the front/rear MIPI-CSI camera modules. This maps
  public OEM choices to connector contract nets, MIPI route groups, power and
  control nets, factory probes, and EVT1 capture exit criteria. It is not a
  supplier pinout, not a connector land pattern, not a KiCad schematic
  implementation, not routed MIPI evidence, not display/camera bring-up proof,
  and not enclosure-ready proof.

source_artifacts:
  - board/kicad/e1-phone/artifact-manifest.yaml
  - board/kicad/e1-phone/display-camera-oem-integration.yaml
  - board/kicad/e1-phone/display-camera-connector-pinout-execution.yaml
  - board/kicad/e1-phone/display-camera-acceptance-checklist.yaml
  - board/kicad/e1-phone/block-netlist.yaml
  - board/kicad/e1-phone/routing-constraints.yaml
  - board/kicad/e1-phone/factory-probe-map.yaml
  - board/kicad/e1-phone/display-fit.yaml
  - package/display/v0-dsi-720x1280.yaml
  - package/camera/oem-mipi-csi-modules.yaml

interface_context:
  display_part: CH550FH01A-CT
  display_anchor: 5.5_in_1080x1920_MIPI_LCM_CTP
  display_outline_mm: {width: 77.1, height: 151.77, thickness: 3.39}
  display_clearance_mm: {width_clearance_mm: 0.9, height_clearance_mm: 1.83}
  rear_camera_module: SF-XR3855A-A0
  rear_camera_public_pin_count: 24
  front_camera_module: SF-G5035S60FY
  front_camera_public_pin_count: 30
  display_connector_region_mm: {x: 49.0, y: 8.0, width: 13.0, height: 19.0}
  camera_connector_region_mm: {x: 45.0, y: 3.0, width: 17.0, height: 24.0}

schematic_blocks:
  display_touch_fpc:
    refdes: J_DISPLAY_TOUCH
    source_candidate: CH550FH01A-CT
    schematic_sheet: display_camera.kicad_sch
    required_contract_nets:
      - DISP_AVDD_5V5
      - DISP_AVEE_N5V5
      - DISP_BL_EN
      - DISP_BL_PWM
      - DISP_RESET_N
      - DISP_TE
      - DSI_CLK_N
      - DSI_CLK_P
      - DSI_D0_N
      - DSI_D0_P
      - DSI_D1_N
      - DSI_D1_P
      - DSI_D2_N
      - DSI_D2_P
      - DSI_D3_N
      - DSI_D3_P
      - GND
      - IO_1V8
      - TOUCH_I2C_SCL
      - TOUCH_I2C_SDA
      - TOUCH_IRQ_N
      - TOUCH_RESET_N
    required_local_parts:
      - MIPI DSI ESD or connector-adjacent protection selected from supplier pinout capacitance limits
      - display bias sequencing and discharge network for AVDD and AVEE
      - touch I2C pullups, reset, interrupt, and ESD protection
      - backlight enable and PWM level compatibility review
    status: blocked_waiting_supplier_pinout_connector_land_pattern_step_and_samples
  rear_camera_fpc:
    refdes: J_CAM0
    source_candidate: SF-XR3855A-A0
    schematic_sheet: display_camera.kicad_sch
    public_pin_count: 24
    required_contract_nets:
      - CAM0_AF_I2C_SCL
      - CAM0_AF_I2C_SDA
      - CAM0_CSI_CLK_N
      - CAM0_CSI_CLK_P
      - CAM0_CSI_D0_N
      - CAM0_CSI_D0_P
      - CAM0_CSI_D1_N
      - CAM0_CSI_D1_P
      - CAM0_CSI_D2_N
      - CAM0_CSI_D2_P
      - CAM0_CSI_D3_N
      - CAM0_CSI_D3_P
      - CAM0_MCLK
      - CAM0_PWDN
      - CAM0_RESET_N
      - CAM_AFVDD_2V8
      - CAM_AVDD_2V8
      - CAM_DVDD_1V2
      - GND
      - IO_1V8
    required_local_parts:
      - camera AVDD DVDD IOVDD filtering and sequencing per supplier timing
      - autofocus VCM supply filtering and I2C ownership
      - CSI ESD or common-mode policy compatible with MIPI lane capacitance
      - reset PWDN and MCLK default-state resistors
    status: blocked_waiting_supplier_pinout_connector_land_pattern_step_and_samples
  front_camera_fpc:
    refdes: J_CAM1
    source_candidate: SF-G5035S60FY
    schematic_sheet: display_camera.kicad_sch
    public_pin_count: 30
    required_contract_nets:
      - CAM1_CSI_CLK_N
      - CAM1_CSI_CLK_P
      - CAM1_CSI_D0_N
      - CAM1_CSI_D0_P
      - CAM1_CSI_D1_N
      - CAM1_CSI_D1_P
      - CAM1_MCLK
      - CAM1_RESET_N
      - CAM_AVDD_2V8
      - CAM_DVDD_1V2
      - GND
      - IO_1V8
    required_local_parts:
      - camera AVDD DVDD IOVDD filtering and sequencing per supplier timing
      - CSI ESD or common-mode policy compatible with MIPI lane capacitance
      - reset and MCLK default-state resistors
      - front-camera cover-glass black-mask and connector-height STEP binding
    status: blocked_waiting_supplier_pinout_connector_land_pattern_step_and_samples

mipi_route_bindings:
  display_touch_fpc:
    route_groups: [DSI_CLK, DSI_D0, DSI_D1, DSI_D2, DSI_D3]
    impedance_class: mipi_dphy_diff
    target_impedance_ohm_diff: 100
    max_length_mm: 45
    intra_pair_skew_mm_max: 0.25
    required_validation: routed_dsi_length_skew_impedance_return_path_and_display_bringup_log
  rear_camera_fpc:
    route_groups: [CAM0_CSI_CLK, CAM0_CSI_D0, CAM0_CSI_D1, CAM0_CSI_D2, CAM0_CSI_D3]
    impedance_class: mipi_dphy_diff
    target_impedance_ohm_diff: 100
    max_length_mm: 55
    intra_pair_skew_mm_max: 0.25
    required_validation: routed_rear_csi_length_skew_impedance_return_path_and_capture_log
  front_camera_fpc:
    route_groups: [CAM1_CSI_CLK, CAM1_CSI_D0, CAM1_CSI_D1]
    impedance_class: mipi_dphy_diff
    target_impedance_ohm_diff: 100
    max_length_mm: 65
    intra_pair_skew_mm_max: 0.25
    required_validation: routed_front_csi_length_skew_impedance_return_path_and_capture_log

factory_probe_bindings:
  display_touch: [DSI_CLK_P, DSI_D0_P, TOUCH_I2C_SCL, TOUCH_I2C_SDA, DISP_RESET_N, DISP_BL_EN, DISP_BL_PWM]
  cameras: [CAM0_CSI_CLK_P, CAM1_CSI_CLK_P, CAM0_I2C_SCL, CAM1_I2C_SCL, CAM0_RESET_N, CAM1_RESET_N, CAM_AVDD_2V8, CAM_DVDD_1V2]
  extra_first_article_observability:
    - DISP_TE
    - TOUCH_IRQ_N
    - CAM0_MCLK
    - CAM1_MCLK
    - CAM0_PWDN

evt1_capture_exit_criteria:
  - KiCad schematic contains non-placeholder connector symbols for display touch rear camera and front camera FPCs
  - supplier pin numbers lane order polarity grounds shields NC pins and pin-1 datums are assigned
  - every required contract net is present in block-netlist.yaml and assigned to reviewed connector pins
  - DSI and CSI pairs use mipi_dphy_diff constraints and EVT1 stackup/coupon target
  - display bias touch I2C backlight and camera power sequence nets have test or fixture access
  - routed board STEP includes display stack camera modules FPC exits connector heights and bend keepouts
  - display bring-up camera capture image-quality and routed enclosure clearance reports are archived

cross_checks:
  display_part_matches_integration: true
  camera_parts_match_integration: true
  display_fit_anchor_preserved: true
  connector_records_match_pinout_execution: true
  mipi_route_groups_match_routing_constraints: true
  factory_probe_nets_match_probe_map: true
  all_required_nets_exist_in_block_netlist: true
  fail_closed_until_supplier_pinouts_real_route_bringup_and_capture_exist: true

release_blockers:
  - display/touch FPC exact pin count, lane order, mating connector, and STEP model are missing
  - rear and front camera FPC exact pin orders, mating connectors, and STEP models are missing
  - KiCad connector symbols and supplier land patterns are not captured
  - routed DSI/CSI copper, DRC/ERC, length/skew, impedance, and return-path evidence are missing
  - display bring-up, touch probe, camera capture, image-quality, and routed enclosure clearance evidence are missing

forbidden_claims:
  - display_schematic_ready
  - camera_schematic_ready
  - display_pinout_frozen
  - camera_pinout_frozen
  - display_connector_ready
  - camera_connector_ready
  - mipi_routed
  - display_works
  - camera_ready
  - routed_pcb_ready
  - fabrication_ready
  - enclosure_ready
