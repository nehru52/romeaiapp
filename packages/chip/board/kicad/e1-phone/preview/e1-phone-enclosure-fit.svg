<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1400" viewBox="0 0 1200 1400">
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #14213d; }
      .title { font-size: 34px; font-weight: 700; }
      .sub { font-size: 18px; fill: #4b5563; }
      .label { font-size: 15px; font-weight: 700; }
      .small { font-size: 13px; fill: #4b5563; }
      .device { fill: #e9edf2; stroke: #9aa6b2; stroke-width: 5; }
      .display { fill: #101820; stroke: #334155; stroke-width: 4; }
      .active { fill: #dbeafe; stroke: #2563eb; stroke-width: 3; }
      .board { fill: #177052; stroke: #083b2e; stroke-width: 4; }
      .battery { fill: #f5efe4; stroke: #b7aa97; stroke-width: 3; stroke-dasharray: 12 9; }
      .button { fill: #9fc36a; stroke: #17202a; stroke-width: 3; rx: 8; ry: 8; }
      .usb { fill: #d85f56; stroke: #17202a; stroke-width: 3; rx: 6; ry: 6; }
      .camera { fill: #a978c8; stroke: #17202a; stroke-width: 3; rx: 7; ry: 7; }
      .antenna { fill: #fff3bf; stroke: #936c00; stroke-width: 3; stroke-dasharray: 8 6; }
      .dim { stroke: #374151; stroke-width: 3; marker-start: url(#arrow); marker-end: url(#arrow); }
      .section { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .stack { fill: #e2e8f0; stroke: #475569; stroke-width: 2; }
      .micro { font-size: 1.8px; fill: #334155; }
      .mmtext { font-size: 4.2px; font-weight: 700; fill: #0f172a; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
  </defs>

  <rect width="1200" height="1400" fill="#f8fafc"/>
  <text x="70" y="72" class="title">E1 Phone Enclosure Fit Preview</text>
  <text x="70" y="108" class="sub">5.5 inch FHD display anchor, 64 x 132 mm split-island board, USB-C and side-key flex constrained for enclosure review</text>

  <g transform="translate(115 170) scale(6)">
    <rect x="0" y="0" width="78.0" height="153.6" rx="7" class="device"/>
    <rect x="0.45" y="0.915" width="77.1" height="151.77" rx="7.5" fill="none" stroke="#64748b" stroke-width="0.35" stroke-dasharray="1.4 1"/>
    <rect x="4.16" y="13.3" width="70.78" height="129.17" rx="2" class="display"/>
    <rect x="5.53" y="17.4" width="68.04" height="120.96" rx="1" class="active"/>
    <rect x="7.55" y="10" width="64" height="30" rx="2.5" class="board" opacity="0.82"/>
    <rect x="7.55" y="127" width="64" height="15" rx="2.0" class="board" opacity="0.82"/>
    <rect x="7.55" y="40" width="64" height="87" class="battery"/>
    <rect x="6" y="8" width="60" height="5" class="antenna"/>
    <rect x="6" y="132" width="60" height="5" class="antenna"/>
    <rect x="53" y="13" width="12" height="18" class="camera"/>
    <rect x="26" y="136" width="16" height="6" class="usb"/>
    <rect x="4.2" y="37" width="17" height="4" class="button"/>

    <text x="18" y="-5" class="micro">touch/lens ref 77.1 x 151.77 mm</text>
    <text x="8" y="19" class="micro">5.5 in FHD active area</text>
    <text x="22" y="36" class="mmtext">top island</text>
    <text x="25" y="86" class="mmtext">64 x 87 mm</text>
    <text x="22" y="135" class="mmtext">bottom island</text>
    <text x="53.5" y="23" class="micro">camera</text>
    <text x="28" y="140.5" class="micro">USB-C</text>
    <text x="4.7" y="40" class="micro">side key flex</text>

    <line x1="0" y1="164" x2="78.0" y2="164" class="dim"/>
    <text x="20" y="170" class="micro">78.0 mm device target</text>
    <line x1="89" y1="0" x2="89" y2="153.6" class="dim"/>
    <text x="93" y="82" class="micro" transform="rotate(90 93 82)">153.6 mm device target</text>
  </g>

  <g transform="translate(690 190)">
    <rect x="0" y="0" width="410" height="360" rx="8" class="section"/>
    <text x="24" y="40" class="label">Z-Stack Risk</text>
    <rect x="34" y="75" width="290" height="28" class="stack"/><text x="340" y="95" class="small">cover/touch</text>
    <rect x="34" y="103" width="290" height="55" class="stack"/><text x="340" y="135" class="small">LCM</text>
    <rect x="34" y="158" width="290" height="20" class="stack"/><text x="340" y="174" class="small">adhesive</text>
    <rect x="34" y="178" width="290" height="22" class="stack"/><text x="340" y="195" class="small">0.8 PCB</text>
    <rect x="34" y="200" width="290" height="55" class="stack"/><text x="340" y="232" class="small">shields/modules</text>
    <rect x="34" y="255" width="290" height="78" class="stack"/><text x="340" y="299" class="small">battery</text>
    <text x="24" y="345" class="small">Requires STEP tolerance stack before enclosure-ready claim.</text>
  </g>

  <g transform="translate(690 590)">
    <rect x="0" y="0" width="410" height="360" rx="8" class="section"/>
    <text x="24" y="40" class="label">Mechanical Interfaces</text>
    <text x="24" y="82" class="small">USB-C: bottom-center, enclosure-captured shell.</text>
    <text x="24" y="122" class="small">Side keys: VOL+, VOL-, PWR on left-side flex/island.</text>
    <text x="24" y="162" class="small">Top/bottom antenna keepouts require plastic/low metal.</text>
    <text x="24" y="202" class="small">Camera bump: exact lens z-height and axis pending supplier drawing.</text>
    <text x="24" y="242" class="small">Battery pull tab, NTC, and pack ID require vendor drawing.</text>
    <text x="24" y="282" class="small">Speaker/mic ports need acoustic chamber model.</text>
  </g>

  <g transform="translate(70 1255)">
    <text x="0" y="0" class="sub">Preview only: real enclosure readiness requires STEP assembly, tolerance stack, connector/button load review,</text>
    <text x="0" y="30" class="sub">antenna model, acoustic model, and DFM.</text>
  </g>
</svg>
