  - docs/board/e1-phone-mainboard-metrics.yaml
  - board/kicad/e1-phone/layout-utilization.yaml
  - board/kicad/e1-phone/placement-interface-matrix.yaml
  - board/kicad/e1-phone/placement-repack-candidate.yaml
  - board/kicad/e1-phone/component-envelope-fit-audit.yaml
  - board/kicad/e1-phone/radio-module-envelope-orderability-gate.yaml
  - board/kicad/e1-phone/cellular-space-saving-downselect.yaml
  - package/cellular/quectel-5g-redcap.yaml
  - package/battery/e1-phone-17p3wh-pack.yaml
  - board/kicad/e1-phone/battery-layout-options.yaml
  - board/kicad/e1-phone/route-feasibility-density.yaml
upstream_status:
  placement_interface_matrix: concept_constraints_not_routed_pcb
  placement_repack_candidate: active_matrix_matches_overlap_free_repack_candidate_not_routed
  component_envelope_fit_audit: blocked_component_envelopes_require_supplier_drawings_or_region_updates_before_routing
  radio_module_envelope_orderability_gate: blocked_cellular_region_too_small_and_supplier_design_packs_missing
  battery_layout_options: blocked_routed_split_board_and_supplier_pack_evidence_required
  route_feasibility_density: blocked_requires_supplier_footprints_escape_analysis_and_trial_route
locked_geometry:
  board_bbox_mm: {width: 64.0, height: 132.0, area_mm2: 8448.0}
  top_island_mm: {x: 0.0, y: 0.0, width: 64.0, height: 29.0, area_mm2: 1856.0}
  battery_window_mm: {x: 0.0, y: 29.5, width: 64.0, height: 87.0, area_mm2: 5568.0}
  bottom_island_mm: {x: 0.0, y: 117.0, width: 64.0, height: 15.0, area_mm2: 960.0}
  top_to_battery_gap_mm: 0.5
selected_cellular_module:
  vendor: Quectel
  form_factor: RG255C_LGA
  public_unrotated_envelope_mm: {width: 29.0, height: 32.0, thickness: 2.4}
  public_rotated_envelope_mm: {width: 32.0, height: 29.0, thickness: 2.4}
  rotated_area_mm2: 928.0
  share_of_top_island_pct: 50.0
  vertical_clearance_if_rotated_in_top_island_mm: 0.0
  battery_gap_remaining_if_rotated_at_y0_mm: 0.5
  status: rotated_outline_barely_fits_top_island_height_but_leaves_no_supplier_rf_keepout_margin
current_top_island_region_pressure:
  current_top_region_area_mm2:
    U_CELL: 196.0
    U_WIFI_BT: 140.0
    U_SOC_LPDDR_UFS: 350.0
    U_PMIC_CHARGER: 104.0
    SW_POWER_VOL: 36.0
    J_BATTERY: 24.0
    J_DISPLAY_TOUCH: 136.0
    J_CAM0_CAM1: 221.0
    J_TOP_BOTTOM_FLEX_TOP: 48.0
  current_top_region_total_mm2: 1255.0
  current_top_region_total_pct_of_top_island: 67.6
  top_region_total_with_rotated_rg255c_replacing_placeholder_mm2: 1987.0
  top_region_total_with_rotated_rg255c_pct_of_top_island: 107.1
  over_top_island_before_rf_keepouts_mm2: 131.0
  status: blocked_rectangular_region_demand_exceeds_top_island_before_supplier_keepouts
conflict_summary:
  unrotated_rg255c_lga_fits_top_island: false
  rotated_rg255c_lga_fits_top_island_outline_only: true
  rotated_rg255c_lga_leaves_vertical_keepout_margin: false
  rotated_rg255c_plus_current_top_regions_fit_by_area: false
  preserves_64x87_battery_window: true
  conclusion: current_64x29_top_island_cannot_claim_selected_rg255c_lga_phone_layout_fit
decision_options:
  - id: select_smaller_orderable_cellular_lga_or_lcc
    effect: preserves selected display, 64 x 132 mm board bbox, 64 x 87 mm battery window, and bottom island
    status: preferred_parallel_path_if_supplier_can_provide_smaller_redcap_or_lte_module_pack
    required_evidence:
      - orderable MPN and lifecycle status
      - public or supplier envelope at or below a repacked top RF budget
      - hardware design guide, pad map, reference layout, STEP, firmware, carrier, PTCRB/GCF, and SAR scope
  - id: repack_top_island_around_rotated_rg255c
    effect: keeps selected cellular family but forces display/camera FPC, Wi-Fi/Bluetooth, SoC, PMIC, side-key tail,
      battery tail, and top split connector relocation
    status: blocked_area_overrun_before_rf_keepouts_and_no_supplier_reference_layout
    required_evidence:
      - supplier RG255C LGA reference layout and RF keepouts
      - new placement matrix proving no battery-window intrusion
      - trial route proving PCIe/USB2/SIM/RF escape and antenna matching access
      - routed STEP and enclosure clearance rerun
  - id: increase_top_island_height_keep_board_height_and_bottom_island
    effect: would reduce the selected 87 mm battery cavity unless the device or board height changes
    status: not_preferred_because_it_breaks_the_selected_22p05Wh_battery_window
    required_evidence:
      - revised battery capacity/runtime estimate
      - enclosure rib and pouch swelling rerun
      - display/antenna/mechanical review
  - id: increase_board_or_device_height
    effect: preserves the selected battery and cellular module but violates the current compact 78.0 x 153.6 mm
      screen-anchored device target
    status: fallback_only_if_supplier_module_or_repack_options_fail
    required_evidence:
      - updated screen/enclosure industrial design target
      - updated board outline, preview, STEP, and tolerance stack
  - id: m2_cellular_lab_only
    effect: enables modem bring-up but cannot be the phone PCB layout
    status: allowed_for_lab_carrier_testing_only
    required_evidence:
      - lab adapter wiring and mechanical fixture
      - explicit exclusion from phone enclosure release claims
recommended_next_actions:
  - request smaller orderable cellular LGA/LCC alternatives in the cellular RFQ while preserving RG255C as a reference
    option
  - require Quectel RG255C LGA reference layout and keepouts before any rotated top-island placement trial
  - keep the 64 x 87 mm battery window and 78.0 x 153.6 mm display-anchored envelope locked until a smaller module
    or a proven top-island route exists
  - do not move the active placement matrix to a rotated RG255C layout until supplier keepouts and route corridors are
    available
cross_checks:
  top_island_geometry_matches_metrics_and_layout_utilization: true
  battery_window_matches_selected_22p05Wh_pack_class: true
  cellular_dimensions_match_radio_orderability_gate: true
  rotated_cellular_area_matches_public_dimensions: true
  current_region_area_total_matches_placement_matrix: true
  rotated_cellular_overfills_top_island_area_before_keepouts: true
  decision_keeps_m2_as_lab_only: true
  blocks_layout_release_until_smaller_module_or_repack_evidence: true
release_blockers:
  - rotated RG255C LGA consumes 928 mm2, 50.0 percent of the current 64 x 29 mm top island, before RF keepouts
  - replacing the current U_CELL placeholder with rotated RG255C raises top-island rectangular demand to 1987 mm2
    against 1856 mm2 available
  - no supplier RG255C LGA reference layout, RF keepout, land pattern, STEP, or antenna review exists
  - increasing top-island height would break the locked 64 x 87 mm selected battery cavity unless board or device
    height changes
  - M.2 cellular fallback is lab-only and cannot support enclosure-ready phone layout claims
forbidden_claims:
  - cellular_top_island_fit_ready
  - selected_cellular_module_layout_ready
  - top_island_repack_ready
  - route_feasible
  - rf_ready
  - enclosure_ready
  - fabrication_ready
  - end_to_end_phone_ready
