schema: eliza.e1_phone_cellular_top_island_repack_feasibility.v1
status: blocked_selected_lga_overfills_current_top_island_without_repack_or_module_change
date: '2026-05-21'
claim_boundary: >
  Top-island placement feasibility gate for the selected Quectel RG255C LGA
  cellular module inside the current 64 x 132 mm split-board concept. This is
  an area and rectangle-pressure study only. It is not a routed placement, not
  a supplier reference layout, not RF keepout evidence, not DRC, not thermal
  signoff, and not enclosure release.
