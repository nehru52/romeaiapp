downselect_policy:
  primary_space_saving_branch: quectel_eg915q_na_or_eg915u_class
  rationale:
    - preserves Quectel supplier path while cutting public module area by about half versus RG255C LGA
    - fits a plausible 24 x 20 mm repacked outline, unlike the current 14 x 14 mm placeholder
    - keeps the 64 x 87 mm battery cavity and selected 5.5 inch display envelope intact at concept level
  accepted_tradeoffs_before_supplier_review:
    - LTE Cat 1 bis throughput instead of 5G RedCap
    - carrier and region SKU review must restart
    - host interface, antenna, firmware, Android RIL, factory RF, and SAR evidence must be recaptured
  not_allowed:
    - claim current U_CELL is ready
    - use M.2 cellular in the phone enclosure
    - approve any alternate without supplier design pack and samples
rfq_updates_required:
  - ask Quectel for EG915Q/EG915U and EG916Q-GL orderable MPNs, region SKUs, lifecycle, band matrix, reference
    layout, land pattern, STEP, firmware, and carrier scope
  - ask Fibocom for MC665 orderable MPNs, region support, hardware design pack, STEP, firmware, and certification
    scope
  - keep SIMCom A7680C as a China-market size reference unless a region-appropriate orderable SKU is confirmed
  - require supplier antenna review for whichever smaller module is selected
cross_checks:
  candidates_match_cellular_package_alternates: true
  all_candidates_smaller_than_rg255c_area: true
  no_candidate_fits_current_14x14_placeholder: true
  at_least_two_candidates_fit_under_current_top_island_area_pressure: true
  downselect_preserves_screen_and_battery_geometry_at_concept_level: true
  tradeoff_from_5g_redcap_to_lte_cat1_bis_is_explicit: true
release_blockers:
  - no smaller cellular module has an approved supplier response pack, sample, land pattern, STEP, firmware pack, or antenna review
  - LTE Cat 1 bis branch reduces cellular performance versus the current 5G RedCap reference
  - current U_CELL 14 x 14 mm region still fits none of the shortlisted modules
  - carrier/PTCRB/GCF/SAR scope must be restarted for any selected alternate
forbidden_claims:
  - cellular_alternate_selected
  - cellular_region_ready
  - cellular_ready
  - carrier_ready
  - rf_ready
  - enclosure_ready
  - fabrication_ready
  - end_to_end_phone_ready
