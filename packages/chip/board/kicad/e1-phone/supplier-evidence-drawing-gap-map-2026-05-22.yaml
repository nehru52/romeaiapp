upstream_status:
  supplier_rfq_response_normalization: blocked_response_normalization_ready_no_supplier_responses_received
  supplier_response_pack_intake_contract: blocked_response_pack_intake_contract_ready_no_supplier_packs_received
  supplier_drawing_intake_checklist: blocked_supplier_drawing_intake_required_before_real_footprints_or_route
  supplier_sample_release_gate: blocked_supplier_samples_response_packs_and_reviews_required_before_layout_release
  supplier_to_kicad_evidence_map: blocked_supplier_evidence_not_ready_for_kicad_capture
