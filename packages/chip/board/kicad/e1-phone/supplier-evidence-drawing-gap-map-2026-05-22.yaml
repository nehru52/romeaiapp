  supplier_kicad_route_release_execution: blocked_supplier_kicad_route_release_requires_response_packs_reviews_real_libraries_erc_trial_route_drc_step_and_first_article
  selected_hardware_first_article_execution: blocked_selected_hardware_first_article_requires_routed_board_factory_limits_identity_enclosure_and_functional_transcripts

gap_policy:
  checked_date: 2026-05-22
  archive_root: board/kicad/e1-phone/production
  sourcing_archive_root: board/kicad/e1-phone/production/sourcing
  minimum_sample_lot_per_candidate: 5
  supplier_response_pack_required_before_symbol_capture: true
  signed_drawing_pinout_land_pattern_and_step_required_before_footprint_capture: true
  lifecycle_stock_and_quote_required_before_evt1_buy: true
  incoming_sample_inspection_required_before_pinout_freeze: true
  kicad_reviews_required_before_route_release: true
  routed_erc_drc_step_and_first_article_required_before_fabrication_or_enclosure_release: true
  public_listing_or_datasheet_counts_as_supplier_response_pack: false
  draft_rfq_counts_as_supplier_response_pack: false
  placeholder_symbol_or_footprint_counts_as_release_evidence: false
  release_allowed: false

required_common_evidence_keys: &required_common_evidence_keys
  - rfq_response_pack
  - signed_2d_drawing
  - pinout_or_pad_map
  - recommended_land_pattern
  - step_or_brep_model
  - sample_lot_tracking
  - incoming_inspection
  - lifecycle_stock_quote
  - compliance_pack_index
  - pinout_review_signoff
  - symbol_review
  - footprint_review
  - footprint_3d_binding
  - production_schematic_capture
  - erc_after_capture
  - drc_after_footprint_replacement
  - routed_clearance_or_functional_release

default_missing_gates: &default_missing_gates
  rfq_response_pack: false
  signed_2d_drawing: false
  pinout_or_pad_map: false
  recommended_land_pattern: false
  step_or_brep_model: false
