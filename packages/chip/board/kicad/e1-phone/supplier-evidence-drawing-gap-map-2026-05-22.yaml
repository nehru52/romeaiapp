  - board/kicad/e1-phone/supplier-kicad-route-release-execution.yaml
  - board/kicad/e1-phone/selected-hardware-first-article-execution.yaml
  - board/kicad/e1-phone/preliminary-bom.yaml
  - board/kicad/e1-phone/display-camera-marketplace-refresh-2026-05-22.yaml
  - board/kicad/e1-phone/wireless-module-public-source-refresh-2026-05-22.yaml
  - board/kicad/e1-phone/usb-power-sidekey-public-source-refresh-2026-05-22.yaml
  - board/kicad/e1-phone/usb-pd-controller-lifecycle-replacement-gate-2026-05-22.yaml
