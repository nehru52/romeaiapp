schema: eliza.e1_phone_audio_haptic_schematic_net_binding.v1
status: blocked_audio_haptic_net_binding_requires_real_schematic_acoustic_parts_route_hal_and_measurements
date: 2026-05-21
claim_boundary: >
  Schematic, routing, acoustic, and factory binding target for the phone audio
  and haptic subsystem. This maps the selected codec, smart amp, PDM
  microphones, speaker/receiver acoustic parts, and LRA haptic output to
  concrete nets, split-board routes, factory probes, and EVT1 capture exit
  criteria. It is not a KiCad schematic implementation, not an acoustic chamber
  drawing, not a codec bring-up transcript, not routed copper evidence, not an
  Android Audio HAL release, and not enclosure-ready proof.

source_artifacts:
  - board/kicad/e1-phone/artifact-manifest.yaml
  - board/kicad/e1-phone/audio-acoustic-closure.yaml
  - board/kicad/e1-phone/block-netlist.yaml
  - board/kicad/e1-phone/routing-constraints.yaml
  - board/kicad/e1-phone/factory-probe-map.yaml
  - board/kicad/e1-phone/top-bottom-interconnect-plan.yaml
  - board/kicad/e1-phone/split-interconnect-pin-allocation.yaml
  - package/audio/v0-codec.yaml
  - package/interconnect/e1-phone-top-bottom-flex.yaml

interface_context:
  codec: ALC5688
  smart_amp: CS35L41
  microphone_part: SPH0641LM4H
  microphone_count: 2
  loudspeaker_module: 1115 micro speaker module with rear acoustic chamber
  earpiece_receiver_module: 1206 earpiece receiver behind glass slot/gasket
  haptic_lra: compact 0612 X-axis linear resonant actuator
  placement_region_mm: {x: 3.0, y: 120.0, width: 22.0, height: 8.0}
  split_board_required: true

schematic_blocks:
  audio_codec:
    refdes_prefix: U_CODEC
    package_binding: package/audio/v0-codec.yaml
    selected_part: ALC5688
    required_nets:
      - IO_1V8
      - VDD_AUDIO_3V3
      - GND
      - I2S_BCLK
      - I2S_LRCLK
      - I2S_DOUT
      - I2S_DIN
      - AUDIO_I2C_SCL
      - AUDIO_I2C_SDA
      - CODEC_INT
    required_local_parts:
      - codec power decoupling and analog ground return per selected package
      - I2C pullups to IO_1V8 with codec interrupt pull policy
      - jack or receiver detect pins tied off or routed only if supplier path exists
      - clocking straps and reset defaults captured in bring-up firmware notes
    status: blocked_no_supplier_package_pinout_symbol_or_alsa_probe
  smart_speaker_amp:
    refdes_prefix: U_AMP
    package_binding: package/audio/v0-codec.yaml
    selected_part: CS35L41
    required_nets:
      - IO_1V8
      - VDD_AMP_3V3
      - GND
      - I2S_BCLK
      - I2S_LRCLK
      - I2S_DOUT
      - I2S_DIN
      - AUDIO_I2C_SCL
      - AUDIO_I2C_SDA
      - AMP_INT
      - SPK_P
      - SPK_N
    required_local_parts:
      - high-current speaker decoupling adjacent to amp supply pins
      - short differential speaker output route with return and EMI damping options
      - speaker-current thermal and excursion protection sense configuration
      - output ESD or acoustic-module flex protection if speaker leaves board
    status: blocked_no_amp_symbol_speaker_load_route_or_thermal_measurement
  pdm_microphone_array:
    refdes_prefix: U_MIC
    package_binding: package/audio/v0-codec.yaml
    selected_part: SPH0641LM4H
    microphone_count: 2
    required_nets:
      - IO_1V8
      - GND
      - PDM_CLK
      - PDM_DAT
    required_local_parts:
      - bottom and top microphone port gasket boots with hydrophobic mesh
      - PDM clock/data series damping option after SI review
      - separated bottom and noise-cancel acoustic tunnels
      - keepout from USB-C shell drain path and bottom speaker grille
    status: blocked_no_microphone_symbol_port_gasket_or_snr_measurement
  speaker_receiver_acoustics:
    refdes_prefix: J_SPK_J_RCVR
    package_binding: package/audio/v0-codec.yaml
    required_nets:
      - SPK_P
      - SPK_N
      - GND
    required_local_parts:
      - bottom 1115 loudspeaker contacts or flex with sealed rear chamber
      - 1206 earpiece receiver contacts or flex with glass-slot gasket
      - speaker chamber and receiver slot datum drawings tied to enclosure CAD
      - acoustic leak and mesh inspection features accessible in fixture
    status: blocked_no_supplier_speaker_receiver_drawing_or_acoustic_fixture
  haptic_lra_driver_or_actuator:
    refdes_prefix: U_HAPTIC_OR_J_LRA
    package_binding: package/audio/v0-codec.yaml
    required_nets:
      - SYS
      - IO_1V8
      - GND
      - HAPTIC_OUT
    required_local_parts:
      - LRA driver or protected actuator output selected before schematic freeze
      - haptic pocket clearance and rattle-control datum tied to enclosure CAD
      - current probe or sense route for factory acceleration correlation
      - no tall parts or screw bosses under moving mass keepout
    status: blocked_no_haptic_driver_selection_route_or_accelerometer_fixture

net_route_bindings:
  audio_i2s_pdm:
    nets: [I2S_BCLK, I2S_LRCLK, I2S_DOUT, I2S_DIN, PDM_CLK, PDM_DAT]
    routing_constraint: AUDIO_I2S_PDM
    max_length_mm: 85
    group_skew_mm_max: 2.0
    keepaway: usb_c_and_rf_feeds
    factory_probe_required: true
    required_validation: routed_i2s_pdm_length_skew_clock_integrity_and_loopback_log
  audio_i2c_irq:
    nets: [AUDIO_I2C_SCL, AUDIO_I2C_SDA, CODEC_INT, AMP_INT]
    routing_constraint: AUDIO_I2C_IRQ
    max_length_mm: 85
    pullups_to: IO_1V8
    factory_probe_required: true
    required_validation: codec_amp_i2c_readback_interrupt_and_power_state_log
  speaker_output:
    nets: [SPK_P, SPK_N, VDD_AMP_3V3, GND]
    routing_constraint: short_differential_speaker_power_output_away_from_mics_and_rf
    factory_probe_required: true
    required_validation: speaker_impedance_spl_excursion_and_amp_thermal_log
  haptic_output:
    nets: [HAPTIC_OUT, SYS, IO_1V8, GND]
    routing_constraint: haptic_output_with_current_probe_and_mass_keepout
    factory_probe_required: true
    required_validation: haptic_resonance_drive_current_and_enclosure_rattle_log
  split_board_audio_haptic:
    nets:
      - I2S_BCLK
      - I2S_LRCLK
      - I2S_DOUT
      - I2S_DIN
      - PDM_CLK
      - PDM_DAT
      - AUDIO_I2C_SCL
      - AUDIO_I2C_SDA
      - CODEC_INT
      - AMP_INT
      - HAPTIC_OUT
      - VDD_AUDIO_3V3
      - VDD_AMP_3V3
      - SYS
      - IO_1V8
      - GND
    routing_constraint: top_bottom_flex_audio_haptic_bottom_island
    factory_probe_required: true
    required_validation: split_interconnect_audio_haptic_continuity_si_and_fixture_loopback_log

factory_probe_bindings:
  audio_haptics: [I2S_BCLK, PDM_CLK, SPK_P, SPK_N, HAPTIC_OUT, VDD_AUDIO_3V3, VDD_AMP_3V3]
  split_board_interconnect_audio_haptic:
    - I2S_BCLK
    - PDM_CLK
    - HAPTIC_OUT
    - SYS
    - IO_1V8
    - VDD_AUDIO_3V3
    - VDD_AMP_3V3
  required_fixture_notes:
    - audio and haptic probes must remain reachable after the rear shell is removed
    - microphone and speaker acoustic fixtures must not share leakage paths with the USB-C shell
    - haptic acceleration correlation must record board serial fixture id and enclosure revision

evt1_capture_exit_criteria:
  - KiCad schematic contains non-placeholder codec, smart amp, PDM microphone, speaker or receiver, and haptic driver or actuator symbols
  - all required audio and haptic nets are present in block-netlist.yaml and assigned to reviewed pins
  - AUDIO_I2S_PDM and AUDIO_I2C_IRQ buses use routing-constraints.yaml limits and split-board continuity review
  - bottom speaker, top receiver, microphones, and haptic LRA have supplier drawings, land patterns, STEP models, gasket drawings, and samples archived
  - factory-probe-map.yaml covers audio, haptic, and split-board audio continuity fixtures or records fixture alternatives
  - ALSA codec, smart-amp, PDM microphone, Android Audio HAL, speaker, microphone, and haptic measurements are attached before release

cross_checks:
  selected_audio_parts_match_package_binding: true
  interface_context_matches_audio_acoustic_closure: true
  routing_buses_match_routing_constraints: true
  split_board_audio_haptic_nets_match_block_netlist: true
  factory_probe_nets_match_probe_map: true
  all_required_nets_exist_in_block_netlist: true
  fail_closed_until_real_schematic_route_acoustic_hal_and_measurement_evidence_exist: true

release_blockers:
  - codec, smart amp, PDM microphone, and haptic driver schematic capture
  - real footprints and routed audio nets away from USB/RF aggressors
  - speaker-box and earpiece acoustic chamber CAD
  - microphone port, dust mesh, and gasket drawings
  - ALSA/Android Audio HAL bring-up logs and acoustic measurements
  - haptic resonance and enclosure rattle measurement
  - routed board STEP and enclosure clearance rerun with speaker, receiver, microphones, and haptic parts

forbidden_claims:
  - audio_schematic_ready
  - haptic_schematic_ready
  - audio_ready
  - speaker_ready
  - microphone_ready
  - haptics_ready
  - audio_hal_ready
  - acoustic_enclosure_ready
  - routed_pcb_ready
  - fabrication_ready
  - enclosure_ready
