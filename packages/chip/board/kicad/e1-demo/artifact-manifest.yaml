          rail_model_revision: not_available
          source_checksum: 2a91443a11174380290f59a72b250c8b2d5a3ee664cfc69efc0d172b74a91a23
          disposition: blocked_for_release
        required_metadata:
          - board_revision
          - rail_model_revision
          - source_checksum
          - disposition
        globs:
          - board/reports/pi/**/*pi*
          - docs/manufacturing/evidence/board/**/*pi*
      - name: first_article_current_limits
        status: draft
        metadata:
          board_revision: r0-nonrelease
