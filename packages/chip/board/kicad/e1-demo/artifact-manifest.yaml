manifest: e1_demo_kicad_board_evidence
schema: docs/manufacturing/schemas/artifact-manifest.schema.yaml
status: scaffold
release_gate: board_fabrication_release
policy:
  preflight: Track required board evidence without claiming fabrication readiness.
  release: Require real KiCad sources, clean headless checks, fabrication outputs, and DFM review evidence.
artifact_groups:
  kicad_sources:
    owner: board_closure
    status: draft
    artifacts:
      - name: project
        status: draft
        metadata:
          draft_provenance_note: draft source tree has no archived release source revision
          package_manifest_checksum: 57a60eafed39b3105c13af0e331d0df67796eea53ec96f07e196e383c3b6ac55
        required_metadata:
          - draft_provenance_note
          - package_manifest_checksum
        globs:
          - board/kicad/e1-demo/*.kicad_pro
      - name: schematic
        status: draft
        metadata:
          draft_provenance_note: draft source tree has no archived release source revision
          package_pinout_checksum: e0bc0ff6b04962667cf328efa6017ebf215408ac07d700f359141feadf08bcbe
        required_metadata:
          - draft_provenance_note
          - package_pinout_checksum
        globs:
          - board/kicad/e1-demo/*.kicad_sch
      - name: pcb
        status: draft
        metadata:
          draft_provenance_note: draft source tree has no archived release source revision
          schematic_checksum: e2ec1b8bec733c9162fb7e36cd90ecb145f8f6532e1a610abded05700e6aeea5
          footprint_source_checksum: 653620fabb70aeaf9c1dcd6c000f8c878d122bfa01c0e662675dcd47623c20c8
        required_metadata:
          - draft_provenance_note
          - schematic_checksum
          - footprint_source_checksum
        globs:
          - board/kicad/e1-demo/*.kicad_pcb
      - name: vendor_derived_footprint
        status: draft
        release_note: planning footprint only; not vendor-derived release evidence
        checksum_manifest: docs/manufacturing/evidence/package/footprint-source.sha256
        required_metadata:
          - package_drawing_revision
          - package_drawing_checksum
          - footprint_review_owner
        globs:
          - board/kicad/e1-demo/**/*.pretty/*.kicad_mod
  kicad_cli_outputs:
    owner: board_closure
    status: draft
    cli_commands:
      erc: kicad-cli sch erc --output board/reports/fab/e1-demo-2026-05-17/e1-demo-erc-report.txt board/kicad/e1-demo/e1-demo.kicad_sch
      drc: kicad-cli pcb drc --output board/reports/fab/e1-demo-2026-05-17/e1-demo-drc-report.txt board/kicad/e1-demo/e1-demo.kicad_pcb
      gerbers: kicad-cli pcb export gerbers --output board/reports/fab/e1-demo-2026-05-17/gerbers board/kicad/e1-demo/e1-demo.kicad_pcb
      drill: kicad-cli pcb export drill --output board/reports/fab/e1-demo-2026-05-17/drill board/kicad/e1-demo/e1-demo.kicad_pcb
      bom: kicad-cli sch export bom --output board/reports/fab/e1-demo-2026-05-17/e1-demo-bom.csv board/kicad/e1-demo/e1-demo.kicad_sch
      position: kicad-cli pcb export pos --output board/reports/fab/e1-demo-2026-05-17/e1-demo-position.csv board/kicad/e1-demo/e1-demo.kicad_pcb
      fab_drawing: kicad-cli pcb export pdf --output board/reports/fab/e1-demo-2026-05-17/pdf/e1-demo-fab-drawing.pdf board/kicad/e1-demo/e1-demo.kicad_pcb
    artifacts:
      - name: erc_report
        status: draft
        metadata:
          kicad_version: 10.0.3
          command: kicad-cli sch erc --output board/reports/fab/e1-demo-2026-05-17/e1-demo-erc-report.txt board/kicad/e1-demo/e1-demo.kicad_sch
          schematic_checksum: e2ec1b8bec733c9162fb7e36cd90ecb145f8f6532e1a610abded05700e6aeea5
        required_metadata:
          - kicad_version
          - command
          - schematic_checksum
        clean_regex: "(?i)(0\\s+errors?|erc\\s+(clean|pass(?:ed)?))"
        fail_regex: "(?i)(errors?\\s*[:=]\\s*[1-9][0-9]*|fail(?:ed|ure)?|violations?\\s*[:=]\\s*[1-9][0-9]*|found\\s+[1-9][0-9]*\\s+violations?)"
        globs:
          - board/reports/fab/**/e1-demo-erc-report.txt
          - board/kicad/e1-demo/reports/erc*.txt
      - name: drc_report
        status: draft
        metadata:
          kicad_version: 10.0.3
          command: kicad-cli pcb drc --output board/reports/fab/e1-demo-2026-05-17/e1-demo-drc-report.txt board/kicad/e1-demo/e1-demo.kicad_pcb
          pcb_checksum: 71d6ec29bef190b3041ebdd90c6882a1578668085bdb0c144e31afe4264250e6
        required_metadata:
          - kicad_version
          - command
          - pcb_checksum
        clean_regex: "(?i)(0\\s+(drc\\s+)?violations?|drc\\s+(clean|pass(?:ed)?))"
        fail_regex: "(?i)(errors?\\s*[:=]\\s*[1-9][0-9]*|fail(?:ed|ure)?|violations?\\s*[:=]\\s*[1-9][0-9]*|found\\s+[1-9][0-9]*\\s+violations?)"
        globs:
          - board/reports/fab/**/e1-demo-drc-report.txt
          - board/kicad/e1-demo/reports/drc*.txt
      - name: gerbers
        status: draft
        metadata:
          kicad_version: 10.0.3
          command: kicad-cli pcb export gerbers --output board/reports/fab/e1-demo-2026-05-17/gerbers board/kicad/e1-demo/e1-demo.kicad_pcb
          pcb_checksum: 71d6ec29bef190b3041ebdd90c6882a1578668085bdb0c144e31afe4264250e6
        required_metadata:
          - kicad_version
          - command
          - pcb_checksum
        globs:
          - board/reports/fab/**/gerbers/*.g*
          - board/kicad/e1-demo/fab/gerbers/*.gbr
      - name: drill
        status: draft
        metadata:
          kicad_version: 10.0.3
          command: kicad-cli pcb export drill --output board/reports/fab/e1-demo-2026-05-17/drill board/kicad/e1-demo/e1-demo.kicad_pcb
          pcb_checksum: 71d6ec29bef190b3041ebdd90c6882a1578668085bdb0c144e31afe4264250e6
        required_metadata:
          - kicad_version
          - command
          - pcb_checksum
        globs:
          - board/reports/fab/**/drill/*.drl
          - board/kicad/e1-demo/fab/drill/*.drl
      - name: bom
        status: draft
        metadata:
          kicad_version: 10.0.3
          command: kicad-cli sch export bom --output board/reports/fab/e1-demo-2026-05-17/e1-demo-bom.csv board/kicad/e1-demo/e1-demo.kicad_sch
          schematic_checksum: e2ec1b8bec733c9162fb7e36cd90ecb145f8f6532e1a610abded05700e6aeea5
        required_metadata:
          - kicad_version
          - command
          - schematic_checksum
        globs:
          - board/reports/fab/**/*bom*.csv
          - board/kicad/e1-demo/fab/bom/*.csv
          - board/kicad/e1-demo/fab/bom/*.xml
      - name: pick_and_place
        status: draft
        metadata:
          kicad_version: 10.0.3
          command: kicad-cli pcb export pos --output board/reports/fab/e1-demo-2026-05-17/e1-demo-position.csv board/kicad/e1-demo/e1-demo.kicad_pcb
          pcb_checksum: 71d6ec29bef190b3041ebdd90c6882a1578668085bdb0c144e31afe4264250e6
        required_metadata:
          - kicad_version
          - command
          - pcb_checksum
        globs:
          - board/reports/fab/**/*position*.csv
          - board/kicad/e1-demo/fab/position/*.pos
          - board/kicad/e1-demo/fab/position/*.csv
      - name: fab_drawing
        status: draft
        metadata:
          kicad_version: 10.0.3
          command: kicad-cli pcb export pdf --output board/reports/fab/e1-demo-2026-05-17/pdf/e1-demo-fab-drawing.pdf board/kicad/e1-demo/e1-demo.kicad_pcb
          pcb_checksum: 71d6ec29bef190b3041ebdd90c6882a1578668085bdb0c144e31afe4264250e6
        required_metadata:
          - kicad_version
          - command
          - pcb_checksum
        globs:
          - board/reports/fab/**/*fab*drawing*.pdf
          - board/reports/fab/**/*fabrication*drawing*.pdf
          - board/kicad/e1-demo/fab/pdf/*fab*drawing*.pdf
      - name: command_transcript
        status: draft
        metadata:
          required_for_release_credit: true
          release_credit: false
          command_scope: erc_drc_gerber_drill_bom_position_fab_drawing
        required_metadata:
          - required_for_release_credit
          - release_credit
          - command_scope
        globs:
          - board/reports/fab/**/*command*transcript*.txt
          - board/reports/fab/**/*kicad*transcript*.txt
      - name: kicad_tool_versions
        status: draft
        metadata:
          required_for_release_credit: true
          release_credit: false
          command: kicad-cli version
        required_metadata:
          - required_for_release_credit
          - release_credit
          - command
        globs:
          - board/reports/fab/**/*tool*version*.txt
          - board/reports/fab/**/*kicad*version*.txt
  board_reviews:
    owner: board_closure
    status: draft
    artifacts:
      - name: assembly_dfm_review
        status: draft
        metadata:
          reviewer: local manufacturing preflight
          date: 2026-05-18
          pcb_revision: r0-nonrelease
          disposition: blocked_for_release
        required_metadata:
          - reviewer
          - date
          - pcb_revision
          - disposition
        globs:
          - docs/manufacturing/evidence/board/*dfm*
          - board/reports/fab/*dfm*
      - name: stackup_return_path_review
        status: draft
        metadata:
          reviewer: local SI/PI preflight
          date: 2026-05-18
          stackup_revision: not_selected
          disposition: blocked_for_release
        required_metadata:
          - reviewer
          - date
          - stackup_revision
          - disposition
        globs:
          - board/reports/si/*stackup*
          - docs/manufacturing/evidence/board/*stackup*
          - docs/manufacturing/evidence/board/*si-pi*
      - name: package_board_net_cross_probe
        status: draft
        metadata:
          package_pinout_checksum: e0bc0ff6b04962667cf328efa6017ebf215408ac07d700f359141feadf08bcbe
          kicad_schematic_checksum: e2ec1b8bec733c9162fb7e36cd90ecb145f8f6532e1a610abded05700e6aeea5
          kicad_pcb_checksum: 71d6ec29bef190b3041ebdd90c6882a1578668085bdb0c144e31afe4264250e6
          reviewer: local board/package preflight
          disposition: blocked_for_release
        checksum_manifest: docs/manufacturing/evidence/board/package-board-net-cross-probe.sha256
        required_metadata:
          - package_pinout_checksum
          - kicad_schematic_checksum
          - kicad_pcb_checksum
          - reviewer
          - disposition
        globs:
          - docs/manufacturing/evidence/board/*cross-probe*
          - board/reports/fab/*cross-probe*
  si_pi_current_blockers:
