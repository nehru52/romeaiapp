adapter: e1_demo_wifi_external_module
status: constraint_stub_no_physical_pin_assignment
reference_module: package/wifi/murata-1dx-sdio.yaml
purpose: >
  Reserve the logical FPGA/package-facing signal names needed to exercise a
  Linux-supported external SDIO WiFi plus UART Bluetooth module on a future
  e1-demo carrier or mezzanine.
release_limits:
  - No RF silicon is present in e1-chip.
  - No bitstream release is allowed from this stub.
  - Exact FPGA pins, bank voltage, trace lengths, antenna placement, and module
    power tree remain board-revision work.
  - WiFi/Bluetooth release remains blocked until package/wifi/evidence-gates.yaml
    has host-controller, board, firmware, Android, and regulatory evidence.
io_bank_requirements:
  sdio_wifi:
    voltage: 1.8V
    signals:
      - WIFI_SDIO_CLK
      - WIFI_SDIO_CMD
      - WIFI_SDIO_D0
      - WIFI_SDIO_D1
      - WIFI_SDIO_D2
      - WIFI_SDIO_D3
  control_and_wake:
    voltage: 1.8V
    signals:
      - WIFI_EN
      - WIFI_RST_N
      - WIFI_HOST_WAKE
      - WIFI_IRQ
  bluetooth_uart:
    voltage: 1.8V
    signals:
      - BT_UART_TX
      - BT_UART_RX
      - BT_UART_CTS_N
      - BT_UART_RTS_N
power_sequence_requirements:
  status: blocked_until_board_revision
  rails:
    - VBAT
    - VDDIO_1V8
  default_controls:
    WIFI_EN: low
    WIFI_RST_N: low
  ordered_steps:
    - Keep WIFI_EN and WIFI_RST_N low while VBAT and VDDIO_1V8 are absent or ramping.
    - Bring up board rails and verify 1.8V VDDIO before enabling SDIO, UART, GPIO, IRQ, or wake pins.
    - Assert WIFI_EN only after rails are stable.
    - Release WIFI_RST_N only after the selected module datasheet delay.
    - Start SDIO clock and UART RTS/CTS only after pinctrl and host controllers are ready.
    - Validate WIFI_HOST_WAKE and WIFI_IRQ polarity before suspend/resume claims.
validation:
  - Check SDIO timing with SDR25 first.
  - Verify default low on WIFI_EN and WIFI_RST_N before firmware handoff.
  - Confirm IRQ polarity and wake behavior against the selected module.
