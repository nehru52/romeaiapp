padframe: e1_demo_padframe
status: contract_scaffold
evidence_class: non_release_placeholder
release_use: prohibited
package_pinout: package/e1-demo-pinout.yaml
rtl_top: rtl/top/e1_chip_top.sv
pin_order: pd/pin_order.cfg
package_pins: 64
voltage_domains:
  io:
    voltage: 3.3V
    min_power_pads: 5
    min_ground_pads: 5
  core:
    voltage: 1.8V
    min_power_pads: 4
    min_ground_pads: 4
allowed:
  directions: [input, output, bidirectional, power, ground, nc]
  voltage_domains: [io, core, none]
  pad_types:
    - clock
    - schmitt_input
    - digital_input
    - digital_output
    - bidirectional
    - power
    - ground
    - no_connect
  pulls: [none, up, down]
required_pins:
  - CLK_IN
  - RST_N
  - DBG_VALID
  - DBG_LAUNCH
  - DBG_WRITE
  - DBG_ADDR
  - DBG_WDATA
  - DBG_RDATA
  - DBG_READY
  - IRQ_TIMER
  - IRQ_DMA
  - IRQ_NPU
  - IRQ_VSYNC
  - GPIO
  - TEST_MODE
  - JTAG_TCK
  - JTAG_TMS
  - JTAG_TDI
  - JTAG_TDO
package_artifacts:
  pinout: package/e1-demo-pinout.yaml
  package_plan: docs/package/e1-demo-package.md
  pad_ring_plan: docs/package/e1-demo-pad-ring.md
  board_fab_notes: docs/board/kicad/e1-demo/fab-notes.md
  board_cross_probe: docs/board/kicad/e1-demo/package-pinout-cross-probe.yaml
release_gates:
  padframe_release:
    blocked: true
    reason: Foundry IO cells, ESD/corner cells, and padframe-inclusive DRC/LVS are not present.
  package_release:
    blocked: true
    reason: Package drawing, bond diagram, and package-vendor footprint evidence are not present.
  board_fabrication_release:
    blocked: true
    reason: Board footprint, SI/PI, and rail-current reviews are placeholders only.
fabrication_blockers:
  - Replace placeholder package with package-vendor drawing, shuttle/package approval, and bonding document.
  - Instantiate selected foundry IO, power, ground, corner, and ESD pad cells.
  - Generate board symbol and footprint from package-vendor evidence; do not fabricate from the placeholder pin list.
  - Run padframe-inclusive LVS and DRC.
  - Archive clean signoff artifacts through pd/signoff/manifest.yaml.
