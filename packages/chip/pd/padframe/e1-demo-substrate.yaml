schema: eliza.pkg_padring_substrate.v1
status: local_planning_contract
release_use: prohibited
claim_boundary: >
  Maps the E1 demo pad-ring ordering to a planning substrate-layer stack and
  records the package-side bump/ball-pitch rules per process node. The pad-ring
  ordering is cross-checked against pd/pin_order.cfg and pd/padframe/e1_demo_padframe.yaml.
  Per-node posture is taken from pd/node-profiles/<node>.yaml (owned elsewhere) and
  must agree: open nodes carry real wire-bond planning rules; advanced nodes stay
  blocked placeholders. This is not a substrate vendor drawing, not a bump map, and
  not a fabrication source.

padframe_source: pd/padframe/e1_demo_padframe.yaml
pin_order_source: pd/pin_order.cfg

pad_ring:
  attach_style: wire_bond_qfn64_planning
  side_order: [N, E, S, W]
  ring_sequence:
    N: [CLK_IN, RST_N, DBG_VALID, DBG_LAUNCH, DBG_WRITE]
    E: [DBG_ADDR, DBG_WDATA]
    S: [DBG_RDATA, DBG_READY, TEST_MODE, JTAG_]
    W: [IRQ_TIMER, IRQ_DMA, IRQ_NPU, IRQ_VSYNC, GPIO]

substrate_layers:
  attach: wire_bond_to_paddle
  stack:
    - layer: die_pad_ring
      role: peripheral_io_and_power_pads
    - layer: bond_wire
      role: die_pad_to_lead_frame
    - layer: lead_frame
      role: qfn_lead_and_exposed_paddle
    - layer: board_land
      role: pcb_footprint_land_pattern
  exposed_paddle:
    role: core_ground_and_thermal_return
    disposition: planning_only_unassigned
  notes:
    - QFN64 demo uses a lead frame, not a build-up substrate; no microvia stack.
    - A flip-chip build-up substrate stack is required before any advanced node.

node_pitch_rules:
  - node_id: sky130
    node_profile: pd/node-profiles/sky130.yaml
    posture: open_fabricable
    attach: wire_bond
    bump_pitch_um: null
    ball_pitch_um: null
    rule: wire_bond_only_no_bump_array_for_open_demo_node
  - node_id: gf180
    node_profile: pd/node-profiles/gf180.yaml
    posture: open_fabricable
    attach: wire_bond
    bump_pitch_um: null
    ball_pitch_um: null
    rule: wire_bond_only_no_bump_array_for_open_demo_node
  - node_id: ihp-sg13g2
    node_profile: pd/node-profiles/ihp-sg13g2.yaml
    posture: open_fabricable
    attach: wire_bond
    bump_pitch_um: null
    ball_pitch_um: null
    rule: wire_bond_only_no_bump_array_for_open_demo_node
  - node_id: tsmc-n2p
    node_profile: pd/node-profiles/tsmc-n2p.yaml
    posture: blocked
    attach: flip_chip_bump_array
    bump_pitch_um: blocked_requires_foundry_bump_rules
    ball_pitch_um: blocked_requires_substrate_vendor_rules
    rule: blocked_until_foundry_agreement_and_substrate_vendor_drawing
  - node_id: tsmc-a14
    node_profile: pd/node-profiles/tsmc-a14.yaml
    posture: blocked
    attach: flip_chip_bump_array
    bump_pitch_um: blocked_requires_foundry_bump_rules
    ball_pitch_um: blocked_requires_substrate_vendor_rules
    rule: blocked_until_foundry_agreement_and_substrate_vendor_drawing
  - node_id: intel-14a
    node_profile: pd/node-profiles/intel-14a.yaml
    posture: blocked
    attach: flip_chip_bump_array
    bump_pitch_um: blocked_requires_foundry_bump_rules
    ball_pitch_um: blocked_requires_substrate_vendor_rules
    rule: blocked_until_foundry_agreement_and_substrate_vendor_drawing
  - node_id: samsung-sf2p
    node_profile: pd/node-profiles/samsung-sf2p.yaml
    posture: blocked
    attach: flip_chip_bump_array
    bump_pitch_um: blocked_requires_foundry_bump_rules
    ball_pitch_um: blocked_requires_substrate_vendor_rules
    rule: blocked_until_foundry_agreement_and_substrate_vendor_drawing

release_blockers:
  - substrate_vendor_drawing_missing
  - foundry_bump_rules_missing_for_advanced_nodes
  - bond_diagram_missing
  - flip_chip_build_up_substrate_stack_undefined
