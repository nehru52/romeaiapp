schema: eliza.pdn_open_flow_waiver.v1
status: signed
release_use: accepted_with_open_flow_margin
waiver_author: physical-design-r3
signed_at: 2026-05-19T20:30:00Z
valid_through: 2026-08-17T23:59:59Z
next_review_at: 2026-08-17
rationale: |
  No commercial Voltus / RedHawk-SC / PrimePower seat is procured for
  vector-driven dynamic IR-drop, multi-corner EM signoff, or vendor-grade
  rail-PG inductance modeling. Until a seat is available the open-flow
  OpenROAD `psm` static IR-drop result, paired with the 2x margin penalty
  documented in docs/evidence/power/pdn-signoff-gate.yaml, is the only
  release-acceptance path. This waiver documents the explicit trade and
  fail-closes against silent drift.
vendor_tool_absent:
  Ansys_Voltus:
    status: not_procured
    license_blocker: commercial seat ~$200k/yr/seat not in budget for prototype phase
  Ansys_RedHawk_SC:
    status: not_procured
    license_blocker: commercial seat ~$200k/yr/seat not in budget for prototype phase
  Synopsys_PrimePower_RedHawk_Bridge:
    status: not_procured
    license_blocker: combined Synopsys+Ansys seat (~$350k/yr) not in budget
margin_factor: 2.0
margin_breakdown:
  static_ir_drop_pct_max_open_flow_waiver: 2.5
  static_ir_drop_pct_max_baseline: 5.0
  static_ir_extra_factor: 2.0
  dynamic_ir_skipped: true
  dynamic_ir_skipped_reason: |
    OpenROAD `psm` does not produce vector-driven dynamic IR-drop. To
    accept the static-only result, dynamic IR is explicitly waived for
    this prototype tape-out window. A commercial tool must close this
    gap before mass-production tape-out.
  em_skipped_unless_foundry_provides_psm_em_link: true
  em_skipped_reason: |
    Foundry-grade EM closure requires per-PG-layer current density
    correlation that OpenROAD `psm` does not emit. EM is treated as
    not-signed-off unless Skywater (sky130A) separately provides a
    PSM-EM correlation table for the same release run.
  per_rail_decoupling_extra_factor: 2.0
  per_rail_decoupling_rationale: |
    Per-rail decoupling capacitance is doubled to absorb the missing
    dynamic-IR headroom. The on-die decap target tightens from the
    nominal value to 2x the static-IR-only result.
required_open_flow_artifacts:
  - "pd/openlane/runs/<run_id>/reports/pdn/ir_drop.rpt"
  - "pd/openlane/runs/<run_id>/reports/pdn/em.rpt"
  - "pd/signoff/waivers/pdn-open-flow-waiver.yaml"
review_protocol:
  cadence_days: 90
  trigger_re_review_on:
    - new commercial PDN signoff tool procured
    - foundry provides PSM-EM correlation table
    - dynamic-IR vector set generated and runnable through open-flow path
    - waiver expiry (valid_through) reached
  reviewer: physical-design-lead
acceptance_thresholds_override:
  static_ir_drop_pct_max: 2.5
  pdn_impedance_dc_mohm_max: 5.0
  pdn_impedance_1khz_to_1ghz_mohm_max: 15.0
  dynamic_ir_drop_pct_max: not_applicable_under_waiver
power_domain_specific_entries:
  # Power agent contributions: per-rail acceptance under the open-flow
  # waiver. Each entry tightens the rail-level static-IR budget to half the
  # commercial-tool threshold, matching the global 2x penalty. Dynamic IR
  # is suppressed for all rails until a vendor seat is in place.
  cosigner: power-r3
  per_rail_overrides:
    VDD_CPU_BIG:
      static_ir_drop_pct_max_waiver: 2.5
      dynamic_ir_drop_pct_max: not_applicable_under_waiver
      on_die_decap_target_extra_factor: 2.0
      package_decap_target_extra_factor: 2.0
      board_decap_target_extra_factor: 2.0
    VDD_CPU_LITTLE:
      static_ir_drop_pct_max_waiver: 2.5
      dynamic_ir_drop_pct_max: not_applicable_under_waiver
      on_die_decap_target_extra_factor: 2.0
      package_decap_target_extra_factor: 2.0
      board_decap_target_extra_factor: 2.0
    VDD_NPU:
      static_ir_drop_pct_max_waiver: 2.5
      dynamic_ir_drop_pct_max: not_applicable_under_waiver
      on_die_decap_target_extra_factor: 2.0
      package_decap_target_extra_factor: 2.0
      board_decap_target_extra_factor: 2.0
    VDD_GPU:
      static_ir_drop_pct_max_waiver: 2.5
      dynamic_ir_drop_pct_max: not_applicable_under_waiver
      on_die_decap_target_extra_factor: 2.0
      package_decap_target_extra_factor: 2.0
      board_decap_target_extra_factor: 2.0
    VDD_SOC_FABRIC:
      static_ir_drop_pct_max_waiver: 2.5
      dynamic_ir_drop_pct_max: not_applicable_under_waiver
      on_die_decap_target_extra_factor: 2.0
      package_decap_target_extra_factor: 2.0
      board_decap_target_extra_factor: 2.0
    VDD_SRAM:
      static_ir_drop_pct_max_waiver: 2.5
      dynamic_ir_drop_pct_max: not_applicable_under_waiver
      on_die_decap_target_extra_factor: 2.0
      package_decap_target_extra_factor: 2.0
      board_decap_target_extra_factor: 2.0
    VDD_AON:
      # Always-on rail: leakage-dominated, low peak current. Static-IR
      # margin keeps the 2x penalty but decap doubling is unnecessary; the
      # rail is regulated by an LDO with intrinsic damping.
      static_ir_drop_pct_max_waiver: 2.5
      dynamic_ir_drop_pct_max: not_applicable_under_waiver
      on_die_decap_target_extra_factor: 1.0
      package_decap_target_extra_factor: 1.0
      board_decap_target_extra_factor: 1.0
    VDD_PMC:
      static_ir_drop_pct_max_waiver: 2.5
      dynamic_ir_drop_pct_max: not_applicable_under_waiver
      on_die_decap_target_extra_factor: 1.0
      package_decap_target_extra_factor: 1.0
      board_decap_target_extra_factor: 1.0
  open_questions_for_power_review:
    - >
      Should the LPDDR companion rails (VDD_LPDDR_VDDQ / VDD_LPDDR_VDD1 /
      VDD_LPDDR_VDD2H_2L) carry decap-doubling under the waiver, or is the
      JEDEC-mandated decap envelope already a sufficient safety factor?
      Power agent recommendation: keep them at 1.0x, because the LPDDR5X
      spec already requires conservative on-package decap budgets.
    - >
      The waiver only addresses static IR drop. Once the dynamic-IR vector
      set is generated (see docs/evidence/power/pdn-signoff-gate.yaml
      release_blockers), this entry must be regenerated and the per-rail
      overrides reviewed against vector-driven activity.
related_documents:
  - docs/evidence/power/pdn-signoff-gate.yaml
  - docs/architecture-optimization/sota-2028/power-delivery.md
  - docs/pd/rail-plan-2028.yaml
  - pd/signoff/pdn-current/local-budget.yaml
check_command: python3 scripts/check_pdn_workload_signoff.py
