schema: eliza.pd_utilization_threshold.v1
as_of: 2026-05-19
claim_boundary: >
  Threshold for the utilization regression gate. Permanent fail-closed
  defense against the historical 771.788% incident captured in
  docs/three-week-prototype-workstreams.md. Promotion of any PD signoff
  claim requires the gate to pass.

# Maximum allowed PD utilization as a unitless fraction (1.0 = 100%).
# 1.05 leaves a 5 percent slack for legitimate density boosts; anything
# beyond is a PDK/config regression and must fail closed.
max_utilization: 1.05

# Optional per-design override list. Most designs use the default above.
overrides:
  - design: e1_chip_top
    max_utilization: 1.05

# Source field inside the OpenLane/OpenROAD report whose value is read.
# We accept any of the following keys in JSON manifests or .rpt files;
# the first match wins.
report_keys:
  - utilization_fraction
  - utilization
  - core_utilization
  - placement_utilization
  - design__instance__utilization
  - design__instance__utilization__stdcell

# Optional grep pattern for plain-text utilization reports.
# Captures a decimal number on the same line as one of the keys above.
report_regex: '(?P<key>core_utilization|utilization|placement_utilization|utilization_fraction|design__instance__utilization)\s*[:=]\s*(?P<value>[0-9]+\.?[0-9]*)'
