schema: eliza.pd_asap7_block_set.v1
pdk: ASAP7
node_class: predictive_7nm_finfet
status: predictive_pdk_shape_only_not_signoff
evidence_class: predictive_finfet_shape_only

flow: openroad_orfs
container_image: openroad/orfs:latest
container_image_digest: not_pinned_predictive_lane_only

stdcell_library_primary: asap7sc7p5t
stdcell_pitch_nm: 27
vt_default: LVT
multi_vt_available:
  - SLVT
  - LVT
  - RVT
  - SRAM

clock_target:
  big_core_period_ps: 4000
  big_core_target_mhz: 250
  npu_tile_period_ps: 4000
  npu_tile_target_mhz: 250
  slc_slice_period_ps: 4000
  slc_slice_target_mhz: 250

blocks:
  - id: big_core_shell
    role: cpu_big_core_leaf_finfet_shape
    rtl_top: e1_cpu_subsystem_stub
    rtl_files:
      - rtl/cpu/e1_cpu_subsystem_stub.sv
    clock_target_mhz: 250
    leaf_block_only: true
    flow_mode: yosys_abc_synth_only
    memory_inference: true
    leaf_scope:
      - >
        e1_cpu_subsystem_stub is a self-contained 32x64-bit RV64GC in-order
        microcontroller stub representing a big-core shell leaf (RISC-V
        decoder + ALU + 32-entry x 64-bit architectural register file + AXI4
        -Lite master FSM). Used as the representative big-core leaf shape
        until the upstream Kunminghu V3 wrapper lands.
      - >
        Storage is mapped as flat flip-flops (no SRAM macro replacement).
        Real N2P implementation will replace the architectural RF with a
        latch-based or multi-port SRAM macro; this shape is the gate-level
        structural cost only.
    output_report: docs/evidence/process/asap7/big_core_shell_shape.json
    status: synth_only_pre_route_predictive
    notes: >
      Substituted from the full CVA6 wrapper because CVA6 requires the
      external/cva6/ submodule and ORFS post-route flow. The stub is a real
      RV64I subset implementation, not a placeholder, so the gate count
      reflects a non-trivial control + datapath shape.

  - id: npu_tile
    role: npu_compute_finfet_shape
    rtl_top: e1_npu
    rtl_files:
      - rtl/npu/e1_npu.sv
    clock_target_mhz: 250
    flow_mode: yosys_abc_synth_only
    memory_inference: true
    leaf_scope:
      - >
        The complete e1_npu monolithic NPU tile (16-entry x 32-bit scratch
        register file + 16 opcodes including INT8/INT4/INT2/FP8 dot products
        + GEMM/vector engines + AXI-Lite descriptor engine + perf counters)
        synthesized standalone with yosys 0.64 + ABC -fast mapped to
        asap7sc7p5t_27 RVT TT (0.70 V, 25 C).
      - >
        The npu_tile geometry is the production geometry (no parameter
        override). The on-chip storage is the 16x32-bit scratch RF only;
        downstream weight buffer SRAM and tile-local L1 are modelled
        separately via vendor macro density (38.1 Mb/mm^2 at N2) and not
        included in this gate-level shape.
    output_report: docs/evidence/process/asap7/npu_tile_shape.json
    status: synth_only_pre_route_predictive
    notes: >
      e1_npu is the entire current NPU tile (not a sub-slice). The 1083-line
      RTL synthesizes in seconds at the 16x32 scratch geometry; when the
      tile grows weight-buffer SRAM macros and multi-tile interconnect, this
      shape covers only the gate-level compute + control path.

  - id: slc_slice
    role: shared_last_level_cache_slice_finfet_shape
    rtl_top: e1_slc
    rtl_files:
      - rtl/cache/cache_pkg.sv
      - rtl/cache/slc/e1_slc.sv
    clock_target_mhz: 250
    flow_mode: yosys_abc_synth_only
    memory_inference: true
    synth_params:
      SIZE_BYTES: 2048
      WAYS: 2
      BANKS: 2
    leaf_scope:
      - >
        A shrunk e1_slc (2 KiB, 2-way, 2 banks, 64 B line, 8 sets per
        bank) synthesized standalone with yosys 0.64 + ABC -fast mapped to
        asap7sc7p5t_27 RVT TT. Geometry is overridden so the lookup/install
        /BDI-classify control path is exercised while the flat-flop storage
        stays tractable for a synth-only run. Production geometry is
        16 MiB / 16-way / 4-bank; the per-bit storage cost extrapolates
        linearly and storage must be replaced by SRAM macros at N2P.
        BANKS=2 is the minimum geometry that keeps $clog2(BANKS) > 0 so
        the bank-index bit slice in cache_pkg compiles cleanly; smaller
        SIZE_BYTES/WAYS keep the per-bit flop reset analysis tractable
        within a single workstation-minute synth budget.
      - >
        Includes BDI compression form classifier (ZERO / REPEAT / B8D1),
        QoS-aware victim selection, display-RT reservation counter, and the
        6-state lookup/install FSM. Real flagship-class implementation will
        replace the data + tag + RRPV arrays with SRAM macros and tag
        compare logic; this is the gate-level control + datapath shape only.
    output_report: docs/evidence/process/asap7/slc_slice_shape.json
    status: synth_only_pre_route_predictive
    notes: >
      Substituted from the e1_axi_lite_dram placeholder used in earlier
      releases (that module was not an SLC slice at all). The shrunk
      e1_slc geometry exercises the real cache-line FSM and BDI
      compression logic on real cells. Storage is flat flops; vendor SRAM
      macro density is used downstream to compute the real cache area.

  - id: npu_tile_rf_leaf
    role: leaf_sub_block_finfet_shape
    rtl_top: e1_weight_buffer_sram
    rtl_files:
      - rtl/memory/e1_weight_buffer_sram.sv
    clock_target_mhz: 250
    leaf_block_only: true
    flow_mode: yosys_abc_synth_only
    memory_inference: true
    leaf_scope:
      - >
        e1_weight_buffer_sram is the NPU weight-staging register file leaf
        (512-entry x 32-bit + 4-bit write-mask single-RW + single-R port).
        Behavioral (non-macro) path is synthesized standalone with
        yosys 0.64 + ABC -fast mapped to asap7sc7p5t_27 RVT TT (0.70 V, 25 C).
      - >
        Power and area shape are extracted from the leaf netlist and tagged
        leaf_only so they are not aggregated into top-level NPU area.
        Real implementation swaps the behavioral path for a hard SRAM
        macro under E1_HAVE_HARD_SRAM (Sky130 OpenRAM today; vendor
        single-port SRAM macro at N2P / A14 / 14A / SF2P).
    output_report: docs/evidence/process/asap7/npu_tile_rf_leaf_shape.json
    status: synth_only_pre_route_predictive
    notes: >
      Substituted from the prior e1_npu rtl_top (which is the full NPU tile
      and overlaps the npu_tile block above). e1_weight_buffer_sram is the
      actual NPU register-file leaf in the current RTL and is documented as
      the macro-vs-behavioral swap point for the OpenLane release flow.

  - id: tage_table
    role: leaf_sub_block_finfet_shape
    rtl_top: tage_table
    rtl_files:
      - rtl/cpu/bpu/bpu_pkg.sv
      - rtl/cpu/bpu/tage_table.sv
    clock_target_mhz: 3000
    leaf_block_only: true
    flow_mode: yosys_abc_synth_only
    memory_inference: true
    synth_params:
      ENTRIES: 128
    leaf_scope:
      - One TAGE tagged-table primitive (128-entry leaf-shape proxy of the
        production 4096-entry geometry; 14-bit-per-entry valid+tag+ctr+useful
        struct) synthesized standalone with yosys 0.64, ABC-mapped to
        asap7sc7p5t_27 RVT TT (0.70 V, 25 C) stdcells.
      - ENTRIES is overridden to 128 (synth_params) so the lookup-and-update
        control path is the same as the production geometry while keeping the
        flat-flop storage tractable for a synth-only run. The storage cost is
        per-bit; the per-bit area can be multiplied by the production
        entry count when projecting to N2P (see projection_pipeline below).
      - Storage is mapped as flat flip-flops (no SRAM macro replacement). Real
        N2P implementation will replace the storage with a high-density SRAM
        macro; this shape is the gate-level structural cost only.
      - Power and frequency derived from yosys/ABC delay model (no PnR, no
        activity-driven power). Downstream consumers must treat as predictive.
    output_report: docs/evidence/process/asap7/tage_table_shape.json
    status: synth_only_pre_route_predictive
    notes: >
      Round-3 process-nodes leaf shape. Yosys+ABC is used because the full
      ORFS post-route flow requires several gigabytes of additional container
      layers and is gated separately. The shape is real (real cells, real
      area unit, real ABC delay model) but is not a substitute for ORFS
      detailed-route closure. evidence_class is identical to ORFS output so
      the projection pipeline ingests both the same way.

projection_pipeline:
  next_step: scripts/project_ppa_to_n2p.py
  scaling_factors_source: docs/pd/process-node-selection.md
  output_marker: projection_only_never_signoff

forbidden_uses:
  - cite_asap7_results_as_tsmc_n2p_signoff
  - cite_asap7_results_as_tsmc_a14_signoff
  - cite_asap7_results_as_intel_14a_signoff
  - cite_asap7_sram_density_as_real_n2_macro_density
