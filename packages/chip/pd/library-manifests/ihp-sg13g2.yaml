schema: eliza.pd_library_manifest.v1
pdk: ihp-sg13g2
node_class: open_130nm_bicmos
status: open_pdk_libraries_available
evidence_class: real_open_pdk_library_set

claim_boundary:
  allowed:
    - Open IHP SG13G2 stdcell, IO, ESD, SRAM macros published by IHP-GmbH.
  blocked:
    - Mobile-class hard IP (LPDDR, USB high-speed, MIPI v3) not available at 130 nm.

stdcell_libraries:
  - name: sg13g2_stdcell
    role: primary
    version_pin: ihp-open-pdk-sg13g2-2024
    cell_count: ~150

sram_compiler:
  name: IHP_SRAM_macros
  status: real_open_sram_macros_published
  modes_supported:
    - 1RW_single_port

# Macros cross-referenced from pd/macros/manifest.yaml.
# IHP publishes a compiler-generated SRAM macro set rather than a flexible
# compiler. The manifest enumerates the macros the PD agent expects to use
# from the IHP open distribution. LEF / GDS / Liberty are BLOCKED until the
# IHP SRAM compiler is run locally.
sram_macros:
  source_of_truth: pd/macros/manifest.yaml
  generator: ihp_open_pdk_sram_compiler
  generator_pinned_commit: BLOCKED_pin_after_first_local_run
  macros:
    - name: e1_sram_4kb_1rw_sg13g2
      kind: SRAM_1RW
      words: 1024
      word_size_bits: 32
      intended_use:
        - portability_smoke_only
      lef: BLOCKED_run_ihp_compiler
      gds: BLOCKED_run_ihp_compiler
      lib: BLOCKED_run_ihp_compiler
    - name: e1_sram_16kb_1rw_sg13g2
      kind: SRAM_1RW
      words: 4096
      word_size_bits: 32
      intended_use:
        - portability_smoke_only
      lef: BLOCKED_run_ihp_compiler
      gds: BLOCKED_run_ihp_compiler
      lib: BLOCKED_run_ihp_compiler

io_ring_library:
  name: sg13g2_io
  version_pin: ihp-open-pdk-sg13g2-2024
  rail_options:
    - 1.2V_core
    - 3.3V_io

pll_and_clock_ip:
  status: limited_open_pll_macros_only

lpddr_phy:
  status: not_available_at_open_130nm

ecosystem_notes:
  - Basilisk RISC-V SoC (PULP / OpenROAD) demonstrated Linux-capable closure at SG13G2 ~77 MHz.
  - Tiny Tapeout SG13G2 shuttle (SwissChips) is the current open shuttle vehicle after Efabless shutdown.
  - BiCMOS process — bipolar devices available for analog blocks not usable on Sky130/GF180.

required_provenance_fields:
  - PDK_root (ihp-open-pdk Git commit)
  - STD_CELL_LIBRARY name + revision
  - OpenLane container digest used at build time
