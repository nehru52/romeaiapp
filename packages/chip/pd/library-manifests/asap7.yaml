schema: eliza.pd_library_manifest.v1
pdk: ASAP7
node_class: predictive_7nm_finfet
status: predictive_library_only_not_signoff
evidence_class: predictive_finfet_library_shape_only

claim_boundary:
  allowed:
    - ASAP7 academic predictive stdcell library (multi-Vt, 7.5T) for PPA shape projection.
  blocked:
    - No fabricable SRAM compiler. SRAM models in ASAP7 are predictive.
    - No real IO ring. No real PLL. No real LPDDR PHY at this PDK.

stdcell_libraries:
  - name: asap7sc7p5t_24
    role: 24nm_routing_pitch
    version_pin: asap7_v1p7
    vt_variants: [SLVT, LVT, RVT, SRAM]
  - name: asap7sc7p5t_27
    role: 27nm_routing_pitch
    version_pin: asap7_v1p7
    vt_variants: [SLVT, LVT, RVT, SRAM]
  - name: asap7sc7p5t_28
    role: 28nm_routing_pitch
    version_pin: asap7_v1p7
    vt_variants: [SLVT, LVT, RVT, SRAM]

sram_compiler:
  status: predictive_models_only_not_fabricable
  notes: ASAP7 publishes SRAM Vt cell but no production-quality SRAM compiler.

io_ring_library:
  status: not_published_predictive_pdk_omits_padframe

pll_and_clock_ip:
  status: not_published

lpddr_phy:
  status: not_applicable_predictive_pdk

required_provenance_fields:
  - asap7 git commit hash pin
  - which routing-pitch + Vt variant used per block
  - OpenROAD ORFS container digest used at build time

usage_policy:
  intent: shape_projection_for_advanced_node_target
  outputs_marked: projection_only
  forbidden_uses:
    - asap7_as_signoff_for_tsmc_n2p
    - asap7_as_signoff_for_tsmc_a14
    - asap7_as_signoff_for_intel_14a
