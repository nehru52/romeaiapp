    - USB 3.2 / USB4 PHY at SF2P.
    - MIPI D-PHY v3 / C-PHY v2 IP at SF2P.
    - PLL hard IP at SF2P.
    - Analog catalogue at SF2P.
    - Multi-Vt mix per Samsung SF2P guidance.

