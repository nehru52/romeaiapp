schema: eliza.pd_library_manifest.v1
pdk: gf180mcuC
node_class: open_180nm_mcu_cmos
status: open_pdk_libraries_available
evidence_class: real_open_pdk_library_set

claim_boundary:
  allowed:
    - Open GlobalFoundries GF180-MCU C-variant stdcell, SRAM, IO libraries.
  blocked:
    - LPDDR PHY, MIPI, USB high-speed PHY are not 180 nm capabilities.

stdcell_libraries:
  - name: gf180mcu_fd_sc_mcu7t5v0
    role: primary_7track_5V
    version_pin: open_pdks_gf180mcuC
  - name: gf180mcu_fd_sc_mcu9t5v0
    role: 9track_5V
    version_pin: open_pdks_gf180mcuC

sram_compiler:
  name: gf180mcu_fd_ip_sram
  status: real_open_sram_macros_published
  size_band_bits: "small_microcontroller_class"
  modes_supported:
    - 1RW_single_port

io_ring_library:
  name: gf180mcu_fd_io
  version_pin: open_pdks_gf180mcuC
  rail_options:
    - 3.3V
    - 5V

pll_and_clock_ip:
  status: limited_open_pll_macros_only
  notes: 180 nm PLL macros exist in academic/IP catalogs; no qualified mobile-class PLL.

lpddr_phy:
  status: not_available_at_open_180nm
  notes: 180 nm cannot host LPDDR5X/LPDDR6 PHY.

required_provenance_fields:
  - PDK_root (Volare-pinned commit)
  - STD_CELL_LIBRARY name + revision
  - OpenLane container digest used at build time
