schema: eliza.pd_library_manifest.v1
pdk: TSMC_A14
node_class: tsmc_a14_2nd_gen_gaa
status: blocked_until_foundry_agreement
evidence_class: procurement_blocked_no_library_set

claim_boundary:
  allowed: []
  blocked:
    - No TSMC A14 library data may be checked in until a TSMC OIP agreement is in place.
    - A14 baseline is frontside; A14P (SPR-BSPDN) is 2029 follow-on and is a separate library set.

procurement_gate:
  status: blocked_until_foundry_agreement
  unblock_requires:
    - Executed TSMC OIP / NDA agreement at A14.
    - SRAM compiler at A14 (continuation of N2 38.1 Mb/mm² macro family).
    - LPDDR5X / LPDDR6 PHY available at A14 from Synopsys / Cadence / Rambus.
      LPDDR6 PHY at N2P / A14 is in vendor delivery plans but not all units are taped out yet.
    - USB 3.2 / USB4 PHY at A14.
    - MIPI D-PHY v3 / C-PHY v2 IP at A14.
    - PCIe Gen5 PHY at A14 (optional).
    - PLL hard IP at A14.
    - Analog catalogue at A14 (PMIC, ADC, temperature, eFuse).
    - Multi-Vt mix: SLVT, LVT, RVT, HVT, ULVT for speed-critical clusters.
    - NanoFlex Pro DTCO cell-mix methodology guidance.

economics:
  wafer_usd: 40000
  wafer_usd_high: 45000
  mask_set_usd_estimate: 45000000
  tapeout_nre_usd_low: 300000000
  tapeout_nre_usd_high: 500000000
  lead_customer_window: "Apple, NVIDIA, AMD on A14 baseline 2028; mobile mid-cycle 2028-2029"
  high_na_euv: "no_per_tsmc_explicit_statement"

required_provenance_fields_after_unblock:
  - PDK release tag at A14
  - Whether baseline (frontside) or A14P (SPR-BSPDN) was selected
  - STD_CELL_LIBRARY revision (per Vt flavor)
  - SRAM compiler revision
  - LPDDR PHY vendor + IP revision (LPDDR5X vs LPDDR6)
  - USB / MIPI / PCIe PHY revisions
  - PLL hard IP revision
  - Commercial EDA tool versions

forbidden_claims_until_unblocked:
  - tsmc_a14_library_release
  - tsmc_a14_signoff_clean
  - tsmc_a14_tapeout_ready
  - tsmc_a14p_bspdn_signoff
