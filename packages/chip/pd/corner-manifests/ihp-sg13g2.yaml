schema: eliza.pd_corner_manifest.v1
pdk: ihp-sg13g2
node_class: open_130nm_bicmos
status: open_pdk_corners_available
evidence_class: real_open_pdk_corner_set

claim_boundary:
  allowed:
    - SS/TT/FF Liberty available from the open IHP SG13G2 PDK.
    - BiCMOS 1.2 V core rail; ESD / IO 3.3 V rail per SG13G2 rules.
  blocked:
    - Advanced-node corner coverage is BLOCKED.

pvt_corners:
  - name: tt_25C_1v20
    process: TT
    voltage_v: 1.20
    temperature_c: 25
    role: nominal_core
    liberty: sg13g2_stdcell_tt_1p20V_25C.lib
  - name: ss_125C_1v08
    process: SS
    voltage_v: 1.08
    temperature_c: 125
    role: worst_setup
    liberty: sg13g2_stdcell_ss_1p08V_125C.lib
  - name: ff_n40C_1v32
    process: FF
    voltage_v: 1.32
    temperature_c: -40
    role: worst_hold
    liberty: sg13g2_stdcell_ff_1p32V_m40C.lib

rc_corners:
  - name: typ
    role: typical_extraction
  - name: rcworst
    role: slow_RC
  - name: rcbest
    role: fast_RC

aging_and_reliability:
  status: not_modeled_open_pdk_does_not_publish

vt_mix:
  available: [regular_vt]
  notes: SG13G2 stdcell library is single-Vt regular-VT in the published open release.

thermal_corners:
  - name: nom_25
    junction_c: 25
  - name: hot_125
    junction_c: 125
  - name: cold_n40
    junction_c: -40
