schema: eliza.pd_corner_manifest.v1
pdk: gf180mcuC
node_class: open_180nm_mcu_cmos
status: open_pdk_corners_available
evidence_class: real_open_pdk_corner_set

claim_boundary:
  allowed:
    - SS/TT/FF Liberty available from the open GF180MCU C variant.
    - 5V and 3.3V IO rail corners modeled per GF180-MCU rail definitions.
  blocked:
    - Advanced-node (<=7 nm) corner coverage requires commercial PDK + EDA.

pvt_corners:
  - name: tt_25C_5v00
    process: TT
    voltage_v: 5.00
    temperature_c: 25
    role: nominal_5v
    liberty: gf180mcu_fd_sc_mcu7t5v0__tt_025C_5v00.lib
  - name: ss_125C_4v50
    process: SS
    voltage_v: 4.50
    temperature_c: 125
    role: worst_setup_5v
    liberty: gf180mcu_fd_sc_mcu7t5v0__ss_125C_4v50.lib
  - name: ff_n40C_5v50
    process: FF
    voltage_v: 5.50
    temperature_c: -40
    role: worst_hold_5v
    liberty: gf180mcu_fd_sc_mcu7t5v0__ff_n40C_5v50.lib

rc_corners:
  - name: nom
    role: typical_extraction
    view: gf180mcuC.nom.tlef
  - name: max
    role: slow_RC
    view: gf180mcuC.max.tlef
  - name: min
    role: fast_RC
    view: gf180mcuC.min.tlef

aging_and_reliability:
  status: not_modeled_open_pdk_does_not_publish

vt_mix:
  available: [regular_vt]

thermal_corners:
  - name: nom_25
    junction_c: 25
  - name: hot_125
    junction_c: 125
  - name: cold_n40
    junction_c: -40
