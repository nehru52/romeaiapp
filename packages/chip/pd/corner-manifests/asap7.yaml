schema: eliza.pd_corner_manifest.v1
pdk: ASAP7
node_class: predictive_7nm_finfet
status: predictive_pdk_shape_only_not_signoff
evidence_class: predictive_finfet_shape_only

claim_boundary:
  allowed:
    - ASAP7 SS/TT/FF Liberty available from the academic predictive release.
    - FinFET-class device physics (FinFET gate length, sub-7 nm parasitics) modeled.
  blocked:
    - ASAP7 is academic and predictive; results are not manufacturable.
    - Any TSMC N2P / A14 / Intel 14A signoff claim from ASAP7 is FORBIDDEN.
    - ASAP7 numbers are only PPA shapes for projection via scripts/project_ppa_to_n2p.py.

pvt_corners:
  - name: tt_25C_0v70
    process: TT
    voltage_v: 0.70
    temperature_c: 25
    role: nominal
    liberty: asap7sc7p5t_INVBUF_LVT_TT_nldm_201020.lib
    cell_height_track: 7.5T
    vt: LVT
  - name: ss_125C_0v63
    process: SS
    voltage_v: 0.63
    temperature_c: 125
    role: worst_setup
    liberty: asap7sc7p5t_INVBUF_LVT_SS_nldm_201020.lib
    cell_height_track: 7.5T
    vt: LVT
  - name: ff_n40C_0v77
    process: FF
    voltage_v: 0.77
    temperature_c: -40
    role: worst_hold
    liberty: asap7sc7p5t_INVBUF_LVT_FF_nldm_201020.lib
    cell_height_track: 7.5T
    vt: LVT

rc_corners:
  - name: typical
    role: typical_extraction
    view: asap7_TypicalCorner.tech.lef
  - name: rcworst
    role: slow_RC
    view: asap7_RCWorst.tech.lef
  - name: rcbest
    role: fast_RC
    view: asap7_RCBest.tech.lef

vt_mix:
  available: [SLVT, LVT, RVT, SRAM]
  notes: ASAP7 publishes four Vt flavors so cell-mix DTCO studies match FinFET-era practice.

aging_and_reliability:
  status: not_modeled_predictive_pdk_omits_these
  forbidden_claims:
    - lifetime_derate
    - hci_bti_aging
    - em_signoff_clean

thermal_corners:
  - name: nom_25
    junction_c: 25
  - name: hot_125
    junction_c: 125
  - name: cold_n40
    junction_c: -40
