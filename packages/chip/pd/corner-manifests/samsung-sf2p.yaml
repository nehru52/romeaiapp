schema: eliza.pd_corner_manifest.v1
pdk: Samsung_SF2P
node_class: samsung_sf2p_3rd_gen_mbcfet_gaa
status: blocked_until_foundry_agreement
evidence_class: procurement_blocked_no_corner_set

claim_boundary:
  allowed: []
  blocked:
    - Any Samsung SF2P corner-set claim is BLOCKED.
    - SF2Z (BSPDN variant) arrives 2027 and is a separate corner-set if selected.

procurement_gate:
  status: blocked_until_foundry_agreement
  unblock_requires:
    - Executed Samsung Foundry SAFE program / NDA agreement.
    - Hard-IP licenses available at SF2P.
    - Commercial EDA flow qualified at SF2P by Samsung.
    - Mature yield history at SF2P (Exynos 2600 ramp gives some signal but not foundry-customer evidence).

required_after_unblock:
  total_effective_corners_min: 32
  total_full_corners_min: 128
  pvt_axes:
    process: [SS, TT, FF, local_NFET, local_PFET]
    voltage_v: [vmin_low, vnom, vmax_high]
    temperature_c: [-40, 0, 25, 85, 110, 125]
    aging: [t0, mid_life, EOL]
    rc: [cworst, cbest, rcworst, rcbest, typical]
  multi_vt_required:
    - SLVT
    - LVT
    - RVT
    - HVT
  ocv_model: LVF_or_SOCV
  bspdn_corners: not_applicable_for_SF2P_frontside

# BSPDN awareness — SF2P is frontside-PDN, so BSPDN corners are NOT required
# for the 2028 backup target. They are documented here for the SF2Z BSPDN
# variant, which arrives 2027 and is tracked as a separate corner-set if
# selected. This mirrors the A14-baseline / A14P split exactly.
bspdn_planning_notes:
  sf2p_baseline_2028:
    pdn_topology: frontside_only
    top_side_ir_corner_required: true
    backside_ir_corner_required: false
    combined_two_sided_ir_corner_required: false
    thermal_corner_uplift_for_bspdn_c: 0
    notes: >
      SF2P baseline does not introduce a backside metal stack. STA/IR signoff
      uses the same single-side methodology the project drives on Sky130
      today, scaled to the SF2P PVT envelope.
  sf2z_bspdn_2027_variant:
    pdn_topology: backside_plus_frontside_signal
    top_side_ir_corner_required: true
    backside_ir_corner_required: true
    combined_two_sided_ir_corner_required: true
    thermal_corner_uplift_for_bspdn_c: blocked_until_foundry_agreement
    thermal_uplift_basis: samsung_sf2z_bspdn_data_blocked_until_foundry_agreement
    bspdn_warpage_corner_required: true
    notes: >
      SF2Z layers BSPDN on top of SF2P. If that target is selected, this corner
      set needs to grow with two-sided PDN extraction, a Tj uplift in the active
      region, and a backside-thinned-silicon warpage corner for HPA. The
      numeric uplift stays blocked until a Samsung Foundry agreement publishes
      it; no value is invented here. None of this affects the 2028 SF2P
      frontside backup target.

forbidden_claims_until_unblocked:
  - sf2p_corner_clean
  - sf2p_release_evidence
  - sf2z_bspdn_signoff
