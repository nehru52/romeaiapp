schema: eliza.pd_corner_manifest.v1
pdk: sky130A
node_class: open_130nm_planar_cmos
status: open_pdk_corners_available
evidence_class: real_open_pdk_corner_set

claim_boundary:
  allowed:
    - SS/TT/FF Liberty available from the open Sky130A PDK.
    - PVT-cornered STA against these corners is real evidence at the 130 nm node.
    - Two RC corners (typical, slow) available from the PDK extraction views.
  blocked:
    - This corner set is not flagship signoff evidence.
    - Advanced-node sign-off (>=7 nm) requires 100-200 effective corners and is BLOCKED
      until commercial PDK + EDA seats are secured.

pvt_corners:
  - name: tt_25C_1v80
    process: TT
    voltage_v: 1.80
    temperature_c: 25
    role: nominal
    liberty: sky130_fd_sc_hd__tt_025C_1v80.lib
  - name: ss_100C_1v60
    process: SS
    voltage_v: 1.60
    temperature_c: 100
    role: worst_setup
    liberty: sky130_fd_sc_hd__ss_100C_1v60.lib
  - name: ff_n40C_1v95
    process: FF
    voltage_v: 1.95
    temperature_c: -40
    role: worst_hold
    liberty: sky130_fd_sc_hd__ff_n40C_1v95.lib

rc_corners:
  - name: nom
    role: typical_extraction
    view: sky130A.nom.tlef
  - name: max
    role: slow_RC
    view: sky130A.max.tlef
  - name: min
    role: fast_RC
    view: sky130A.min.tlef

aging_and_reliability:
  status: not_modeled_open_pdk_does_not_publish
  forbidden_claims:
    - lifetime_derate
    - hci_bti_aging
    - em_signoff_clean

vt_mix:
  available: [regular_vt]
  notes: Sky130A HD library is single-Vt. HS / HDLL / MS variants exist as cell-mix DTCO study material, not as multi-Vt.

thermal_corners:
  - name: nom_25
    junction_c: 25
    role: typical
  - name: hot_100
    junction_c: 100
    role: worst
  - name: cold_n40
    junction_c: -40
    role: best
