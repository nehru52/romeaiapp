schema: eliza.pd_portability_index.v1
status: open_pdk_lane_active_advanced_node_lane_blocked
description: >
  Single source of truth that maps each OpenLane (or ORFS / commercial-EDA)
  configuration to the PDK class it targets, the open or commercial fabricability
  status, the matching corner manifest, the matching library manifest, and the
  procurement/access gate that controls whether the lane can produce real
  signoff evidence. Consumed by scripts/check_pdk_portability.py.

claim_boundary:
  open_lanes_produce_real_evidence:
    - PD methodology portability across Sky130A, GF180MCU, IHP SG13G2.
    - OpenLane / ORFS DRC, LVS, routability, and post-route timing-shape evidence.
    - Multi-corner STA matrix shape against open Liberty corners.
  predictive_lanes_produce_shape_only:
    - ASAP7 timing and power shapes for FinFET-class device physics.
  blocked_lanes_produce_no_evidence:
    - TSMC N2P (procurement_blocked).
    - TSMC A14 (procurement_blocked).
    - Intel 14A (procurement_blocked).
    - Samsung SF2P (procurement_blocked).

configs:
  - id: sky130A_release
    config: pd/openlane/config.sky130.json
    flow: openlane2
    node_class: open_130nm_planar_cmos
    process_generation_nm: 130
    foundry: SkyWater
    pdk_name: sky130A
    open_pdk: true
    fabricable: true
    fabricable_via:
      - Efabless ChipIgnite (historical, closed March 2025)
      - SkyWater MPW programs
      - Tiny Tapeout (Sky130 shuttles)
    stdcell_library_primary: sky130_fd_sc_hd
    stdcell_variants_available:
      - sky130_fd_sc_hd
      - sky130_fd_sc_hs
      - sky130_fd_sc_hdll
      - sky130_fd_sc_ms
    metal_stack: "5 (li1, met1..met5)"
    max_routing_layer: met5
    clock_period_ns: 100
    clock_target_mhz: 10
    sram_compiler: OpenRAM
    library_manifest: pd/library-manifests/sky130.yaml
    corner_manifest: pd/corner-manifests/sky130.yaml
    evidence_class: real_open_pdk_methodology_evidence
    role: primary_open_methodology_baseline
    flagship_class: false
    access_gate: open_no_gate

  - id: gf180mcu_release
    config: pd/openlane/config.gf180.json
    flow: openlane2
    node_class: open_180nm_mcu_cmos
    process_generation_nm: 180
    foundry: GlobalFoundries
    pdk_name: gf180mcuC
    open_pdk: true
    fabricable: true
    fabricable_via:
      - GlobalFoundries MPW programs
      - Wafer.Space brokered shuttles
    stdcell_library_primary: gf180mcu_fd_sc_mcu7t5v0
    stdcell_variants_available:
      - gf180mcu_fd_sc_mcu7t5v0
      - gf180mcu_fd_sc_mcu9t5v0
    metal_stack: "5 (3 thin + 2 thick)"
    max_routing_layer: Metal5
    clock_period_ns: 50
    clock_target_mhz: 20
    sram_compiler: gf180mcu_fd_ip_sram
    library_manifest: pd/library-manifests/gf180.yaml
    corner_manifest: pd/corner-manifests/gf180.yaml
    evidence_class: real_open_pdk_methodology_evidence
    role: open_methodology_secondary_lane
    flagship_class: false
    access_gate: open_no_gate

  - id: ihp_sg13g2_release
    config: pd/openlane/config.ihp-sg13g2.json
    flow: openlane2
    node_class: open_130nm_bicmos
    process_generation_nm: 130
    foundry: IHP
    pdk_name: ihp-sg13g2
    open_pdk: true
    fabricable: true
    fabricable_via:
      - IHP MPW programs
      - Tiny Tapeout SG13G2 shuttle (SwissChips)
    stdcell_library_primary: sg13g2_stdcell
    stdcell_variants_available:
      - sg13g2_stdcell
    metal_stack: "5 thin + TopMetal1 + TopMetal2"
    max_routing_layer: TopMetal2
    clock_period_ns: 13
    clock_target_mhz: 77
    sram_compiler: IHP SRAM macros
    library_manifest: pd/library-manifests/ihp-sg13g2.yaml
    corner_manifest: pd/corner-manifests/ihp-sg13g2.yaml
    evidence_class: real_open_pdk_methodology_evidence
    role: linux_capable_demonstrator_lane
    flagship_class: false
    access_gate: open_no_gate
    notes: >
      Basilisk demonstrated Linux-capable RISC-V SoC closure on SG13G2 at ~77 MHz.
      Tiny Tapeout migrated to SG13G2 via SwissChips after Efabless shutdown.

  - id: asap7_predictive
    config: pd/asap7/config.asap7.yaml
    flow: openroad_orfs
    node_class: predictive_7nm_finfet
    process_generation_nm: 7
    foundry: ASU_predictive
    pdk_name: ASAP7
    open_pdk: true
    fabricable: false
    fabricable_via: []
    stdcell_library_primary: asap7sc7p5t
    stdcell_variants_available:
      - asap7sc7p5t_24
      - asap7sc7p5t_27
      - asap7sc7p5t_28
    metal_stack: "9 metal (M1..M9)"
    max_routing_layer: M9
    clock_period_ns: 0.5
    clock_target_mhz: 2000
    sram_compiler: none_predictive_only
    library_manifest: pd/library-manifests/asap7.yaml
    corner_manifest: pd/corner-manifests/asap7.yaml
    evidence_class: predictive_finfet_shape_only_not_signoff
    role: finfet_physics_shape_projection
    flagship_class: false
    access_gate: open_no_gate
    notes: >
      ASAP7 is an academic predictive PDK and is not manufacturable. Outputs are
      used as FinFET-class PPA shape inputs for scripts/project_ppa_to_n2p.py.

  - id: tsmc_n2p_stub
    config: pd/n2p-stub/access-gate.yaml
    flow: commercial_eda_blocked
    node_class: tsmc_n2_class_gaa_nanosheet
    process_generation_nm: 2
    foundry: TSMC
    pdk_name: TSMC_N2P
    open_pdk: false
    fabricable: false
    fabricable_via:
      - TSMC OIP / NDA program
    stdcell_library_primary: blocked_until_foundry_agreement
    stdcell_variants_available: []
    metal_stack: blocked_until_foundry_agreement
    max_routing_layer: blocked_until_foundry_agreement
    clock_period_ns: 0.23
    clock_target_mhz: 4300
    sram_compiler: blocked_until_foundry_agreement
    library_manifest: pd/library-manifests/tsmc-n2p.yaml
    corner_manifest: pd/corner-manifests/tsmc-n2p.yaml
    evidence_class: procurement_blocked_no_signoff_artifacts
    role: primary_production_target_2028
    flagship_class: true
    access_gate: blocked_until_foundry_agreement
    notes: >
      Primary 2028 production target. Apple holds >50% of TSMC N2 through 2027 Q2.
      Tapeout NRE $250-400M. Mask set $40M. Wafer ~$30-33k.

  - id: tsmc_a14_stub
    config: pd/a14-stub/access-gate.yaml
    flow: commercial_eda_blocked
    node_class: tsmc_a14_2nd_gen_gaa
    process_generation_nm: 1.4
    foundry: TSMC
    pdk_name: TSMC_A14
    open_pdk: false
    fabricable: false
    fabricable_via:
      - TSMC OIP / NDA program
    stdcell_library_primary: blocked_until_foundry_agreement
    stdcell_variants_available: []
    metal_stack: blocked_until_foundry_agreement
    max_routing_layer: blocked_until_foundry_agreement
    clock_period_ns: 0.2
    clock_target_mhz: 5000
    sram_compiler: blocked_until_foundry_agreement
    library_manifest: pd/library-manifests/tsmc-a14.yaml
    corner_manifest: pd/corner-manifests/tsmc-a14.yaml
    evidence_class: procurement_blocked_no_signoff_artifacts
    role: stretch_production_target_2028
    flagship_class: true
    access_gate: blocked_until_foundry_agreement
    notes: >
      Stretch 2028 target. Baseline frontside; A14P SPR-BSPDN variant slips to 2029.
      Tapeout NRE $300-500M. Wafer ~$40-45k. No High-NA EUV per TSMC.

  - id: intel_14a_stub
    config: pd/intel-14a-stub/access-gate.yaml
    flow: commercial_eda_blocked
    node_class: intel_14a_ribbonfet_2nd_gen_bspdn_high_na
    process_generation_nm: 1.4
    foundry: Intel
    pdk_name: Intel_14A
    open_pdk: false
    fabricable: false
    fabricable_via:
      - Intel Foundry Services (IFS) under DARPA / RAMP-C subsidy
      - IFS commercial agreement
    stdcell_library_primary: blocked_until_foundry_agreement
    stdcell_variants_available: []
    metal_stack: blocked_until_foundry_agreement
    max_routing_layer: blocked_until_foundry_agreement
    clock_period_ns: 0.2
    clock_target_mhz: 5000
    sram_compiler: blocked_until_foundry_agreement
    library_manifest: pd/library-manifests/intel-14a.yaml
    corner_manifest: pd/corner-manifests/intel-14a.yaml
    evidence_class: procurement_blocked_no_signoff_artifacts
    role: second_source_strategic_2028
    flagship_class: true
    access_gate: blocked_until_foundry_agreement
    notes: >
      Strategic 2nd-source. PowerVia 2nd-gen BSPDN + High-NA EUV. Process unproven
      for mobile AP class. Hard-IP ecosystem (LPDDR/MIPI/USB) thinner than TSMC.

  - id: samsung_sf2p_stub
    config: pd/sf2p-stub/access-gate.yaml
    flow: commercial_eda_blocked
    node_class: samsung_sf2p_3rd_gen_mbcfet_gaa
    process_generation_nm: 2
    foundry: Samsung
    pdk_name: Samsung_SF2P
    open_pdk: false
    fabricable: false
    fabricable_via:
      - Samsung Foundry SAFE program / NDA
    stdcell_library_primary: blocked_until_foundry_agreement
    stdcell_variants_available: []
    metal_stack: blocked_until_foundry_agreement
    max_routing_layer: blocked_until_foundry_agreement
    clock_period_ns: 0.27
    clock_target_mhz: 3700
    sram_compiler: blocked_until_foundry_agreement
    library_manifest: pd/library-manifests/samsung-sf2p.yaml
    corner_manifest: pd/corner-manifests/samsung-sf2p.yaml
    evidence_class: procurement_blocked_no_signoff_artifacts
    role: backup_2028_target_if_tsmc_blocked
    flagship_class: true
    access_gate: blocked_until_foundry_agreement
    notes: >
      Backup. SF2 already in HVM (Exynos 2600 on SF2 / SF2P). Yield history weaker
      than TSMC; SF1.4 slipped to 2028-2029. SF2Z BSPDN variant arrives 2027.

claim_rules:
  - Every entry in `configs` must have a matching library_manifest and corner_manifest file.
  - Every advanced-node entry must keep `access_gate: blocked_until_foundry_agreement` until a foundry agreement is published in evidence.
  - ASAP7 outputs are FinFET-class shapes; they are not signoff evidence.
  - Closing the open-PDK lanes is the prerequisite for any advanced-node lane to be marked unblocked.
