schema: eliza.dft_scan_rules.v1
status: DRAFT_CAPTURE_ONLY
claim_boundary: scan_rule_capture_only_no_stitched_chain_or_coverage_claim
description: |
  Per-node design-for-test scan-rule manifest for the Eliza E1 SoC. Captures
  the clock domains, asynchronous resets, no-scan cells, and X-sources that a
  scan-insertion / ATPG flow must respect for the e1 random-logic netlist.
  Real values are recorded for the open, exercisable PDKs where the rules are
  derivable from the e1 RTL and the PDK's scan-capable standard-cell library;
  advanced NDA nodes are fail-closed placeholders pending PDK access. This
  manifest does NOT stitch a chain, run ATPG, or assert any test coverage.
top: rtl/top/e1_chip_top.sv
top_module: e1_chip_top
scan_architecture:
  style: single_internal_scan_chain
  scan_ports:
    scan_in: scan_in
    scan_enable: scan_en
    scan_out: scan_out
  test_mode_port: TEST_MODE
  test_clock: CLK_IN
  notes: |
    A single internal scan chain is intentional at the open-tooling stage:
    balanced multi-chain insertion needs a commercial DFT compiler. Scan
    ports are not yet present in rtl/; Fault stitches them downstream of the
    scan-ready leaf netlist (build/dft/*.scan_ready.v). Top-level scan I/O
    routes through the JTAG TAP (rtl/dft/e1_jtag_tap.sv).
clock_domains:
  - id: e1_clk
    source: CLK_IN
    period_ns_min: null
    test_clock: true
    reset: rst_n_sync
    derived_from: docs/spec-db/e1-clock-reset-domain-intent.yaml
async_resets:
  - id: RST_N
    polarity: active_low
    kind: external_async_reset
    synchronized_by: rtl/clock/e1_reset_sync.sv::e1_reset_sync
    test_constraint: held_inactive_during_scan_shift
  - id: rst_n_sync
    polarity: active_low
    kind: synchronized_reset
    generated_by: rtl/clock/e1_reset_sync.sv::e1_reset_sync
    test_constraint: held_inactive_during_scan_shift
x_sources:
  - id: uninitialized_sram
    origin: pd/dft/mbist.yaml
    handling: BLOCKED_until_mbist_init_or_openram_macro
    notes: |
      OpenRAM SRAM macros are unbuilt; their outputs are X at scan-shift
      start and must be MBIST-initialized or scan-isolated. MBIST controllers
      are BLOCKED in pd/dft/mbist.yaml.
  - id: jtag_tap_unclocked_inputs
    origin: rtl/dft/e1_jtag_tap.sv
    handling: tdi_tms_constrained_at_atpg_boundary
  - id: bidirectional_pads
    origin: pd/padframe
    handling: BLOCKED_pad_inventory_pending
no_scan_cells:
  - id: clock_gating_cells
    reason: test_clock_must_reach_all_scan_flops
  - id: reset_synchronizer_flops
    instances:
      - rtl/clock/e1_reset_sync.sv::e1_reset_sync
    reason: cdc_synchronizer_excluded_from_scan_chain
  - id: sram_macro_internal_flops
    reason: covered_by_mbist_not_scan
nodes:
  sky130:
    node_id: sky130
    scan_status: scan_capable_library_present
    std_cell_library: sky130_fd_sc_hd
    scan_flop_cells:
      - sky130_fd_sc_hd__sdfxtp_1
      - sky130_fd_sc_hd__sdfxbp_1
      - sky130_fd_sc_hd__sdfrtp_1
    scan_ready_netlist: build/dft/e1_bootrom.scan_ready.v
    prep_pass: pd/dft/scan_insertion.tcl
    retarget_tool: fault_not_vendored
    notes: |
      sky130_fd_sc_hd ships scan-capable flops (sdf*), but pd/dft/scan_insertion.tcl
      (dfflibmap + abc) does NOT retarget onto them -- dfflibmap maps to ordinary
      flops (e1_bootrom is a flop-less ROM; a 104-flop module maps to dfrtp_1/
      dfxtp_1, zero sdf*). Scan-flop substitution + chain stitching need Fault,
      which is not vendored under external/, so the sdf* scan_flop_cells above are
      the target set, not what the prep pass currently produces. Prep validated on
      rtl/bootrom via pd/dft/run_e1_bootrom_scan_prep.tcl.
  gf180:
    node_id: gf180
    scan_status: scan_capable_library_present
    std_cell_library: gf180mcu_fd_sc_mcu7t5v0
    scan_flop_cells:
      - gf180mcu_fd_sc_mcu7t5v0__sdffq_1
      - gf180mcu_fd_sc_mcu7t5v0__sdffrnq_1
    scan_ready_netlist: null
    prep_pass: pd/dft/scan_insertion.tcl
    retarget_tool: fault_not_vendored
    notes: |
      gf180mcu library ships scan flops (sdff*); the dfflibmap prep pass has not
      been exercised on this node and, as on sky130, would only map to ordinary
      flops. Scan-flop retargeting + stitching need Fault (not vendored). Prep
      requires the gf180 typical-corner Liberty on PATH.
  ihp-sg13g2:
    node_id: ihp-sg13g2
    scan_status: scan_capability_unverified
    std_cell_library: sg13g2_stdcell
    scan_flop_cells: []
    scan_ready_netlist: null
    notes: |
      IHP SG13G2 open PDK scan-flop coverage not yet audited; scan rules
      remain BLOCKED until the sg13g2 Liberty is confirmed to carry scan
      flops.
  asap7:
    node_id: asap7
    scan_status: predictive_shape_only_not_fabricable
    std_cell_library: asap7sc7p5t
    scan_flop_cells: []
    scan_ready_netlist: null
    notes: |
      ASAP7 is a predictive academic PDK (fabricable=false). Usable for shape
      studies only; no scan-insertion or coverage claim is permitted.
  tsmc-n2p:
    node_id: tsmc-n2p
    scan_status: BLOCKED_nda_pdk
    notes: NDA advanced node; scan rules require foundry PDK + DFT kit access.
  tsmc-a14:
    node_id: tsmc-a14
    scan_status: BLOCKED_nda_pdk
    notes: NDA advanced node; scan rules require foundry PDK + DFT kit access.
  intel-14a:
    node_id: intel-14a
    scan_status: BLOCKED_nda_pdk
    notes: NDA advanced node; scan rules require foundry PDK + DFT kit access.
  samsung-sf2p:
    node_id: samsung-sf2p
    scan_status: BLOCKED_nda_pdk
    notes: NDA advanced node; scan rules require foundry PDK + DFT kit access.
release_blockers:
  - Scan ports (scan_in/scan_en/scan_out) are not present in rtl/; Fault
    stitches them downstream and Fault is not vendored under external/.
  - SRAM macro X-sources require MBIST init (BLOCKED in pd/dft/mbist.yaml).
  - Bidirectional pad X-handling is BLOCKED on the unfinalized pad inventory.
external_gates:
  - docs/evidence/pd/dft-evidence.yaml
  - docs/evidence/pd/commercial-eda-gate.yaml
