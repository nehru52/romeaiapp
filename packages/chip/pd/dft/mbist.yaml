schema: eliza.pd_dft_mbist.v1
status: draft_local_evidence
release_use: prohibited_until_external_review
scope: per_sram_mbist_strategy_for_openram_sky130_macros
description: |
  MBIST (Memory Built-In Self Test) plan for each OpenRAM-generated SRAM
  macro listed in pd/macros/manifest.yaml. Today these are all BLOCKED on
  the OpenRAM run; this manifest fixes the contract so the gate fails
  closed until the controller RTL and JTAG-accessible status register
  exist.
controllers:
  - macro: e1_sram_4kb_1rw
    controller_module: e1_mbist_4kb_ctrl
    test_patterns:
      - march_c_minus
      - march_lr
      - march_su
    failure_log_words: 16
    jtag_chain_id: 0x21
    sram_clock_domain: CLK_IN
    rtl_status: BLOCKED_generate_with_openram
  - macro: e1_sram_16kb_1rw
    controller_module: e1_mbist_16kb_ctrl
    test_patterns:
      - march_c_minus
      - march_lr
      - march_su
    failure_log_words: 32
    jtag_chain_id: 0x22
    sram_clock_domain: CLK_IN
    rtl_status: BLOCKED_generate_with_openram
  - macro: e1_sram_64kb_1rw
    controller_module: e1_mbist_64kb_ctrl
    test_patterns:
      - march_c_minus
      - march_lr
      - march_su
      - checker_board
    failure_log_words: 64
    jtag_chain_id: 0x23
    sram_clock_domain: CLK_IN
    rtl_status: BLOCKED_generate_with_openram
boundary_scan:
  jtag_tap_module: e1_jtag_tap
  ir_width_bits: 5
  boundary_register_width_bits: 0
  status: BLOCKED_pad_inventory_pending
release_blockers:
  - OpenRAM SRAM macros are unbuilt; MBIST controllers cannot be generated.
  - JTAG boundary scan chain length depends on the final pad inventory.
  - Fault academic ATPG hookup is not yet wired into the OpenLane flow.
