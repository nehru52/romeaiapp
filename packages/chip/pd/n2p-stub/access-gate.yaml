schema: eliza.pd_advanced_node_access_gate.v1
pdk: TSMC_N2P
node_class: tsmc_n2_class_gaa_nanosheet
status: blocked_until_foundry_agreement
evidence_class: procurement_blocked_no_artifacts

role: primary_production_target_2028

reason:
  - TSMC OIP / NDA agreement at N2P is not in place.
  - Apple holds >50% of TSMC N2 wafer allocation through 2027 Q2 per public reporting.
  - No commercial signoff EDA seat (Innovus, Tempus, Voltus, StarRC, IC Validator)
    is held by this project.
  - Hard-IP licenses for LPDDR5X PHY, MIPI v3, USB4, PLL, SRAM compiler at N2P are not licensed.

unblock_requires:
  - executed_tsmc_open_innovation_platform_agreement_at_n2p
  - lpddr5x_phy_license_at_n2p_synopsys_or_cadence_or_rambus
  - usb32_or_usb4_phy_license_at_n2p
  - mipi_d_phy_v3_and_c_phy_v2_license_at_n2p
  - dsi2_and_csi2_controller_license_at_n2p
  - pll_hard_ip_license_at_n2p
  - sram_compiler_license_at_n2p_with_nanoflex_assist
  - commercial_signoff_eda_seat_voltus_redhawk_or_primetime
  - lvf_or_socv_aware_pvt_corner_set_loaded
  - foundry_approved_methodology_for_multi_vt_slvt_lvt_rvt_hvt_mix
  - mask_set_nre_budget_usd_40m_committed
  - tapeout_nre_budget_usd_250m_to_400m_committed
  - wafer_allocation_window_in_2027q3_to_2028q4

procurement_economics:
  wafer_usd_low: 30000
  wafer_usd_high: 33000
  mask_set_usd_estimate: 40000000
  tapeout_nre_usd_low: 250000000
  tapeout_nre_usd_high: 400000000
  expected_lead_customer_window: "Apple A20-class 2026-2027, Qualcomm and MediaTek transition 2027, mobile-mature 2028"
  apple_wafer_share_through_2027q2_pct: 50

process_technical_summary:
  transistor: gaa_nanosheet
  dtco_methodology: NanoFlex
  bspdn: "no"
  high_na_euv: "no"
  hd_density_mtr_per_mm2: 313
  hd_sram_macro_mb_per_mm2: 38.1
  perf_or_power_lift_vs_n3e: "10-15% perf @ iso-power OR 25-30% power @ iso-perf"

corner_set: pd/corner-manifests/tsmc-n2p.yaml
library_set: pd/library-manifests/tsmc-n2p.yaml

forbidden_claims_until_unblocked:
  - tsmc_n2p_tapeout_ready
  - tsmc_n2p_signoff_clean
  - tsmc_n2p_release_artifacts_produced
  - any_advanced_node_ppa_number_marked_as_signoff
  - any_advanced_node_die_area_marked_as_measured
  - any_advanced_node_power_marked_as_measured

what_can_be_said_today:
  - This project has selected TSMC N2P as its primary 2028 production target.
  - The architecture, RTL, methodology, and floor-plan envelope are sized to
    a 100-130 mm² N2P-class die.
  - Open-PDK lanes (Sky130, GF180, IHP SG13G2) and ASAP7 produce real PD
    methodology evidence and FinFET-class PPA shape; neither is a signoff
    substitute for the production node.

next_commands:
  preflight: make pdk-portability-check
  projection: make ppa-projection
  procurement_gate: make pdk-access-gate
