# SPDX-License-Identifier: Apache-2.0
#
# Timeloop architecture description for the E1 NPU prototype.
#
# This file describes the geometry of the E1 NPU in the Timeloop /
# Accelergy YAML schema so the modeled joules-per-inference column can be
# emitted alongside the existing SCALE-Sim cycle column from
# ``benchmarks/sim/run_npu_scale_sim.py``.
#
# Calibration boundary: every number here mirrors
# ``compiler/runtime/e1_npu_scale_model.py::MIN_REAL_V1`` (the only
# configuration that maps to current RTL). It is a modeled-only
# architecture description. ``provenance: simulator`` is enforced by the
# runner; see ``docs/benchmarks/claim-ladder.md``.
architecture:
  version: 0.4
  subtree:
    - name: e1_npu_chip
      attributes:
        technology: "14nm-class"  # planning-only proxy for 14A
        node_label: "modeled_only"
      local:
        - name: dram
          class: DRAM
          attributes:
            type: "LPDDR5X"
            width: 64
            block-size: 32
            word-bits: 8
            read_bandwidth: 51.2     # GB/s, modeled
            write_bandwidth: 51.2    # GB/s, modeled
      subtree:
        - name: npu_tile
          local:
            - name: weight_sram
              class: SRAM
              attributes:
                depth: 32768
                width: 64
                word-bits: 8
                block-size: 8
                read_bandwidth: 64
                write_bandwidth: 64
            - name: activation_sram
              class: SRAM
              attributes:
                depth: 16384
                width: 64
                word-bits: 8
                block-size: 8
                read_bandwidth: 64
                write_bandwidth: 64
            - name: accumulator_sram
              class: regfile
              attributes:
                depth: 1024
                width: 32
                word-bits: 32
            - name: mac_array
              class: intmac
              attributes:
                meshX: 16
                meshY: 16
                word-bits: 8

problem:
  shape:
    name: "GEMM"
    data-spaces:
      - name: Weights
      - name: Inputs
      - name: Outputs
        read-write: true
    dimensions: [M, N, K]
    coefficients: []
  instance:
    # Default decode-shaped GEMM for early sanity. The driver overrides M/N/K
    # per benchmark before invoking timeloop-mapper.
    M: 4096
    N: 1
    K: 4096

mapper:
  optimization-metrics: [energy]
  algorithm: random-pruned
  victory-condition: 16
  num-threads: 4

calibration_boundary:
  status: "modeled_only_pre_silicon"
  required_real_evidence:
    - "Joulescope or Monsoon trace at L5_PROTOTYPE_SILICON"
    - "Perfetto power-rail integration window"
  forbidden_use:
    - "release power-per-watt claims"
    - "phone-comparable energy_joules_per_inference"
