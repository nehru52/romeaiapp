          - verify/cocotb/test_clint_timer_irq.py (CLINT timer/software-irq scaffold, skipped until CLINT lands)
        current_evidence: The RTL boot ROM now loads the generated secure ROM image and preserves debug-visible identity/handoff words; the boot ROM transcript gate proves reset-vector fetch, mtvec setup, secure-boot entrypoint execution, and fail-closed trap behavior in QEMU. The interrupt-controller RTL report now carries checked false flags for Linux boot, AOSP boot, SoC mip wiring, silicon, release, and production-readiness claims while its evidence remains local CLINT/PLIC lint/cocotb gate evidence. Pad-level RTL still has no production CPU wrapper with MMU/cache, no complete CLINT/PLIC-compatible interrupt/timer path in the v0 top, no UART console transcript from the selected AP path, and no positive authenticated OpenSBI/Linux firmware handoff.
        blocking_gate: QEMU/Renode semantic checks must not be treated as e1-chip boot validation.
        closure_evidence: Firmware ELF boots through the RTL-equivalent address map in simulation or emulation and emits a checked serial transcript.
        work_order: Define and verify a bootable CPU, timer, interrupt, memory, and console contract before claiming OS bring-up.
