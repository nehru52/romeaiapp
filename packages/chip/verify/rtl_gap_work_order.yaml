          - fw/boot-rom/reset.S (executable RV64 reset path: mtvec setup, interrupt masking, secure-boot entrypoint call, fail-closed trap loop)
          - fw/boot-rom/Makefile (tools-checked build rule producing e1_secure_boot_rom.elf/.bin/.hex)
          - fw/boot-rom/linker.ld (64 KiB ROM aperture at 0x0000_0000, with architectural handoff/debug word preserved by RTL)
