es build/reports/cpu_ap_completion_gate.json with status=blocked because the selected manifest and platform contract keep the real Linux-capable CPU/AP completion claim disabled; the blocked report now carries explicit false flags for phone AP, release, Linux-capable CPU, privileged boot, and generated CPU/AP completion claims. `make soc-real-integration-test` regression-tests that the real-IRQ/real-DRAM SoC composition report keeps phone, release, Linux-boot, production-CPU, and real-CPU-execution claims false even when the CLINT/PLIC/DRAM integration smoke is green.
