schema: eliza.ai_eda.coverage_bins.v1
updated: 2026-05-20
source_ids:
  - cvdp
  - llm4dv
dut: e1_dma
scope: >
  Dry-run coverage targets for future AI-assisted cocotb stimulus proposals
  against DMA backpressure, ordering, byte-strobe, IRQ, and error behavior.
  Candidate tests are not evidence until accepted into source and passing the
  named cocotb gates.
required_followup_gates:
  - make cocotb
  - make cocotb-axi4
bins:
  - id: dma_long_transfer_backpressure
    description: Long transfer under randomized AXI-Lite ready/valid stalls.
    required_observation: bytes_done equals programmed length and payload is preserved
    existing_reference:
      - verify/cocotb/dma/test_dma_long_transfer.py
  - id: dma_partial_tail_byte_strobes
    description: Non-multiple-of-word transfer must preserve bytes outside the tail.
    required_observation: final write strobe masks only valid tail bytes
    existing_reference:
      - verify/cocotb/dma/test_dma_long_transfer.py
  - id: dma_unaligned_programming_error
    description: Unaligned source or destination address must latch an error without traffic.
    required_observation: status error bit set and no downstream write transaction accepted
    existing_reference:
      - verify/cocotb/dma/test_dma_long_transfer.py
  - id: dma_completion_irq_pulse
    description: Completion must assert IRQ after successful transfer.
    required_observation: irq pulse observed and done status remains readable
    existing_reference:
      - verify/cocotb/dma/test_dma_long_transfer.py
  - id: dma_bus_error_propagation
    description: Downstream SLVERR/RRESP fault must propagate into DMA status.
    required_observation: error counter/status reflects downstream bus error
    existing_reference:
      - verify/cocotb/dma/test_dma_long_transfer.py
