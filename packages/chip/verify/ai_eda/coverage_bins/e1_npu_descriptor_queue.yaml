schema: eliza.ai_eda.coverage_bins.v1
updated: 2026-05-19
source_ids:
  - cvdp
  - verilog-eval
dut: e1_npu
scope: >
  Dry-run coverage targets for future AI-assisted cocotb stimulus proposals.
  Candidate tests are not evidence until accepted into source and passing the
  named cocotb gates.
bins:
  - id: descriptor_queue_empty_pop
    description: Pop or start behavior while the descriptor queue is empty.
    required_observation: no underflow, no invalid completion, stable status
    existing_reference:
      - verify/cocotb/test_e1_npu.py
      - verify/cocotb/npu/test_npu_queue_stress.py
  - id: descriptor_queue_back_to_back_submit
    description: Back-to-back descriptor submissions across queue depth limits.
    required_observation: ordering preserved and queue status monotonic
    existing_reference:
      - verify/cocotb/test_e1_npu.py
  - id: descriptor_queue_reset_midflight
    description: Reset while a descriptor is accepted but before completion.
    required_observation: post-reset idle status and no stale completion
    existing_reference:
      - verify/cocotb/test_reset_domain_cleanup.py
  - id: npu_error_status_persistence
    description: Error/status register behavior across invalid descriptor inputs.
    required_observation: error bit persistence follows runtime contract
    existing_reference:
      - verify/cocotb/test_e1_npu.py
