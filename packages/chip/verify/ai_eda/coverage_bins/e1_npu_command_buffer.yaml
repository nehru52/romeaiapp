schema: eliza.ai_eda.coverage_bins.v1
updated: 2026-05-20
source_ids:
  - llm4dv
  - verilog-eval
  - iree
dut: e1_npu
scope: >
  Dry-run coverage targets for future AI-assisted cocotb stimulus proposals
  against the NPU command-buffer, descriptor stream, runtime ABI, and
  performance-counter edges. Candidate tests are not evidence until accepted
  into source and passing the named cocotb gates.
required_followup_gates:
  - make cocotb-npu
  - make cocotb-npu-tiny-mlp-e2e
bins:
  - id: npu_busy_launch_ignored
    description: Host launch while an operation is busy must not corrupt the in-flight command.
    required_observation: first operation completes with expected result and no second command side effect
    existing_reference:
      - verify/cocotb/test_e1_npu.py::npu_busy_launch_is_ignored_until_current_operation_completes
  - id: npu_invalid_gemm_config_no_scratch_write
    description: Invalid GEMM shape/configuration must report an error without modifying scratchpad data.
    required_observation: error bit asserted and scratchpad sentinel bytes remain unchanged
    existing_reference:
      - verify/cocotb/test_e1_npu.py::npu_gemm_invalid_config_reports_error_without_touching_scratch
  - id: npu_descriptor_fetch_timeout_fault
    description: Descriptor fetch with stalled memory must time out into a fault state.
    required_observation: descriptor engine sets fault status and does not advance to a false completion
    existing_reference:
      - verify/cocotb/test_e1_npu.py::npu_descriptor_timeout_engine_faults_stalled_memory_fetch
  - id: npu_descriptor_owner_writeback_reject
    description: Descriptor stream must require a valid owner bit and reject malformed writeback requests.
    required_observation: malformed descriptor is rejected with status and no invalid writeback accepted
    existing_reference:
      - verify/cocotb/test_e1_npu.py::npu_descriptor_requires_valid_owner_bit_and_rejects_malformed_writeback_request
  - id: npu_descriptor_gemm_writeback
    description: Descriptor stream must move GEMM inputs through scratchpad and write results back to DRAM.
    required_observation: writeback payload equals golden GEMM result and descriptor tail advances
    existing_reference:
      - verify/cocotb/test_e1_npu.py::npu_descriptor_streams_gemm_and_writes_result_back_to_dram
  - id: npu_runtime_abi_coverage_export
    description: Runtime ABI sequence must match RTL behavior and emit coverage data.
    required_observation: runtime writes produce expected RTL result and coverage artifact is written
    existing_reference:
      - verify/cocotb/test_e1_npu.py::npu_runtime_abi_sequence_matches_rtl_and_writes_coverage
  - id: npu_tiny_mlp_descriptor_lowering
    description: IREE-style tiny MLP lowering must execute as descriptor-backed GEMM layers.
    required_observation: two-layer MLP descriptor stream matches the golden GEMM output
    existing_reference:
      - verify/cocotb/npu/test_iree_tiny_mlp_e2e.py::two_layer_mlp_lowering_descriptor_stream_matches_golden_gemm_s8
