  - discrete_memory_or_storage_if_not_on_SoM
  - PMIC_charger_PD_ICs_outside_researched_category
  - PCB_fabrication_and_SMT_assembly
  - enclosure_tooling_and_molding
  - calibration_RF_certification_fixtures_packaging_logistics_tariffs_warranty
