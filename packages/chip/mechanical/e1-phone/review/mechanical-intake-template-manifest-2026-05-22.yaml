schema: eliza.e1_phone_mechanical_intake_template_manifest.v1
status: intake_templates_created_no_release_evidence_present
date: 2026-05-22
claim_boundary: >
  Manifest for empty mechanical review and production enclosure intake templates
  created for the E1 phone fabrication, enclosure, and end-to-end release push.
  These templates collect future review inputs only. They are not clearance
  evidence, not first-article evidence, not signed production handoff evidence,
  and not approval to fabricate or release an enclosure.

source_artifacts:
  - packages/chip/board/kicad/e1-phone/enclosure-mechanical-release-burndown-2026-05-22.yaml
  - packages/chip/board/kicad/e1-phone/production-enclosure-first-article-release-execution.yaml

template_policy:
  template_set_revision: mechanical-intake-2026-05-22
  evidence_class: empty_intake_template
  release_flags_default_false: true
  requires_routed_board_step_before_completion: true
  requires_supplier_step_or_brep_before_completion: true
  requires_signed_reviewer_before_release: true
  ready_for_fabrication: false
  ready_for_enclosure: false
  ready_for_end_to_end_phone_release: false
  release_allowed: false

templates:
  - id: routed_board_clearance_release
    path: mechanical/e1-phone/review/routed-board-clearance-release-intake.yaml
    maps_to_burndown_domains:
      - board_component_height_model_inputs
      - physical_interface_burndown
      - clearance_and_boolean_burndown
    maps_to_first_article_records:
      - routed_clearance_and_enclosure_physical_fit
    required_before_completion:
      - routed KiCad PCB and routed board STEP with component models
      - supplier STEP or B-rep models for all selected mechanical interfaces
      - boolean interference reports and per-case clearance measurements
      - DRC, ERC, assembly drawing, and component 3D binding report
    release_allowed: false
  - id: usb_plug_sweep
    path: mechanical/e1-phone/review/usb-plug-sweep-intake.yaml
    maps_to_burndown_domains:
      - physical_interface_burndown.usb_c
      - required_supplier_geometry_inputs.usb_c_side_buttons_bottom_io
    maps_to_first_article_records:
      - usb_c_power_sidekeys
    required_before_completion:
      - signed USB-C connector drawing and supplier model
      - final enclosure aperture, saddle, chamfer or gasket geometry
      - plug overmold sweep body and insertion or extraction force data
      - USB attach, charge, debug, insertion-cycle, and ESD review logs
    release_allowed: false
  - id: side_key_load_path_review
    path: mechanical/e1-phone/review/side-key-load-path-review-intake.yaml
    maps_to_burndown_domains:
      - physical_interface_burndown.side_buttons
      - required_supplier_geometry_inputs.usb_c_side_buttons_bottom_io
    maps_to_first_article_records:
      - usb_c_power_sidekeys
    required_before_completion:
      - signed side-key switch or flex drawing and supplier model
      - cap, rib, elastomer, stiffener, and enclosure side-wall geometry
      - force-travel CSV, return-force result, and side-load inspection
      - power, volume, bootloader recovery, and wake functional logs
    release_allowed: false
  - id: enclosure_fit_first_article
    path: mechanical/e1-phone/review/enclosure-fit-first-article-intake.yaml
    maps_to_burndown_domains:
      - physical_fit_first_article_burndown
      - physical_interface_burndown
    maps_to_first_article_records:
      - enclosure_physical_fit_first_article
      - selected_hardware_functional_first_article
    required_before_completion:
      - routed board STEP and physical first article unit serial numbers
      - signed supplier geometry for display, camera, USB-C, side keys, battery, audio, haptics, radios, and interconnect
      - assembly traveler, photos, inspection measurements, and functional logs
      - reviewer signoff with deviations and rework disposition
    release_allowed: false
  - id: production_enclosure_handoff
    path: mechanical/e1-phone/review/production-enclosure-handoff-intake.yaml
    maps_to_burndown_domains:
      - production_handoff_burndown
      - release_policy
    maps_to_first_article_records:
      - signed_traveler_and_end_to_end_release
    required_before_completion:
      - final enclosure CAD, manufacturing drawing, tolerance stack, and material finish callouts
      - factory limits, inspection plan, fixture references, and serialization plan
      - enclosure supplier quote pack, DFM feedback, and approved deviations
      - signed first-article traveler and production release disposition
    release_allowed: false

cross_checks:
  every_template_maps_to_enclosure_mechanical_burndown: true
  every_template_maps_to_production_enclosure_first_article_release: true
  all_templates_are_empty_intake_not_evidence: true
  all_release_flags_false: true
  central_checker_not_modified_by_worker_i: true
  central_artifact_manifest_not_modified_by_worker_i: true

forbidden_claims:
  - fabrication_ready
  - enclosure_ready
  - routed_clearance_passed
  - usb_plug_sweep_passed
  - side_key_load_path_verified
  - enclosure_fit_first_article_passed
  - production_enclosure_handoff_approved
  - end_to_end_phone_ready
