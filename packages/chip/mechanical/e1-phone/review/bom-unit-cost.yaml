schema: eliza.e1_phone_bom_unit_cost.v1
date: 2026-05-21
evidence_class: public_sourcing_estimate
design_rev: evt0-mechanical-cad-swell-camera-seal
compute_sourcing_note: >
  Compute (line 1) is now sourced as a turnkey RK3566 System-on-Module
  (Firefly Core-3566JD4 class, PATH A) with a PUBLIC 260-pin SODIMM connector
  pinout, retiring the former NDA-gated bare-SoC blocker. Lines 2 (RAM), 3
  (eMMC) and 4 (PMIC) are folded into the SoM and zeroed in the rollup. The
  bare-SoC + discrete-DDR/eMMC/PMIC path (PATH B) is retained as a documented
  cost-down-at-scale option (needs SoC vendor NDA). SoM premium = +$7.10/unit
  @ 10k, +$4.55/unit @ 100k. See review/compute-sourcing-resolution.md.
design_change_note: >
  Flush-back + swell/camera/seal + Wave-2 rev: device 9.6 -> 12.7 mm, battery
  4500 mAh/17.33 Wh -> 5727 mAh/22.05 Wh (LP566487-class 5.6 mm thick pouch with a
  0.6 mm back-face swell void), single-lens rear + single-lens front (unchanged single
  configuration), a rear torch/flash LED + AW36515 flash driver IC, a Qorvo QPC1252Q
  antenna aperture/band-switch tuner (low-band cellular fix), a PORON glass-perimeter
  cushion (face-drop fix), and molded-in corner ribs + 6->10 screw bosses (corner-drop
  fix; +4 M1.4 screws). BOM lines and rollup below reflect these deltas; all other lines
  unchanged from the prior rev.
status: sourcing_estimate_not_release_bom
claim_boundary: >
  Unit-cost analysis assembled from public Alibaba/AliExpress/LCSC/Made-in-China
  listings, distributor pages, and trade-press articles (May 2026 context).
  Prices below are sourcing analysts' working estimates for budgetary modelling.
  They are NOT signed supplier quotes and they do not constitute an AVL,
  purchase order, or production-release BOM. Items marked confidence=estimate
  use a cited analog as the price proxy; all such cases are flagged.
volume_assumptions:
  - 10000
  - 100000
currency: USD
incoterms_assumption: EXW Shenzhen, components landed at CM, no VAT
target_phone:
  envelope_mm: [78.0, 153.6, 12.7]
  battery_wh: 22.05
  display_in: 5.5
  region: global / China-domestic first

lines:

  - line: 1
    function: compute
    qty: 1
    sourcing_decision: >
      Compute is sourced two ways. PATH A (buildable-now, default): a turnkey
      RK3566 System-on-Module (Firefly Core-3566JD4 class) that bundles SoC +
      LPDDR4 + eMMC + PMIC behind a PUBLIC 260-pin SODIMM connector pinout
      (see board/kicad/e1-phone/supplier-pinouts/compute-som-pinout.yaml). This
      retires the only NDA-gated procurement blocker on the BoM. PATH B
      (cost-down-at-scale, optional/later): bare Unisoc T606 (or RK3566) SoC +
      discrete LPDDR4 + eMMC + PMIC, which is cheaper per unit at volume but
      requires the SoC vendor NDA for the production BGA ball-map. The two
      bundled-vs-discrete cost paths are itemized below.

    # ---- PATH A: buildable-now SoM (default; replaces former soc+ram+emmc+pmic lines 1/2/4) ----
    path_a_som:
      mpn: Firefly Core-3566JD4 (RK3566 quad-core A55, Mali-G52, 1 TOPS NPU; 2 GB LPDDR4 + 32 GB eMMC + on-module PMIC)
      bundles_functions: [soc, ram_lpddr4x, emmc, pmic]
      connector: 260-pin gold-finger SODIMM, 0.5 mm pitch (public pinout)
      source:
        - https://en.t-firefly.com/product/core/core3566jd4.html
        - https://download.t-firefly.com/Spec/CoreBorads/Core-3566JD4_Specification_EN.pdf
        - https://www.alibaba.com/product-detail/RK3566-SOM-Core-Board-with-Android_1601173331751.html
      price_usd_10k: 32.00
      price_usd_100k: 26.00
      confidence: med
      notes: >
        Core-3566JD4-class RK3566 SoM (2 GB/32 GB) is ~$49 single-qty at
        IndustryPC/Firefly Store. Generic-vendor RK3566 SoMs of the same config
        on Alibaba run $28-35 at small volume and quote toward $24-28 at 1k+ OEM
        (e.g. Core3566/SOD3566/Thinkcore modules). Working estimate $32 @ 10k,
        $26 @ 100k for a Core-3566JD4-equivalent module. This single line
        REPLACES bundled functions soc + ram_lpddr4x_4gb + emmc_5p1_64gb + pmic
        (former lines 1+2+4 = $24.90 @ 10k / $21.45 @ 100k), so the SoM premium
        is +$7.10 @ 10k / +$4.55 @ 100k (it also folds in the b2b connector and
        eliminates SoC/DDR/eMMC routing + DDR signal-integrity NRE). Note the
        RK3566 (4x A55) is weaker than the T606 (2x A75 + 6x A55) in multithread;
        acceptable for the AP role since the e1-phone offloads the modem.

    # ---- PATH B: bare-SoC cost-down (optional, later; needs NDA for BGA ball-map) ----
    path_b_bare_soc:
      mpn: Unisoc T606 (UMS512, 12 nm, 8x A55+A75, Mali-G57) — or bare RK3566
      chinese_alternate: Unisoc T616 (same family, higher clock) — directly substitutable
      requires: vendor_nda_for_production_bga_ball_map
      source:
        - https://www.unisoc.com/en_us/home/TZNSJ-T606-5-2
        - https://www.lcsc.com/product-detail/C2943786.html
        - https://www.alibaba.com/product-detail/Unisoc-T606-Phones-Mobile-Android-Smartphone_1600688616501.html
      bare_soc_price_usd_10k: 8.20
      bare_soc_price_usd_100k: 7.00
      bundle_with_discrete_ram_emmc_pmic_usd_10k: 24.90
      bundle_with_discrete_ram_emmc_pmic_usd_100k: 21.45
      confidence: med
      notes: >
        Bare T606 reverse-engineers to $7-9; bare RK3566 is ~$10 single at LCSC,
        lower at volume. Adding discrete LPDDR4 ($9.50/$8.40), eMMC ($5.40/$4.60)
        and PMIC ($1.80/$1.45) reconstructs the SoM functionality at $24.90 @ 10k
        / $21.45 @ 100k of BoM cost — i.e. ~$7/unit cheaper than the SoM at 10k —
        but only after the vendor NDA + design-in unlocks the BGA ball-map and
        the team takes on DDR/eMMC layout + SI bring-up. This is the
        cost-down-at-scale path, not a current blocker.

    # rollup uses PATH A (SoM). Lines 2 (ram) and 4 (pmic) are folded into this SoM line.
    price_usd_10k: 32.00
    price_usd_100k: 26.00
    confidence: med
    notes: >
      Default cost path = PATH A SoM. This line now also covers RAM and PMIC
      (former lines 2 and 4 are zeroed and annotated as folded-into-SoM). eMMC
      (former line 3) is likewise on-module. See sourcing_decision and
      compute-sourcing-resolution.md.

