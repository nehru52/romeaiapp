confidence_summary:
  high_count: 5
  med_count: 9
  low_count: 1
  estimate_count: 19
  comment: >
    The new estimate-tier lines (rear torch/flash LED, flash driver IC, QPC1252Q
    aperture tuner, PORON glass-perimeter cushion) together add only ~$0.6-0.7/unit,
    so they do not move the cost envelope. The aperture tuner ($0.40/$0.30) is the
    largest of the new lines and is estimate-tier (no public LCSC unit price for the
    QPC1252Q or PE613050 alt; banded against typical $0.25-0.50 RFFE-tuner volume
    pricing). The high/med-confidence lines (SoC, RAM, eMMC, modem, Wi-Fi, display,
    cameras, battery, PD/charger/codec) still cover ~78% of BOM dollars, so total
    ex-factory cost remains well-constrained.

