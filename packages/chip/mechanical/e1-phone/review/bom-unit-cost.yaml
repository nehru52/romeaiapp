  - signed RFQ from Quectel for RG255C-GL with region SKU pricing
  - direct Murata authorized distributor 10k quote vs Realtek RTL8852BS Chinese channel
  - LCD module supplier (Chenghao or BOE) 10k quote with init sequence + FPC drawing
  - LiPol/Grepow battery pack 10k quote with safety doc package
  - Qorvo (QPC1252Q) or pSemi/Murata (PE613050) RFFE aperture-tuner RFQ + availability confirmation at 10k and 100k
  - tool shop quote for hard-tool front+rear+small parts mold set
  - ODM (Wingtech / Huaqin) loaded PCBA + assembly + test quote at both volumes
