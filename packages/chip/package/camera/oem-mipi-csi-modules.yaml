schema: eliza.camera_module_binding.v1
as_of: 2026-05-20
status: sourcing_shortlist_no_bonded_pins_no_fabricated_board
claim_boundary: >
  Planning binding only. No camera connector is placed in a routed schematic,
  no MIPI CSI lanes are bonded out, and no V4L2 or Android Camera HAL evidence
  exists. Promotion requires supplier drawings, pinouts, power sequencing,
  sensor driver support, calibration flow, and real capture logs.

rear_camera_primary:
  class: 13MP_autofocus_MIPI_CSI_module
  candidate_parts:
    - vendor: Sincere First
      module: SF-XR3855A-A0
      sensor: OV13855_or_OV13850
      resolution_mp: 13
      sensor_size_in: "1/3.06"
      interface: MIPI_CSI
      pin_count: 24
      focus: autofocus
      f_number: 2.0
      field_of_view_deg: 78.4
      sourcing_url: https://sincerefirst.en.made-in-china.com/product/WACpUrRYOVkc/China-Ov13855-Ov13850-CMOS-Sensor-Autofocus-13MP-Mipi-Camera-Module.html
    - vendor: Sincere First
      module: AR1335_13MP_AF_30pin_class
      sensor: AR1335
      resolution_px: 4208x3120
      interface: MIPI_CSI_2_4_lane
      pin_count: 30
      focus: autofocus
      sourcing_url: https://sincerefirst.en.made-in-china.com/product/dfapAuFoazVG/China-Mini-Size-Ar1335-13MP-CMOS-Sensor-Af-Camera-Module-Mipi-30pin.html

front_camera_primary:
  class: 5MP_to_8MP_fixed_focus_MIPI_CSI_module
  status: shortlist_selected_pending_supplier_drawing_and_z_stack
  candidate_parts:
    - vendor: Sincere First
      module: SF-G5035S60FY
      sensor: GC5035
      resolution_px: 2592x1944
      interface: MIPI_CSI_2_lane
      pin_count: 30
      focus: fixed_focus
      sourcing_url: https://sincerefirst.en.made-in-china.com/product/stzRqCgufMVy/China-5MP-Gc5035-CMOS-Image-Sensor-Small-Size-Fixed-Focus-Mipi-Camera-Module.html
    - vendor: Shenzhen Junde Electronics
      module: JDT-HPLCC-8MP-120
      sensor: IMX219
      resolution_px: 3280x2464
      interface: MIPI_CSI
      module_size_mm: {width: 25, height: 24}
      focus: fixed_focus
      sourcing_url: https://www.alibaba.com/product-detail/IMX219-8MP-120-Degree-Wide-Angle_1601568412012.html
  requirements:
    - module_height_must_clear_cover_glass_and_bezel
    - fixed_focus_preferred_for_first_board
    - fpc_pinout_must_not_conflict_with_rear_camera_connector_family

host_interfaces:
  rear_camera:
    csi_lanes_required: 2
    csi_lanes_preferred: 4
    signals:
      - {contract: CAM0_CSI_CLK_P, module_role: csi_clock_p, direction_at_soc: input}
      - {contract: CAM0_CSI_CLK_N, module_role: csi_clock_n, direction_at_soc: input}
      - {contract: CAM0_CSI_D0_P, module_role: csi_data0_p, direction_at_soc: input}
      - {contract: CAM0_CSI_D0_N, module_role: csi_data0_n, direction_at_soc: input}
      - {contract: CAM0_CSI_D1_P, module_role: csi_data1_p, direction_at_soc: input}
      - {contract: CAM0_CSI_D1_N, module_role: csi_data1_n, direction_at_soc: input}
      - {contract: CAM0_CSI_D2_P, module_role: csi_data2_p, direction_at_soc: input}
      - {contract: CAM0_CSI_D2_N, module_role: csi_data2_n, direction_at_soc: input}
      - {contract: CAM0_CSI_D3_P, module_role: csi_data3_p, direction_at_soc: input}
      - {contract: CAM0_CSI_D3_N, module_role: csi_data3_n, direction_at_soc: input}
      - {contract: CAM0_MCLK, module_role: master_clock, direction_at_soc: output}
      - {contract: CAM0_RESET_N, module_role: reset_n, direction_at_soc: output, default: low}
      - {contract: CAM0_PWDN, module_role: power_down, direction_at_soc: output, default: asserted}
      - {contract: CAM0_AF_I2C_SCL, module_role: vcm_i2c_scl, direction_at_soc: output}
      - {contract: CAM0_AF_I2C_SDA, module_role: vcm_i2c_sda, direction_at_soc: bidirectional}
  front_camera:
    csi_lanes_required: 2
    signals:
      - {contract: CAM1_CSI_CLK_P, module_role: csi_clock_p, direction_at_soc: input}
      - {contract: CAM1_CSI_CLK_N, module_role: csi_clock_n, direction_at_soc: input}
      - {contract: CAM1_CSI_D0_P, module_role: csi_data0_p, direction_at_soc: input}
      - {contract: CAM1_CSI_D0_N, module_role: csi_data0_n, direction_at_soc: input}
      - {contract: CAM1_CSI_D1_P, module_role: csi_data1_p, direction_at_soc: input}
      - {contract: CAM1_CSI_D1_N, module_role: csi_data1_n, direction_at_soc: input}
      - {contract: CAM1_MCLK, module_role: master_clock, direction_at_soc: output}
      - {contract: CAM1_RESET_N, module_role: reset_n, direction_at_soc: output, default: low}

power_sequence:
  status: required_not_implemented
  rails:
    - {name: CAM_AVDD_2V8, owner: PMIC_LDO, status: missing}
    - {name: CAM_DVDD_1V2, owner: PMIC_LDO_or_module_regulator, status: missing}
    - {name: CAM_IOVDD_1V8, owner: PMIC_LDO, status: missing}
    - {name: CAM_AFVDD_2V8, owner: PMIC_LDO, status: rear_only_missing}
  ordered_steps:
    - Keep RESET_N low and PWDN asserted while rails are absent.
    - Enable IOVDD, DVDD, and AVDD per vendor timing.
    - Start MCLK only after rails settle.
    - Release PWDN and RESET_N per vendor timing.
    - Probe sensor over I2C, then enable CSI streaming.

forbidden_claims:
  - camera_ready
  - autofocus_ready
  - camera_hal_ready
  - calibrated_image_quality
