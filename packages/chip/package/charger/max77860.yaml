schema: eliza.charger_binding.v1
as_of: 2026-05-19
part: MAX77860
vendor: Analog Devices (formerly Maxim Integrated)
status: planning_binding_no_bonded_pins_no_fabricated_board
claim_boundary: >
  Planning binding only. No charger IC is mounted, no I2C bonded out, no
  battery wired. Promotion requires bonded I2C and CHG_IRQ_N, board layout,
  and a charge-cycle transcript (CC/CV phases captured).
datasheet_url: https://www.analog.com/en/products/max77860.html
mainline_driver: drivers/power/supply/max77693_charger.c (family)
linux_support:
  driver_status: family_driver_in_mainline_max77693_class
  device_tree_binding: Documentation/devicetree/bindings/power/supply/maxim,max77693.yaml
  power_supply_class: drivers/power/supply/power_supply_core.c
alternative_part:
  vendor: Texas Instruments
  part: BQ25895
  driver_path: drivers/power/supply/bq25890_charger.c
  rationale: BQ25895 is a more universally stocked Type-C 5 A charger with mainline support; carry as alternate.
selected_for:
  - 1S Li-ion / Li-polymer charger with USB-C input.
  - 3-A maximum charge current; OTG 5 V/1.5 A output supported.
  - Mainline power_supply class integration; Linux fuel-gauge support via separate IC (MAX17260 or BQ27Z561).
charge_profile:
  battery_type: 1S_Li_ion_or_Li_polymer
  charge_current_max_a: 3.0
  termination_current_ma: 100
  float_voltage_v: 4.20
  precharge_voltage_v: 3.0
  trickle_current_ma: 256
  jeita_temperature_profile: programmable_via_thermistor_input
host_interfaces:
  i2c:
    bus_address_7bit: 0x6B
    speed_khz_max: 400
    signals:
      - {contract: CHG_I2C_SCL, module_role: i2c_clock, direction_at_soc: output}
      - {contract: CHG_I2C_SDA, module_role: i2c_data, direction_at_soc: bidirectional}
  control:
    signals:
      - {contract: CHG_IRQ_N, module_role: charger_irq, direction_at_soc: input, default_pull: up}
      - {contract: CHG_OTG_EN, module_role: otg_enable, direction_at_soc: output, default: low}
      - {contract: CHG_CE_N, module_role: charge_enable_n, direction_at_soc: output, default: low}
  thermistor:
    signals:
      - {contract: CHG_TS, module_role: battery_thermistor_input, direction_at_soc: analog_input}
power_sequence:
  status: required_not_implemented
  rails:
    - {name: VBUS, owner: USB_PD_controller, status: missing, voltage_v: 5_to_20}
    - {name: VBAT, owner: battery, status: missing, voltage_v: 3.0_to_4.2}
    - {name: VSYS, owner: charger_internal_buck, status: missing, voltage_v: 3.4_min_clamp}
  ordered_steps:
    - VBUS present (from USB-PD source via TPS65987).
    - Charger detects valid input source within USB-PD voltage range.
    - Charger applies precharge to VBAT if below 3.0 V.
    - Linux power_supply class reads charge state via I2C.
    - PMIC takes over from VSYS once battery + input topology is healthy.
android_hal:
  framework: Android Health HAL 2.x (AIDL)
  vintf_entry_planned: android.hardware.health@2.1-service.eliza_ai_soc
  evidence_required:
    - power_supply uevent transcript
    - CC + CV phase captures (voltage and current vs time)
    - JEITA profile compliance under hot/cold conditions
forbidden_claims:
  - charging_active
  - JEITA_compliant
  - Health_HAL_VINTF_compatible
  - OTG_active
cross_references:
  - docs/architecture-optimization/phone-platform.md
  - docs/security/usb-pd-spec.md
  - research/mobile_platform_2026/02_analysis/pmic_and_charging.md
