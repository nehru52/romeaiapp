module: murata_type_1dx_sdio_uart_reference
status: reference_integration_slice_not_committed_bom
linux_support:
  wifi_driver: brcmfmac
  bluetooth_driver: hci_uart_bcm
  firmware_family: brcmfmac43430_sdio
  evidence_manifest: package/wifi/evidence-gates.yaml
radio_claim: external_module_only
selected_for:
  - Linux-supported SDIO WiFi path.
  - UART Bluetooth HCI path.
  - Small external module boundary that keeps RF silicon, matching network,
    antenna, shielding, and certification outside e1-chip.
host_interfaces:
  sdio_wifi:
    bus_width: 4
    initial_speed: sdr25
    io_voltage: 1.8V
    signals:
      - {contract: WIFI_SDIO_CLK, module_role: sdio_clk, direction_at_soc: output}
      - {contract: WIFI_SDIO_CMD, module_role: sdio_cmd, direction_at_soc: bidirectional}
      - {contract: WIFI_SDIO_D0, module_role: sdio_data0, direction_at_soc: bidirectional}
      - {contract: WIFI_SDIO_D1, module_role: sdio_data1, direction_at_soc: bidirectional}
      - {contract: WIFI_SDIO_D2, module_role: sdio_data2, direction_at_soc: bidirectional}
      - {contract: WIFI_SDIO_D3, module_role: sdio_data3, direction_at_soc: bidirectional}
  bluetooth_uart:
    baud_rate_initial: 115200
    baud_rate_runtime: board_validated
    flow_control: true
    signals:
      - {contract: BT_UART_TX, module_role: uart_rx, direction_at_soc: output}
      - {contract: BT_UART_RX, module_role: uart_tx, direction_at_soc: input}
      - {contract: BT_UART_CTS_N, module_role: uart_rts_n, direction_at_soc: input}
      - {contract: BT_UART_RTS_N, module_role: uart_cts_n, direction_at_soc: output}
  control:
    signals:
      - {contract: WIFI_EN, module_role: wl_reg_on, direction_at_soc: output, default: low}
      - {contract: WIFI_RST_N, module_role: module_reset_n_or_bt_reg_on, direction_at_soc: output, default: low}
      - {contract: WIFI_HOST_WAKE, module_role: host_wake, direction_at_soc: input, default_pull: down}
      - {contract: WIFI_IRQ, module_role: wl_host_wake_or_oob_irq, direction_at_soc: input, default_pull: down}
power_sequence:
  status: required_not_implemented
  rails:
    - {name: VBAT, owner: board, status: missing}
    - {name: VDDIO_1V8, owner: board, status: missing}
  default_controls:
    WIFI_EN: low
    WIFI_RST_N: low
  ordered_steps:
    - Keep WIFI_EN and WIFI_RST_N low while VBAT and VDDIO_1V8 are absent or ramping.
    - Bring up board rails and verify 1.8V VDDIO before enabling SDIO, UART, GPIO, IRQ, or wake pins.
    - Assert WIFI_EN only after rails are stable.
    - Release WIFI_RST_N only after the selected module datasheet delay.
    - Start SDIO clock and UART RTS/CTS only after pinctrl and host controllers are ready.
    - Validate WIFI_HOST_WAKE and WIFI_IRQ polarity before suspend/resume claims.
board_requirements:
  power_rails:
    - Module-specific VBAT/VDDIO rails are supplied by the board, not e1-chip.
    - VDDIO must match the selected 1.8 V host IO bank or use level translation.
  rf:
    - Use the module vendor reference layout for antenna, keepout, ground, shield,
      crystal, and matching network requirements.
    - Do not describe this integration as RF silicon in e1-chip.
  bringup:
    - Hold WIFI_EN and WIFI_RST_N low until the SDIO host, UART, clocks, and rails
      are sequenced by board firmware or Linux.
    - Validate SDIO enumeration, brcmfmac firmware load, OOB IRQ, suspend wake,
      and Bluetooth HCI attach on real hardware.
