schema: eliza.wifi_bt_module_binding.v1
as_of: 2026-05-21
module: murata_type_2ea_lbee5xv2ea_802
status: phone_class_sourcing_target_no_bonded_pins_no_fabricated_board
claim_boundary: >
  Planning binding only. No module is mounted, no antenna path is tuned, no
  firmware is packaged, and no Wi-Fi/Bluetooth regulatory evidence exists.

selected_for:
  - Phone-class upgrade over Type 1DX while preserving a shielded module boundary.
  - Wi-Fi 6E tri-band 2x2 MIMO and Bluetooth 5.3 in a small SMT module.
  - Public vendor product page and evaluation hardware.

vendor_public_specs:
  vendor: Murata
  order_number: LBEE5XV2EA-802
  chipset: Infineon_CYW55573
  wireless:
    wifi: 802.11a_b_g_n_ac_ax_2x2_MIMO_2p4_5_6_GHz
    wifi_phy_rate_mbps: 1200
    bluetooth: 5.3_BR_EDR_LE
  interfaces: [PCIe, SDIO, UART, GPIO, PCM]
  io_voltage_v: 1.8
  package_mm: {width: 12.5, height: 9.4, thickness: 1.2}
  temperature_c: {min: -40, max: 85}
  certification_note: FCC_IC_reference_certified
  sourcing_url: https://www.murata.com/en-us/products/connectivitymodule/wi-fi-bluetooth/overview/lineup/type2ea
  product_brief_public_fields:
    url: https://www.murata.com/-/media/webrenewal/products/connectivitymodule/asset/pub/rfm/data/type2ea/type2ea-brief.ashx?cvid=20231215091723000000&la=en-sg
    embedded_artists_m2_module: EAR00413
    wifi_interface: [PCIe_3_0, SDIO_3_0]
    bluetooth_interface: UART
    software: [Linux, Android]
    wifi_max_data_rate_mbps: 1201
    bluetooth_max_data_rate_mbps: 3
    interface_voltage_v: 1.8
  public_source_revalidation:
    checked_date: 2026-05-21
    source_type: direct_murata_vendor_page_opened
    observed_public_fields:
      - LBEE5XV2EA-802 Type 2EA module
      - In Production product status
      - Infineon CYW55573 chipset
      - Wi-Fi 6E 2x2 MIMO over 2.4 GHz, 5 GHz, and 6 GHz
      - Bluetooth 5.3 BR/EDR/LE
      - PCIe and SDIO Wi-Fi host interfaces
      - UART Bluetooth host interface plus GPIO/PCM peripheral interface
      - 12.5 x 9.4 x 1.2 mm shielded resin SMT package
      - 1.8 V interface voltage and -40 to 85 C operating-temperature range
      - FCC/IC reference certified and ETSI report fields
    board_use: primary_wifi6e_bluetooth_5p3_smt_module_top_rf_region
    still_missing_before_use:
      - Murata application note, land pattern, reference layout, and STEP model
      - module pinout, reserved-pin rules, paste-mask guidance, and RF keepouts
      - CYW55573 firmware, NVRAM, CLM, regulatory database, and license archive
      - final antenna gains, conducted RF procedure, coexistence plan, and modular-approval review

fallback:
  module: murata_type_1dx_sdio_uart_reference
  binding: package/wifi/murata-1dx-sdio.yaml
  reason: lower_performance_but_known_linux_brcmfmac_hci_uart_path

host_interfaces:
  wifi_primary:
    preferred_bus: PCIe
    fallback_bus: SDIO
    signals:
      - {contract: WIFI_PCIE_TX_P, module_role: pcie_rx_p, direction_at_soc: output}
      - {contract: WIFI_PCIE_TX_N, module_role: pcie_rx_n, direction_at_soc: output}
      - {contract: WIFI_PCIE_RX_P, module_role: pcie_tx_p, direction_at_soc: input}
      - {contract: WIFI_PCIE_RX_N, module_role: pcie_tx_n, direction_at_soc: input}
      - {contract: WIFI_SDIO_CLK, module_role: sdio_clk, direction_at_soc: output}
      - {contract: WIFI_SDIO_CMD, module_role: sdio_cmd, direction_at_soc: bidirectional}
      - {contract: WIFI_SDIO_D0, module_role: sdio_data0, direction_at_soc: bidirectional}
      - {contract: WIFI_SDIO_D1, module_role: sdio_data1, direction_at_soc: bidirectional}
      - {contract: WIFI_SDIO_D2, module_role: sdio_data2, direction_at_soc: bidirectional}
      - {contract: WIFI_SDIO_D3, module_role: sdio_data3, direction_at_soc: bidirectional}
  bluetooth:
    preferred_bus: UART
    flow_control: true
    signals:
      - {contract: BT_UART_TX, module_role: uart_rx, direction_at_soc: output}
      - {contract: BT_UART_RX, module_role: uart_tx, direction_at_soc: input}
      - {contract: BT_UART_CTS_N, module_role: uart_rts_n, direction_at_soc: input}
      - {contract: BT_UART_RTS_N, module_role: uart_cts_n, direction_at_soc: output}
  control:
    signals:
      - {contract: WIFI_EN, module_role: wl_reg_on, direction_at_soc: output, default: low}
      - {contract: BT_EN, module_role: bt_reg_on, direction_at_soc: output, default: low}
      - {contract: WIFI_HOST_WAKE, module_role: host_wake, direction_at_soc: input}
      - {contract: WIFI_IRQ, module_role: oob_irq, direction_at_soc: input}

layout_requirements:
  module_placement:
    - Follow Murata reference layout for module land pattern, ground, antenna feed, keepout, and matching
      network.
    - Place the shielded SMT module on the top RF island with a short return-stitch path to both antenna
      matching networks.
    - Keep PCIe/SDIO and Bluetooth UART away from cellular RF feeds and display bias switching nodes.
  antenna_plan:
    wifi_bt_rf0: side_plastic_or_top_edge_antenna_after_vendor_review
    wifi_bt_rf1: spatially_separated_side_or_bottom_edge_antenna_after_vendor_review
    matching_required: [WIFI_BT_RF0, WIFI_BT_RF1]
    conducted_access_required_before_matching_network: true
    minimum_isolation_targets:
      wifi_to_cellular_main_db: supplier_defined_before_release
      wifi0_to_wifi1_db: supplier_defined_for_2x2_mimo
  coexistence_requirements:
    - Define WLAN/BT PTA or coexistence pins if required by the CYW55573 firmware package.
    - Run 2.4 GHz Wi-Fi, Bluetooth, cellular transmit, GNSS, display bias, and charger coexistence tests.
    - Confirm country-code/regulatory-domain handling before Android Wi-Fi framework release.
  firmware_and_regulatory:
    - Murata/CYW55573 firmware, NVRAM/CLM blobs, and license terms must be captured before EVT1 software
      image release.
    - Modular approval scope must be reviewed against the final antenna gains and enclosure plastics.

forbidden_claims:
  - wifi_ready
  - bluetooth_ready
  - regulatory_ready
