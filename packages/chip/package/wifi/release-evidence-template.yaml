template: wifi_bluetooth_release_evidence_record
status: template_not_release_evidence
purpose: Capture real WiFi/Bluetooth SDIO, UART, firmware, framework, regulatory, and power-sequencing evidence without treating this template as evidence.
record_location: Add completed records under the relevant required_evidence.<section>.evidence_records list in package/wifi/evidence-gates.yaml.
cli_capture:
  preflight_check: python3 scripts/check_wifi_interface.py
  release_check: python3 scripts/product_check.py --release
  hash_command: shasum -a 256 <real-evidence-file>
artifact_record_required_fields:
  - blocker_id
  - artifact_name
  - artifact_class
  - source_path
  - captured_at
  - captured_by
  - board_or_platform_revision
  - selected_module
  - sha256
metadata_required_fields:
  - host_controller_or_board_source
  - kernel_or_android_build_id
  - firmware_version_when_applicable
  - regulatory_region_when_applicable
  - reviewer
acceptance_required_fields:
  - acceptance_status
  - acceptance_criteria
  - raw_log_or_capture
  - linked_release_blocker
  - supersedes_scaffold_claim
forbidden_claims:
  - Do not claim WiFi or Bluetooth product support from this template alone.
  - Do not mark blockers complete without real SDIO enumeration, hci_uart_bcm attach, firmware provenance, Android framework logs, regulatory scope, and board power evidence as applicable.
  - Do not enable Android feature claims or Linux DTS nodes until the corresponding evidence section is complete.
example_record_shape:
  blocker_id: wifi_sdio_host
  artifact_name: sdio_enumeration_transcript
  artifact_class: SDIO host
  source_path: package/wifi/evidence/host-controller/<real-file>
  captured_at: <iso-8601 timestamp>
  captured_by: <reviewer>
  board_or_platform_revision: <revision>
  selected_module: <module part number>
  sha256: <64 lowercase hex chars>
  acceptance_status: <accepted|approved|pass>
  acceptance_criteria: <release criterion>
  raw_log_or_capture: <path inside source_path or capture identifier>
  linked_release_blocker: wifi_sdio_host
  supersedes_scaffold_claim: true
  reviewer: <reviewer>
