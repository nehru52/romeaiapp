manifest: package_vendor_padframe_evidence
schema: docs/manufacturing/schemas/artifact-manifest.schema.yaml
status: scaffold
release_gate: tapeout_release
policy:
  preflight: Local demo package planning documents may be draft, but vendor/foundry evidence must be explicitly marked missing.
  release: Every artifact must be complete, present, and traceable to source revision or checksum.
artifact_groups:
  package_vendor_release:
    owner: package_closure
    status: missing
    artifacts:
      - name: vendor_package_drawing
        status: missing
        checksum_manifest: docs/manufacturing/evidence/package/vendor-drawing.sha256
        globs:
          - docs/manufacturing/evidence/package/*drawing*
          - package/vendor/*drawing*
        required_metadata:
          - vendor
          - revision
          - source_checksum
          - pin1_orientation
      - name: land_pattern_or_footprint_source
        status: missing
        checksum_manifest: docs/manufacturing/evidence/package/footprint-source.sha256
        globs:
          - docs/manufacturing/evidence/package/*land*
          - docs/manufacturing/evidence/package/*footprint*
          - package/vendor/*land*
          - package/vendor/*footprint*
        required_metadata:
          - source_drawing_revision
          - source_checksum
      - name: package_material_assembly_constraints
        status: missing
        required_metadata:
          - vendor
          - revision
          - source_checksum
          - disposition
        globs:
          - docs/manufacturing/evidence/package/*assembly*
          - docs/manufacturing/evidence/package/*material*
          - package/vendor/*assembly*
  bond_and_cross_probe:
    owner: package_closure
    status: missing
    artifacts:
      - name: bond_diagram
        status: missing
        checksum_manifest: docs/manufacturing/evidence/package/bond-diagram.sha256
        required_metadata:
          - vendor
          - revision
          - source_checksum
          - die_revision
          - package_revision
        globs:
          - docs/manufacturing/evidence/package/*bond*
          - package/vendor/*bond*
      - name: package_padframe_board_cross_probe
        status: missing
        checksum_manifest: docs/manufacturing/evidence/package/package-padframe-board-cross-probe.sha256
        required_metadata:
          - package_pinout_checksum
          - padframe_checksum
          - board_revision
          - reviewer
          - disposition
        globs:
          - docs/manufacturing/evidence/package/*cross-probe*
          - pd/signoff/padframe/*cross-probe*
  local_planning_scaffolds:
    owner: package_closure
    status: draft
    artifacts:
      - name: package_vendor_padframe_cross_probe_action_inventory
        status: draft
        metadata:
          review_date: 2026-05-23
          release_use: prohibited
          disposition: blocked_for_release
          source_checker: scripts/check_package_cross_probe.py
        globs:
          - docs/manufacturing/evidence/package/package-vendor-padframe-action-inventory-2026-05-23.yaml
      - name: demo_qfn64_planning_pinout
        status: draft
        metadata:
          package: e1_demo_qfn64_planning_r0
          planning_revision: 2026-05-17-r0
          release_use: prohibited
        globs:
          - package/e1-demo-pinout.yaml
      - name: demo_qfn64_package_contract
        status: draft
        metadata:
          package: e1_demo_qfn64_planning_r0
          planning_revision: 2026-05-17-r0
          release_use: prohibited
        globs:
          - docs/package/e1-demo-package.md
      - name: demo_qfn64_pad_ring_contract
        status: draft
        metadata:
          package: e1_demo_qfn64_planning_r0
          planning_revision: 2026-05-17-r0
          release_use: prohibited
        globs:
          - docs/package/e1-demo-pad-ring.md
