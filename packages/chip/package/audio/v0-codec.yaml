schema: eliza.audio_binding.v1
as_of: 2026-05-19
status: planning_binding_no_bonded_pins_no_fabricated_board
claim_boundary: >
  Planning audio BOM. No I2S/PDM controller is bonded out, no codec is
  mounted. Promotion requires bonded I2S + PDM + I2C and codec_INT pins,
  board layout, and a per-codec ALSA probe transcript.
codec:
  part: ALC5688
  vendor: Realtek
  datasheet_url: https://www.realtek.com/en/products/communications-network-ics/item/alc5688
  mainline_driver: sound/soc/codecs/rt5682.c (rt5682_*) - ALC5688 is rt5682 variant
  interface: I2S + I2C control
  i2c_address_7bit: 0x1A
  features:
    - Stereo headphone amp with line-out
    - Stereo capture (line-in + headset mic)
    - 24-bit 192 kHz I2S
    - Built-in DC offset cancellation, soft-start, click-suppression
    - Jack-detect interrupt (button + insert)
    - ALSA SoC driver mainline since v4.20
alternative_codec:
  part: TLV320AIC3204
  vendor: Texas Instruments
  driver_path: sound/soc/codecs/tlv320aic32x4.c
  rationale: Carry as alternate; TI codec has broader availability but lacks the integrated headphone amp tuning of ALC5688.
smart_amp:
  part: CS35L41
  vendor: Cirrus Logic
  datasheet_url: https://www.cirrus.com/products/cs35l41/
  mainline_driver: sound/soc/codecs/cs35l41.c
  interface: I2S input + SPI/I2C control
  spi_chip_select_or_i2c_address: 0x40
  features:
    - Mono Class-D smart amp with closed-loop excursion control
    - On-chip DSP for impedance + temperature protection
    - Wake-on-sound capability
voice_pickup:
  mics:
    - count: 2
      part: SPH0641LM4H
      vendor: Knowles
      datasheet_url: https://www.knowles.com/products/microphones/sph0641lm4h-1
      interface: PDM (single-bit)
      features:
        - Bottom-port omnidirectional MEMS
        - 64 dBA SNR
        - Built-in low-power mode for always-on wake-word
host_interfaces:
  i2s:
    bus_id: AUDIO_I2S
    direction_at_soc: bidirectional
    sample_clock_hz_max: 48000
    bclk_max_mhz: 12.288
    signals:
      - {contract: I2S_BCLK, module_role: i2s_bit_clock, direction_at_soc: output}
      - {contract: I2S_LRCLK, module_role: i2s_word_clock, direction_at_soc: output}
      - {contract: I2S_DOUT, module_role: i2s_data_to_codec, direction_at_soc: output}
      - {contract: I2S_DIN, module_role: i2s_data_from_codec, direction_at_soc: input}
  pdm:
    signals:
      - {contract: PDM_CLK, module_role: pdm_clock, direction_at_soc: output}
      - {contract: PDM_DAT, module_role: pdm_data, direction_at_soc: input}
  i2c_control:
    bus_id: AUDIO_I2C
    speed_khz_max: 1000
    signals:
      - {contract: AUDIO_I2C_SCL, module_role: i2c_clock, direction_at_soc: output}
      - {contract: AUDIO_I2C_SDA, module_role: i2c_data, direction_at_soc: bidirectional}
  interrupts:
    signals:
      - {contract: CODEC_INT, module_role: rt5682_jack_int, direction_at_soc: input, default_pull: up}
      - {contract: AMP_INT, module_role: cs35l41_int_b, direction_at_soc: input, default_pull: up}
power_sequence:
  status: required_not_implemented
  rails:
    - {name: VDD_AUDIO_3V3, owner: PMIC_LDO7, status: missing, voltage_v: 3.3}
    - {name: VDD_AMP_3V3, owner: PMIC_LDO_audio, status: missing, voltage_v: 3.3}
    - {name: VDDIO_1V8, owner: PMIC_buck_peri, status: missing, voltage_v: 1.8}
  ordered_steps:
    - Apply VDDIO_1V8 first.
    - Apply VDD_AUDIO_3V3 to codec.
    - Apply VDD_AMP_3V3 to smart amp (must follow codec rail by ≥ 5 ms).
    - I2C control probes both devices; codec configures clocks before stream.
android_hal:
  framework: Android Audio HAL 7.x (AIDL)
  vintf_entry_planned: android.hardware.audio.core@7.1-service.eliza_ai_soc
  evidence_required:
    - aplay / arecord transcript with codec selected
    - dumpsys media.audio_flinger transcript
    - Headphone insert/remove jack-detect transcript
    - Wake-word PDM data integrity check
forbidden_claims:
  - audio_playback
  - wake_word_active
  - Audio_HAL_VINTF_compatible
cross_references:
  - docs/architecture-optimization/phone-platform.md
  - research/mobile_platform_2026/02_analysis/sensors_audio_thermal.md
