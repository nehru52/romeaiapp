schema: eliza.usb_pd_binding.v1
as_of: 2026-05-19
part: TPS65987DDH
vendor: Texas Instruments
status: planning_binding_no_bonded_pins_no_fabricated_board
claim_boundary: >
  Planning binding only. No USB-PD controller is mounted, no I2C bonded out,
  no PD policy is provisioned. Promotion requires bonded I2C, USB-PD
  controller firmware blob, PPS/EPR negotiation transcripts, and CC-line
  oscilloscope captures.
datasheet_url: https://www.ti.com/product/TPS65987DDH
mainline_driver: drivers/usb/typec/tipd/core.c (tps6598x family)
linux_support:
  driver_path: drivers/usb/typec/tipd/tps6598x.c
  driver_status: mainline_since_v5.11
  device_tree_binding: Documentation/devicetree/bindings/usb/ti,tps6598x.yaml
  typec_framework: drivers/usb/typec/class.c
selected_for:
  - Mainline-driver-supported USB-PD PHY + policy engine in a single chip.
  - USB-PD 3.x with PPS 3.3–21 V at 20 mV step.
  - EPR (Extended Power Range) up to 100 W in newer firmware revisions.
  - Dead-battery boot: NMOS Vbus path can start before the AP is powered.
features:
  usb_pd_revision: 3.2
  pps: true
  epr: optional_with_firmware
  data_role:
    - dfp (host)
    - ufp (device)
    - drp (dual-role)
  power_role:
    - source_supported_with_external_path
    - sink_default
  alt_modes:
    - DisplayPort_alt_mode_optional
    - Thunderbolt_alt_mode_not_in_scope
host_interfaces:
  i2c:
    bus_address_7bit: 0x38
    speed_khz_max: 400
    signals:
      - {contract: USBPD_I2C_SCL, module_role: i2c_clock, direction_at_soc: output}
      - {contract: USBPD_I2C_SDA, module_role: i2c_data, direction_at_soc: bidirectional}
  control:
    signals:
      - {contract: USBPD_IRQ_N, module_role: tps_int_n, direction_at_soc: input, default_pull: up}
      - {contract: USBPD_RESET, module_role: tps_reset_n, direction_at_soc: output, default: high}
  cc_lines:
    note: TPS65987DDH handles CC line termination internally; SoC sees USB2 + SuperSpeed via separate routing.
    signals:
      - {contract: USB_DP, module_role: usb2_data_p, direction_at_soc: bidirectional}
      - {contract: USB_DN, module_role: usb2_data_n, direction_at_soc: bidirectional}
power_sequence:
  status: required_not_implemented
  rails:
    - {name: VIN_3V3, owner: PMIC_LDO_or_buck, status: missing, voltage_v: 3.3}
    - {name: VBUS, owner: external_PD_source_or_internal_5V_boost, status: missing, voltage_v: 5_to_20}
  ordered_steps:
    - Apply VIN_3V3 from PMIC LDO.
    - TPS65987DDH boots its on-die firmware from external SPI flash or factory OTP.
    - Firmware sets sink-only default and negotiates with attached PD source.
    - PMIC charger reads VBUS and starts battery charge cycle.
android_hal:
  framework: Android USB HAL + TypeC HAL (AIDL via typec_class kernel framework)
  vintf_entry_planned: android.hardware.usb@3.0-service.eliza_ai_soc
  evidence_required:
    - PD source-cap transcript (lsusb -t)
    - typec_class probe transcript (/sys/class/typec/)
    - PPS/EPR negotiation oscilloscope captures
forbidden_claims:
  - PD_negotiating
  - PPS_active
  - EPR_active
  - usb_typec_HAL_compatible
cross_references:
  - docs/architecture-optimization/phone-platform.md
  - docs/security/usb-pd-spec.md
  - research/mobile_platform_2026/02_analysis/pmic_and_charging.md
  - research/mobile_platform_2026/03_implementation/platform_path_for_e1.md
