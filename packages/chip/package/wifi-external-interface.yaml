interface: wifi_external_module
status: product_scaffold_not_bonded_in_e1_chip
io_voltage: 1.8V
module_boundary: external_wifi_bluetooth_combo
regulatory_boundary: module_and_board
reference_module:
  vendor_family: murata_type_1dx_cyw4343w_class
  host_interface: sdio_wifi_uart_bluetooth
  linux_wifi_driver: brcmfmac
  linux_bluetooth_driver: hci_uart_bcm
  integration_file: package/wifi/murata-1dx-sdio.yaml
  evidence_manifest: package/wifi/evidence-gates.yaml
  commitment: reference_integration_slice_not_committed_bom
fail_closed_policy:
  linux_dts_nodes: disabled_until_host_controller_gpio_pinctrl_regulator_irq_exist
  android_feature_claims: absent_until_framework_hal_and_runtime_evidence_exist
  firmware_artifacts: absent_until_selected_module_license_checksum_and_load_log_exist
  board_release: blocked_until_pin_bank_power_sequence_and_regulatory_evidence_exist
power_sequence_contract:
  status: required_not_implemented
  rails:
    - {name: VBAT, owner: board, required: true}
    - {name: VDDIO_1V8, owner: board, required: true}
  default_controls:
    WIFI_EN: low
    WIFI_RST_N: low
  ordered_steps:
    - Keep WIFI_EN and WIFI_RST_N low while VBAT and VDDIO_1V8 are absent or ramping.
    - Bring up board rails and verify 1.8V VDDIO before enabling SDIO, UART, GPIO, IRQ, or wake pins.
    - Assert WIFI_EN only after rails are stable.
    - Release WIFI_RST_N only after the selected module datasheet delay.
    - Start SDIO clock and UART RTS/CTS only after pinctrl and host controllers are ready.
    - Validate WIFI_HOST_WAKE and WIFI_IRQ polarity before suspend/resume claims.
  firmware_manifest: package/wifi/firmware-artifacts.yaml
  commitment: reference_integration_slice_not_committed_bom
integration_state:
  rtl_host_controller: not_implemented
  gpio_controller: not_implemented
  pinctrl: not_implemented
  regulator_control: not_implemented
  padframe_bonding: not_bonded_in_e1_chip
  firmware_driver: not_implemented
  android_wifi_framework: not_enabled
  rf_certification: module_and_board_responsibility
host_controller_contract:
  required_before_enable:
    - SDIO host controller with 4-bit SDR25 timing and non-removable card support.
    - UART with RTS/CTS hardware flow control for Bluetooth HCI.
    - GPIO controller and pinctrl states for WIFI_EN, WIFI_RST_N, WIFI_IRQ, and WIFI_HOST_WAKE.
    - Regulator or fixed-rail model for module VBAT and 1.8 V VDDIO sequencing.
    - Interrupt-controller binding for OOB wake and suspend/resume tests.
power_sequence:
  default_state: radios_disabled
  rails:
    - {name: module_vbat, owner: board, status: missing}
    - {name: module_vddio_1v8, owner: board, status: missing}
  reset_order:
    - Keep WIFI_EN low and WIFI_RST_N low while rails are off or unstable.
    - Enable board rails and wait for module-specific stabilization time.
    - Assert WIFI_EN, then release WIFI_RST_N after the module datasheet delay.
    - Start SDIO clock only after the host pinctrl state and 1.8 V bank are valid.
  fail_closed_rule: Do not set any DTS node to okay or Android WiFi feature to present until this sequence is backed by board measurements.
groups:
  sdio:
    mode: sdr25_initial
    signals:
      - {name: WIFI_SDIO_CLK, direction: output, reset: low, pull: none}
      - {name: WIFI_SDIO_CMD, direction: bidirectional, reset: input, pull: up}
      - {name: WIFI_SDIO_D0, direction: bidirectional, reset: input, pull: up}
      - {name: WIFI_SDIO_D1, direction: bidirectional, reset: input, pull: up}
      - {name: WIFI_SDIO_D2, direction: bidirectional, reset: input, pull: up}
      - {name: WIFI_SDIO_D3, direction: bidirectional, reset: input, pull: up}
  control:
    signals:
      - {name: WIFI_EN, direction: output, reset: low, pull: down}
      - {name: WIFI_RST_N, direction: output, reset: low, pull: down}
  wake_irq:
    signals:
      - {name: WIFI_HOST_WAKE, direction: input, reset: input, pull: down}
      - {name: WIFI_IRQ, direction: input, reset: input, pull: down}
  bluetooth_uart:
    signals:
      - {name: BT_UART_TX, direction: output, reset: high, pull: none}
      - {name: BT_UART_RX, direction: input, reset: input, pull: up}
      - {name: BT_UART_CTS_N, direction: input, reset: input, pull: up}
      - {name: BT_UART_RTS_N, direction: output, reset: high, pull: none}
  bluetooth_pcm:
    optional: true
    signals:
      - {name: BT_PCM_CLK, direction: bidirectional, reset: input, pull: down}
      - {name: BT_PCM_SYNC, direction: bidirectional, reset: input, pull: down}
      - {name: BT_PCM_DIN, direction: input, reset: input, pull: down}
      - {name: BT_PCM_DOUT, direction: output, reset: low, pull: none}
  coexistence:
    optional: true
    signals:
      - {name: WIFI_COEX_REQ, direction: input, reset: input, pull: down}
      - {name: WIFI_COEX_GRANT, direction: output, reset: low, pull: none}
      - {name: WIFI_COEX_PRI, direction: input, reset: input, pull: down}
board_requirements:
  - External module handles RF and regulatory-critical analog design.
  - Board provides module power rails, antenna path, shielding, and RF keepouts.
  - Host reset defaults keep radios disabled until firmware configures them.
  - Keep Linux and Android WiFi/Bluetooth nodes disabled until SDIO, UART, GPIO, pinctrl, regulator, IRQ, and wake bindings exist.
  - Keep firmware blobs, NVRAM, clm_blob, and Bluetooth patchram as missing evidence until module licensing, checksums, and load logs are archived.
  - Treat antenna gain, SAR, modular approval scope, country-code handling, and regional regulatory filings as board release blockers.
  - Linux and Android DTS nodes must remain disabled until SDIO, UART, GPIO, pinctrl, regulator, and interrupt phandles bind to real controllers.
  - Regulatory domain, antenna gain, SAR exposure, FCC/CE/IC modular approval, and country-code handling are release blockers.
maturity_gates_before_product_claim:
  - Select a concrete WiFi/Bluetooth combo module and bind this contract to its datasheet pins.
  - Add an SDIO host controller and Bluetooth UART/PCM ownership in RTL or platform integration.
  - Bond the required pins in the product padframe and verify package, board, and RTL names match.
  - Add firmware and OS driver bring-up tests for reset sequencing, SDIO enumeration, IRQ, and wake.
  - Archive Android framework evidence for feature XML, supplicant or hostapd, dumpsys wifi, Bluetooth HCI attach, and CTS/VTS subsets.
  - Close the evidence manifest in package/wifi/evidence-gates.yaml before changing status from scaffold.
  - Archive module firmware, NVRAM/clm_blob provenance, licenses, checksums, and regulatory-domain evidence.
  - Prove Android WiFi framework integration with vendorimage, VINTF, supplicant/hostapd, dumpsys wifi, and CTS/VTS logs.
