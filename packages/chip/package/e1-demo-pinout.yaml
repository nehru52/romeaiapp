chip: eliza_e1_demo
package: e1_demo_qfn64_planning_r0
status: local_planning_contract
evidence_class: non_release_demo_planning
release_use: prohibited
revision: 2026-05-17-r0
io_voltage: 3.3V
core_voltage: 1.8V
notes:
  - Non-release demo package contract for KiCad symbol, FPGA harness, and board bring-up planning only.
  - Pin names are aligned to rtl/top/e1_chip_top.sv and pd/padframe/e1_demo_padframe.yaml.
  - This file is not vendor package data, not a bond map, and not a fabrication footprint source.
  - Real foundry pad cells, ESD rules, package drawing, package-vendor footprint evidence, and bond diagram must replace this before fabrication.
release_blockers:
  - package_vendor_drawing_missing
  - bond_diagram_missing
  - foundry_pad_cells_missing
  - package_vendor_footprint_evidence_missing
  - package_electrical_model_missing
  - board_package_cross_probe_missing
package_planning:
  package_family: qfn
  pin_count: 64
  package_outline_mm:
    body_x: 9.0
    body_y: 9.0
    nominal_pitch: 0.50
    exposed_pad: planning_only_unassigned
  pin_numbering:
    orientation: top_view_counterclockwise
    pin_1_location: upper_left_reference_corner
    pins_per_side: 16
  footprint_policy:
    kicad_symbol_allowed_for_planning: true
    kicad_footprint_allowed_for_fabrication: false
    fabrication_source_required: package_vendor_drawing_with_checksum
  side_map:
    north: [1, 16]
    east: [17, 32]
    south: [33, 48]
    west: [49, 64]
electrical_planning:
  clock:
    net: OSC_CLK
    port: CLK_IN
    nominal_frequency_hz: 25000000
    max_planning_frequency_hz: 50000000
    source: board_fpga_contract_and_pd_sdc
  rails:
    VDDIO:
      voltage: 3.3V
      package_pins: [1, 43, 47, 55, 63]
      return_pins: [2, 44, 48, 56, 64]
      first_article_current_limit_ma:
        initial: 25
        hard_stop: 150
      release_requires: post_route_or_measured_io_current_budget
    VDDCORE:
      voltage: 1.8V
      package_pins: [3, 45, 49, 57]
      return_pins: [4, 46, 50, 58]
      first_article_current_limit_ma:
        initial: 50
        hard_stop: 250
      release_requires: post_route_or_measured_core_current_budget
  io_default:
    standard: LVCMOS33_planning
    series_resistor_ohm: 33
    release_requires: foundry_io_cell_model_and_board_si_review
board_interface_groups:
  power:
    nets: [+3V3, +1V8, GND]
    kicad_intent: regulator_outputs_and_local_decoupling
  clock_reset:
    nets: [OSC_CLK, RESET_N]
    kicad_intent: oscillator_or_fpga_clock_and_supervisor_or_header_reset
  debug_mmio:
    nets:
      - MCU_DBG_VALID
      - MCU_DBG_LAUNCH
      - MCU_DBG_WRITE
      - MCU_DBG_READY
      - MCU_DBG_ADDR0
      - MCU_DBG_ADDR1
      - MCU_DBG_ADDR2
      - MCU_DBG_ADDR3
      - MCU_DBG_WDATA0
      - MCU_DBG_WDATA1
      - MCU_DBG_WDATA2
      - MCU_DBG_WDATA3
      - MCU_DBG_RDATA0
      - MCU_DBG_RDATA1
      - MCU_DBG_RDATA2
      - MCU_DBG_RDATA3
    kicad_intent: low_speed_mcu_or_fpga_header
  smoke_outputs:
    nets: [LED0, LED1, LED2, LED3, LED4, LED5, LED6, LED7, TP_IRQ_TIMER, TP_IRQ_DMA, TP_IRQ_NPU, TP_IRQ_VSYNC]
    kicad_intent: led_bank_and_logic_analyzer_test_points
  test_debug:
    nets: [TEST_MODE, JTAG_TCK, JTAG_TMS, JTAG_TDI, JTAG_TDO]
    kicad_intent: normally_unpopulated_debug_header
  no_connect:
    pins: [40, 41, 42, 51, 52, 53, 54, 59, 60, 61, 62]
    policy: leave_unconnected_until_vendor_bond_diagram_assigns_disposition
fpga_planning:
  target_manifest: board/fpga/e1_demo_fpga.yaml
  target_clock_hz: 25000000
  io_standard: LVCMOS33_planning
  release_blocked_until:
    - exact_fpga_board_revision_selected
    - final_lpf_assigns_all_external_ports
    - bitstream_timing_and_pack_reports_archived
    - package_board_cross_probe_passes
