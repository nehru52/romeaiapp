schema: eliza.pkg_signal_group_intent.v1
status: local_planning_contract
release_use: prohibited
claim_boundary: >
  Binds each functional E1 demo package pin to a signal group, a power domain,
  and a target impedance class so SI/PI intent is captured next to the pinout.
  It is cross-probed against package/e1-demo-pinout.yaml by logical-name equality
  and never edits it. The demo QFN64 carries only single-ended LVCMOS33 nets, so
  no controlled-impedance diff pairs are asserted here; impedance classes are
  recorded as planning intent only. This is not field-solver output, not an
  impedance signoff, and not a fabrication footprint source.

pinout_source: package/e1-demo-pinout.yaml

impedance_classes:
  lvcmos33_uncontrolled:
    kind: single_ended
    controlled: false
    target_impedance_ohm: uncontrolled_planning
    coupon_plan_ref: null
    note: >
      Low-speed LVCMOS33 bring-up nets on the QFN64 demo. No controlled-impedance
      requirement; series-resistor termination is captured in the pinout
      electrical_planning.io_default. A controlled class is only required once a
      high-speed PHY pin group is added.
  rail_dc:
    kind: power
    controlled: false
    target_impedance_ohm: pdn_z_target_blocked
    coupon_plan_ref: null
    note: >
      Power/ground rails. Target PDN impedance stays blocked on a PDN Z
      extraction; only the rail name and domain are bound here.

# Forward-looking classes that map to the routed phone-board coupon plan.
# They are NOT exercised by the demo pinout (no diff pairs); they exist so a
# future high-speed package can reference the same impedance vocabulary the
# board coupon plan already uses. Cross-checked for definition consistency only.
phone_board_impedance_classes:
  usb2_diff:
    coupon_plan_ref: board/kicad/e1-phone/evt1-stackup-impedance-coupon-plan.yaml#impedance_coupon_requests.usb2_90_ohm
    target_impedance_ohm: 90
  mipi_dphy_diff:
    coupon_plan_ref: board/kicad/e1-phone/evt1-stackup-impedance-coupon-plan.yaml#impedance_coupon_requests.mipi_dphy_100_ohm
    target_impedance_ohm: 100
  pcie_diff:
    coupon_plan_ref: board/kicad/e1-phone/evt1-stackup-impedance-coupon-plan.yaml#impedance_coupon_requests.pcie_85_ohm
    target_impedance_ohm: 85
  rf_single:
    coupon_plan_ref: board/kicad/e1-phone/evt1-stackup-impedance-coupon-plan.yaml#impedance_coupon_requests.rf_50_ohm
    target_impedance_ohm: 50

power_domains:
  PD_IO_3V3:
    voltage: 3.3V
    rail_net: +3V3
    return_net: GND
  PD_CORE_1V8:
    voltage: 1.8V
    rail_net: +1V8
    return_net: GND
  PD_NONE:
    voltage: na
    rail_net: na
    return_net: na

# diff_pairs lists controlled-impedance pairs by logical pin name. Each member
# must exist in the pinout. The demo has none; the list is empty and the checker
# fail-closes if any signal group claims a diff pair member that is absent.
diff_pairs: []

signal_groups:
  - id: clock_reset
    impedance_class: lvcmos33_uncontrolled
    power_domain: PD_IO_3V3
    members: [CLK_IN, RST_N]
  - id: debug_mmio
    impedance_class: lvcmos33_uncontrolled
    power_domain: PD_IO_3V3
    members:
      - DBG_VALID
      - DBG_LAUNCH
      - DBG_WRITE
      - DBG_ADDR
      - DBG_WDATA
      - DBG_RDATA
      - DBG_READY
  - id: irq_test_points
    impedance_class: lvcmos33_uncontrolled
    power_domain: PD_IO_3V3
    members: [IRQ_TIMER, IRQ_DMA, IRQ_NPU, IRQ_VSYNC]
  - id: gpio_led_bank
    impedance_class: lvcmos33_uncontrolled
    power_domain: PD_IO_3V3
    members: [GPIO]
  - id: jtag_test
    impedance_class: lvcmos33_uncontrolled
    power_domain: PD_IO_3V3
    members: [TEST_MODE, JTAG_TCK, JTAG_TMS, JTAG_TDI, JTAG_TDO]

rail_groups:
  - id: io_rail
    impedance_class: rail_dc
    power_domain: PD_IO_3V3
    rail_names: [VDDIO0, VDDIO1, VDDIO2, VDDIO3, VDDIO4]
    return_names: [VSSIO0, VSSIO1, VSSIO2, VSSIO3, VSSIO4]
  - id: core_rail
    impedance_class: rail_dc
    power_domain: PD_CORE_1V8
    rail_names: [VDDCORE0, VDDCORE1, VDDCORE2, VDDCORE3]
    return_names: [VSSCORE0, VSSCORE1, VSSCORE2, VSSCORE3]

release_blockers:
  - field_solver_impedance_extraction_missing
  - pdn_z_target_extraction_missing
  - controlled_impedance_diff_pairs_not_yet_defined_for_high_speed_package
