schema: eliza.ai_eda.external_asset_schema.v1
name: ai_eda_external_asset_manifest.v1
required_fields:
  - id
  - name
  - kind
  - priority
  - source_url
  - license_status
  - revision
  - expected_size
  - checksum_status
  - allowed_use
  - e1_lane
  - fetch
  - validation
allowed_kind:
  - repo
  - dataset
  - model
  - paper
allowed_priority:
  - P0
  - P1
  - P2
  - P3
allowed_use:
  - metadata-only
  - training-only
  - advisory-inference-only
  - deterministic-replay-candidate
  - blocked
required_fetch_fields:
  - mode
  - command
  - dry_run_command
  - verify_command
required_validation_fields:
  - license_review
  - provenance_review
  - hash_verification
  - deterministic_replay_required
  - release_use_allowed
policy:
  large_payloads_committed: forbidden
  release_claims_from_predictions: forbidden
  deterministic_gate_required: true
