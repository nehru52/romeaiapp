schema: eliza.ai_eda.external_sources_lock.v1
updated: 2026-05-21
claim_boundary: external_asset_registry_only_no_download_training_inference_or_release_claim
policy:
  large_payloads_committed: forbidden
  release_claims_from_predictions: forbidden
  deterministic_gate_required: true
  license_review_required_before_download: true
  human_review_required_before_source_change: true
