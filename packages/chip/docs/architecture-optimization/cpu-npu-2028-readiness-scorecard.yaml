schema: eliza.cpu_npu_2028_readiness_scorecard.v1
status: modeled_ready_release_blocked
claim_allowed: false
release_claim_allowed: false
phone_class_claim_allowed: false
benchmark_claim_allowed: false
tapeout_claim_allowed: false
silicon_claim_allowed: false
claim_boundary: 'Consolidated CPU+NPU 2028 readiness audit for this local tree. This can pass modeled
  architecture consistency only; it cannot approve phone-class benchmark, AOSP, PDK, post-route, or silicon
  claims without the listed release gates passing with real evidence.

  '
source_artifacts:
  optimized_work_order: docs/architecture-optimization/soc-optimized-operating-point.yaml
  optimizer_report: benchmarks/results/soc-optimized-operating-point.json
  design_space_frontier: benchmarks/results/cpu-npu-2028-design-space-frontier.json
  modeled_benchmark_report: benchmarks/results/modeled-cpu-npu-2028-local/report.json
  modeled_benchmark_eval: benchmarks/results/cpu-npu-2028-modeled-eval.json
  npu_context_queue_sim: benchmarks/results/npu-context-queue-sim.json
  memory_iommu_qos_sim: benchmarks/results/memory-iommu-qos-sim.json
  burst_sustained_policy: benchmarks/results/cpu-npu-2028-burst-sustained-policy.json
  burst_thermal_transient: benchmarks/results/cpu-npu-2028-burst-thermal-transient.json
  aosp_governor_trace: benchmarks/results/cpu-npu-2028-aosp-governor-trace.json
  process_14a_eval: benchmarks/results/cpu-npu-2028-14a-process-eval.json
  competitive_envelope: benchmarks/results/cpu-npu-2028-competitive-envelope.json
  tapeout_readiness_audit: benchmarks/results/cpu-npu-2028-tapeout-readiness-audit.json
  phone_cpu_benchmark_gate: build/reports/cpu_phone_benchmark_claim_gate.json
  phone_cpu_l5_l6_report: build/reports/cpu_phone_l5_l6_benchmark_report.json
  optimizer_command: make soc-optimization
  design_space_frontier_command: make cpu-npu-design-space-frontier
  modeled_benchmark_command: make benchmark-modeled-cpu-npu
  modeled_benchmark_eval_command: make cpu-npu-modeled-benchmark-eval
  npu_context_queue_sim_command: make npu-context-queue-sim-check
  memory_iommu_qos_sim_command: make memory-iommu-qos-sim-check
  burst_sustained_policy_command: make cpu-npu-burst-sustained-policy
  burst_thermal_transient_command: make cpu-npu-burst-thermal-transient
  aosp_governor_trace_command: make cpu-npu-aosp-governor-trace
  process_14a_eval_command: make cpu-npu-14a-process-eval
  competitive_envelope_command: make cpu-npu-competitive-envelope
  tapeout_readiness_audit_command: make cpu-npu-tapeout-readiness-audit
  phone_cpu_l5_l6_command: make cpu-phone-l5-l6-benchmark-report
  work_order_check_command: make soc-optimization-work-order
  scorecard_check_command: make cpu-npu-2028-readiness-scorecard
modeled_operating_point:
  cpu_cores: 2
  cpu_base_frequency_hz: 3200000000
  cpu_base_ipc: 1.8
  cpu_base_power_w: 1.4
  npu_base_tops: 44.0
  npu_base_power_w: 1.2
  memory_sustained_gbps: 240.0
modeled_constraints:
  max_die_c: 95.0
  min_bandwidth_margin_gbps: 0.0
  min_npu_tops: 20.0
  requires_no_modeled_throttle: true
modeled_summary:
  no_modeled_throttle: true
  max_die_temp_c: 78.10407520000001
  max_total_power_w: 4.56854
  min_bandwidth_margin_gbps: 32.80000000000001
  min_composite_perf_per_w: 0.7762635365079037
  min_npu_int8_tops: 24.3936
  process_corner_count: 4
  scenario_count: 3
modeled_robustness:
  pass: true
  case_count: 6
  max_die_temp_c: 89.58743576
  max_total_power_w: 4.676456999999999
  min_bandwidth_margin_gbps: 23.560000000000002
  min_composite_perf_per_w: 0.725014346244828
  min_npu_int8_tops: 23.17392
  failing_cases: []
proof_domains:
  - id: cpu_ap
    current_state: blocked_until_real_generated_ap_linux_evidence
    gate_command: make cpu-ap-completion-gate
    evidence_artifacts:
      - build/chipyard/eliza_rocket/ElizaRocketConfig.manifest.json
      - build/evidence/cpu_ap/eliza_e1_opensbi_boot.log
      - build/evidence/cpu_ap/eliza_e1_linux_boot.log
      - build/evidence/cpu_ap/eliza_e1_ap_benchmarks.log
  - id: branch_prediction
    current_state: blocked_until_full_trace_phone_workload_mpki_evidence
    gate_command: make branch-prediction-check
    evidence_artifacts:
      - docs/arch/branch-prediction.md
      - docs/evidence/cpu_ap/branch-prediction-params.json
      - docs/evidence/cpu_ap/mpki_results_cbp5_rtl.json
      - docs/evidence/cpu_ap/mpki_results_workload_rtl.json
  - id: npu_nnapi
    current_state: blocked_until_real_e1_npu_accelerator_selection
    gate_command: make e1-npu-nnapi-proof-check
    evidence_artifacts:
      - docs/spec-db/e1-npu-runtime-contract.json
      - docs/npu/2028-targets.md
      - benchmarks/results/npu-context-queue-sim.json
  - id: aosp_simulator
    current_state: blocked_until_local_aosp_virtual_device_evidence
    gate_command: make aosp-simulator-completion-check
    evidence_artifacts:
      - build/reports/android_sim_boot.json
      - docs/evidence/android/cuttlefish_riscv64_smoke.log
      - docs/evidence/android/qemu_riscv64_smoke.log
      - docs/evidence/android/renode_e1_soc_smoke.log
  - id: benchmarks
    current_state: blocked_until_target_binaries_and_calibrated_metadata
    gate_command: make benchmarks
    evidence_artifacts:
      - benchmarks/results/report.json
      - docs/benchmarks/report-schema.yaml
      - benchmarks/configs/target-metadata.example.json
  - id: sustained_power_thermal
    current_state: blocked_until_measured_sustained_trace
    gate_command: make power-thermal-evidence-check
    evidence_artifacts:
      - benchmarks/power/manifests/e1-npu-sustained-capture.template.json
  - id: memory_uma
    current_state: blocked_until_real_lpddr_uma_iommu_qos_evidence
    gate_command: make memory-uma-claim-gate
    evidence_artifacts:
      - docs/evidence/memory/uma-dram-evidence-gate.yaml
      - docs/evidence/memory/templates/bandwidth-latency-contended-access.template.json
      - benchmarks/results/memory-iommu-qos-sim.json
  - id: process_14a
    current_state: blocked_until_pdk_extracted_timing_power_thermal_signoff
    gate_command: make process-14a-effects-check
    evidence_artifacts:
      - docs/spec-db/process-14a-effects.yaml
  - id: physical_signoff
    current_state: blocked_until_14a_pdk_post_route_signoff
    gate_command: make pd-signoff-check
    evidence_artifacts:
      - pd/signoff/manifest.yaml
      - docs/pd/signoff-evidence-template.md
required_benchmark_plan_entries:
  - coremark
  - stream
  - lmbench_bw_mem
  - lmbench_lat_mem_rd
  - tflite_cpu
  - tflite_e1_npu
  - npu_arch_sim_open_2028
  - npu_arch_sim_sota_2028
  - simulator_arch_metrics
  - cpu_arch_sim_sota_2028
required_phone_cpu_l5_l6_entries:
  - spec_cpu2017
  - coremark
  - dhrystone
  - jetstream2
  - lmbench_bw_mem
  - lmbench_lat_mem_rd
release_claim_forbidden_until:
  - cpu_ap has real generated AP boot and benchmark transcripts.
  - branch_prediction has full CBP-5, SPEC, AOSP cold-launch, and JS/V8/ART MPKI traces with phone/prototype metadata.
  - npu_nnapi has real e1-npu accelerator selection with zero CPU fallback.
  - aosp_simulator has local AOSP virtual-device boot and smoke logs.
  - benchmarks has target binaries plus calibrated power, thermal, clock, memory, process metadata.
  - sustained_power_thermal has measured aligned trace evidence.
  - memory_uma has real LPDDR, UMA, IOMMU/SMMU, and QoS stress evidence.
  - process_14a and physical_signoff use selected PDK extracted reports.
