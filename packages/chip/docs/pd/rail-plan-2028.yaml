    nominal_v: 0.70
    dvfs_min_v: 0.55
    dvfs_max_v: 0.95
    dvfs_step_mv: 6.25
    peak_a: 3.5
    avg_a: 1.0
    regulator: external_buck_plus_on_die_dldo
    on_die_dldo: per_core
    domain: cpu_big
    decoupling_nf:
      on_die_target: 600
      package_target: 4000
      board_target: 22000
