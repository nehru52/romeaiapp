schema: eliza.rail_plan.v1
status: authoritative_planning_release_blocked
claim_allowed: false
release_claim_allowed: false
pdn_signoff_claim_allowed: false
pmic_procurement_claim_allowed: false
measured_silicon_claim_allowed: false
tapeout_claim_allowed: false
production_readiness_claim_allowed: false
claim_boundary: >
  This file is the authoritative 16-rail target plan for the Eliza E1 2028
  mobile-class SKU. Voltages, current budgets, and decoupling targets are
  modeled engineering targets derived from sub-report C.2 of
  docs/architecture-optimization/sota-2028/power-delivery.md and the operating
  point in docs/architecture-optimization/soc-optimized-operating-point.yaml.
  It is not measured silicon evidence, not a PMIC vendor procurement record,
  and not a signed-off PDN signoff report.
source_artifacts:
  - docs/architecture-optimization/sota-2028/power-delivery.md
  - docs/architecture-optimization/soc-optimized-operating-point.yaml
  - docs/architecture-optimization/physical-power-thermal.md
  - docs/spec-db/process-14a-effects.yaml
process:
  marketing_name: 14A / 1.4 nm class
  primary_variant: frontside_pdn_a14_class
  follow_on_variant: backside_pdn_or_super_power_rail_follow_on
  follow_on_status: 2029_re_spin_not_2028_critical_path
soc_topology:
  cpu_big_cores: 2
  cpu_little_cores: 4
  npu_dense_int8_tops_target: 44.0
  gpu_present: true
  display_present: true
  lpddr_class: LPDDR5X
  usb_phy_class: USB3
  pcie_phy_class: PCIe_Gen4
budgets:
  sustained_w: 3.5
  burst_peak_w: 12.0
  idle_w: 1.0
  max_die_tj_c: 95.0
  per_rail_avg_a_meaning: workload_active_average_not_time_average
  notes: >
    Two budget tiers consumed by the rail plan: idle (~1 W) for ambient
    leakage + AON, and burst_peak (~12 W) representing a 1-second
    sum-of-standalone-peaks envelope that is regulated down by the
    thermal throttle ladder in fw/pmc/src/thermal_policy.c. The sustained
    target (3.5 W) is the system-level independent-throttle envelope and
    is NOT a sum of per-rail avg_a values, because per-rail avg_a is the
    workload-active average for that rail (e.g. NPU avg = NPU running a
    workload, not NPU time-averaged including idle). The sustained
    envelope is enforced at the throttle policy, not at the rail plan.
control_interfaces:
  pmic_to_soc:
    primary: SPMI_v2
    fallback: I2C_FM_PLUS_1MHZ
    notes: SPMI v2.0 is the industry default; I2C is preserved for bench bring-up.
  s_mode_to_pmc:
    primary: SBI_MPXY_v1_RPMI_v1_0
    fallback: PSCI_style_direct_calls
    notes: >
      SBI MPxy + RPMI v1.0 are ratified (SBI v3.0, RPMI v1.0). Linux drivers
      landed in 6.x in 2025. Pin OpenSBI release at silicon bring-up; document
      fallback to direct PSCI-style calls if the kernel driver regresses.
rails:
