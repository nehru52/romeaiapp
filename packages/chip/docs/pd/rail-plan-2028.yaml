sum_check:
  standalone_peak_sum_w_modeled: 12.77
  workload_active_sum_w_modeled: 5.350
  burst_peak_w_target: 12.0
  workload_active_sum_w_target: 5.5
  notes: >
    standalone_peak_sum_w_modeled is the simple sum of nominal_v * peak_a
    across all 16 rails (12.77 W) and bounds the worst 1-second burst
    envelope. workload_active_sum_w_modeled is the sum of nominal_v *
    avg_a (5.35 W); this is the worst-case sum if every rail simultaneously
    ran its declared workload-active average. The sustained 3.5 W
    independent-throttle target is enforced by
    fw/pmc/src/thermal_policy.c and the AVFS loop, not by per-rail budgets.
    Final numbers require vector-driven post-route power signoff.
release_blockers:
  - PMIC vendor or discrete BOM not selected. See docs/pd/pmic-selection.md.
  - Vector-driven dynamic IR-drop signoff per rail not produced. See docs/evidence/power/pdn-signoff-gate.yaml.
  - Per-corner DVFS tables not generated. See docs/evidence/power/dvfs-table-evidence.yaml.
  - UPF (pd/upf/e1_soc_top.upf) not run through commercial low-power signoff (VC LP / Conformal LP).
  - Per-rail decoupling actual placement not budgeted in pd/openroad floorplan.
  - PDN impedance Z(f) profile not produced for 1 kHz - 1 GHz under package + board model.
release_use: prohibited_until_external_review
