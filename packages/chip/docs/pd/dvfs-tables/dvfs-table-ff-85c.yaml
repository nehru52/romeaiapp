claim_boundary: Per-corner placeholder for the FF process / 85 C thermal corner. Values
  are planning derates from docs/pd/dvfs-tables/dvfs-table-tt-25c.yaml using the rule
  in scripts/gen_dvfs_table_placeholders.py. Any cell that would fall outside the
  rail plan's [dvfs_min_v, dvfs_max_v] window is marked pending_silicon_corner_sta
  and is not a signed-off operating point. Replace with STA-corner-bin output from
  pd/signoff/sta/ff-85c/ before signoff.
