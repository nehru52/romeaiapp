schema: eliza.dvfs_table.v1
status: placeholder_release_blocked
corner: tt
process_temperature_c: 25
release_use: prohibited_until_external_review
corner_status: placeholder_pending_silicon_corner_sta
claim_boundary: >
  Canonical TT/25 C placeholder. Values are planning estimates derived from
  docs/architecture-optimization/soc-optimized-operating-point.yaml and
  docs/pd/rail-plan-2028.yaml. Every operating point lies inside the rail
  plan's [dvfs_min_v, dvfs_max_v] window (enforced by
  scripts/check_dvfs_tables.py). Other corner files derate from this anchor
  via scripts/gen_dvfs_table_placeholders.py. Not silicon characterization
  data; not release-grade.
source_artifacts:
  - docs/pd/rail-plan-2028.yaml
  - docs/architecture-optimization/soc-optimized-operating-point.yaml
rails:
  VDD_CPU_BIG:
    operating_points:
