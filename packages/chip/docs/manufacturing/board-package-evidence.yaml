schema: eliza.board_package_evidence.v1
evidence_manifest: board_package_vendor_fab_evidence
status: release_blocked
owner: product_physical_closure
release_gate: board_fabrication_release
capture_template: docs/manufacturing/board-package-release-evidence-template.yaml
scaling_assessment: docs/manufacturing/board-package-2028-scaling-checklist.yaml
evidence_record_requirements:
  linked_release_gate: board_fabrication_release
  accepted_release_statuses:
    - accepted
    - approved
    - pass
  supersedes_placeholder_required: true
  required_fields:
    - blocker_id
    - artifact_name
    - artifact_class
    - source_path
    - source_owner
    - captured_at
    - captured_by
    - immutable_revision_or_lot
    - sha256
    - vendor_or_tool
    - revision
    - source_document
    - package_or_board_revision
    - reviewer
    - acceptance_status
    - acceptance_criteria
    - review_record
    - linked_release_gate
    - supersedes_placeholder
policy:
  preflight: Verify placeholder board/package blockers are explicit and no missing vendor or KiCad artifact is claimed complete.
  release: Require real package-vendor, KiCad source, fab export, cross-probe, DFM, SI/PI, and current-limit evidence.
next_commands:
  preflight: python3 scripts/check_board_package_evidence.py
  release_gate: python3 scripts/check_board_package_evidence.py --release
  product_release_gate: python3 scripts/product_check.py --release
  hash_artifact: shasum -a 256 <real-evidence-file>
source_contracts:
  package_pinout: package/e1-demo-pinout.yaml
  padframe_contract: pd/padframe/e1_demo_padframe.yaml
  board_cross_probe: docs/board/kicad/e1-demo/package-pinout-cross-probe.yaml
  board_fab_notes: docs/board/kicad/e1-demo/fab-notes.md
placeholder_blockers:
  - id: placeholder_package_pinout
    file: package/e1-demo-pinout.yaml
    required_text:
      - e1_demo_qfn64_planning_r0
      - Non-release demo package contract
  - id: draft_package_contract
    file: docs/package/e1-demo-package.md
    required_text:
      - local planning data only
      - package vendor/foundry evidence
  - id: kicad_placeholder_notes
    file: docs/board/kicad/e1-demo/fab-notes.md
    required_text:
      - "Evidence class: `non_release_demo_planning`"
      - not derived from an approved package-vendor drawing
      - "SI/PI and PDN review approval: `missing`"
artifact_groups:
  package_vendor:
    owner: package_closure
    status: missing
    artifacts:
      - name: package_vendor_drawing
        release_blocker_id: package_drawing
        release_blocker: Package drawing is missing; no vendor package drawing with revision, source SHA, and pin-1 orientation is archived.
        status: missing
        globs:
          - docs/manufacturing/evidence/package/*drawing*
          - package/vendor/*drawing*
        required_metadata:
          - vendor
          - revision
          - source_sha256
          - pin1_orientation
      - name: land_pattern_or_footprint_source
        release_blocker_id: footprint_source
        release_blocker: Package land-pattern or footprint source is missing; no vendor-derived footprint evidence is archived.
        status: missing
        globs:
          - docs/manufacturing/evidence/package/*land*
          - docs/manufacturing/evidence/package/*footprint*
          - package/vendor/*land*
          - package/vendor/*footprint*
        required_metadata:
          - source_drawing_revision
          - source_sha256
      - name: bond_diagram
        release_blocker_id: bond_diagram
        release_blocker: Bond diagram is missing; package pins are not proven against die pads or padframe pads.
        status: missing
        globs:
          - docs/manufacturing/evidence/package/*bond*
          - package/vendor/*bond*
        required_metadata:
          - vendor
          - revision
          - source_sha256
  kicad_sources:
    owner: board_closure
    status: draft
    artifacts:
      - name: kicad_project
        release_blocker_id: kicad_project
        release_blocker: KiCad project is draft planning source, not release-checked fabrication evidence.
        status: draft
        globs:
          - board/kicad/e1-demo/*.kicad_pro
      - name: kicad_schematic
        release_blocker_id: kicad_schematic
        release_blocker: KiCad schematic is draft planning source, not release-checked fabrication evidence.
        status: draft
        globs:
          - board/kicad/e1-demo/*.kicad_sch
      - name: kicad_pcb
        release_blocker_id: kicad_pcb
        release_blocker: KiCad PCB is draft planning source, not release-checked fabrication evidence.
        status: draft
        globs:
          - board/kicad/e1-demo/*.kicad_pcb
      - name: vendor_derived_footprint
        release_blocker_id: vendor_derived_footprint
        release_blocker: Vendor-derived KiCad footprint is missing; the local planning footprint is not fabrication evidence.
        status: draft
        globs:
          - board/kicad/e1-demo/**/*.pretty/*.kicad_mod
        required_metadata:
          - source_drawing_revision
          - source_sha256
  fab_exports:
    owner: board_closure
    status: draft
    artifacts:
      - name: erc_transcript
        release_blocker_id: erc
        release_blocker: KiCad ERC transcript is draft planning evidence only; release requires rerun after vendor-derived footprint and final schematic.
        status: draft
        globs:
          - board/kicad/e1-demo/reports/*erc*.txt
          - board/kicad/e1-demo/reports/*erc*.log
          - board/reports/fab/**/*erc*.txt
          - board/reports/fab/**/*erc*.log
      - name: drc_transcript
        release_blocker_id: drc
        release_blocker: KiCad DRC transcript is draft planning evidence only; release requires rerun after vendor-derived footprint and final board rules.
        status: draft
        globs:
          - board/kicad/e1-demo/reports/*drc*.txt
          - board/kicad/e1-demo/reports/*drc*.log
          - board/reports/fab/**/*drc*.txt
          - board/reports/fab/**/*drc*.log
      - name: gerbers
        release_blocker_id: gerbers
        release_blocker: Gerber outputs exist as draft planning exports only; release requires vendor-footprint regeneration and DFM acceptance.
        status: draft
        globs:
          - board/kicad/e1-demo/fab/gerbers/*.gbr
          - board/kicad/e1-demo/fab/gerbers/*.gbrjob
          - board/reports/fab/**/gerbers/*.g*
          - board/reports/fab/**/gerbers/*.gbrjob
      - name: drill
        release_blocker_id: drill
        release_blocker: Drill outputs exist as draft planning exports only; release requires final board stackup and fabrication review.
        status: draft
        globs:
          - board/kicad/e1-demo/fab/drill/*.drl
          - board/kicad/e1-demo/fab/drill/*.xln
          - board/reports/fab/**/drill/*.drl
          - board/reports/fab/**/drill/*.xln
      - name: bom
        release_blocker_id: bom
        release_blocker: BOM export exists as draft planning evidence only; release requires approved MPNs and package-derived U1 footprint.
        status: draft
        globs:
          - board/kicad/e1-demo/fab/bom/*.csv
          - board/kicad/e1-demo/fab/bom/*.xml
          - board/reports/fab/**/*bom*.csv
          - board/reports/fab/**/*bom*.xml
      - name: pick_and_place
        release_blocker_id: pick_and_place
        release_blocker: Pick-and-place export exists as draft planning evidence only; release requires final footprints and assembly review.
        status: draft
        globs:
          - board/kicad/e1-demo/fab/position/*.pos
          - board/kicad/e1-demo/fab/position/*.csv
          - board/reports/fab/**/*position*.pos
          - board/reports/fab/**/*position*.csv
  release_reviews:
    owner: manufacturing_closure
    status: draft
    artifacts:
      - name: package_padframe_board_cross_probe
        release_blocker_id: cross_probe
        release_blocker: Package-padframe-board cross-probe report is local draft evidence only; vendor package, foundry padframe, and board release cross-probe evidence is missing.
        status: draft
        globs:
          - docs/manufacturing/evidence/package/*cross-probe*
          - docs/manufacturing/evidence/board/*cross-probe*
        required_metadata:
          - package_pinout_sha256
          - board_revision
          - reviewer
      - name: assembly_dfm_review
        release_blocker_id: dfm
        release_blocker: Assembly DFM review is local draft evidence only; assembly-house DFM release evidence is missing.
        status: draft
        globs:
          - docs/manufacturing/evidence/board/*dfm*
          - board/reports/fab/*dfm*
      - name: board_si_pi_review
        release_blocker_id: si_pi
        release_blocker: Board SI/PI review is local draft evidence only; released stackup, impedance, package model, and board SI/PI signoff evidence is missing.
        status: draft
        globs:
          - board/reports/si/**/*
          - board/reports/pi/**/*
          - docs/manufacturing/evidence/board/*si*
          - docs/manufacturing/evidence/board/*pi*
      - name: first_article_current_limits
        release_blocker_id: first_article
        release_blocker: First-article current-limit record is a draft local plan only; measured first-article current-limit and stop-condition evidence is missing.
        status: draft
        globs:
          - docs/manufacturing/evidence/current/**/*
          - board/reports/fab/*current*
