real_world_gap_manifest: docs/manufacturing/real-world-verification-gaps.yaml
physical_closure_work_order: docs/manufacturing/physical-closure-work-order.yaml
blocked_gates:
  pd_release:
    blocked: true
    evidence_manifest: pd/signoff/manifest.yaml
    reason: Routed PD closure artifacts are archived, but antenna and post-route timing/DRV closure remain non-clean in the selected run.
    unblock_requires:
      - Pass scripts/check_pd_closure.py against one complete routed run with zero antenna, timing, and DRV violations.
      - Replace antenna/STA waivers with release-clean signoff reports.
  tapeout_release:
    blocked: true
    evidence_manifest: pd/signoff/manifest.yaml
    reason: Package, padframe, SI/PI, PDN/current-budget, and thermal evidence is incomplete.
    unblock_requires:
      - Replace placeholder package and padframe plans with vendor/foundry artifacts.
      - Close SI/PI, PDN/current-budget, and thermal readiness sections in pd/signoff/manifest.yaml.
  board_fabrication_release:
    blocked: true
    evidence_manifest: docs/manufacturing/release-manifest.yaml
    reason: Board fabrication package has draft KiCad exports and local review notes, but vendor-derived footprint, assembly DFM signoff, SI/PI signoff, and first-article evidence are not complete.
    unblock_requires:
      - Release a KiCad schematic/PCB package from vendor footprint data.
      - Archive release ERC, DRC, Gerber, drill, BOM, position, DFM, current-limit, and first-article evidence that supersedes the local drafts.
      - Pass scripts/check_kicad_artifacts.py and scripts/check_manufacturing_artifacts.py without release blockers.
readiness:
  si_pi:
    status: blocked
    evidence_manifest: pd/signoff/manifest.yaml
  pdn_current_budget:
