known_waivers:
  - The MVP is a padless digital macro/top wrapper, not a foundry padframe-inclusive standalone chip.
  - OpenLane/OpenROAD signoff artifacts are required before any tapeout claim.
  - The NPU, DMA, and display blocks are behavioral contract stubs, not production IP.
