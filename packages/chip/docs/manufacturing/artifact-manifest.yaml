manifest: manufacturing_physical_evidence
schema: docs/manufacturing/schemas/artifact-manifest.schema.yaml
status: scaffold
policy:
  preflight: Validate manifest shape, path hygiene, and explicit release blockers.
  release: Require every artifact below to be complete and backed by existing files.
release_gates:
  pd_release:
    blocked: true
    reason: OpenLane/OpenROAD signoff outputs are missing.
  tapeout_release:
    blocked: true
    reason: Package, padframe, SI/PI, current, and thermal evidence is missing.
  board_fabrication_release:
    blocked: true
    reason: KiCad project, fabrication outputs, DFM, and board review evidence is missing.
artifact_manifests:
  - package/artifact-manifest.yaml
  - board/kicad/e1-demo/artifact-manifest.yaml
  - board/kicad/e1-phone/artifact-manifest.yaml
  - board/fpga/artifact-manifest.yaml
  - pd/signoff/manifest.yaml
artifact_groups:
  blocker_ledgers:
    release_gate: tapeout_release
    owner: manufacturing_closure
    status: draft
    artifacts:
      - name: product_package_board_pd_blocker_ledger
        status: draft
        globs:
          - docs/manufacturing/product-package-board-pd-blockers-2026-05-17.md
  kicad_project:
    release_gate: board_fabrication_release
    owner: board_closure
    status: draft
    artifacts:
      - name: kicad_project
        status: draft
        globs:
          - board/kicad/e1-demo/*.kicad_pro
      - name: kicad_schematic
        status: draft
        globs:
          - board/kicad/e1-demo/*.kicad_sch
      - name: kicad_pcb
        status: draft
        globs:
          - board/kicad/e1-demo/*.kicad_pcb
      - name: kicad_symbol_and_footprint_libraries
        status: draft
        globs:
          - board/kicad/e1-demo/**/*.kicad_sym
          - board/kicad/e1-demo/**/*.pretty/*.kicad_mod
  kicad_fabrication_outputs:
    release_gate: board_fabrication_release
    owner: board_closure
    status: draft
    artifacts:
      - name: erc_transcript
        status: draft
        clean_regex: "(?i)(0\\s+errors?|erc\\s+(clean|pass(?:ed)?))"
        fail_regex: "(?i)(errors?\\s*[:=]\\s*[1-9][0-9]*|fail(?:ed|ure)?|violations?\\s*[:=]\\s*[1-9][0-9]*|found\\s+[1-9][0-9]*\\s+violations?)"
        globs:
          - board/kicad/e1-demo/reports/erc*.txt
          - board/reports/fab/**/*erc*.txt
      - name: drc_transcript
        status: draft
        clean_regex: "(?i)(0\\s+(drc\\s+)?violations?|drc\\s+(clean|pass(?:ed)?))"
        fail_regex: "(?i)(errors?\\s*[:=]\\s*[1-9][0-9]*|fail(?:ed|ure)?|violations?\\s*[:=]\\s*[1-9][0-9]*|found\\s+[1-9][0-9]*\\s+violations?)"
        globs:
          - board/kicad/e1-demo/reports/drc*.txt
          - board/reports/fab/**/*drc*.txt
      - name: gerber_archive
        status: draft
        globs:
          - board/kicad/e1-demo/fab/gerbers/*.gbr
          - board/reports/fab/**/gerbers/*.g*
          - board/kicad/e1-demo/fab/gerbers/*.zip
      - name: drill_archive
        status: draft
        globs:
          - board/kicad/e1-demo/fab/drill/*.drl
          - board/reports/fab/**/drill/*.drl
          - board/kicad/e1-demo/fab/drill/*.zip
      - name: fabrication_bom
        status: draft
        globs:
          - board/kicad/e1-demo/fab/bom/*.csv
          - board/kicad/e1-demo/fab/bom/*.xml
          - board/reports/fab/**/*bom*.csv
      - name: pick_and_place
        status: draft
        globs:
          - board/kicad/e1-demo/fab/position/*.pos
          - board/kicad/e1-demo/fab/position/*.csv
          - board/reports/fab/**/*position*.csv
  si_pi_current_thermal:
    release_gate: tapeout_release
    owner: si_pi_closure
    status: draft
    artifacts:
      - name: board_signal_integrity_report
        status: draft
        globs:
          - board/reports/si/**/*
          - docs/manufacturing/evidence/board/**/*si*
          - docs/manufacturing/evidence/board/*si-pi*
          - pd/signoff/si-pi/board-si/**/*
      - name: board_power_integrity_report
        status: draft
        globs:
          - board/reports/pi/**/*
          - docs/manufacturing/evidence/board/**/*pi*
          - docs/manufacturing/evidence/board/*si-pi*
          - pd/signoff/si-pi/power-integrity/**/*
      - name: rail_current_budget
        status: draft
        globs:
          - docs/manufacturing/evidence/current/**/*
          - pd/reports/power/**/*
      - name: thermal_review
        status: draft
        globs:
          - docs/manufacturing/evidence/thermal/**/*
          - board/reports/thermal/**/*
