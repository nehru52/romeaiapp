schema: eliza.product_feature_evidence.v1
status: release_blocked
source_gap_manifest: docs/manufacturing/real-world-verification-gaps.yaml
claim_boundary: >
  This manifest records release blockers and future evidence commands for phone
  product features. It is not implementation evidence and must remain blocked
  until hardware, lab, certification, or target-OS transcripts are archived.
global_policy:
  local_checks_may_only_claim:
    - Manifest structure is valid.
    - Release blockers are explicit.
    - Future evidence commands are named.
  forbidden_release_claims_until_evidence:
    - CTS passed.
    - VTS passed.
    - GMS ready.
    - Android product feature implemented.
  required_evidence_metadata:
    - hardware_revision
    - serial_or_board_id
    - os_build_or_firmware_revision
    - command_transcript
    - timestamp
    - operator
    - pass_fail_criteria
    - raw_log_path
  required_android_release_evidence:
    - CTS/VTS result archive for each declared Android HAL or feature.
    - GMS/GTS certification or explicit non-GMS SKU waiver.
    - Target-OS feature declaration diff tied to source/prebuilt HAL evidence.
  scoped_fail_closed_domains:
    - modem_radio
    - wifi_bluetooth_gnss_nfc
    - sensors_input_haptics
    - battery_pmic_thermal
domains:
  - id: modem_radio
    owner: modem_cellular_closure
    release_gap_id: cellular_modem_stack
    status: blocked_not_implemented
    local_check: scripts/check_real_world_gates.py
    evidence_paths:
      - docs/manufacturing/evidence/modem/
      - docs/manufacturing/evidence/regulatory/
    forbidden_claims:
      - Cellular works.
      - Carrier ready.
      - PTCRB ready.
    hardware_commands:
      - mmcli -L
      - mmcli -m <modem-index> --output-keyvalue
      - nmcli dev status
      - adb shell dumpsys telephony.registry
      - adb shell dumpsys radio
      - journalctl -b -u ModemManager --no-pager
      - adb shell service list | grep -Ei 'radio|phone|ims'
    release_evidence:
      - Modem enumeration, firmware, SIM or eSIM, registration, data, voice or IMS disposition, SMS disposition, reset recovery, and suspend wake transcript.
      - Carrier, PTCRB, GCF, SAR, RF exposure, and regional certification evidence or explicit no-cellular SKU waiver.
    android_declaration_policy: >
      Radio AIDL, VINTF, SELinux, VTS, and CTS declarations must remain
      fail-closed until the selected modem evidence and certification records
      are checked in.
    unblock_requires:
      - Selected modem module or no-cellular SKU decision record with bands, countries, SIM/eSIM, antenna path, power/reset/wake, host interface, firmware, driver, and certification owner.
      - Hardware transcript with board ID proving modem enumeration, firmware identity, SIM/eSIM state, registration, data session, voice/IMS disposition, SMS disposition, reset recovery, suspend wake, and thermal backoff behavior.
      - Android Radio AIDL, telephony framework, VINTF, SELinux, VTS, CTS, and feature-declaration evidence, or an explicit Android no-telephony feature diff.
      - PTCRB, GCF, SAR/RF exposure, regional radio certification, carrier, emergency-service, and accepted waiver records for the exact SKU and antenna configuration.
  - id: wifi_bluetooth_gnss_nfc
    owner: wireless_closure
    release_gap_id: wifi_bluetooth_gnss_nfc_stack
    status: blocked_reference_scaffold_only
    local_check: scripts/check_wifi_interface.py
    evidence_paths:
      - docs/manufacturing/evidence/wireless/
      - docs/manufacturing/evidence/regulatory/
    forbidden_claims:
      - Wi-Fi works.
      - Bluetooth qualified.
      - GNSS/NFC implemented.
    hardware_commands:
      - iw dev
      - nmcli device wifi list
      - adb shell dumpsys wifi
      - bluetoothctl show
      - gpspipe -w -n 20
      - nfc-list
      - adb shell dumpsys bluetooth_manager
      - adb shell dumpsys location
      - adb shell dumpsys nfc
    release_evidence:
      - Wi-Fi association, throughput, country-code, MAC provisioning, suspend wake, and recovery transcript.
      - Bluetooth HCI attach, BLE scan, pairing, declared profile behavior, GNSS fix or simulator lock, NFC tag or reader transcript, coexistence review, and certification evidence.
    android_declaration_policy: >
      Wi-Fi, Bluetooth, GNSS, NFC, VINTF, SELinux, and CTS declarations must
      remain fail-closed until RF coexistence and Android evidence are checked
      in.
    unblock_requires:
      - Selected Wi-Fi/BT, GNSS, and NFC module or controller records with datasheets, host buses, clocks, resets, IRQ/wake lines, regulators, firmware/NVRAM ownership, antenna path, and certification boundary.
      - Hardware transcript with board ID proving enumeration, firmware load, Wi-Fi association, IP throughput, country code, MAC provisioning, Bluetooth HCI attach, BLE scan, pairing, GNSS lock, NFC operation, suspend wake, and reset recovery.
      - Android Wi-Fi, Bluetooth, GNSS, and NFC feature declaration diff, VINTF, SELinux, vendorimage file list, framework dumpsys logs, VTS, CTS, and CTS Verifier evidence for every declared service.
      - RF coexistence, antenna, SAR/RF exposure where applicable, Bluetooth qualification, Wi-Fi regulatory, NFC compliance, and accepted module-grant reuse or lab records for the exact SKU.
  - id: camera_isp
    owner: camera_closure
    release_gap_id: camera_isp_stack
    status: blocked_not_implemented
    local_check: scripts/check_real_world_gates.py
    evidence_paths:
      - docs/manufacturing/evidence/camera/
    forbidden_claims:
      - Camera works.
      - ISP tuned.
      - Android camera HAL ready.
    hardware_commands:
      - media-ctl -p
      - v4l2-ctl --list-devices
      - v4l2-ctl --stream-mmap --stream-count=60 --stream-to=/tmp/camera.raw
      - dumpsys media.camera
    release_evidence:
      - Sensor, lens, actuator, flash, CSI, clock, reset, regulator, ISP, tuning, calibration, privacy-indicator, still, and video evidence.
      - Linux V4L2 or Android camera HAL compliance transcript and failure recovery evidence.
  - id: audio
    owner: audio_closure
    release_gap_id: audio_codec_dsp_stack
    status: blocked_not_implemented
    local_check: scripts/check_real_world_gates.py
    evidence_paths:
      - docs/manufacturing/evidence/audio/
    forbidden_claims:
      - Audio works.
      - Microphone ready.
      - Android audio HAL ready.
    hardware_commands:
      - aplay -l
      - arecord -l
      - speaker-test -D <device> -c 2 -t wav
      - arecord -D <device> -f S16_LE -r 48000 -d 5 /tmp/mic.wav
      - dumpsys audio
    release_evidence:
      - Playback, capture, loopback, routing, volume, mute, underrun, suspend resume, jack, speaker, microphone, codec, amplifier, and safety evidence.
      - Android audio policy or ALSA UCM evidence plus acoustic/privacy review.
  - id: sensors_input_haptics
    owner: input_sensors_closure
    release_gap_id: sensors_input_haptics_stack
    status: blocked_not_implemented
    local_check: scripts/check_real_world_gates.py
    evidence_paths:
      - docs/manufacturing/evidence/sensors-input/
    forbidden_claims:
      - Touch works.
      - Sensors work.
      - Haptics works.
    hardware_commands:
      - getevent -lp
      - evtest
      - iio_info
      - dumpsys sensorservice
      - cmd vibrator vibrate 250
      - adb shell getevent -lp
      - adb shell dumpsys input
      - adb shell dumpsys vibrator
    release_evidence:
      - Touch, buttons, IMU, proximity, ambient light, magnetometer, fingerprint if declared, haptic actuation, calibration, wake, and ESD evidence.
      - Android input and Sensors HAL CTS/VTS or equivalent target transcript.
    android_declaration_policy: >
      Sensors HAL, input, haptics, VINTF, SELinux, CTS, and CTS Verifier
      declarations must remain fail-closed until selected hardware and factory
      calibration evidence are checked in.
    unblock_requires:
      - Selected IMU, ambient/proximity, touch controller, buttons, haptic driver, fingerprint if declared, regulators, IRQ/wake lines, mechanical stack, calibration storage, and self-test ownership records.
      - Hardware transcript with board ID proving input event delivery, IIO enumeration, sample rate, timestamp monotonicity, FIFO batching, flush, overflow, calibration persistence, suspend wake, haptic actuation, reset recovery, and ESD/environmental disposition.
      - Android input device, Sensors HAL, vibrator HAL, VINTF, SELinux, sensorservice, dumpsys input, VTS, CTS, and CTS Verifier evidence for every declared feature.
      - Factory calibration limits, calibration blob provenance, mechanical/ESD review, and accepted waivers for missing sensors or unsupported wake-up behavior.
  - id: usb_storage_update
    owner: platform_io_closure
    release_gap_id: usb_storage_update_stack
    status: blocked_not_implemented
    local_check: scripts/check_real_world_gates.py
    evidence_paths:
      - docs/manufacturing/evidence/usb-storage-update/
    forbidden_claims:
      - USB-C ready.
      - Storage ready.
      - OTA ready.
    hardware_commands:
      - lsusb -t
      - adb devices -l
      - fastboot devices
      - lsblk -o NAME,SIZE,MODEL,SERIAL
      - update_engine_client --status
    release_evidence:
      - USB role, Type-C/PD policy, ADB, fastboot, storage integrity, partition map, AVB, OTA success/failure, rollback, recovery, and secure wipe evidence.
      - USB-IF or Type-C/PD compliance evidence for any marked claim.
  - id: battery_pmic_thermal
    owner: power_thermal_closure
    release_gap_id: battery_pmic_thermal_stack
    status: blocked_not_implemented
    local_check: scripts/check_real_world_gates.py
    evidence_paths:
      - docs/manufacturing/evidence/power-thermal/
    forbidden_claims:
      - Battery ready.
      - Charger safe.
      - Thermal closed.
    hardware_commands:
      - upower -d
      - cat /sys/class/power_supply/*/uevent
      - cat /sys/class/thermal/thermal_zone*/temp
      - adb shell dumpsys battery
      - adb shell dumpsys thermalservice
      - adb shell dumpsys power
      - dmesg | grep -Ei 'pmic|charger|thermal|battery|fuel'
    release_evidence:
      - Charge, discharge, fuel gauge, regulator telemetry, thermal zones, throttling, shutdown, brownout, suspend leakage, ship mode, and safety evidence.
      - Battery shipping, charger compliance, and thermal chamber evidence.
    android_declaration_policy: >
      Health, Power, Thermal, VINTF, SELinux, VTS, and CTS declarations must
      remain fail-closed until selected battery and PMIC safety evidence are
      checked in.
    unblock_requires:
      - Selected battery cell/pack, protection, PMIC, charger, fuel gauge, regulators, thermistors, thermal zones, USB-C/PD contract, ship mode, brownout, enclosure thermal path, and rail load-step records.
      - Hardware transcript with board ID proving rail sequencing, current limits, charge/discharge, charger fault handling, fuel-gauge accuracy, thermistor and thermal-zone readings, throttling, shutdown, brownout recovery, suspend leakage, ship mode, and resume behavior.
      - Android Health, Power, Thermal, charger mode, VINTF, SELinux, battery stats, power profile, VTS, CTS, and framework dumpsys evidence tied to measured kernel telemetry.
      - Battery safety, shipping classification, charger/USB-C compliance, thermal chamber, skin-temperature, current-limit, and accepted waiver records for the exact cell, enclosure, and SKU.
  - id: secure_boot_tee_debug
    owner: security_closure
    release_gap_id: secure_boot_key_debug_policy
    status: blocked_not_implemented
    local_check: scripts/check_real_world_gates.py
    evidence_paths:
      - docs/manufacturing/evidence/security/
    forbidden_claims:
      - Secure boot enabled.
      - TEE ready.
      - Debug locked.
    hardware_commands:
      - fastboot getvar all
      - adb shell getprop ro.boot.verifiedbootstate
      - adb shell getprop ro.boot.flash.locked
      - adb shell dmesg | grep -Ei 'secure|verified|avb|rollback|fuse|jtag|tee|keymint'
    release_evidence:
      - Signed boot acceptance, unsigned image rejection, rollback rejection, debug lock/unlock, key erasure, TEE/KeyMint or secure-element behavior, and device identity evidence.
      - Threat model, key ceremony, signer/HSM logs, OTP/fuse, lifecycle, RMA, and manufacturing provisioning evidence.
  - id: privacy
    owner: privacy_compliance_closure
    release_gap_id: privacy_data_protection_policy
    status: blocked_not_implemented
    local_check: scripts/check_real_world_gates.py
    evidence_paths:
      - docs/manufacturing/evidence/privacy/
      - docs/manufacturing/evidence/compliance/
    forbidden_claims:
      - Privacy compliant.
      - Telemetry reviewed.
      - User data wipe verified.
    hardware_commands:
      - adb shell appops get --uid
      - adb shell cmd sensor_privacy list
      - adb shell dumpsys permission
      - adb shell dumpsys dropbox
      - adb shell settings get secure advertising_id
    release_evidence:
      - Data-flow inventory, permissions, indicators, telemetry defaults, identifier reset, log redaction, secure wipe, factory reset, retention, deletion, and consent evidence.
      - Privacy incident-response and post-market obligation records.
  - id: regulatory_sar_ptcrb_fcc
    owner: compliance_closure
    release_gap_id: regulatory_compliance_release
    status: blocked_not_implemented
    local_check: scripts/check_real_world_gates.py
    evidence_paths:
      - docs/manufacturing/evidence/regulatory/
      - docs/manufacturing/evidence/compliance/
    forbidden_claims:
      - FCC ready.
      - SAR passed.
      - PTCRB ready.
    hardware_commands:
      - cat /proc/device-tree/model
      - getprop ro.product.model
      - getprop ro.boot.hardware.sku
      - scripts/check_real_world_gates.py
    release_evidence:
      - FCC, CE, UKCA, ISED, PTCRB, GCF, SAR/RF exposure, safety, EMC, Bluetooth, Wi-Fi, USB, battery, charger, RoHS/REACH, WEEE, labels, and manual evidence.
      - Product compliance matrix with target countries, standards, owners, lab reports or grant reuse analysis, exceptions, and post-market obligations.
  - id: factory_test
    owner: manufacturing_test_closure
    release_gap_id: factory_test_provisioning_flow
    status: blocked_not_implemented
    local_check: scripts/check_real_world_gates.py
    evidence_paths:
      - docs/manufacturing/evidence/factory/
      - docs/manufacturing/evidence/security/
    forbidden_claims:
      - Factory test ready.
      - Calibration complete.
      - Provisioning ready.
    hardware_commands:
      - adb shell getprop ro.serialno
      - adb shell getprop ro.boot.verifiedbootstate
      - adb shell getprop ro.boot.flash.locked
      - adb shell dumpsys battery
      - adb shell cmd wifi status
    release_evidence:
      - Automated station coverage for power, boot, storage, USB, display, touch, camera, audio, radios, sensors, haptics, thermal, secure boot, and debug lock.
      - Serialization, MAC and IMEI if cellular, key provisioning, calibration, labeling, yield, retest, quarantine, traceability, and manufacturing data-retention evidence.
