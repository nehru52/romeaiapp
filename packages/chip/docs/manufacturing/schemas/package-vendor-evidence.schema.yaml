$schema: https://json-schema.org/draft/2020-12/schema
$id: https://eliza.example/schemas/package-vendor-evidence.schema.yaml
title: Package vendor evidence record
type: object
required:
  - artifact_id
  - vendor
  - revision
  - source_checksum
  - disposition
properties:
  artifact_id:
    type: string
    minLength: 1
  vendor:
    type: string
    minLength: 1
  revision:
    type: string
    minLength: 1
  source_checksum:
    type: string
    pattern: "^[0-9a-f]{64}$"
  pin1_orientation:
    type: string
    minLength: 1
  source_drawing_revision:
    type: string
    minLength: 1
  die_revision:
    type: string
    minLength: 1
  package_revision:
    type: string
    minLength: 1
  reviewer:
    type: string
    minLength: 1
  disposition:
    enum: [blocked, approved, approved_with_waivers]
additionalProperties: false
