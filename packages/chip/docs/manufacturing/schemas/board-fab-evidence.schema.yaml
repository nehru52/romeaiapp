$schema: https://json-schema.org/draft/2020-12/schema
$id: https://eliza.example/schemas/board-fab-evidence.schema.yaml
title: Board fabrication evidence record
type: object
required:
  - artifact_id
  - board_revision
  - source_checksum
  - disposition
properties:
  artifact_id:
    type: string
    minLength: 1
  board_revision:
    type: string
    minLength: 1
  source_revision:
    type: string
    minLength: 1
  source_checksum:
    type: string
    pattern: "^[0-9a-f]{64}$"
  package_pinout_checksum:
    type: string
    pattern: "^[0-9a-f]{64}$"
  kicad_schematic_checksum:
    type: string
    pattern: "^[0-9a-f]{64}$"
  kicad_pcb_checksum:
    type: string
    pattern: "^[0-9a-f]{64}$"
  stackup_revision:
    type: string
    minLength: 1
  rail_model_revision:
    type: string
    minLength: 1
  rail_limit_revision:
    type: string
    minLength: 1
  reviewer:
    type: string
    minLength: 1
  disposition:
    enum: [blocked, approved, approved_with_waivers]
additionalProperties: false
