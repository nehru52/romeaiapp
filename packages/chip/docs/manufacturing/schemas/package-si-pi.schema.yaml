$schema: https://json-schema.org/draft/2020-12/schema
$id: https://eliza.example/schemas/package-si-pi.schema.yaml
title: Package SI/PI model evidence record
description: >
  Formalizes the IBIS, S-parameter, and parasitic-model record requirements that
  a package/board SI/PI signoff artifact must carry before any electrical claim.
  Sibling to package-vendor-evidence.schema.yaml. A record validates structure
  only; it does not by itself unblock SI/PI closure, which still requires the
  named field-solver/simulator outputs to be present and reviewed.
type: object
required:
  - artifact_id
  - model_class
  - vendor
  - revision
  - source_checksum
  - extraction_tool
  - disposition
properties:
  artifact_id:
    type: string
    minLength: 1
  model_class:
    enum: [ibis, ibis_ami, touchstone_sparameter, spice_subckt, rlck_parasitic, pdn_z_profile]
  vendor:
    type: string
    minLength: 1
  revision:
    type: string
    minLength: 1
  source_checksum:
    type: string
    pattern: "^[0-9a-f]{64}$"
  extraction_tool:
    type: object
    required: [name, version]
    properties:
      name:
        type: string
        minLength: 1
      version:
        type: string
        minLength: 1
    additionalProperties: false
  touchstone_ports:
    type: integer
    minimum: 1
  frequency_range_hz:
    type: array
    items:
      type: number
      minimum: 0
    minItems: 2
    maxItems: 2
  pvt_corners:
    type: array
    items:
      type: string
      minLength: 1
    minItems: 1
  die_revision:
    type: string
    minLength: 1
  package_revision:
    type: string
    minLength: 1
  board_revision:
    type: string
    minLength: 1
  reviewer:
    type: string
    minLength: 1
  disposition:
    enum: [blocked, approved, approved_with_waivers]
additionalProperties: false
