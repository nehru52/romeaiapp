$schema: https://json-schema.org/draft/2020-12/schema
$id: https://eliza.example/schemas/fab-package-checksum-manifest.schema.yaml
title: Fabrication package checksum manifest
type: object
required:
  - manifest_id
  - generated_at
  - artifacts
properties:
  manifest_id:
    type: string
    minLength: 1
  generated_at:
    type: string
    format: date-time
  artifacts:
    type: array
    minItems: 1
    items:
      type: object
      required: [path, sha256, source]
      properties:
        path:
          type: string
          minLength: 1
        sha256:
          type: string
          pattern: "^[0-9a-f]{64}$"
        source:
          type: string
          minLength: 1
        revision:
          type: string
      additionalProperties: false
additionalProperties: false
