# Canonical comparison: the E1 cluster vs the best open-source RISC-V cores.
#
# Purpose: give E1 and the open RISC-V state of the art a single, claim-tagged,
# machine-checkable comparison frame. The benchmark goal behind this file:
# "benchmark our chip against the best open RISC-V chip; compare in every
# respect; if we are not beating it, review why and how to beat it."
#
# HONESTY CONTRACT (enforced by scripts/check_open_core_comparison.py):
#   Every numeric cell is a mapping with a `value` and a `claim`. The claim is
#   one of:
#     measured  - produced by a real run of code in THIS repo; must carry an
#                 `evidence` path that exists on disk.
#     published - an external vendor/academic figure; must carry a `source`.
#     modeled   - an architectural model/projection; must carry a `claim_level`
#                 from docs/benchmarks/claim-ladder.md.
#     target    - a design target, not an observation; must carry a `claim_level`.
#     blocked   - not obtainable yet; must carry a `blocker`.
#   No silicon performance numbers are asserted for E1: it has no silicon.
schema: eliza.open_riscv_core_comparison.v1
generated_at_utc: "2026-05-21T16:30:00Z"
claim_allowed: false
release_claim_allowed: false
silicon_performance_claim_allowed: false
tapeout_claim_allowed: false
phone_performance_claim_allowed: false

description: >-
  E1 is a heterogeneous 1+3+4 cluster that ADOPTS best-in-class open RISC-V
  cores per tier rather than designing every core from scratch: the little
  core (e1-pro) IS the CVA6/Ariane core, the mid core (e1-premium) is XiangShan
  Kunminghu, and the big core (e1-ultra) is the open XiangShan Kunminghu V3
  8-wide scale-up (Tenstorrent Ascalon was surveyed but rejected: no published
  mobile-volume IP license). The single
  highest-performance open core in existence is XiangShan Kunminghu; the most
  mature, silicon-proven open in-order core is CVA6/Ariane. This file compares
  E1 (per role) against that open cohort on every axis, then renders the
  E1-vs-Ariane verdict per axis.

claim_legend:
  measured: Real run of repo code; evidence file on disk.
  published: External vendor/academic figure; source cited.
  modeled: Architectural model/projection at the stated claim level.
  target: Design target, not an observation, at the stated claim level.
  blocked: Not obtainable yet; blocker stated.

units:
  coremark_per_mhz: CoreMark score per MHz (frequency-independent integer throughput).
  dmips_per_mhz: Dhrystone MIPS per MHz.
  specint2006_per_ghz: SPECint2006 points per GHz.
  ipc: Instructions retired per cycle (workload-dependent; note workload).
  mpki_geomean: Branch mispredicts per kilo-instruction, geometric mean over the trace set.
  frequency_ghz: Clock frequency.

# ---------------------------------------------------------------------------
# Cohort: E1 roles + the best open RISC-V cores. All E1-selected cores are
# open-source. Proprietary cores (Ventana Veyron, Tenstorrent Ascalon) were
# surveyed but are NOT selected; where mentioned they are flagged
# open_source:false and marked rejected.
# ---------------------------------------------------------------------------
cores:

  e1_pro:
    label: "E1 e1-pro (little core, x4)"
    role: little
    is_e1: true
    vendor: OpenHW (adopted by E1)
    open_source: true
    identical_to: cva6
    note: >-
      e1-pro IS the CVA6 RV64GC core (docs/evidence/cpu_ap/core-selection.json,
      little_core_e1_pro selected via the CVA6 wrapper). Its scalar performance
      equals CVA6 by construction; E1 does not try to "beat" Ariane here, it
      adopts it as the correct open in-order design point.
    isa: RV64GC
    microarch:
      pipeline_stages: 6
      ordering: in-order
      decode_width: 1
      issue_width: 1
      rob_entries: 0
    branch_predictor: "CVA6 BHT(128 x 2-bit) + BTB(32, indirect only) + RAS(2)"
    cache:
      l1i: 16-32 KiB
      l1d: 16-32 KiB
      l2: shared 256 KiB (cluster)
    frequency:
      target_ghz: {value: 2.2, claim: target, claim_level: L1_RTL_FULL_SOC}
    metrics:
      coremark_per_mhz: {value: 2.16, claim: measured, claim_level: L1_RTL_FULL_SOC, evidence: docs/evidence/cpu_ap/cva6-coremark-verilator.json}
      dmips_per_mhz: {value: 1.17, claim: measured, claim_level: L1_RTL_FULL_SOC, evidence: docs/evidence/cpu_ap/cva6-dhrystone-verilator.json}
      coremark_per_mhz_published_ref: {value: 2.83, claim: published, source: "OpenHW CVA6 user manual (OpenHW reference toolchain; our xpack-gcc rerun on the same RTL measured 2.16)"}
      coremark_functional_insns_per_iter: {value: 406456.76, claim: measured, evidence: docs/evidence/cpu_ap/cva6-coremark-qemu.json}
      synth_fmax_mhz_asap7: {value: 222.4, claim: measured, claim_level: L1_RTL_FULL_SOC, evidence: docs/evidence/cpu_ap/e1-pro-synth-ppa.json}
      synth_area_mm2_asap7: {value: 0.0543, claim: measured, claim_level: L1_RTL_FULL_SOC, evidence: docs/evidence/cpu_ap/e1-pro-synth-ppa.json}
    silicon_status: "Silicon-proven as CVA6 (1.7 GHz GF22FDX); not yet taped out as e1-pro."
    verification_maturity: "Inherits CVA6 core-v-verif maturity upstream; E1 integration RVFI not yet wired."

  e1_premium:
    label: "E1 e1-premium (mid core, x3)"
    role: mid
    is_e1: true
    vendor: ICT/XiangShan (adopted by E1)
    open_source: true
    identical_to: xiangshan_kunminghu
    note: >-
      e1-premium is XiangShan Kunminghu (mid_core_e1_premium, "selected pending
