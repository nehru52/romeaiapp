schema: eliza.ai_eda.tool_action_schemas.v1
updated: 2026-05-20
claim_boundary: tool_action_schema_only_no_tool_execution_design_change_or_release_claim
policy:
  default_mode: dry_run
  write_capable_actions_enabled: false
  generated_outputs_root: build/ai_eda/tool_actions
  source_tree_write_forbidden: true
  release_use_allowed: false
allowed_action_types:
  - openroad_tcl
  - openlane_config_sweep
  - yosys_recipe
  - cocotb_seed
  - log_triage
  - artifact_parse
forbidden_action_types:
  - source_rtl_patch
  - pdk_rule_patch
  - signoff_waiver_generation
  - gds_direct_edit
  - liberty_patch
required_fields:
  - schema
  - id
  - action_type
  - intent
  - mode
  - scope
  - command
  - inputs
  - outputs
  - safety
  - replay
  - decision
  - claim_boundary
required_nested:
  scope:
    - read_paths
    - write_paths
    - forbidden_paths
  command:
    - tool
    - argv
  outputs:
    - report
    - artifacts
  safety:
    - source_tree_write_allowed
    - release_use_allowed
    - deterministic_replay_required
    - human_review_required
  replay:
    - dry_run_command
    - verification_gates
  decision:
    - status
    - reason
allowed_modes:
  - dry_run
  - parse_only
  - advisory_execute
  - blocked
allowed_decision_status:
  - pending
  - dry_run_only
  - blocked
  - rejected
  - accepted_for_quarantined_replay
tool_allowlist:
  openroad:
    allowed_modes:
      - dry_run
      - parse_only
      - advisory_execute
    required_gates:
      - ai-eda-e1-openlane-convert
      - ai-eda-openlane-flow-labels
      - human_review
  openlane:
    allowed_modes:
      - dry_run
      - parse_only
      - advisory_execute
    required_gates:
      - openlane-run-preflight-check
      - ai-eda-e1-openlane-convert
      - human_review
  yosys:
    allowed_modes:
      - dry_run
      - parse_only
      - advisory_execute
    required_gates:
      - ai-eda-logic-synthesis-baseline
      - equivalence_check_before_acceptance
      - human_review
  cocotb:
    allowed_modes:
      - dry_run
      - advisory_execute
    required_gates:
      - cocotb
      - coverage_review
      - human_review
  python:
    allowed_modes:
      - parse_only
      - dry_run
    required_gates:
      - script_specific_checker
      - human_review
