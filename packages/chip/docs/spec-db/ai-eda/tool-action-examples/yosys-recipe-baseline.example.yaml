schema: eda.tool_action.v1
id: yosys-recipe-baseline-fixture
action_type: yosys_recipe
intent: Run quarantined Yosys recipe baselines over small E1 modules.
mode: advisory_execute
claim_boundary: example_tool_action_only_no_source_patch_ppa_or_release_claim
scope:
  read_paths:
    - rtl/dma/e1_dma.sv
    - rtl/npu/e1_npu.sv
    - build/ai_eda/logic_synthesis_recipes/validation/recipe_corpus.json
  write_paths:
    - build/ai_eda/logic_synthesis_baselines/
  forbidden_paths:
    - rtl/
    - pd/
    - sw/
command:
  tool: yosys
  argv:
    - scripts/ai_eda/run_logic_synthesis_policy_baseline.py
    - --run-id
    - validation
inputs:
  manifests:
    - build/ai_eda/logic_synthesis_recipes/validation/recipe_corpus.json
outputs:
  report: build/ai_eda/logic_synthesis_baselines/validation/baseline_report.json
  artifacts:
    - build/ai_eda/logic_synthesis_baselines/validation/*.ys
    - build/ai_eda/logic_synthesis_baselines/validation/*.yosys.log
safety:
  source_tree_write_allowed: false
  release_use_allowed: false
  deterministic_replay_required: true
  human_review_required: true
replay:
  dry_run_command: make ai-eda-logic-synthesis-baseline
  verification_gates:
    - ai-eda-logic-synthesis-baseline
    - equivalence_check_before_acceptance
decision:
  status: accepted_for_quarantined_replay
  reason: existing Make target writes only build/ai_eda artifacts and does not patch source
