schema: eliza.memory_2028_target.v1
as_of: 2026-05-19
target_year: 2028
target_class: performance_heavy_android_phone_ap
positioning: >
  Best-in-class mobile memory subsystem target for a large-battery Android phone AP
  on a 14A-class node. These are research and spec-db targets, not silicon evidence.
  Peak bandwidth, peak SRAM capacity, and protocol claims are not accepted as
  evidence on their own; cocotb, Ramulator 2 / DRAMsim3 simulation, synthesized
  macro evidence, and on-target measurements (per phase gate) are required before
  any phone-class memory claim.

claim_boundary: >
  This file captures the 2028 memory-subsystem target for E1: the external memory
  boundary (LPDDR6), the on-die shared system cache, the NPU local SRAM tiles, the
  coherent fabric and IOMMU, QoS, compression-aware DMA, framebuffer compression,
  cache stash, and DRAM RowHammer / ECC / link CRC policy. It is research and
  spec-only. It does not promote, replace, or weaken any existing fail-closed gate
  in docs/evidence/memory/uma-dram-evidence-gate.yaml,
  docs/spec-db/lpddr-phy-procurement-shortlist.yaml, or the production fabric
  gates in docs/arch/interconnect.md. Every claim in forbidden_claims_until_complete
  below remains blocked until its named phase gate closes with executable evidence.

source_anchors:
  external_memory:
    - jedec_jesd209_6
    - jedec_jesd209_5d
    - samsung_lpddr6_announce
    - skhynix_lpddr6_target
    - micron_lpddr6_position
    - samsung_lpddr5x_10_7gbps
    - skhynix_lpddr5t_9600
    - micron_lpddr5x_9600
    - lpddr5_link_ecc
    - ddr5_rfm
  shared_system_cache:
    - inclusive_cache_sifive
    - arm_chi_e
    - tilelink_spec_1_8
    - chipyard_constellation
  npu_local_sram:
    - tsmc_n2_sram_isscc_2024
    - samsung_2nm_sram_iedm
    - imec_sram_scaling_paper
    - intel_18a_14a_brief
    - eyeriss_v2_cache
    - buffets_isca_2019
    - nvdla_scratchpad
    - gemmini_isca_2021
  coherent_fabric:
    - tilelink_spec_1_8
    - arm_chi_e
    - arm_amba_ace
    - chipyard_constellation
    - pronoc_open_rtl
    - opensoc_noc
  iommu:
    - arm_smmu_v3
    - opensoc_sip_l2
  qos:
    - parbs_paper
    - atlas_paper
    - bliss_paper
  compression_aware_dma:
    - arm_afbc_afbe
    - amd_dcc
    - feature_map_compression_isca
    - kv_cache_compression
    - nvdla_scratchpad
  framebuffer_compression:
    - arm_afbc_afbe
    - amd_dcc
  cache_stash:
    - arm_chi_e
    - cache_stash_for_nn
    - tilelink_spec_1_8
  rowhammer_policy:
    - rowhammer_seaborn
    - rowhammer_revisited
    - ddr5_rfm
    - lpddr5_link_ecc
  simulators:
    - ramulator_2
    - dramsim3
    - usimm_simulator
    - champsim
    - gem5_mem

external_memory:
  standard: LPDDR6
  jedec_status: pre_publication_target
  bus_width_bits_range: [96, 128]
  per_pin_data_rate_gbps_range: [12.8, 14.4]
  channels_per_device: 4
  subchannel_width_bits: 24
  on_die_ecc_required: true
  link_crc_required: true
  trr_required: true
  rfm_required: true
  pasr_supported: true
  dvfsc_required: true
  capacity_gib_min: 12
  capacity_gib_target_ai_sku: 24
  peak_bandwidth_gbps_min: 180
  sustained_bandwidth_gbps_min: 120
  p95_random_read_latency_ns_max: 120
  phy_status: closed_ip_required
  phy_evidence_gate: docs/evidence/memory/lpddr-phy-procurement.yaml
  phy_shortlist_spec: docs/spec-db/lpddr-phy-procurement-shortlist.yaml
  source_ids:
    - jedec_jesd209_6
    - samsung_lpddr6_announce
    - skhynix_lpddr6_target
    - lpddr5_link_ecc
    - ddr5_rfm

shared_system_cache:
  capacity_mib_min: 32
  bank_count_range: [4, 8]
  ways_range: [4, 16]
  coherence_protocols_acceptable:
    - tilelink_c_inclusive
    - chi_e_directory
  inclusive: true
  cache_stash_entrypoint_required: true
  shared_clients:
    - cpu_cluster
    - npu
    - gpu
    - display
    - camera_isp
    - modem
    - audio_dsp
  source_ids:
    - inclusive_cache_sifive
    - arm_chi_e
    - tilelink_spec_1_8

npu_local_sram:
  total_mib_min: 64
  tile_count_range: [8, 16]
  per_tile_mib_min: 4
  banks_per_tile_min: 8
  ecc_scheme: SECDED
  bit_interleaving_required: true
  ping_pong_buffering_required: true
  partitions:
    - weight
    - activation
    - output
    - dma_staging
  aggregate_bandwidth_tbps_min: 20
  per_tile_bandwidth_tbps_min: 1.25
  organization: buffets_multi_bank
  source_ids:
    - tsmc_n2_sram_isscc_2024
    - samsung_2nm_sram_iedm
    - eyeriss_v2_cache
    - buffets_isca_2019
    - nvdla_scratchpad

coherent_fabric:
  primary: tilelink_c
  tracked_alternative: chi_e
  long_term_alternative: chi_f
  topology: mesh_noc
  reference_noc: chipyard_constellation
  required_features:
    - bursts
    - source_ids
    - ordering_domains
    - backpressure
    - atomics
    - cacheability_attributes
    - response_attribution
    - per_master_performance_counters
  io_coherent_clients:
    - npu
    - gpu
    - display
    - camera_isp
  bridges_required:
    - cpu_cluster
    - npu_cmd_dma
    - npu_data_dma
    - gpu
    - display
    - camera_isp
    - modem
    - audio_dsp
    - usb
    - storage
    - boot_rom
    - boot_sram
    - dram_controller
    - mmio
  source_ids:
    - tilelink_spec_1_8
    - arm_chi_e
    - arm_amba_ace
    - chipyard_constellation

iommu:
  primary: smmu_v3
  alternative: riscv_iommu
  deny_by_default: true
  per_master_stream_ids:
    - id: npu_cmd_dma
      master: NPU command-DMA
    - id: npu_data_dma
      master: NPU data-DMA
    - id: gpu
      master: GPU
    - id: display
      master: Display controller
    - id: camera_isp
      master: Camera ISP
    - id: modem
      master: Modem
    - id: audio_dsp
      master: Audio DSP
    - id: usb
      master: USB host controller
    - id: storage
      master: Storage controller (UFS / eMMC)
  fault_reporting_required:
    - master_id
    - stream_id
    - iova
    - translated_pa_when_available
    - access_type
    - permission_bits
    - syndrome_status
    - recovery_behavior
  fault_path: plic_or_imsic
  source_ids:
    - arm_smmu_v3
    - opensoc_sip_l2

qos:
  scheme: 4_class_priority
  classes:
    - id: isochronous
      examples:
        - display
        - audio_dsp
      reservation_required: true
      cap_required: true
    - id: high
      examples:
        - camera_isp
        - modem
      reservation_required: true
      cap_required: true
    - id: normal
      examples:
        - cpu_cluster
        - npu
        - gpu
      reservation_required: false
      cap_required: true
    - id: best_effort
      examples:
        - usb
        - storage
        - background_dma
      reservation_required: false
      cap_required: true
  per_class_reservation_programmable_at_boot: true
  per_class_cap_programmable_at_boot: true
  per_class_counters_required:
    - issued_transactions
    - bytes_transferred
    - p99_latency_ns
    - underflow_count
  source_ids:
    - parbs_paper
    - atlas_paper
    - bliss_paper

compression_aware_dma:
  block_size_elements: 64
  header_format:
    - header_word
    - bitmap
  supported_modes:
    - int8
    - int4
    - int2
    - fp8_kv
  per_channel_mode_select: true
  per_channel_counters_required:
    - compressed_bytes
    - uncompressed_bytes
    - block_count
  bandwidth_savings_target_reluheavy_min_ratio: 2.0
  bandwidth_savings_target_fp8_kv_min_ratio: 2.0
  encode_decode_at: dma_boundary
  tile_local_storage_format: expanded
  source_ids:
    - feature_map_compression_isca
    - kv_cache_compression
    - nvdla_scratchpad

framebuffer_compression:
  scheme: afbc
  successor_acceptable: true
  end_to_end_clients:
    - gpu
    - display
    - camera_isp
  dma_buf_modifiers_required: true
  display_underflow_counters_required: true
  source_ids:
    - arm_afbc_afbe
    - amd_dcc

cache_stash:
  primary: chi_cache_stash_hint
  alternative: tilelink_c_equivalent
  target_latency_ns_max: 200
  use_cases:
    - cpu_to_npu_command_descriptor_write
    - cpu_to_npu_queue_head_pointer_update
  measurement_requirement:
    cocotb_measurement_required: true
    expected_improvement_ns_min: 80
    expected_improvement_ns_max: 150
  source_ids:
    - arm_chi_e
    - cache_stash_for_nn
    - tilelink_spec_1_8

rowhammer_policy:
  required_mitigations:
    - trr
    - rfm
    - on_die_ecc
    - link_crc
  counters_required:
    - on_die_ecc_corrected_count
    - on_die_ecc_uncorrected_count
    - link_crc_error_count_read
    - link_crc_error_count_write
    - rfm_invoked_count
    - trr_action_count
  boot_transcript_required: true
  absolute_immunity_claim: forbidden
  source_ids:
    - rowhammer_seaborn
    - rowhammer_revisited
    - ddr5_rfm
    - lpddr5_link_ecc

phase_gates:
  P0_1_fabric:
    description: Replace AXI-Lite scaffold with TileLink-C (primary) or CHI-E fabric.
    targets:
      - coherent_fabric
      - cache_coherent_cpu_submission
    required_evidence:
      - docs/evidence/memory/axi_tl_interconnect_contract_report.json
      - docs/evidence/memory/fabric_bridge_ordering_report.json
    cocotb_evidence:
      - verify/cocotb/axi4/test_axi4_burst.py
      - verify/cocotb/iommu/test_riscv_iommu.py
    status: blocked
  P0_2_lpddr6_controller:
    description: LPDDR6 controller and PHY boundary, on-die ECC, link CRC, TRR + RFM.
    targets:
      - external_memory
      - rowhammer_policy
    required_evidence:
      - docs/evidence/memory/real_dram_controller_phy_report.json
      - docs/evidence/memory/dram_training_timing_report.json
      - docs/evidence/memory/lpddr_bandwidth_latency_benchmark_report.json
      - docs/evidence/memory/lpddr-phy-procurement.yaml
    simulator_evidence:
      - ramulator_2
      - dramsim3
    status: blocked
  P0_3_iommu:
    description: SMMUv3 (Arm-side reference) or RISC-V IOMMU with per-master stream IDs and fault reporting.
    targets:
      - iommu
    required_evidence:
      - docs/evidence/memory/iommu_fault_injection_report.json
      - docs/evidence/memory/dma_isolation_fault_visibility_report.json
    cocotb_evidence:
      - verify/cocotb/iommu/test_riscv_iommu.py
    simulator_evidence:
      - benchmarks/results/memory-iommu-qos-sim.json
    status: blocked
  P1_1_shared_system_cache:
    description: 32 MiB SLC, banked 4-8 ways, coherent (TileLink-C inclusive or CHI directory).
    targets:
      - shared_system_cache
    required_evidence:
      - docs/evidence/memory/cache_hierarchy_report.json
      - docs/evidence/memory/cache_latency_counter_report.json
      - docs/evidence/memory/uma_coherency_report.json
    status: blocked
  P1_2_npu_local_sram:
    description: 64 MiB NPU local SRAM across 8-16 tiles, 4 MiB per tile, SECDED, ping-pong.
    targets:
      - npu_local_sram
    required_evidence:
      - docs/evidence/memory/per_master_counter_report.json
      - docs/evidence/memory/contended_bandwidth_latency_report.json
    cocotb_evidence:
      - verify/cocotb/test_e1_npu.py
    status: blocked
  P1_3_compression_aware_dma:
    description: 64-element block compression-aware DMA with INT8/INT4/INT2/FP8 KV modes.
    targets:
      - compression_aware_dma
    required_evidence:
      - docs/evidence/memory/contended_bandwidth_latency_report.json
    cocotb_evidence:
      - verify/cocotb/test_e1_npu.py
    status: blocked
  P1_4_qos:
    description: 4-class DRAM controller QoS with per-class reservation, cap, and counters.
    targets:
      - qos
    required_evidence:
      - docs/evidence/memory/memory_qos_report.json
      - docs/evidence/memory/contended_bandwidth_latency_report.json
    simulator_evidence:
      - benchmarks/results/memory-iommu-qos-sim.json
      - ramulator_2
      - dramsim3
    status: blocked
  P2_1_rowhammer_and_link_crc:
    description: TRR + RFM + on-die ECC + link CRC counters exposed to firmware and boot transcript.
    targets:
      - rowhammer_policy
    required_evidence:
      - docs/evidence/memory/dram_training_timing_report.json
      - docs/evidence/memory/lpddr_bandwidth_latency_benchmark_report.json
    status: blocked
  P2_2_framebuffer_compression:
    description: AFBC (or successor) end-to-end across GPU, display, camera with dma-buf modifiers.
    targets:
      - framebuffer_compression
    required_evidence:
      - docs/evidence/memory/android_dma_buf_coherency_report.json
      - docs/evidence/memory/android_shared_buffer_fence_report.json
    status: blocked
  P2_3_cache_stash:
    description: CHI cache stash or TileLink-C equivalent for CPU to NPU command submission, latency < 200 ns.
    targets:
      - cache_stash
    required_evidence:
      - docs/evidence/memory/contended_bandwidth_latency_report.json
    cocotb_evidence:
      - verify/cocotb/test_e1_npu.py
    status: blocked

forbidden_claims_until_complete:
  - "180 GB/s peak external memory bandwidth"
  - "120 GB/s sustained external memory bandwidth"
  - "LPDDR6 controller, PHY, or training evidence"
  - "on-die ECC, link CRC, TRR, or RFM coverage on a real target"
  - "32 MiB shared system cache"
  - "64 MiB NPU local SRAM"
  - "20 TB/s aggregate NPU local SRAM bandwidth"
  - "coherent CPU to NPU command submission"
  - "TileLink-C, CHI-E, or CHI-F coherent fabric"
  - "SMMUv3 or RISC-V IOMMU per-master isolation"
  - "4-class memory QoS with isochronous reservations"
  - "compression-aware DMA bandwidth savings"
  - "AFBC end-to-end framebuffer compression"
  - "cache stash CPU to NPU command latency under 200 ns"
  - "RowHammer immunity at the device or system level"

related_specs:
  npu_target: docs/spec-db/npu-2028-target.yaml
  npu_roadmap: docs/spec-db/npu-2028-roadmap.yaml
  lpddr_phy_procurement: docs/spec-db/lpddr-phy-procurement-shortlist.yaml
  process_effects: docs/spec-db/process-14a-effects.yaml
  evidence_gate: docs/evidence/memory/uma-dram-evidence-gate.yaml
  arch_memory: docs/arch/memory-subsystem.md
  arch_interconnect: docs/arch/interconnect.md
  arch_memory_map: docs/arch/memory-map.md
  implementation_plan: research/memory_subsystem_2026/03_implementation/memory_path_for_e1.md
  source_inventory: research/memory_subsystem_2026/01_sources/source_inventory.yaml

claim_rules:
  - This file is research/spec only and does not constitute silicon evidence.
  - Every numeric commitment must cite at least one source_id from research/memory_subsystem_2026/01_sources/source_inventory.yaml.
  - No claim listed in forbidden_claims_until_complete may be promoted to release language until its phase gate is closed with executable evidence.
  - The fail-closed gate in docs/evidence/memory/uma-dram-evidence-gate.yaml remains the controlling artifact for phone-class memory claims.
  - The LPDDR6 PHY remains closed third-party IP, gated by docs/spec-db/lpddr-phy-procurement-shortlist.yaml and docs/evidence/memory/lpddr-phy-procurement.yaml.
