schema: eliza.io_cell_contract.v1
status: blocked_awaiting_foundry_io_cell_deliverables
claim_boundary: >
  Source contract for required IO-cell classes and pinout pad-type mappings.
  This file is not a foundry IO-cell release, not ESD or latchup signoff,
  not IBIS/SI proof, not padframe tapeout readiness, and not board/package
  release evidence.
required_artifacts_per_class:
  liberty: "*.lib"
  lef: "*.lef"
  gds: "*.gds"
  spice:
    - "*.sp"
    - "*.spi"
    - "*.spice"
  ibis: "*.ibs"
  esd_latchup_report: esd_latchup_report.pdf
  corner_coverage_report: corner_coverage_report.pdf
io_cell_classes:
  - LVCMOS_3V3
  - LVCMOS_3V3_OD
  - LVCMOS_1V8
  - LVCMOS_1V8_SCHMITT
  - LVCMOS_1V8_CLK
  - ANALOG_PASSTHROUGH
  - POWER_PAD
  - GROUND_PAD
  - NC_PAD
  - LPDDR5X_DQ
  - LPDDR5X_DQS
  - LPDDR5X_DM
  - LPDDR5X_CA
  - LPDDR5X_CK
  - MIPI_DPHY
  - USB2_PHY
  - USB3_SS
  - JTAG_TCK
pinout_pad_type_to_class:
  bidirectional: LVCMOS_1V8
  clock: LVCMOS_1V8_CLK
  digital_input: LVCMOS_1V8
  digital_output: LVCMOS_1V8
  ground: GROUND_PAD
  lpddr_ca: LPDDR5X_CA
  lpddr_ck: LPDDR5X_CK
  lpddr_dm: LPDDR5X_DM
  lpddr_dq: LPDDR5X_DQ
  lpddr_dqs: LPDDR5X_DQS
  mipi_dphy: MIPI_DPHY
  no_connect: NC_PAD
  open_drain: LVCMOS_1V8
  power: POWER_PAD
  schmitt_input: LVCMOS_1V8_SCHMITT
  usb2_phy: USB2_PHY
  usb3_phy: USB3_SS
release_policy:
  contract_presence_satisfies_release: false
  all_required_artifacts_per_class_required: true
  esd_latchup_report_required: true
  corner_coverage_report_required: true
  padframe_tapeout_allowed_without_foundry_io_cells: false
  board_or_package_release_allowed_without_io_cell_release: false
forbidden_claims:
  - io_cells_released
  - esd_latchup_signed_off
  - ibis_si_complete
  - padframe_tapeout_ready
  - package_release_ready
