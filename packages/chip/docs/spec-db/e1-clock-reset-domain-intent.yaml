schema: eliza.clock_reset_domain_intent.v1
claim_boundary: intent_manifest_only_not_cdc_rdc_signoff
status: DRAFT_CAPTURE_ONLY
top: rtl/top/e1_chip_top.sv
default_clock_domain: e1_clk
clock_domains:
  - id: e1_clk
    source: CLK_IN
    reset: rst_n_sync
    source_files:
      - rtl/top/e1_chip_top.sv
      - rtl/clock/e1_reset_sync.sv
      - rtl/top/e1_soc_top.sv
      - rtl/debug/e1_dbg_mmio_bridge.sv
      - rtl/interconnect/e1_axi_lite_interconnect.sv
      - rtl/interrupts/e1_interrupt_controller.sv
    modules:
      - e1_chip_top
      - e1_reset_sync
      - e1_soc_top
      - e1_dbg_mmio_bridge
      - e1_axi_lite_interconnect
      - e1_interrupt_controller
resets:
  - id: RST_N
    kind: external_async_reset
    polarity: active_low
    accepted_at_top: true
    synchronized_by: rtl/clock/e1_reset_sync.sv::e1_reset_sync
    instance: u_reset_sync
    destination_clock_domain: e1_clk
  - id: rst_n_sync
    kind: synchronized_reset
    polarity: active_low
    generated_by: rtl/clock/e1_reset_sync.sv::e1_reset_sync
    generator_instance: u_reset_sync
    destination_clock_domain: e1_clk
external_interface_assumptions:
  - id: debug_mmio_pins
    ports:
      - DBG_VALID
      - DBG_LAUNCH
      - DBG_WRITE
      - DBG_ADDR
      - DBG_WDATA
      - DBG_RDATA
      - DBG_READY
    assumption: synchronous_to_CLK_IN
    evidence_boundary: current scaffold samples debug pins directly in e1_dbg_mmio_bridge; external debug logic must meet CLK_IN setup and hold
    cdc_signoff_claim: false
  - id: jtag_pins
    ports:
      - JTAG_TCK
      - JTAG_TMS
      - JTAG_TDI
      - JTAG_TDO
    assumption: tap_driven_in_current_top
    evidence_boundary: e1_chip_top instantiates e1_jtag_tap and drives JTAG_TDO from the TAP only when tdo_oe is asserted, otherwise low
    cdc_signoff_claim: false
  - id: test_mode
    ports:
      - TEST_MODE
    assumption: unused_in_current_top
    evidence_boundary: TEST_MODE is reduced into an unused lint sink; no scan or test clock domain is claimed
    cdc_signoff_claim: false
known_gaps:
  - no deterministic CDC/RDC structural report using this manifest
  - no generated-clock inventory
  - no asynchronous FIFO or multi-clock interface approval policy
  - no waiver schema, waiver owner, or waiver disposition workflow
  - no commercial CDC/RDC report comparison
  - no lab timing, board, package, or silicon proof
evidence_gates:
  - python3 scripts/check_cdc_rdc_intent.py
  - python3 scripts/ai_eda/capture_cdc_rdc_targets.py --run-id validation
  - make cdc-rdc-intent-check
  - make rtl-check
  - make formal
  - make cocotb-contract
  - make no-hardware-action-check
ai_use_policy:
  generated_constraints_allowed: false
  generated_waivers_allowed: false
  generated_rtl_allowed: false
  cdc_signoff_claim_allowed: false
  rdc_signoff_claim_allowed: false
  false_claim_flags:
    generated_constraints_allowed: false
    generated_waivers_allowed: false
    generated_rtl_allowed: false
    cdc_signoff_claim_allowed: false
    rdc_signoff_claim_allowed: false
  advisory_triage_allowed_after_deterministic_report: true
