schema: eliza.security_2028_target.v1
as_of: 2026-05-19
target_year: 2028
target_class: performance_heavy_android_phone_ap

positioning: >
  Open Root-of-Trust, secure boot, key storage, DMA isolation, attestation,
  and TEE target for the Eliza E1 2028 mobile AP. Selected primitives are
  Apache-2.0 open IP (OpenTitan family + libavb + Open DICE) so the RoT
  surface can be silicon-proven and externally reviewable. Every claim
  here is a target spec, not silicon evidence.

claim_boundary: >
  This file is a planning spec. It does not promote any secure-boot,
  verified-boot, rollback-protected, debug-locked, KeyMint-backed,
  StrongBox, PQ-safe, SCA-protected, FIPS-certified, or Common-Criteria
  claim. Each forbidden_claim_until_evidence row below stays gated by the
  fail-closed work order at
  docs/project/security-usb-storage-update-fail-closed-work-order-2026-05-17.yaml
  and by the TC-* transcripts schema in docs/security/test-plan.md.
  Identity / contract ROM remains the repo state per docs/arch/security.md.

source_anchors:
  research_inventory: research/security_2026/01_sources/source_inventory.yaml
  ids:
    rot_ip_set:
      - opentitan_rom_ctrl
      - opentitan_lc_ctrl
      - opentitan_otp_ctrl
      - opentitan_keymgr
      - opentitan_aes
      - opentitan_hmac
      - opentitan_entropy_src
      - opentitan_csrng
      - opentitan_edn
      - opentitan_otbn
      - ibex_repo
      - tock_os_repo
    verified_boot:
      - libavb_repo
      - avb_2_0_spec
      - dm_verity_kernel_docs
      - fs_verity_kernel_docs
    crypto_algorithms:
      - opentitan_otbn_ed25519
      - opentitan_hmac
      - fips_204_ml_dsa
      - fips_205_slh_dsa
      - sp_800_90b
      - pqc_hw_paper
    isolation_extensions:
      - epmp_spec
      - smepmp_spec
      - iopmp_spec
      - riscv_h_extension
      - riscv_aia_spec
    attestation:
      - open_dice_repo
      - tcg_dice_spec
      - keymint_aosp
      - play_integrity_api
    tee:
      - keystone_repo
      - op_tee_riscv
      - covE_spec
      - cheriot_ibex

rot_ip_set:
  security_mcu:
    core: ibex
    role: root_of_trust_and_always_on
    firmware_os: tock_os
  boot_supervisor_blocks:
    - block: rom_ctrl
      function: SHA-3 scrambled boot ROM with integrity check
    - block: lc_ctrl
      function: lifecycle controller; mubi-encoded FSM; gates debug
    - block: otp_ctrl
      function: OTP with scrambling, ECC, partitions, token-gated transitions
    - block: keymgr
      function: versioned key derivations (UDS, sealing keys, attestation keys)
    - block: aes
      function: masked first-order AES-256 (DPA-mitigated)
    - block: hmac
      function: SHA-2 family for image hashing
    - block: entropy_src
      function: SP 800-90B entropy source with halt-on-failure
    - block: csrng
      function: SP 800-90A CTR_DRBG
    - block: edn
      function: entropy distribution network
    - block: otbn
      function: programmable big-number unit for Ed25519, ML-DSA-65, ML-KEM
  license: Apache-2.0
  silicon_track_status: multiple_tape_outs_via_lowrisc_program

boot_chain:
  stages:
    - stage: ROM
      function: OpenTitan rom_ctrl SHA-3 integrity check; halts on TRNG fail
      crypto: SHA3-based
      halt_codes:
        - ROM_INTEGRITY_FAILED
        - TRNG_FAILED
    - stage: BL1
      function: OTBN Ed25519 verify; load BL2
      crypto: Ed25519 verify on OTBN; SHA-256 via HMAC IP
    - stage: BL2
      function: libavb 2.0 verify; rollback index read/write; load kernel + ramdisk
      crypto: libavb-driven Ed25519 verify
      avb_header_version: 1
      avb_chain_partitions: per docs/security/avb-a-b-ota.md
    - stage: kernel
      function: dm-verity + fs-verity mount of system / vendor / product partitions
      data_corruption_policy: restart_on_corruption
      fec_enabled: true
  no_software_only_crypto_on_boot_path: true

key_algorithms:
  required:
    signing: Ed25519
    hashing: SHA-256
    rng: SP_800_90B
    kdf: OpenTitan_keymgr
  optional:
    pqc_hybrid_signing: ML-DSA-65 (FIPS 204) reserved as header_version=2
  tracked:
    pqc_hybrid_signing: SLH-DSA-128s (FIPS 205) hedge for root rotation
    pqc_kem: ML-KEM-768 (FIPS 203) for future provisioning

verified_boot:
  framework: libavb 2.0
  chain_partition_descriptors: docs/security/avb-a-b-ota.md
  rollback_partition:
    location: OTP partition rollback rows
    offsets_reference: docs/security/otp-fuse-map.md
  dm_verity:
    hashtree_algorithm: SHA-256
    fec_enabled: true
    cmdline_state_pass_through: androidboot.verifiedbootstate

lifecycle_states:
  controller: opentitan_lc_ctrl
  states:
    - RAW
    - TEST_LOCKED
    - TEST_UNLOCKED
    - DEV
    - PROD
    - PROD_END
    - RMA
    - SCRAP
  debug_authorization:
    mechanism: lc_ctrl_mubi_outputs
    debug_auth_ed25519_verify: docs/security/debug-policy.md
    rma_wipe: required_before_state_transition_to_rma

dma_isolation:
  hart_pmp:
    required: ePMP + Smepmp on every RV hart (security_mcu + AP cores)
  interconnect_iopmp:
    required: deny_by_default
    masters:
      - npu_cmd_dma
      - npu_data_dma
      - gpu
      - display
      - camera_isp
      - modem
      - audio_dsp
      - usb
      - storage
  fault_path:
    surface: extended_plic_or_imsic
    cross_reference: docs/arch/interrupts.md

attestation:
  framework: DICE
  library: open_dice_repo
  cert_format: COSE_Sign1
  uds_source: PUF_derived_via_otp_ctrl
  keymint_root_chained_under_dice: true
  remote_attestation_provisioning:
    standard: IETF_RATS
    transport_planned: SPDM

tee:
  v0_status: deferred_no_tee
  v1_candidates:
    preferred: keystone_repo
    tracked: op_tee_riscv
  v2_candidates:
    confidential_vms: covE_spec
    capability_safety: cheriot_ibex
  hypervisor_extension:
    required_for_keystone_vm: H
    cross_reference: docs/spec-db/cpu-2028-target.yaml#hypervisor

side_channel_posture:
  v0_explicit_non_goals:
    - T9_DPA_EM_extraction
    - decap_class_invasive
    - active_mesh_top_metal
  v1_planned:
    - opentitan_masked_aes
    - voltage_glitch_detectors
    - clock_glitch_detectors
    - temperature_glitch_detectors
    - mubi_encoded_state_machines
  v2_planned:
    - inline_lpddr_aes_xts_encryption_only_when_covE

rowhammer:
  cross_reference: docs/spec-db/memory-2028-target.yaml#rowhammer_policy
  required_when_lpddr_used:
    - TRR
    - RFM
    - on_die_ECC
    - link_CRC_counters

synthetic_otp_prototype:
  scope: sky130_openlane_simulator_only
  implementation: deterministic_fuse_ram_with_non_production_label
  evidence_class: simulator_transcripts_only
  forbidden_use: production_lockable_part

phase_gates:
  v0:
    description: synthetic OTP + libavb + Ed25519 + DICE + IOPMP
    evidence_files_required:
      - docs/security/secure-boot-lifecycle-evidence.md
      - docs/security/test-plan.md
    rtl_blocks_required:
      - opentitan_rom_ctrl_integration
      - opentitan_lc_ctrl_integration
      - opentitan_otp_ctrl_integration
      - opentitan_otbn_integration
      - iopmp_at_interconnect
  v1:
    description: production OTP + ML-DSA-65 hybrid + Keystone + KeyMint TA
    blockers:
      - intermediate_node_pdk_selection
      - keystone_keymint_ta_implementation
      - opentitan_masked_aes_analog_flow
  v2:
    description: CoVE + CHERIoT + inline LPDDR encryption
    blockers:
      - covE_spec_ratification
      - cheriot_ibex_silicon_maturity
      - confidential_vm_use_case

forbidden_claims_until_evidence:
  - claim: secure_boot
    unblocked_by_phase: v0
    required_evidence:
      - opentitan_rom_ctrl + lc_ctrl + otp_ctrl + otbn integrated and DV-passing
      - libavb Ed25519 verify transcript TC-BOOT-001..008
      - synthetic_otp model labelled non-production
  - claim: verified_boot
    unblocked_by_phase: v0
    required_evidence:
      - libavb chain + dm-verity hashtree FEC transcript
      - TC-BOOT-001..008
  - claim: rollback_protected
    unblocked_by_phase: v0
    required_evidence:
      - otp_ctrl rollback partition write/read transcript
      - TC-ROLLBACK-001..003
  - claim: debug_locked
    unblocked_by_phase: v0
    required_evidence:
      - lc_ctrl PROD-state transcript
      - debug-auth Ed25519 verify transcript per docs/security/debug-policy.md
      - TC-DEBUG-001..005
  - claim: keymint_backed
    unblocked_by_phase: v1
    required_evidence:
      - Keystone or OP-TEE RV port with KeyMint TA
      - TC-KEYMINT-001..NN
  - claim: strongbox
    unblocked_by_phase: never
    reason: out_of_scope_per_docs_security_threat_model_md_section_5
  - claim: pq_safe
    unblocked_by_phase: v1
    required_evidence:
      - OTBN ML-DSA-65 verify program
      - header_version=2 hybrid image transcript
  - claim: sca_protected
    unblocked_by_phase: v1
    required_evidence:
      - opentitan_masked_aes integrated on production node
      - glitch_detectors integrated and triggered transcript
  - claim: fips_140
    unblocked_by_phase: never
    reason: explicit_non_goal_per_threat_model_md_section_5
  - claim: common_criteria
    unblocked_by_phase: never
    reason: explicit_non_goal_per_threat_model_md_section_5
  - claim: gp_tee_certified
    unblocked_by_phase: never
    reason: explicit_non_goal_per_threat_model_md_section_5

cross_references:
  arch: docs/arch/security.md
  threat_model: docs/security/threat-model.md
  boot_image_format: docs/security/boot-image-format.md
  avb_otp_ota: docs/security/avb-a-b-ota.md
  otp_fuse_map: docs/security/otp-fuse-map.md
  debug_policy: docs/security/debug-policy.md
  key_ceremony: docs/security/key-ceremony.md
  test_plan: docs/security/test-plan.md
  fail_closed_work_order: docs/project/security-usb-storage-update-fail-closed-work-order-2026-05-17.yaml
  cpu_target: docs/spec-db/cpu-2028-target.yaml
  memory_target: docs/spec-db/memory-2028-target.yaml
  research_packet: research/security_2026/
