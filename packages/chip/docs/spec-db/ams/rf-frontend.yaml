schema: eliza.ams_block_contract.v1
block_id: rf_frontend
block_class: RF
status: BLOCKED_procurement_or_pdk_ip_required
claim_boundary: >
  Interface and procurement contract for the E1 RF front-end interface to the
  external cellular and Wi-Fi/BT/GNSS modules. The radios are external modules;
  this contract captures the controlled-impedance RF feed classes, control
  interface, supply rails, and the EM/conducted signoff corners. Makes no
  insertion-loss, S-parameter, or matching claim: those stay blocked on HFSS/EM
  and conducted VNA signoff with vendor models and the board coupon plan.
claim_allowed: false
release_claim_allowed: false
electrical_signoff_claim_allowed: false
vendor_ip_claim_allowed: false
silicon_claim_allowed: false

supply_rails:
  - rail: +1V8
    nominal_v: 1.8
    domain: io
    role: rf_control_supply
    serves_power_domain: PD_CORE_1V8
  - rail: VSS_RF
    nominal_v: 0.0
    domain: rf_ground
    isolation: dedicated_rf_ground_stitching_required

control_pins:
  - name: RF_CTRL_RFFE_CLK
    direction: output
    role: rffe_clock
  - name: RF_CTRL_RFFE_DATA
    direction: bidirectional
    role: rffe_data
  - name: RF_PA_EN
    direction: output
    role: pa_enable
  - name: RF_ANT_SEL
    direction: output
    role: antenna_select

rf_feed_classes:
  - signal_group_ref: rf_single
    coupon_plan_ref: board/kicad/e1-phone/evt1-stackup-impedance-coupon-plan.yaml#impedance_coupon_requests.rf_50_ohm
    nets: [CELL_RF_MAIN, CELL_RF_DIV, CELL_GNSS_RF, WIFI_BT_RF0, WIFI_BT_RF1]

interface_revision:
  kind: MIPI_RFFE
  revision: '3.0'

target_process_nodes: [tsmc-n2p, tsmc-a14, intel-14a, samsung-sf2p]

signoff_required_corners:
  em: [s11_return_loss, insertion_loss, isolation]
  conducted: [vna_conducted_match, pa_load_pull_review]
  required_tool: hfss_or_equivalent_em_plus_conducted_vna_signoff

procurement:
  posture: external_rf_module_plus_board_rf_feed
  candidate_classes:
    - external_cellular_modem_module
    - external_wifi_bt_gnss_module
  blockers:
    - no_vendor_s_parameter_or_module_rf_model
    - no_em_field_solver_quote
    - no_board_rf_coupon_field_solver_quote
    - process_node_unsettled

forbidden_claims:
  - rf_match_closed
  - rf_insertion_loss_verified
  - rf_s_parameter_signed_off
