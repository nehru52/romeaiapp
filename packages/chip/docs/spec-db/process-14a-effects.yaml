schema: eliza.process_14a_effects.v1
status: fail_closed_process_work_order
release_claim_allowed: false
pdk_signoff_claim_allowed: false
physical_signoff_claim_allowed: false
manufacturing_claim_allowed: false
reliability_qualification_claim_allowed: false
tapeout_claim_allowed: false
silicon_claim_allowed: false
production_readiness_claim_allowed: false
claim_boundary: >
  This is a 14A-class process-effects and evidence contract, not proof that the
  current RTL, PD, CPU, NPU, package, or simulator is implemented on a 1.4 nm
  process. Release claims require foundry PDK data, extracted parasitics,
  workload vectors, power/thermal correlation, and signoff reports for the
  exact selected process option.
node_target:
  marketing_name: N2P / A14 / Intel 14A class (2 nm to 1.4 nm node range)
  production_assumption: 2028 mobile-class planning target
  selected_process_option: blocked_until_foundry_pdk_and_library_selection_from_shortlist
  selected_process_option_shortlist:
    primary:
      pdk: TSMC_N2P
      access_gate: pd/n2p-stub/access-gate.yaml
      rationale: HVM 2H 2026, mobile-mature 2028, HD 313 MTr/mm², 38.1 Mb/mm² SRAM, frontside PDN, wafer ~$30-33k, broadest mobile customer surface
    stretch:
      pdk: TSMC_A14
      access_gate: pd/a14-stub/access-gate.yaml
      rationale: HVM 2028, +15% perf @ iso-power or -30% power @ iso-perf vs N2, +20% logic density, frontside baseline (A14P SPR-BSPDN slips to 2029)
    second_source:
      pdk: Intel_14A
      access_gate: pd/intel-14a-stub/access-gate.yaml
      rationale: 2nd-gen PowerVia BSPDN + industry-first commercial High-NA EUV, strategic non-Apple foundry diversification, possible DARPA/RAMP-C alignment
    backup:
      pdk: Samsung_SF2P
      access_gate: pd/sf2p-stub/access-gate.yaml
      rationale: Frontside MBCFET GAA backup if both TSMC and Intel paths blocked; competitive wafer pricing; SF1.4 slipped 2028-2029
  transistor_architecture: nanosheet_or_successor_gate_all_around_required
  power_delivery_variant: frontside_power_delivery_until_specific_bspdn_option_is_selected
  minimum_supported_variants:
    - frontside_pdn_a14_class
    - backside_pdn_or_super_power_rail_follow_on
source_policy:
  source_checked_utc: "2026-05-19T00:00:00Z"
  use: planning_inputs_only_not_pdk_or_signoff_data
  sources:
    - id: tsmc_a14_public_roadmap
      title: TSMC A14 public technology roadmap coverage
      url: https://www.tsmc.com/english
      evidence_use: >
        Public roadmap context for A14-class timing and the need to distinguish
        frontside-power and backside-power variants before making PPA claims.
    - id: imec_backside_pdn_dtco
      title: imec backside power delivery DTCO studies
      url: https://www.imec-int.com/en/articles/backside-power-delivery-options-dtco-study
      evidence_use: >
        Planning context for DTCO, nanosheet cell-height, backside-via, routing,
        and PDN tradeoffs in 2 nm and A14-class logic.
    - id: ieee_irds_more_moore_2024
      title: IEEE IRDS 2024 More Moore roadmap
      url: https://irds.ieee.org/editions/2024/21-roadmap-2024-edition
      evidence_use: >
        Roadmap context for device architecture scaling, DTCO, interconnect,
        power-density, and reliability pressure at advanced nodes.
required_effects:
  - id: node_identity_and_pdk_binding
    category: pdk
    risk: Marketing node names are not physical dimensions and cannot define signoff rules.
    must_model:
      - selected foundry process option and revision
      - standard-cell, SRAM, IO, ESD, and analog library versions
      - voltage, temperature, RC, timing, power, EM, and reliability corners
    required_evidence:
      - pd/signoff/manifest.yaml
      - docs/manufacturing/real-world-verification-gaps.yaml
    blocker: selected_14a_pdk_library_and_corner_manifest_missing
  - id: nanosheet_device_variability
    category: device
    risk: GAA/nanosheet width, threshold, contact resistance, and local variation drive timing and leakage spread.
    must_model:
      - SS/TT/FF plus local variation corners
      - voltage droop sensitivity and near-threshold Vmin margin
      - leakage and dynamic power spread by workload
    required_evidence:
      - pd/signoff/manifest.yaml
      - benchmarks/power/workload-plan.yaml
    blocker: nanosheet_variability_and_vmin_evidence_missing
  - id: frontside_vs_backside_power_delivery
    category: pdn
    risk: Frontside and backside power delivery have different IR, routing, cell, via, thermal, and DFM constraints.
    must_model:
      - frontside PDN option for base 2028 14A-class target
      - backside-PDN or super-power-rail follow-on option as a separate variant
      - IR-drop, EM, routing congestion, and cell-height tradeoffs per variant
    required_evidence:
      - pd/signoff/pdn-current/local-budget.yaml
      - benchmarks/power/local-estimates/e1-npu-openlane-npu-estimates.json
    blocker: process_variant_pdn_tradeoff_evidence_missing
  - id: interconnect_rc_and_congestion
    category: interconnect
    risk: Wire RC, via resistance, routing congestion, and signal EM dominate delay and energy at advanced nodes.
    must_model:
      - extracted RC timing across selected corners
      - high-fanout and long-wire buffering strategy
      - clock tree, reset tree, and NoC timing closure
    required_evidence:
      - docs/pd/high-fanout-routing-pressure-2026-05-18.md
      - pd/signoff/manifest.yaml
    blocker: extracted_rc_and_routing_congestion_evidence_missing
  - id: self_heating_and_power_density
    category: thermal
    risk: Local CPU/NPU hot spots can invalidate frequency and TOPS/W targets before package power limits are reached.
    must_model:
      - per-block activity factors for CPU, NPU, SRAM, DMA, NoC, and memory PHY
      - die, package, board, enclosure, skin, and ambient thermal path
      - sustained workload throttling and stop conditions
    required_evidence:
      - benchmarks/power/workload-plan.yaml
      - benchmarks/power/manifests/e1-npu-sustained-capture.template.json
      - docs/manufacturing/evidence/thermal/e1-npu-thermal-capture-plan.md
    blocker: workload_correlated_thermal_model_and_trace_missing
  - id: sram_density_vmin_and_ecc
    category: memory
    risk: Large local SRAM and cache targets need Vmin, retention, soft-error, repair, and ECC assumptions.
    must_model:
      - SRAM compiler or macro selection for caches and NPU local memory
      - Vmin, retention, redundancy, BIST, ECC/parity, and repair policy
      - thermal and voltage sensitivity under sustained AI workloads
    required_evidence:
      - docs/arch/memory-subsystem.md
      - docs/arch/npu-microarch.md
    blocker: 14a_sram_macro_vmin_ecc_evidence_missing
  - id: reliability_aging_and_lifetime
    category: reliability
    risk: BTI, HCI, TDDB, electromigration, self-heating, and low-voltage operation affect lifetime timing and power.
    must_model:
      - lifetime derates for CPU/NPU frequency targets
      - EM limits for rails, signal wires, vias, and power switches
      - voltage and thermal operating guardbands
    required_evidence:
      - pd/signoff/manifest.yaml
      - docs/manufacturing/real-world-verification-gaps.yaml
    blocker: reliability_aging_derate_evidence_missing
  - id: dft_yield_and_debug_lock
    category: manufacturing
    risk: Advanced-node yield, scan coverage, BIST, fuse policy, and secure debug controls must be designed before tapeout.
    must_model:
      - scan, MBIST, boundary scan, repair fuses, and manufacturing test coverage
      - yield-learning telemetry and binning strategy
      - secure lifecycle/debug lock evidence
    required_evidence:
      - docs/manufacturing/product-feature-evidence-manifest.yaml
      - docs/security/secure-boot-lifecycle-evidence.md
    blocker: dft_yield_debug_lock_evidence_missing
variant_requirements:
  rationale: >
    Each variant in node_target.minimum_supported_variants carries its own
    PD signoff. Frontside and backside power delivery have different IR,
    routing, cell, via, thermal, and DFM constraints, so PD evidence is
    not transferable between variants.
  per_variant_artifacts_required:
    - pd_signoff_run_manifest
    - pdn_ir_drop_report
    - pdn_em_report
    - pdn_pdn_impedance_curve
    - thermal_model_per_variant
    - reliability_derate_per_variant
  inputs:
    - id: intel_powervia_vlsi2023
      url: https://www.intel.com/content/www/us/en/foundry/library/intel-18a-powervia.html
    - id: tsmc_super_power_rail
      url: https://www.tsmc.com/english
    - id: samsung_bspdn_iedm2023
      url: https://semiconductor.samsung.com/foundry/
    - id: imec_backside_pdn_dtco
      url: https://www.imec-int.com/en/articles/backside-power-delivery-options-dtco-study

library_variant_binding:
  rationale: >
    NanoFlex (TSMC) and FinFLEX (Samsung) expose different cell-height,
    fin-count, and drive-strength variants within a single PDK. PD signoff
    must record the variant per cell-library cell consumed.
  required_artifacts:
    - library_variant_manifest_per_run
    - cell_variant_summary_per_design
  inputs:
    - id: tsmc_nanoflex
      url: https://www.tsmc.com/english
    - id: samsung_finflex
      url: https://semiconductor.samsung.com/foundry/
    - id: synopsys_dtco_overview
      url: https://www.synopsys.com/glossary/what-is-design-technology-co-optimization.html

reliability_derate_sources:
  rationale: >
    Lifetime derates must use nanosheet-era physics, not FinFET-era physics.
    Required inputs to BTI, HCI, TDDB, EM, and self-heating derates:
  inputs:
    - id: bti_nanosheet_ted2023
      reference: IEEE TED 2023 nanosheet BTI characterization papers
    - id: self_heating_nanosheet_edl2024
      reference: IEEE EDL 2024 nanosheet self-heating papers
    - id: em_advanced_beol_tdmr2024
      reference: IEEE TDMR 2024 Mo/Ru BEOL electromigration papers
    - id: irds_2024_more_moore
      url: https://irds.ieee.org/editions/2024/21-roadmap-2024-edition

sram_vmin_ecc_repair_plan:
  rationale: >
    Cross-reference for SRAM macro Vmin, retention, soft-error, repair, and
    ECC policy. Tied to docs/arch/memory-subsystem.md and
    docs/arch/npu-microarch.md.
  required_policy:
    - SECDED on all L1/L2/NPU local SRAM
    - parity_or_ECC on flop-heavy pipelines (NPU accumulators, CPU rename/ROB)
    - bit_interleaving in SRAM layout to bound MBU
    - repair_fuse_and_BIST_coverage
    - latch_FIT_and_bit_FIT_separately_budgeted
  inputs:
    - id: tsmc_2nm_sram_iedm2023
      reference: TSMC IEDM 2023 N2 SRAM macro paper
    - id: samsung_2nm_sram_isscc2024
      reference: Samsung ISSCC 2024 SF2 SRAM macro paper
    - id: soft_error_advanced_node_iolts2024
      reference: IOLTS 2024 soft-error / latch FIT analysis

thermal_capture_phases:
  rationale: >
    Phone-class thermal capture must separate the vapor-chamber transient
    phase (high heat absorption, short duration) from the post-saturation
    steady-state phase. Sustained TOPS/W reports must come from the steady-
    state phase, not the transient phase.
  phases:
    - id: vapor_chamber_transient
      duration_s_range: [10, 30]
      absorbed_power_w_range: [4.0, 8.0]
      sustained_metric_allowed: false
    - id: vapor_chamber_steady_state
      after_phase: vapor_chamber_transient
      sustained_power_w_range: [4.0, 6.0]
      sustained_metric_allowed: true
  skin_temperature_limit:
    standard:
      - IEC 60950-1
      - IEC 62368-1
    limit_c: 45
    stop_condition: hard
  inputs:
    - id: vapor_chamber_phone_review
      reference: Mobile vapor chamber teardown literature
    - id: aosp_thermal_hal
      url: https://source.android.com/docs/core/architecture/hidl/thermal
    - id: aosp_thermal_mitigation
      url: https://source.android.com/docs/core/perf/thermal-mitigation

packaging_default:
  baseline:
    type: monolithic_die
    memory: on_package_lpddr5x_or_lpddr6_via_info_os
    rationale: >
      Monolithic compute die with memory-on-package via InFO_oS-class
      packaging is the 2028 mobile baseline. Compute-chiplet splits open a
      separate variant entry with its own packaging-evidence row.
  forbidden_in_e1_envelope:
    - CoWoS_silicon_interposer
    - SoW_wafer_scale
    - CoWoS_L_with_silicon_bridge
    - rationale_for_forbiddens: out_of_mobile_power_and_cost_envelope
  inputs:
    - id: intel_lunar_lake
      url: https://www.intel.com/content/www/us/en/products/details/processors/core-ultra/lunar-lake.html
    - id: snapdragon_x_elite
      url: https://www.qualcomm.com/laptops/products/snapdragon-x-elite
    - id: apple_m_ultra_fusion
      url: https://www.apple.com/newsroom/2022/03/apples-new-m1-ultra-is-the-worlds-most-powerful-chip-for-a-personal-computer/
    - id: tsmc_info
      url: https://www.tsmc.com/english
    - id: jedec_lpddr5x_lpddr6
      url: https://www.jedec.org/

release_gate:
  required_status_for_claim: complete_measured_and_signoff_evidence
  forbidden_claims_until_complete:
    - 14A tapeout ready
    - 1.4nm power/performance achieved
    - Pixel-class or 2028 SOTA efficiency
    - sustained CPU or NPU TOPS/W at target
    - chiplet_packaging_validated
    - backside_pdn_signoff_complete
  must_pass_before_release_claim:
    - process_14a_effects_check
    - pd_signoff_release_check
    - sustained_power_thermal_evidence_check
    - cpu_ap_completion_gate
    - aosp_simulator_completion_gate
