schema: eliza.power_thermal_ai_policy.v1
status: DRAFT_CAPTURE_ONLY
claim_boundary: power_thermal_policy_only_no_map_pdn_ir_thermal_or_power_claim
power_map_claim_allowed: false
thermal_map_claim_allowed: false
ir_drop_claim_allowed: false
pdn_signoff_claim_allowed: false
tops_per_watt_claim_allowed: false
release_or_tapeout_claim_allowed: false
title: E1 power / thermal / PDN / IR-drop AI-EDA use policy
description: >
  Fail-closed policy for any AI/ML or generative assistance touching E1 power,
  thermal, PDN, or IR-drop work. AI tooling may only capture targets and hash
  inputs into the quarantine root. It may not generate or modify PDN/floorplan,
  run power/thermal/IR analysis, or emit any power/thermal/IR/PDN signoff claim.
  Promotion past DRAFT_CAPTURE_ONLY requires human PD/power-thermal reviewer
  disposition plus the listed promotion gates and execution-readiness evidence.

# Actions an AI agent is forbidden from performing or claiming under this policy.
blocked_actions:
  - generate_pdn
  - change_pdn
  - change_floorplan
  - generate_power_map
  - generate_thermal_map
  - generate_ir_drop_map
  - run_power_analysis
  - run_thermal_analysis
  - run_ir_drop_analysis
  - run_tcad_device_model
  - import_external_power_dataset
  - download_power_model_weights
  - export_e1_design_to_hosted_model
  - claim_pdn_signoff
  - claim_ir_drop_closure
  - claim_power_savings
  - claim_thermal_margin
  - claim_tops_per_watt
  - claim_release_or_tapeout_readiness

# Evidence that must exist before any AI-assisted power/thermal work executes.
required_before_execution:
  - exact_tool_revision
  - dependency_manifest
  - license_review
  - process_or_technology_manifest
  - package_board_thermal_context
  - workload_manifest
  - vector_or_activity_provenance
  - input_rtl_netlist_layout_or_activity_hashes
  - calibration_trace_manifest
  - held_out_error_analysis
  - deterministic_signoff_replay
  - output_hashes
  - generated_artifact_quarantine_path
  - command_log
  - human_power_thermal_reviewer
  - reviewer_disposition

# Local gates that must pass before any promotion claim.
promotion_gates:
  - python3 scripts/check_power_thermal_ai_policy.py
  - python3 scripts/ai_eda/capture_power_thermal_targets.py --run-id validation
  - python3 scripts/ai_eda/capture_floorplan_io_pdn_targets.py --run-id validation
  - python3 scripts/ai_eda/capture_low_power_intent_targets.py --run-id validation
  - make power-thermal-ai-policy-check
  - make power-thermal-evidence-check
  - make pd-signoff-manifest-check
  - make no-hardware-action-check

# E1-specific context inputs the policy binds to (planning artifacts only).
e1_context_inputs:
  - pd/upf/e1_soc_top.upf
  - pd/upf/power-domains.yaml
  - docs/pd/rail-plan-2028.yaml
  - docs/spec-db/process-14a-effects.yaml
  - docs/evidence/power/pdn-signoff-gate.yaml
  - pd/signoff/pdn-current/local-budget.yaml
  - docs/spec-db/pdn-activity-model.yaml

# Generated AI artifacts must land only inside these quarantine roots.
artifact_quarantine_roots:
  - build/ai_eda/power_thermal/
  - build/ai_eda/power_thermal_targets/

forbidden_claims:
  - pdn_signoff_closed
  - ir_drop_closed
  - power_savings_demonstrated
  - thermal_margin_demonstrated
  - tops_per_watt_measured
  - release_or_tapeout_ready

release_use: prohibited_until_external_review
release_blockers:
  - No calibrated E1 power/thermal/IR-drop label corpus exists for AI training or validation.
  - No commercial PDN signoff (Voltus / RedHawk-SC) seat is procured; gate stays DRAFT_CAPTURE_ONLY.
  - No human PD/power-thermal reviewer disposition recorded for any AI-assisted artifact.
check_command: python3 scripts/check_power_thermal_ai_policy.py
