schema: eliza.dft_atpg_policy.v1
status: DRAFT_CAPTURE_ONLY
claim_boundary: dft_atpg_policy_only_no_scan_atpg_mbist_or_fault_coverage_claim
claim_allowed: false
release_claim_allowed: false
tapeout_claim_allowed: false
scan_insertion_claim_allowed: false
atpg_coverage_claim_allowed: false
mbist_claim_allowed: false
manufacturing_test_readiness_claim_allowed: false
netlist_mutation_claim_allowed: false
description: |
  Governing policy for AI/EDA-assisted design-for-test (DFT) work on the
  Eliza E1 SoC: scan insertion, automatic test pattern generation (ATPG),
  fault simulation, memory BIST, and testability point insertion. This file
  is a fail-closed boundary contract only. It captures targets and lists the
  human review and provenance that any future DFT run must produce; it does
  NOT authorize scan stitching, pattern generation, MBIST wrapper synthesis,
  netlist mutation, or any coverage / manufacturing-readiness claim. ATPG
  tooling (Fault, Atalanta, Quaigh) is not vendored under external/, and no
  coverage number may be asserted without a vendored tool's real output.
  Promotion past DRAFT_CAPTURE_ONLY requires all promotion_gates to pass and
  a human DFT reviewer disposition recorded against every required field.
blocked_actions:
  - insert_scan
  - insert_test_points
  - run_atpg
  - run_fault_simulation
  - generate_test_patterns
  - generate_mbist_wrapper
  - generate_bisr_repair_collateral
  - claim_fault_coverage
  - claim_test_coverage
  - claim_manufacturing_test_readiness
  - claim_release_or_tapeout_readiness
  - change_rtl
  - change_netlist
  - import_external_dft_dataset
  - download_dft_model_weights
  - export_e1_design_to_hosted_model
required_before_execution:
  - human_dft_reviewer
  - reviewer_disposition
  - license_review
  - dependency_manifest
  - exact_tool_revision
  - input_rtl_or_netlist_hashes
  - output_hashes
  - command_log
  - generated_artifact_quarantine_path
  - scan_architecture_manifest
  - fault_model_manifest
  - accepted_netlist_subset
  - test_mode_io_contract
  - deterministic_atpg_baseline
  - manufacturing_test_context
  - regression_or_formal_followup
  - timing_power_area_followup
promotion_gates:
  - python3 scripts/check_dft_atpg_policy.py
  - make dft-atpg-policy-check
  - python3 scripts/ai_eda/capture_dft_atpg_targets.py --run-id validation
  - python3 scripts/ai_eda/capture_memory_macro_library_targets.py --run-id validation
  - make rtl-check
  - make formal
  - make manufacturing-artifacts-check
  - make no-hardware-action-check
e1_context_inputs:
  - rtl/top/e1_chip_top.sv
  - rtl/top/e1_soc_top.sv
  - rtl/npu/e1_npu.sv
  - rtl/dma/e1_dma.sv
  - rtl/interconnect/e1_axi_lite_interconnect.sv
  - pd/constraints/e1_soc.sdc
  - pd/signoff/manifest.yaml
  - pd/dft/scan_insertion.tcl
  - pd/dft/fault_atpg.config.yaml
  - pd/dft/mbist.yaml
  - pd/dft/scan_rules.yaml
  - docs/pd/dft-strategy.md
  - docs/pd/dft-scan-rules.md
  - docs/evidence/pd/dft-evidence.yaml
  - docs/manufacturing/release-manifest.yaml
  - docs/security/test-plan.md
artifact_quarantine_roots:
  - build/ai_eda/dft_atpg/
  - build/dft/
forbidden_claims:
  - "scan chain stitched"
  - "ATPG coverage achieved"
  - "stuck-at coverage >= NN%"
  - "transition-delay coverage closed"
  - "MBIST programmed"
  - "manufacturing test program ready"
  - "DFT signoff complete"
quarantine_root: build/ai_eda/dft_atpg/
external_gates:
  - docs/evidence/pd/dft-evidence.yaml
  - docs/evidence/pd/commercial-eda-gate.yaml
