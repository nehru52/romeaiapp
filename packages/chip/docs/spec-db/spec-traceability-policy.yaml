schema: eliza.spec_traceability_policy.v1
status: ACTIVE
claim_boundary: >
  Spec-to-RTL/test/evidence traceability is built and validated by reviewed,
  deterministic, stdlib tooling over a human-owned requirement registry. No
  AI agent may add, edit, or close a requirement, spec, RTL range, assertion,
  or waiver. AI may only read this graph. Traceability closure % is structural
  completeness, never a silicon, boot, or signoff claim.

owner: spec_traceability

ai_use_policy:
  generated_requirements_allowed: false
  generated_spec_edits_allowed: false
  generated_rtl_allowed: false
  generated_assertions_allowed: false
  generated_waivers_allowed: false
  traceability_signoff_claim_allowed: false
  requirement_coverage_signoff_claim_allowed: false
  false_claim_flags:
    generated_requirements_allowed: false
    generated_spec_edits_allowed: false
    generated_rtl_allowed: false
    generated_assertions_allowed: false
    generated_waivers_allowed: false
    traceability_signoff_claim_allowed: false
    requirement_coverage_signoff_claim_allowed: false

registry:
  dir: docs/spec-db/requirements
  schema: eliza.requirement.v1
  id_format: REQ-<DOMAIN>-NNNN

generator:
  graph_builder: scripts/build_traceability_graph.py
  graph_output: docs/spec-db/traceability/graph.json
  matrix_output: docs/spec-db/traceability/matrix.md
  graph_schema: eliza.traceability_graph.v1

gate:
  checker: scripts/check_traceability.py
  coverage_output: docs/spec-db/traceability/coverage.json
  coverage_schema: eliza.traceability_coverage.v1
  fail_closed_on:
    - dangling_link
    - orphan_requirement
    - unknown_gate
    - expired_waiver
    - source_doc_sha_drift

change_impact:
  query: scripts/query_change_impact.py
  schema: eliza.change_impact.v1

evidence_gates:
  - python3 scripts/build_traceability_graph.py
  - python3 scripts/check_traceability.py
  - make traceability-build
  - make traceability-check
