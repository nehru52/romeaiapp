schema: eliza.spec_db.axi4_interconnect_mmio.v1

description: >
  MMIO register layout for the production AXI4 interconnect
  (rtl/interconnect/axi4/e1_axi4_interconnect.sv).  The interconnect
  itself exposes the status + W1C control lines via direct ports
  (irq_status_clear_we, irq_status_decode_err_clear_mask,
  irq_status_excl_fail_clear_mask, decode_err_irq, exclusive_fail_irq).
  A small AXI-Lite slave (planned but not yet checked in as a separate
  RTL unit) bridges these ports to the documented MMIO addresses below
  so Linux drivers and embedded firmware can read status and acknowledge
  IRQs.

base_address_hex: '0x0000_0000_4000_0000'
size_bytes: 4096
endian: little
access_class: privileged_supervisor_or_machine

registers:
  - name: ICN_REVISION
    offset_hex: '0x000'
    width_bits: 32
    access: read_only
    reset_hex: '0x0001_0003'
    description: >
      Revision register.  Encodes major.minor.patch in [31:16] [15:8]
      [7:0].  Round-3 value 0x0001_0003 corresponds to interconnect rev
      1.0.3 (W1C MMR + multi-master fairness).
  - name: ICN_FEATURES
    offset_hex: '0x004'
    width_bits: 32
    access: read_only
    reset_hex: '0x0000_001F'
    description: >
      Implemented features bitmask:
        [0] DECODE_ERR_IRQ
        [1] EXCLUSIVE_FAIL_IRQ
        [2] W1C_IRQ_STATUS
        [3] QOS_BIASED_RR
        [4] OUTSTANDING_COUNT_DBG
  - name: ICN_DECODE_ERR_IRQ_STATUS
    offset_hex: '0x010'
    width_bits: 32
    access: read_write_1_to_clear
    reset_hex: '0x0000_0000'
    description: >
      Per-master decode-error sticky IRQ status.  Bit m is set on the
      first decode-error edge issued by master m and stays set until
      software writes a 1 to that bit.  Hardware-set wins ties with a
      simultaneous W1C write so a new fault coincident with software
      ack is not silently dropped.
  - name: ICN_EXCLUSIVE_FAIL_IRQ_STATUS
    offset_hex: '0x014'
    width_bits: 32
    access: read_write_1_to_clear
    reset_hex: '0x0000_0000'
    description: >
      Per-master exclusive-fail sticky IRQ status.  Bit m is set when
      another master invalidates master m's pending reservation.  Same
      W1C semantics as ICN_DECODE_ERR_IRQ_STATUS.
  - name: ICN_OUTSTANDING_COUNT_PER_MASTER
    offset_hex: '0x080'
    stride_bytes: 4
    count_per_master: 1
    width_bits: 32
    access: read_only
    description: >
      Per-master outstanding-transaction count.  Bound by MAX_OUTST
      parameterization.  Reads atomically reflect the current depth of
      both the write and read response queues for that master.

write_one_to_clear_semantics: >
  A write to ICN_DECODE_ERR_IRQ_STATUS or ICN_EXCLUSIVE_FAIL_IRQ_STATUS
  with bit m set clears bit m on the next cycle.  Writes with bit m
  clear leave bit m untouched, even if the same write asserts other
  bits.  Hardware-set is sampled on the same clock edge as the W1C
  write; a new edge coincident with software clear results in the bit
  remaining set so the upcoming IRQ is not lost.

verification:
  cocotb_tests:
    - verify/cocotb/axi4/test_irq_w1c.py::decode_err_irq_w1c_clears_status
    - verify/cocotb/axi4/test_irq_w1c.py::excl_fail_irq_w1c_clears_status
    - verify/cocotb/axi4/test_irq_w1c.py::w1c_clears_only_masked_bits

future_work:
  - >
    Bind these registers into an AXI-Lite slave on the existing fabric
    so software can access them via a regular load/store rather than
    direct port connections.  The AXI-Lite slave is the only piece of
    RTL that needs to land before the Linux IOMMU and PLIC drivers can
    poll status and acknowledge IRQs via the same MMIO path used for
    the IOMMU MMR aperture.
