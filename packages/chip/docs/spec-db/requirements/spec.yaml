schema: eliza.requirement.v1
domain: SPEC
owner_scope: spec_targets
description: >
  Target-spec requirements seeded from docs/spec-db/*-2028-target and contract
  documents. Each requirement is a stable node in the traceability graph. Its
  links must resolve to real files; the spec-traceability gate fails closed when
  a declared RTL path, test, evidence file, or manufacturing artifact is missing.
  These IDs are referenced by other domains via `requirement_ids: []`.
