schema: eliza.requirement.v1
domain: VERIF
owner_scope: rtl_verification
description: >
  Verification proof/coverage requirements seeded from the proof_gap and
  test_gap entries of verify/rtl_gap_work_order.yaml. They link the formal
  property packs and cocotb/verilator tests that close (or are scaffolded to
  close) each gap. Status stays `open` while proofs are shallow; the gate
  fails only on a missing declared link.
requirements:
