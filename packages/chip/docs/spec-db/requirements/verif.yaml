    owner: verify
    source_doc: verify/rtl_gap_work_order.yaml
    source_doc_sha: 9ced2ea62555c20520a39575e911586eb6fb22d0b35ffc37c32170608ba7aa54
    status: open
    claim_boundary: shallow_structural_formal_only_no_protocol_proof_claim
    work_order_id: interconnect-axi-lite-proof-coverage
    links:
      rtl:
        - verify/formal/e1_soc_top_formal.sv
      tests:
        - verify/properties/axi_lite_protocol.sv
        - verify/properties/dma_axil_bind.sv
        - verify/properties/dma_axil.sby
      pd_evidence: []
      mfg_artifacts: []
    gates:
      - verification-maturity-matrix-check

