schema: eliza.requirement.v1
domain: RTL
owner_scope: rtl_verification
description: >
  RTL closure requirements seeded from verify/rtl_gap_work_order.yaml. Each
  requirement mirrors one critical gap: its affected_paths become RTL/test
  links and its blocking_gate stays attached so change-impact and the
  fail-closed gate can trace which silicon claims a stub still blocks. These
  requirements are intentionally `open` until production RTL lands; the gate
  only fails when a declared link path is missing, never because the gap is
  still open.
requirements:
  - id: REQ-RTL-0001
    title: CPU subsystem must integrate a production RV64 core, not the tiny contract stub
    owner: cpu
    source_doc: verify/rtl_gap_work_order.yaml
    source_doc_sha: 9ced2ea62555c20520a39575e911586eb6fb22d0b35ffc37c32170608ba7aa54
    status: open
    claim_boundary: tiny_contract_model_blocks_linux_capable_soc_and_product_claims
    work_order_id: cpu-real-core-integration
    links:
      rtl:
        - rtl/cpu/e1_cpu_subsystem_stub.sv
        - rtl/interconnect/e1_linux_soc_contract.sv
      tests:
        - verify/cocotb/test_tiny_cpu_execution.py
      pd_evidence: []
      mfg_artifacts: []
    gates:
      - cpu-ap-completion-gate
      - stub-audit

  - id: REQ-RTL-0002
    title: CPU privileged boot path (CLINT/PLIC/MMU/console) must close before OS bring-up claims
    owner: cpu
