    status: open
    claim_boundary: qemu_renode_semantics_are_not_e1_chip_boot_validation
    work_order_id: cpu-privileged-boot-contract
    links:
      rtl:
        - rtl/cpu/e1_cpu_subsystem_stub.sv
        - rtl/bootrom/e1_bootrom.sv
      tests: []
      pd_evidence: []
      mfg_artifacts: []
    gates:
      - boot-security-chain-contract-check

