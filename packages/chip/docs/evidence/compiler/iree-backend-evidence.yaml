measured_micro_model_descriptor_stream:
  baseline_descriptor_parity_path: compiler/iree-eliza-npu/tests/test_descriptor_parity.py
  baseline_descriptor_parity_status: PASS
  baseline_descriptor_parity_tests: 290
  byte_exact_rtl_vs_python_oracle: true
  cpu_fallback_notes: 'Both GEMMs are NPU-resident. The bias_add + ReLU activation

    composite runs host-side and is reported by the lowering schema as

    ``host_broadcasts_bias`` / ``host_saturates_int8``; the partitioner

    does not classify it as a CPU fallback partition.

    '
  cpu_fallback_pct: 0.0
  description: 'Tiny INT8 GEMM (3x3 @ 3x3, K=3) and 2-layer MLP (two stacked 3x3x3

    INT8 GEMMs with host-side bias_add + ReLU between layers) lowered

    through ``compiler/runtime/e1_npu_lowering.lower_matmul_smoke`` and

    ``lower_bias_add_smoke``, captured as one ``CommandBuffer``

    descriptor per GEMM, driven through the stream-to-scratchpad

    descriptor path, and verified byte-for-byte against

    ``golden_gemm_s8``.

    '
  descriptor_count_per_layer: 1
  descriptor_count_total_two_layer_mlp: 2
  evidence_class: micro_model_rtl_simulator_only
  shape_bound_note: 'The dialect''s MAX_TILE_M/N/K = (3, 3, 7) are dimensional tile

    bounds. The 64-byte scratchpad caps the joint footprint

    independently: a single 3x3x7 INT8 GEMM needs 80 bytes

    (21+21+pad+36) and does not fit in one descriptor. We use 3x3x3

    (56 bytes) for the single-tile path; the tiler in

    ``_dispatch_tiled`` already splits a larger K across multiple

    tiles when called with larger inputs.

    '
  status: PASS
