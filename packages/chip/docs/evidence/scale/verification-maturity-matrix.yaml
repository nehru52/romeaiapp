claim_boundary: scope_limited_to_structural_metadata_inventory_and_gate_diagnostics
current_phase:
  allowed_claims:
  - E1-chip RTL unit behavior.
  - Local AXI-Lite contract smoke behavior.
  - NPU instruction-level scaffold behavior.
  - PD input/preflight readiness only.
  id: phase0_e1_chip_scaffold
  required_local_checks:
  - make rtl-check
  - make cocotb
  - make formal
  - make synth
  - make pd-signoff-manifest-check
generated_utc: '2026-05-20T10:12:30Z'
phase_promotion_gates:
- blocks:
  - 2028-class address-map readiness claims.
  - Scaled interrupt/reset/queue readiness claims.
  - Shared RAM access readiness claims.
  id: phase1_scaled_contract_verification
  promotion_claim: Scaled RAM/CPU/NPU contracts are integration-ready.
  required_evidence:
    cocotb:
      artifacts:
      - verify/cocotb/results/phase1_scaled_contract.xml
      - verify/cocotb/results/phase1_contention_negative.json
      commands:
      - make cocotb
      - make cocotb-contract
      must_cover:
      - CPU, DMA, NPU, display, interrupt, reset, and shared RAM paths.
      - Queue overflow, illegal DMA, stale-buffer, timeout, and fault paths.
    formal:
      artifacts:
      - verify/formal/results/phase1_scaled_arbitration.json
      - verify/formal/results/phase1_reset_interrupt_bounds.json
      commands:
      - make formal
      must_cover:
      - Arbitration liveness and fairness.
      - Reset, interrupt, isolation, and bounded queue properties.
    regression:
      artifacts:
      - verify/regression/results/phase1_scaled_regression.json
      - verify/regression/results/phase1_scaled_regression.log
      commands:
      - make ci-fast
      - make pipeline-check
      must_cover:
      - Regression suite result for the scaled RAM/CPU/NPU configuration.
      - Cocotb, formal, lint, synthesis, benchmark dry-run, and PD manifest gate statuses.
      - Failure triage proving no skipped test is counted as evidence_passed.
  status: blocked
- blocks:
  - 2028-class CPU memory bandwidth/latency readiness claims.
  - 2028-class NPU throughput or perf/W readiness claims.
  - Scaled RTL area/timing feasibility readiness claims.
  id: phase2_scaled_perf_and_synthesis
  promotion_claim: Scaled RAM/CPU/NPU configuration has measured target performance
    and synthesis evidence.
  required_evidence:
    performance:
      artifacts:
      - benchmarks/results/phase2_scaled_cpu_memory/report.json
      - benchmarks/results/phase2_scaled_npu/report.json
      - benchmarks/results/phase2_scaled_contention/report.json
      commands:
      - python3 benchmarks/run_benchmarks.py --dry-run --report-id scale-feasibility-dry-run
      must_cover:
      - Target-platform runs, not host smoke.
      - CPU fallback rejection for NPU claims.
      - Model/input hashes, tool versions, target identifier, and claim level.
    synthesis:
      artifacts:
      - build/reports/phase2_scaled_synth_summary.json
      - build/reports/phase2_scaled_timing_area_summary.json
      - build/reports/phase2_scaled_tool_versions.txt
      commands:
      - make synth
      - make tool-versions
      must_cover:
      - Scaled RTL source/config hashes.
      - Area, inferred memories/IP, timing estimate, and lint status.
  status: blocked
- blocks:
  - Tapeout feasibility claims.
  - 2028-class physical feasibility claims.
  - Board/package current, thermal, SI/PI readiness claims.
  id: phase3_scaled_pd_signoff
  promotion_claim: Scaled RAM/CPU/NPU implementation is physically feasible for release.
  required_evidence:
    pd:
      artifacts:
      - pd/openlane/runs/phase3_scale/signoff-run.yaml
      - pd/openlane/runs/phase3_scale/final/gds/e1_chip_top.gds
      - pd/openlane/runs/phase3_scale/final/def/e1_chip_top.def
      - pd/openlane/runs/phase3_scale/reports/signoff/phase3_drc.rpt
      - pd/openlane/runs/phase3_scale/reports/signoff/phase3_lvs.rpt
      - pd/openlane/runs/phase3_scale/reports/signoff/phase3_sta.rpt
      - pd/openlane/runs/phase3_scale/final/spef/e1_chip_top.spef
      - pd/openlane/runs/phase3_scale/final/sdf/e1_chip_top.sdf
      - pd/openlane/runs/phase3_scale/reports/signoff/phase3_corners.yaml
      - pd/openlane/runs/phase3_scale/reports/signoff/tool_versions.txt
      commands:
      - make pd-preflight-check
      - make pd-signoff-manifest-check
      - make pd-signoff-check
      must_cover:
      - OpenROAD/OpenLane run provenance and command/config hashes.
      - GDS, DEF, DRC, LVS, STA, SPEF, SDF, timing corners, and tool versions.
      - Utilization, congestion, density/fill, PDN/current, SI/PI, package, and thermal
        evidence.
  status: blocked
promotion_rules:
- Current e1-chip checks can satisfy only phase0_e1_chip_scaffold.
- A phase may be promoted only when status is evidence_passed and every artifact listed
  for that phase exists as an immutable report from the scaled configuration.
- Host smoke, dry-run output, preflight output, target-spec documents, and scaffold
  tests must not promote 2028 RAM/CPU/NPU claims.
- Earlier phase blockers prevent later phase promotion; later phases cannot be promoted
  while any earlier phase remains blocked.
schema: eliza.verification_maturity_matrix.v1
scope:
  current_baseline: e1_chip_local_scaffold
  target_scale: 2028_ram_cpu_npu_signoff
status: phase_promotion_blocked_without_evidence
