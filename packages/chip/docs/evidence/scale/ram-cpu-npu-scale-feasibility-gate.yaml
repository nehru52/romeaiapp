claim_boundary:
  allowed_current_claims:
  - Local RTL unit and contract checks can describe scaffold behavior only.
  - Simulator or benchmark dry-runs can describe harness wiring only.
  - OpenLane/OpenROAD preflight can describe input and command readiness only.
  blocked_claims:
  - 2028-class phone AP readiness.
  - Production RAM capacity, bandwidth, coherency, QoS, or isolation readiness.
  - Linux-capable multi-core CPU/AP readiness.
  - 2028-class NPU TOPS, sustained perf/W, SRAM bandwidth, or NNAPI readiness.
  - Tapeout or physical feasibility at scaled RAM/CPU/NPU complexity.
claim_rules:
- Any 2028-class RAM/CPU/NPU claim remains blocked until every required_evidence_group
  status is evidence_passed and all artifact_paths exist.
- Host smoke, dry-run, scaffold, preflight, or target-spec documents must not be used
  as release evidence.
- Raising any group to evidence_passed requires executable commands and immutable
  report artifacts from the scaled configuration.
generated_utc: '2026-05-20T10:12:30Z'
linux_capable_cpu_claim_allowed: false
npu_2028_class_claim_allowed: false
physical_feasibility_claim_allowed: false
production_ram_claim_allowed: false
release_claim_allowed: false
tapeout_claim_allowed: false
required_evidence_groups:
- artifact_paths:
  - verify/cocotb/results/scale_ram_cpu_npu_contract.json
  - verify/cocotb/results/scale_contention_negative_tests.json
  id: cocotb_integration
  local_precheck_commands:
  - make cocotb
  - make cocotb-contract
  required_before_claim:
  - Scaled RAM/CPU/NPU address-map contract tests.
  - Contended DMA, CPU, NPU, display, interrupt, and reset tests.
  - Negative tests for stale shared buffers, illegal DMA, queue overflow, and timeout/fault
    paths.
  status: blocked
- artifact_paths:
  - verify/formal/results/scale_interconnect_memory.sby.json
  - verify/formal/results/scale_npu_queue_dma.sby.json
  id: formal_properties
  local_precheck_commands:
  - make formal
  required_before_claim:
  - Arbitration liveness and fairness properties for CPU/DMA/NPU/display clients.
  - Memory ordering, isolation, reset, interrupt, and queue bound properties.
  - Bounded proofs for scaled parameters or proof matrix explaining limits.
  status: blocked
- artifact_paths:
  - benchmarks/results/scale-cpu-memory-target/report.json
  - benchmarks/results/scale-npu-target/report.json
  - benchmarks/results/scale-contention-target/report.json
  id: performance_evidence
  local_precheck_commands:
  - python3 benchmarks/run_benchmarks.py --dry-run --report-id scale-feasibility-dry-run
  required_before_claim:
  - Target-platform benchmark reports, not host smoke or simulator-only dry-runs.
  - CPU memory bandwidth/latency, NPU model latency/throughput, and contention runs.
  - Report metadata proving claim level, target, tool versions, model hashes, and
    no CPU fallback for NPU claims.
  status: blocked
- artifact_paths:
  - build/reports/scale_synth_summary.json
  - build/reports/scale_timing_area_summary.json
  - build/reports/scale_tool_versions.txt
  id: synthesis_timing_area
  local_precheck_commands:
  - make synth
  - make tool-versions
  required_before_claim:
  - Yosys or equivalent synthesis for the scaled RTL configuration.
  - Area, inferred memory/IP, timing estimate, lint, and tool-version reports.
  - Source/config hashes proving reports match the scaled RTL.
  status: blocked
- artifact_paths:
  - pd/openlane/runs/scale/signoff-run.yaml
  - pd/openlane/runs/scale/final/gds/e1_chip_top.gds
  - pd/openlane/runs/scale/final/def/e1_chip_top.def
  - pd/openlane/runs/scale/reports/signoff/scale-sta.rpt
  - pd/openlane/runs/scale/reports/signoff/scale-drc.rpt
  - pd/openlane/runs/scale/reports/signoff/scale-lvs.rpt
  id: physical_design_signoff
  local_precheck_commands:
  - make pd-preflight-check
  - make pd-signoff-manifest-check
  - make pd-signoff-check
  required_before_claim:
  - OpenLane/OpenROAD run manifest tied to the scaled configuration.
  - GDS, DEF, DRC, LVS, STA, SPEF, SDF, corner, utilization, congestion, density/fill,
    and tool-version artifacts.
  - PDN/current, SI/PI, thermal, padframe, package, and board constraints for the
    scaled design.
  status: blocked
schema: eliza.scale_feasibility_gate.v1
scope:
- RAM capacity/bandwidth scaling
- Linux-capable CPU/AP scaling
- 2028-class NPU throughput and memory scaling
status: 2028_class_claims_blocked_without_evidence
