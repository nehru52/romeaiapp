claim_boundary: 'RVV 1.0 execution gate. CSR file (rtl/cpu/rvv/rvv_csr.sv), a real
  element-wise integer/logic ALU subset (rtl/cpu/rvv/rvv_alu_subset.sv, cocotb-verified
  against a reference model), and the dispatch-boundary stub for unsupported ops (rtl/cpu/rvv/rvv_unit_stub.sv)
  are in place. Full vector load/store, gather/scatter, reductions, narrowing, widening,
  fixed-point, floating-point, masking, and permutation are NOT yet in RTL. ISA-level
  functional evidence (RVV 1.0 executes end to end with a measured scalar-vs-vector
  dynamic instruction reduction) is recorded in e1-rvv-vector.json at claim_level
  "functional"; this is NOT a cycle- accurate or silicon perf claim. No RTL vector
  perf or full-conformance claim is allowed until a complete vector backend (forked
  from Saturn, Ara, Vicuna, or XiangShan, or a from-scratch extension of the subset
  ALU) lands and passes the riscv-arch-test RVV 1.0 subset.

  '
fail_closed_until:
- one candidate upstream forked under external/, OR
- the rvv_alu_subset is extended (or a from-scratch backend in rtl/cpu/rvv/ added)
  to cover memory + reductions + masking and passes the riscv-arch-test RVV 1.0 subset
  and the riscv-dv vector smoke
functional_iss_evidence:
  claim_level: functional
  metric: dynamic instruction count, scalar rv64gc vs vector rv64gcv
  reproduce: scripts/run_e1_rvv_vector.sh
  substrate: qemu-user rva23u64 (RVV 1.0), vlen=256
