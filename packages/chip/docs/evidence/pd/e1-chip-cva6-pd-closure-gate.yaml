summary: 'The committed e1_chip_top OpenLane PD configs synthesize the SoC with the
  CVA6 application-processor wrapper in its safe-idle stub form (E1_HAVE_CVA6 is NOT
  defined), i.e. a debug-MMIO test-chip netlist with no processor datapath. A CVA6-inclusive
  signoff netlist (E1_HAVE_CVA6 defined + the pinned CVA6 source flist) is proven
  to ELABORATE locally, but full sky130 OpenLane place-and-route of the ~240-module
  CVA6-inclusive top is a foundry-PDK, multi-hour job that has not been closed locally.
  This gate stays BLOCKED until a CVA6-inclusive run reaches final/ with reviewed
  DRC/LVS/STA/antenna evidence. The configs are NOT silently flipped to imply a synthesized
  CPU.

  '
to_close_this_gate:
  step_1_clone_cva6: scripts/clone_cva6.sh
  step_2_apply_patches: scripts/apply_cva6_patches.sh
  step_3_assemble_cva6_inclusive_config: "Add +define+E1_HAVE_CVA6 to VERILOG_DEFINES\
    \ of the target PD config and extend VERILOG_FILES (or VERILOG_INCLUDE_DIRS) with\
    \ the expanded CVA6 flist produced by:\n  CVA6_REPO_DIR=external/cva6/cva6 \\\n\
    \  HPDCACHE_DIR=external/cva6/cva6/core/cache_subsystem/hpdcache \\\n  TARGET_CFG=cv64a6_imafdc_sv39\
    \ \\\n  python3 scripts/expand_cva6_flist.py \\\n    --flist external/cva6/cva6/core/Flist.cva6\
    \ \\\n    --files-out <host-tmp>/cva6_files.txt --incdir-out <host-tmp>/cva6_incdir.txt\n\
    plus rtl/top/adapters/e1_cva6_to_e1axi4.sv before rtl/cpu/e1_cva6_wrapper.sv.\n"
  step_4_run_pnr: "Run OpenLane on a capable host (>= 64 GiB RAM; multi-hour):\n \
    \ scripts/run_openlane.sh pd/openlane/config.sky130.json\nThe run must reach RUN_*/final/metrics.json\
    \ with QUIT_ON_TIMING_VIOLATIONS, QUIT_ON_MAGIC_DRC, QUIT_ON_LVS_ERROR, QUIT_ON_SLEW_VIOLATIONS\
    \ all honoured.\n"
  step_5_record_evidence: 'Capture the final DRC/LVS/STA/antenna metrics and flip
    this gate to PASS with the run path, mirroring docs/evidence/pd/e1-soc-hard-macro-signoff-gate.yaml.

    '
