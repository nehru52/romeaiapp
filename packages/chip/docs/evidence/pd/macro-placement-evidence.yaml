release_blockers:
- "OpenRAM-generated 4 KB SRAM end-to-end toolchain is wired: pip openram 1.2.48 in\
  \ chip .venv, EDA stack via OpenRAM install_conda.sh at <home>/.openram-miniconda\
  \ (magic 8.3.363 + ngspice 26 + netgen 1.5.253 + klayout 0.28.3), sky130_fd_bd_sram\
  \ cell library at <home>/.openram-pdk/sky130_fd_bd_sram (pinned dd64256), Sky130A\
  \ PDK symlinked from external/pdks/volare. First run hit an upstream OpenRAM bug:\
  \ compiler/verify/magic.py writes #!/bin/sh + 'source <conda activate>', which dash\
  \ on Ubuntu rejects \u2014 bitcell_array LVS exits 0 without producing the report\
  \ file, OpenRAM asserts. Local patch flips #!/bin/sh to #!/bin/bash in magic.py\
  \ write_drc_script / write_lvs_script / write_extract_script and clears compiler/verify/__pycache__.\
  \ Second run pending; expected wall ~40-90 min with inline_lvsdrc=True. Once .lef/.gds/.lib/.sp\
  \ land in pd/macros/sky130/e1_sram_4kb_1rw/build/, promote into pd/openlane/config.sky130.json\
  \ EXTRA_LEFS/EXTRA_LIBS/EXTRA_GDS_FILES and flip the manifest's BLOCKED_run_openram\
  \ entries. 16 KB / 64 KB use the same flow with different num_words."
- DREAMPlace head-to-head ran locally (CPU); GPU path remains BLOCKED because Docker
  NVIDIA runtime is not registered and the prebuilt limbo018/dreamplace:cuda image
  targets sm_60-sm_75 (RTX 5080 is sm_120). For GPU acceleration, rebuild DREAMPlace
  inside a CUDA 12.x image with -DCMAKE_CUDA_FLAGS='-gencode=arch=compute_120,code=sm_120'
  once a working nvidia-docker runtime is in place.
- AlphaChip post-route PPA truth (run_post_route_ppa.py output) requires a release
  run with the new macros config to finish first.
- False Dawn controversy (arXiv 2302.11014) requires post-route PPA, not proxy cost,
  as the final acceptance metric.
- PPO RL training pending H200 GPU access. Nebius runbook ready at scripts/alphachip/nebius_h200_runbook.md.
  Local RTX 5080 has only 16 GB VRAM and is not sufficient for the full PPO trajectory
  buffer.
- OpenROAD AutoTuner Optuna sweep requires `pip install optuna`.
