  discovered: 2026-05-22
  kind: rtl_systemverilog_frontend_incompatibility
  offending_rtl_read_only_for_ws2:
  - file: rtl/bootrom/e1_bootrom.sv
    line: 24
    statement: parameter string ROM_HEX = "build/boot-rom/e1_secure_boot_rom.hex"
  - file: rtl/bootrom/e1_bootrom.sv
    line: 40
    statement: string rom_path;  (+ the $value$plusargs override block, lines 40-49)
  proof_commands:
    proof_result_2026_05_22: 'With both bootrom edits applied (proven via bind-mounted
      patched copy):

      20x "Successfully finished Verilog frontend.", zero ERROR lines, across the

      full config.sky130.json VERILOG_FILES list. The package-import blocker is

      gone and the bootrom `string` blocker is the only remaining frontend issue.

      '
    prove_full_list_compiles_with_fix: "# ws2 proved the fix without editing the read-only\
      \ RTL by bind-mounting a\n# patched copy over the file inside the container.\
      \ After the lead lands the\n# fix in-tree, the bind-mount is unnecessary \u2014\
      \ read_verilog of the real\n# VERILOG_FILES list parses clean.\nFILES=$(python3\
      \ -c \"import json; d=json.load(open('pd/openlane/config.sky130.json')); \\\n\
      \  print(' '.join('./'+f.replace('dir::../../','') for f in d['VERILOG_FILES']))\"\
      )\ndocker run --rm -v \"$PWD\":. -w . ghcr.io/efabless/openlane2:2.4.0.dev1\
      \ \\\n  yosys -p \"read_verilog -sv -DE1_PD_SMALL_DRAM -DE1_HAVE_HARD_SRAM $FILES\"\
      \ \\\n  2>&1 | grep -c \"Successfully finished Verilog frontend.\"\n# expect:\
      \ 20  (and zero ERROR lines)\n"
  required_rtl_fix_for_lead:
    description: 'RTL is READ-ONLY for ws2. The lead (or RTL owner) must apply BOTH
      edits

      below to rtl/bootrom/e1_bootrom.sv. Both have been proven to make the

      entire 20-file config.sky130.json VERILOG_FILES list parse clean in the

      actual openlane2 image Yosys read_verilog frontend (see proof below: 20x

      "Successfully finished Verilog frontend.", zero errors).

      '
    edits:
    - action: drop_string_type_keyword_on_parameter
      detail: 'A bare untyped parameter initialized with a string literal is accepted

        by the Yosys frontend and is functionally identical for $readmemh.

        '
      file: rtl/bootrom/e1_bootrom.sv
      from: parameter string ROM_HEX = "build/boot-rom/e1_secure_boot_rom.hex"
      line: 24
      to: parameter ROM_HEX = "build/boot-rom/e1_secure_boot_rom.hex"
    - action: remove_string_local_and_plusarg_override_read_rom_hex_directly
      detail: "The $value$plusargs(\"BOOT_ROM_HEX=%s\", rom_path) path is simulator-only\n\
        and unsynthesizable. Replace the `string rom_path;` declaration and the\n\
        plusarg if/else block with a direct `$readmemh(ROM_HEX, mem);`. Concretely,\n\
        replace lines 40-49 (the `string rom_path;` decl, the zero-fill loop is\n\
        kept, the plusarg if/else, and `$readmemh(rom_path, mem);`) with:\n  for (int\
        \ i = 0; i < WORDS; i++) begin\n      mem[i] = 32'h0000_0000;\n  end\n  $readmemh(ROM_HEX,\
        \ mem);\nThis drops only the sim-time plusarg override (testbenches can override\n\
        the ROM_HEX parameter directly instead), preserving all synthesized\nbehaviour\
        \ and the published header overlay.\n"
      file: rtl/bootrom/e1_bootrom.sv
      lines: 40-49
  root_cause: "Yosys's read_verilog Verilog-2005 frontend (no slang plugin in the\
    \ image)\ndoes not accept the SystemVerilog `string` data type. e1_bootrom.sv\
    \ uses it\nin two places:\n  (1) module-header parameter type: `parameter string\
    \ ROM_HEX = \"...\"`\n      (line 24) \u2014 `string` is lexed as a bare TOK_ID,\
    \ so the next token\n      ROM_HEX is unexpected.\n  (2) initial-block local:\
    \ `string rom_path;` (line 40), used only to hold a\n      $value$plusargs(\"\
    BOOT_ROM_HEX=%s\", rom_path) sim-time override path.\nThis is purely an unsynthesizable\
    \ sim-only construct; nothing about the\nsynthesized boot-ROM aperture depends\
    \ on `string`.\n"
