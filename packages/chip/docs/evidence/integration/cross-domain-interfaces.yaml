- cluster_fabric_geometry:
    cluster_axi_id_width: 8
    cluster_master_range: fabric masters[3..10]
    cva6_id_adapter: zero-pad 4-bit CVA6 IDs to the 8-bit fabric ID contract
    cva6_slot0_fabric_master: fabric master[2]
    fabric_id_width: 8
    fabric_masters: 11
    verification: make cocotb-cross-domain
  description: "e1_cluster_top 8 AXI4 masters \u2192 e1_axi4_interconnect fabric masters[3..10],\
    \ with CVA6 slot-0 proof traffic routed separately through fabric master[2]\n"
  in_band_soc_verified: true
  in_band_soc_verified_by:
    adapter: rtl/top/adapters/e1_axi4_width_converter.sv
    cocotb_makefile: verify/cocotb/integration/Makefile.cva6-soc
    cocotb_module: verify/cocotb/integration/test_cva6_boots_in_soc.py
    cocotb_target: cocotb-cva6-soc
    memory_model: rtl/memory/dram_ctrl/e1_dram_ctrl.sv via fabric slave[0]
    proof: "Under `+define+E1_HAVE_CVA6 +define+E1_CLUSTER_SLOT0_CVA6` the\n`u_soc.u_cva6_slot0`\
      \ instance drives a 64-bit AXI4 master through\n`e1_axi4_width_converter` into\
      \ 128-bit, 8-bit-ID fabric master[2],\nthrough `e1_axi4_interconnect`, and into\
      \ fabric slave[0] /\n`e1_dram_ctrl`.\nThe test preloads the shared DRAM controller\
      \ at 0x8000_0000 via\n`+E1_DRAM_PRELOAD_HEX=boot_rom.hex`.  Two cocotb tests\
      \ assert:\n  - CVA6 issues an AR + receives an R beat at the downstream\n  \
      \  (128-bit) side after reset, proving the wrapper\u2192adapter\u2192\n    converter\u2192\
      fabric\u2192DRAM-controller chain propagates a fetch\n    end-to-end.\n  - CVA6\
      \ retires the 8-instruction store/load program: \u22651 AW,\n    \u22651 W,\
      \ \u22651 B handshake (the SD instruction) and \u22652 AR + \u22652 R\n    beats\
      \ (initial fetch line + the LD instruction).\n"
    tests_fail: 0
    tests_pass: 2
  name: cluster_to_fabric
  notes: "The CVA6 wrapper (`rtl/cpu/e1_cva6_wrapper.sv`) instantiates the\nOpenHW\
    \ Group CVA6 v5.3.0 API\n(`cva6 #(.CVA6Cfg(build_config_pkg::build_config(\ncva6_config_pkg::cva6_cfg)))`)\
    \ and bridges its `noc_req_t` /\n`noc_resp_t` structs to flat AXI4 master signals\
    \ via the\n`rtl/top/adapters/e1_cva6_to_e1axi4.sv` adapter.  Both files\nelaborate\
    \ cleanly under verilator-strict --lint-only with the\nfull v5.3.0 source tree\
    \ linked (185 modules, ~275 MB of CVA6\nsources via `external/cva6/cva6/core/Flist.cva6`,\
    \ zero errors),\nand Verilator lowers and builds them end-to-end (see\n`verilator_full_conversion_resolved_by`\
    \ above).\n\nFour cocotb tests under the dedicated `e1_cva6_unit_tb` harness\n\
    cover the wrapper-level execution path (`make\ncocotb-cva6-cpu-bootrom` and `make\
    \ cocotb-cva6-cpu-dram`):\n`test_cva6_starts_fetching`, `test_cva6_executes_four_instructions`,\n\
    `test_cva6_dram_store`, `test_cva6_dram_load` \u2014 all four PASS.\nStructural\
    \ proof: CVA6 issues an AR handshake against the\nboot-ROM region, the icache\
    \ mem path returns the line, the\n8-instruction store/load program executes, fires\
    \ an AW + W + B\nsequence against the DRAM region, and a follow-on AR + R for\n\
    the load.\n\nSoC integration: at the SoC top\n(`rtl/top/e1_soc_integrated.sv`)\
    \ under\n`+define+E1_CLUSTER_SLOT0_CVA6` the CVA6 wrapper's 64-bit AXI4\nmaster\
    \ flows through `e1_axi4_width_converter` into 128-bit fabric\nmaster[2], then\
    \ through `e1_axi4_interconnect` to `e1_dram_ctrl`.\nThe default `e1_cluster_top`\
    \ instance's eight production-shape AXI4\nmaster ports use the full 8-bit cluster\
    \ ID width and are attached\nto fabric masters[3..10]; the cross-domain quiet\
    \ test elaborates\nand samples those lite-mode ports through the widened fabric.\n\
    The converter is exercised by eight cocotb tests under\n`verify/cocotb/axi4/test_width_converter.py`\
    \ (all\npassing) covering both single-beat and multi-beat write/read\nbursts,\
    \ partial-WSTRB, lane mux on both low and high address\nlanes, AxLEN/AxSIZE pass-through,\
    \ single-inflight FSM, and\nreset quiescence.\n\nRoot cause of the historical\
    \ `WIRED_PARTIAL` block (resolved\nin this round):\n\n  1. TB boot vector was\
    \ `0x1000`, which sits in CVA6's cv64a6\n     *non-executable* PMA window (`ExecuteRegionAddrBase\
    \ =\n     {0x8000_0000, 0x1_0000, 0x0}`, `ExecuteRegionLength =\n     {0x40000000,\
    \ 0x10000, 0x1000}` \u2192 executable regions are\n     `[0, 0x1000)`, `[0x1_0000,\
    \ 0x2_0000)`, and the DRAM range).\n     CVA6 raised `INSTR_ACCESS_FAULT` during\
    \ the cv64a6 PMP /\n     PMA check at the very first speculative fetch before\
    \ the\n     icache could issue any AR.  The standalone unit TB still uses\n  \
    \   the 0x1_0000 executable ROM window; the in-band SoC proof now\n     boots\
    \ at 0x8000_0000 so the fetch is served by the shared\n     DRAM-controller path\
    \ instead of a private slot-0 ROM model.\n\n  2. The boot-ROM preload via `dut.boot_rom[i].value\
    \ = ...`\n     silently no-op'd: Verilator does not register a writable\n    \
    \ cocotb-GPI handle for every element of an unpacked\n     `logic [63:0]` array.\
    \  Fixed by switching the preload to\n     `$readmemh` from a `boot_rom.hex` file\
    \ written by the\n     cocotb tests at module-import time (before sim start),\n\
    \     and re-exporting `boot_rom[0..2]` plus `dram_mem[0]` as\n     flat-port\
    \ mirrors so the tests can assert preload success\n     after the TB's `initial`\
    \ block runs.\n\n  3. The dram-test program had a typo in the LUI encoding\n \
    \    (`0x000CAFEC | 0x37 = 0x000CAFFF`), which was supposed\n     to encode `lui\
    \ x1, 0xCAFEC = 0xCAFEC0B7`.  Without the\n     correct LUI, x1 never held a meaningful\
    \ payload and the\n     store never reached the AXI4 master.  Fixed in\n     `verify/cocotb/integration/test_cva6_dram_read_write.py`.\n"
  status: WIRED
  tested_by:
  - cluster_lite_tieoff_drives_axi_to_quiet
  - test_cva6_executes_from_bootrom
  - test_cva6_starts_fetching
  - test_cva6_executes_four_instructions
  - test_cva6_dram_store
  - test_cva6_dram_load
  - test_cva6_boots_through_soc_slot0
  - test_cva6_executes_store_load_in_soc
  - single_beat_64_to_128_write_then_read
  - single_beat_high_lane_address_uses_strb_offset
  - multi_beat_write_burst_increments_lane
  - multi_beat_read_burst_returns_all_beats
  - partial_wstrb_preserves_unwritten_bytes
  - burst_length_passthrough
  - back_to_back_writes_single_inflight
  - reset_quiesces_outputs
  verilator_full_conversion: PASS
  verilator_full_conversion_resolved_by: "The Verilator 5.049 V3Delayed `Unexpected\
    \ LHS form` crash on the\nwhole-array NBA at `btb.sv:188` (and the identical pattern\
    \ at\n`bht.sv:122`) is resolved by two local patches:\n  - patches/cva6/btb-v3delayed-workaround.patch\n\
    \  - patches/cva6/bht-v3delayed-workaround.patch\nBoth patches replace `btb_q\
    \ <= btb_d;` / `bht_q <= bht_d;` (a\nwhole-array NBA to a 2D unpacked struct array)\
    \ with an explicit\nper-element nested `for` loop.  The two forms are semantically\n\
    equivalent, but the per-element form exercises the supported\nper-element NBA\
    \ lowering path.  The patches are applied\nidempotently by `scripts/apply_cva6_patches.sh`,\
    \ which is run\nautomatically by the `cocotb-cva6-cpu-*` Makefile targets before\n\
    invoking Verilator.  Confirmed: Verilator 5.049 elaborates and\nlowers the full\
    \ CVA6 v5.3.0 source tree end-to-end with the\npatches applied (no internal error).\n"
  width_converter:
    adapter: rtl/top/adapters/e1_axi4_width_converter.sv
    cocotb_module: verify/cocotb/axi4/test_width_converter.py
    cocotb_target: cocotb-axi4-width-converter
    configurations_supported:
    - passthrough
    - upsize
    - downsize
    spec_reference: "AXI4 IHI 0022, section A8.4 (\"Data bus width conversion\"):\n\
      \  - A8.4.1 Upsizing: master AxSIZE smaller than slave bus width;\n    AxLEN/AxSIZE\
      \ pass through unchanged, beat data placed on the\n    lane selected by address[byte_offset_w\
      \ +: lane_select_w],\n    WSTRB replicated on that lane only.  This is the path\n\
      \    exercised at the SoC top (CVA6 64-bit master -> 128-bit\n    slot-0 net).\n\
      \  - A8.4.2 Downsizing: each upstream beat serialised into\n    RATIO = UPSTREAM_DATA_W\
      \ / DOWNSTREAM_DATA_W downstream\n    beats; new AxLEN+1 = (old AxLEN+1) * RATIO\
      \ when AxSIZE\n    matches the wider bus, else AxLEN/AxSIZE pass through.\n\
      \    R-side collects RATIO sub-beats back into one upstream beat.\nInflight\
      \ model: one outstanding AW and one outstanding AR at a\ntime, sufficient for\
      \ CVA6 cv64a6 (which sets\nAxiBurstWriteEn=0 and issues at most one cache-fill\
      \ read in\nflight per id).\n"
    tests_fail: 0
    tests_pass: 8
  wired_at: rtl/top/e1_soc_integrated.sv
- description: "TL-C \u2192 CHI \u2192 AXI4 cache south-side bridge"
  id_adapter:
    bridge_id_width: 6
    fabric_id_width: 8
    policy: zero-pad bridge request IDs to 8 bits and slice responses back to 6 bits
  name: chi_to_axi4_bridge
  notes: "A single SLC slice (`u_slc`, SIZE_BYTES=65536, WAYS=4, BANKS=2)\nis instantiated\
    \ in the integrated top.  Its `dram_acq` line\ntransactions drive the line-shim\
    \ adapter\n(`rtl/top/adapters/e1_slc_to_chi_line_shim.sv`), which in turn\ndrives\
    \ the `e1_chi_to_axi4_bridge` request side.  A small MMIO\nfixture at 0x1008_0000\
    \ lets cocotb trigger a single line read /\nwrite so the CHI \u2192 AXI4 path\
    \ traverses end-to-end:\n\n  SLC client (MMIO fixture)\n    \u2192 e1_slc.dram_acq_*\n\
    \      \u2192 e1_slc_to_chi_line_shim\n        \u2192 e1_chi_to_axi4_bridge (CHI\
    \ request side)\n          \u2192 fabric master[0]\n            \u2192 fabric\
    \ slave[0]\n              \u2192 e1_dram_ctrl\n                \u2192 e1_axi4_dram_model\n\
    \n`test_slc_passthrough` proves a single round-trip; the response\ndata latched\
    \ into `slc_fix_grant_lo` equals the cold-DRAM value\n(zero).  `test_dram_ctrl_dfi_traffic`\
    \ proves back-to-back line\nreads at distinct addresses interleave correctly with\
    \ the DRAM\ncontroller's refresh / ZQ scheduler.\n"
  status: WIRED
  tested_by:
  - test_slc_passthrough
  - test_dram_ctrl_dfi_traffic
  wired_at: rtl/top/e1_soc_integrated.sv
- description: "IOMMU upstream masters \u2192 translation \u2192 fabric master[1]"
  id_adapter:
    downstream_id_width: 6
    fabric_id_width: 8
    policy: zero-pad downstream request IDs to 8 bits and slice responses back to
      6 bits
  name: iommu_translation
  notes: 'The IOMMU''s AXI-Lite MMIO slave is bridged onto the v0 32-bit

    debug aperture at base 0x1006_0000 (4 KiB window).  Each 64-bit

    IOMMU register is reached by a write-low / write-high pair:

    writing `addr[2]==0` stashes the low 32 bits, writing

    `addr[2]==1` launches the AXI-Lite write with `{wdata, stash}`

    and `araddr = {addr[11:3], 3''h0}`.  Reads launch an AR on every

    4-byte access and latch the low half of the IOMMU''s 64-bit

    response into `iommu_mmio_latched_rdata[31:0]`.


    A second MMIO fixture at 0x1007_0000 (256 B) drives one IOMMU

    upstream master with a single-beat AXI4 transaction so cocotb can

    trigger an unauthorised DMA without instantiating a full NPU /

    DMA engine.  Programmer registers IOVA / CTRL / STATUS / DEV_ID

    map to the IOMMU''s `u_a*_devid[0]` / `u_a*_pasid[0]` /

    `u_a*addr[0]` ports.


    `test_iommu_programmed_fault` programs DDTP to a translating

    mode, sets DEV_ID = 0xBAD (not in the allowlist), and triggers a

    read.  The IOMMU grants the master, the device-id check fails,

    and a `CAUSE_DDT_ENTRY_NOT_VALID` fault record is pushed.  The

    SoC boundary surfaces `fault_irq` + `fault_count`; the FQT

    register also advances and is observable via the MMIO bridge.

    '
  status: WIRED
  tested_by:
  - iommu_fault_count_initially_zero
  - test_iommu_programmed_fault
  wired_at: rtl/top/e1_soc_integrated.sv
- description: "PMC AON Ibex mailbox \u2194 main-rail MMIO bridge"
  name: pmc_mailbox
  status: WIRED
  tested_by:
  - pmc_mailbox_roundtrips_telemetry
  wired_at: rtl/top/e1_soc_integrated.sv
- description: "fabric \u2192 e1_dram_ctrl \u2192 e1_axi4_dram_model"
  name: dram_south
  notes: "AXI4 traffic from the SLC fixture (MMIO-controlled) flows\nthrough the line\
    \ shim \u2192 CHI bridge \u2192 fabric master[0] \u2192 fabric\nslave[0] \u2192\
    \ `e1_dram_ctrl` \u2192 `e1_axi4_dram_model`.  Both the\nsingle-line passthrough\
    \ and the back-to-back two-line case are\nexercised at the integration level;\
    \ burst-level DRAM scheduler\nbehaviour stays verified under\n`verify/cocotb/axi4/test_axi4_burst.py`.\n\
    \nThe cluster-driven path (see `cluster_to_fabric`) is now WIRED\nwith all four\
    \ `e1_cva6_unit_tb` cocotb tests passing \u2014 CVA6\nissues AR/AW/W/B handshakes\
    \ through the wrapper-to-AXI4 adapter\nend-to-end.  The evidence here proves the\
    \ DRAM north port for the\nexercised SLC fixture, CVA6 adapter, and production\
    \ display-scanout\npaths that reach `fab_s[0]`; it is not a universal SoC-top\
    \ or phone\nintegration proof.\n"
  status: WIRED
  tested_by:
  - test_slc_passthrough
  - test_dram_ctrl_dfi_traffic
  - display_scanout_reads_fabric_dram
  wired_at: rtl/top/e1_soc_integrated.sv
- description: "e1_display_scanout AXI4 read master \u2192 width converter \u2192\
    \ fabric master[11] \u2192 DRAM"
  name: display_scanout_to_fabric
  notes: 'The integrated display aperture at 0x1003_0000 now instantiates

    `e1_display_scanout`, a production-shape framebuffer scanout engine

    with a real AXI4 read master.  The scanout engine emits 32-bit read

    beats, `e1_axi4_width_converter` upsizes the read channel to the

    128-bit SoC fabric, and fabric master[11] routes the traffic into

    `e1_dram_ctrl` at the main DRAM aperture.  The remaining display

    production dependencies are the DSI host/PHY boundary, panel DCS init,

    async pixel-clock CDC, DTS/software binding, and HIL or bandwidth trace

    evidence.

    '
  status: WIRED
  tested_by:
  - display_scanout_reads_fabric_dram
  wired_at: rtl/top/e1_soc_integrated.sv
- blocked_reason: "LPDDR5X / LPDDR6 PHY is closed IP \u2014 see\ndocs/evidence/memory/lpddr-phy-procurement.yaml.\
    \  The controller\nmodels the DFI 5.0 north side and forwards to the behavioural\n\
    DRAM model in simulation.\n"
  description: "DRAM controller DFI 5.0 \u2192 licensed PHY"
  name: dfi_phy_south
  status: BLOCKED
  tested_by: []
  wired_at: rtl/memory/dram_ctrl/e1_dram_ctrl.sv
gate:
  blocked_reason: 'If any of the cross-domain edges with status `WIRED` is not exercised

    by a passing cocotb test, the gate fails.  Edges with status

    TIED_OFF / BLOCKED / WIRED_STRUCTURAL_ONLY / WIRED_OBSERVABILITY_ONLY

    / WIRED_PARTIAL are documented above with a blocked_reason and do

    not flip the gate.  `WIRED_PARTIAL` is reserved for edges where one

    structural adapter (e.g. a width converter) is implemented and

    exercised in isolation by cocotb but the end-to-end integration

    still requires a separate upstream blocker to clear.

    '
  fail_closed_when_missing: true
