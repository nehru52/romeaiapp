scoped_local_evidence_claims:
- evidence_artifacts:
  - docs/evidence/cache/champsim_prefetch_sweep_report.json
  - docs/evidence/cache/champsim_external_prefetchers_report.json
  - docs/evidence/cache/pythia_dpc3_report.json
  evidence_class: champsim_dpc3_traces_only
  id: champsim_prefetcher_sweep
  reason: 'ChampSim 2024-12 (commit 24cc41bb) built locally from

    external/ChampSim/; sweep run on the DPC-3 SPECspeed traces

    403.gcc-16B, 401.bzip2-7B, and 429.mcf-22B at 2M warmup +

    2M sim instructions per (variant x trace). The sweep covers the

    prefetchers bundled in upstream ChampSim (no, next_line,

    ip_stride, spp_dev, va_ampm_lite) plus in-tree ports of the

    CRC-style drop-ins (berti, ipcp, bingo, bop, pythia) under

    external/ChampSim/prefetcher/<name>/, built via

    external/ChampSim/build-configs/pref_<name>.json. Per-port

    algorithmic scope and any documented deviations from each

    reference implementation are in

    champsim_external_prefetchers_report.json.

    '
  status: scoped_champsim_dpc3_only
- evidence_artifacts:
  - docs/evidence/cache/champsim_external_prefetchers_report.json
  - docs/evidence/cache/champsim_prefetch_sweep_report.json
  evidence_class: champsim_dpc3_traces_only
  id: berti_ipcp_bingo_bop_dpc3
  reason: 'Berti (MICRO''22), IPCP (ISCA''20), Bingo (HPCA''19), and BOP

    (HPCA''16) are CRC-style drop-ins whose published reference

    implementations target the legacy ChampSim 2.x interface

    (free-function CACHE::l2c_prefetcher_operate(uint64_t,...) and

    friends) and cannot link against ChampSim 2024-12 as-is. Faithful

    ports of each algorithm to the ChampSim 2024-12 module API

    (champsim::modules::prefetcher, champsim::address) now live under

    external/ChampSim/prefetcher/{berti,ipcp,bingo,bop}/, and the

    DPC-3 sweep produces ChampSim-scoped rows for all four. Per-prefetcher

    algorithmic scope and any documented deviations from the

    reference implementations (e.g. Berti''s latency-table not being

    wired through 2024-12''s prefetcher interface) are recorded in

    champsim_external_prefetchers_report.json under

    ported_modules.<name>.

    '
  status: scoped_champsim_dpc3_only
- evidence_artifacts:
  - docs/evidence/cache/pythia_dpc3_report.json
  - docs/evidence/cache/champsim_external_prefetchers_report.json
  - docs/evidence/cache/champsim_prefetch_sweep_report.json
  evidence_class: champsim_dpc3_traces_only
  id: pythia_rl_prefetcher_dpc3
  reason: "Pythia (Bera et al., MICRO'21) \u2014 a CPU C++ tabular-SARSA prefetcher\n\
    (NOT a GPU/ML stack; earlier notes in this repo were incorrect) \u2014\nhas been\
    \ ported to the ChampSim 2024-12 module API at\nexternal/ChampSim/prefetcher/pythia/\
    \ (canonical 2-feature SARSA,\n16-action offset space, alpha=1/8, gamma=1/2, eps=1/16,\n\
    256-entry evaluation queue). The DPC-3 sweep now produces a\nPythia row alongside\
    \ the bundled prefetchers; the port's scope\nand deviations from Bera et al.'s\
    \ extended-feature configuration\nare documented in champsim_external_prefetchers_report.json\n\
    under ported_modules.pythia.\n"
  status: scoped_champsim_dpc3_only
- evidence_artifacts:
  - docs/evidence/cache/mockingjay_vs_lru_report.json
  evidence_class: champsim_dpc3_traces_only
  id: mockingjay_vs_lru_sweep
  reason: "ChampSim mockingjay-vs-lru sweep run against the same DPC-3\ntrace set.\
    \ Because Hawkeye / Mockingjay are not bundled in\nupstream ChampSim 2024-12,\
    \ the sweep compares the bundled\nreplacements (lru, drrip, ship, srrip). The\
    \ artifact records\nthe LRU-baseline IPC + per-replacement deltas so future\n\
    Mockingjay drop-in evidence can be referenced against the same\nbaseline. At the\
    \ captured 2 M warmup + 2 M simulation window\nthe LLC sees too few accesses to\
    \ pressure replacement (~600\nLLC LOAD misses across a 2048-set x 16-way LLC);\
    \ all bundled\nreplacements collapse to the same IPC/MPKI. Longer workloads or\n\
    pressure-bearing traces are required to see drrip/ship/srrip\ndiverge \u2014 this\
    \ is itself the BLOCKER for the +15 % HPCA'22\nproductized Mockingjay claim. The\
    \ Mockingjay-prod RTL is\nindependently exercised by the cocotb harness; see\n\
    mockingjay_cocotb_synthetic_report.json.\n"
  status: scoped_champsim_dpc3_only
- evidence_artifacts:
  - docs/evidence/cache/mockingjay_cocotb_synthetic_report.json
  evidence_class: cocotb_synthetic_stream
  id: mockingjay_cocotb_synthetic
  reason: 'The cocotb harness

    `verify/cocotb/cache/test_mockingjay_accuracy.py` drives

    `rtl/cache/replacement/e1_mockingjay_prod.sv` against a

    100000-op scan+reuse synthetic stream (10000-op warmup +

    90000-op measurement window) and reports its hit-rate vs a

    pure-Python LRU oracle. The R4-documented unblock plan

    (lengthen NUM_OPS to >=50k, add LFSR tie-break in

    `find_victim`) is applied; an additional unit-correction

    scales reuse-distance deltas from global-access units to

    ETR-time-units (delta >> ETR_W) before they enter the RTP.

    The R5 next-layer root cause (Sampled Cache Tracker keyed by

    `(pc, set_id)` instead of by line address) is fixed in R6:

    `e1_mockingjay_prod` now takes an `acc_tag` input (parameter

    `TAG_W`) and keys the STT by `(set_id, tag)` per HPCA''22

    section 4; the PC-indexed RTP still updates on STT hits but

    no longer eats false same-PC reuse signals from streaming

    scans. Measurement-window numbers

    (mj=58.78 % vs lru=50.03 %) give +8.76 percentage points

    absolute and +17.50 % relative, above the +10 % relative

    pass threshold. The threshold remains the productization

    bar; phone-class IPC remains BLOCKED until silicon or

    full-system-simulator evidence.

    '
  status: scoped_above_threshold
status: scaffold_rtl_real_claims_blocked
