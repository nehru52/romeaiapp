blocked_real_claims:
- evidence_artifacts:
  - docs/evidence/cache/phone_class_ipc_report.json
  - docs/evidence/cache/phone_class_ipc_traces.json
  id: phone_class_ipc
  reason: 'Phone-class IPC requires either silicon measurement or full-system

    simulator evidence (ChampSim/gem5) on representative workloads. The

    current RTL is lint-clean and cocotb-functional but has not been run

    against any traced workload at scale.

    '
  status: blocked
  unblock_requires:
  - measured SPEC CPU 2017 IPC on a full-system simulator
  - measured GB6 / mobile workload IPC on a full-system simulator
  - process effects contract hash captured per run
- evidence_artifacts:
  - docs/evidence/cache/lmbench_lat_mem_rd_curve.json
  - docs/evidence/cache/lmbench_lat_mem_rd_raw.log
  id: phone_class_latency_curve
  reason: 'Canonical lmbench `lat_mem_rd` latency curve at five working-set

    points (1 KB, 64 KB, 1 MB, 16 MB, 256 MB) and three frequency points

    requires real silicon or a full-system simulator with DRAM model.

    '
  status: blocked
  unblock_requires:
  - lmbench lat_mem_rd raw logs from target
  - JSON parser output with per-stride / per-working-set table
  - thermal state recorded
- evidence_artifacts:
  - docs/evidence/cache/stream_bandwidth_report.json
  - docs/evidence/cache/stream_bandwidth_raw.log
  id: phone_class_sustained_bandwidth
  reason: "Sustained STREAM bandwidth at \u2265120 GB/s requires LPDDR5X/LPDDR6\n\
    hardware. The SLC + DRAM path here is scaffold RTL only.\n"
  status: blocked
  unblock_requires:
  - STREAM Triad/Copy/Add/Scale on target
  - parsed sustained GB/s in JSON
- evidence_artifacts:
  - docs/evidence/cache/hawkeye_mockingjay_dpc3_report.json
  id: hawkeye_mockingjay_dpc3_replacement
  reason: 'Hawkeye and the productized Mockingjay (HPCA''22) replacement

    policies are not part of upstream ChampSim 2024-12. The

    mockingjay-vs-lru sweep here exercises only bundled replacements

    (lru / drrip / srrip / ship), which gives an IPC range between

    LRU and DRRIP / SHiP-style policies but does not measure the

    Mockingjay productized RTL. The cocotb harness at

    `verify/cocotb/cache/test_mockingjay_accuracy.py` now evaluates

    the Mockingjay-prod RTL directly on a synthetic stream and is above

    the local synthetic threshold (see

    mockingjay_cocotb_synthetic_report.json), but that scoped RTL

    stream does not replace DPC-3 Hawkeye/Mockingjay IPC evidence.

    '
  status: blocked
  unblock_requires:
  - port CRC Mockingjay / Hawkeye C++ replacement modules into external/ChampSim/replacement/
  - rebuild variant binaries
  - rerun python3 scripts/champsim_sweep.py --mode mockingjay-vs-lru
- evidence_artifacts:
  - docs/evidence/cache/pythia_productization_report.json
  id: pythia_rl_prefetcher
  reason: "Pythia (Bera et al., MICRO'21) is a CPU C++ tabular-SARSA\nprefetcher (NOT\
    \ a GPU/ML stack \u2014 earlier project notes were\nincorrect). Productization\
    \ requires the full Q-table + SARSA\nupdate pipeline implemented in synthesizable\
    \ RTL. The stub at\n`rtl/cache/prefetch/e1_pythia_stub.sv` is next-line-equivalent\n\
    and exists to fix the integration shape. The ChampSim DPC-3\nport at external/ChampSim/prefetcher/pythia/\
    \ exists for\nalgorithmic IPC measurement only (see\nchampsim_external_prefetchers_report.json\
    \ and\npythia_dpc3_report.json); it is not the synthesizable RTL.\n"
  status: blocked
  unblock_requires:
  - CMU-SAFARI Pythia ref impl ported to synthesizable RTL
  - measured Pythia IPC delta vs Berti / SPP on the same SoC
- evidence_artifacts:
  - docs/evidence/cache/silicon_lab_report.json
  id: silicon_evidence
  reason: Tapeout-free at this milestone; no silicon to measure.
  status: blocked
  unblock_requires:
  - silicon part returned from foundry
  - lab boot transcript
  - lmbench / STREAM measurements with thermal + clock state
claim_boundary: scope_limited_to_structural_metadata_inventory_and_gate_diagnostics
claim_rules:
- The cache hierarchy RTL must be lint-clean on Verilator.
- L1I/L1D/L2/L3/SLC sizes in `cache_pkg.sv` must meet 2028 minimums.
- L1D must use SECDED (72,64); L1I uses parity only.
- Coherence must be MESI on TileLink TL-C inside the cluster.
- No phone-class IPC or bandwidth claim may rely on simulator wall-clock, host benchmarks,
  or AXI-Lite SRAM model output.
- Mockingjay and Pythia productization remain BLOCKED until full RTL drop-in evidence
  is recorded.
- 'ChampSim DPC-3 numbers are tagged `evidence_class: champsim_dpc3_traces_only` and
  must not be promoted to phone-class without silicon or full-system-simulator evidence.'
