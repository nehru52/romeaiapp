blocked_linux_boot_axes:
- current_gap: local CPU has no RV64GC evidence, privilege modes, CSR file, trap vector,
    or return-from-trap path.
  id: rv64gc_privileged_cpu
  pass_requires:
  - selected generated or wrapped AP target
  - RV64GC or approved Linux application profile
  - M-mode and S-mode CSR transcript
  - precise trap entry and return evidence
  required_evidence:
  - build/evidence/cpu_ap/eliza_e1_isa_cache_mmu.log
  - build/evidence/cpu_ap/eliza_e1_trap_timer_irq.log
  status: blocked
- current_gap: local CPU and memory path have no satp, page-table walk, TLB, virtual-memory
    fault, or Linux CONFIG_MMU evidence.
  id: mmu_sv39_or_stronger
  pass_requires:
  - Sv39 or stronger mode
  - satp evidence
  - TLB and page-table evidence
  - Linux MMU boot transcript
  required_evidence:
  - build/evidence/cpu_ap/eliza_e1_isa_cache_mmu.log
  status: blocked
- current_gap: local wrapper has no proven reset ROM to OpenSBI to next-stage handoff
    on this hardware contract.
  id: boot_rom_firmware_opensbi
  pass_requires:
  - reset PC and hart ID
  - OpenSBI platform probe
  - DRAM base and size
  - next-stage handoff
  required_evidence:
  - build/evidence/cpu_ap/eliza_e1_opensbi_boot.log
  status: blocked
- current_gap: checked local memory model is a 4 KiB SRAM-backed AXI-Lite aperture,
    not boot-capable DRAM.
  id: dram_capacity_boot_memory
  pass_requires:
  - Linux memory node
  - bootable DRAM aperture and capacity
  - non-placeholder memory-map evidence
  required_evidence:
  - build/evidence/cpu_ap/eliza_e1_linux_boot.log
  - docs/evidence/memory/phone_2028_memory_scorecard.json
  status: blocked
- current_gap: top-level CLINT-like debug registers exist elsewhere, but the Linux
    contract wrapper has no integrated CLINT/ACLINT timer/software interrupt block.
  id: timer_clint_aclint
  pass_requires:
  - mtime
  - mtimecmp
  - msip
  - timer interrupt transcript
  - software interrupt transcript
  required_evidence:
  - build/evidence/cpu_ap/eliza_e1_trap_timer_irq.log
  status: blocked
- current_gap: interrupt RTL is a simple pending/enable/claim scaffold without proven
    PLIC-compatible priorities, thresholds, contexts, device-tree binding, or firmware
    transcript.
  id: interrupt_plic_compat
  pass_requires:
  - interrupt-controller device-tree node
  - external interrupt claim and complete transcript
  - priority, threshold, and context semantics or documented compatible equivalent
  required_evidence:
  - build/evidence/cpu_ap/eliza_e1_trap_timer_irq.log
  - build/evidence/cpu_ap/eliza_e1_linux_boot.log
  status: blocked
- current_gap: Linux contract wrapper has no UART console path.
  id: uart_early_console
  pass_requires:
  - UART RTL or selected generated UART integration
  - device-tree serial node
  - Linux early console transcript
  required_evidence:
  - build/evidence/cpu_ap/eliza_e1_linux_boot.log
  status: blocked
- current_gap: no generated hardware-bound DTS proves CPU, memory, timer, interrupt
    controller, UART, and chosen stdout nodes for this path.
  id: dtb_linux_nodes
  pass_requires:
  - CPU node
  - memory node
  - timer node
  - interrupt-controller node
  - UART node
  - chosen stdout path
  required_evidence:
  - build/chipyard/eliza_rocket/eliza-e1.dts
  status: blocked
- current_gap: no Linux boot transcript from selected hardware reaches initramfs or
    exercises e1 MMIO.
  id: linux_initramfs_smoke
  pass_requires:
  - Linux early console
  - initramfs start
  - e1 MMIO smoke result
  required_evidence:
  - build/evidence/cpu_ap/eliza_e1_linux_boot.log
  status: blocked
