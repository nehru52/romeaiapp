  - docs/arch/cpu-subsystem.md
  - docs/sim/qemu/README.md
  inspected_rtl:
  - rtl/cpu/e1_cpu_subsystem_stub.sv
  - rtl/interconnect/e1_linux_soc_contract.sv
  - rtl/interrupts/e1_interrupt_controller.sv
  - rtl/memory/e1_axi_lite_dram.sv
claim_boundary: local_rtl_scaffold_is_not_linux_boot_evidence
claim_allowed: false
phone_claim_allowed: false
release_claim_allowed: false
linux_boot_claim_allowed: false
hardware_boot_claim_allowed: false
silicon_evidence_claim_allowed: false
claim_rules:
- Passing this local gate only proves that the scaffold is still marked Linux-boot
  blocked.
- QEMU virt, Renode, or software-only logs are reference evidence and cannot close
  these hardware gates.
- Placeholder evidence files do not close any axis.
- If RTL grows any Linux-contract feature while an axis remains blocked, update this
  manifest and add executable evidence before making a Linux-capable claim.
current_scaffold:
  allowed_claim: scaffold_checks_only_linux_boot_blocked
  cpu_capability: tiny_instruction_subset_no_privilege_no_csr_no_mmu
  cpu_rtl: rtl/cpu/e1_cpu_subsystem_stub.sv
  interrupt_capability: simple_pending_enable_claim_complete_scaffold
  interrupt_rtl: rtl/interrupts/e1_interrupt_controller.sv
  linux_contract_wrapper: rtl/interconnect/e1_linux_soc_contract.sv
  memory_capability: 4_kib_sram_backed_axi_lite_model
  memory_rtl: rtl/memory/e1_axi_lite_dram.sv
  timer_capability: top_level_clint_like_debug_block_not_integrated_with_linux_contract_wrapper
  uart_capability: absent_from_linux_contract_wrapper
