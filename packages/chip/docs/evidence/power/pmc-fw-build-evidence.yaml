claim_boundary: "Records the executable result of authoring fw/pmc/link.ld for the\
  \ AON SRAM aperture, the fw/pmc/src/crt0.S startup, and the Makefile elf target.\
  \ Proof points:\n  - both pmc.elf (production AON SRAM placement at 0x10050000)\
  \ and\n    pmc.sim.elf (ibex_simple_system smoke placement at 0x00100000) link\n\
  \    from the same nine TUs + crt0.S without warnings,\n  - readelf reports the\
  \ expected sections at the expected addresses,\n  - total .text + .data + .bss +\
  \ .stack fits inside the 16 KiB AON SRAM\n    budget declared by docs/pd/power-management-firmware.md,\n\
  \  - pmc.sim.elf loads on the R5-agent-built Vibex_simple_system Verilator\n   \
  \ harness, retires past the reset vector and enters pmc_main without a\n    trap\
  \ inside the 200-cycle smoke window.\nThis evidence does NOT cover RPMI-over-mailbox\
  \ runtime correctness; the simple_system harness does not model the PMC mailbox\
  \ at 0x10010000. That is exercised separately by the cocotb power suite under rtl/power/.\n"
