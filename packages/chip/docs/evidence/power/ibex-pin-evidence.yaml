bootstrap_run:
  command: scripts/bootstrap_ibex.sh
  exit_status: 0
  outcome: HEAD resolved to pinned SHA; manifest rewrite is a no-op when pin already
    matches.
claim_boundary: "Records the executable result of running scripts/bootstrap_ibex.sh\
  \ and then building a Verilator simulator from the pinned Ibex tree. Proof points:\n\
  \  - external checkout exists at the pinned SHA,\n  - scripts/check_ibex_pin.py\
  \ reports PASS,\n  - a Verilator-based ibex_simple_system binary builds from the\
  \ pinned tree\n    with the host Verilator (oss-cad-suite) and the xPack riscv-none-elf\n\
  \    toolchain,\n  - the resulting simulator boots the bundled hello_test ELF and\
  \ retires\n    instructions for a bounded smoke window.\nBoot does not constitute\
  \ silicon evidence; it is a toolchain proof that the pinned source builds and runs\
  \ on this host.\n"
config_target:
  isa: RV32IMC
  rationale: 'Manifest declares RV32IMC. Modern GNU binutils (2.42 from the oss-cad-suite
    riscv64-linux-gnu cross and xPack riscv-none-elf 15.2.0) require an explicit `zicsr`
    substring for CSR instructions; the build adds `_zicsr` so software that exercises
    mscratch/mcause assembles. The Ibex RTL itself is unchanged (it always implemented
    the Zicsr opcodes; the change is purely in how the assembler advertises the extension).

    '
  zicsr_added_for_modern_binutils: true
generated_utc: '2026-05-20T10:18:24Z'
ip_name: lowrisc-ibex
ip_role: always_on_power_management_core_pmc
license: Apache-2.0
pin_check_run:
  command: scripts/check_ibex_pin.py
  exit_status: 0
  outcome: 'STATUS: PASS power.ibex_pin - HEAD=9742d89 matches manifest pin'
pin_manifest: external/ibex/pin-manifest.json
release_blockers_unchanged:
- PMC linker script for AON SRAM still to be authored before fw/pmc/build can produce
  a PMC binary.
- Silicon characterization required before promoting Ibex pin beyond prototype.
release_use: prototype_only_until_silicon_characterization
schema: eliza.power.external_pin_evidence.v1
smoke_run:
  executed_cycles: 10000
  first_fetch_pc: '0x00100080'
  outcome: 'First instruction fetch and execution succeeded; tracer logged 261 retired
    instructions over 477 active cycles before the cycle-bounded shutdown. The bundled
    hello_test loops on its uart-print path which is consistent with successful boot-to-main
    on the ibex_simple_system harness.

    '
  payload_artifact: external/ibex/ibex/examples/sw/simple_system/hello_test/hello_test.elf
  payload_build_command: 'make CC=riscv-none-elf-gcc ARCH=rv32imc_zicsr hello_test.elf

    '
  payload_source: external/ibex/ibex/examples/sw/simple_system/hello_test/hello_test.c
  retired_instructions: 261
  sim_command: './Vibex_simple_system --meminit=ram,$PAYLOAD --term-after-cycles=10000

    '
  trace_path: external/ibex/ibex/build/lowrisc_ibex_ibex_simple_system_0/sim-verilator/trace_core_00000000.log
status: pin_resolved_and_sim_built
toolchain:
  cross_compiler: external/xpack-riscv-none-elf-gcc-15.2.0-1/bin/riscv-none-elf-gcc
  cross_compiler_version: xPack GNU RISC-V Embedded GCC 15.2.0
  fusesoc_version: 2.4.3
  verilator: external/oss-cad-suite/bin/verilator
  verilator_version: Verilator 5.049 devel rev v5.048-46-g7c5069c7d (mod)
upstream_commit_message: '[rtl] Move prim_generic dependency to ibex_top'
upstream_commit_pinned: 9742d89f54fc297bed026841c8e68454ddfd7cc0
upstream_commit_timestamp: '2026-04-24T13:59:22+02:00'
upstream_ref: refs/heads/master
upstream_repo: https://github.com/lowRISC/ibex.git
verilator_sim_build:
  artifact_bytes: 13262488
  artifact_kind: ELF 64-bit LSB pie executable, x86-64 (Verilator simulator)
  artifact_path: external/ibex/ibex/build/lowrisc_ibex_ibex_simple_system_0/sim-verilator/Vibex_simple_system
  artifact_sha256: 137f891ef4bde5d406d440e8f9a44e08dc2b492afdfa610127caf353abf76fe0
  build_command: 'make VERILATOR_OPTIONS="-DDISABLE_PRIM_CDC_RAND_DELAY --trace --trace-fst
    --trace-structs --trace-params --trace-max-array 1024 -CFLAGS \"-std=c++17 -Wall
    -DVM_TRACE_FMT_FST -DTOPLEVEL_NAME=ibex_simple_system -g\" -LDFLAGS \"-pthread
    -lutil -lelf\" -Wall -Wno-UNOPTFLAT --unroll-count 72"

    '
  build_dir: external/ibex/ibex/build/lowrisc_ibex_ibex_simple_system_0/sim-verilator
  fusesoc_setup_command: 'fusesoc --cores-root=. run --target=sim --tool=verilator
    --setup lowrisc:ibex:ibex_simple_system

    '
  fusesoc_target: lowrisc:ibex:ibex_simple_system
  notes: 'Verilator 5.049 emits UNOPTFLAT warnings for several combinational feedback
    edges in Ibex (id_in_ready_o, instr_executing_spec, etc.). These are known false
    positives in the Ibex tree; the upstream `-Wall` policy escalates them to errors
    with this Verilator. We suppress with `-Wno-UNOPTFLAT` rather than patching the
    Ibex RTL. The Ibex pinned SHA is unchanged.

    '
