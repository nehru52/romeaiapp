rv32_generic_build_blocked:
  attempted_command: 'make PLATFORM=generic CROSS_COMPILE=riscv64-linux-gnu- PLATFORM_RISCV_XLEN=32
    PLATFORM_RISCV_ABI=ilp32 PLATFORM_RISCV_ISA=rv32imc_zicsr_zifencei

    '
  exit_status: 2
  root_cause: 'OpenSBI emits `#error "opensbi strongly relies on the A extension of
    RISC-V"` from lib/sbi/riscv_atomic.c when rv32imc is targeted without `_a`. Adding
    `_a` would diverge from the Ibex PMC manifest config (RV32IMC, no A). This is
    architecturally consistent: OpenSBI runs on the application cores (which include
    A), not on the AON PMC Ibex. The PMC firmware lives at fw/pmc/ and is cross-built
    separately under rv32imc_zicsr (see ibex-pin-evidence.yaml and fw/pmc cross-build
    run).

    '
