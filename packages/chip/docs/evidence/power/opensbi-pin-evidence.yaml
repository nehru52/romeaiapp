toolchain:
  cross_compiler: external/riscv64-linux-gnu/usr/bin/riscv64-linux-gnu-gcc
  cross_compiler_version: riscv64-linux-gnu-gcc (Ubuntu 13.3.0-6ubuntu2~24.04.1) 13.3.0
  ld_library_path: external/riscv64-linux-gnu/usr/lib/x86_64-linux-gnu
  notes: 'The xPack riscv-none-elf-gcc 15.2.0 toolchain refuses `-pie` links (`ld:
    -pie not supported`), which OpenSBI requires for its relocatable firmware. The
    riscv64-linux-gnu cross is used instead; its as/ld need LD_LIBRARY_PATH set to
    the bundled libopcodes/libbfd-2.42-riscv64.so to function.

    '
