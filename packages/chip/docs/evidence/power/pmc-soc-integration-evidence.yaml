mpxy_rpmi_roundtrip:
  expected_base_spec_version: 65536
  expected_request_clock_get_rate_hz: 1200000000
  expected_request_voltage_get_level_uv: 700000
  guard_envvars:
  - name: PMC_INSTANTIATE_IBEX
    purpose: gate the Ibex elaboration in pmc_top.sv
  - name: PMC_RPMI_SHMEM_ROUNDTRIP
    purpose: 'gate the three remaining RTL/firmware bindings the roundtrip needs.  Flips
      OFF -> ON once the bindings below land; until then the cocotb tests report explicit
      BLOCKED skips with a back- pointer to this manifest.

      '
  - name: PMC_AON_SRAM_HEX
    purpose: select the $readmemh image preloaded into pmc_top.aon_sram_q
  remaining_bindings:
  - area: rtl/power/pmc_top.sv
    gap: 'Mailbox MMIO accesses at offsets 0x800..0xFFF (the shmem region) currently
      fall through to default ''0 readback because the register decode only covers
      PMC_REG_* scalars. The Ibex data port reaches the AON SRAM at 0x10050000..0x10053FFF,
      but the MMIO-side mailbox decode does not route into the same backing storage
      at the 0x10050800..0x10050C03 range. Until the shmem region is routed through
      `aon_sram_q[]` (or a parallel queue SRAM with both the MMIO port and the Ibex
      data port as masters), the host cannot publish A2P requests into the queue slot
      the Ibex reads from, nor can the host poll the P2A_ACK tail the Ibex writes
      back.

      '
    id: B1
    proposed_change: 'Extend pmc_top.sv MMIO decode: when `mbox_addr_i[PMC_MBOX_AW-1]
      == 1` (i.e. offset >= 0x800), arbitrate the MMIO-side access into aon_sram_q
      at the index derived from `mbox_addr_i[10:2]`. The Ibex data port stays as-is.
      A simple cycle-alternating arbitration is fine for the prototype.

      '
  - area: fw/pmc/src/main.c
    gap: '`pmc_main` polls the scalar `PMC_REG_STATUS::RX_VALID` bit (at absolute
      address 0x10050010) to detect an incoming RPMI frame. Under the new layout the
      host posts into the A2P_REQ tail slot + rings the doorbell; the firmware must
      instead read the A2P_REQ tail at 0x10050840, compare it to the head at 0x10050800,
      and ingest the slot at 0x10050880 when tail > head. After dispatch, the firmware
      writes the response into P2A_ACK slot 0 (0x10050980), advances the P2A_ACK tail
      at 0x10050940 from 0 to 1, then advances the A2P_REQ head at 0x10050800 from
      0 to 1.

      '
    id: B2
    proposed_change: 'Add `pmc_drain_rpmi_a2p_request(void)` in main.c that reads
      / writes the four queue head/tail words via `volatile uint32_t *` pointers derived
      from the macros in rpmi_shmem_layout.h. Move the legacy PMC_REG_STATUS poll
      into a separate compile-time- disabled debug path (or remove entirely if the
      new RPMI server supersedes it). Wrap the dispatch in the spec-compliant rpmi_message_header
      (LE 16-bit servicegroup_id, 8-bit service_id, etc.) rather than the prototype
      8-bit big-endian layout currently in rpmi.h.

      '
  - area: fw/pmc/src/pmic_sequencer.c, fw/pmc/src/spmi.c
    gap: '`pmc_boot_rails` in main.c calls `pmc_pmic_power_up`, which issues SPMI
      / I2C MMIO at addresses outside the AON aperture (the SPMI master at 0x10060000+
      is not modeled by pmc_top.sv). Any such access traps the Ibex into `_halt_loop`
      in crt0.S before the scheduler reaches the RPMI drain loop.

      '
    id: B3
    proposed_change: 'Guard `pmc_pmic_power_up` with a compile-time `PMC_ENABLE_PMIC_BRINGUP`
      define; the cocotb roundtrip build leaves it undefined so the firmware skips
      PMIC bringup and proceeds straight to the drain loop. The production silicon
      build defines it, gated by a separate piece of evidence once the SPMI master
      is bound.

      '
  status: BLOCKED
  test_module: verify/cocotb/integration/test_opensbi_mpxy_to_pmc_rpmi.py
  testbench: e1_soc_integrated_tb
  unblock_command_sequence:
  - source tools/env.sh
  - scripts/bootstrap_ibex.sh
  - PATH="$PWD/external/riscv64-linux-gnu/usr/bin:$PATH" make -C external/opensbi/opensbi
    PLATFORM=generic CROSS_COMPILE=riscv64-linux-gnu- FW_FDT_PATH=$PWD/build/opensbi-eliza/eliza-rocket-pmc.dtb
    -j4
  - make -C fw/pmc aon-hex
  - PMC_INSTANTIATE_IBEX=1 PMC_RPMI_SHMEM_ROUNDTRIP=1 PMC_AON_SRAM_HEX=fw/pmc/build/pmc.aon.hex
    make cocotb-opensbi-mpxy-rpmi
notes: 'This file is the source of truth for the PMC RPMI shmem roundtrip gap. When
  the three remaining bindings (B1-B3) land, the cocotb test will flip from BLOCKED
  to PASS with the elapsed cycle count + RPMI status recorded inline.  Until then,
  the BLOCKED skip is the evidence-driven gate that makes the gap discoverable in
  CI.

  '
