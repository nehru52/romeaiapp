claim_boundary: "Records the executable result of integrating OpenSBI v1.8.1 with\
  \ the Eliza E1 PMC RPMI shared-memory mailbox device-tree fragment and the AON Ibex\
  \ PMC firmware against the cocotb integration testbench `e1_soc_integrated_tb`.\
  \ Proof points:\n  - `dts/eliza-rocket-pmc.dts(i)` compiles cleanly with `dtc -O\
  \ dtb`\n    and embeds a `riscv,rpmi-shmem-mbox` node with the four queue\n    regions\
  \ (a2p-req, p2a-ack, p2a-req, a2p-ack) + a2p-doorbell\n    that match the offsets\
  \ in `fw/pmc/include/rpmi_shmem_layout.h`,\n  - OpenSBI v1.8.1 (pinned commit `74434f25...`)\
  \ rebuilds the\n    `generic` platform with `FW_FDT_PATH=<eliza-rocket-pmc.dtb>`\
  \ and\n    the resulting `fw_dynamic.elf` exposes the embedded DTB at\n    `fw_fdt_bin`\
  \ symbol (in .rodata), with the PMC mailbox compatible\n    string + reg-names visible\
  \ via `strings(1)`,\n  - the cocotb roundtrip test\n    `verify/cocotb/integration/test_opensbi_mpxy_to_pmc_rpmi.py`\n\
  \    drives a spec-compliant RPMI v1.0 frame into A2P_REQ slot 0 and\n    polls\
  \ P2A_ACK tail, but currently reports `BLOCKED` because three\n    remaining RTL/firmware\
  \ bindings have not yet been authored\n    (see `mpxy_rpmi_roundtrip.remaining_bindings`\
  \ below),\n  - the existing 54 baseline integration cocotb tests pass unchanged\n\
  \    with `PMC_INSTANTIATE_IBEX` left off (default).\nBoot of OpenSBI on real silicon\
  \ or in QEMU + RPMI control flow over the SBI MPxy mailbox is not exercised here;\
  \ that requires either the cocotb shmem routing landing (next milestone) or a virt\
  \ platform emulating the AON Ibex mailbox, neither of which is in scope.\n"
