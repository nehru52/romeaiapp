schema: eliza.memory_uma_evidence_gate.v1
scope:
- SRAM-backed DRAM model
- DMA containment scaffold
- Linux-capable AXI-Lite contract wrapper
- Phone-class memory claim boundary
separate_local_rtl_evidence:
  dram_controller_boundary:
    claim_boundary: RTL AXI4 DRAM-controller simulation evidence only, including parameterized
      model capacity and DRAMsim-derived row timing; not LPDDR PHY/training, phone-class
      capacity/timing, or Linux memory-map evidence.
    gate: make dram-controller-check
    report: build/reports/dram_controller.json
    rtl:
    - rtl/memory/dram_ctrl/e1_dram_ctrl.sv
    - rtl/memory/dram_ctrl/e1_axi4_dram_model.sv
    status: sim_passes
  iommu_boundary:
    claim_boundary: Register/fault surface, allowlist/PASID behavior, IOFENCE.C, and
      minimal DDT + Sv39 first-stage KAT; not non-identity G-stage/PDT/full Linux
      or phone evidence.
    gate: make iommu-evidence-check
    rtl:
    - rtl/iommu/e1_riscv_iommu.sv
    - rtl/iommu/e1_riscv_iommu_pkg.sv
    status: sim_passes_but_phone_linux_blocked
sku_split_decision:
  ai_sku:
    bits_per_channel: 24
    bus_width_bits: 96
    capacity_gib_skus:
    - 24
    channels: 4
    note: 'This is the closest tracked SKU for the existing phone_2028_target_profile
      thresholds. It satisfies the 120 GB/s sustained target but does not satisfy
      the 180 GB/s peak gate without a wider bus, faster data rate, or a revised target
      profile. The optimizer''s 240 GB/s figure remains as a guardband headroom number,
      not as a per-SKU sustained gate.

      '
    peak_bandwidth_gbps: 172.8
    standard: LPDDR6-14400
    sustained_target_gbps_min: 140
  baseline_sku:
    bits_per_channel: 16
    bus_width_bits: 64
    capacity_gib_skus:
    - 12
    - 16
    channels: 4
    note: 'Matches Snapdragon 8 Elite Gen 5 (~84.8 GB/s peak) and Dimensity 9500 (~85.3
      GB/s peak). Does NOT satisfy the phone_2028_target_profile''s 180 GB/s peak
      / 120 GB/s sustained requirement; baseline SKUs are below those thresholds by
      design.

      '
    peak_bandwidth_gbps: 85.3
    standard: LPDDR5X-10667
    sustained_target_gbps_min: 70
  closed_ip_blocker:
    description: 'LPDDR5X-10667 and LPDDR6-14400 PHYs are closed third-party IP. Vendor
      shortlist and procurement decision are tracked in docs/spec-db/lpddr-phy-procurement-shortlist.yaml
      and the fail-closed gate in docs/evidence/memory/lpddr-phy-procurement.yaml.
      No phone-class bandwidth claim may be promoted while that gate is BLOCKED.

      '
  policy_implications:
  - The phone_2028_target_profile thresholds remain stricter than the current tracked
    AI SKU peak bandwidth.
  - The baseline SKU has its own bandwidth expectations (~70 GB/s sustained) and shares
    the same RTL but a different LPDDR PHY data rate and bus width.
  - Reports filed against this gate must declare which SKU they pertain to.
  - The 240 GB/s optimizer guardband is not a per-SKU sustained gate and must not
    be quoted as one.
  reason: 'The 240 GB/s sustained number in docs/architecture-optimization/soc-optimized-operating-point.yaml
    cannot be delivered by any 64-bit LPDDR5X-10667 SKU (max 85.3 GB/s peak). The
    closest tracked phone AI SKU is LPDDR6-14400 on a 96-bit bus at 172.8 GB/s peak,
    which still misses the phone_2028_target_profile 180 GB/s peak gate while satisfying
    the 120 GB/s sustained gate target. The repository keeps both SKUs and the stricter
    target profile in parallel rather than silently lowering or raising either number.

    '
  reconciles:
    optimized_point: docs/architecture-optimization/soc-optimized-operating-point.yaml
    phy_evidence_gate: docs/evidence/memory/lpddr-phy-procurement.yaml
    phy_procurement: docs/spec-db/lpddr-phy-procurement-shortlist.yaml
    sub_report: docs/architecture-optimization/sota-2028/memory-subsystem.md
  status: SKU_SPLIT_REQUIRED
status: scaffold_only_real_claims_blocked
target_2028_phone_uma_spec_deltas:
- current: E1-chip ROM is a contract identity ROM and the executable RV64 reset scaffold
    is not integrated with DRAM init, boot SRAM, OpenSBI handoff, or Linux memory
    discovery.
  evidence_gate: reset_rom_boot_memory_handoff
  id: reset_rom_boot_sram_handoff
  target: Production reset ROM with immutable entry, boot SRAM, DRAM initialization/training
    sequence, memory discovery handoff, and OpenSBI payload transition evidence.
- current: 32-bit AXI-Lite SRAM model and separate top-level dram_mem array.
  evidence_gate: real_dram_controller_phy
  id: dram_controller_phy
  target: LPDDR-class controller/PHY boundary with training, refresh, timing, capacity
    discovery, ECC/parity policy, and power-state handling.
- current: Single-beat AXI-Lite scaffold with no AXI4 bursts, TileLink channel semantics,
    IDs, atomics, cacheability attributes, or coherency messages.
  evidence_gate: axi_tl_interconnect_contract
  id: axi_tl_system_fabric
  target: AXI4, TileLink, or equivalent system fabric with bursts, IDs/source IDs,
    ordering domains, backpressure, atomic/cacheability policy, and bridge evidence
    for CPU, DMA, NPU, display, and interrupt windows.
- current: Single-beat AXI-Lite, no bursts, no IDs, and one read/write response in
    flight.
  evidence_gate: memory_qos_bandwidth
  id: fabric_width_and_outstanding
  target: Burst-capable system fabric with multiple outstanding transactions, ordering
    domains, backpressure coverage, and per-master attribution.
- current: No cacheability attributes, no memory attributes table, no coherent DMA,
    and no explicit non-coherent cache-maintenance ABI.
  evidence_gate: cacheability_noncoherent_dma_policy
  id: cacheability_noncoherent_dma_policy
  target: Linux-visible memory attributes and either coherent DMA or explicit non-coherent
    ownership, cache-clean/invalidate, fence, and stale-buffer negative tests for
    every DMA-capable client.
- current: No caches, no snoops, no coherent DMA, and no cache-maintenance ABI.
  evidence_gate: uma_cache_coherency
  id: uma_coherency
  target: Coherent interconnect or explicit non-coherent DMA ownership/sync contract
    for CPU, DMA, NPU, display, and GPU/2D clients.
- current: DMA containment is DRAM-model address response behavior only.
  evidence_gate: iommu_smmu_dma_isolation
  id: dma_isolation
  target: IOMMU/SMMU or explicit DMA allowlist with per-device domains, page fault
    reporting, software-visible fault status, reset behavior, and unauthorized-descriptor
    tests.
- current: CPU-wins fixed arbitration in the contract wrapper; no QoS registers, counters,
    or latency budget.
  evidence_gate: memory_qos_bandwidth
  id: qos_bandwidth_latency
  target: Programmable or specified QoS policy with bandwidth counters, CPU latency
    bounds, display underflow evidence, and NPU/display contention tests.
- current: Interrupt-controller scaffold exists at 0x0C00_0000, but no CLINT/ACLINT
    window, complete PLIC/IMSIC map, or DMA exclusion evidence exists.
  evidence_gate: linux_interrupt_access_map
  id: clint_plic_access_map
  target: CLINT/ACLINT and PLIC/IMSIC access map with privilege rules, DMA exclusion,
    stable interrupt source IDs, device-tree bindings, and negative mutation tests.
