- external/dramsim3 (git@29817593, built locally)
simulator_limitations:
- DRAMSim3 protocol class is LPDDR4 with scaled tCK; LPDDR5X/6 bank-group reorg, link ECC, on-die ECC, sub-channel splitting, and refresh-management commands are not modeled.
- TraceBasedCPU is single-threaded; the maximum issue rate is one transaction per command cycle across all channels, so simulated sustained bandwidth tracks DRAMSim3's queue depth (cmd_queue_size, trans_queue_size) rather than the PHY's peak. The built-in `-s stream` StreamCPU mode produces similar utilisation in this configuration.
- Modeled aperture is 16 GiB for both SKUs (4 channels x 4096 MiB per DRAMSim3 LPDDR4 capacity math). The LPDDR6 AI SKU's 24 GiB density is documented in lpddr6_14400.ini but cannot be modeled without changing protocol geometry.
- LPDDR6 .ini widens the system bus from 24 to 32 bits to satisfy DRAMSim3's LPDDR4 lane legality check; per-pin data rate is preserved via tCK.
- All numbers are controller-side; no PHY training, vref, ZQ, or duty-cycle adjustment is in the loop. The DRAM-controller stub in rtl/memory/dram_ctrl/e1_dram_ctrl.sv is verified separately via docs/evidence/memory/dram_ctrl_evidence.yaml.
