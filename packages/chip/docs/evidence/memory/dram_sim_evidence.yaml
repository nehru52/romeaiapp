claim_boundary: scope_limited_to_structural_metadata_inventory_and_gate_diagnostics
claim_rules:
- All DRAMSim3 results are simulator_only and never satisfy docs/evidence/memory/uma-dram-evidence-gate.yaml phone_2028_target_profile thresholds.
- DRAMSim3 reports are controller-side timing approximations only; the LPDDR5X/LPDDR6 PHY itself remains BLOCKED on closed-IP procurement per docs/evidence/memory/lpddr-phy-procurement.yaml.
- Sustained bandwidth in this evidence reflects DRAMSim3's TraceBasedCPU + controller queue depth and is materially below JEDEC peak. Real silicon evidence is required to claim any higher utilisation.
- These numbers must not be quoted as phone-class measurements, real-target sustained bandwidth, or post-silicon timing.
context: 'The DRAMSim3 wrapper drives the academic DRAMSim3 controller model with the LPDDR5X-10667 and LPDDR6-14400 SKU geometries and reports controller-side bandwidth and latency. DRAMSim3 ships LPDDR4 as its highest LPDDR protocol class, so the SKU .ini files are LPDDR4-protocol approximations: bus width, channel count, and tCK match the SKU data rate, but LPDDR5/6 features (bank-group reorg, link/on-die ECC, sub-channels, WCK split) are not modeled.

  This evidence is behavioural-simulator-only. It exercises the controller-side timing of a single representative trace generator and never satisfies the phone-class bandwidth gate in docs/evidence/memory/uma-dram-evidence-gate.yaml. The LPDDR PHY itself remains closed-IP BLOCKED per docs/evidence/memory/lpddr-phy-procurement.yaml.

  '
