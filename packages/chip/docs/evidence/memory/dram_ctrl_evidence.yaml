- id: burst_write_read_back_across_row_boundary
  location: verify/cocotb/memory/test_dram_memory.py
  pass_criteria: burst write/read data survives a row boundary.
- id: multiple_outstanding_writes
  location: verify/cocotb/memory/test_dram_memory.py
