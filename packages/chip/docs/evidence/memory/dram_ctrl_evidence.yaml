required_capabilities:
  axi4_burst_data_integrity:
    description: 'INCR/WRAP/FIXED burst addressing, AxSIZE byte addressing, WSTRB,
      and readback across row boundaries preserve data.

      '
  axi4_capacity_geometry:
    description: 'mem_base_addr and mem_capacity_bytes expose the configured 2 GiB
      memory geometry.

      '
  dram_timing_model:
    description: 'Row-hit/row-miss/write/tCCD latency parameters are DRAMsim-derived
      and are checked by the controller gate.

      '
  fail_closed_aperture:
    description: 'Out-of-range AXI4 reads and writes return DECERR instead of aliasing
      to SRAM or silently wrapping.

      '
  outstanding_and_backpressure:
    description: 'B-response and AR-command FIFOs support multiple outstanding requests
      while honoring ready/valid stalls.

      '
