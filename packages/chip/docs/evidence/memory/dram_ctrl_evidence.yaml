claim_boundary: scope_limited_to_structural_metadata_inventory_and_gate_diagnostics
claim_rules:
- The current DFI-shaper drives representative commands from AXI handshakes and the
  refresh scheduler; this is a verification surface only and does not satisfy real-silicon
  DRAM timing claims.
- Bandwidth claims based on the behavioural model + DFI shaper are simulator-only
  and never satisfy the phone-class memory gate in docs/evidence/memory/uma-dram-evidence-gate.yaml.
context: 'The in-repo DRAM controller evidence now proves the RTL full-AXI4 slave
  front-end and large memory model boundary under Verilator + cocotb: discoverable
  2 GiB geometry at 0x8000_0000, burst read/write data integrity, multiple outstanding
  B/AR queues, ready/valid backpressure, DRAMsim-derived row-hit/row-miss timing,
  and fail-closed DECERR outside the memory aperture. It does not prove the closed
  LPDDR5X/6 PHY, DFI 5.0 training, physical silicon timing, Linux/Android memory-map
  integration, or phone-class memory claims; those remain blocked under docs/evidence/memory/lpddr-phy-procurement.yaml
  and the UMA/phone gates.

  '
