unblock_requires:
- A signed vendor contract for the PHY at the selected data rate.
- PDK alignment between the chosen PHY and the chosen process node.
- A DRAM bring-up board with package routing budgeted for the PHY.
- ATE pattern sets licensed for production test.
- First-silicon training transcripts (read leveling, gate training, vref, ZQ cal)
  attached as evidence.
