blocker_reason: 'No open LPDDR5X or LPDDR6 PHY exists at the data rates required for
  phone-class bandwidth. LiteDRAM (the only open contender) tops out at LPDDR4. Self-designing
  a 14.4 Gbps PHY with DFE/FFE/CTLE is multi-year, multi-tens-of-millions, and not
  a credible 2028 schedule.

  '
claim_boundary: scope_limited_to_structural_metadata_inventory_and_gate_diagnostics
claim_rules:
- LPDDR5X/LPDDR6 capability claims fail closed until vendor PHY is licensed and integrated.
- The DFI 5.0 north interface in rtl/memory/dram_ctrl/e1_dram_ctrl.sv is the only
  acceptable controller boundary.
- Bandwidth claims based on the behavioural AXI4 DRAM model are simulator-only and
  never satisfy the phone-class gate.
- Procurement decisions on the PHY must be recorded in the corresponding evidence
  artifact; verbal commitments do not unblock.
context: 'The LPDDR5X-10667 and LPDDR6-14400 PHY is closed third-party IP. The Eliza
  phone-class SoC requires a vendor-licensed PHY at the DFI 5.0 south interface of
  rtl/memory/dram_ctrl/e1_dram_ctrl.sv. This file is the fail-closed procurement gate;
  until a vendor-PHY contract is signed and the IP is integrated, every LPDDR5X/LPDDR6
  capability claim stays blocked.

  '
