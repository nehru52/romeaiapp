claim_boundary: scope_limited_to_structural_metadata_inventory_and_gate_diagnostics
claim_rules:
- IOMMU claims require executable cocotb evidence, a reference-model pin, and at least
  one Linux boot transcript.
- Closed BSPs that route around the IOMMU fail this gate.
- Authorised translations must never silently fail; the implementation fails closed
  by returning SLVERR upstream and recording a fault.
- Promoting any phone-class memory claim requires this gate to clear plus every entry
  under uma-dram-evidence-gate.yaml::blocked_real_claims.
generated_utc: '2026-05-24T02:03:00Z'
implemented_local_subset:
  allowlist_pasid_path:
    status: implemented_and_tested
    tests:
    - translate_mode_allows_known_devid
    - pasid_isolation_via_allowlist_revoke
    - pasid_context_switch_across_two_streams
  ats_pri_msi:
    limitation: No ATS/PRI/MSI end-to-end transaction evidence yet.
    status: advertised_or_mmio_surface_only
    tests:
    - page_request_interface_counter_visible
    - ats_translation_capability_advertised
    - translation_request_interface_round_trip
  bare_identity_path:
    status: implemented_and_tested
    tests:
    - bare_mode_passes_traffic_with_no_fault
    - walker_bare_mode_identity
  command_queue:
    limitation: IOTINVAL.VMA/GVMA and IODIR.INVAL_DDT/PDT side effects remain blocked.
    status: iofence_c_fetch_decode_only
    tests:
    - command_queue_iofence_completes
    - command_queue_invalid_opcode_stops_without_advancing
  ddt_sv39_first_stage:
    limitation: Non-identity G-stage table walking, Sv48/Sv57, full PDT/PASID, and
      production TLB behavior remain blocked.
    status: minimal_kat_only
    tests:
    - walker_single_stage_iova_to_pa
    - walker_two_stage_iova_to_pa
  register_and_fault_surface:
    status: implemented_and_tested
    tests:
    - capabilities_register_advertises_v1_features
    - translate_mode_blocks_unknown_devid_with_fault
    - walker_unmapped_iova_faults_with_record
next_commands:
  gate_check: make iommu-evidence-check
  iommu_tests: make cocotb-iommu
  rtl_elaboration: make rtl-check
reference_model:
  blocked_reason: 'No outbound network in the build environment. Operators must fetch
    the pinned reference model when network is provisioned; never run against an unverified
    checkout. The manifest lives in verify/cocotb/iommu/refmodel/ so it survives clean
    clones; the cloned tree itself goes under verify/external/ which is gitignored.

    '
  manifest: verify/cocotb/iommu/refmodel/riscv-iommu.manifest.yaml
  required_state: pinned_reference_model_unfetched
  schema: eliza.external_dependency_manifest.v1
required_artifact_schemas:
  docs/evidence/memory/iommu_ats_round_trip_report.json: eliza.memory.iommu_ats_round_trip.v1
  docs/evidence/memory/iommu_capabilities_report.json: eliza.memory.iommu_capabilities.v1
  docs/evidence/memory/iommu_fault_injection_report.json: eliza.memory.iommu_fault_injection.v1
  docs/evidence/memory/iommu_linux_driver_attach_transcript.json: eliza.memory.iommu_linux_driver.v1
  docs/evidence/memory/iommu_pasid_isolation_report.json: eliza.memory.iommu_pasid_isolation.v1
  docs/evidence/memory/iommu_pri_round_trip_report.json: eliza.memory.iommu_pri_round_trip.v1
required_artifacts:
- docs/evidence/memory/iommu_capabilities_report.json
- docs/evidence/memory/iommu_fault_injection_report.json
- docs/evidence/memory/iommu_ats_round_trip_report.json
- docs/evidence/memory/iommu_pri_round_trip_report.json
- docs/evidence/memory/iommu_linux_driver_attach_transcript.json
- docs/evidence/memory/iommu_pasid_isolation_report.json
required_for_phone_linux_unblock:
  ats:
    description: PCIe-style ATS translation request/response.
  device_context_walk:
    description: 'DDT walker with 1-level / 2-level / 3-level modes; matches the DDTP.iommu_mode
      encoding defined in spec section 3.1.2.

      '
  fault_queue:
    causes_supported:
    - DDT_ENTRY_NOT_VALID
    - DDT_ENTRY_MISCONFIGURED
    - TRANSACTION_TYPE_DISALLOWED
    - LOAD_PAGE_FAULT
    - STORE_PAGE_FAULT
    - LOAD_GUEST_PAGE_FAULT
    - STORE_GUEST_PAGE_FAULT
    description: Fault records carry master DID, PASID, IOVA, TTYP, cause.
    record_size_bytes: 32
  msi_translation:
    description: MSI translation matching the Linux v6.x driver expectations.
    igs_mode: 2
  page_request_interface:
    description: PRI / PQB ring for shared virtual memory.
  pasid:
    description: 'Process address-space identifier with PDT walk. Required for NPU
      command-queue contexts and Android NN HAL SVA.

      '
    width_bits: 20
  two_stage_translation:
    description: G-stage translation required for virtualization hosts.
    first_stage_modes:
    - Sv39
    - Sv48
    second_stage_modes:
    - Sv39x4
    - Sv48x4
required_tests:
- id: capabilities_register_advertises_v1_features
  location: verify/cocotb/iommu/test_riscv_iommu.py
  pass_criteria: CAPABILITIES.version == 0x10 and required feature bits set.
- id: bare_mode_passes_traffic_with_no_fault
  location: verify/cocotb/iommu/test_riscv_iommu.py
  pass_criteria: DDTP=BARE forwards every transaction without faulting.
- id: translate_mode_blocks_unknown_devid_with_fault
  location: verify/cocotb/iommu/test_riscv_iommu.py
  pass_criteria: Unauthorised devid raises CAUSE_DDT_ENTRY_NOT_VALID once.
- id: translate_mode_allows_known_devid
  location: verify/cocotb/iommu/test_riscv_iommu.py
  pass_criteria: Authorised devid completes without faulting.
- id: pasid_isolation_via_allowlist_revoke
  location: verify/cocotb/iommu/test_riscv_iommu.py
  pass_criteria: Revoking a DID causes the next request to fault.
- id: two_stage_translation_via_3lvl_ddt
  location: verify/cocotb/iommu/test_riscv_iommu.py
  pass_criteria: DDTP=3LVL gates both S1 and S2 stages on the allowlist.
- id: pasid_context_switch_across_two_streams
  location: verify/cocotb/iommu/test_riscv_iommu.py
  pass_criteria: Same devid + two PASIDs honour allowlist revoke / re-auth.
- id: page_request_interface_counter_visible
  location: verify/cocotb/iommu/test_riscv_iommu.py
  pass_criteria: PQB/PQH/PQT registers and page_req_count_dbg are observable.
- id: ats_translation_capability_advertised
  location: verify/cocotb/iommu/test_riscv_iommu.py
  pass_criteria: CAPABILITIES advertises ATS, PRI, PAS, T2GPA, PD20, IGS=MSI.
- id: translation_request_interface_round_trip
  location: verify/cocotb/iommu/test_riscv_iommu.py
  pass_criteria: TR_REQ_IOVA / TR_REQ_CTL latch and read-back.
- id: walker_single_stage_iova_to_pa
  location: verify/cocotb/iommu/test_riscv_iommu.py
  pass_criteria: DDT + Sv39 first-stage walk translates a mapped IOVA to PA and returns
    target data.
- id: walker_two_stage_iova_to_pa
  location: verify/cocotb/iommu/test_riscv_iommu.py
  pass_criteria: Sv39 first-stage walk under an identity G-stage context returns target
    data.
- id: walker_unmapped_iova_faults_with_record
  location: verify/cocotb/iommu/test_riscv_iommu.py
  pass_criteria: Invalid first-stage leaf returns SLVERR and records a load-page-fault
    with DID and IOVA.
- id: walker_bare_mode_identity
  location: verify/cocotb/iommu/test_riscv_iommu.py
  pass_criteria: DDTP=BARE forwards identity and returns target data without fault.
- id: command_queue_iofence_completes
  location: verify/cocotb/iommu/test_riscv_iommu.py
  pass_criteria: CQ fetches and decodes IOFENCE.C, pulses cmd_complete_irq, and advances
    CQH.
- id: command_queue_invalid_opcode_stops_without_advancing
  location: verify/cocotb/iommu/test_riscv_iommu.py
  pass_criteria: Unsupported CQ opcode does not pulse cmd_complete_irq, does not advance
    CQH, disables CQ, and records a CQCSR error bit.
schema: eliza.iommu_evidence_gate.v1
scope:
- rtl/iommu/e1_riscv_iommu.sv
- rtl/iommu/e1_riscv_iommu_pkg.sv
specification:
  name: RISC-V IOMMU
  ratified_utc: 2024-09-11 00:00:00+00:00
  url: https://docs.riscv.org/reference/hardware/iommu/v20240911/_attachments/riscv-iommu.pdf
  version: v1.0.1
status: blocked_until_evidence
unblock_requires:
- Every required cocotb test passes under verilator or icarus.
- The reference-model manifest pins a specific commit hash.
- All required artifact paths exist and validate against their schema.
- The Linux RISC-V IOMMU driver attaches the IOMMU during a kernel boot transcript
  with no error messages.
- ATS and PRI round-trips are exercised against at least one bus master.
- PASID isolation is exercised across at least two concurrently active masters with
  different PASIDs.
