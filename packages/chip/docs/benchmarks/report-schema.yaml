schema: eliza.benchmark_report.v1
format: generated JSON report validated by benchmarks/run_benchmarks.py
strict_validation_command: cd packages/chip && python3 benchmarks/run_benchmarks.py validate-report <report.json>
scope_note: This schema covers benchmark run reports such as benchmarks/results/cpu-phone/report.json. The L5/L6 rollup at build/reports/cpu_phone_l5_l6_benchmark_report.json uses schema eliza.cpu_phone_l5_l6_benchmark_report.v1 and is validated by scripts/check_cpu_phone_benchmark_claim_gate.py, not by benchmarks/run_benchmarks.py validate-report.
required_fields:
  schema: string
  report_id: string
  status:
    enum:
      - passed
      - blocked
      - failed
  date_utc: string
  dry_run: boolean
  claim_allowed: boolean
  phone_claim_allowed: boolean
  release_claim_allowed: boolean
  claim_level:
    enum:
      - L0_RTL_UNIT
      - L1_RTL_FULL_SOC
      - L2_ARCH_SIM
      - L3_FPGA
      - L4_DEV_BOARD
      - L5_PROTOTYPE_SILICON
      - L6_COMPLETE_PHONE
  platform:
    name: string
    revision: string
    source_tree_sha: string
    host: string
    host_system: string
  target_execution:
    runner:
      enum:
        - board
        - prototype
        - silicon
        - phone
        - firesim
        - cuttlefish
    transcript_path: relative_path_under_packages_chip
    transcript_sha256: sha256_hex
  config:
    path: string
    version: string
  software:
    os: string
    kernel: string
    firmware: string
    runtime: string
    build_id: string
  clocks:
    source: string
    cpu_hz: number
    npu_hz: number
    memory_hz: number
    governor: string
  memory:
    type: string
    capacity_bytes: integer
    bandwidth_bytes_per_second: number
    channels: integer
  thermal:
    ambient_c: number
    die_c: number
    cooling: string
    throttle_state: string
  power:
    source: string
    watts: number
    measurement_method: string
    sample_count: integer
    averaging_window_seconds: number
  process:
    node: string
    pdk: string
    process_effects_contract:
      path: string
      sha256: sha256_hex
    process_corner_count: integer
    worst_process_corner: string
    pdk_signoff_claim: string
  calibration:
    status:
      enum:
        - calibrated
        - blocked-no-calibrated-assets
    source: string
    ground_truth_reference: string
    last_calibrated_utc:
      type: string
      format: iso8601_utc_timestamp
    assets:
      type: object
  workload:
    name: string
    dataset: string
    batch_size: integer
  results:
    type: non_empty_list
    item:
      name: string
      suite: string
      version: string
      command: list
      input_dataset: string
      primary_metric: string
      units: string
      parser:
        enum:
          - coremark_v1
          - stream_v5
          - lmbench_bw_mem
          - lmbench_lat_mem_rd
          - fio_json_v3
          - tflite_benchmark_model
          - simulator_metrics_v1
          - eliza_mlperf_inference_v1
          - eliza_npu_scale_sim_v1
      provenance:
        enum:
          - dry_run
          - measured
          - target-measured
          - silicon-measured
          - simulator
          - imported
          - blocked_missing_target_evidence
      status:
        enum:
          - planned
          - planned_missing_deps
          - blocked
          - missing_dependencies
          - passed
          - failed
          - timeout
          - error
      dependencies:
        type: list
        item:
          name: string
          kind:
            enum:
              - executable
              - file
              - model_artifact
              - capability_artifact
          available: boolean
          path: string_or_null
          null_path_note: path may be null only when available is false
      artifacts:
        raw_output: string
        raw_output_sha256: sha256_hex
        l5_l6_raw_output_note: for passed L5/L6 measured results, raw_output must be an archived path under packages/chip and raw_output_sha256 must match the file contents
      metrics: object
      target_execution:
        runner:
          enum:
            - board
            - prototype
            - silicon
            - phone
            - firesim
            - cuttlefish
        transcript_sha256: sha256_hex
      run_metadata:
        runs: integer
        warmup_runs: integer
        required_metadata: list
        required_calibration_assets: list
      l5_l6_phone_claim_note: passed L5/L6 measured results must include process metadata and target_execution.runner/transcript_sha256; host/local runs cannot satisfy phone-class claims
      l5_l6_result_transcript_note: per-result target_execution.transcript_sha256 must match artifacts.raw_output_sha256 unless a separate target_execution.transcript_path is supplied and hash-bound
      l5_l6_top_level_transcript_note: top-level report target_execution must include transcript_path and transcript_sha256 bound to an archived target session transcript
      l5_l6_phone_runner_note: For phone-claim gates, only prototype, silicon, or phone runners can satisfy L5/L6. Board, FireSim, and Cuttlefish are valid report provenance for narrower claims but do not satisfy the phone CPU L5/L6 gate.
  artifacts:
    target_metadata: string
    target_metadata_sha256: sha256_hex
    target_metadata_bytes: integer
    logs: list
    reports: list
    traces: list
cpu_phone_l5_l6_benchmark_report:
  schema: eliza.cpu_phone_l5_l6_benchmark_report.v1
  validation_command: cd packages/chip && python3 scripts/check_cpu_phone_benchmark_claim_gate.py --no-write --strict
  required_fields:
    status:
      enum:
        - pass
        - blocked
    claim_allowed: boolean
    phone_claim_allowed: boolean
    release_claim_allowed: boolean
    claim_levels_accepted:
      values:
        - L5_PROTOTYPE_SILICON
        - L6_COMPLETE_PHONE
    required_benchmarks:
      values:
        - spec_cpu2017
        - coremark
        - dhrystone
        - jetstream2
        - lmbench_bw_mem
        - lmbench_lat_mem_rd
    entries:
      item_fields:
        name: string
        source: string
        path: string
        gate_status: string
        claim_satisfied: boolean
        reason: string_when_blocked
        unblock: object_when_blocked
        blocked_requirements_count: integer_when_blocked_side_result
        blocked_requirement_names: list_when_blocked_side_result
        blocked_requirements_summary: string_when_blocked_side_result
        claim_allowed: false_when_blocked
        phone_claim_allowed: false_when_blocked
        release_claim_allowed: false_when_blocked
      claim_satisfied_item_fields:
        record_status:
          required_value: passed
        claim_level:
          enum:
            - L5_PROTOTYPE_SILICON
            - L6_COMPLETE_PHONE
        provenance:
          enum:
            - measured
            - target-measured
            - silicon-measured
        raw_output_sha256: non_placeholder_lowercase_sha256_hex
        target_metadata_sha256: non_placeholder_lowercase_sha256_hex
        target_runner:
          enum:
            - prototype
            - silicon
            - phone
        metrics: object
      conditional_item_fields:
        spec_cpu2017_when_claim_satisfied:
          spec_license_sha256: non_placeholder_lowercase_sha256_hex
          spec_run_manifest_sha256: non_placeholder_lowercase_sha256_hex
      blocked_side_result_required_blockers:
        spec_cpu2017:
          - licensed_spec_cpu2017_install
          - license_hash
          - target.runner.spec_cpu2017
          - target.metadata
          - artifacts.raw_output_sha256
          - metrics
        coremark:
          - target.runner.coremark
          - target.raw_output
          - target.metadata
          - target.dut
          - artifacts.raw_output_sha256
          - calibration.clock_source
          - calibration.power_thermal
          - metrics
        dhrystone:
          - target.runner.dhrystone
          - target.raw_output
          - target.metadata
          - target.dut
          - artifacts.raw_output_sha256
          - calibration.clock_source
          - calibration.power_thermal
          - metrics
        jetstream2:
          - riscv64_js_engine
          - jetstream2_sources
          - target.runner.jetstream2
          - target.metadata
          - artifacts.raw_output_sha256
          - metrics
  note: Blocked entries and report-gate entries must set `claim_allowed`, `phone_claim_allowed`, and `release_claim_allowed` to false, explain the blocker, and include unblock metadata. Blocked side-result entries must use provenance `blocked_missing_target_evidence` in the source artifact, set those same false claim flags, and expose `blocked_requirements_count`, non-empty machine-readable `blocked_requirement_names`, and `blocked_requirements_summary` in the L5/L6 rollup; the source artifact and rollup entry must include every benchmark-specific blocker ID listed under blocked_side_result_required_blockers. Claim-satisfied entries must be passed, measured/target-measured/silicon-measured, L5/L6, and backed by non-placeholder lowercase raw-output hashes, target runner, non-placeholder lowercase target-metadata digest, and benchmark-specific metrics validated by scripts/check_cpu_phone_benchmark_claim_gate.py. SPEC CPU2017 claim-satisfied entries must also include non-placeholder lowercase license and run-manifest digests.
optional_result_fields:
  missing_dependencies: list
  blocked_assets:
    type: list
    item:
      name: string
      reason: string
      blocker_id: string
      pipeline_visible: boolean
      release_blocking: boolean
      resolution: string
  returncode: integer
  elapsed_seconds: number
  error: string
  energy_joules_per_inference:
    # MLPerf Power-style integrated-energy field. The value is joules per
    # completed inference, integrated over the measured QPS run. Required
    # calibration metadata (sub-fields) document the measurement contract;
    # the runner does not compute a value, it only threads what the
    # benchmark plan declares.
    type: object
    fields:
      value: number
      units: string                         # canonical: "J_per_inference"
      provenance:
        enum:
          - simulator      # Accelergy / Timeloop modeled
          - measured       # Joulescope / Monsoon / power-rail integration
      instrument: string                   # e.g. "Joulescope JS220"
      sampling_rate_hz: number             # raw measurement rate
      integration_window_seconds: number   # length of the QPS run integrated
      ground_truth_reference: string       # how this was calibrated
      sample_count: integer                # samples used in the integral
      calibration:
        status:
          enum:
            - calibrated
            - blocked-no-calibrated-assets
        last_calibrated_utc:
          type: string
          format: iso8601_utc_timestamp
        evidence: string
validation_rules:
  - Generated reports must validate from `packages/chip` with `python3 benchmarks/run_benchmarks.py validate-report <report.json>`.
  - Reports must contain at least one benchmark result; an empty report is never benchmark evidence.
  - Top-level report `status` must match contained result statuses: any `failed`, `timeout`, or `error` result makes the report `failed`; any `blocked`, `missing_dependencies`, or `planned_missing_deps` result makes it `blocked`; otherwise it is `passed`.
  - Dry-run reports may have `status: passed` for fully planned runs, but all top-level claim flags must remain false because dry-run output is not benchmark evidence.
  - Side-result reports with schema `eliza.cpu_benchmark_result.v1` may use `target-measured` or `silicon-measured`; phone L5/L6 claim gates still require prototype, silicon, or phone runners plus raw transcript and metadata hashes.
  - Blocked real reports must use result provenance `blocked_missing_target_evidence` for rows that did not execute because target artifacts, calibration, or dependency evidence is absent; they must not use `measured`, `target-measured`, `silicon-measured`, or `imported`.
  - "Blocked benchmark run reports, blocked CPU phone gate reports, and blocked L5/L6 rollup reports must set `claim_allowed: false`, `phone_claim_allowed: false`, and `release_claim_allowed: false`; blocked CPU phone side-result artifacts must use schema `eliza.cpu_benchmark_result.v1`, status `blocked`, provenance `blocked_missing_target_evidence`, those same false claim flags, non-empty top-level `reason`, and non-empty `blocked_requirements` objects with `name`, `reason`, and `resolution`; the phone claim gate requires the benchmark-specific blocker IDs documented under `cpu_phone_l5_l6_benchmark_report.required_fields.conditional_item_fields.blocked_side_result_required_blockers`."
  - Real reports (`dry_run: false`) with passed measured results must include populated software, clocks, memory, thermal, power, process, and calibration metadata fields at report level.
  - Dry-run reports must use result provenance `dry_run` and must never contain `passed` results.
  - Passed real results must include non-empty parser-derived `metrics` and `run_metadata`.
  - Passed real results must include `calibration.status: calibrated` and calibrated entries for every result `required_calibration_assets` item.
  - Passed real results must include `calibration.last_calibrated_utc` as an ISO-8601 UTC timestamp (`Z` or `+00:00`, not local time).
  - Passed real L5/L6 results must include a 64-character lowercase SHA-256 hex digest for every required calibration asset `sha256` field, and every required calibration asset `evidence` path must be archived under `packages/chip` with file contents matching that digest.
  - Imported L5/L6 target metadata must include `process.process_effects_contract.path: docs/spec-db/process-14a-effects.yaml`; when validated with an artifact root, `process.process_effects_contract.sha256` must match the archived contract file.
  - Blocked calibration templates may validate for blocked/missing reports, but any parsed result that would otherwise pass must fail validation until calibration is replaced with real evidence.
  - Parser failures make the result `failed`; raw logs alone are not host-verifiable performance evidence.
  - Results with unavailable model_artifact dependencies must use status `blocked`, not `passed`.
  - Results with unavailable capability_artifact dependencies must use status `blocked`, not `passed`.
  - Non-L2 reports must not pass with dependencies whose `release_claim_allowed` field is false.
  - Blocked model artifacts must carry stable `blocker_id`, `pipeline_visible`, and `release_blocking` fields so CI and release pipelines can gate on them.
  - Placeholder or undersized TFLite models are blocked until replaced by a declared non-proprietary model artifact.
  - Simulator wall-clock time must not be compared against commercial phone scores.
  - Simulator-only metrics must use provenance `simulator`, claim level L0-L2, and may report target cycles, IPC, MPKI, cache/memory transactions, modeled frequency, explicitly modeled power, explicitly modeled thermal estimates, and process-corner derates only.
  - Simulator-only metrics must include `benchmark_success_allowed: true`; QEMU liveness-only exports set it to false and are parser-rejected as benchmark success.
  - FPGA power must not be reported as mobile SoC power.
  - NPU reports must include unsupported op count and CPU fallback percentage.
  - >
    E1-NPU NNAPI proof must bind to the exact model SHA-256, report the
    expected accelerator name, and show zero CPU fallback plus zero unsupported
    ops before `tflite_e1_npu` can run as target evidence.
  - >
    E1-NPU NNAPI proof must include claim level, precision, dataflow name,
    DMA byte counts, delegated and total NNAPI node counts, MACs per inference,
    NPU cycles, NPU clock, observed TOPS, and a MAC/cycle TOPS formula.
  - >
    E1-NPU observed TOPS must not exceed the MAC/cycle/NPU-clock derived
    upper bound apart from rounding slack; simulator wall-clock time and
    marketing TOPS are not accepted.
  - Android reports must separate boot success from CTS/VTS compatibility.
  - >
    Results that include energy_joules_per_inference must declare provenance
    (simulator or measured), instrument identification, sampling rate,
    integration window, and a calibration status; the harness must not
    fabricate the energy value, only pass it through from the benchmark
    plan or the simulator/instrument exporter.
parser_manifests:
  coremark_v1:
    source: CoreMark stdout
    required_metric: coremark_per_mhz
    rejects: missing CoreMark/MHz line
  stream_v5:
    source: STREAM stdout
    required_metric: triad_mb_per_s
    rejects: missing Triad line
  lmbench_bw_mem:
    source: lmbench bw_mem stdout
    required_metric: bandwidth_mb_per_s
    rejects: no numeric bandwidth row
  lmbench_lat_mem_rd:
    source: lmbench lat_mem_rd stdout
    required_metric: max_latency_ns
    rejects: no numeric latency points
  fio_json_v3:
    source: fio --output-format=json
    required_metric: one or more non-zero read/write IOPS or bandwidth fields
    rejects: non-JSON fio output or empty jobs
  tflite_benchmark_model:
    source: TensorFlow Lite benchmark_model stdout
    required_metric: avg_latency_us
    required_npu_metrics:
      - unsupported_op_count
      - cpu_fallback_percent
    rejects: missing average inference latency
  simulator_metrics_v1:
    source: JSON exported by simulator flow
    required_metrics:
      - target_cycles
      - simulated_frequency_hz
      - ipc
      - benchmark_success_allowed
    modeled_14a_metrics:
      - estimated_package_power_w
      - estimated_die_temp_c
      - instructions_per_joule
      - process_corner_count
      - worst_process_corner_ipc
      - worst_process_corner_frequency_hz
      - worst_process_corner_power_w
      - worst_process_corner_die_temp_c
    forbidden_metrics:
      - wall_clock_score
      - phone_score
      - geekbench_score
calibration_asset_contract:
  status: calibrated
  source: string
  sha256:
    type: string
    format: lowercase_sha256_hex
  evidence:
    type: string
    meaning: archived artifact path under packages/chip whose SHA-256 matches sha256
required_calibration_assets_by_suite:
  CoreMark:
    - clock_source
    - power_meter
    - coremark_binary
  Dhrystone:
    - clock_source
    - power_meter
    - dhrystone_binary
  JetStream:
    - clock_source
    - power_meter
    - jetstream_engine
  SPEC CPU2017:
    - clock_source
    - power_meter
    - archived SPEC config path plus config_sha256 in the SPEC run manifest
  STREAM:
    - clock_source
    - power_meter
    - stream_binary
    - memory_model
  lmbench:
    - clock_source
    - power_meter
    - lmbench_binary
    - memory_model
  fio:
    - clock_source
    - power_meter
    - fio_binary
    - storage_target
  TensorFlow Lite benchmark_model:
    - clock_source
    - power_meter
    - tflite_benchmark_model
    - tflite_model
    - nnapi_driver
  Eliza simulator metrics:
    - simulator_config
    - simulator_counter_export
