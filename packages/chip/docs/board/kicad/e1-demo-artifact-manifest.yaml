schema: eliza.kicad_artifact_manifest.v1
board: e1-demo
status: release_blocked
kicad_project_dir: board/kicad/e1-demo
fab_report_dir: board/reports/fab
command_capture_doc: docs/board/kicad/e1-demo-commands.md
source_inputs:
  package_pinout: package/e1-demo-pinout.yaml
  package_contract: docs/package/e1-demo-package.md
  pad_ring_contract: docs/package/e1-demo-pad-ring.md
  fab_notes: docs/board/kicad/e1-demo/fab-notes.md
blocked_until:
  - Package vendor drawing, land-pattern data, material constraints, and revision checksum are archived.
  - Foundry/package bond diagram maps die pads to package pins.
  - KiCad symbol and footprint are generated or reviewed from the vendor package drawing, not the placeholder pinout.
  - Board stackup, return paths, rail current budget, SI/PI assumptions, and decoupling plan are reviewed.
  - Headless KiCad ERC, DRC, Gerber, drill, BOM, position, plot, and transcript artifacts are archived.
  - Assembly-house DFM and board-house fabrication notes approval are archived.
required_artifacts:
  sources:
    - board/kicad/e1-demo/*.kicad_pro
    - board/kicad/e1-demo/*.kicad_sch
    - board/kicad/e1-demo/*.kicad_pcb
    - board/kicad/e1-demo/*.kicad_sym
    - board/kicad/e1-demo/*.pretty/*.kicad_mod
  fabrication_outputs:
    - board/reports/fab/erc*.txt
    - board/reports/fab/drc*.txt
    - board/reports/fab/gerbers/*.gbr
    - board/reports/fab/drill/*.drl
    - board/reports/fab/bom*.csv
    - board/reports/fab/position*.csv
    - board/reports/fab/fab-drawing*.pdf
  provenance:
    - board/reports/fab/command-transcript*.txt
    - board/reports/fab/tool-versions*.txt
    - docs/manufacturing/evidence/package/<vendor-drawing-checksum>
    - docs/manufacturing/evidence/dfm/<assembly-house-review>
local_checks:
  manifest_only:
    - python3 scripts/check_kicad_artifacts.py --manifest-only
    - python3 scripts/check_manufacturing_artifacts.py --manifest-only
  release_evidence:
    - python3 scripts/check_kicad_artifacts.py
    - python3 scripts/check_manufacturing_artifacts.py
claim_policy:
  allowed: This manifest records missing KiCad and fabrication evidence only.
  forbidden_until_unblocked: Do not claim board fabrication readiness from placeholder package, pinout, or notes.
