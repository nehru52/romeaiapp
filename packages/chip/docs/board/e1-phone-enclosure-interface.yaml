schema: eliza.e1_phone_enclosure_interface.v1
status: mechanical_constraint_baseline_not_step_not_fabrication_ready
date: 2026-05-20
claim_boundary: >
  This is a mechanical and PCB-interface constraint baseline. It is not a STEP
  model, tolerance analysis, drop-test result, water-ingress design, or factory
  drawing package.

coordinate_system:
  origin: top_left_of_rigid_mainboard_front_view
  units: mm
  board_bbox: {x: 0.0, y: 0.0, width: 64.0, height: 132.0}
  device_envelope: {width: 78.0, height: 153.6, max_thickness: 11.8}
  display_active_area: {width: 68.04, height: 120.96}
  display_tft_outline_target: {width: 70.78, height: 129.17, thickness: 1.7}
  touch_lens_outline_reference: {width: 77.1, height: 151.77, thickness: 3.39}

z_stack_target:
  front_to_back:
    - {name: cover_lens_and_touch, thickness_mm: 0.8_to_1.2, status: supplier_dependent}
    - {name: display_lcm, thickness_mm: 1.7_to_3.39, status: supplier_dependent}
    - {name: display_adhesive_and_air_gap, thickness_mm: 0.2_to_0.5, status: estimate}
    - {name: rigid_mainboard, thickness_mm: 0.8, status: concept}
    - {name: tallest_topside_component_or_shield, thickness_mm: 1.2_to_2.6, status: requires_selected_parts}
    - {name: battery_pack, thickness_mm: 5.6, status: target}
    - {name: graphite_thermal_spreader_and_gap_pad, thickness_mm: 0.2_to_0.6, status: estimate}
    - {name: rear_cover_or_midframe_allowance, thickness_mm: 0.7_to_1.2, status: estimate}
  risk: >
    The stack can exceed 11.8 mm unless shield can heights, battery thickness,
    camera z-height, and rear cover design are locked together. A STEP
    tolerance stack is mandatory before claiming enclosure fit.

edge_interfaces:
  top_edge:
    keepout: antenna_primary
    y_range: [3.0, 8.0]
    constraints:
      - no_metal_midframe_over_antenna_without_rf_vendor_review
      - cellular_main_or_diversity_matching_network_near_feed
      - earpiece_acoustic_path_must_not_cross_rf_feed
  bottom_edge:
    keepout: antenna_secondary_and_usb
    y_range: [124.0, 132.0]
    constraints:
      - usb_c_port_centered_at_x_34_mm_nominal
      - loudspeaker_chamber_and_microphone_ports_need_acoustic_gasket_stack
      - bottom_antenna_feed_must_clear_usb_shield_grounding
  left_edge:
    interface: side_key_flex
    x_range: [0.0, 12.0]
    constraints:
      - volume_up_volume_down_and_power_key_use_side_push_tactiles_or_flex_assembly
      - side_key_flex_connector_must_route_outside_full_width_battery_cavity
      - external_button_plungers_must_load_enclosure_rib_not_switch_solder_joints
  right_edge:
    interface: reserved_for_enclosure_rail_or_optional_sim_tray
    constraints:
      - avoid_rf_feed_crossing_if_sim_tray_metal_is_used

component_keepouts:
  battery_window:
    rect: {x: 0.0, y: 29.5, width: 64.0, height: 87.0}
    requirements:
      - no_components_on_rigid_pcb_inside_window
      - top_bottom_rigid_islands_or_flex_required_for_pack_clearance
      - adhesive_and_pull_tab_clearance_to_be_defined_by_battery_vendor
      - battery_ntc_and_pack_id_connector_must_remain_serviceable
  rear_camera_bump:
    rect: {x: 47.0, y: 8.0, width: 15.0, height: 24.0}
    requirements:
      - lens_axis_and_flash_window_need_case_datum
      - camera_module_z_height_must_be_locked_before_id_freeze
  display_camera_fpc_zone:
    rect: {x: 47.0, y: 8.0, width: 15.0, height: 34.0}
    requirements:
      - use_common_connector_family_where_possible
      - preserve bend radius to display FPC and camera FPC
  usb_c_zone:
    rect: {x: 26.0, y: 124.0, width: 16.0, height: 6.0}
    requirements:
      - connector_shell_tied_to_ground_or_chassis_policy
      - enclosure_port_cutout_verified_with_plug_model

next_me_artifacts_required:
  - STEP_model_for_board_display_battery_camera_usb_c_and_buttons
  - 2D_drawing_with_datums_for_display_lens_camera_usb_c_and_side_buttons
  - tolerance_stack_for_11p8_mm_flush_back_thickness_target
  - antenna_plastic_and_metal_keepout_model
  - acoustic_chamber_model_for_speaker_mics_and_earpiece
  - drop_and_connector_insertion_load_review
