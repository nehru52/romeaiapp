schema: eliza.uma_coherency_validation_strategy.v1
status: fail_closed_until_evidence
claim_allowed: false
release_claim_allowed: false
android_boot_claim_allowed: false
wifi_claim_allowed: false
ai_throughput_claim_allowed: false
tapeout_claim_allowed: false
scope: CPU, DMA, NPU, display, GPU or 2D engine, and Android userspace sharing one DRAM system.
current_repo_status:
  memory_model: rtl/memory/e1_axi_lite_dram.sv
  top_aperture: rtl/top/e1_soc_top.sv
  limitation: Small SRAM-backed AXI-Lite model; no cache coherency, IOMMU, LPDDR PHY, or QoS implementation.
  executable_local_gate: make memory-interconnect-contract-check
  current_pass_scope:
    - Address map and decode consistency for the e1-chip debug aperture and Linux-capable scaffold.
    - AXI-Lite SRAM-backed DRAM model response, alignment, and byte-strobe behavior.
    - CPU/DMA arbitration smoke behavior in the contract wrapper.
  unsupported_claims:
    - Phone-class DRAM controller integration or LPDDR/DDR PHY behavior; controller RTL simulation alone is not UMA/LPDDR release evidence.
    - Hardware cache coherency or coherent accelerator ports.
    - IOMMU/SMMU translation, page faults, or DMA address isolation.
    - Memory QoS, sustained bandwidth, latency, or display underflow guarantees.
validation_axes:
  - id: coherency_policy
    required_decision: coherent_interconnect_or_explicit_cache_maintenance
    minimum_tests:
      - CPU writes buffer, NPU/DMA reads current data.
      - NPU/DMA writes buffer, CPU observes current data after declared sync.
      - Display scans buffer while producer updates through declared ownership protocol.
      - Negative test proves stale data is detected or prevented when sync is omitted.
    release_gate: uma_coherency_report
    evidence_gate:
      blocked: true
      unblock_requires:
        - Coherency policy decision reviewed against RTL, Linux driver, and Android buffer lifecycle.
        - Executable shared-buffer tests with positive and negative stale-data cases.
      artifact: docs/evidence/memory/uma_coherency_report.json
  - id: iommu_isolation
    required_decision: IOMMU/SMMU or bounded physical-address allowlist per DMA master
    minimum_tests:
      - DMA/NPU/display access to unauthorized page faults or is blocked.
      - Fault status is visible to kernel driver and Android HAL/runtime.
      - User-controlled descriptor cannot target kernel, HAL, or secure memory.
      - Reset clears stale translations and descriptors.
    release_gate: iommu_fault_injection_report
    evidence_gate:
      blocked: true
      unblock_requires:
        - IOMMU/SMMU or explicit physical allowlist contract is implemented in RTL and software.
        - Fault-injection logs prove unauthorized DMA is blocked and reported.
      artifact: docs/evidence/memory/iommu_fault_injection_report.json
  - id: memory_qos
    required_decision: arbitration policy for CPU, display, DMA, NPU, and GPU/2D traffic
    minimum_tests:
      - Display underflow remains zero at target mode under CPU and NPU load.
      - NPU throughput is measured with display active and idle.
      - CPU latency is bounded during long DMA and NPU transfers.
      - QoS counters identify which master consumed bandwidth.
    release_gate: memory_qos_report
    evidence_gate:
      blocked: true
      unblock_requires:
        - Bandwidth model includes display mode, active bytes, arbitration policy, and backpressure.
        - QoS counters and contention tests are archived for CPU, display, DMA, NPU, and GPU/2D clients.
      artifact: docs/evidence/memory/memory_qos_report.json
  - id: android_buffer_lifecycle
    required_decision: dma-buf/ION replacement, gralloc, NN/runtime, and HWC buffer ownership
    minimum_tests:
      - Android producer to HWC consumer buffer handoff.
      - NN/runtime input/output tensor buffers with accelerator path enabled.
      - CPU fallback path reports fallback percentage.
      - SELinux denies unauthorized device and buffer access.
    release_gate: android_shared_buffer_report
    evidence_gate:
      blocked: true
      unblock_requires:
        - Android dma-buf/gralloc/HWC/NN ownership transitions run on the selected target.
        - SELinux, HAL, and kernel logs prove authorized access and denied unauthorized access.
      artifact: docs/evidence/android/android_shared_buffer_report.json
required_artifacts:
  - docs/evidence/memory/uma_coherency_report.json
  - docs/evidence/memory/iommu_fault_injection_report.json
  - docs/evidence/memory/memory_qos_report.json
  - docs/evidence/android/android_shared_buffer_report.json
claim_rules:
  - Android performance claims require all validation_axes release gates.
  - AI throughput claims require coherency_policy, iommu_isolation, and memory_qos evidence.
  - Display smoothness claims require memory_qos and android_buffer_lifecycle evidence.
  - Any missing required artifact keeps the claim blocked.
