schema: eliza.pipeline_handoff_work_order.v1
status: fail_closed_open_work
claim_allowed: false
release_claim_allowed: false
android_boot_claim_allowed: false
wifi_claim_allowed: false
ai_throughput_claim_allowed: false
tapeout_claim_allowed: false
source_goal: Android-capable RISC-V AI phone SoC with WiFi, NPU/GPU/display, FPGA/prototype, and tapeout path.
handoffs:
  - id: spec_to_contract
    from: architecture_spec
    to: machine_readable_contract
    current_artifacts:
      - docs/arch/soc.md
      - sw/platform/e1_platform_contract.json
      - docs/project/phone-soc-minimum-blocks.yaml
    missing_artifacts:
      - generated phone SoC feature matrix consumed by checks
      - stable address-map generator used by RTL, DTS, Linux headers, and AOSP DTS
    fail_closed_gate: make phone-soc-claim-check
    next_tasks:
      - Add schema validation for every phone_soc_blocks entry.
      - Generate RTL/DTS/header constants from one address-map source.
  - id: contract_to_rtl
    from: machine_readable_contract
    to: synthesizable_rtl
    current_artifacts:
      - rtl/top/e1_chip_top.sv
      - rtl/top/e1_soc_top.sv
      - verify/rtl_gap_work_order.yaml
    missing_artifacts:
      - RV64GC CPU integration
      - coherent interconnect and UMA memory system
      - IOMMU or DMA isolation
      - GPU/2D path
      - SDIO/UART hosts for WiFi/Bluetooth
    fail_closed_gate: make stub-audit rtl-check synth
    next_tasks:
      - Add generated address-map equivalence checks.
      - Add protocol property bindings for every fabric master and target.
  - id: rtl_to_verification
    from: synthesizable_rtl
    to: verification_evidence
    current_artifacts:
      - verify/cocotb
      - verify/formal
      - verify/verilator
    missing_artifacts:
      - CPU compliance and privileged boot tests
      - UMA coherency tests
      - IOMMU fault injection
      - display underflow under contention
      - AI fallback and operator coverage report
    fail_closed_gate: make stub-audit cocotb cocotb-contract cocotb-cpu verilator formal
    next_tasks:
      - Add machine-readable coverage summaries for NPU, DMA, display, and fabric.
      - Add strict mode that requires SymbiYosys instead of fallback checks.
  - id: rtl_to_software
    from: rtl_contract
    to: firmware_linux_android
    current_artifacts:
      - sw/buildroot
      - sw/linux
      - sw/aosp-device
      - docs/sw/opensbi/README.md
      - docs/sw/u-boot/README.md
    missing_artifacts:
      - OpenSBI platform port
      - U-Boot board port
      - kernel build and DTB validation logs
      - AOSP vendorimage and VINTF logs
      - HAL implementations for e1_npu and hwcomposer
    fail_closed_gate: make software-bsp-evidence-check
    next_tasks:
      - Keep scaffold checks separate from evidence checks.
      - Add HAL source or remove service declarations until binaries exist.
  - id: software_to_benchmarks
    from: bootable_software
    to: benchmark_claims
    current_artifacts:
      - benchmarks/configs/benchmark_plan.json
      - docs/benchmarks/report-schema.yaml
    missing_artifacts:
      - non-placeholder TFLite model artifact
      - benchmark_model binary provenance
      - Android accelerator runtime log
      - power/thermal measurement boundary
    fail_closed_gate: python3 benchmarks/run_benchmarks.py --strict-missing
    next_tasks:
      - Add MLPerf Mobile external-run manifest.
      - Require fallback percentage for every AI benchmark report.
  - id: rtl_to_fpga
    from: rtl_prototype
    to: fpga_evidence
    current_artifacts:
      - board/fpga/e1_demo_fpga.yaml
      - board/fpga/constraints/e1_demo_ulx3s.lpf
    missing_artifacts:
      - selected board revision
      - assigned pins and IO standards
      - timing-clean bitstream
      - board bring-up transcript
    fail_closed_gate: make fpga-check
    next_tasks:
      - Keep bitstream release blocked until exact board and constraints are assigned.
  - id: rtl_to_pd_package_release
    from: rtl_netlist
    to: tapeout_release
    current_artifacts:
      - pd/signoff/manifest.yaml
      - docs/package/e1-demo-package.md
      - docs/manufacturing/release-manifest.yaml
    missing_artifacts:
      - final GDS/DEF/netlist/SPEF/SDF/STA/DRC/LVS/power reports
      - foundry IO padframe
      - package vendor drawing and bond diagram
      - SI/PI and PDN/current evidence
    fail_closed_gate: make pd-signoff-check product-release-check
    next_tasks:
      - Keep package and padframe claims blocked until vendor/foundry artifacts exist.
