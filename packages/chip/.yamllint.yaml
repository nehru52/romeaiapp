extends: default

ignore: |
  .venv/
  build/
  external/
  tools/
  .claude/
  pd/openlane/runs/
  pd/signoff/reports/

rules:
  document-start: disable
  line-length: disable
  truthy:
    allowed-values: ["true", "false", "on", "off"]
  comments:
    min-spaces-from-content: 1
  # Indentation stays enforced for hand-authored YAML. The chip tree also
  # carries PyYAML-generated evidence reports whose default `safe_dump` block
  # style does not match yamllint's expected sequence indentation; relax the
  # rule only for those generator-owned subtrees and dated audit files. Schema
  # and content validators still enforce semantics.
  indentation:
    ignore: |
      board/kicad/e1-phone/production/
      board/kicad/e1-phone/e1-phone-objective-completion-audit-*.yaml
      board/kicad/e1-phone/e1-phone-readiness-unblock-register-*.yaml
      board/kicad/e1-phone/kicad-route-readiness-inventory-*.yaml
      board/kicad/e1-phone/kicad-cad-traceability-matrix-*.yaml
      board/kicad/e1-phone/development-footprint-library-manifest-*.yaml
      board/kicad/e1-phone/development-pad-pin-coverage-audit-*.yaml
      board/kicad/e1-phone/real-footprint-development-board-binding-*.yaml
      board/kicad/e1-phone/real-footprint-development-step-intake-*.yaml
      board/kicad/e1-phone/routed-development-board-intake-*.yaml
      board/kicad/e1-phone/pcb/*.metadata.yaml
      board/kicad/e1-phone/supplier-pinouts/
      docs/evidence/
      mechanical/e1-phone/review/routed-board-clearance-release-intake.yaml
