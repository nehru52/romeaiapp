%YAML 1.2
---
$id: http://devicetree.org/schemas/eliza/eliza,e1-display.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Eliza e1 display (simple-framebuffer compatible)

maintainers:
  - Eliza e1 BSP <bsp@eliza.invalid>

description: |
  4 KiB MMIO display scan-out block at E1_DISPLAY_BASE per
  sw/platform/e1_platform_contract.json. The driver programs FB_BASE /
  MODE / FORMAT / ENABLE from DT and expects a sibling "simple-framebuffer"
  node for /dev/fb0.

properties:
  compatible:
    const: eliza,e1-display

  reg:
    maxItems: 1

  interrupts:
    maxItems: 1

  interrupt-names:
    items:
      - const: IRQ_VSYNC

  eliza,mode:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: Packed MODE register value (height<<16 | width).

  eliza,format:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: Pixel format four-cc as a u32 (default "XR24" = 0x34325258).

  eliza,fb-base:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: Physical base address of the framebuffer in DRAM.

required:
  - compatible
  - reg
  - interrupt-names
  - eliza,mode
  - eliza,format
  - eliza,fb-base

additionalProperties: false

examples:
  - |
    display@10030000 {
        compatible = "eliza,e1-display";
        reg = <0x10030000 0x1000>;
        interrupt-names = "IRQ_VSYNC";
        eliza,mode = <0x050002d0>;
        eliza,format = <0x34325258>;
        eliza,fb-base = <0x80000000>;
    };
