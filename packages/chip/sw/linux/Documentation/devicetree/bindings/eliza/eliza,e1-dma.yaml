%YAML 1.2
---
$id: http://devicetree.org/schemas/eliza/eliza,e1-dma.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Eliza e1 DMA

maintainers:
  - Eliza e1 BSP <bsp@eliza.invalid>

description: |
  4 KiB MMIO DMA contract block at E1_DMA_BASE per
  sw/platform/e1_platform_contract.json. The driver exports a sysfs
  contract string and live counters; it is not a dma-engine provider.

properties:
  compatible:
    const: eliza,e1-dma

  reg:
    maxItems: 1

  interrupts:
    maxItems: 1

  interrupt-names:
    items:
      - const: IRQ_DMA

required:
  - compatible
  - reg

additionalProperties: false

examples:
  - |
    dma@10010000 {
        compatible = "eliza,e1-dma";
        reg = <0x10010000 0x1000>;
        interrupt-names = "IRQ_DMA";
    };
