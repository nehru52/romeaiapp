%YAML 1.2
---
$id: http://devicetree.org/schemas/eliza/eliza,e1-npu.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Eliza e1 NPU

maintainers:
  - Eliza e1 BSP <bsp@eliza.invalid>

description: |
  4 KiB MMIO NPU block defined by sw/platform/e1_platform_contract.json
  (E1_NPU_BASE). The kernel driver creates /dev/e1-npu with read/ioctl/
  mmap and registers OP_A/OP_B/OPCODE/RESULT/PERF counters per the contract.

properties:
  compatible:
    const: eliza,e1-npu

  reg:
    maxItems: 1
    description: 4 KiB MMIO window at E1_NPU_BASE.

  interrupts:
    maxItems: 1
    description: IRQ_NPU completion line (optional - polled fallback supported).

  interrupt-names:
    items:
      - const: IRQ_NPU

required:
  - compatible
  - reg

additionalProperties: false

examples:
  - |
    npu@10020000 {
        compatible = "eliza,e1-npu";
        reg = <0x10020000 0x1000>;
        interrupt-names = "IRQ_NPU";
    };
