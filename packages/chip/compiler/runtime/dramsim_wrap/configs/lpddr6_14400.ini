# LPDDR6-14400 configuration for DRAMSim3 / Ramulator2.
# JEDEC JESD209-6 parameters; uses 24-bit channel with two 12-bit
# sub-channels per die.
[dram_structure]
protocol             = LPDDR6
bankgroups           = 8
banks_per_group      = 4
rows                 = 131072
columns              = 2048
device_width         = 12

[timing]
tCK                  = 0.139    ; ns at 14400 MT/s
AL                   = 0
CL                   = 40
CWL                  = 20
tRCD                 = 20
tRP                  = 22
tRAS                 = 44
tRFC                 = 410
tRFC2                = 300
tRFC4                = 240
tREFI                = 7800
tRRD_S               = 4
tRRD_L               = 8
tWTR_S               = 4
tWTR_L               = 12
tFAW                 = 32
tRTP                 = 8
tWR                  = 26
tCCD_S               = 8
tCCD_L               = 12

[power]
VDD                  = 0.95
VDDQ                 = 0.40
IDD0                 = 45
IDD2P                = 0.05
IDD3P                = 1.2
IDD4R                = 180
IDD4W                = 210

[system]
channel_size         = 6144
channels             = 4
bus_width            = 24
address_mapping      = rorabgbachco
queue_structure      = PER_BANK
row_buf_policy       = OPEN_PAGE
refresh_strategy     = RANK_LEVEL_STAGGERED
link_ecc             = enabled
on_die_ecc           = enabled
