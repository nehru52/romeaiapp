# DRAMSim3-runnable approximation of LPDDR5X-10667 (baseline SKU).
#
# DRAMSim3 (commit 29817593) does not implement an LPDDR5/LPDDR5X
# protocol class; the highest LPDDR protocol it ships is LPDDR4. This
# file uses the LPDDR4 protocol class with the bus geometry of the
# baseline LPDDR5X-10667 SKU (4 channels x 16-bit) and a tCK scaled from
# the LPDDR5X-10667 data rate (10667 MT/s => tCK ~= 2*1000/10667 ns,
# rounded for the controller's nCK timing math). The result is a
# behavioural-only controller-side approximation: any number it
# produces is `simulator_only` and never satisfies the phone-class
# bandwidth gate in docs/evidence/memory/uma-dram-evidence-gate.yaml.
#
# Pair with compiler/runtime/dramsim_wrap/configs/lpddr5x_10667.ini
# (the JEDEC reference) and docs/evidence/memory/dram_sim_evidence.yaml.

[dram_structure]
protocol = LPDDR4
bankgroups = 2
banks_per_group = 4
rows = 65536
columns = 1024
device_width = 16
BL = 16

[timing]
# 10667 MT/s => tCK ~= 0.1875 ns for DRAMSim3's controller nCK base.
# This keeps command spacing consistent with LPDDR5X-10667 burst timing.
tCK = 0.1875
AL = 0
CL = 36
CWL = 18
tRCD = 18
tRP = 21
tRAS = 42
tRFC = 380
tRFC2 = 280
tRFC4 = 220
tREFI = 7800
tRPRE = 1
tWPRE = 1
tRRD_S = 4
tRRD_L = 8
tWTR_S = 4
tWTR_L = 12
tFAW = 32
tWR = 24
tWR2 = 26
tRTP = 8
tCCD_S = 8
tCCD_L = 12
tCKE = 6
tCKESR = 7
tXS = 432
tXP = 6
tRTRS = 1
tPPD = 2

[power]
VDD = 1.05
IDD0 = 50
IPP0 = 4.0
IDD2P = 0.07
IDD2N = 30
IDD3P = 1.5
IDD3N = 47
IDD4W = 230
IDD4R = 200
IDD5AB = 280
IDD6x = 30

[system]
channel_size = 4096
channels = 4
bus_width = 16
address_mapping = rochrababgco
queue_structure = PER_BANK
refresh_policy = RANK_LEVEL_STAGGERED
row_buf_policy = OPEN_PAGE
cmd_queue_size = 8
trans_queue_size = 32

[other]
epoch_period = 1000000
output_level = 1
