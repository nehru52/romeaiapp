# DRAMSim3-runnable approximation of LPDDR6-14400 (AI SKU).
#
# DRAMSim3 (commit 29817593) does not implement an LPDDR6 protocol
# class; the highest LPDDR protocol it ships is LPDDR4. This file
# uses the LPDDR4 protocol class with the AI SKU channel count and a
# DRAMSim3-legal 32-bit bus slot standing in for the documented LPDDR6
# channel geometry, plus a tCK scaled from the LPDDR6-14400 data rate
# (14400 MT/s => tCK ~= 2*1000/14400 ns rounded). Result is a
# behavioural-only controller-side approximation: every number it
# produces is `simulator_only` and never satisfies the phone-class
# bandwidth gate in docs/evidence/memory/uma-dram-evidence-gate.yaml.
#
# LPDDR6 sub-channel splitting, link ECC, and on-die ECC are not
# modeled. Pair with
# compiler/runtime/dramsim_wrap/configs/lpddr6_14400.ini (JEDEC
# reference) and docs/evidence/memory/dram_sim_evidence.yaml.

[dram_structure]
protocol = LPDDR4
bankgroups = 4
banks_per_group = 4
# Reduced to satisfy DRAMSim3 capacity math at channel_size = 4096 MiB.
# JEDEC LPDDR6 row depth is documented in the reference lpddr6_14400.ini.
rows = 32768
columns = 1024
# DRAMSim3 only supports power-of-two device_width; LPDDR6 uses 12-bit
# sub-channels but DRAMSim3's LPDDR4 lane stays at 16 bits. We keep 16
# here for legality and document the delta in dram_sim_evidence.yaml.
device_width = 16
BL = 16

[timing]
# 14400 MT/s => tCK ~= 0.139 ns for DRAMSim3's controller nCK base.
# This keeps command spacing consistent with LPDDR6-14400 burst timing.
tCK = 0.139
AL = 0
CL = 40
CWL = 20
tRCD = 20
tRP = 22
tRAS = 44
tRFC = 410
tRFC2 = 300
tRFC4 = 240
tREFI = 7800
tRPRE = 1
tWPRE = 1
tRRD_S = 4
tRRD_L = 8
tWTR_S = 4
tWTR_L = 12
tFAW = 32
tWR = 26
tWR2 = 28
tRTP = 8
tCCD_S = 8
tCCD_L = 12
tCKE = 6
tCKESR = 7
tXS = 432
tXP = 6
tRTRS = 1
tPPD = 2

[power]
VDD = 0.95
IDD0 = 45
IPP0 = 4.0
IDD2P = 0.05
IDD2N = 28
IDD3P = 1.2
IDD3N = 45
IDD4W = 210
IDD4R = 180
IDD5AB = 260
IDD6x = 28

[system]
# Channel size must satisfy DRAMSim3's bank-geometry capacity equation.
# With this LPDDR4-compatible approximation (4*4 banks, 32768 rows,
# 1024 columns, 16-bit device width), DRAMSim3 accepts 4096 MiB per
# channel; total modeled system capacity is 16 GiB. The JEDEC 24 GiB AI SKU
# capacity is documented in lpddr6_14400.ini; DRAMSim3 cannot model the
# extra density without changing protocol geometry, so this config
# under-reports capacity. Bandwidth/latency numbers remain meaningful
# because they depend on tCK, bus_width, and channel count, not on
# absolute capacity.
channel_size = 4096
channels = 4
# DRAMSim3 LPDDR4 expects 16/32/64 bus width; LPDDR6 24-bit channel is
# documented in the JEDEC ini; we widen to 32 here so DRAMSim3 can
# elaborate the bus while keeping bandwidth on the per-channel data rate.
bus_width = 32
address_mapping = rochrababgco
queue_structure = PER_BANK
refresh_policy = RANK_LEVEL_STAGGERED
row_buf_policy = OPEN_PAGE
cmd_queue_size = 8
trans_queue_size = 32

[other]
epoch_period = 1000000
output_level = 1
