# LPDDR5X-10667 configuration for DRAMSim3 / Ramulator2.
# JEDEC JESD209-5C parameters; per-die 12 nm class.
[dram_structure]
protocol             = LPDDR5X
bankgroups           = 4
banks_per_group      = 4
rows                 = 65536
columns              = 1024
device_width         = 16

[timing]
tCK                  = 0.187    ; ns at 10667 MT/s
AL                   = 0
CL                   = 36
CWL                  = 18
tRCD                 = 18
tRP                  = 21
tRAS                 = 42
tRFC                 = 380
tRFC2                = 280
tRFC4                = 220
tREFI                = 7800
tRRD_S               = 4
tRRD_L               = 8
tWTR_S               = 4
tWTR_L               = 12
tFAW                 = 32
tRTP                 = 8
tWR                  = 24
tCCD_S               = 8
tCCD_L               = 12

[power]
VDD                  = 1.05
VDDQ                 = 0.50
IDD0                 = 50
IDD2P                = 0.07
IDD3P                = 1.5
IDD4R                = 200
IDD4W                = 230

[system]
channel_size         = 4096
channels             = 4
bus_width            = 16
address_mapping      = rorabgbachco
queue_structure      = PER_BANK
row_buf_policy       = OPEN_PAGE
refresh_strategy     = RANK_LEVEL_STAGGERED
