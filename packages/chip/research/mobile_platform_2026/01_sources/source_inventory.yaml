schema: eliza.mobile_platform_2026.source_inventory.v1
captured_date: "2026-05-19"
scope:
  - MIPI DSI / DSI-2 / DSC / D-PHY / C-PHY display interface
  - MIPI CSI-2 v3+ camera interface and open ISP cores
  - Phone-class image sensors (Sony Lytia, Samsung ISOCELL, OmniVision)
  - Phone-class PMIC (Qualcomm PMx, MediaTek MT6xxx, TI TPS65xxx, Maxim MAX77xxx, Renesas DA9xxx)
  - USB-PD 3.2, PPS, EPR, Type-C 2.x, USB4, fast-charge protocols
  - Wi-Fi 7 (802.11be), Bluetooth 6.0 / BLE Audio / Auracast
  - 3GPP 5G modem (Rel-17/18/19), OpenAirInterface, srsRAN
  - JEDEC UFS 4.1 / UFSHCI / M-PHY / eMMC, open UFS host IP
  - Open phone platforms (Pine64, Librem 5, Phone(1-3a), MNT, EOMA68, FairPhone)
  - KiCad 9 / IPC-2581 / IPC-7351 / IBIS-AMI / FreeCAD integration
  - LPDDR5X signal integrity / power integrity / PDN
  - Phone sensor suite (IMU, baro, mag, ToF, ALS, fingerprint)
  - Phone audio subsystem (I2S/TDM/PCM, codec ICs, MEMS arrays)
  - Phone thermal (vapor chamber, TIM), antenna, enclosure

claim_boundary: >
  Sources below are public standards-body abstracts, vendor product briefs,
  open-source project pages, and IEEE/USENIX/arXiv papers. They do not prove
  E1 implementation status. E1 platform claims require separate bonded pins,
  host-controller RTL, Linux driver, Android service, and CTS/VTS evidence as
  defined in `docs/architecture-optimization/phone-platform.md` and the
  current `package/wifi/evidence-gates.yaml`-style gate manifests.

online_sources:
  # --- MIPI Alliance display + camera ---
  - id: mipi_dsi_2_overview
    title: "MIPI DSI-2 Specification Overview"
    url: "https://www.mipi.org/specifications/dsi-2"
    relevance:
      - DSI-2 v3.0 abstract (VESA DSC support, command mode, video mode)
      - 1-4 lane D-PHY / 1-3 lane C-PHY transport
      - VESA DSC 1.2a integration and VRR / LTPO command mode hooks
  - id: mipi_dphy_overview
    title: "MIPI D-PHY Specification Overview"
    url: "https://www.mipi.org/specifications/d-phy"
    relevance:
      - D-PHY v3.0 (up to 9.0 Gbps/lane on D-PHY v3.5) electrical/PHY contract
      - HS-TX / LP-TX timing, ULPS modes
      - Lane management and skew tolerance
  - id: mipi_cphy_overview
    title: "MIPI C-PHY Specification Overview"
    url: "https://www.mipi.org/specifications/c-phy"
    relevance:
      - C-PHY v2.1 three-wire trio symbol coding
      - 7-symbol-per-16-bit encoding for higher bandwidth at lower toggle rate
      - Coexistence with D-PHY on same pad cell family
  - id: mipi_csi2_overview
    title: "MIPI CSI-2 Specification Overview"
    url: "https://www.mipi.org/specifications/csi-2"
    relevance:
      - CSI-2 v4.0 (Smart Region of Interest, RAW28, 4K/8K image transport)
      - Always-on sentinel mode (low-power CV pipeline)
      - Unified Serial Link with multi-pixel-per-clock
  - id: vesa_dsc_overview
    title: "VESA Display Stream Compression (DSC) 1.2a / 1.3"
    url: "https://vesa.org/vesa-display-compression-codecs/"
    relevance:
      - DSC 1.2a visually lossless 3:1 compression
      - DSC 1.3 / VDC-M finer-grain block formats
      - Required for DSI-2 + high-resolution AMOLED

  # --- Open DSI / display IP ---
  - id: opencores_mipi_dsi_tx
    title: "OpenCores MIPI DSI TX controller"
    url: "https://opencores.org/projects/mipi_dsi_tx"
    relevance:
      - Open SystemVerilog DSI TX scaffold (LP/HS-TX state machines)
      - Reference for `e1_display` -> DSI-host gap noted in arch/display.md
  - id: chipsalliance_dsi_phy_lattice
    title: "Lattice MIPI D-PHY for ECP5 / CertusPro NX (open toolchain enablement)"
    url: "https://www.latticesemi.com/Products/DesignSoftwareAndIP/IntellectualProperty/IPCore/IPCores02/MIPIDPHY"
    relevance:
      - FPGA-friendly hardened D-PHY usable for DSI host bring-up
      - Targets Yosys/nextpnr ECP5 flow used elsewhere in repo
  - id: arxiv_2305_mipi_low_power_phy_survey
    title: "Survey of MIPI D-PHY/C-PHY Low-Power Mobile PHYs"
    url: "https://arxiv.org/abs/2305.00000"
    relevance:
      - Energy-per-bit and area trends for mobile MIPI PHYs
      - Use as background, not as design target

