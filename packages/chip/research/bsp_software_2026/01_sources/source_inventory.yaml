schema: eliza.bsp_software_2026.source_inventory.v1
captured_date: "2026-05-19"
scope:
  - RISC-V Linux kernel (RVV 1.0, KVM-RV, Sscofpmf, eBPF, paging)
  - Android on RISC-V (RISE, riscv-android-sig, AOSP main, Cuttlefish, CTS/VTS)
  - OpenSBI 1.x and SBI v3.0 spec / extensions
  - U-Boot RV64 + EFI + AVB
  - Buildroot / Yocto meta-riscv / Debian-Ports RV64 / Fedora RV
  - AOSP device/vendor tree, Treble, VINTF, AIDL HALs, SELinux
  - VTS / CTS on Cuttlefish RV
  - Cuttlefish virtual device + crosvm
  - Mainline drivers (DRM/KMS, V4L2, USB, SDHCI, Wi-Fi, BT)
  - Power HAL 4.x AIDL, Thermal HAL 2.x, EAS / schedutil
  - KVM-RV / H-extension / Xen / Jailhouse on RV
  - AI HAL: NNAPI deprecation, AICore (Android 16), ExecuTorch, LiteRT
claim_boundary: >
  Sources are upstream documentation, release notes, mailing-list archives,
  RFCs, project repos, and SIG status pages captured on 2026-05-19. They
  describe upstream state at the capture date and are not E1 implementation
  evidence. Local E1 boot, CTS, and HAL claims require captures driven by
  `make aosp-bsp-check`, `docs/sw/opensbi/capture-opensbi-evidence.sh`,
  `docs/sw/u-boot/capture-u-boot-evidence.sh`,
  `scripts/check_aosp_simulator_completion_gate.py`, and the gate-listed
  Android evidence logs.

online_sources:
  # --- RISC-V Linux kernel core ---
  - id: kernelorg_riscv_tree
    title: "Linux kernel arch/riscv subsystem (palmer/linux-riscv.git)"
    url: "https://git.kernel.org/pub/scm/linux/kernel/git/riscv/linux.git"
    captured_points:
      - palmer-dabbelt maintained RV tree; for-next and fixes branches feed
        mainline release windows
      - mainline RV merges through Linus during each merge window
      - drives Sscofpmf, KVM RV, vector, hypervisor extension work
  - id: kernelorg_lwn_rv_2025
    title: "LWN: RISC-V status, vector, KVM, perf reporting"
    url: "https://lwn.net/Kernel/Index/#RISC-V"
    captured_points:
      - RVV 1.0 user-mode landed Linux 6.5; in-kernel vector contexts since 6.10
      - KVM RV with H-extension merged 5.18, SBI v2.0 vCPU services 6.4
      - Sscofpmf hwperf merged 6.7; perf_events RV expanded in 6.10
  - id: riscv_isa_manual_vol2
    title: "RISC-V Privileged Architecture Spec v20240411 (and later)"
    url: "https://github.com/riscv/riscv-isa-manual/releases"
    captured_points:
      - Sv39, Sv48, Sv57 paging, ASID, naming for hypervisor extension H
      - Sstc (supervisor timer), Sscofpmf (overflow-aware perfmon), Smaia/Ssaia
  - id: riscv_vector_spec_1p0
    title: "RISC-V Vector Extension v1.0 ratified"
    url: "https://github.com/riscv/riscv-v-spec"
    captured_points:
      - V 1.0 ratified Nov 2021; vlen/elen parameterization
      - subsets Zve32x/Zve64x/Zve64d defined; Linux requires V or Zve64d
  - id: riscv_profiles_rva23
    title: "RISC-V Application Profiles RVA22 / RVA23"
    url: "https://github.com/riscv/riscv-profiles"
    captured_points:
      - RVA22 baseline profile (ratified) names mandatory extensions for
        Linux-capable application processors
      - RVA23 profile adds V, Zihintpause, Sscofpmf, Svadu and is the floor
        the Android RV ABI targets
  - id: riscv_hypervisor_extension
    title: "RISC-V Hypervisor (H) Extension v1.0 ratified"
    url: "https://github.com/riscv/riscv-isa-manual"
    captured_points:
      - HS-mode, VS/VU mode, two-stage translation, hgatp Sv39x4/Sv48x4
      - mandatory for KVM-RV; required for Android virtualization HAL
  - id: kernel_kvm_riscv
    title: "KVM RISC-V (arch/riscv/kvm)"
    url: "https://git.kernel.org/pub/scm/linux/kernel/git/torvalds/linux.git/tree/arch/riscv/kvm"
    captured_points:
      - in-kernel VS-mode local interrupt controller
      - SBI v2.0 SRST, TIME, IPI, RFENCE, PMU, NACL services forwarded to guest
      - guest vector and FP state save/restore in 6.7+
  - id: kernel_documentation_riscv
    title: "Documentation/arch/riscv in mainline"
    url: "https://www.kernel.org/doc/html/latest/arch/riscv/index.html"
    captured_points:
      - boot-image-header spec, hwprobe ABI, vector ABI
      - patch acceptance, DT bindings location, RISC-V ELF psABI references
  - id: riscv_hwprobe_uapi
    title: "uapi/asm/hwprobe.h interface"
    url: "https://www.kernel.org/doc/html/latest/arch/riscv/hwprobe.html"
    captured_points:
      - userland feature probe (V, Zba, Zicboz, ...) merged 6.4
      - extended in 6.8 with Zicboz cache zero block size
  - id: ebpf_riscv64_jit
    title: "arch/riscv/net BPF JIT"
    url: "https://git.kernel.org/pub/scm/linux/kernel/git/bpf/bpf.git/tree/arch/riscv/net"
    captured_points:
      - BPF JIT for rv64 in-tree since 5.6; tail call, atomics, kfuncs
      - bpftrace, libbpf-bootstrap support RV64

  # --- Android on RISC-V ---
  - id: rise_project
    title: "RISE - RISC-V Software Ecosystem Project (Linux Foundation)"
    url: "https://riseproject.dev/"
    captured_points:
      - founded Aug 2023; member-funded upstream work on toolchain, kernel,
        Android, distros, LLVM, glibc, GCC, V8, OpenJDK
      - 2025 RISE plan names AOSP main RV branch readiness as P0
  - id: riscv_android_sig
    title: "riscv-android-sig (RISC-V International SIG)"
    url: "https://github.com/riscv-non-isa/riscv-android-sig"
    captured_points:
      - working group ABI, AOSP merging cadence, kernel/userland gaps list
      - tracks ART AOT, JIT, MTerp/Nterp replacement, NDK toolchain
  - id: aosp_main_branch
    title: "AOSP main branch / android-main (RV64 enablement)"
    url: "https://android.googlesource.com/platform/manifest/+/refs/heads/main"
    captured_points:
      - RV64 device target `aosp_cf_riscv64_phone` reintroduced 2024 by Google
      - earlier RV port pulled from android14-* branches in Oct 2023; main
        path regrew via riscv-android-sig + RISE patches
      - lunch combos for Cuttlefish RV64 land in `device/google/cuttlefish`
  - id: android_riscv64_art
    title: "ART RISC-V 64 backend (art/compiler/optimizing/code_generator_riscv64.cc)"
    url: "https://cs.android.com/android/platform/superproject/main/+/main:art/compiler/optimizing/code_generator_riscv64.cc"
    captured_points:
      - optimizing-compiler RV64 backend merged into AOSP main
      - JIT and AOT (dex2oat) emit RV64 with RVV 1.0 intrinsics for SIMD
        intrinsics where Zve64d present
      - Nterp interpreter RV64 path in art/runtime/interpreter
  - id: bionic_riscv64
    title: "Bionic libc RV64 port (bionic/libc/arch-riscv64)"
    url: "https://cs.android.com/android/platform/superproject/main/+/main:bionic/libc/arch-riscv64/"
    captured_points:
      - syscall stubs, setjmp, vfork, memcpy/memset rv64gcv variants
      - linker rv64 supports hwcap2 V advertising via getauxval
  - id: ndk_riscv64
    title: "Android NDK r28 RV64 toolchain"
    url: "https://developer.android.com/ndk/downloads"
    captured_points:
      - NDK r28 (Q1 2026) ships rv64gc + rv64gcv targets behind a flag
      - clang/llvm 19 toolchain; min API level 36 (Android 16) for RV64
  - id: aosp_cuttlefish_riscv
    title: "Cuttlefish virtual device RV64 (device/google/cuttlefish)"
    url: "https://cs.android.com/android/platform/superproject/main/+/main:device/google/cuttlefish/"
    captured_points:
      - "`aosp_cf_riscv64_phone` lunch combo; crosvm RV64 backing"
      - vsoc kernel built with KVM-RV when host has H extension
      - cuttlefish-common requires nested KVM or hardware H-mode on host
  - id: crosvm_riscv
    title: "crosvm virtual machine monitor (RV64 support)"
    url: "https://github.com/google/crosvm"
    captured_points:
      - crosvm gained RV64 VS-mode support via aia / imsic backends
      - virtio-mmio, virtio-pci, virtio-gpu, virtio-snd flows compatible with RV
  - id: cts_main
    title: "Android CTS / VTS / GTS overview"
    url: "https://source.android.com/docs/compatibility/cts"
    captured_points:
      - CTS = Compatibility Test Suite; VTS = Vendor Test Suite (HAL contract)
      - VTS on virtual devices runs against Cuttlefish; CTS-on-CF for early HAL
        validation; the riscv-android-sig CTS gap matrix tracks RV64 coverage
  - id: vts_aidl_versioning
    title: "VINTF compatibility matrix + AIDL HAL versioning"
    url: "https://source.android.com/docs/core/architecture/vintf"
    captured_points:
      - manifests + compatibility matrix gate device boot
      - VINTF check enforced by `checkvintf` in `make vendorimage`
      - AIDL HAL versions frozen per Android release; @VintfStability required

  # --- OpenSBI / SBI / boot chain ---
  - id: opensbi_repo
    title: "OpenSBI (RISC-V International)"
    url: "https://github.com/riscv-software-src/opensbi"
    captured_points:
      - active 1.6 release line (2025); FW_JUMP, FW_DYNAMIC, FW_PAYLOAD modes
      - generic platform supports DT-based boards including qemu-virt
      - SBI v2.0 services implemented; SBI v3.0 extensions added incrementally
  - id: sbi_spec_v3
    title: "RISC-V Supervisor Binary Interface (SBI) Specification v3.0 draft"
    url: "https://github.com/riscv-non-isa/riscv-sbi-doc"
    captured_points:
      - v2.0 adds DBCN debug console, SUSP suspend, NACL nested accel
      - v3.0 draft adds STA (steal-time accounting), SSE software events,
        FWFT firmware features, MPXY message proxy
  - id: opensbi_dbcn
    title: "OpenSBI Debug Console (DBCN) extension implementation"
    url: "https://github.com/riscv-software-src/opensbi/tree/master/lib/sbi"
    captured_points:
      - SBI_EXT_DBCN with sbi_debug_console_write/read/write_byte
      - Linux earlycon=sbi consumes DBCN before any UART driver
  - id: opensbi_nacl
    title: "OpenSBI Nested Acceleration (NACL) extension"
    url: "https://github.com/riscv-software-src/opensbi/blob/master/lib/sbi/sbi_nacl.c"
    captured_points:
      - NACL shared-memory area for KVM-RV nested guest trap virtualization
      - Linux KVM uses NACL to accelerate VS-mode CSR access from HS
  - id: uboot_riscv64
    title: "U-Boot RV64 support (arch/riscv)"
    url: "https://source.denx.de/u-boot/u-boot/-/tree/master/arch/riscv"
    captured_points:
      - SPL + proper U-Boot for HiFive Unmatched, VisionFive 2, qemu-virt
      - EFI_LOADER subsystem boots distros via /EFI/BOOT/BOOTRISCV64.EFI
      - OpenSBI handed off via PAYLOAD or DYNAMIC info struct
  - id: uboot_mailing_list
    title: "u-boot mailing list archive"
    url: "https://lists.denx.de/pipermail/u-boot/"
    captured_points:
      - RV64 patch threads for AVB, distroboot, fitimage signing
      - patchwork at https://patchwork.ozlabs.org/project/uboot/list/
  - id: avb_aosp
    title: "AOSP Android Verified Boot 2.0 (libavb)"
    url: "https://android.googlesource.com/platform/external/avb/+/refs/heads/main/"
    captured_points:
      - vbmeta structure, chain partitions, rollback indices
      - reference impl in libavb; U-Boot has avb_verify command
  - id: aosp_init_boot_img
    title: "Android init_boot.img + boot.img + vendor_boot.img layout"
    url: "https://source.android.com/docs/core/architecture/bootloader/boot-image-header"
    captured_points:
      - Android 13+ separates init_boot (generic ramdisk) from boot (kernel)
      - vendor_boot.img holds vendor ramdisk + DTB overlays

  # --- Buildroot / Yocto / distros ---
  - id: buildroot_riscv64
    title: "Buildroot qemu_riscv64_virt_defconfig"
    url: "https://git.buildroot.net/buildroot/tree/configs/qemu_riscv64_virt_defconfig"
    captured_points:
      - rv64gc toolchain, OpenSBI + U-Boot + kernel + ext4 rootfs
      - reference for Eliza E1 minimal Linux smoke
  - id: yocto_meta_riscv
    title: "Yocto meta-riscv layer"
    url: "https://github.com/riscv/meta-riscv"
    captured_points:
      - MACHINE definitions for qemuriscv64, freedom-u540, visionfive2,
        starfive
      - poky-tiny + meta-riscv build path for board package images
  - id: debian_ports_riscv64
    title: "Debian Ports riscv64 (sid-ports)"
    url: "https://www.ports.debian.org/archive#riscv64"
    captured_points:
      - riscv64 ABI promoted to official architecture mid-2024 (bookworm+1)
      - apt + snapshot.debian.org coverage for reproducible userland
  - id: fedora_riscv
    title: "Fedora RISC-V (Koji + GitLab Forge)"
    url: "https://fedoraproject.org/wiki/Architectures/RISC-V"
    captured_points:
      - Fedora 41 riscv64 builds; rpm-ostree + Silverblue available
      - useful for libvirt + virt-manager testbench

  # --- Mainline drivers ---
  - id: drm_simplefb
    title: "drm/simpledrm - simple-framebuffer KMS driver"
    url: "https://www.kernel.org/doc/html/latest/gpu/drm-kms.html"
    captured_points:
      - simpledrm consumes simple-framebuffer DT node
      - first-stage display for Eliza E1 before any IP-block GPU
  - id: drm_panfrost
    title: "drm/panfrost - open Mali Midgard/Bifrost/Valhall driver"
    url: "https://docs.kernel.org/gpu/panfrost.html"
    captured_points:
      - upstream open Mali Midgard/Bifrost driver; Valhall WIP
      - userspace Mesa Panfrost gallium driver
  - id: drm_etnaviv
    title: "drm/etnaviv - open Vivante GC driver"
    url: "https://docs.kernel.org/gpu/etnaviv.html"
    captured_points:
      - GC2000/GC7000 reverse-engineered open driver in mainline
      - StarFive VisionFive 2 (Imagination BXE-4-32 -> not etnaviv) is not
        covered; VisionFive 2 GPU uses Imagination PowerVR (closed)
  - id: drm_freedreno
    title: "drm/msm + Mesa Freedreno - open Adreno"
    url: "https://docs.kernel.org/gpu/msm/index.html"
    captured_points:
      - Qualcomm Adreno (a3xx-a7xx) reverse-engineered open driver
      - bound to Qualcomm SoCs; not directly applicable to RV unless
        integrating an Adreno IP
  - id: v4l2_subsystem
    title: "Linux V4L2 / media subsystem"
    url: "https://www.kernel.org/doc/html/latest/userspace-api/media/v4l/v4l2.html"
    captured_points:
      - mc + v4l2 + mipi-csi2-rx core for camera bring-up
      - sensor drivers register via subdev pads + media controller graph
  - id: usb_dwc3
    title: "drivers/usb/dwc3 - Synopsys DesignWare USB3 controller"
    url: "https://docs.kernel.org/usb/dwc3.html"
    captured_points:
      - widely deployed USB3 host/device IP; used by VisionFive 2 etc.
      - OTG, role-switch via extcon supported
  - id: mmc_dwcmshc
    title: "drivers/mmc/host/sdhci-of-dwcmshc - Synopsys MSHC"
    url: "https://docs.kernel.org/mmc/index.html"
    captured_points:
      - SDHCI driver for DesignWare Mobile Storage Host Controller (eMMC/SD)
      - default eMMC controller for many RV SoCs (StarFive, T-Head)
  - id: mac80211_subsystem
    title: "Linux mac80211 / nl80211 / cfg80211 stack"
    url: "https://docs.kernel.org/networking/mac80211.html"
    captured_points:
      - softmac SoftMAC framework, AP/IBSS/STA/Mesh/mon support
      - paired with hostapd + wpa_supplicant for AP / STA management
  - id: bluez_stack
    title: "BlueZ Linux Bluetooth stack"
    url: "https://www.bluez.org/"
    captured_points:
      - 5.x mainline; supports BT 5.x, BLE, mesh
      - Android uses Gabeldorsche (system/bt main) but BlueZ is reference Linux
  - id: android_gabeldorsche
    title: "Android Gabeldorsche Bluetooth stack (Bt main)"
    url: "https://source.android.com/docs/core/connect/bluetooth"
    captured_points:
      - AOSP-native BT stack replacing legacy Fluoride
      - HCI HAL is AIDL @VintfStability since Android 13
  - id: android_wifi_hal
    title: "Android Wi-Fi HAL (AIDL)"
    url: "https://source.android.com/docs/core/connect/wifi-overview"
    captured_points:
      - AIDL HALs for wifi, wifi-supplicant, wifi-hostapd in Android 13+
      - vendor HAL must register with hwservicemanager + match VINTF matrix

  # --- Power / Thermal ---
  - id: android_power_hal
    title: "Android Power HAL (AIDL v4.x)"
    url: "https://source.android.com/docs/core/perf/power"
    captured_points:
      - AIDL Power HAL replaces HIDL 1.3 from Android 13
      - PowerHint / Boost / Mode primitives, gameMode, fixedPerformance
      - PowerHintSession for ADPF (Android Dynamic Performance Framework)
  - id: android_thermal_hal
    title: "Android Thermal HAL 2.x"
    url: "https://source.android.com/docs/core/power/thermal-mitigation"
    captured_points:
      - Thermal HAL 2.0+ AIDL; reports throttling status per cooling device
      - integrates with android.os.PowerManager.ThermalStatus
  - id: linux_eas
    title: "Linux EAS (Energy Aware Scheduling) + schedutil"
    url: "https://docs.kernel.org/scheduler/sched-energy.html"
    captured_points:
      - EM (Energy Model) + EAS + schedutil cpufreq governor
      - required for big.LITTLE-style heterogeneous SoCs
      - per-task util_est + sched_pelt heuristics
  - id: kernel_cpufreq_riscv
    title: "drivers/cpufreq + RV64 cpufreq drivers"
    url: "https://docs.kernel.org/cpu-freq/index.html"
    captured_points:
      - cpufreq-dt generic driver consumes operating-points-v2 DT
      - Sifive cpufreq driver in tree; T-Head TH1520 cpufreq merged 6.10

  # --- Hypervisor / virt ---
  - id: kernel_kvm_riscv_doc
    title: "Documentation/virt/kvm/riscv"
    url: "https://docs.kernel.org/virt/kvm/api.html"
    captured_points:
      - KVM-RV API: KVM_GET/SET_ONE_REG for general/fp/vector/CSR/SBI/AIA
      - exit reasons SBI, MMIO, CSR-emulation
  - id: xen_riscv
    title: "Xen Project RISC-V port"
    url: "https://wiki.xenproject.org/wiki/RISC-V"
    captured_points:
      - Xen RV port early stage; minimal dom0 boot demonstrated 2024
      - uses H extension; targets RVA22+ profiles
  - id: jailhouse_riscv
    title: "Jailhouse partitioning hypervisor on RISC-V (research)"
    url: "https://github.com/siemens/jailhouse"
    captured_points:
      - RV64 port is research-grade; not mainline
      - alternative for static partitioning on real-time RV SoCs

  # --- AI / NPU HAL ---
  - id: nnapi_deprecation
    title: "Android NNAPI deprecation (Android 15)"
    url: "https://developer.android.com/ndk/guides/neuralnetworks/migration-guide"
    captured_points:
      - NNAPI marked legacy / no further enhancements after Android 15
      - migration guide steers vendors to LiteRT / ExecuTorch + AICore
  - id: aicore_android16
    title: "Android AICore / system-server AI runtime (Android 16)"
    url: "https://developer.android.com/about/versions/16/features"
    captured_points:
      - AICore system service hosts on-device foundation models (e.g. Gemini Nano)
      - vendor accelerator integration via AIDL HAL; SoC-specific delegate
        plugs into LiteRT runner in AICore process
  - id: executorch_runtime
    title: "PyTorch ExecuTorch on-device runtime"
    url: "https://pytorch.org/executorch/stable/index.html"
    captured_points:
      - PT2 export -> .pte file; modular runtime + delegate API
      - vendor delegate (`XNNPACK`, `Qualcomm`, `MediaTek`, `Vulkan`,
        custom NPU) registered at runtime
  - id: litert_tflite
    title: "LiteRT (formerly TF Lite) + NNAPI delegate deprecation"
    url: "https://ai.google.dev/edge/litert"
    captured_points:
      - LiteRT rebrand 2024-09; same .tflite format
      - "delegates: GPU, XNNPACK, Hexagon, NNAPI (legacy), AICore (Android 16), custom delegate API for vendor NPU"
  - id: mediapipe_tasks
    title: "MediaPipe Tasks (image/audio/text/genai)"
    url: "https://developers.google.com/mediapipe/solutions"
    captured_points:
      - high-level inference API built on LiteRT
      - LLM Inference API targets device GPU/NPU; consumes LiteRT delegates
  - id: aosp_neuralnetworks_hal
    title: "Android NeuralNetworks HAL (legacy, hardware/interfaces/neuralnetworks)"
    url: "https://cs.android.com/android/platform/superproject/main/+/main:hardware/interfaces/neuralnetworks/"
    captured_points:
      - HAL frozen at AIDL v4 + HIDL 1.3; no new ops in Android 15/16
      - still usable for non-AICore devices; required by current CTS-NN
  - id: dma_heap_aidl
    title: "AOSP DMA-BUF heap + memtrack HAL (AIDL)"
    url: "https://source.android.com/docs/core/graphics/dmabuf-heaps"
    captured_points:
      - system / cma heaps; vendor heap for NPU coherent buffers
      - required path for sharing tensors between userland, GPU, NPU
