    model_url: null
    dataset_url: null
    license_status: paper_assets_review_required
    code_status: paper_assets_to_review
    model_status: no_model
    e1_fit: >
      Relevant benchmark direction for multi-file hardware-agent tasks, but
      external benchmark success is not proof that agents can patch E1 safely.
    integration_action: >
      Use as methodology context for future quarantined E1 tasks that require
      file localization, deterministic tests, and review before source changes.
    evidence_gate: >
      Hardware-agent benchmark use requires exact task hashes, non-overlap
      review, generated patch quarantine, local lint/sim/formal logs, and human
      review before any generated patch is promoted.
    risk:
      - Benchmark tasks may not reflect E1 SoC integration, PD, firmware, and
        verification contracts.
      - Public tasks can be contaminated by future model training.
  - id: hwe-bench
    name: HWE-Bench
    kind: repository_hardware_bug_repair_agent_benchmark
    stage:
      - agentic_orchestration
      - rtl_debug
      - verification
      - repository_localization
      - benchmark
    priority: P1
    source_url: https://arxiv.org/abs/2604.14709
    code_url: null
    model_url: null
    dataset_url: null
    license_status: paper_assets_review_required
    code_status: paper_assets_to_review
    model_status: no_model
    e1_fit: >
      Current repository-scale hardware bug-repair benchmark direction that
      emphasizes RTL, configuration, and verification coordination across real
      open-source projects; useful for shaping quarantined E1 repair tasks.
    integration_action: >
      Track as benchmark methodology only until assets, licenses, task hashes,
      and non-overlap checks are reviewed. Do not import tasks or promote
      generated patches into E1 without local deterministic gates.
    evidence_gate: >
      Any HWE-Bench-style evaluation requires exact task revisions, container
      hashes, benchmark non-overlap review, generated patch quarantine,
      simulator/regression logs, source diffs, rollback path, and human review.
    risk:
      - Repository-scale benchmark success can still miss E1-specific platform,
        physical-design, firmware, and release-evidence contracts.
      - Real bug-fix tasks may overlap with public training data or encourage
        unsafe broad edits without hierarchy-aware review.
