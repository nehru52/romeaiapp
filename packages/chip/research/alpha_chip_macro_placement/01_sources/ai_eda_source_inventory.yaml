    integration_action: >
      Track as a code candidate only. Do not install, start, or connect it to
      E1 until version, license, sandbox, authentication, command allowlist,
      log capture, and artifact quarantine are approved.
    evidence_gate: >
      Any OpenROAD MCP use requires pinned server and OpenROAD revisions,
      disabled unsafe commands or explicit allowlist, archived MCP/tool call
      logs, input/output hashes, generated artifact quarantine, deterministic
      OpenLane/OpenROAD replay, and human review.
    risk:
      - Interactive MCP access can let an agent mutate OpenROAD state or run
        Tcl outside reviewed scripts.
      - Session history without artifact hashing is insufficient for release
        evidence or rollback.
