    license_status: paper_assets_review_required
    code_status: no_public_code_selected
    model_status: external_llm_method
    e1_fit: >
      Relevant SOTA method for using coding agents to improve OpenROAD itself,
      but E1 cannot treat upstream tool patches or QoR deltas as local chip
      evidence without reproducible before/after runs.
    integration_action: >
      Keep as method reference for future OpenROAD/OpenLane tool-improvement
      experiments after local branches, command logs, patch hashes, and
      before/after E1 replay gates exist.
    evidence_gate: >
      Any coding-agent EDA-tool change needs pinned OpenROAD/OpenLane revision,
      generated patch quarantine, build/test logs, E1 before/after routed
      metrics, STA/power/DRC/antenna/signoff replay, and reviewer disposition.
    risk:
      - Tool-level QoR improvements on benchmark designs may regress E1
        correctness, signoff, determinism, or reproducibility.
      - Autonomous tool patches can change optimizer behavior outside the
        intended E1 design scope.
