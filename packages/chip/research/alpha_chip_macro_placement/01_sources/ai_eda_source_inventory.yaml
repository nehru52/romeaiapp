    priority: P1
    source_url: https://arxiv.org/abs/2308.00708
    code_url: https://github.com/shailja-thakur/VGen
    model_url: https://huggingface.co/shailja/fine-tuned-codegen-2B-Verilog
    dataset_url: https://huggingface.co/datasets/shailja/Verilog_GitHub
    license_status: bigcode-openrail-m_reported_review_required
    code_status: repository_to_review
    model_status: available_to_review
    e1_fit: >
      Early open Verilog-specialized CodeGen checkpoint family, useful as a
      baseline for comparing newer RTL-generation models against E1-style small
      module tasks.
    integration_action: >
      Track as metadata-only model candidate. Do not download weights, run
      inference, or commit generated RTL until exact model, dataset, and code
      revisions plus contamination and license reviews are complete.
    evidence_gate: >
      VeriGen use requires pinned checkpoint and dataset revisions, model-card
      and license review, base-model lineage, prompt/output hashes, generated
      RTL quarantine, Verilator/Yosys/synthesis logs, benchmark-overlap checks,
      and reviewer disposition.
    risk:
      - Model cards report training on GitHub/textbook Verilog and possible
        verbatim source generation, creating license and contamination risk.
      - Legacy CodeGen checkpoints may underperform newer instruction and
        reasoning models while still producing plausible but wrong RTL.
