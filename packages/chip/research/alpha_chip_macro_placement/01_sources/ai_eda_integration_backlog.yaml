schema: eliza.ai_eda_integration_backlog.v1
updated: 2026-05-19
scope: >
  Checked backlog for turning AI/EDA research sources into bounded E1
  integrations. Items remain incomplete until their evidence gates pass.
status_values:
  - PLANNED_BLOCKED
  - BLOCKED
  - IN_PROGRESS
  - DONE
work_items:
  - id: p0-ai-eda-critical-sota-review
    title: Critical AI/EDA SOTA Review
    priority: P0
    status: IN_PROGRESS
    source_ids:
      - agentic-eda-survey-2512-23189v2
      - autoeda-mcp
      - eda-mcp-server
      - chateda
      - llm-eda-log-analysis
      - rtl-coder
      - verilog-eval
      - cvdp
      - circuitnet
      - google-circuit-training
      - autodmp
      - orassistant
      - zigzag
      - assertllm
      - fault-dft
      - deepoheat
      - hardware-trojan-ml
    target_area:
      - research
      - architecture
      - evidence_policy
    owner_scope: research notes and checked integration backlog
    objective: >
      Maintain a critical, evidence-backed map of which chip-design stages can
      be automated now, which are blocked, and which require local E1 evidence.
    deliverables:
      - research/alpha_chip_macro_placement/01_sources/ai_eda_sota_review.md
      - research/alpha_chip_macro_placement/01_sources/ai_eda_source_inventory.yaml
      - research/alpha_chip_macro_placement/01_sources/ai_eda_integration_backlog.yaml
      - research/alpha_chip_macro_placement/01_sources/ai_eda_automation_readiness.yaml
      - research/alpha_chip_macro_placement/01_sources/ai_eda_provenance_matrix.yaml
    evidence_gate: >
      Review must map each recommendation to source IDs, local deliverables,
      and named validation gates instead of broad AI capability claims.
    validation_commands:
      - python3 scripts/check_ai_eda_source_inventory.py
      - make docs-check
    blocked_by:
      - Ongoing literature and code search
      - License review for external code, weights, and datasets
    acceptance_criteria:
      - SOTA claims are tied to sources with URLs.
      - Recommendations distinguish advisory predictions from signoff evidence.
      - Each near-term integration has a local checker or explicit blocked gate.
      - External code, model, and dataset assets have release-use triage.
  - id: p1-local-eda-rag-log-triage
    title: Local EDA RAG And Log Triage
    priority: P1
    status: IN_PROGRESS
    source_ids:
      - autoeda-mcp
      - orassistant
      - eda-corpus
      - llm-eda-log-analysis
    target_area:
      - log_analysis
      - openroad_triage
      - evidence_navigation
    owner_scope: read-only local source index and citation smoke reports
    objective: >
      Build a local, citation-required index over E1 EDA scripts, checks,
      source registries, and EDA log-triage methods before allowing any agent
      to propose tool actions.
    deliverables:
      - scripts/ai_eda/build_local_eda_rag_index.py
      - build/ai_eda/rag_index/source_manifest.json
      - build/ai_eda/rag_index/citation_smoke_report.json
    evidence_gate: >
      RAG outputs must cite local file hashes and list follow-up Make/checker
      commands; no generated answer is release evidence.
    validation_commands:
      - python3 scripts/check_ai_eda_source_inventory.py
      - python3 scripts/ai_eda/build_local_eda_rag_index.py --run-id validation
    blocked_by:
      - Broader source corpus selection and license review
      - No approved parser/schema for synthesis, OpenLane, formal, simulator, and signoff log tables
      - No write-capable agent action schema yet
    acceptance_criteria:
      - Index manifest is reproducible from current file hashes.
      - Citation smoke report names follow-up gates for each query.
      - Log triage remains advisory and cites source/log hashes before naming fixes.
      - The index policy remains read-only.
  - id: p1-external-source-metadata-probe
    title: External AI/EDA Source Metadata Probe
    priority: P1
    status: IN_PROGRESS
    source_ids:
      - rtl-coder
      - verilog-eval
      - cvdp
      - chipcraftx-rtlgen-7b
      - circuitnet
      - zigzag
      - assertllm
      - rtlmul
    target_area:
      - provenance
      - license_review
      - model_registry
      - code_registry
    owner_scope: metadata probe reports only; no asset import or release use
    objective: >
      Probe external GitHub and Hugging Face metadata for inventory sources so
      code/model/dataset availability and license hints are reproducible.
    deliverables:
      - scripts/ai_eda/probe_external_ai_eda_sources.py
      - build/ai_eda/external_source_probe/<run-id>/source_probe_report.json
      - research/alpha_chip_macro_placement/01_sources/ai_eda_external_source_probe_summary.yaml
    evidence_gate: >
      Probe reports are metadata only; importing code, datasets, or model
      weights remains blocked until manual license and provenance review.
    validation_commands:
      - python3 scripts/check_ai_eda_source_inventory.py
      - python3 scripts/ai_eda/probe_external_ai_eda_sources.py --run-id validation
    blocked_by:
      - Manual license review for each source selected for real use
      - Version pinning for cloned code or downloaded model/dataset assets
      - Local deterministic gates for any generated or predicted output
    acceptance_criteria:
      - Probe report records provider, status, license hints, and release-use block.
      - Probe policy states no model weights or external assets are imported.
      - Checker rejects probe reports that allow release use.
  - id: p1-local-ai-eda-backend-preflight
    title: Local AI/EDA Backend Preflight
    priority: P1
