      - Report states no floorplan, placement, DEF, ODB, GDS, PD-config, constraint, netlist, OpenROAD, OpenLane, global-placement, detailed-placement, legalization, filler, model, LLM, download, benchmark import, placement generation, density/padding change, macro placement, Tcl, patch, prediction, QoR, timing, routability, signoff, or release action is enabled.
      - Candidate tasks list deterministic source inventory, placement capture, RAG, OpenLane preflight, PD signoff, PD closure, routing, timing, physical verification, no-hardware-action, docs, PD snapshot, autotune, synthesis, power, and commercial-EDA gates.
      - BBO and competition benchmark sources remain metadata-only until revision, license, split, non-overlap, generated-output quarantine, and signoff replay gates pass.
