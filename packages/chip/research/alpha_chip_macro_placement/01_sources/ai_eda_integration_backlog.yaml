      - simulator
      - verification
      - design_for_test
    owner_scope: local availability report only; no installs, clones, or model downloads
    objective: >
      Check which high-priority AI/EDA backends are already locally runnable or
      checked out, without importing external assets or enabling release use.
    deliverables:
      - scripts/ai_eda/preflight_ai_eda_backends.py
      - build/ai_eda/backend_preflight/<run-id>/backend_preflight_report.json
    evidence_gate: >
