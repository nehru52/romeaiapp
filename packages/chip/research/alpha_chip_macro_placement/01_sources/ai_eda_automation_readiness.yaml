      - build/ai_eda/rag_index/source_manifest.json
    next_gate: python3 scripts/check_ai_eda_source_inventory.py
    critical_review: >
      Agents and log-analysis assistants are useful for context retrieval and
      run triage, but write-capable tool agents need typed command schemas,
      log schemas, archived logs, deterministic replay, and reviewer
      disposition.
