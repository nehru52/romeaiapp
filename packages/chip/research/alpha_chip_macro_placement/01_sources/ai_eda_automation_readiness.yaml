      - openrtlset
      - mg-verilog
      - llm-eda-opencores
      - hardware-verilogeval-v2-hf
      - llm4verilog-dataset
      - qimeng-codev-r1
      - evolve-verilog
      - safetune-rtl-poisoning
      - trojanloc
      - harmchip
      - llmsanitize
      - min-k-prob-contamination
    local_lane: p1-benchmark-evaluation-hygiene-target-capture
    current_artifacts:
      - scripts/ai_eda/capture_benchmark_evaluation_hygiene_targets.py
      - build/ai_eda/benchmark_evaluation_hygiene_targets/validation/targets_report.json
    next_gate: python3 scripts/ai_eda/capture_benchmark_evaluation_hygiene_targets.py --run-id validation
    critical_review: >
      Public HDL benchmarks and external RTL corpora are useful for measuring
      tool direction, but benchmark pass rates can be contaminated by training
      overlap, mirror drift, prompt leakage, evaluator version drift, and
      syntax-only success. E1 needs held-out task hashes, non-overlap review,
      exact benchmark revisions, simulator/synthesis/formal logs, and reviewer
      disposition before any public or private benchmark score can influence
      source, claims, or release decisions.
  - id: spec_traceability_and_requirement_coverage
    rating: READY_DRY_RUN
    source_ids:
      - incrertl
      - llm-fsm
      - spec2assertion
      - coverassert
      - qimeng-codev-sva
      - assertionforge
      - sangam-sva
      - codev-sva
