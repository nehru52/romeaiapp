      cocotb core, pytest cocotb runners, bus driver/monitor libraries,
      functional coverage libraries, Python-UVM, AXI VIP, and deterministic
      SystemVerilog frontend/lint/compliance tooling can make simulator and
      assertion feedback more structured. Root-cause narratives, generated testbenches,
      generated UVM collateral, generated SVAs, coverage claims, waveform
      summaries, bug localizations, bug-type classifications, and proposed RTL
      fixes are all unsafe until tied to local waveform/coverage hashes, RTL
      hashes, deterministic regressions, equivalence/synthesis where needed,
      and human review.
