      - build/ai_eda/eda_tool_agent_interop_targets/validation/targets_report.json
    next_gate: python3 scripts/ai_eda/capture_eda_tool_agent_interop_targets.py --run-id validation
    critical_review: >
      MCP-style EDA wrappers, physical-design Tcl generators,
      OpenROAD-specific tool servers, stateful memory/skill agents,
      post-EDA repair benchmarks, structured EDA-agent schemas, coding agents,
      hardware-agent benchmarks, and commercial copilots are the most direct
      path to AI orchestration across tools, but they are also the highest-risk
      automation boundary. E1 should keep them as target capture only until
      command schemas, read/write scopes, commercial license and data-handling
      review, sandbox/authentication policy, memory/schema redaction, local
      replay manifests, deterministic gates, and reviewer disposition exist; no
      generated Tcl, shell, constraints, waivers, source edits, tool runs,
      signoff claims, or release use are allowed by this lane.
