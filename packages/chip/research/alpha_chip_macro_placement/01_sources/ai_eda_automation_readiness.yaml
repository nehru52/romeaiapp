      evaluation frameworks, multi-agent gate-level generation frameworks and
      benchmarks, metric-reasoning datasets, CircuitNet-style PD corpora, SVA datasets, and
      wafer-defect models. E1 should treat them as metadata-only candidates
      until exact revisions, licenses, file manifests, contamination checks,
      quarantine paths, deterministic local gates, and reviewer dispositions
      exist; no weights, datasets, training, inference, or generated source are
      allowed by this lane.
  - id: benchmark_evaluation_hygiene
    rating: READY_DRY_RUN
    source_ids:
