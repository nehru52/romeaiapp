    critical_review: >
      Register-map, IP packaging, and platform-contract generators can reduce
      ABI drift across RTL, docs, Linux/Buildroot/AOSP, and tests, and concrete
      PeakRDL/hdl-registers exporters make the generated collateral surface
      explicit. AI is useful only as review assistance here: the source of truth
      must be a pinned structured contract or generator input. E1 must not
      import external IP, generate registers, or alter memory maps, headers,
      device trees, drivers, UVM/RAL collateral, or RTL until revisions,
      licenses, file manifests, generated artifacts, platform gates, software
      gates, RTL gates, and reviewer disposition exist.
