    current_artifacts:
      - scripts/ai_eda/capture_spec_traceability_targets.py
      - build/ai_eda/spec_traceability_targets/validation/targets_report.json
    next_gate: python3 scripts/ai_eda/capture_spec_traceability_targets.py --run-id validation
    critical_review: >
      Requirements-to-RTL traceability is the safest path for AI to help E1
      evolve: it can connect docs, spec-db contracts, RTL modules, assertions,
      tests, and work orders before generating changes. Spec2RTL-Agent,
      RTLocating/EvoRTL-Bench, IncreRTL, SVA datasets, and NL-to-SVA methods
      show useful directions for complex-spec decomposition, localized impact
      analysis, incremental edits, and assertion candidates. They are still not
      design evidence by themselves. E1 needs stable requirement IDs, source
      hashes, non-overlap review, generated-output quarantine,
      formal/cocotb/synthesis/HLS gates, vacuity checks, localization impact
      review, and reviewer disposition before any AI-generated trace matrix,
      RTL, HLS, assertion, spec edit, or patch can affect source or release
      claims.
