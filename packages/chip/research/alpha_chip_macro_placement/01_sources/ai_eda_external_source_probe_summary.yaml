    action: Resolve license ambiguity before running or importing framework code.
  - source_id: hlsfactory
    action: Review AGPL obligations before importing code; use current lane for dry-run target capture only.
  - source_id: hls-eval
    action: Resolve missing repository license before using benchmark code or results.
  - source_id: secda-dse
    action: Treat SECDA as related framework code until the SECDA-DSE implementation path is reviewed.
  - source_id: timingpredict
    action: Use as timing-prediction schema prior only until code/dataset license and E1 held-out validation are reviewed.
  - source_id: e2eslack
    action: Track paper as SOTA slack-prediction reference; no code path was found in the current search.
  - source_id: openroad-resizer
    action: Treat local OpenROAD logs as evidence source; AI may suggest sweeps only after write-capable ECO gates exist.
  - source_id: align-analoglayout
    action: Do not import generated layout into E1 until PDK/rule hashes, DRC/LVS, extraction, and analog review gates exist.
  - source_id: autockt
    action: Keep as method reference until E1 has local SPICE specs, model provenance, and simulator sweeps.
  - source_id: masala-chai
    action: Review dataset and generated-SPICE validity before any analog LLM benchmark or fine-tuning use.
  - source_id: archgym
    action: Use only as a DSE framework reference until E1 exposes bounded memory/interconnect knobs and simulator labels.
  - source_id: booksim2
    action: Do not run NoC studies until E1 has topology, traffic-trace, and follow-up RTL/benchmark gates.
  - source_id: ramulator2
    action: Keep as a DRAM simulator candidate until LPDDR/DRAM configs, traces, and local memory evidence exist.
  - source_id: gem5-accesys
    action: Track paper-level accelerator interconnect SOTA; no release use until a reproducible code path is found and reviewed.
  - source_id: fault-dft
    action: Review Fault and any bundled ATPG engines before selecting an E1 DFT backend.
  - source_id: deeptpi
    action: Treat test-point recommendations as research only until E1 has a scan policy, DFT netlist flow, and before/after signoff gates.
  - source_id: deft-atpg
    action: Track differentiable ATPG as hard-to-detect-fault SOTA; no E1 use until a reproducible implementation exists.
  - source_id: nn-for-atpg
    action: Review Dryad artifact license and circuit compatibility before any ATPG benchmark import.
  - source_id: openpdn
    action: Treat generated PDN templates as blocked until E1 has current/congestion maps, PDNSim labels, and routing/signoff review.
  - source_id: ir-drop-predictor
    action: Use only as an IR-drop surrogate reference until local PDNSim/OpenROAD labels and held-out E1 validation exist.
  - source_id: deepoheat
    action: Keep thermal surrogate use blocked until E1 has calibrated power maps, package assumptions, and measured thermal traces.
  - source_id: aieda
    action: Review design-to-vector extraction before importing any feature pipeline or external dataset.
  - source_id: trojansaint
    action: Review GraphSAINT submodule, netlist parser, benchmark labels, and license before any E1 gate-level scanner use.
  - source_id: gnn-mff
    action: Review RTL parser coverage and dataset provenance before any AST/DFG security classifier use.
  - source_id: securerag-rtl
    action: Treat RAG output as cited triage only until E1 has a reviewed security rule corpus and disposition workflow.
  - source_id: trojanwhisper
    action: Block LLM Trojan classifications until prompts, models, datasets, and reviewer signoff are reproducible.
  - source_id: trojangym
    action: Keep Trojan-generation workflows isolated as adversarial benchmark research; never import generated Trojans into source.
  - source_id: ghost-benchmarks
    action: Treat generated Trojan RTL as isolated external test data only after license, threat-model, and corpus-boundary review.
  - source_id: accellera-cdc-rdc-standard
    action: Use as CDC/RDC intent-reference only; local signoff still requires RTL, SDC, report, waiver, and review evidence.
  - source_id: formal-cdc-msi
    action: Treat metastability-injection methodology as a formal target until E1 has explicit clock/reset-domain intent.
  - source_id: questa-cdc-rdc-assist
    action: Track commercial ML-assisted setup capability, but do not rely on closed suggestions for open-flow release evidence.
  - source_id: opencdc
    action: Keep as watchlist until public code, license, and SystemVerilog parser support are reviewable.
  - source_id: mcp4eda
    action: Review command schemas and logs before adopting any MCP-style write-capable EDA orchestration.
  - source_id: llm-firmware-validation
    action: Use QEMU/static-analysis/fuzzing loop as a method reference only; block generated firmware patches until E1 transcripts and review exist.
  - source_id: eok-riscv-kernel-optimization
    action: Treat generated RISC-V kernels as advisory experiments until correctness, compiler, simulator, and benchmark logs are captured.
  - source_id: intrintrans-rvv
    action: Block generated RVV intrinsic translations until E1 CPU ISA profile, compiler support, and correctness tests are pinned.
  - source_id: opensbi
    action: Pin revision and capture build plus boot handoff logs before using OpenSBI as E1 boot evidence.
  - source_id: u-boot
    action: Keep U-Boot board-port work blocked until OpenSBI/Linux direct boot evidence and device-tree handoff are stable.
  - source_id: symrtlo
    action: Keep RTL rewrite as target capture until E1 has before/after equivalence, simulation, synthesis, and review evidence.
  - source_id: rtlrewriter-bench
    action: Review benchmark license and equivalence setup before adapting any rewrite evaluation tasks to E1.
  - source_id: formalrtl
    action: Track verified RTL synthesis as method reference until source assets and E1 reference-model proofs are available.
  - source_id: rtl-timing-metamorphosis
    action: Treat timing-control and protocol-sensitive RTL as rewrite-forbidden until formal and cocotb regressions exist.
  - source_id: openabc-d
    action: Use as synthesis-ML dataset reference only after technology, label, and license compatibility are reviewed.
  - source_id: rocketppa
    action: Treat code-level PPA estimates as planning priors only until local E1 label error analysis is complete.
  - source_id: pcbschemagen
    action: Use as PCB schematic method context only; block generated schematics until package/pinout, KiCad, manufacturing, and human-review gates exist.
  - source_id: pcb-bench
    action: Treat benchmark scores as prompt/task context, not evidence of E1 board correctness.
  - source_id: pcbagent
    action: Track constrained PCB-placement method only; no E1 placement use until local KiCad and SI/PI/DFM gates are release-clean.
  - source_id: neurpcb
    action: Review code, training data, and KiCad parser scope before any local placement experiment.
  - source_id: pcb-migrator
    action: Defer migration workflows until E1 has a reviewed baseline board and before/after board evidence contract.
  - source_id: pcb-pr-app
    action: Review legacy KiCad parser support and license before selecting as an optional PCB placement/routing backend.
  - source_id: freerouting
    action: Use only as an autorouter candidate after board rules, logs, DRC/ERC, SI/PI, and DFM gates are defined.
  - source_id: dreamplacefpga
    action: Treat FPGA placement output as blocked until exact device, constraints, timing, bitstream, and bring-up evidence exist.
  - source_id: rapidwright-dreamplacefpga
    action: Track FPGA interchange flow as context; block use until vendor/device dependencies and E1 board target are pinned.
  - source_id: deeppcb-defect-dataset
    action: Use as AOI dataset context only; E1 inspection claims require board-specific images, labels, model logs, and manual disposition.
  - source_id: ieee-1801-upf
    action: Use as power-intent standard reference only; block generated UPF until E1 has power-state, supply-set, reset, firmware, and verification evidence.
  - source_id: ieee-upf-open-source
    action: Review example license and revision before adapting any syntax or examples into E1 power-intent artifacts.
  - source_id: yosys-clockgate
    action: Treat clockgate as a backend candidate only; generated gated clocks require equivalence, scan, CDC/RDC, STA, and power evidence.
  - source_id: codmas-rtlopt
    action: Track RTLOPT clock-gating triples as benchmark context; do not import or apply LLM clock-gating edits to E1 without local gates.
  - source_id: prompting-for-power
    action: Use prompt patterns as evaluation context only; generated low-power RTL remains blocked until functional, synthesis, and power evidence exists.
  - source_id: poet-rtl-ppa
    action: Treat power-first evolutionary RTL search as method reference until E1 has deterministic oracle tests and before/after power labels.
  - source_id: rtl-ppa-sog
    action: Use as pre-synthesis power/PPA feature reference only until E1 held-out synthesis and power-label error analysis exists.
  - source_id: openroad-two-phase-clock
    action: Keep two-phase/latch conversion research-only until E1 has clean baseline timing, CTS, equivalence, scan, and signoff evidence.
