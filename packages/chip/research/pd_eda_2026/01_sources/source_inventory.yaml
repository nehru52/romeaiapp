      180 nm open MCU PDK; viable second PDK for E1 PD smoke and SRAM/IO
      validation when Sky130 utilization is a blocker.

  - id: ihp_sg13g2_pdk
    name: IHP SG13G2 open PDK (130 nm BiCMOS)
    url: https://github.com/IHP-GmbH/IHP-Open-PDK
    kind: github_repo
    last_checked: 2026-05-19
    relevance: |
      Open 130 nm BiCMOS PDK with full OpenROAD flow support. Useful as
      a second-source 130 nm node and for analog/IO experiments.

  - id: asap7_pdk
    name: ASAP7 7 nm predictive PDK
    url: https://github.com/The-OpenROAD-Project/asap7
    kind: github_repo
    last_checked: 2026-05-19
    relevance: |
      Predictive 7 nm PDK; closest in spirit to advanced-node behavior; no
      foundry signoff, but useful as a sanity check on E1 14A direction.

  - id: nangate45_pdk
    name: NanGate 45 nm Open Cell Library
    url: https://github.com/The-OpenROAD-Project/OpenROAD-flow-scripts/tree/master/flow/platforms/nangate45
    kind: github_repo
    last_checked: 2026-05-19
    relevance: Reference 45 nm platform for OpenROAD; common ML PD benchmark.

  - id: freepdk45_doc
    name: FreePDK45 (NCSU)
    url: https://eda.ncsu.edu/freepdk/freepdk45/
    kind: docs
    last_checked: 2026-05-19
    relevance: Predictive 45 nm PDK used in academic PD ML literature.

