schema: eliza.chip.research.source_inventory.v1
packet: pd_eda_2026
compiled_on: 2026-05-19
policy:
  - Primary/canonical sources only.
  - URLs verified at compile date; future drift requires re-check.
  - No vendor marketing copy treated as evidence.
notes:
  - "This inventory is the source list for the `pd_eda_2026` packet only."
  - "The AlphaChip-specific source list lives at `research/alpha_chip_macro_placement/01_sources/ai_eda_source_inventory.yaml`."
  - "Entries flagged `extends_alphachip_packet: true` add 2025-2026 deltas to topics already present in the AlphaChip packet."

sources:

  # ------------------------------------------------------------------
  # 1) Open EDA flows: OpenLane 2, OpenROAD, Yosys, KLayout, OSS-CAD-Suite
  # ------------------------------------------------------------------
  - id: openlane2_repo
    name: OpenLane 2 (Efabless / ChipFoundry)
    url: https://github.com/efabless/openlane2
    kind: github_repo
    last_checked: 2026-05-19
    relevance: |
      Active OpenLane 2 line; current Eliza E1 chip-package OpenLane Sky130
      flow targets a pinned tag from this family. See
      `pd/openlane/config.sky130.json` and `docs/three-week-prototype-workstreams.md`.

  - id: openlane2_chipfoundry_fork
    name: ChipFoundry OpenLane 2 fork
    url: https://github.com/chipfoundry/openlane2
    kind: github_repo
    last_checked: 2026-05-19
    relevance: |
      Tracked tags referenced by repo bootstrap scripts; alternative
      maintenance fork.

  - id: openlane2_docs
    name: OpenLane 2 documentation
    url: https://openlane2.readthedocs.io/
    kind: docs
    last_checked: 2026-05-19
    relevance: Step API, PDK selection, classic vs custom step flows.

  - id: openlane_repo_v1
    name: Legacy OpenLane (v1, RTL2GDS Python wrapper)
    url: https://github.com/The-OpenROAD-Project/OpenLane
    kind: github_repo
    last_checked: 2026-05-19
    relevance: |
      Legacy v1 reference and many published recipes still target it.
      Do not adopt for E1 production; cite for migration context.

  - id: openroad_repo
    name: OpenROAD core (UCSD-led)
    url: https://github.com/The-OpenROAD-Project/OpenROAD
    kind: github_repo
    last_checked: 2026-05-19
    relevance: Global place, detail place, CTS, GR, DR, PDN, repair.

  - id: openroad_docs
    name: OpenROAD documentation
    url: https://openroad.readthedocs.io/
    kind: docs
    last_checked: 2026-05-19
    relevance: |
      Authoritative reference for OpenROAD tools used inside OpenLane 2.
      Includes pdngen, gpl/dpl/triton CTS, FastRoute/TritonRoute integration.

  - id: openroad_flow_scripts
    name: OpenROAD-flow-scripts
    url: https://github.com/The-OpenROAD-Project/OpenROAD-flow-scripts
    kind: github_repo
    last_checked: 2026-05-19
    relevance: |
      Reference RTL-to-GDS flow outside OpenLane. Useful for E1 as a
      second independent flow when validating macro-placement candidates.

  - id: yosys_repo
    name: Yosys synthesis suite
    url: https://github.com/YosysHQ/yosys
    kind: github_repo
    last_checked: 2026-05-19
    relevance: |
      Synthesis engine used by OpenLane. 0.50+ improves SV2017 coverage
      and gate-mapping. Relevant for E1's CVA6 wrapper + NPU/peripherals.

  - id: yosys_docs
    name: Yosys manual
    url: https://yosyshq.readthedocs.io/projects/yosys/
    kind: docs
    last_checked: 2026-05-19
    relevance: Pass/strategy reference; abc9 mapping; structural verilog quirks.

  - id: abc_repo
    name: Berkeley ABC
    url: https://github.com/berkeley-abc/abc
    kind: github_repo
    last_checked: 2026-05-19
    relevance: AIG-based logic optimization invoked by Yosys (abc / abc9).

  - id: opensta_repo
    name: OpenSTA (parallax)
    url: https://github.com/The-OpenROAD-Project/OpenSTA
    kind: github_repo
    last_checked: 2026-05-19
    relevance: Static timing for the E1 OpenLane/OpenROAD signoff path.

  - id: klayout_repo
    name: KLayout
    url: https://github.com/KLayout/klayout
    kind: github_repo
    last_checked: 2026-05-19
    relevance: GDS viewer, DRC engine, XOR, scripts. Used in Sky130 DRC decks.

  - id: magic_repo
    name: Magic VLSI layout tool
    url: https://github.com/RTimothyEdwards/magic
    kind: github_repo
    last_checked: 2026-05-19
    relevance: DRC, PEX, GDS streaming for OpenLane; required by Sky130 sign-off.

  - id: netgen_repo
    name: Netgen (LVS)
    url: https://github.com/RTimothyEdwards/netgen
    kind: github_repo
    last_checked: 2026-05-19
    relevance: LVS engine used by OpenLane/Sky130. Cross-checked vs KLayout LVS.

  - id: oss_cad_suite
    name: OSS CAD Suite (YosysHQ binary distribution)
    url: https://github.com/YosysHQ/oss-cad-suite-build
    kind: github_repo
    last_checked: 2026-05-19
    relevance: |
      Reproducible binary bundle of Yosys/ABC/iverilog/verilator/etc. Useful
      reference for pinning toolchain digests, complementary to the
      OpenLane 2 Docker image already used by E1.

  # ------------------------------------------------------------------
  # 2) AI-driven placement and floorplanning
  # ------------------------------------------------------------------
  - id: alphachip_nature_2024
    name: "AlphaChip / Mirhoseini et al. Nature follow-up (2024)"
    url: https://www.nature.com/articles/s41586-024-08032-5
    kind: paper
    last_checked: 2026-05-19
    extends_alphachip_packet: true
    relevance: |
      Authoritative Google update to the 2021 macro placement paper. Confirms
      proxy-cost objective + RL agent and clarifies open release positioning.

  - id: circuit_training_repo
    name: Google Research circuit_training (open release)
    url: https://github.com/google-research/circuit_training
    kind: github_repo
    last_checked: 2026-05-19
    extends_alphachip_packet: true
    relevance: |
      Open-source AlphaChip pipeline. E1 already runs r0.0.4 in Docker. See
      `research/alpha_chip_macro_placement/06_e1_notes/`.

  - id: tilos_macroplacement_repo
    name: TILOS-AI-Institute / MacroPlacement
    url: https://github.com/TILOS-AI-Institute/MacroPlacement
    kind: github_repo
    last_checked: 2026-05-19
    extends_alphachip_packet: true
    relevance: |
      Public benchmarks, format translators, reproduction of Google methodology
      with independent baselines. Already vendored in E1 setup.

  - id: dreamplace_repo
    name: DREAMPlace (UTDA)
    url: https://github.com/limbo018/DREAMPlace
    kind: github_repo
    last_checked: 2026-05-19
    relevance: |
      GPU-accelerated analytical placer; integrated as the standard-cell
      placer mode option in `circuit_training` (when DREAMPlace shim is
      present). Alternative to force-directed cell placement.

  - id: autodmp_repo
    name: NVIDIA AutoDMP
    url: https://github.com/NVlabs/AutoDMP
    kind: github_repo
    last_checked: 2026-05-19
    relevance: |
      NVIDIA's AutoDMP: macro placement automation using DREAMPlace +
      multi-objective Bayesian optimization. Direct alternative or
      complement to AlphaChip for hard macros.

  - id: chipformer_paper
    name: "ChiPFormer: Transferable Chip Placement via Offline Decision Transformer (ICML 2023)"
    url: https://arxiv.org/abs/2306.14744
    kind: paper
    last_checked: 2026-05-19
    extends_alphachip_packet: true
    relevance: Offline RL placement baseline against AlphaChip-style on-policy.

  - id: maskplace_paper
    name: "MaskPlace: Fast Chip Placement via Reinforced Visual Representation Learning (NeurIPS 2022)"
    url: https://arxiv.org/abs/2211.13382
    kind: paper
    last_checked: 2026-05-19
    extends_alphachip_packet: true
    relevance: Visual-representation RL placement; reference architecture for comparison.

  - id: wireplan_rl_paper
    name: "WirePlanRL: RL for Wire-Aware Floorplan Generation"
    url: https://arxiv.org/abs/2401.01024
    kind: paper
    last_checked: 2026-05-19
    relevance: |
      Floorplan-level RL with wire-aware objective; complements AlphaChip's
      macro-level placement.

  - id: circuitnet_2_paper
    name: "CircuitNet 2.0: An Advanced Dataset for Promoting Machine Learning Innovations in Realistic Chip Design Environment"
    url: https://arxiv.org/abs/2407.01459
    kind: paper
    last_checked: 2026-05-19
    extends_alphachip_packet: true
    relevance: |
      PKU CircuitNet-N28 dataset upgrade; standardized features for
      congestion, IR-drop, DRC, and timing ML.

  - id: circuitnet_repo
    name: CircuitNet GitHub
    url: https://github.com/circuitnet/CircuitNet
    kind: github_repo
    last_checked: 2026-05-19
    relevance: Dataset distribution + benchmark scripts for CircuitNet 1.0/2.0.

  - id: bars_paper
    name: "BARS: Block-Aware RL Sequence-Modeling for Chip Floorplanning"
    url: https://arxiv.org/abs/2305.08877
    kind: paper
    last_checked: 2026-05-19
    relevance: Sequence-model floorplanning baseline.

  # ------------------------------------------------------------------
  # 3) AI for routing, CTS, congestion/DRC prediction
  # ------------------------------------------------------------------
  - id: congestionnet_paper
    name: "CongestionNet: Routing Congestion Prediction Using Deep Graph Neural Networks (DAC 2019, follow-ups 2023-2025)"
    url: https://arxiv.org/abs/1906.05599
    kind: paper
    last_checked: 2026-05-19
    relevance: Pre-route congestion estimation; building block for AI-driven PD.

  - id: net2_paper
    name: "Net^2: A Graph Attention Network Method Customized for Pre-Placement Net Length Estimation"
    url: https://arxiv.org/abs/2011.13522
    kind: paper
    last_checked: 2026-05-19
    relevance: Net-length / parasitic estimation pre-placement.

  - id: pros_paper
    name: "PROS: A Plug-in for Routability Optimization Applied in the State-of-the-Art Commercial EDA Tool"
    url: https://arxiv.org/abs/2011.07254
    kind: paper
    last_checked: 2026-05-19
    relevance: Routability prediction with ML; commercial-tool insertion point.

  - id: drc_predictor_2024
    name: "DRC Hotspot Prediction with Graph Neural Networks"
    url: https://arxiv.org/abs/2308.05693
    kind: paper
    last_checked: 2026-05-19
    relevance: Pre-route DRC hotspot prediction; useful in early E1 PD iteration.

  - id: ml_cts_paper
    name: "ML-Based Clock Tree Synthesis with Power and Skew Tradeoff"
    url: https://arxiv.org/abs/2105.11290
    kind: paper
    last_checked: 2026-05-19
    relevance: ML-augmented CTS; complement to TritonCTS.

  - id: gandalf_paper
    name: "GANDALF: GAN-Based Adversarial Hardware Layout-Aware Fault/Layout Synthesis"
    url: https://arxiv.org/abs/2208.01237
    kind: paper
    last_checked: 2026-05-19
    relevance: ML-based layout generation reference; security-aware.

  # ------------------------------------------------------------------
