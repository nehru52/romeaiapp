tvm_unity:
  - id: repo_tvm
    title: "Apache TVM"
    url: "https://github.com/apache/tvm"
    source_type: "open_source_project"
    year: 2026
    last_release_or_commit_year: 2026
    relevance:
      - Relax IR (Relay v2), TIR, MetaSchedule, BYOC interface
      - mature path for NPU vendors to plug in via Bring-Your-Own-Codegen
      - prior art for tile-level autoscheduling on accelerators
  - id: paper_metaschedule_2022
    title: "Tensor Program Optimization with Probabilistic Programs"
    url: "https://arxiv.org/abs/2205.13603"
    source_type: "paper"
    venue: "NeurIPS 2022"
    year: 2022
    authors: ["Shao", "Zheng", "Wang", "Chen", "et al."]
    relevance:
      - MetaSchedule autoscheduler design
      - probabilistic schedule space for tiling and dispatch
      - reference for E1 tile-shape search if the compiler ever needs autotune
  - id: repo_mlc_llm
    title: "MLC-LLM: Universal LLM Compilation"
    url: "https://github.com/mlc-ai/mlc-llm"
    source_type: "open_source_project"
    year: 2026
    last_release_or_commit_year: 2026
    relevance:
      - TVM Unity + Relax + MetaSchedule for LLM deployment
      - quantized weight layouts and KV cache management
      - cross-target (mobile GPU, NPU, WebGPU) deployment patterns
  - id: paper_relax_unity
    title: "Relax: Composable Abstractions for End-to-End Dynamic Machine Learning"
    url: "https://arxiv.org/abs/2311.02103"
    source_type: "paper"
    venue: "MLSys 2024"
    year: 2024
    authors: ["Lai", "Shao", "Feng", "Tan", "Chen", "et al."]
    relevance:
      - design of Relax IR with dynamic shapes
      - tensor-program composition with MetaSchedule
      - direct comparison point for StableHLO with dynamic shapes

