triton_gpu_jit:
  - id: repo_triton
    title: "OpenAI Triton"
    url: "https://github.com/triton-lang/triton"
    source_type: "open_source_project"
    year: 2026
    last_release_or_commit_year: 2026
    relevance:
      - block-level GPU kernel DSL with MLIR backend
      - canonical example of a python-embedded compiler DSL
      - reference for tile/program-id abstractions that an NPU DSL may mirror
  - id: paper_triton_2019
    title: "Triton: An Intermediate Language and Compiler for Tiled Neural Network Computations"
    url: "https://dl.acm.org/doi/10.1145/3315508.3329973"
    source_type: "paper"
    venue: "MAPL 2019"
    year: 2019
    authors: ["Tillet", "Kung", "Cox"]
    relevance:
      - original Triton tile-IR design rationale
      - influenced Hidet, Mojo, and many newer tile DSLs
      - useful baseline when designing a tile DSL for E1
  - id: repo_cutlass
    title: "NVIDIA CUTLASS / CuTe-DSL"
    url: "https://github.com/NVIDIA/cutlass"
    source_type: "open_source_project"
    year: 2026
    last_release_or_commit_year: 2026
    relevance:
      - canonical GEMM template library for NVIDIA tensor cores
      - CuTe layout algebra (used by FlashAttention-3, etc.)
      - layout / tile / pipeline patterns that map well to systolic NPUs
  - id: repo_mojo
    title: "Modular Mojo"
    url: "https://github.com/modular/mojo"
    source_type: "open_source_project"
    year: 2026
    last_release_or_commit_year: 2026
    relevance:
      - MLIR-based AI systems language
      - tile-level kernel programming with python-like syntax
      - paired with MAX serving runtime
  - id: repo_hidet
    title: "Hidet: Task-Mapping Programming Paradigm"
    url: "https://github.com/hidet-org/hidet"
    source_type: "open_source_project"
    year: 2026
    last_release_or_commit_year: 2026
    relevance:
      - task-mapping IR distinct from Triton's tile IR
      - autoscheduling and operator fusion for GPU
      - alternative compiler design pattern for accelerator kernels
  - id: repo_thunderkittens
    title: "ThunderKittens"
    url: "https://github.com/HazyResearch/ThunderKittens"
    source_type: "open_source_project"
    year: 2026
    last_release_or_commit_year: 2025
    relevance:
      - simple tile-level CUDA DSL targeting H100/Blackwell
      - shows minimalist tile abstractions for fused attention
      - influences how 2026 attention kernels are written by hand

quantization_toolchains:
  - id: repo_aimet
    title: "Qualcomm AIMET (AI Model Efficiency Toolkit)"
    url: "https://github.com/quic/aimet"
    source_type: "open_source_project"
    year: 2026
    last_release_or_commit_year: 2026
    relevance:
      - production-grade PTQ/QAT, channel pruning, mixed precision
      - INT8/INT4 weight + activation quantization with AdaRound, BC, CLE
      - same toolkit Qualcomm targets at its own NPUs (mirror for E1)
  - id: repo_brevitas
    title: "Xilinx Brevitas"
    url: "https://github.com/Xilinx/brevitas"
    source_type: "open_source_project"
    year: 2026
    last_release_or_commit_year: 2026
    relevance:
      - PyTorch quantization-aware training library
      - flexible bit-width (INT8/INT4/INT2/binary/ternary) and FP8 paths
      - useful reference for INT2 BitNet-style training
  - id: paper_gptq
    title: "GPTQ: Accurate Post-Training Quantization for Generative Pre-trained Transformers"
    url: "https://arxiv.org/abs/2210.17323"
    source_type: "paper"
    venue: "ICLR 2023"
    year: 2022
    authors: ["Frantar", "Ashkboos", "Hoefler", "Alistarh"]
    relevance:
      - second-order Hessian-based INT4 PTQ
      - reference algorithm for weight-only INT4 in llama.cpp / mlc-llm
      - baseline against AWQ / SpinQuant for E1 INT4 path
  - id: paper_awq
    title: "AWQ: Activation-aware Weight Quantization for LLM Compression"
    url: "https://arxiv.org/abs/2306.00978"
    source_type: "paper"
    venue: "MLSys 2024"
    year: 2023
    authors: ["Lin", "Tang", "Tang", "Yang", "Xu", "Han"]
    relevance:
      - activation-statistics-driven scaling for INT4 weight-only quant
      - widely deployed in vLLM, mlc-llm, llama.cpp ecosystems
      - critical for any LLM INT4 deployment target on E1
  - id: paper_smoothquant
    title: "SmoothQuant: Accurate and Efficient Post-Training Quantization for LLMs"
    url: "https://arxiv.org/abs/2211.10438"
    source_type: "paper"
    venue: "ICML 2023"
    year: 2022
    authors: ["Xiao", "Lin", "Seznec", "Wu", "Demouth", "Han"]
    relevance:
      - migrates activation outliers into weight scales for INT8 W8A8
      - enables INT8 inference for transformer activations
      - precondition for E1 sustained INT8 attention path
  - id: paper_spinquant
    title: "SpinQuant: LLM Quantization with Learned Rotations"
    url: "https://arxiv.org/abs/2405.16406"
    source_type: "paper"
    venue: "ICLR 2025"
    year: 2024
    authors: ["Liu", "Heinecke", "Khirirat", "Xie", "et al."]
    relevance:
      - rotation-based outlier suppression for W4A4 and W4A8
      - low-bit activation quantization with minimal accuracy loss
      - directly relevant to E1 INT4 sustained-TOPS targets
  - id: paper_quarot
    title: "QuaRot: Outlier-Free 4-Bit Inference in Rotated LLMs"
    url: "https://arxiv.org/abs/2404.00456"
    source_type: "paper"
    venue: "NeurIPS 2024"
    year: 2024
    authors: ["Ashkboos", "Mohtashami", "Croci", "Li", "Cameron", "Jaggi", "Alistarh", "Hoefler"]
    relevance:
      - random-rotation preprocessing for fully W4A4 KV4 quantization
      - companion theory to SpinQuant for end-to-end INT4 attention
      - reference for E1 INT4 attention KV cache layout
  - id: paper_omniquant
    title: "OmniQuant: Omnidirectionally Calibrated Quantization for LLMs"
    url: "https://arxiv.org/abs/2308.13137"
    source_type: "paper"
    venue: "ICLR 2024"
    year: 2023
    authors: ["Shao", "Chen", "Zhang", "Zhao", "Han", "et al."]
    relevance:
      - learnable clipping + smoothing for low-bit PTQ
      - between GPTQ and SpinQuant in design space
      - reference for hybrid INT4 PTQ workflows
  - id: paper_hqq
    title: "Half-Quadratic Quantization (HQQ)"
    url: "https://mobiusml.github.io/hqq_blog/"
    source_type: "vendor_technical_blog"
    year: 2024
    relevance:
      - calibration-free INT2/INT3/INT4 weight quantization
      - useful for fast deployment when calibration data is unavailable
      - relevant for INT2 BitNet-class workloads on E1
  - id: paper_bitnet
    title: "BitNet b1.58: 1-bit LLMs"
    url: "https://arxiv.org/abs/2402.17764"
    source_type: "paper"
    venue: "arXiv preprint, broadly cited"
    year: 2024
    authors: ["Ma", "Wang", "Ma", "et al."]
    relevance:
      - ternary {-1, 0, 1} weights with INT8 activations
      - direct match for E1 DOT16_S2 INT2 packed primitive
      - establishes accuracy bar for INT2-class deployment
  - id: paper_atom
    title: "Atom: Low-Bit Quantization for Efficient and Accurate LLM Serving"
    url: "https://arxiv.org/abs/2310.19102"
    source_type: "paper"
    venue: "MLSys 2024"
    year: 2023
    authors: ["Zhao", "Lin", "Zhu", "Ye", "Chen"]
    relevance:
      - W4A4 with mixed-precision outlier handling
      - reorder-based KV-cache quantization
      - reference for INT4 with selective FP fallbacks
  - id: paper_llmint8
    title: "LLM.int8(): 8-bit Matrix Multiplication for Transformers at Scale"
    url: "https://arxiv.org/abs/2208.07339"
    source_type: "paper"
    venue: "NeurIPS 2022"
    year: 2022
    authors: ["Dettmers", "Lewis", "Belkada", "Zettlemoyer"]
    relevance:
      - first widely used INT8 LLM inference recipe
      - outlier feature decomposition that motivates SmoothQuant/SpinQuant
      - baseline INT8 path on any LLM benchmark
  - id: paper_fp8_formats
    title: "FP8 Formats for Deep Learning"
    url: "https://arxiv.org/abs/2209.05433"
    source_type: "paper"
    venue: "NVIDIA/Arm/Intel joint preprint"
    year: 2022
    authors: ["Micikevicius", "Stosic", "Burgess", "et al."]
    relevance:
      - E4M3 and E5M2 FP8 binary formats
      - mixed-precision training/inference recipes
      - matches E1 DOT4_FP8_E4M3 datapath assumption
  - id: paper_microscaling
    title: "OCP Microscaling Formats Specification"
    url: "https://www.opencompute.org/documents/ocp-microscaling-formats-mx-v1-0-spec-final-pdf"
    source_type: "spec"
    year: 2023
    relevance:
      - MX FP6/FP4/INT8 microscaling spec adopted by NVIDIA, AMD, Intel, Qualcomm
      - block scaling format compatible with low-bit NPU MXU
      - future-facing precision target for E1 INT4/FP4
  - id: paper_kv_quant
    title: "KIVI: A Tuning-Free Asymmetric 2bit KV Cache Quantization"
    url: "https://arxiv.org/abs/2402.02750"
    source_type: "paper"
    venue: "ICML 2024"
    year: 2024
    authors: ["Liu", "Yuan", "Lu", "Ng", "Chen", "et al."]
    relevance:
      - per-channel keys + per-token values 2-bit KV cache
