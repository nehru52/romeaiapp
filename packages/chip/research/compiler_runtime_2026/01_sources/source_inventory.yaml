    source_type: "open_source_project"
    year: 2026
    last_release_or_commit_year: 2026
    relevance:
      - PyTorch's official mobile/embedded runtime
      - delegate interface for NPU vendors (XNNPACK, CoreML, QNN, MediaTek, Vulkan, KleidiAI)
      - .pte file format and runtime ABI for on-device inference
  - id: vendor_executorch_delegates
    title: "ExecuTorch Backend Delegates"
    url: "https://pytorch.org/executorch/stable/compiler-delegate-and-partitioner.html"
    source_type: "vendor_docs"
    year: 2026
