schema: eliza.compiler_runtime_2026.source_inventory.v1
captured_date: "2026-05-19"
scope:
  - MLIR upstream dialects and CIRCT hardware-MLIR
  - StableHLO / OpenXLA / PJRT and JAX-PyTorch export
  - IREE compiler + HAL multi-target runtime
  - Apache TVM Unity, Relax, MetaSchedule, MLC-LLM
  - PyTorch 2.x compile stack (TorchInductor, AOTInductor, ExecuTorch, dynamo)
  - TFLite / LiteRT, NNAPI deprecation, Android AICore / AI Edge
  - ONNX Runtime Mobile / Web with EP architecture
  - Triton, CUTLASS / CuTe-DSL, Mojo, Hidet, ThunderKittens
  - Quantization toolchains (AIMET, Brevitas, GPTQ, AWQ, SpinQuant, OmniQuant,
    SmoothQuant, QuaRot, HQQ, Atom, RPTQ)
  - Throughput / latency runtimes (vLLM, SGLang, MAX, llama.cpp, MLX, MediaPipe)
  - Attention compilation (FlashAttention-3, paged attention, RoPE fusion)
  - Mobile NN abstractions (Core ML, QNN, NeuroPilot, ExecuTorch backends)
  - Compiler / scheduling papers (RAMMER, Welder, Tessel, AKG, MAGE, Mind Mappings, Glow)
  - Tensor/graph IRs and DSLs (LinAlg, Transform, Stream, Halide, BUDA, TT-NN)
claim_boundary: >
  All entries below are public papers, vendor pages, RFCs, or open-source
  repositories. They do not establish that the E1 NPU's compiler/runtime
  implements any of these techniques. E1 implementation evidence lives in
  packages/chip/docs/, packages/chip/compiler/runtime/, and packages/chip/rtl/.

mlir_and_circt:
  - id: repo_llvm_mlir
    title: "MLIR — Multi-Level Intermediate Representation (LLVM monorepo)"
    url: "https://github.com/llvm/llvm-project/tree/main/mlir"
    source_type: "open_source_project"
    year: 2026
    last_release_or_commit_year: 2026
    relevance:
      - upstream MLIR core, dialects, transform infra
      - linalg, tensor, vector, gpu, async, transform, mesh dialects live here
      - canonical lowering pipelines for tensor compute
  - id: vendor_mlir_dialects
    title: "MLIR Dialects (mlir.llvm.org)"
    url: "https://mlir.llvm.org/docs/Dialects/"
    source_type: "vendor_docs"
    year: 2026
    relevance:
      - authoritative dialect reference for linalg, tensor, vector, gpu, async
      - transform dialect schedule-driven lowering documentation
      - mesh and sparse_tensor dialects for distribution and structured sparsity
  - id: paper_mlir_compiler_2021
    title: "MLIR: Scaling Compiler Infrastructure for Domain Specific Computation"
    url: "https://arxiv.org/abs/2002.11054"
    source_type: "paper"
    venue: "CGO 2021"
    year: 2021
    authors: ["Lattner", "Amini", "Bondhugula", "Cohen", "Davis", "Pienaar", "Riddle", "Shpeisman", "Vasilache", "Zinenko"]
    relevance:
      - original MLIR design rationale
      - dialect, region, attribute, type design primitives
      - basis for every downstream MLIR-based compiler in this packet
  - id: paper_linalg_transform_2023
    title: "Composable and Modular Code Generation in MLIR"
    url: "https://arxiv.org/abs/2202.03293"
    source_type: "paper"
    venue: "arXiv preprint, used at CGO/PLDI tutorials"
    year: 2022
    authors: ["Vasilache", "Zinenko", "Bik", "Ravishankar", "et al."]
    relevance:
      - linalg + transform dialect schedule composition
      - tiling, fusion, vectorization, bufferization rationale
      - foundational reading for an NPU tile-and-dispatch backend
  - id: repo_circt
    title: "CIRCT: Circuit IR Compilers and Tools"
    url: "https://github.com/llvm/circt"
    source_type: "open_source_project"
    year: 2026
    last_release_or_commit_year: 2026
    relevance:
      - MLIR for hardware: FIRRTL, HW, Comb, SystemC, Calyx, Pipeline
      - relevant if E1 ever wants RTL co-generation from compiler IR
      - useful for descriptor-ring / control-plane microcode generation
  - id: repo_hugr
    title: "Hugr: Hierarchical Unified Graph Representation"
    url: "https://github.com/CQCL/hugr"
    source_type: "open_source_project"
    year: 2026
    last_release_or_commit_year: 2026
    relevance:
      - alternative graph IR (originated for quantum, now used for hybrid)
      - hierarchical region-based design parallel to MLIR
      - useful as a comparison point for tensor-IR ergonomics

stablehlo_openxla:
  - id: repo_stablehlo
    title: "StableHLO Operation Set"
    url: "https://github.com/openxla/stablehlo"
    source_type: "open_source_project"
    year: 2026
    last_release_or_commit_year: 2026
    relevance:
      - portable HLO op set with versioned compatibility window
      - target IR for JAX, PyTorch (torch-xla), TFLite converter
      - canonical entry IR for an NPU backend that wants framework agnosticism
  - id: spec_stablehlo_spec
    title: "StableHLO Specification"
    url: "https://github.com/openxla/stablehlo/blob/main/docs/spec.md"
    source_type: "spec"
    year: 2026
    relevance:
      - normative semantics for every StableHLO op
      - quantized types, dynamic shapes, dot_general contraction model
      - required reading before claiming StableHLO operator coverage
  - id: repo_openxla_xla
    title: "OpenXLA XLA Compiler"
    url: "https://github.com/openxla/xla"
    source_type: "open_source_project"
    year: 2026
    last_release_or_commit_year: 2026
    relevance:
      - production XLA pipeline (HLO → LLVM/PTX/TPU)
      - GPU backend, CPU backend, MLIR-based emitters
      - useful pattern source for systolic and tile dispatch
  - id: repo_pjrt
    title: "PJRT Plugin C API"
    url: "https://github.com/openxla/xla/tree/main/xla/pjrt"
    source_type: "open_source_project"
    year: 2026
    last_release_or_commit_year: 2026
    relevance:
      - device-agnostic runtime plugin interface used by JAX and PyTorch/XLA
      - candidate runtime ABI for binding a custom NPU device to JAX
      - decouples framework from device backend
  - id: vendor_jax_export
    title: "JAX export and StableHLO"
    url: "https://jax.readthedocs.io/en/latest/export/export.html"
    source_type: "vendor_docs"
    year: 2026
    relevance:
      - canonical way to capture JAX programs as StableHLO bytecode
      - versioned compatibility window for downstream compilers
      - input pathway for an E1 StableHLO backend

iree:
  - id: repo_iree
    title: "IREE: Intermediate Representation Execution Environment"
    url: "https://github.com/iree-org/iree"
    source_type: "open_source_project"
    year: 2026
    last_release_or_commit_year: 2026
    relevance:
      - end-to-end MLIR compiler + HAL multi-target runtime
      - dispatch region formation, executable formats (VMFB, embedded ELF)
      - HAL drivers for CPU/CUDA/Vulkan/Metal/ROCm/WebGPU and custom devices
  - id: vendor_iree_docs
    title: "IREE Documentation"
    url: "https://iree.dev/"
    source_type: "vendor_docs"
    year: 2026
    relevance:
      - compilation pipeline overview (Flow, Stream, HAL dialects)
      - guide to adding a new HAL driver and executable format
      - reference for an NPU-friendly bring-up path
  - id: paper_iree_dispatch
    title: "IREE: MLIR-based End-to-End ML Compiler and Runtime"
    url: "https://www.usenix.org/conference/atc24/presentation/lim"
    source_type: "paper"
    venue: "USENIX ATC 2024 (related talks/poster)"
    year: 2024
    relevance:
      - dispatch region formation and bufferization
      - stream scheduling and command buffer emission
      - target-independent IR pipeline rationale
  - id: repo_iree_turbine
    title: "IREE Turbine (PyTorch frontend)"
    url: "https://github.com/iree-org/iree-turbine"
    source_type: "open_source_project"
    year: 2026
    last_release_or_commit_year: 2026
    relevance:
