schema: eliza.memory_subsystem.source_inventory.v1
captured_date: "2026-05-19"
scope:
  - LPDDR5/5X/5T/6 mobile DRAM specifications and vendor announcements
  - HBM3, HBM3E, HBM4 stack and controller designs for AI accelerators
  - DDR5 server DRAM, on-die ECC, RowHammer mitigations
  - Compute Express Link 1.x/2.x/3.x and memory pooling/fabric semantics
  - In-memory and near-memory compute (HBM-PIM, AiM, UPMEM, NMC)
  - Open DRAM/LPDDR PHY and memory IP (OpenROAD, OpenPiton, SiFive)
  - SRAM macro density at 5 nm / 3 nm / 2 nm / 14A class
  - MRAM, STT-MRAM, eDRAM, gain-cell SRAM at advanced nodes
  - Cache coherence protocols (MESI, MOESI, Directory, MESIF, CHI, ACE, TileLink)
  - Accelerator coherency (CXL.cache, CCIX, IOMMU integration, cache stash)
  - NoC: Constellation, OpenSoC, ProNoC, OpenNoC, Connect, FlexNoC, NetSpeed
  - On-chip compression: AFBC, AFBE, DCC, ASTC, ETC, lossless feature-map
  - DRAM simulators: Ramulator 2, DRAMSim3, USIMM, gem5 mem, ChampSim
  - DRAM scheduling: PARBS, ATLAS, BLISS, FR-FCFS
  - Mobile DRAM power: PASR, deep sleep, fine-grained DVFS
  - TileLink + RISC-V coherence: Rocket/BOOM/Chipyard L2 banks
  - RowHammer, on-die ECC, repair, RAS, secure refresh
  - Scratchpad design: Buffets formalism, Halide line-buffering, multi-bank SRAM
claim_boundary: >
  Sources below are public specifications, peer-reviewed papers, vendor product
  briefs, conference proceedings, and open-source project pages. They support
  target-setting and design exploration. They do not establish E1 implementation
  status. Numeric targets must be reproduced via local RTL, cycle-accurate
  models, synthesis, PD, and on-board benchmarks before any E1 claim.

jedec_and_standards:
  - id: jedec_jesd209_5
    title: "JESD209-5C: Low Power Double Data Rate 5/5X SDRAM (LPDDR5/5X)"
    publisher: JEDEC Solid State Technology Association
    url: "https://www.jedec.org/standards-documents/docs/jesd209-5c"
    relevance:
      - LPDDR5 and LPDDR5X channel architecture, x16 with two pseudo-channels
      - per-pin data rate up to 8533 MT/s in LPDDR5X
      - link ECC framing, DBI, write-X, DVFSC
  - id: jedec_jesd209_5d
    title: "JESD209-5D: LPDDR5/5X Update (LPDDR5T extension)"
    publisher: JEDEC
    url: "https://www.jedec.org/document_search?search_api_views_fulltext=JESD209-5"
    relevance:
      - LPDDR5T 9600 MT/s update path
      - refresh and self-refresh power management bits
      - documented signaling, NT-ODT for high data rates
  - id: jedec_jesd209_6
    title: "JESD209-6 LPDDR6 (status: in development as of 2026-Q1)"
    publisher: JEDEC
    url: "https://www.jedec.org/news/pressreleases"
    status: pre_publication_target
    relevance:
      - LPDDR6 sub-channel architecture (24-bit sub-channel x4 per device)
      - per-pin target 10.667-14.4 GT/s
      - on-die ECC and link error correction integrated by default
      - new training and command-address bus structure
  - id: jedec_jesd238
    title: "JESD238: High Bandwidth Memory (HBM3 / HBM3E) DRAM Specification"
    publisher: JEDEC
    url: "https://www.jedec.org/standards-documents/docs/jesd238"
    relevance:
      - HBM3 stack architecture, 16 channels, pseudo-channel mode
      - HBM3E per-pin 9.2-9.6 Gb/s, up to 1.2 TB/s per stack
      - in-package routing, ECS, on-die ECC, refresh management
  - id: jedec_hbm4_announce
    title: "JEDEC Publishes HBM4 Standard (JESD270-4 family)"
    publisher: JEDEC
    url: "https://www.jedec.org/news/pressreleases/jedec-publishes-hbm4-standard"
    status: published_2025
    relevance:
      - HBM4 2048-bit per-stack interface, up to 8 Gb/s per pin baseline
      - directed energy efficiency targets, RAS extensions
      - per-stack capacity to 64 GB at 16-Hi
  - id: jedec_jesd79_5
    title: "JESD79-5C: DDR5 SDRAM Standard"
    publisher: JEDEC
    url: "https://www.jedec.org/standards-documents/docs/jesd79-5"
    relevance:
      - DDR5 on-die ECC reference for mobile/server lessons
      - per-DIMM PMIC, two independent 32-bit subchannels
      - refresh management, RFM, ECS

