      below the 18 TOPS/W INT8 target but valuable as a sanity baseline.

  - id: redmule_engine_paper
    title: "RedMulE: A Mixed-Precision Matrix-Matrix Operation Engine for Flexible and Energy-Efficient On-Chip Linear Algebra"
    url: "https://arxiv.org/abs/2301.03904"
    arxiv_id: "2301.03904"
    authors_or_vendor: "Yvan Tortorella et al., ETH Zurich"
    year: 2023
    venue: arxiv
    topic_tags: [redmule, mixed_precision, gemm_ops, fp8]
    relevance: |
      Extended RedMulE paper with GEMM-Op fused ops. Reference for
      operator-fusion patterns appropriate for E1's vector_activation
      engine listed under microarchitecture_targets.engines.

  - id: opengemm
    title: "OpenGeMM: A High-Utilization GEMM Accelerator Generator"
    url: "https://arxiv.org/abs/2411.09543"
    arxiv_id: "2411.09543"
    authors_or_vendor: "various academic"
    year: 2024
    venue: arxiv
