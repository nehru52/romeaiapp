  - id: nvdla
    title: "NVIDIA Deep Learning Accelerator (NVDLA)"
    url: "https://nvdla.org/"
    authors_or_vendor: "NVIDIA"
    year: 2018
    venue: open_source_project
    topic_tags: [nvdla, inference_accelerator, configurable]
    relevance: |
      Verilog + C-model + compiler + Linux driver reference architecture.
