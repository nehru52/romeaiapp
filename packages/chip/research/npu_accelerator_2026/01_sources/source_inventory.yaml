  - id: redmule_paper
    title: "RedMulE: A Compact FP16 Matrix-Multiplication Accelerator for Adaptive Deep Learning on RISC-V-Based Ultra-Low-Power SoCs"
    url: "https://arxiv.org/abs/2204.11192"
    arxiv_id: "2204.11192"
