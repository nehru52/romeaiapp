  - id: vta_blueprint_paper
    title: "A Hardware-Software Blueprint for Flexible Deep Learning Specialization"
    url: "https://arxiv.org/abs/1807.04188"
    arxiv_id: "1807.04188"
    authors_or_vendor: "Thierry Moreau et al., U.Washington / OctoML"
