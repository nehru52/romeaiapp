  - id: snitch_cluster_repo
    title: "Snitch cluster: Energy-efficient RISC-V FP compute cluster"
    url: "https://github.com/pulp-platform/snitch_cluster"
    authors_or_vendor: "PULP Platform / ETH Zurich"
    year: 2025
    venue: open_source_project
    topic_tags: [snitch, risc_v_cluster, fp_compute, pulp]
    relevance: |
      Reference cluster organization for tightly-coupled compute around
