  - id: esp_columbia
    title: "ESP Open SoC Platform"
    url: "https://www.esp.cs.columbia.edu/"
    authors_or_vendor: "Columbia SLD Group"
    year: 2024
    venue: open_source_project
    topic_tags: [esp, soc_platform, accelerator_integration, vortex]
    relevance: |
      Open SoC platform with HLS + RTL accelerator flows. Reference for
