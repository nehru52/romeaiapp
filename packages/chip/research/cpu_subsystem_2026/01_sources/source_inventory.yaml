schema: eliza.cpu_subsystem_2026.source_inventory.v1
captured_date: "2026-05-19"
scope:
  - open RISC-V application-class RV64 cores (Linux/Android-capable)
  - open RISC-V embedded/management-class cores
  - open RISC-V vector / RVV 1.0 implementations
  - open out-of-order RISC-V cores
  - cache hierarchy, coherency protocols, and open NoC/interconnect IP
  - RISC-V ISA extensions of interest (V, B, K, H, Sscofpmf, Sstc, Smaia/Ssaia,
    CHERI, Zicfilp/Zicfiss, Zacas, Zcmp/Zcb, Zvbb/Zvkn, Zfh/Zvfh)
  - Linux RISC-V port status (kernel.org, distros, Sscofpmf perf/timer)
  - Android RISC-V port status (RISE, riscv-android-sig, Cuttlefish RV,
    ART/HotSpot RV JIT, NDK/CTS/VTS)
  - CPU benchmark methodology (SPEC CPU 2017, Geekbench 6, CoreMark,
    MLPerf inference CPU class, lmbench, mibench)
  - open RV core verification (Spike, Sail, riscv-arch-test, RVfi,
    ImperasFV/RVI, formal CVA6, RIE)
claim_boundary: >
  Sources below are public papers, vendor pages, project repositories,
  RISC-V International ratified specs, and mailing-list summaries. They do
  not prove Eliza E1 implementation status. E1 CPU/AP claims require
  separate local RTL, simulator, OpenSBI/Linux transcript, MMU/cache,
  PD, benchmark, and Android evidence as gated by
  `docs/arch/linux-capable-cpu-contract.md`.

# ---------------------------------------------------------------------------
# Application-class RV64 cores
# ---------------------------------------------------------------------------
application_class_cores:
