      - "TileLink-based UncoreA / Periphery / SystemBus"
      - "RoCC accelerator coprocessor interface (used by Gemmini)"
      - "originally Berkeley UCB-BAR; tracked under CHIPS Alliance"
      - "default boot path for Chipyard, BOOM, and many academic SoCs"
