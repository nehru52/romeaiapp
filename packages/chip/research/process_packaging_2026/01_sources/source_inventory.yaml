schema: eliza.process_packaging_2026.source_inventory.v1
captured_date: "2026-05-19"
scope:
  - 14A-class and sub-2 nm logic device architecture (nanosheet, GAA, forksheet, CFET, 2D)
  - frontside vs backside power delivery (PowerVia, Super Power Rail, BSPDN, BPR)
  - High-NA EUV lithography and pitch scaling at A14/A10
  - DTCO and STCO including cell-height reduction and contact-over-active-gate
  - BEOL materials and air-gap interconnect at advanced nodes
  - 2 nm-class SRAM density and Vmin
  - advanced packaging: CoWoS, InFO, SoIC, Foveros, EMIB, X-Cube, hybrid bonding
  - UCIe / BoW / OpenHBI / AIB chiplet interconnect
  - mobile chiplet evidence
  - thermal modeling for mobile (vapor chambers, AOSP thermal HAL)
  - reliability physics at GAA / sub-2 nm (BTI, HCI, TDDB, EM, soft error, self-heating)
claim_boundary: >
  Sources below are public papers, vendor pages, standards, foundry briefs, and
  IEEE / IRDS technology-plan chapters. They do not prove an E1 PDK, library, or signoff
  status. All process and packaging claims for E1 remain blocked behind the
  required_evidence entries in docs/spec-db/process-14a-effects.yaml.
source_policy:
  preferred:
    - IEEE / IRDS 2024 technology-plan chapters
    - ISSCC, IEDM, VLSI Symposium technical papers (peer reviewed)
    - foundry technical pages (TSMC, Intel Foundry, Samsung Foundry, Rapidus)
    - imec public research summaries
    - ASML technical and investor pages
    - JEDEC and IPC standards
  used_with_skepticism:
    - vendor marketing material
    - investor presentation slides
    - industry analyst projections (cost, yield)

irds_technology_plan_2024:
  - id: irds_2024_more_moore
    title: "IRDS 2024 -- More Moore"
    url: "https://irds.ieee.org/editions/2024/more-moore"
    source_type: technology_plan
    captured_points:
      - "GAA nanosheet expected at logic node N2 / 20 angstrom class in 2025--2026"
      - "CFET (complementary FET) projected to follow nanosheet circa 2030"
      - "Backside power delivery anticipated alongside the first generation of 2 nm-class logic"
      - "Contacted poly pitch (CPP) target ~45 nm and metal pitch (MMP) ~20 nm region for A14-class"
      - "DTCO / STCO declared a primary scaling driver in addition to lithographic pitch"
  - id: irds_2024_lithography
    title: "IRDS 2024 -- Lithography"
    url: "https://irds.ieee.org/editions/2024/lithography"
    source_type: technology_plan
    captured_points:
      - "High-NA EUV (0.55 NA) tools targeted for high-volume 14A-class production"
      - "Hyper-NA research path (NA > 0.55) explored for A10 and beyond"
      - "Stochastic defectivity, mask 3D effects, and resist thinness flagged as risks"
  - id: irds_2024_beol
    title: "IRDS 2024 -- Interconnect / BEOL"
    url: "https://irds.ieee.org/editions/2024/interconnect"
    source_type: technology_plan
    captured_points:
      - "Cobalt, ruthenium, and molybdenum candidate metals for advanced BEOL"
      - "Air-gap and low-k dielectric integration for capacitance reduction"
      - "Via resistance becomes a dominant interconnect bottleneck at sub-20 nm pitch"
      - "Semi-damascene flows under investigation for tight-pitch layers"
  - id: irds_2024_reliability
    title: "IRDS 2024 -- More Moore / Reliability section"
    url: "https://irds.ieee.org/editions/2024/more-moore"
    source_type: technology_plan
    captured_points:
      - "BTI shift increases at GAA/nanosheet due to higher gate field and confined channel"
      - "Self-heating in stacked nanosheets degrades performance and aging"
      - "TDDB and HCI margins narrow as Vdd is pinned near 0.7 V"
  - id: irds_2024_packaging
    title: "IRDS 2024 -- Packaging Integration"
    url: "https://irds.ieee.org/editions/2024/packaging-integration"
    source_type: technology_plan
    captured_points:
      - "Hybrid-bonding pitch trajectory toward sub-1 um anticipated by 2028"
      - "3D logic-on-logic and logic-on-memory integration projected as mainstream"
      - "Thermal density in 3D stacks identified as primary scaling limiter"

