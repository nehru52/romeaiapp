# Kokoro LoRA fine-tune on the `same` voice from lalalune/ai_voices.
#
# Status (Voice Wave 2): the same corpus is 58 paired wav/txt clips
# totaling 3.51 minutes. That is below the community-validated minimum
# for LoRA prosody re-targeting (1-3 h). The PRIMARY publish path for
# same is `extract_voice_embedding.py` (style-encoder average over
# the clips, no training, no gates lost). This YAML drives the
# EXPERIMENTAL LoRA path to satisfy the user's brief "test fine-tuning
# both" requirement. Publish only if the eval gates clear AND it beats
# the af_bella baseline on UTMOS / WER / SpkSim.
#
# Speaker similarity gate is relaxed from 0.65 to 0.55 (per R7 §4):
# with only ~5 held-out clips and one speaker, ECAPA cosine variance is
# high. 0.55 still rejects "fine-tune that destroyed timbre".

extends: base.yaml

# Identity. voice_name doubles as bundle artifact name and manifest fragment id.
# Matches the Kokoro `<lang><sex>_<name>` convention enforced by
# plugins/plugin-local-inference/src/services/voice/kokoro/__tests__/voices.test.ts.
voice_name: af_same
voice_display_name: Same (AI Voices, US English)
voice_lang: a
voice_tags:
  - female
  - same
  - eliza-1-voice
  - ai-voices-derived
  - research-only

# Inputs (override via CLI for portability). Documented here so reviewers
# see the intended corpus location.
dataset_path: packages/training/data/voice/same
run_dir: /tmp/kokoro-runs/same

# Per-corpus tuning for 58 clips. See R7 §3.
mode: lora
max_steps: 2000
eval_every: 200
checkpoint_every: 200
log_every: 10
warmup_steps: 100
val_fraction: 0.10

# LoRA hyperparameters and loss weights stay at base.yaml defaults
# (lr=1e-4, batch_size=8, grad_accum=4, rank=16, alpha=32, dropout=0.05,
# mel/duration/f0 = 1.0/0.01/0.1, adversarial off).

# Eval gates — relaxed speaker similarity per R7 §4.
gates:
  utmos_min: 3.8
  wer_max: 0.08
  speaker_similarity_min: 0.55
  rtf_min: 5.0
