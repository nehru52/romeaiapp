# G3 Kokoro full fine-tune — OmniVoice same teacher corpus.
#
# Key difference from F2 (kokoro_same_f2.yaml):
#   - Distillation corpus synthesized with same ref_s teacher (NOT af_bella).
#   - Target mix: ≥80% same-distilled, ≤20% augmented real.
#   - max_steps 8000 (per G3 brief).
#   - Lower anchor_weight (0.0005) to allow more adaptation on larger corpus.
#
# This is the structural fix F2's post-mortem prescribed:
#   "Use OmniVoice same preset to synthesize 60 min → train Kokoro on that"
#   (F2 §"What would actually work", Option A).
#
# Per repo policy: APOLLO optimizer only.

extends: base.yaml

voice_name: af_same
voice_display_name: Same (AI Voices, US English) — G3 Full FT
voice_lang: a
voice_tags:
  - female
  - same
  - eliza-1-voice
  - ai-voices-derived
  - research-only
  - full-finetune
  - g3-omnivoice-teacher

# Inputs. finetune_kokoro_full.py reads --run-dir from CLI.
dataset_path: packages/training/data/voice/same
run_dir: /tmp/kokoro-runs/same-g3

# Full FT hyperparameters for G3 (larger corpus, more steps).
mode: full
learning_rate: 3.0e-5         # slightly lower than F2 to prevent forgetting on 80-min corpus.
max_steps: 8000               # per G3 brief.
eval_every: 500               # 16 eval points across 8000 steps.
checkpoint_every: 500
log_every: 50
warmup_steps: 200
val_fraction: 0.10
batch_size: 1
grad_accum: 4

# Lower anchor weight — larger corpus gives the model more signal to adapt.
anchor_weight: 0.0005

# Early stopping.
early_stop_patience: 5        # more patience with 8000 steps.
keep_top_k: 3

# Loss weights.
mel_loss_weight: 1.0
duration_loss_weight: 0.0
f0_loss_weight: 0.0

# Eval gates.
gates:
  utmos_min: 3.8
  wer_max: 0.10
  speaker_similarity_min: 0.40
  rtf_min: 5.0
