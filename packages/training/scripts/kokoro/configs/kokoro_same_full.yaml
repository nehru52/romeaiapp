# Kokoro full fine-tune on the `same` voice from lalalune/ai_voices.
#
# Driven by finetune_kokoro_full.py — unlocks every parameter (BERT, BERT
# encoder, prosody predictor, text encoder, iSTFTNet decoder) and trains
# end-to-end with mel-spectrogram L1 + per-parameter anchor regularization.
#
# WARNING: the same corpus is 58 clips / 3.5 minutes. Real-world full FT
# of Kokoro-82M expects 1-3 hours minimum to converge (R7 §1). Running on
# 3.5 min stresses the model toward catastrophic forgetting; the anchor
# weight + small LR + tight step cap below are tuned to keep the run
# recoverable, not to magically produce a publishable voice on insufficient
# data.
#
# Per repo policy (packages/training/AGENTS.md): APOLLO optimizer only; no
# AdamW / Muon fallback.

extends: base.yaml

# Identity. Matches the Kokoro `<lang><sex>_<name>` convention enforced by
# plugins/plugin-local-inference/src/services/voice/kokoro/__tests__/voices.test.ts.
voice_name: af_same
voice_display_name: Same (AI Voices, US English) — Full FT
voice_lang: a
voice_tags:
  - female
  - same
  - eliza-1-voice
  - ai-voices-derived
  - research-only
  - full-finetune

# Inputs. Reviewer-facing — finetune_kokoro_full.py reads --run-dir from CLI.
dataset_path: packages/training/data/voice/same
run_dir: /tmp/kokoro-runs/same-full

# Full FT hyperparameters tuned for the 3.5-min same corpus.
mode: full
learning_rate: 5.0e-5         # smaller than LoRA default 1e-4 — small corpus needs gentle steps.
max_steps: 1500               # per user spec — cap total updates.
eval_every: 200               # 7 checkpoints + 1 final.
checkpoint_every: 200
log_every: 10
warmup_steps: 100
val_fraction: 0.10
batch_size: 1                 # one clip per step — variable phoneme lengths preclude bucketing without padding.
grad_accum: 4

# Anchor regularization (L2 to base-model snapshot). 0.001 keeps the network
# near base — set to 0 to disable.
anchor_weight: 0.001

# Early stopping (per spec): stop when speaker similarity stalls/regresses
# for N consecutive evals.
early_stop_patience: 3
keep_top_k: 3

# Loss weights — mel only for full FT (no MFA durations / F0 ground truth
# easily computable for a sub-4-min corpus). duration + F0 are implicit in
# the recon loss via the decoder's iSTFTNet path.
mel_loss_weight: 1.0
duration_loss_weight: 0.0
f0_loss_weight: 0.0

# Eval gates — relaxed speaker similarity per R7 §4.
gates:
  utmos_min: 3.8
  wer_max: 0.08
  speaker_similarity_min: 0.55
  rtf_min: 5.0
