# Turn detector fine-tune config — multilingual tier (4b / 9b / 27b).
#
# Targets the LiveKit `v0.4.1-intl` revision (Qwen2-0.5B, 14 languages).
# Bundle target is ~396 MB Q8 ONNX in upstream; the APOLLO-Mini fine-tune
# re-exports a Q8 ONNX at the same shape (drop-in for runtime callers
# that score `P(<|im_end|>)` at the last real-token position).
#
# Per repo policy (packages/training/AGENTS.md §1): APOLLO optimizer only.

tier: 4b
teacher_repo: livekit/turn-detector
teacher_revision: v0.4.1-intl

lora_rank: 16
optimizer: apollo
epochs: 1
learning_rate: 3.0e-5

# Auto-staged by `--pretrain-corpus oasst1-intl` — these paths are
# overwritten at runtime to the staged splits under <run-dir>/data/turn/.
train_data:
  - packages/training/data/turn/oasst1-intl.train.jsonl
eval_data:
  - packages/training/data/turn/oasst1-intl.eval.jsonl

f1_gate: 0.85
mean_latency_ms_gate: 30.0
