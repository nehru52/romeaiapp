# eliza1_gates.yaml — per-tier numeric eval gates for Eliza-1 bundles.
#
# Source of truth for the publish-blocking eval gates referenced by
# `packages/inference/AGENTS.md` §8 and the manifest `evals` block
# (`packages/app-core/src/services/local-inference/manifest/schema.ts` →
# `Eliza1EvalsSchema`). The publish orchestrator
# (`packages/training/scripts/publish/orchestrator.py`) loads this file via
# `benchmarks/eliza1_gates.py::load_gates` and runs `apply_gates(results, tier)`
# against the measured eval blob; a `required: true` gate that fails for the
# tier is publish-blocking, and `defaultEligible` is refused unless every
# required gate passes.
#
# `provisional: true` means the threshold is a placeholder that was NOT yet
# confirmed by an end-to-end measurement on real hardware. Provisional gates
# are recorded and reported, but they do not flip `defaultEligible` to false
# on their own — the threshold is calibrated, not yet enforced. Flip
# `provisional: false` once the e2e harness reproduces the threshold on the
# tier's reference hardware (see the per-gate `calibration` note).
#
# As of 2026-05-13 (wave2 T5 cleanup):
#   - text_eval is flipped non-provisional for every tier. The eval suite reads
#     a real held-out corpus from packages/training/datasets/eliza1-sft-0_8b/
#     test.jsonl (59 records, 8k chars); per-tier thresholds (0.55 → 0.66) are
#     conservative against the existing decay calibration, and the orchestrator's
#     new prior-bundle regression gate (5% tolerance by default) catches
#     measurement-vs-prior slips even when the threshold itself is met.
#   - voice_rtf / asr_wer / expressive_* / mtp_* stay provisional. Those
#     gates require runtime engines (fused llama-server, ASR FFI, drafter)
#     present on the publish host; until the CI matrix proves those land
#     repeatably on the reference hardware, they record `provisional: true`.
#   - All vad_*, barge_in_cancel_ms, thirty_turn_ok, e2e_loop_ok stay
#     non-provisional (already calibrated via packaged harnesses).
#   - Mobile / device-bound gates (peak_rss_mb, thermal_throttle_pct) remain
#     `needs_hardware: true` — they're skipped on hosts without the device
#     (recorded, not faked).
#
# Calibration sources (kernel/quant micro-benchmarks):
#   - packages/inference/BENCHMARK_2026-05-10.md   §7 (gate suggestions)
#   - packages/inference/bench_M4Max_2026-05-10.md
#   - packages/inference/SHADER_REVIEW_2026-05-10.md (dispatch shape)
#   - packages/inference/reports/kernel-optimization-review.md
#
# Hardware-dependent gates (`needs_hardware: true`) cannot be evaluated off
# device: a publish run on a host that lacks the device records them as
# "needs-hardware" (a null result), NOT as a pass. The CI matrix runs the
# device-bound subset on the relevant hardware nightly.

version: 2

# ---------------------------------------------------------------------------
# Gate definitions — name → comparison op + metadata. The op is applied as
# `measured <op> threshold`; `>=` for "higher is better", `<=` for "lower is
# better". `bool` gates take a boolean measurement and pass when true.
# ---------------------------------------------------------------------------
gates:
  text_eval:
    op: ">="
    unit: "score 0..1"
    manifest_field: "evals.textEval"
    description: "Held-out text-quality eval (judge or benchmark suite)."
  voice_rtf:
    op: "<="
    unit: "real-time factor"
    manifest_field: "evals.voiceRtf"
    description: "TTS real-time factor — seconds of compute per second of audio."
    calibration: "BENCHMARK_2026-05-10.md §7 — 0.4 defensible on M4 Max 9b; flip non-provisional after first e2e TTS RTF."
  asr_wer:
    op: "<="
    unit: "word error rate 0..1"
    manifest_field: "evals.asrWer"
    description: "ASR word error rate on the held-out speech eval set."
  vad_latency_ms:
    op: "<="
    unit: "ms"
    manifest_field: "evals.vadLatencyMs"
    description: "Median VAD speech-onset detection latency."
  vad_boundary_mae_ms:
    op: "<="
    unit: "ms"
    manifest_field: "evals.vadLatencyMs.boundaryMs"
    description: "Median absolute error of detected speech onset against labeled speech start."
  vad_endpoint_p95_ms:
    op: "<="
    unit: "ms"
    manifest_field: "evals.vadLatencyMs.endpointMs"
    description: "P95 endpoint overhang after labeled speech end."
  vad_false_bargein_per_hour:
    op: "<="
    unit: "events/hour"
    manifest_field: "evals.vadLatencyMs.falseBargeInRate"
    description: "Extrapolated false speech-start events per hour over silence/noise fixtures."
  first_token_latency_ms:
    op: "<="
    unit: "ms"
    manifest_field: null
    description: "Time from speech-end to the response model's first token (LatencyTracer ttftMs.p50)."
    calibration: "BENCHMARK_2026-05-10.md §7 — single-step decode under TurboQuant Q4 + MTP should land 50–120 ms on M4 Max; 200 ms keeps headroom."
  first_audio_latency_ms:
    op: "<="
    unit: "ms"
    manifest_field: null
    description: "Time from speech-end to the first TTS audio chunk played (LatencyTracer ttapMs.p50)."
    calibration: "BENCHMARK_2026-05-10.md §7 — loose at 400 ms; tighten to 250 ms once the e2e harness reproduces it."
  barge_in_cancel_ms:
    op: "<="
    unit: "ms"
    manifest_field: null
    description: "Time from VAD 'words detected' to TTS+LLM cancellation acknowledged (bargein_latency_harness.mjs)."
  thirty_turn_ok:
    op: "bool"
    manifest_field: "evals.thirtyTurnOk"
    description: "A 30-turn synthetic conversation completed without crash, leak, or RSS exceeding ramBudgetMb.recommended (thirty_turn_endurance_harness.mjs)."
  e2e_loop_ok:
    op: "bool"
    manifest_field: "evals.e2eLoopOk"
    description: "One mic→speech end-to-end loop completed (all LatencyTracer checkpoints recorded)."
  mtp_acceptance:
    op: ">="
    unit: "ratio 0..1"
    manifest_field: "evals.mtpAcceptance"
    description: "MTP speculative-decode acceptance rate (n_drafted_accepted / n_drafted) over the bench run."
    calibration: "Depends on the trained drafter — not benchmarkable from kernel numbers; stays provisional until an e2e run with a real drafter (BENCHMARK_2026-05-10.md §7)."
  mtp_speedup:
    op: ">="
    unit: "× (drafter-on tok/s ÷ baseline tok/s)"
    manifest_field: "evals.mtpSpeedup"
    description: "End-to-end generation speedup from MTP speculative decoding, measured by mtp_drafter_runtime_smoke.mjs --bench."
    calibration: "Placeholder until a trained drafter exists; the bench records null on no-hardware (recorded, not faked)."
  expressive_tag_faithfulness:
    op: ">="
    unit: "ratio 0..1"
    manifest_field: "evals.expressive.tagFaithfulness"
    description: "Fraction of emotion/singing tags rendered with the intended affect."
  expressive_mos:
    op: ">="
    unit: "MOS 1..5"
    manifest_field: "evals.expressive.mosExpressive"
    description: "Mean opinion score on expressive (emotion/singing) prompts."
  expressive_tag_leakage:
    op: "<="
    unit: "ratio 0..1"
    manifest_field: "evals.expressive.tagLeakage"
    description: "Fraction of audio frames where a tag literal ('[happy]') leaked into the spoken output."
  peak_rss_mb:
    op: "<="
    unit: "MB"
    manifest_field: null
    needs_hardware: true
    description: "Mobile peak resident-set size over a representative voice session (mobile_peak_rss_harness.mjs — needs iOS/Android device)."
  thermal_throttle_pct:
    op: "<="
    unit: "% of session"
    manifest_field: null
    needs_hardware: true
    description: "Fraction of a mobile voice session spent thermally throttled (mobile_peak_rss_harness.mjs — needs device)."

# ---------------------------------------------------------------------------
# MTP speculative-decoding bench gates. Distinct section so the bench
# report writer (`mtp_drafter_runtime_smoke.mjs --bench`) and the
# manifest evals writer can reference it directly. Both thresholds are
# placeholders that become real once a trained drafter exists — a bench run
# on hardware without the spec binary / drafter records a null entry
# ("needs hardware"), never a fabricated number (AGENTS.md §3 / §7).
mtp:
  # Minimum acceptance rate (accepted speculative tokens / drafted tokens).
  minAcceptanceRate: 0.65
  # Minimum end-to-end generation speedup (drafter-on tok/s ÷ baseline tok/s).
  minSpeedup: 1.5
  provisional: true
  benchReportGlob: "packages/inference/reports/mtp-bench/mtp-bench-*.json"
  calibration: "BENCHMARK_2026-05-10.md §7 — acceptance threshold is the published target; speedup is a placeholder. Flip provisional:false after a real drafter + e2e run reproduces both."

# ---------------------------------------------------------------------------
# Per-tier thresholds. `required: true` → publish-blocking for that tier.
# A gate omitted for a tier is not evaluated for that tier.
# ---------------------------------------------------------------------------
