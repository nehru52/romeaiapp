      en: ["shift weight left", "load left foot", "stand on left foot",
           "lean onto left foot", "plant left foot"]
    description: "Keep the body upright while loading the left foot and unloading the right foot."
    reward:
      upright_weight: 1.5
      height_track_weight: 0.8
      gait_phase_weight: 1.0
      stance_contact_weight: 2.0
      foot_clearance_weight: 1.0
      no_support_weight: 4.0
      double_support_weight: 1.0
      foot_slip_weight: -2.0
      max_foot_slip_margin_weight: 25.0
      action_rate_weight: -0.01
    success:
      torso_z_min_ratio: 0.75
      left_foot_contact_required: true
      right_foot_contact_required: false
      max_abs_delta_x_m: 0.05
      max_abs_delta_y_m: 0.35
      max_abs_delta_yaw_rad: 0.25
      no_fall: true
      hold_s: 0.25
      max_foot_slip_m_s: 0.35
      max_self_collision_count: 0
    max_episode_s: 4.0

  - id: weight_shift_right
