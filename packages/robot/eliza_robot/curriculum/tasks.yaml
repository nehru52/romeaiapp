# Curriculum task specification — single source of truth for the
# text-conditioned RL policy.
#
# Every task here is consumed by:
#   - the bridge's policy.start handler (task name lookup)
#   - the Alberta trainer and PPO/Brax baselines (env factory + reward + text embedding)
#   - the motion-analysis testbed (programmatic success criteria)
#   - the plugin's action surface (text variants → similes)
#
# Tiers reflect training order: a policy must converge on tier-1 before
# moving to tier-2 (curriculum learning).
#
# Required fields per task:
#   id              kebab-case canonical id (Python identifier-safe)
#   tier            1 | 2 | 3
#   verbs           list of text variants (English first; other languages
#                   prefixed by ISO code if added later)
#   description     1-sentence description for text encoder
#   action_dim      24 (always — AiNex DoF)
#   reward          high-level structure (parsed by env factory)
#   success         programmatic success predicate (parsed by testbed)
#   max_episode_s   episode timeout in seconds
#   requires_target boolean — does the task need a target entity in the scene

version: 2
default_action_dim: 24
default_max_episode_s: 8.0

tiers:
  1:
    name: "fundamentals"
    description: "Single-skill behaviours the robot must master before composition."
  2:
    name: "compositional"
    description: "Behaviours that chain or modulate the tier-1 skills."
  3:
    name: "long-horizon"
    description: "Goal-directed behaviours requiring perception + navigation."

# =============================================================================
# Tier 1: fundamentals
# =============================================================================
tasks:

  - id: stand_up
    tier: 1
    verbs:
      en: ["stand up", "stand", "rise", "stand still", "hold still",
           "be still", "go upright", "stand to attention"]
      es: ["levántate", "ponte de pie", "quédate quieto"]
      fr: ["lève-toi", "reste debout", "tiens-toi droit"]
      ja: ["立て", "立ち上がれ", "じっとして"]
      zh: ["站起来", "站好", "保持站立"]
    description: "Return to and maintain the calibrated standing pose."
    # Generic crouch remains conservative until each profile has authored
    # seated keyframes; HiWonder overrides below use a deeper validated crouch.
    init_state: "crouch"
    init_torso_height_ratio: 0.90
    init_foot_clearance_m: 0.0
    min_init_stand_height_drop_m: 0.03
    profile_init:
      hiwonder-ainex:
        init_torso_height_ratio: 0.65
        init_hip_pitch_rad: -0.80
        init_knee_rad: 1.60
        init_ankle_pitch_rad: 0.80
        min_init_stand_height_drop_ratio: 0.15
    reward:
      torso_height_target_ratio: 1.0
      torso_height_tolerance_ratio: 0.12
      upright_weight: 2.0
      action_rate_weight: -0.01
      energy_weight: -0.0001
      progress_weight: 1.5
    success:
      torso_z_min_ratio: 0.90
      torso_z_max_ratio: 1.25
      torso_z_delta_min_ratio: 0.12
      hold_s: 2.0
      fall_pitch_rad: 0.5
      fall_roll_rad: 0.5
    max_episode_s: 4.0

  - id: sit_down
    tier: 1
    verbs:
      en: ["sit down", "sit", "crouch", "lower yourself", "take a seat", "rest"]
      es: ["siéntate", "agáchate"]
      ja: ["座って", "しゃがんで"]
      zh: ["坐下", "蹲下"]
    description: "Lower the hips into a stable seated/crouched pose without tipping."
    reward:
      torso_height_target_m: 0.16
      torso_height_tolerance_m: 0.03
      upright_weight: 1.0
      action_rate_weight: -0.01
    success:
      torso_z_min_m: 0.13
      torso_z_max_m: 0.20
      max_abs_delta_x_m: 0.10
      max_abs_delta_y_m: 0.10
      max_abs_delta_yaw_rad: 0.35
      no_fall: true
      hold_s: 1.0
    max_episode_s: 4.0

  - id: weight_shift_left
