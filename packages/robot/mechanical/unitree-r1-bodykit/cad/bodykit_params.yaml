source_robot_subassemblies:
  torso_chest_core_shell:
    region: hips_torso_chest_back
    source_robot_anchor:
      mounted_body: torso_link
      source_bodies: [torso_link, waist_yaw_link]
      oem_baseline_meshes: [torso_collision.stl, waist_yaw_link.STL]
      anchor_role: front torso chest core shell
    parts:
      - torso_chest_shell
  central_chest_bridge_trim:
    region: hips_torso_chest_back
    source_robot_anchor:
      mounted_body: torso_link
      source_bodies: [torso_link, waist_yaw_link]
      oem_baseline_meshes: [torso_collision.stl, waist_yaw_link.STL]
      anchor_role: central chest bridge and black trim inserts
    parts:
      - chest_upper_bridge_armor
      - chest_lower_bridge_armor
      - chest_sensor_black
      - chest_panel_seam_black
      - chest_under_bust_black
  left_chest_side_panel:
