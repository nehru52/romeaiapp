      - left_thigh_side_armor
      - right_thigh_front_armor
      - right_thigh_side_armor
      - left_foot_toe_armor
      - left_foot_sole_black
      - left_foot_heel_black
      - right_foot_top_shell
      - right_foot_toe_armor
      - right_foot_sole_black
      - right_foot_heel_black
