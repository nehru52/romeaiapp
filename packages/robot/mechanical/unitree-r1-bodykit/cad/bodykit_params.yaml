project:
  id: unitree-r1-orange-android-bodykit
  base_profile: unitree-r1
  base_mjcf: ../../assets/profiles/unitree-r1/mjcf/R1_C++.xml
  output_mjcf: out/mjcf/R1_C++_bodykit.xml

materials:
  orange_armor:
    color_rgba: [1.0, 0.28, 0.03, 1.0]
    prototype: FDM PETG or ASA
    production: injection molded PC-ABS, high-gloss orange paint or molded color
  black_underbody:
    color_rgba: [0.01, 0.012, 0.014, 1.0]
    prototype: FDM ASA
    production: injection molded black PC-ABS
  face_shell:
    color_rgba: [0.98, 0.78, 0.68, 1.0]
    prototype: SLA resin master or high-resolution MJF/SLS
    production: painted hard plastic face shell
    visual_finish:
      render_smooth_normals: true
      satin_clearcoat: 0.18
      roughness: 0.46
      preserve_collision_mesh: true
  eye_lip_detail:
    color_rgba: [0.02, 0.012, 0.014, 1.0]
    prototype: painted inserts
    production: separate small molded or painted inserts
  lip_detail:
    color_rgba: [0.88, 0.07, 0.06, 1.0]
    prototype: painted flexible-color insert
    production: separate small molded or painted lip insert

fit:
  nominal_chassis_clearance_mm: 8.0
  dynamic_joint_clearance_mm: 18.0
  articulated_body_distance: 3
  mechanical_sweep_fraction: 0.65
  operating_sweep_fraction: 0.25
  nominal_panel_gap_mm: 2.5
  seated_detail_gap_mm: 0.1
  min_print_wall_mm: 2.4
  min_mold_wall_mm: 2.0
  boss_wall_mm: 2.2
  draft_deg: 2.0
  shrink_allowance_percent: 0.6

style:
  no_hair: true
  no_glasses: true
  orange_black_android_reference: true
  concept_reference_image: cad/source-assets/concept/eliza_front_reference.png
  concept_reference_mesh: cad/source-assets/concept/eliza_front_reference.glb
  concept_reference_usage: front/side/rear modeling-view background plate for orange-black hard-plastic armor proportions; hair and glasses are excluded from generated geometry
  face: open human-generator donor face, hard-plastic humanoid shell with large almond eyes, slim nose, full lips, and reference-matched proportions
  face_alignment_targets:
    source: eliza_front_reference.png visible-face proportions, excluding hair and glasses
    min_face_depth_mm: 12.0
    face_height_to_width_yz: 1.44
    eye_span_to_face_width: 0.50
    eye_center_down_from_face_top: 0.41
    eye_width_to_face_width: 0.27
    mouth_center_down_from_face_top: 0.76
    mouth_width_to_face_width: 0.34
    tolerance: 0.08
  body: glossy orange armor panels over black mechanical gaps, derived from Unitree R1 OEM mesh envelopes rather than freehand primitives

morphs:
  feminine_compact_v1:
    intent: thinner compact armored silhouette with preserved connection centers and no forward chassis growth
    blend: 1.0
    preserve_centers: true
    no_forward_growth: true
    controls:
      waist_y_scale: 0.88
      lower_rib_y_scale: 0.92
      abdomen_x_scale: 0.92
      pelvis_y_scale: 0.90
      shin_underbody_y_scale: 0.84
      forearm_blade_y_scale: 0.67
      forearm_blade_z_scale: 0.72
      wrist_cuff_radius_scale: 0.86
      chest_outer_y_scale: 1.12
    applied_parts:
      - torso_chest_shell
      - chest_upper_bridge_armor
      - chest_lower_bridge_armor
      - left_chest_contour_armor
      - right_chest_contour_armor
      - left_chest_outer_armor_skin
      - right_chest_outer_armor_skin
      - abdomen_center_armor
