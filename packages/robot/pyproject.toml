[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "eliza-robot"
version = "2.0.0b0"
description = "Python robotics stack for elizaOS: MuJoCo sim, Alberta continual-RL training, Brax/MJX baselines, websocket bridge, perception, and trajectory DB. Profile-driven for multi-robot support; first profile is Hiwonder AiNex."
readme = "README.md"
requires-python = ">=3.12,<3.13"

dependencies = [
  # Simulation
  "mujoco>=3.2",
  "mujoco-mjx>=3.2",
  # Differentiable physics + RL training. JAX is the substrate; local
  # development uses JAX_PLATFORMS=cpu, long training runs offload to GPU.
  "jax>=0.4.30",
  "jaxlib>=0.4.30",
  "brax>=0.10",
  # numpy<2 keeps us compatible with the brax/mujoco/jax wheel matrix that
  # has not yet finished the numpy 2.x ABI migration. Revisit when brax
  # publishes numpy>=2 wheels.
  "numpy<3",
  # Schema + transport
  "pydantic>=2",
  "websockets>=12",
  # Perception
  "opencv-python-headless>=4.10",
  "Pillow>=10",
  "imageio[ffmpeg]>=2.34",
  "sentence-transformers>=3",
  "onnxruntime>=1.18",
  # CLI / DX
  "rich>=13",
  "typer>=0.12",
  # Tests + lint
  "pytest>=8",
  "pytest-asyncio>=0.23",
  "ruff>=0.6",
  "roslibpy>=2.0.0",
  "stable-baselines3>=2.8.0",
  "gymnasium>=1.2.3",
  # Alberta Plan continual-learning framework (vendored at packages/alberta).
  # Provides the streaming continual-RL control + plasticity machinery used by
  # eliza_robot.rl.alberta. Requires Python 3.12 (PEP 695 syntax).
  "alberta-framework",
  "playground>=0.2.0",
]

[project.optional-dependencies]
gpu = [
  "jax[cuda12]>=0.4",
]

[project.scripts]
eliza-robot-sim = "eliza_robot.sim.mujoco.sim_loop:main"
eliza-robot-bridge = "eliza_robot.bridge.server:main"
eliza-robot-train = "eliza_robot.rl.text_conditioned.train:main"
eliza-robot-train-alberta = "eliza_robot.rl.alberta.train_robot:main"
eliza-robot-benchmark-alberta = "eliza_robot.rl.alberta.benchmark:main"
eliza-robot-benchmark-classic-control = "eliza_robot.rl.alberta.classic_control_benchmark:main"
eliza-robot-compare-backends = "scripts.compare_text_conditioned_backends:main"
eliza-robot-prepare-full-training = "scripts.prepare_end_to_end_full_training:main"
eliza-robot-run-full-training-bundle = "scripts.run_end_to_end_full_training_bundle:main"
eliza-robot-monitor-nebius-full-training = "scripts.monitor_nebius_full_training_run:main"
eliza-robot-finalize-nebius-full-training = "scripts.finalize_nebius_full_training_run:main"
eliza-robot-generate-nebius-training-report = "scripts.generate_nebius_training_report:main"
eliza-robot-generate-alberta-report = "scripts.generate_alberta_end_to_end_report:main"
eliza-robot-render-alberta-obstacle-demo = "scripts.render_alberta_obstacle_demo:main"
eliza-robot-closeout-nebius-full-training = "scripts.closeout_nebius_full_training_run:main"
eliza-robot-inventory-nebius-training-artifacts = "scripts.inventory_nebius_training_artifacts:main"
eliza-robot-plan-nebius-training-cleanup = "scripts.plan_nebius_training_cleanup:main"
eliza-robot-plan-nebius-training-relaunch = "scripts.plan_nebius_training_relaunch:main"
eliza-robot-launch-prepared-nebius-clean-run = "scripts.launch_prepared_nebius_clean_run:main"
eliza-robot-watch-nebius-training-runtime = "scripts.watch_nebius_training_runtime:main"
eliza-robot-validate-nebius-instance-launch = "scripts.validate_nebius_instance_launch_hygiene:main"
eliza-robot-validate-alberta-benchmark = "scripts.validate_alberta_benchmark_artifacts:main"
eliza-robot-validate-alberta-checkpoint = "scripts.validate_alberta_robot_checkpoint:main"
eliza-robot-validate-alberta-vendoring = "scripts.validate_alberta_vendoring:main"
eliza-robot-validate-alberta-integration = "scripts.validate_alberta_integration_surfaces:main"
eliza-robot-validate-asimov1-production-checkpoint = "scripts.validate_asimov1_production_checkpoint:main"
eliza-robot-validate-full-training-preflight = "scripts.validate_end_to_end_full_training_preflight:main"
eliza-robot-validate-nebius-full-training = "scripts.validate_nebius_full_training_run:main"
eliza-robot-validate-training-inputs = "scripts.validate_robot_training_inputs:main"
eliza-robot-review-video-evidence = "scripts.review_robot_video_evidence:main"
eliza-robot-validate-backend-comparison = "scripts.validate_backend_comparison_artifacts:main"
eliza-robot-audit-alberta-objective = "scripts.audit_alberta_objective_completion:main"

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
addopts = "-q"
asyncio_mode = "auto"
markers = [
  "slow: opt-in integration benchmark (loads JAX/MJX, needs a trained checkpoint)",
]

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [
  ".git",
  ".venv",
  "build",
  "checkpoints",
  "data",
  "out",
  "generated",
]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM"]
ignore = ["E501"]

[tool.uv]
package = true

[tool.uv.sources]
alberta-framework = { path = "../alberta", editable = true }

[tool.setuptools.packages.find]
where = ["."]
include = ["eliza_robot*", "scripts*"]
exclude = ["tests*", "src*"]

[tool.setuptools.package-data]
"eliza_robot.curriculum" = ["tasks.yaml"]
