          right_elbow_joint: -0.785398
          right_wrist_yaw_joint: 0.0
          waist_yaw_joint: 0.0
          neck_pitch_joint: 0.0
          neck_yaw_joint: 0.0
safety:
  fall_pitch_rad: 0.7
  fall_roll_rad: 0.7
  battery_low_mv: 1
  deadman_timeout_s: 1.0
bridge_capabilities:
- asimov.mode
- asimov.velocity
- asimov.trajectory
- walk.command
- walk.set
- servo.set
- policy.tick
- action.play
- profile.describe
- camera.snapshot
