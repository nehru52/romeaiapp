  - right_foot2_collision
  - right_foot3_collision
  - right_foot4_collision
  - right_foot5_collision
  - right_toe1_collision
  - right_toe2_collision
  - right_toe3_collision
  - right_toe4_collision
  - right_toe5_collision
sensors:
  imu_noise_std: 0.01
  locomotion_tracking_body: pelvis_link
  cameras:
  - name: front_camera
    width: 640
    height: 480
    fps: 30
    fov_deg: 60.0
    mount_link: pelvis_link
    extrinsics_rpy_xyz:
    - 0
    - 0
    - 0
    - 0
    - 0
    - 0
control:
  rate_hz: 50.0
  command_smoothing: 0.2
  max_joint_delta_rad_per_step: 0.3
  safe_torque_clip_nm: 20.0
assets:
  mjcf_xml: mjcf/asimov_eliza.xml
  mjx_xml: mjcf/asimov_eliza.xml
  urdf: asimov.urdf
  mesh_dir: meshes
actions:
  groups:
    stand:
      name: stand
      duration_s: 1.0
      frames:
      - t: 0.0
        joints:
          left_hip_pitch_joint: 0.0
          left_hip_roll_joint: 0.0
          left_hip_yaw_joint: 0.0
          left_knee_joint: 0.0
          left_ankle_pitch_joint: 0.0
          left_ankle_roll_joint: 0.0
