gait:
  cycle_hz: 1.0
  swing_height_m: 0.08
  stance_width_m: 0.135
  step_length_max_m: 0.18
  foot_offset_m: -0.63
  default_height_m: 0.63
  controller: rl
contact:
  floor_geom_names: [floor]
  left_foot_geom_names:
  - left_foot1_collision
  - left_foot2_collision
  - left_foot3_collision
  - left_foot4_collision
  - left_foot6_collision
  - left_toe1_collision
  - left_toe2_collision
  - left_toe3_collision
  - left_toe4_collision
  - left_toe5_collision
  right_foot_geom_names:
