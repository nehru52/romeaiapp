# Hiwonder AiNex — 24-DoF humanoid (Hiwonder educational robot).
#
# Joint inventory, limits, and group split are taken from:
#   ainex-robot-code/bridge/isaaclab/joint_map.py        (JOINT_TABLE)
#   ainex-robot-code/training/mujoco/ainex_constants.py  (LEG/HEAD/ARM order)
#   ainex-robot-code/bridge/isaaclab/ainex_cfg.py        (actuator stiffness,
#                                                         effort_limit, STAND
#                                                         joint positions)
#
# Actuator order matches `ALL_JOINT_NAMES = LEG + HEAD + ARM` from
# ainex_constants.py, which is the order the bridge servo_set payloads use.
#
# Asset paths are relative to `packages/robot/assets/profiles/hiwonder-ainex/`;
# the loader resolves them to absolute paths. Asset files themselves are
# populated by sibling agent W2.2.

id: hiwonder-ainex
name: Hiwonder AiNex
version: "1.0.0"
description: >-
  24-DoF Hiwonder AiNex humanoid (12 legs + 2 head + 10 arms incl. grippers).
  First-class profile in the eliza_robot stack; backs both MuJoCo sim and
  the physical robot via the websocket bridge.

# ---------------------------------------------------------------------------
# Kinematics — 24 actuated joints in canonical order.
# Limits from JOINT_TABLE (uniform ±2.09 rad on the real Hiwonder servos).
# Home pose from STAND_JOINT_POSITIONS in ainex_cfg.py.
# Actuator torque (effort=6.0 N·m) and velocity (100 rad/s) from JOINT_TABLE.
# ---------------------------------------------------------------------------
kinematics:
  dof: 24
  joints:
    # --- LEGS (indices 0–11) ---
    - { name: r_hip_yaw,    index: 0,  lower_rad: -2.09, upper_rad: 2.09, home_rad:  0.000, group: LEG, actuator_torque_nm: 6.0, velocity_max_rad_s: 100.0 }
    - { name: r_hip_roll,   index: 1,  lower_rad: -2.09, upper_rad: 2.09, home_rad:  0.000, group: LEG, actuator_torque_nm: 6.0, velocity_max_rad_s: 100.0 }
    - { name: r_hip_pitch,  index: 2,  lower_rad: -2.09, upper_rad: 2.09, home_rad:  0.000, group: LEG, actuator_torque_nm: 6.0, velocity_max_rad_s: 100.0 }
    - { name: r_knee,       index: 3,  lower_rad: -2.09, upper_rad: 2.09, home_rad:  0.000, group: LEG, actuator_torque_nm: 6.0, velocity_max_rad_s: 100.0 }
    - { name: r_ank_pitch,  index: 4,  lower_rad: -2.09, upper_rad: 2.09, home_rad:  0.000, group: LEG, actuator_torque_nm: 6.0, velocity_max_rad_s: 100.0 }
    - { name: r_ank_roll,   index: 5,  lower_rad: -2.09, upper_rad: 2.09, home_rad:  0.000, group: LEG, actuator_torque_nm: 6.0, velocity_max_rad_s: 100.0 }
    - { name: l_hip_yaw,    index: 6,  lower_rad: -2.09, upper_rad: 2.09, home_rad:  0.000, group: LEG, actuator_torque_nm: 6.0, velocity_max_rad_s: 100.0 }
    - { name: l_hip_roll,   index: 7,  lower_rad: -2.09, upper_rad: 2.09, home_rad:  0.000, group: LEG, actuator_torque_nm: 6.0, velocity_max_rad_s: 100.0 }
    - { name: l_hip_pitch,  index: 8,  lower_rad: -2.09, upper_rad: 2.09, home_rad:  0.000, group: LEG, actuator_torque_nm: 6.0, velocity_max_rad_s: 100.0 }
    - { name: l_knee,       index: 9,  lower_rad: -2.09, upper_rad: 2.09, home_rad:  0.000, group: LEG, actuator_torque_nm: 6.0, velocity_max_rad_s: 100.0 }
    - { name: l_ank_pitch,  index: 10, lower_rad: -2.09, upper_rad: 2.09, home_rad:  0.000, group: LEG, actuator_torque_nm: 6.0, velocity_max_rad_s: 100.0 }
    - { name: l_ank_roll,   index: 11, lower_rad: -2.09, upper_rad: 2.09, home_rad:  0.000, group: LEG, actuator_torque_nm: 6.0, velocity_max_rad_s: 100.0 }
    # --- HEAD (indices 12–13) ---
    - { name: head_pan,     index: 12, lower_rad: -2.09, upper_rad: 2.09, home_rad:  0.000, group: HEAD, actuator_torque_nm: 6.0, velocity_max_rad_s: 100.0 }
    - { name: head_tilt,    index: 13, lower_rad: -2.09, upper_rad: 2.09, home_rad:  0.000, group: HEAD, actuator_torque_nm: 6.0, velocity_max_rad_s: 100.0 }
    # --- ARMS (indices 14–23). Home pose from STAND_JOINT_POSITIONS. ---
    - { name: r_sho_pitch,  index: 14, lower_rad: -2.09, upper_rad: 2.09, home_rad:  0.000, group: ARM, actuator_torque_nm: 6.0, velocity_max_rad_s: 100.0 }
    - { name: r_sho_roll,   index: 15, lower_rad: -2.09, upper_rad: 2.09, home_rad:  1.403, group: ARM, actuator_torque_nm: 6.0, velocity_max_rad_s: 100.0 }
    - { name: r_el_pitch,   index: 16, lower_rad: -2.09, upper_rad: 2.09, home_rad:  0.000, group: ARM, actuator_torque_nm: 6.0, velocity_max_rad_s: 100.0 }
    - { name: r_el_yaw,     index: 17, lower_rad: -2.09, upper_rad: 2.09, home_rad:  1.226, group: ARM, actuator_torque_nm: 6.0, velocity_max_rad_s: 100.0 }
    - { name: r_gripper,    index: 18, lower_rad: -2.09, upper_rad: 2.09, home_rad:  0.000, group: ARM, actuator_torque_nm: 6.0, velocity_max_rad_s: 100.0 }
    - { name: l_sho_pitch,  index: 19, lower_rad: -2.09, upper_rad: 2.09, home_rad:  0.000, group: ARM, actuator_torque_nm: 6.0, velocity_max_rad_s: 100.0 }
    - { name: l_sho_roll,   index: 20, lower_rad: -2.09, upper_rad: 2.09, home_rad: -1.403, group: ARM, actuator_torque_nm: 6.0, velocity_max_rad_s: 100.0 }
    - { name: l_el_pitch,   index: 21, lower_rad: -2.09, upper_rad: 2.09, home_rad:  0.000, group: ARM, actuator_torque_nm: 6.0, velocity_max_rad_s: 100.0 }
    - { name: l_el_yaw,     index: 22, lower_rad: -2.09, upper_rad: 2.09, home_rad: -1.226, group: ARM, actuator_torque_nm: 6.0, velocity_max_rad_s: 100.0 }
    - { name: l_gripper,    index: 23, lower_rad: -2.09, upper_rad: 2.09, home_rad:  0.000, group: ARM, actuator_torque_nm: 6.0, velocity_max_rad_s: 100.0 }

# ---------------------------------------------------------------------------
# Gait — defaults from GAIT_SOURCE_CODE.py:
#   swing_height default = 0.08 m
#   gait_frequency_range = (1.0, 1.5) Hz → midpoint 1.25 Hz baseline
# Stance width / step length / default torso height taken from the AiNex
# joystick training defaults (Hiwonder spec: ~0.25 m spawn height).
# ---------------------------------------------------------------------------
gait:
  cycle_hz: 1.25
  swing_height_m: 0.08
  stance_width_m: 0.10
  step_length_max_m: 0.05
  foot_offset_m: -0.25
  default_height_m: 0.25
  controller: bezier

contact:
  floor_geom_names: [floor]
  left_foot_geom_names: [l_foot1, l_foot2]
  right_foot_geom_names: [r_foot1, r_foot2]

# ---------------------------------------------------------------------------
# Sensors — single forward-facing RGB camera on the head link.
# Hiwonder AiNex stock camera is the OV5640 module (~120° wide FOV) at
# 640×480 @ 30 fps in the bridge perception pipeline.
# ---------------------------------------------------------------------------
sensors:
  imu_noise_std: 0.01
  # Locomotion rewards and success predicates must track the torso, not the
  # camera/head link; otherwise head pitch can masquerade as task progress.
  locomotion_tracking_body: body_link
  cameras:
    - name: head_rgb
      width: 640
      height: 480
      fps: 30
      fov_deg: 120.0
      mount_link: head_tilt_link
      # (roll, pitch, yaw, x, y, z) in head_tilt_link frame.
      extrinsics_rpy_xyz: [0.0, 0.0, 0.0, 0.05, 0.0, 0.03]

# ---------------------------------------------------------------------------
# Control — 50 Hz outer loop matches the AiNex bridge default. Joint delta
# cap = ~0.3 rad/step gives a smooth servo response without locking limits.
# ---------------------------------------------------------------------------
control:
  rate_hz: 50.0
  command_smoothing: 0.2
  max_joint_delta_rad_per_step: 0.3
  safe_torque_clip_nm: 6.0

# ---------------------------------------------------------------------------
# Assets — paths relative to assets/profiles/hiwonder-ainex/.
# Files are dropped in by sibling agent W2.2.
# ---------------------------------------------------------------------------
assets:
  mjcf_xml: mjcf/ainex.xml
  mjx_xml: mjcf/ainex_mjx.xml
  urdf: urdf/ainex.urdf.xacro
  mesh_dir: meshes

# ---------------------------------------------------------------------------
# Actions — predefined scripted gestures, replayable via `action.play`.
# Seed frame values use home-pose offsets plus representative joint deltas.
# Promote these to calibrated production gestures only after real-robot
# recordings or simulator review confirm timing and joint limits.
# ---------------------------------------------------------------------------
actions:
  groups:
    stand:
      name: stand
      duration_s: 1.0
      frames:
        - t: 0.0
          joints:
            r_hip_pitch: 0.0
            r_knee: 0.0
            r_ank_pitch: 0.0
            l_hip_pitch: 0.0
            l_knee: 0.0
            l_ank_pitch: 0.0
            r_sho_roll: 1.403
            l_sho_roll: -1.403
            r_el_yaw: 1.226
            l_el_yaw: -1.226
    sit:
      name: sit
      duration_s: 1.5
      frames:
        - t: 0.0
          # Seed pose: currently mirrors `stand` as a starting pose.
          joints: { r_hip_pitch: 0.0, l_hip_pitch: 0.0, r_knee: 0.0, l_knee: 0.0 }
        - t: 1.5
          # Seed pose: rough crouch with hips forward, knees bent, ankles back.
          joints:
            r_hip_pitch: -0.9
            l_hip_pitch: -0.9
            r_knee:  1.6
            l_knee:  1.6
            r_ank_pitch: -0.7
            l_ank_pitch: -0.7
    wave:
      name: wave
      duration_s: 2.0
      frames:
        - t: 0.0
          # Seed pose: start with right arm at home stand pose.
          joints: { r_sho_pitch: 0.0, r_sho_roll: 1.403, r_el_pitch: 0.0, r_el_yaw: 1.226 }
        - t: 1.0
          # Seed pose: right arm raised, elbow bent, wave peak.
          joints: { r_sho_pitch: -1.2, r_sho_roll: 0.6, r_el_pitch: 0.0, r_el_yaw: 0.4 }
        - t: 2.0
          # Seed pose: return to home.
          joints: { r_sho_pitch: 0.0, r_sho_roll: 1.403, r_el_pitch: 0.0, r_el_yaw: 1.226 }
    bow:
      name: bow
      duration_s: 2.0
      frames:
        - t: 0.0
          # Seed pose: start at stand.
          joints: { r_hip_pitch: 0.0, l_hip_pitch: 0.0, head_tilt: 0.0 }
        - t: 1.0
          # Seed pose: torso forward via hip pitch + head down.
          joints: { r_hip_pitch: -0.5, l_hip_pitch: -0.5, head_tilt: 0.5 }
        - t: 2.0
          # Seed pose: return to upright stand.
          joints: { r_hip_pitch: 0.0, l_hip_pitch: 0.0, head_tilt: 0.0 }

# ---------------------------------------------------------------------------
# Safety — values from task spec: 0.5 rad fall threshold, 6.6 V LiPo low-cell
# cutoff (6600 mV), 1.0 s deadman timeout.
# ---------------------------------------------------------------------------
safety:
  fall_pitch_rad: 0.5
  fall_roll_rad: 0.5
  battery_low_mv: 6600
  deadman_timeout_s: 1.0

# ---------------------------------------------------------------------------
# Bridge capabilities — subset of bridge VALID_COMMANDS this profile supports.
# Matches the AiNex backend in ainex-robot-code/bridge/protocol.py.
# ---------------------------------------------------------------------------
bridge_capabilities:
  - walk.set
  - walk.command
  - head.set
  - action.play
  - servo.set
  - policy.start
  - policy.stop
  - policy.tick
  - policy.status
