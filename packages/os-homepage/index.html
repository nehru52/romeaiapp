<!doctype html>

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0B35F1" />
    <!--
      no-referrer prevents any outbound request (analytics, image CDNs,
      third-party scripts) from carrying a Referer header. The Steward OAuth
      callback briefly carries tokens in the URL hash; while #fragments are
      not sent in Referer per spec, this is belt-and-suspenders against
      legacy browsers / extensions that leak the full URL.
    -->
    <meta name="referrer" content="no-referrer" />
    <!--
      Snapshot then strip any token-bearing hash from the URL before any other JS
      runs (React, analytics, Sentry, etc.) so the access token never reaches
      anything that might log `location.href`. Tokens are then read by
      consumeStewardTokensFromHash() from `__stewardOAuthHash`.
    -->
    <script>
      (() => {
        try {
          const h = window.location.hash;
          const params = h ? new URLSearchParams(h.replace(/^#/, "")) : null;
          if (
            params &&
            (params.has("token") ||
              params.has("access_token") ||
              params.has("refreshToken") ||
              params.has("refresh_token"))
          ) {
            window.__stewardOAuthHash = h;
            history.replaceState(
              null,
              "",
              window.location.pathname + window.location.search
            );
          }
        } catch (_e) {}
      })();
    </script>
