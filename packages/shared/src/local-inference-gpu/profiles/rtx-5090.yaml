# RTX 5090 — Blackwell, 32 GiB GDDR7, sm_120, ~1792 GB/s, FP8 + FP4.
#
# Per-bundle recommended llama-server flags. Source of truth for the runtime
# is `packages/shared/src/local-inference/gpu-profiles.ts`; this file extends
# those card-level defaults with per-bundle overrides + TPS expectations.
#
# All TPS numbers are *estimates* — they have not been measured on real
# hardware. The 5090's compute capability sm_120 is new enough that not every
# kernel in the buun fork has a pre-built variant yet; the verify script
# checks `CAPABILITIES.json` before declaring the card production-ready.
# See `docs/eliza-1-gpu-tier.md` for assumptions.

gpu_id: rtx-5090
gpu_arch: sm_120
vram_gb: 32
mem_bandwidth_gbps: 1792
fp8_supported: true
fp4_supported: true                # hardware-capable; KV FP4 requires matching runtime kernels
nvlink: false

bundle_recommendations:
  eliza-1-0_8b:
    n_gpu_layers: -1
    ctx_size: 32768
    parallel: 32
    batch_size: 4096
    ubatch_size: 1024
    kv_cache_k: qjl1_256
    kv_cache_v: q4_polar
    flash_attention: true
    estimated_decode_tps: 720
    estimated_prefill_tps: 38000
    notes: "Smallest active Qwen3.5 local tier; smoke/default fallback."
  eliza-1-2b:
    n_gpu_layers: -1
    ctx_size: 32768
    parallel: 16
    batch_size: 4096
    ubatch_size: 1024
    kv_cache_k: qjl1_256
    kv_cache_v: q4_polar
    flash_attention: true
    estimated_decode_tps: 460
    estimated_prefill_tps: 18000
    notes: "First-run active Qwen3.5 tier."
  eliza-1-4b:
    n_gpu_layers: -1
    ctx_size: 65536
    parallel: 16
    batch_size: 4096
    ubatch_size: 1024
    kv_cache_k: qjl1_256
    kv_cache_v: q4_polar
    flash_attention: true
    estimated_decode_tps: 260
    estimated_prefill_tps: 12000
    notes: "Balanced Qwen3.5 tier for high-throughput local serving."
  eliza-1-9b:
    n_gpu_layers: -1
    ctx_size: 65536
    parallel: 8
    batch_size: 4096
    ubatch_size: 1024
    kv_cache_k: qjl1_256
    kv_cache_v: q4_polar
    flash_attention: true
    estimated_decode_tps: 180
    estimated_prefill_tps: 7600
    notes: "High-quality Qwen3.5 tier with Blackwell headroom."
  eliza-1-27b:
    n_gpu_layers: -1
    ctx_size: 131072
    parallel: 4
    batch_size: 4096
    ubatch_size: 1024
    kv_cache_k: qjl1_256
    kv_cache_v: q4_polar
    flash_attention: true
    estimated_decode_tps: 95
    estimated_prefill_tps: 3900
    notes: "High-quality Qwen3.5 27B tier for RTX 5090."
  eliza-1-27b-256k:
    n_gpu_layers: -1
    ctx_size: 262144
    parallel: 2
    batch_size: 4096
    ubatch_size: 1024
    kv_cache_k: qjl1_256
    kv_cache_v: q4_polar
    flash_attention: true
    estimated_decode_tps: 75
    estimated_prefill_tps: 3000
    notes: "Best-fit long-context 27B tier for 32 GiB Blackwell."

mtp:
  enabled: true
  draft_min: 4
  draft_max: 24
  draft_gpu_layers: -1

verify_recipe:
  build_target: linux-x64-cuda
  cuda_arch: 120                    # sm_120 — verify CUDA toolkit >= 12.8
  cmake_flags:
    - "-DGGML_CUDA=ON"
    - "-DCMAKE_CUDA_ARCHITECTURES=120"
    - "-DGGML_CUDA_F16=ON"
    - "-DGGML_CUDA_FA_ALL_QUANTS=ON"
  expected_kernels:
    - turbo3
    - turbo4
    - turbo3_tcq
    - qjl_full
    - polarquant
    - mtp
  unavailable_kernels: []
  # Blackwell-specific: the verify script must probe `CAPABILITIES.json`
  # because some FP4 / FP8 fast paths may not be ported yet. The script
  # warns (not fails) when a kernel is absent — runtime falls back.
  warn_on_kernel_absent: true
  smoke_bundle: eliza-1-27b-256k
  tolerance_pct: 15                 # wider tolerance — first-class kernels still maturing on Blackwell
