# RTX 4090 — Ada Lovelace, 24 GiB GDDR6X, sm_89, 1008 GB/s, FP8 supported.
#
# Per-bundle recommended llama-server flags. Source of truth for the runtime
# is `packages/shared/src/local-inference/gpu-profiles.ts`; this file extends
# those card-level defaults with per-bundle overrides + TPS expectations.
#
# All TPS numbers are *estimates* — they have not been measured on real
# hardware. They feed the verification scripts' 10% tolerance check, which
# compares against `llama-bench` output. See `docs/eliza-1-gpu-tier.md`
# for the canonical card-level table and the underlying assumptions.

gpu_id: rtx-4090
gpu_arch: sm_89
vram_gb: 24
mem_bandwidth_gbps: 1008
fp8_supported: true
fp4_supported: false
nvlink: false

bundle_recommendations:
  eliza-1-0_8b:
    n_gpu_layers: -1
    ctx_size: 32768
    parallel: 16
    batch_size: 2048
    ubatch_size: 512
    kv_cache_k: qjl1_256
    kv_cache_v: q4_polar
    flash_attention: true
    estimated_decode_tps: 520
    estimated_prefill_tps: 22000
    notes: "Smallest active Qwen3.5 local tier; smoke/default fallback."
  eliza-1-2b:
    n_gpu_layers: -1
    ctx_size: 32768
    parallel: 8
    batch_size: 2048
    ubatch_size: 512
    kv_cache_k: qjl1_256
    kv_cache_v: q4_polar
    flash_attention: true
    estimated_decode_tps: 310
    estimated_prefill_tps: 11000
    notes: "First-run active Qwen3.5 tier."
  eliza-1-4b:
    n_gpu_layers: -1
    ctx_size: 65536
    parallel: 8
    batch_size: 2048
    ubatch_size: 512
    kv_cache_k: qjl1_256
    kv_cache_v: q4_polar
    flash_attention: true
    estimated_decode_tps: 175
    estimated_prefill_tps: 6800
    notes: "Balanced Qwen3.5 tier with Ada tensor-core KV path."
  eliza-1-9b:
    n_gpu_layers: -1
    ctx_size: 65536
    parallel: 4
    batch_size: 2048
    ubatch_size: 512
    kv_cache_k: qjl1_256
    kv_cache_v: q4_polar
    flash_attention: true
    estimated_decode_tps: 110
    estimated_prefill_tps: 4600
    notes: "High-quality Qwen3.5 tier that leaves comfortable 24 GiB headroom."
  eliza-1-27b:
    n_gpu_layers: -1
    ctx_size: 131072
    parallel: 2
    batch_size: 2048
    ubatch_size: 512
    kv_cache_k: qjl1_256
    kv_cache_v: q4_polar
    flash_attention: true
    estimated_decode_tps: 60
    estimated_prefill_tps: 2500
    notes: "Maximum 4090 tier; use one or two parallel slots depending on live KV pressure."

mtp:
  enabled: true
  draft_min: 4
  draft_max: 24
  draft_gpu_layers: -1

verify_recipe:
  build_target: linux-x64-cuda
  cuda_arch: 89
  cmake_flags:
    - "-DGGML_CUDA=ON"
    - "-DCMAKE_CUDA_ARCHITECTURES=89"
    - "-DGGML_CUDA_F16=ON"
    - "-DGGML_CUDA_FA_ALL_QUANTS=ON"
  expected_kernels:
    - turbo3
    - turbo4
    - turbo3_tcq                 # sm_89 has the tensor-core Q kernel
    - qjl_full
    - polarquant
    - mtp
  unavailable_kernels: []
  smoke_bundle: eliza-1-27b
  tolerance_pct: 10
