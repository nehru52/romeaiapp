# RTX 3090 — Ampere, 24 GiB GDDR6X, sm_86, 936 GB/s, no FP8.
#
# Per-bundle recommended llama-server flags. Source of truth for the runtime
# is `packages/shared/src/local-inference/gpu-profiles.ts`; this file extends
# those card-level defaults with per-bundle overrides + TPS expectations.
#
# All TPS numbers are *estimates* — they have not been measured on real
# hardware. They feed the verification scripts' 10% tolerance check, which
# compares against `llama-bench` output. See `docs/eliza-1-gpu-deployment.md`
# for the canonical card-level table.

gpu_id: rtx-3090
gpu_arch: sm_86
vram_gb: 24
mem_bandwidth_gbps: 936
fp8_supported: false
fp4_supported: false
nvlink: false

bundle_recommendations:
  eliza-1-0_8b:
    n_gpu_layers: -1
    ctx_size: 32768
    parallel: 16
    batch_size: 2048
    ubatch_size: 512
    kv_cache_k: qjl1_256
    kv_cache_v: q4_polar
    flash_attention: true
    estimated_decode_tps: 480
    estimated_prefill_tps: 18000
    notes: "Smallest active Qwen3.5 local tier; smoke/default fallback."
  eliza-1-2b:
    n_gpu_layers: -1
    ctx_size: 32768
    parallel: 8
    batch_size: 2048
    ubatch_size: 512
    kv_cache_k: qjl1_256
    kv_cache_v: q4_polar
    flash_attention: true
    estimated_decode_tps: 280
    estimated_prefill_tps: 9000
    notes: "First-run active Qwen3.5 tier."
  eliza-1-4b:
    n_gpu_layers: -1
    ctx_size: 65536
    parallel: 4
    batch_size: 2048
    ubatch_size: 512
    kv_cache_k: q8_0
    kv_cache_v: q4_polar
    flash_attention: true
    estimated_decode_tps: 150
    estimated_prefill_tps: 5200
    notes: "Balanced Qwen3.5 tier; all layers fit on 24 GiB with 64k context."
  eliza-1-9b:
    n_gpu_layers: -1
    ctx_size: 65536
    parallel: 4
    batch_size: 2048
    ubatch_size: 512
    kv_cache_k: q8_0
    kv_cache_v: q4_polar
    flash_attention: true
    estimated_decode_tps: 70
    estimated_prefill_tps: 3600
    notes: "Best-fit Qwen3.5 tier for RTX 3090; keep 27B on larger cards."

mtp:
  enabled: true
  draft_min: 4
  draft_max: 16
  draft_gpu_layers: -1

verify_recipe:
  build_target: linux-x64-cuda
  cuda_arch: 86
  cmake_flags:
    - "-DGGML_CUDA=ON"
    - "-DCMAKE_CUDA_ARCHITECTURES=86"
    - "-DGGML_CUDA_F16=ON"
  expected_kernels:
    - turbo3
    - turbo4
    - qjl_full
    - polarquant
    - mtp
  unavailable_kernels:
    - turbo3_tcq                 # tensor-core Q kernel requires sm_89+
  smoke_bundle: eliza-1-9b       # best-fit smoke bundle used by `verify_3090.sh`
  tolerance_pct: 10
