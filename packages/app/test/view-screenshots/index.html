<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LifeOps view screenshots</title>
    <!-- Minimal Tailwind utility shim — only the calendar view needs it; the
         other 8 views self-style with inline styles. -->
    <link rel="stylesheet" href="/stubs/calendar-tailwind-shim.css" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #0a0a0a;
        color: #f5f5f5;
      }
      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      /* Stretch the single mounted view to fill the frame so screenshots are
         not letterboxed by the body background. */
      #root > * {
        flex: 1 1 auto;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/entry.tsx"></script>
  </body>
</html>
