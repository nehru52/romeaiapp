# Cloudflare Pages config for the hosted-web Eliza app (the agent app).
#
# The Eliza app is its own Pages project (`eliza-app`) served at
# app.elizacloud.ai (prod) / app-staging.elizacloud.ai (develop). It is the
# same web UI as `bun run dev`. The elizacloud.ai APEX is a SEPARATE Pages
# project (`eliza-cloud`) serving packages/cloud-frontend (the lander +
# dashboard) — see packages/cloud-frontend/wrangler.toml and
# .github/workflows/cloud-cf-deploy.yml. Custom-domain attachment + DNS for
# this project: docs/cloud-into-eliza/CUTOVER-RUNBOOK.md.
#
# Mirrors packages/cloud-frontend/wrangler.toml (same _proxy.ts same-origin
# /api + /steward forwarding). The Steward session cookie is scoped to the
# parent `.elizacloud.ai` zone (cloud-shared auth/cookie-domain.ts), so a login
# on the apex console carries over to this app subdomain automatically.

name = "eliza-app"
pages_build_output_dir = "./dist"
compatibility_date = "2026-04-29"

[vars]
API_UPSTREAM = "https://api.elizacloud.ai"
# Per-env signal consumed by isomorphic code so the SPA can branch on
# deployment env. Mirrors the cloud-frontend convention.
VITE_ENVIRONMENT = "production"

[env.preview.vars]
API_UPSTREAM = "https://api-staging.elizacloud.ai"
# Pin the Steward tenant for the staging build so the SPA initialises the SDK
# with tenantId=elizacloud-staging and OAuth /authorize carries
# tenant_id=elizacloud-staging (Steward resolves the OAuth tenant from the
# query param, not the proxy X-Steward-Tenant header).
NEXT_PUBLIC_STEWARD_TENANT_ID = "elizacloud-staging"
VITE_ENVIRONMENT = "staging"
