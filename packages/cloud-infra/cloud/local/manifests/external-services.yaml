apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: eliza-infra
spec:
  type: ExternalName
  externalName: redis-master.eliza-infra.svc.cluster.local
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: eliza-cloud
  namespace: eliza-infra
spec:
  type: ExternalName
  externalName: host.docker.internal
  ports:
    - port: 3000
      targetPort: 3000
