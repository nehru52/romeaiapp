AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  elizaOS AWS Lambda Worker (TypeScript)

  Deploy an elizaOS agent as a serverless Lambda function with API Gateway.

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: nodejs20.x
    Architectures:
      - x86_64
    Environment:
      Variables:
        LOG_LEVEL: INFO

Parameters:
  OpenAIApiKey:
    Type: String
    Description: OpenAI API key for the LLM provider
    NoEcho: true

  OpenAIModel:
    Type: String
    Default: gpt-5-mini
    Description: OpenAI model to use

  CharacterName:
    Type: String
    Default: Eliza
    Description: Name of the AI agent

  CharacterBio:
    Type: String
    Default: A helpful AI assistant.
    Description: Biography/description of the AI agent

  CharacterSystem:
    Type: String
    Default: You are a helpful, concise AI assistant. Respond thoughtfully to user messages.
    Description: System prompt for the AI agent

Resources:
  ElizaApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowMethods:
          - GET
          - POST
          - OPTIONS
      Description: elizaOS Worker API

  ElizaWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: eliza-worker-typescript
      Description: elizaOS chat worker (TypeScript)
      CodeUri: .
      Handler: handler.handler
      Runtime: nodejs20.x
      MemorySize: 512
      Timeout: 30
      Environment:
        Variables:
          OPENAI_API_KEY: !Ref OpenAIApiKey
          OPENAI_MODEL: !Ref OpenAIModel
          CHARACTER_NAME: !Ref CharacterName
          CHARACTER_BIO: !Ref CharacterBio
          CHARACTER_SYSTEM: !Ref CharacterSystem
      Events:
        Health:
          Type: HttpApi
          Properties:
            ApiId: !Ref ElizaApi
            Path: /
            Method: GET
        HealthCheck:
          Type: HttpApi
          Properties:
            ApiId: !Ref ElizaApi
            Path: /health
            Method: GET
        Chat:
          Type: HttpApi
          Properties:
            ApiId: !Ref ElizaApi
            Path: /chat
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: false
        EntryPoints:
          - handler.ts

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${ElizaApi}.execute-api.${AWS::Region}.amazonaws.com/prod"

  ChatEndpoint:
    Description: Chat endpoint URL
    Value: !Sub "https://${ElizaApi}.execute-api.${AWS::Region}.amazonaws.com/prod/chat"

  HealthEndpoint:
    Description: Health check endpoint URL
    Value: !Sub "https://${ElizaApi}.execute-api.${AWS::Region}.amazonaws.com/prod/health"

  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt ElizaWorkerFunction.Arn
