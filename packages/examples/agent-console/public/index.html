<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AGENT // CONSOLE</title>
    <style>
      :root {
        --bg: #07090d;
        --bg-1: #0b0f15;
        --bg-2: #11161f;
        --bg-3: #161c27;
        --line: #1e2533;
        --line-2: #2a3346;
        --fg: #c5c8d0;
        --fg-dim: #7a808d;
        --fg-faint: #4a5060;
        --cyan: #39bae6;
        --cyan-2: #59c2ff;
        --green: #7fd962;
        --amber: #ffb454;
        --red: #f07178;
        --magenta: #d896ff;
        --pink: #f78fb3;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0;
        background: var(--bg); color: var(--fg);
        font-family: "JetBrains Mono", "SF Mono", Menlo, ui-monospace, monospace;
        font-size: 12px; line-height: 1.45;
        height: 100%; overflow: hidden;
        font-feature-settings: "calt" 1, "liga" 0;
      }
      a { color: var(--cyan); text-decoration: none; }
      button {
        font-family: inherit; font-size: inherit; color: var(--fg);
        background: var(--bg-2); border: 1px solid var(--line-2);
        padding: 4px 10px; cursor: pointer; border-radius: 1px;
        text-transform: uppercase; letter-spacing: 0.08em;
      }
      button:hover { border-color: var(--cyan); color: var(--cyan); }
      button:disabled { opacity: 0.4; cursor: not-allowed; }
      input {
        font-family: inherit; font-size: inherit; color: var(--fg);
        background: var(--bg-1); border: 1px solid var(--line-2);
        padding: 6px 10px; outline: none; border-radius: 1px;
      }
      input:focus { border-color: var(--cyan); }

      .app { display: grid; grid-template-rows: 32px 44px 1fr; height: 100vh; }

      .hdr {
        display: flex; align-items: center; gap: 16px;
        padding: 0 12px; border-bottom: 1px solid var(--line);
        background: linear-gradient(180deg, var(--bg-2), var(--bg-1));
      }
      .hdr .brand { color: var(--cyan); letter-spacing: 0.18em; font-weight: 600; }
      .hdr .sep { color: var(--fg-faint); }
      .hdr .nav-link {
        color: var(--fg-dim);
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: 10px;
      }
      .hdr .nav-link:hover { color: var(--cyan); }
      .hdr .field { color: var(--fg-dim); }
      .hdr .field b { color: var(--fg); font-weight: 500; }
      .hdr .spacer { flex: 1; }
      .hdr .stat { color: var(--fg-dim); display: inline-flex; align-items: center; gap: 6px; }
      .hdr .dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: var(--fg-faint); box-shadow: 0 0 8px transparent;
      }
      .hdr .dot.idle { background: var(--fg-faint); }
      .hdr .dot.run  { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 1.2s ease-in-out infinite; }
      .hdr .dot.err  { background: var(--red); box-shadow: 0 0 8px var(--red); }
      .hdr .dot.warn { background: var(--amber); box-shadow: 0 0 8px var(--amber); }
      .hdr .dot.boot { background: var(--cyan); box-shadow: 0 0 8px var(--cyan); animation: pulse 1.2s ease-in-out infinite; }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }

      .input-row {
        display: grid; grid-template-columns: 1fr auto;
        gap: 8px; align-items: center;
        padding: 6px 12px; border-bottom: 1px solid var(--line); background: var(--bg-1);
      }
      .input-row > div:first-child { display: flex; align-items: center; }
      .input-row .prompt { color: var(--cyan); margin-right: 6px; }
      .input-row input { flex: 1; height: 30px; font-size: 13px; width: 100%; }

      .main {
        display: grid;
        grid-template-columns: minmax(420px, 1.5fr) minmax(320px, 1fr) minmax(280px, 0.8fr);
        gap: 0; min-height: 0;
      }
      .col {
        display: flex; flex-direction: column;
        min-width: 0; min-height: 0;
        border-right: 1px solid var(--line);
      }
      .col:last-child { border-right: none; }
      .col-hdr {
        flex: 0 0 24px;
        display: flex; align-items: center; gap: 8px;
        padding: 0 10px; background: var(--bg-2); border-bottom: 1px solid var(--line);
        color: var(--fg-dim); text-transform: uppercase; letter-spacing: 0.14em; font-size: 10px;
      }
      .col-hdr .tag { color: var(--cyan); }
      .col-hdr .count { margin-left: auto; color: var(--fg-faint); }
      .col-body {
        flex: 1 1 auto; overflow-y: auto; overflow-x: hidden;
        padding: 6px; scrollbar-width: thin; scrollbar-color: var(--line-2) transparent;
      }
      .col-body::-webkit-scrollbar { width: 8px; }
      .col-body::-webkit-scrollbar-thumb { background: var(--line-2); }

      .card {
        position: relative;
        border: 1px solid var(--line-2); background: var(--bg-1);
        margin-bottom: 6px;
      }
      .card::before {
        content: ""; position: absolute; left: 0; top: 0; bottom: 0;
        width: 3px; background: var(--c, var(--fg-faint));
      }
      .card-hdr {
        display: flex; align-items: center; gap: 8px;
        padding: 4px 8px 4px 12px;
        background: var(--bg-2); border-bottom: 1px solid var(--line);
        font-size: 11px;
      }
      .card-hdr .ix { color: var(--fg-faint); min-width: 22px; }
      .card-hdr .typ { text-transform: uppercase; letter-spacing: 0.12em; }
      .typ-run      { color: var(--cyan); }
      .typ-msg-in   { color: var(--green); }
      .typ-msg-out  { color: var(--cyan-2); }
      .typ-model    { color: var(--cyan); }
      .typ-action   { color: var(--magenta); }
      .typ-eval     { color: var(--pink); }
      .typ-end      { color: var(--fg-dim); }
      .typ-log      { color: var(--amber); }
      .typ-err      { color: var(--red); }

      .card-hdr .name { color: var(--fg); }
      .card-hdr .meta { margin-left: auto; color: var(--fg-dim); display: flex; gap: 10px; align-items: center; }
      .card-hdr .meta .ok { color: var(--green); }
      .card-hdr .meta .err { color: var(--red); }
      .card-hdr .meta .live { color: var(--amber); }

      .card-body { padding: 6px 8px 6px 12px; }
      .text {
        white-space: pre-wrap; word-wrap: break-word; overflow-wrap: anywhere;
        color: var(--fg);
      }
      .text.dim { color: var(--fg-dim); }
      .text.err { color: var(--red); }

      details.raw { margin-top: 6px; border-top: 1px dashed var(--line); padding-top: 4px; }
      details.raw > summary {
        cursor: pointer; color: var(--fg-faint); font-size: 10px;
        text-transform: uppercase; letter-spacing: 0.12em;
        list-style: none; user-select: none;
      }
      details.raw > summary::-webkit-details-marker { display: none; }
      details.raw > summary::before { content: "▸ "; }
      details.raw[open] > summary::before { content: "▾ "; }
      details.raw pre {
        margin: 6px 0 0; font-size: 10.5px;
        background: var(--bg-3); border: 1px solid var(--line);
        padding: 6px; max-height: 380px; overflow: auto;
        color: var(--fg-dim);
      }

      .msg {
        position: relative;
        border: 1px solid var(--line); margin-bottom: 6px; background: var(--bg-1);
      }
      .msg::before {
        content: ""; position: absolute; left: 0; top: 0; bottom: 0;
        width: 3px; background: var(--c, var(--fg-faint));
      }
      .msg-hdr {
        display: flex; gap: 8px; padding: 3px 8px 3px 12px;
        font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em;
        color: var(--fg-dim); border-bottom: 1px solid var(--line); background: var(--bg-2);
      }
      .msg-hdr .role { color: var(--cyan); }
      .msg-hdr .role.user { color: var(--green); }
      .msg-hdr .role.assistant { color: var(--cyan-2); }
      .msg-hdr .meta { margin-left: auto; color: var(--fg-faint); }
      .msg-body {
        padding: 6px 8px 6px 12px;
        white-space: pre-wrap; word-wrap: break-word; overflow-wrap: anywhere;
      }

      .ev {
        display: grid; grid-template-columns: 56px 18px 1fr;
        gap: 6px; padding: 1px 6px; font-size: 11px;
        border-left: 3px solid var(--c, transparent);
        align-items: baseline;
      }
      .ev .t { color: var(--fg-faint); text-align: right; }
      .ev .k { color: var(--fg-dim); text-transform: uppercase; letter-spacing: 0.06em; font-size: 10px; }
      .ev.run     .k { color: var(--cyan); }
      .ev.msg     .k { color: var(--green); }
      .ev.model   .k { color: var(--cyan); }
      .ev.action  .k { color: var(--magenta); }
      .ev.eval    .k { color: var(--pink); }
      .ev.log     .k { color: var(--amber); }
      .ev.err     .k { color: var(--red); }
      .ev .v { color: var(--fg-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .ev .v b { color: var(--fg); font-weight: 500; }

      .traj-hdr {
        display: flex; align-items: center; gap: 8px;
        padding: 4px 8px 4px 12px; margin-bottom: 6px;
        border: 1px solid var(--line-2); background: var(--bg-2);
        position: relative;
      }
      .traj-hdr::before {
        content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
        background: var(--c, var(--fg-faint));
      }
      .traj-hdr .id { color: var(--fg-dim); }
      .traj-hdr .msg { color: var(--fg); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .traj-hdr .meta { color: var(--fg-faint); display: flex; gap: 12px; font-size: 11px; }

      .empty-state {
        display: flex; align-items: center; justify-content: center;
        height: 100%;
        color: var(--fg-faint); text-align: center; padding: 20px;
        font-size: 11px; text-transform: uppercase; letter-spacing: 0.18em;
      }

      .io { display: grid; grid-template-columns: 1fr; gap: 6px; }
      .io-block { border: 1px solid var(--line); background: var(--bg-2); padding: 6px 8px; }
      .io-label {
        font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em;
        color: var(--fg-faint); margin-bottom: 4px;
        display: flex; gap: 8px; align-items: center;
      }
      .io-label.sub { margin-top: 8px; }
      .io-label .arrow { color: var(--cyan); }
      .io-text {
        font-size: 11px;
        white-space: pre-wrap; word-wrap: break-word; overflow-wrap: anywhere;
        max-height: 280px; overflow-y: auto;
        color: var(--fg);
      }
      .io-text.empty { color: var(--fg-faint); font-style: italic; }
      .io-text.err { color: var(--red); }

      /* messages-as-blocks (the staged prefix) */
      .messages-stack { display: flex; flex-direction: column; gap: 4px; max-height: 380px; overflow-y: auto; }
      .msg-block {
        border: 1px solid var(--line);
        background: var(--bg-3);
        position: relative;
      }
      .msg-block::before {
        content: ""; position: absolute; left: 0; top: 0; bottom: 0;
        width: 2px; background: var(--mc, var(--fg-faint));
      }
      .msg-block.role-system   { --mc: var(--fg-dim); }
      .msg-block.role-user     { --mc: var(--green); }
      .msg-block.role-assistant{ --mc: var(--cyan-2); }
      .msg-block.role-tool     { --mc: var(--magenta); }
      .msg-block.role-segment  { --mc: var(--fg-faint); }
      .msg-block.stable {
        background: linear-gradient(90deg, rgba(57,186,230,0.04), transparent 60%);
        border-color: var(--line-2);
      }
      .msg-block-hdr {
        display: flex; gap: 8px; align-items: baseline;
        padding: 2px 8px 2px 10px;
        font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em;
        color: var(--fg-faint); border-bottom: 1px solid var(--line);
      }
      .role-tag           { color: var(--fg-dim); }
      .role-tag.system    { color: var(--fg-dim); }
      .role-tag.user      { color: var(--green); }
      .role-tag.assistant { color: var(--cyan-2); }
      .role-tag.tool      { color: var(--magenta); }
      .role-tag.segment   { color: var(--fg-faint); }
      .stable-tag {
        color: var(--cyan); font-size: 9px;
        border: 1px solid var(--cyan); padding: 0 4px; border-radius: 1px;
      }
      .msg-block-hdr .bytes { margin-left: auto; color: var(--fg-faint); }
      .msg-block-body {
        padding: 4px 8px 6px 10px;
        font-size: 11px;
        white-space: pre-wrap; word-wrap: break-word; overflow-wrap: anywhere;
        max-height: 200px; overflow-y: auto;
      }

      /* tools list pills */
      .tool-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }
      .tool-pill {
        font-size: 10px; padding: 1px 6px;
        border: 1px solid var(--magenta); color: var(--magenta);
        border-radius: 1px; cursor: help;
      }

      /* tool calls in response */
      .tc-call {
        margin-top: 6px;
        border: 1px solid var(--magenta);
        background: var(--bg-3);
      }
      .tc-call-hdr {
        padding: 3px 8px; font-size: 11px; color: var(--magenta);
        border-bottom: 1px solid var(--line);
      }
      .tc-call-args {
        margin: 0; padding: 6px 8px; font-size: 10.5px;
        white-space: pre-wrap; word-wrap: break-word; overflow-wrap: anywhere;
        color: var(--fg-dim);
        max-height: 200px; overflow-y: auto;
      }
      .dim { color: var(--fg-dim); font-weight: normal; }

      /* cache hit badge in card meta */
      .cache-badge {
        font-size: 10px; padding: 1px 6px; border-radius: 1px;
        text-transform: uppercase; letter-spacing: 0.08em;
        white-space: nowrap;
      }
      .cache-badge.hit  { background: rgba(127, 217, 98, 0.12); color: var(--green); border: 1px solid var(--green); }
      .cache-badge.miss { background: rgba(122, 128, 141, 0.08); color: var(--fg-faint); border: 1px solid var(--line-2); }

      /* prefix hash chip in card name */
      .prefix-chip {
        margin-left: 8px;
        font-size: 10px; padding: 1px 5px; border-radius: 1px;
        text-transform: uppercase; letter-spacing: 0.06em;
        font-family: inherit;
      }
      .prefix-chip.fresh { color: var(--cyan);  border: 1px dashed var(--cyan); }
      .prefix-chip.reuse { color: var(--green); border: 1px solid var(--green); background: rgba(127, 217, 98, 0.06); }

      /* trajectory_end stats grid */
      .stats-grid {
        display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px 12px;
        font-size: 11px;
        padding: 4px 0;
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
      }
      .stats-grid > div { display: flex; justify-content: space-between; gap: 6px; padding: 2px 0; }
      .stat-k { color: var(--fg-faint); text-transform: uppercase; letter-spacing: 0.06em; font-size: 10px; }
      .stat-v { color: var(--fg); font-weight: 500; }
      .stat-v.hit { color: var(--green); }
      .stat-v.partial { color: var(--amber); }
      .stat-v.miss { color: var(--fg-dim); }
      .stat-v.err { color: var(--red); }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="hdr">
        <span class="brand">AGENT // CONSOLE</span>
        <span class="sep">│</span>
        <a class="nav-link" href="/actions">ACTIONS</a>
        <span class="sep">│</span>
        <span class="field">prov <b id="prov">—</b></span>
        <span class="field">model <b id="model">—</b></span>
        <span class="field">small <b id="model-small">—</b></span>
        <span class="field">agent <b id="agent">—</b></span>
        <span class="spacer"></span>
        <span class="stat">stages <b id="stat-stages">0</b></span>
        <span class="stat">model‑calls <b id="stat-mc">0</b></span>
        <span class="stat">in <b id="stat-tin">0</b></span>
        <span class="stat">out <b id="stat-tout">0</b></span>
        <span class="stat">elapsed <b id="stat-elapsed">0ms</b></span>
        <span class="stat"><span id="state-dot" class="dot boot"></span><b id="state-label">BOOT</b></span>
      </header>

      <div class="input-row">
        <div>
          <span class="prompt">▸</span>
          <input id="input" placeholder="message — enter clears prior trajectory and starts a new run" autofocus disabled />
        </div>
        <button id="send" disabled>SEND ▸</button>
      </div>

      <div class="main">
        <div class="col">
          <div class="col-hdr"><span class="tag">[ PIPELINE ]</span> stages of the current run<span class="count" id="pipe-count">0</span></div>
          <div class="col-body" id="pipeline">
            <div class="empty-state">awaiting message</div>
          </div>
        </div>

        <div class="col">
          <div class="col-hdr"><span class="tag">[ CONTEXT ]</span> conversation built up<span class="count" id="ctx-count">0</span></div>
          <div class="col-body" id="context">
            <div class="empty-state">no context yet</div>
          </div>
        </div>

        <div class="col">
          <div class="col-hdr"><span class="tag">[ EVENTS ]</span> all trajectories<span class="count" id="ev-count">0</span></div>
          <div class="col-body" id="events"></div>
        </div>
      </div>
    </div>

    <script>
      const state = {
        currentTraj: null,
        cards: new Map(),
        elapsedTimer: null,
        evCount: 0,
        ctxMsgs: [],
        seenPrefixHashes: new Set(),
      };

      const $ = (id) => document.getElementById(id);
      const $prov = $("prov"), $model = $("model"), $modelSmall = $("model-small"), $agent = $("agent");
      const $stateDot = $("state-dot"), $stateLabel = $("state-label");
      const $statStages = $("stat-stages"), $statMc = $("stat-mc");
      const $statTin = $("stat-tin"), $statTout = $("stat-tout"), $statElapsed = $("stat-elapsed");
      const $pipeline = $("pipeline"), $context = $("context"), $events = $("events");
      const $pipeCount = $("pipe-count"), $ctxCount = $("ctx-count"), $evCount = $("ev-count");
      const $input = $("input"), $send = $("send");

      function fmtMs(ms) { return ms < 1000 ? ms + "ms" : (ms / 1000).toFixed(2) + "s"; }
      function relT(absT) {
        if (!state.currentTraj) return "+0.00";
        return "+" + ((absT - state.currentTraj.startedAt) / 1000).toFixed(2);
      }
      function autoStick(el) {
        const dist = el.scrollHeight - el.scrollTop - el.clientHeight;
        if (dist < 80) el.scrollTop = el.scrollHeight;
      }
      function jsonPretty(v) { try { return JSON.stringify(v, null, 2); } catch { return String(v); } }
      function escHtml(s) {
        return String(s ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      }
      function setState(label, cls) {
        $stateLabel.textContent = label;
        $stateDot.className = "dot " + cls;
      }
      function startElapsed() {
        stopElapsed();
        state.elapsedTimer = setInterval(() => {
          if (!state.currentTraj) return;
          $statElapsed.textContent = fmtMs(Date.now() - state.currentTraj.startedAt);
        }, 67);
      }
      function stopElapsed() {
        if (state.elapsedTimer) clearInterval(state.elapsedTimer);
        state.elapsedTimer = null;
      }
      function bumpStage() {
        if (!state.currentTraj) return 0;
        state.currentTraj.stages++;
        $statStages.textContent = state.currentTraj.stages;
        $pipeCount.textContent = state.currentTraj.stages;
        return state.currentTraj.stages;
      }

      async function loadStatus() {
        const r = await fetch("/status").then(x => x.json()).catch(() => null);
        if (!r) return;
        $prov.textContent = r.provider ?? "—";
        $model.textContent = r.model ?? "—";
        $modelSmall.textContent = r.smallModel ?? "—";
        $agent.textContent = r.agent ?? "—";
        if (r.runtimeState === "ready") {
          setState("READY", "idle");
          $input.disabled = false; $send.disabled = false; $input.focus();
        } else if (r.runtimeState === "error") {
          setState("ERR", "err");
          $events.appendChild(rowHTML("0.00", "err", "init", escHtml(r.runtimeError || "")));
        } else {
          setState("BOOT", "boot");
          setTimeout(loadStatus, 1000);
        }
      }

      function rowHTML(t, cls, kind, vHtml) {
        const row = document.createElement("div");
        row.className = "ev " + cls;
        row.innerHTML = `<span class="t">${t}</span><span class="k">${kind}</span><span class="v">${vHtml}</span>`;
        return row;
      }

      function pushEvent(label, cls, kind, vHtml, color) {
        state.evCount++;
        $evCount.textContent = state.evCount;
        const t = state.currentTraj ? relT(Date.now()) : "+0.00";
        const row = rowHTML(t, cls, kind, vHtml);
        if (color) row.style.setProperty("--c", color);
        $events.appendChild(row);
        autoStick($events);
      }

      function makeCard(opts) {
        const { kind, typ, name, meta, color, ix } = opts;
        const card = document.createElement("div");
        card.className = "card";
        card.style.setProperty("--c", color);
        card.innerHTML = `
          <div class="card-hdr">
            <span class="ix">#${String(ix).padStart(2, "0")}</span>
            <span class="typ ${typ}">${kind}</span>
            <span class="name">${name ?? ""}</span>
            <span class="meta">${meta ?? ""}</span>
          </div>
          <div class="card-body"></div>
        `;
        return card;
      }

      function renderCtx() {
        $ctxCount.textContent = state.ctxMsgs.length;
        if (state.ctxMsgs.length === 0) {
          $context.innerHTML = `<div class="empty-state">no context yet</div>`;
          return;
        }
        $context.innerHTML = "";
        const color = state.currentTraj?.color || "var(--fg-faint)";
        for (const m of state.ctxMsgs) {
          const card = document.createElement("div");
          card.className = "msg";
          card.style.setProperty("--c", color);
          card.innerHTML = `
            <div class="msg-hdr">
              <span class="role ${m.role}">${m.role}</span>
              <span class="meta">${m.bytes}b</span>
            </div>
            <div class="msg-body">${escHtml(m.text)}</div>
          `;
          $context.appendChild(card);
        }
        autoStick($context);
      }

      function pipelineEnsureClear() {
        $pipeline.querySelector(".empty-state")?.remove();
      }

      function renderMessageBlock(m) {
        const role = m.role || "user";
        const stable = m.stable === true;
        return `
          <div class="msg-block role-${role}${stable ? " stable" : ""}">
            <div class="msg-block-hdr">
              <span class="role-tag ${role}">${role}</span>
              ${stable ? '<span class="stable-tag">stable</span>' : ""}
              <span class="bytes">${m.bytes}b</span>
            </div>
            <div class="msg-block-body">${escHtml(m.content || "(empty)")}</div>
          </div>
        `;
      }

      function renderToolPills(tools) {
        if (!Array.isArray(tools) || tools.length === 0) return "";
        return `<div class="tool-row">${tools.map(t =>
          `<span class="tool-pill" title="${escHtml(t.description || "")}">${escHtml(t.name)}</span>`
        ).join("")}</div>`;
      }

      function appendModelCallStart(ev) {
        pipelineEnsureClear();
        const ix = bumpStage();
        const inputLabel = ev.inputShape === "messages"
          ? `${(ev.messages || []).length} msgs · ${ev.inputBytes ?? 0}b`
          : ev.inputShape === "prompt"
            ? `prompt · ${ev.inputBytes ?? 0}b`
            : `${ev.inputBytes ?? 0}b`;
        const prefixHashShort = ev.prefixHash ? String(ev.prefixHash).slice(0, 8) : "";
        const seenBefore = ev.prefixHash && state.seenPrefixHashes.has(ev.prefixHash);
        if (ev.prefixHash) state.seenPrefixHashes.add(ev.prefixHash);
        const prefixChip = ev.prefixHash
          ? `<span class="prefix-chip ${seenBefore ? 'reuse' : 'fresh'}" title="${ev.prefixHash} · ${ev.segmentHashCount} segments">${prefixHashShort}${seenBefore ? ' ↻' : ' ✦'}</span>`
          : "";
        const card = makeCard({
          kind: "MODEL CALL", typ: "typ-model",
          name: `${ev.modelType} <span class="dim">· ${inputLabel}</span>${prefixChip}`,
          meta: `<span class="live">▶ live</span>`,
          color: state.currentTraj.color, ix,
        });
        const body = card.querySelector(".card-body");
        const messagesHtml = (ev.messages && ev.messages.length > 0)
          ? `<div class="messages-stack">${ev.messages.map(renderMessageBlock).join("")}</div>`
          : ev.promptPreview
            ? `<div class="io-text">${escHtml(ev.promptPreview)}</div>`
            : `<div class="io-text empty">(no input)</div>`;
        const toolsHtml = ev.tools && ev.tools.length > 0
          ? `<div class="io-label sub"><span class="arrow">⚒ TOOLS</span><span>${ev.tools.length}${ev.toolChoice ? ` · choice=${escHtml(ev.toolChoice)}` : ""}${ev.hasResponseSchema ? " · responseSchema" : ""}</span></div>${renderToolPills(ev.tools)}`
          : ev.hasResponseSchema
            ? `<div class="io-label sub"><span class="arrow">⚒ SCHEMA</span><span>responseSchema</span></div>`
            : "";
        body.innerHTML = `
          <div class="io">
            <div class="io-block">
              <div class="io-label"><span class="arrow">▸ IN</span><span>${inputLabel}</span></div>
              ${messagesHtml}
              ${toolsHtml}
            </div>
            <div class="io-block">
              <div class="io-label"><span class="arrow">◂ OUT</span><span data-role="dur">…</span></div>
              <div class="io-text empty" data-role="response">awaiting…</div>
              <div data-role="tool-calls"></div>
            </div>
          </div>
          <details class="raw"><summary>request params</summary><pre>${escHtml(jsonPretty(ev.params))}</pre></details>
        `;
        state.cards.set("mc:" + ev.callId, card);
        $pipeline.appendChild(card);
        autoStick($pipeline);
        if (state.currentTraj) {
          state.currentTraj.mc++;
          $statMc.textContent = state.currentTraj.mc;
        }
      }

      function appendModelCallEnd(ev) {
        const card = state.cards.get("mc:" + ev.callId);
        if (!card) return;
        const meta = card.querySelector(".meta");
        const body = card.querySelector('[data-role="response"]');
        const tcWrap = card.querySelector('[data-role="tool-calls"]');
        const errored = !!ev.error;
        const usage = ev.usage;
        const promptTokens = usage?.promptTokens ?? 0;
        const cached = usage?.cacheReadInputTokens ?? usage?.cachedPromptTokens ?? 0;
        const cachePct = promptTokens > 0 ? Math.round((cached / promptTokens) * 100) : 0;
        const cacheBadge = !usage
          ? ""
          : cached > 0
            ? `<span class="cache-badge hit">${cachePct}% cached <span class="dim">${cached}/${promptTokens}</span></span>`
            : `<span class="cache-badge miss">cache miss <span class="dim">${promptTokens}</span></span>`;
        const usageStr = usage
          ? ` <span class="dim">${promptTokens}↓ ${usage.completionTokens ?? 0}↑</span>`
          : "";
        meta.innerHTML = errored
          ? `<span class="err">✗ ${escHtml(ev.error)}</span><span>${fmtMs(ev.durationMs)}</span>${usageStr}`
          : `${cacheBadge}<span class="ok">✓</span><span>${fmtMs(ev.durationMs)}</span>${usageStr}`;
        body.classList.remove("empty");
        if (errored) {
          body.classList.add("err");
          body.textContent = ev.error;
          if (ev.errorDetail?.responseBody) {
            const det = document.createElement("details");
            det.className = "raw";
            det.innerHTML = `<summary>error body</summary><pre>${escHtml(String(ev.errorDetail.responseBody))}</pre>`;
            card.querySelector(".card-body").appendChild(det);
          }
        } else {
          body.textContent = ev.responseText || "(no text)";
        }
        if (Array.isArray(ev.toolCalls) && ev.toolCalls.length > 0 && tcWrap) {
          tcWrap.innerHTML = ev.toolCalls.map(tc => `
            <div class="tc-call">
              <div class="tc-call-hdr">↪ <b>${escHtml(tc.name)}</b>${tc.id ? ` <span class="dim">${escHtml(tc.id)}</span>` : ""}</div>
              <pre class="tc-call-args">${escHtml(jsonPretty(tc.arguments))}</pre>
            </div>
          `).join("");
        }
        const det = document.createElement("details");
        det.className = "raw";
        det.innerHTML = `<summary>raw response</summary><pre>${escHtml(jsonPretty(ev.result ?? ev.error))}</pre>`;
        card.querySelector(".card-body").appendChild(det);
      }

      function appendSimpleCard(opts) {
        pipelineEnsureClear();
        const ix = bumpStage();
        const card = makeCard({ ...opts, ix, color: state.currentTraj?.color || "var(--fg-faint)" });
        if (opts.body) card.querySelector(".card-body").innerHTML = opts.body;
        $pipeline.appendChild(card);
        autoStick($pipeline);
        return card;
      }

      function handleEvent(ev) {
        const isCurrent = state.currentTraj && ev.trajectoryId === state.currentTraj.id;
        const color = ev.color || (isCurrent ? state.currentTraj.color : null);

        switch (ev.type) {
          case "hello": {
            pushEvent(0, "log", "stream", "connected");
            return;
          }
          case "trajectory_start": {
            state.currentTraj = {
              id: ev.trajectoryId, color: ev.color, startedAt: ev.t,
              stages: 0, mc: 0, tIn: 0, tOut: 0,
            };
            state.cards.clear();
            state.ctxMsgs = [];
            state.seenPrefixHashes = new Set();
            $pipeline.innerHTML = "";
            $statStages.textContent = "0"; $statMc.textContent = "0";
            $statTin.textContent = "0"; $statTout.textContent = "0";
            $pipeCount.textContent = "0";
            $statElapsed.textContent = "0ms";
            renderCtx();
            setState("RUN", "run");
            startElapsed();

            const banner = document.createElement("div");
            banner.className = "traj-hdr";
            banner.style.setProperty("--c", ev.color);
            banner.innerHTML = `
              <span class="id">▸ ${ev.trajectoryId}</span>
              <span class="msg">${escHtml(ev.userMessage)}</span>
              <span class="meta">
                <span>${ev.provider}</span><span>${ev.model}</span>
              </span>
            `;
            $pipeline.appendChild(banner);
            pushEvent(relT(ev.t), "run", "start", `<b>${escHtml(ev.userMessage)}</b>`, ev.color);
            return;
          }

          case "RUN_STARTED": {
            appendSimpleCard({
              kind: "RUN STARTED", typ: "typ-run",
              name: "", meta: `<span>${escHtml((ev.runId||"").slice(0, 8))}</span>`,
            });
            pushEvent(relT(ev.t), "run", "RUN", "started", color);
            return;
          }

          case "RUN_ENDED": {
            appendSimpleCard({
              kind: "RUN ENDED", typ: "typ-end",
              name: "",
              meta: `<span class="${ev.error ? 'err' : 'ok'}">${ev.status ?? 'completed'}</span><span>${ev.duration ? fmtMs(Number(ev.duration)) : ''}</span>`,
              body: ev.error ? `<div class="text err">${escHtml(ev.error)}</div>` : "",
            });
            pushEvent(relT(ev.t), "run", "RUN", `ended · ${ev.status ?? ''}`, color);
            return;
          }

          case "MESSAGE_RECEIVED": {
            state.ctxMsgs.push({ role: "user", text: ev.text || "", bytes: (ev.text || "").length });
            renderCtx();
            appendSimpleCard({
              kind: "MESSAGE IN", typ: "typ-msg-in",
              name: `↞ user`, meta: `<span>${(ev.text || "").length}b</span>`,
              body: `<div class="text">${escHtml(ev.text)}</div>`,
            });
            pushEvent(relT(ev.t), "msg", "↞", escHtml((ev.text || "").slice(0, 80)), color);
            return;
          }

          case "MESSAGE_SENT": {
            if (ev.text) {
              state.ctxMsgs.push({ role: "assistant", text: ev.text, bytes: ev.text.length });
              renderCtx();
            }
            const actLabel = ev.actions
              ? `[${(Array.isArray(ev.actions) ? ev.actions : [ev.actions]).join(",")}]`
              : "assistant";
            appendSimpleCard({
              kind: "MESSAGE OUT", typ: "typ-msg-out",
              name: `↠ ${actLabel}`, meta: `<span>${(ev.text || "").length}b</span>`,
              body: ev.text
                ? `<div class="text">${escHtml(ev.text)}</div>`
                : `<div class="text dim">(no text)</div>`,
            });
            pushEvent(relT(ev.t), "msg", "↠", escHtml((ev.text || "").slice(0, 80)), color);
            return;
          }

          case "model_call_start": {
            appendModelCallStart(ev);
            pushEvent(relT(ev.t), "model", "→", `<b>${ev.modelType}</b> ${ev.promptBytes}b`, color);
            return;
          }

          case "model_call_end": {
            appendModelCallEnd(ev);
            pushEvent(
              relT(ev.t), "model", ev.error ? "✗" : "←",
              `<b>${ev.modelType}</b> ${fmtMs(ev.durationMs)}${ev.error ? " · " + escHtml(ev.error) : ""}`,
              color
            );
            return;
          }

          case "MODEL_USED": {
            if (ev.tokens && state.currentTraj) {
              state.currentTraj.tIn += ev.tokens.prompt || 0;
              state.currentTraj.tOut += ev.tokens.completion || 0;
              $statTin.textContent = state.currentTraj.tIn;
              $statTout.textContent = state.currentTraj.tOut;
            }
            pushEvent(
              relT(ev.t), "model", "↯",
              `<b>${ev.modelType}</b> ${ev.tokens ? (ev.tokens.prompt || 0) + "↓ " + (ev.tokens.completion || 0) + "↑" : ""}`,
              color
            );
            return;
          }

          case "ACTION_STARTED": {
            appendSimpleCard({
              kind: "ACTION", typ: "typ-action",
              name: ev.name, meta: `<span class="live">▶ running</span>`,
              body: `<details class="raw"><summary>content</summary><pre>${escHtml(jsonPretty(ev.content))}</pre></details>`,
            });
            pushEvent(relT(ev.t), "action", "▶", `<b>${escHtml(ev.name)}</b>`, color);
            return;
          }

          case "ACTION_COMPLETED": {
            appendSimpleCard({
              kind: "ACTION DONE", typ: "typ-action",
              name: ev.name, meta: `<span class="ok">✓</span>`,
              body: `<details class="raw"><summary>result</summary><pre>${escHtml(jsonPretty(ev.content))}</pre></details>`,
            });
            pushEvent(relT(ev.t), "action", "✓", `<b>${escHtml(ev.name)}</b>`, color);
            return;
          }

          case "EVALUATOR_STARTED": {
            appendSimpleCard({
              kind: "EVAL", typ: "typ-eval",
              name: ev.name, meta: `<span class="live">▶ running</span>`,
            });
            pushEvent(relT(ev.t), "eval", "▶", `<b>${escHtml(ev.name)}</b>`, color);
            return;
          }

          case "EVALUATOR_COMPLETED": {
            appendSimpleCard({
              kind: "EVAL DONE", typ: "typ-eval",
              name: ev.name,
              meta: ev.error
                ? `<span class="err">✗ ${escHtml(ev.error)}</span>`
                : `<span class="ok">✓</span>`,
            });
            pushEvent(
              relT(ev.t), "eval", ev.error ? "✗" : "✓",
              `<b>${escHtml(ev.name)}</b>${ev.error ? " · " + escHtml(ev.error) : ""}`, color
            );
            return;
          }

          case "response_chunk": return;

          case "log": {
            appendSimpleCard({
              kind: "LOG", typ: ev.level === "error" ? "typ-err" : "typ-log",
              name: ev.level, meta: "",
              body: `<div class="text ${ev.level === "error" ? "err" : "dim"}">${escHtml(ev.message)}</div>`,
            });
            pushEvent(
              relT(ev.t), ev.level === "error" ? "err" : "log",
              ev.level, escHtml((ev.message || "").slice(0, 200)), color
            );
            return;
          }

          case "trajectory_end": {
            stopElapsed();
            $statElapsed.textContent = fmtMs(ev.durationMs);
            const cls = ev.reason === "ok" ? "idle" : ev.reason === "error" ? "err" : "warn";
            const lbl = ev.reason === "ok" ? "DONE" : ev.reason === "error" ? "ERR" : "WARN";
            setState(lbl, cls);
            const s = ev.stats || {};
            const summary = `
              <div class="stats-grid">
                <div><span class="stat-k">model calls</span><span class="stat-v">${s.modelCalls ?? 0}</span></div>
                <div><span class="stat-k">prompt tok</span><span class="stat-v">${s.promptTokens ?? 0}</span></div>
                <div><span class="stat-k">compl tok</span><span class="stat-v">${s.completionTokens ?? 0}</span></div>
                <div><span class="stat-k">cached tok</span><span class="stat-v">${s.cacheReadTokens ?? 0}</span></div>
                <div><span class="stat-k">cache hit</span><span class="stat-v ${s.cacheHitPct >= 50 ? 'hit' : s.cacheHitPct > 0 ? 'partial' : 'miss'}">${s.cacheHitPct ?? 0}%</span></div>
                <div><span class="stat-k">prefixes</span><span class="stat-v">${s.distinctPrefixHashes ?? 0}</span></div>
                <div><span class="stat-k">errors</span><span class="stat-v ${s.errors ? 'err' : ''}">${s.errors ?? 0}</span></div>
                <div><span class="stat-k">duration</span><span class="stat-v">${fmtMs(ev.durationMs)}</span></div>
              </div>
            `;
            appendSimpleCard({
              kind: "TRAJECTORY END", typ: "typ-end",
              name: ev.reason,
              meta: `<span>${fmtMs(ev.durationMs)}</span>`,
              body: summary + (ev.finalText ? `<div class="text" style="margin-top:6px">${escHtml(ev.finalText)}</div>` : ""),
            });
            pushEvent(
              relT(ev.t), ev.reason === "error" ? "err" : "run",
              "END", `${ev.reason} · ${fmtMs(ev.durationMs)} · ${s.cacheHitPct ?? 0}% cached`, ev.color
            );
            return;
          }
        }
      }

      function connect() {
        const es = new EventSource("/events");
        es.onmessage = (e) => {
          try { handleEvent(JSON.parse(e.data)); }
          catch (err) { console.error(err); }
        };
        es.onerror = () => {
          setState("DISC", "err");
          es.close();
          setTimeout(connect, 1500);
        };
      }

      async function send() {
        const v = $input.value.trim();
        if (!v) return;
        $input.value = "";
        try {
          await fetch("/message", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: v }),
          });
        } catch (e) {
          pushEvent("0.00", "err", "send", escHtml(e.message));
        }
      }

      $send.addEventListener("click", send);
      $input.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
      });

      loadStatus();
      connect();
    </script>
  </body>
</html>
