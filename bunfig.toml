[test]
# Global test timeout in milliseconds
# Use shorter timeout in CI to prevent hanging
timeout = 60000

# Coverage configuration
coverage = true

[install]
# Optimize installation for CI
cache = true
auto = "fallback"

[run]
# Use bun's cross-platform shell so package.json scripts that use
# POSIX env-var prefixes (e.g. `FOO=bar bun ...`) and POSIX-style
# `&&` chains work the same on Windows as on Unix.
shell = "bun"

coverage-exclude = [
  "**/dist/**",
  "**/build/**",
  "**/chunk-*.js",
  "**/*.chunk.js",
  "**/node_modules/**",
  "**/*.min.js",
  "**/*.bundle.js",
  "**/coverage/**",
  "**/.turbo/**",
]